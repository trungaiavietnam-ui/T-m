            "Nhà vụng lợp có nhiều lỗ dột\nMột trận mưa làm ướt tả tơi.\nNgười không tu tập, mải chơi\nDục tham xâm nhập, cả đời khổ đau.",

            "Tâm luôn thích niềm vui tinh tấn\nSợ buông lung phá hạnh thanh cao\nTu theo pháp Phật nhiệm mầu\nĐốt tiêu trói buộc, sầu đau bao đời.",

            "Tâm dao động, sầu lo, sợ hãi\nKhó giữ gìn, vùng vẫy theo duyên.\nTrí nhân làm thẳng tâm này\nNhư người thợ khéo uốn tên thẳng hàng.",
            "Như tôm cá vất ngoài thủy giới\nLuôn vẫy vùng hướng tới nước nguồn\nTâm tu vẫy mạnh thoát trần\nQuyết lòng dẹp sạch Ma quân não phiền.",
            "Tâm phàm tục chuyền cành như khỉ\nTheo thú vui thành thị, xóm làng.\nLành thay, làm chủ được tâm\nGiữ tâm định tĩnh, bình an lâu dài.",
            "Tâm vi tế, khó nhìn, khó thấy\nTheo dục tham, thoải mái quay cuồng\nTrí nhân làm chủ được tâm\nNiềm vui nội tại phủ trùm khắp nơi.",
            "Đâu cần phải chạy xa, sống ẩn\nVào hang sâu, hóa hiện không thân.\nChi bằng điều phục được tâm\nVượt qua trói buộc của ngàn Ma quân.",
            "Đối với kẻ tâm không an trụ\nPháp nhiệm mầu khó tỏ nguồn khơi\nNiềm tin rúng động ,chơi vơi\nCòn nguồn trí tuệ rạng ngời khó thông.",
            "Khi tâm thoát dục tham, vướng mắc\nBuông hận thù, ganh ghét, hờn ghen\nAn toàn tuyệt đối trước sau,\nVượt trên thiện ác nhị nguyên\nXứng hàng tỉnh thức, không còn sầu lo.",
            "Thân năm uẩn như sành dễ bể\nGiữ gìn tâm như thể thành trì\nVung gươm trí tuệ diệt si\nThắng Ma quân xấu, chớ vì vinh quang.",
            "Thân vô thường, chẳng bao lâu nữa\nNằm vô tri trong cỗ quan tài\nKhi tâm thoát khỏi thân này\nThân như khúc gỗ chẳng xài vào đâu.",
            "Người ác độc diệt trừ đối thủ\nKẻ oan gia trả đũa oan gia\nKhông bằng tâm ác hại ta\nTrầm luân muôn kiếp, đường tà lún sâu.",
            "Cha mẹ muốn cho con hưởng phước\nThương cỡ nào, chẳng được dài lâu\nTâm lành, nhân tốt gieo sâu\nTự mình tạo dựng, quả mau lớn dần.",
            "Ai chinh phục địa cầu, thiên giới\nVượt lên trên cả cõi Diêm-ma\nSao bằng ngộ pháp Phật-đà\nNhư người khéo kết tràng hoa đẹp màu.",
            "Bậc hữu học vượt qua trời đất\nVượt lên trên cả cõi Diêm-ma\nLại thông chánh pháp Phật-đà\nNhư người khéo kết tràng hoa đẹp màu.",
            "Khi tỏ ngộ thân như bọt nước\nẢo ảnh như điện chớp trên không\nBẻ tan tên của Ma quân\nVượt tầm thần chết hàng ngàn dặm xa.",
            "Dùng vũ khí, gậy dao đánh đập\nHành hạ người, trù dập tơi bời\nQuả sầu mười loại sau đây:\nMột là đau nhức đêm ngày rên la;",
            "Hai, tai biến; ba là thương tật;\nBốn, độn căn, ngu ngốc, hay quên;\nNăm thường lận đận luật quan;\nSáu vương trọng tội bị oan, hiểu lầm.",

            "Dù lõa thể, ngồi lì, tuyệt thực;\nKhông gội đầu, bện tóc rối tung…\nĐừng hòng chuyển hóa tâm hồn\nNếu tâm nghi hoặc vẫn còn y nguyên.",
            "Sống trang sức bằng nguồn an tịnh\nĐiều phục tâm, giới hạnh, kiên trì\nThương người, mến vật, từ bi\nSa-môn, phạm chí sánh vì trời cao.",
            "Trong trời đất hiếm người chính niệm,\nBiết giữ mình, hổ thẹn, lương tâm\nTránh lời chỉ trích, chửi thầm\nCũng như ngựa giỏi chẳng cần phạt roi.",

            "Gìn chính niệm, cùng Minh Hạnh túc\nNêu quyết tâm tam độc loại trừ,\nKhổ đau kết thúc, thản thư\nNgười này xứng bậc chân tu trên đời.",
            "Như thủy lợi làm kênh dẫn nước\nKẻ làm tên nắn vuốt cung tên\nThợ cây bào ván hai bên\nNgười khôn làm chủ bản thân đêm ngày.",
            "Cười sao được, sướng vui sao nổi\nKhi lửa tham cháy rụi thế gian\nTối tăm giăng phủ trời đêm\nSao không nỗ lực tìm đèn sáng soi?",
            "Thân bề ngoài, đẹp đầy nhựa sống\nỞ bên trong, một đống vết thương\nGây sầu, sao lại vấn vương?\nThân là giả tạm, vô thường, mong manh.",
            "Thân mấy chốc đã già, tàn tạ\nNơi chứa đầy bệnh khổ, hôi tanh\nVô thường tổ hợp mong manh\nChết là kết thúc, tái sanh hồng trần.",
            "Thân thể này màu bồ câu trắng\nNhư trái bầu, thu đến vứt đi.\nChết rồi thi thể gớm ghê\nCó gì vui thích, mải mê thân này?",
            "Ôi, thân thể như thành trì cổ\nDựng bằng xương, máu đỏ, thịt, gân\nChứa già, chết, bệnh từng phần\nCống cao, lừa dối; dáng duyên nỗi gì!",
            "Xe vua đẹp có ngày cũng cũ\nThân thể rồi u rũ, tàn phai\nPháp lành trẻ mãi, còn hoài\nHãy nên khắc cốt những lời thánh nhân.",
            "Trẻ ít học, già không hiểu biết\nChẳng khác gì bò đực lớn đầu\nThân to, cơ bắp, khỏe, mau\nNhưng không trí tuệ, khác nào bóng đêm?",
            "Lang thang suốt luân hồi bao kiếp\nQuyết đi tìm “ông xếp” xây nhà\nTìm hoài, tìm mãi, không ra\nTái sanh, khổ lụy, đọa sa ba đường.",
            "Nay ta cấm ngươi không xây nữa\nPhá cột kèo, ván cửa, rui mè…\nNay ta đã chứng niết-bàn\nÁi tham, chấp thủ tiêu tan hết rồi.",
            "Lúc còn trẻ chẳng màng đạo đức\nKhông học nghề, tự lập lo thân\nĐến già gặp phải khó khăn\nNhư cò ủ rũ, không còn cá tôm.",
            "Có người trẻ chẳng rèn đức hạnh\nKhông luyện nghề, không lãnh tiền lương\nKhi già, buồn tủi, sầu vương\nNhớ về dĩ vãng, thở than vắn dài.",
            "Người đánh giá bản thân là quý\nPhải chính tâm bảo vệ lấy mình\nNgày đêm người trí giữ gìn\nLuôn trong tỉnh thức, tịnh minh cõi lòng.",
            "Người trí tuệ bản thân vững chải\nTự chủ mình, hoàn thiện, chánh chân\nXong rồi, giáo hóa tha nhân\nSống trong gương mẫu, thế gian nể vì.",
            "Người gương mẫu thực hành hoàn tất\nMới đem ra giáo dục thế nhân\nTự mình làm chủ thân tâm\nSoi gương nhân cách, hạnh lành truyền trao.",
            "Người sáng suốt tự nương mình vững\nKhông tìm cầu, dựa dẫm vào ai\nLành thay, điều phục tâm này\nBiết tự điều phục, không hai trên đời.",
            "Các điều ác do mình tạo tác\nÁc do tâm, ai khác ngoài ta\nÁc nhân nghiền nát người tà\nNhư kim cương cứng nghiền qua đá thường.",
            "Như tầm gửi bám cây Phật pháp\nNgười buông lung giới đức chẳng gìn\nHạnh tà chuốc họa vào thân,\nKẻ thù sung sướng thấy mình tiêu tan.",
            "Làm điều ác không cần trình độ\nHãm hại ta đạo khổ dễ hơn\nKhó thay, làm thiện chánh chơn\nMình người lợi lạc, bình an cõi đời.",
            "Kẻ ác kiến ngu si, phỉ báng\nGiáo pháp hàng La-hán nhiệm mầu\nHại mình như ngọn trúc lau\nNgay khi trổ quả nhuốm màu diệt vong.",
            "Các điều ác do mình tự tạo\nRồi vướng vào khổ não, họa tai.\nĐiều lành ta tạo hôm nay\nQuả an vui đến sớm mai là thường.",
            "Nên hiểu rõ sạch trong, nhơ uế\nHành động do gốc rễ từ tâm\nCậy nhờ tha lực khó thành\nĐỗ lỗi “tại, bởi” sao đành, không nên.",
            "Dù phụng sự, vị tha thiết thực\nXin chớ quên thực tập lợi mình\nChuyên tâm học pháp cao minh\nHướng về giải thoát, đạt thành mới thôi.",
            "Người sáng suốt chớ ôm tà kiến\nSống buông lung, ti tiện qua ngày.\nNệp tà vạy, chớ kéo dài\nĐược vầy, sinh tử luân hồi sớm ra.",
            "Luôn tinh tấn không mê lạc thú\nHạnh thanh cao, tu sĩ thường ghi\nTrang nghiêm giới đức, hành trì\nHai đời hưởng phúc chỉ vì tu tâm.",
            "Hãy quán tưởng trong đời trần tục\nMọi thứ như bọt nước, huyễn vong.\nĐến khi ngộ lẽ vô thường\nTử thần không thể lần đường chân nhân.",
            "Cõi hồng trần đẹp tuồng ảo mộng\nNhư xe vua hoành tráng gấm thêu\nKẻ ngu tham đắm, chắt chiêu\nNgười khôn tỉnh thức, chẳng yêu nhiễm đời.",
            "Dù quá khứ buông lung, dục lạc\nNhưng về sau tỉnh thức, chuyển tâm\nLàm lành, tỏa sáng trần gian\nNhư trăng rằm chiếu, không còn mây che.",
            "Dù ngày trước gây bao tội lỗi\nNhưng hôm nay sám hối, hồi tâm\nLàm lành, tỏa sáng trần gian\nNhư trăng rằm chiếu, không còn mây che.",
            "Kẻ mù tối, thế gian đầy dẫy\nNgười sáng trong có mấy trên đời!\nNhư chim khôn chẳng vướng mồi\nNgười tu đạo đức an vui cõi trời.",
            "Như trời thẳm, thiên nga uốn lượn\nCó thần thông ẩn hiện không gian\nTrí nhân thoát chốn hồng trần\nVượt qua ma chướng, vững vàng đường tu.",
            "With những kẻ chẳng tôn trọng Pháp\ Dùng vọng ngôn lừa lọc, rêu rao\nGhét thiện, bác bỏ đời sau...\nLún sâu đường ác, ngày nào vượt ra!",
            "Kẻ keo kiệt không sanh thiên giới\nNgười dại ngu chẳng đoái tình thương\nNgười hiền thích sống thiện lương\nĐời sau hưởng phúc khác thường thế nhân.",
            "Chứng sơ quả thánh nhân rạng rỡ\nHơn cõi trời Thiên chủ uy quyền\nHơn Trời trong chốn càn khôn\nKhó tìm trong cõi bụi hồng người hơn.",
            "Phật chiến thắng hoàn toàn cõi trược\nTham ái trừ, tuệ giác sâu ngần\nKhông lưu dấu vết trần gian\nĐố ai vẽ được bước chân vượt đời.",
            "Bậc giải thoát lưới tham, á dục\nHết tái sanh, tuệ giác sâu ngần\nKhông lưu dấu vết trần gian\nĐố ai vẽ được bước chân vượt đời.",
            "Người có trí thiền hành, tinh tấn\nTìm niềm vui trong hạnh viễn ly\nĐêm ngày tỉnh thức luôn khi\nTrời người kính trọng, sánh vì trăng sao.",
            "Thật hạnh phúc, làm người nhân đức\nQuả khó thay, sống thật tịnh thanh\nKhó thay, nghe pháp, thực hành\nKhó thay, gặp Phật chứng thành quả cao."
        ];

        const getLunarDate = (date) => {
            try {
                const formatter = new Intl.DateTimeFormat('vi-VN', { calendar: 'chinese', day: 'numeric', month: 'numeric' });
                const parts = formatter.formatToParts(date);
                return {
                    day: parseInt(parts.find(p => p.type === 'day').value),
                    month: parseInt(parts.find(p => p.type === 'month').value)
                };
            } catch (e) {
                return { day: 0, month: 0 };
            }
        };

        const getDayOfWeek = (date) => {
            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            return days[date.getDay()];
        };

        const sendNotification = (title, body) => {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body, icon: '/favicon.ico' });
            }
        };

        // --- CÁC COMPONENT CON ---
        const SettingsModal = ({ theme, onSave, onClose, auth, db, appId }) => {
            const [localTheme, setLocalTheme] = useState(theme);
            const [newPassword, setNewPassword] = useState('');
            const [passwordMessage, setPasswordMessage] = useState('');
            const [passwordError, setPasswordError] = useState('');
            const [showChangePassword, setShowChangePassword] = useState(false);
            const [appPassword, setAppPassword] = useState('');
            const [enableLock, setEnableLock] = useState(false);
            const [lockError, setLockError] = useState('');
            const [lockSuccess, setLockSuccess] = useState('');

            useEffect(() => {
                if (!auth.currentUser) return;
                const loadLockConfig = async () => {
                    try {
                        const settingsRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'lock');
                        const docSnap = await getDoc(settingsRef);
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setAppPassword(data.appPassword || '');
                            setEnableLock(data.enableLock || false);
                        } else {
                            const savedPassword = localStorage.getItem('vt_app_password') || '';
                            const savedEnable = localStorage.getItem('vt_enable_lock') === 'true';
                            setAppPassword(savedPassword);
                            setEnableLock(savedEnable);
                        }
                    } catch (e) {
                        console.error("Lỗi tải thông tin khóa:", e);
                    }
                };
                loadLockConfig();
            }, [auth.currentUser]);

            const handleSaveLockSettings = async (e) => {
                e.preventDefault();
                setLockError('');
                setLockSuccess('');
                if (enableLock && !appPassword.trim()) {
                    setLockError("Vui lòng nhập mã bảo vệ nếu muốn bật tính năng này.");
                    return;
                }
                try {
                    const settingsRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'lock');
                    const payload = { appPassword: appPassword.trim(), enableLock: enableLock };
                    await setDoc(settingsRef, payload, { merge: true });
                    localStorage.setItem('vt_app_password', appPassword.trim());
                    localStorage.setItem('vt_enable_lock', enableLock ? 'true' : 'false');
                    setLockSuccess("Đã cập nhật tính năng bảo vệ thành công!");
                } catch (err) {
                    setLockError("Lỗi lưu cấu hình bảo vệ: " + err.message);
                }
            };

            const handleChangePassword = async (e) => {
                e.preventDefault();
                setPasswordMessage('');
                setPasswordError('');
                if (!newPassword.trim()) {
                    setPasswordError("Vui lòng nhập mật khẩu mới.");
                    return;
                }
                try {
                    if (auth.currentUser) {
                        await updatePassword(auth.currentUser, newPassword);
                        setPasswordMessage("Đổi mật khẩu thành công!");
                        setNewPassword('');
                    } else {
                        setPasswordError("Không tìm thấy thông tin phiên đăng nhập.");
                    }
                } catch (err) {
                    if (err.code === 'auth/requires-recent-login') {
                        setPasswordError("⚠️ Hãy Đăng xuất và Đăng nhập lại để xác thực danh tính trước khi đổi mật khẩu.");
                    } else {
                        setPasswordError("Lỗi: " + err.message);
                    }
                }
            };

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-sm rounded-xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
                        <div className="bg-gray-800 text-white p-4 flex justify-between items-center shrink-0">
                            <h3 className="font-bold flex items-center gap-2"><Palette size={18}/> Giao Diện & Bảo Mật</h3>
                            <button onClick={onClose}><X size={20}/></button>
                        </div>
                        <div className="p-6 space-y-6 overflow-y-auto flex-1 no-scrollbar text-slate-800">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Màu Nền Ứng Dụng</label>
                                <input type="color" className="w-full h-12 rounded cursor-pointer border-2 border-gray-200 bg-white" value={localTheme.bgColor} onChange={e => setLocalTheme({...localTheme, bgColor: e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Màu Nền Ghi Chú</label>
                                <input type="color" className="w-full h-12 rounded cursor-pointer border-2 border-gray-200 bg-white" value={localTheme.noteColor} onChange={e => setLocalTheme({...localTheme, noteColor: e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Màu Chữ Chính</label>
                                <input type="color" className="w-full h-12 rounded cursor-pointer border-2 border-gray-200 bg-white" value={localTheme.textColor} onChange={e => setLocalTheme({...localTheme, textColor: e.target.value})} />
                            </div>
                            <button onClick={() => onSave(localTheme)} className="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md">Lưu & Đồng Bộ Màu</button>
                            <button onClick={() => onSave({ bgColor: '#f3f4f6', noteColor: '#FEFCE8', textColor: '#1F2937' })} className="w-full border border-gray-300 text-gray-600 py-2 rounded-lg text-sm">Khôi phục màu mặc định</button>

                            <div className="border-t pt-4 mt-4">
                                <h4 className="font-bold text-sm text-slate-800 flex items-center gap-2 mb-3"><Lock size={16} /> Bảo vệ Ghi chú & Việc cần làm</h4>
                                <form onSubmit={handleSaveLockSettings} className="space-y-3 p-3 bg-slate-50 rounded-lg border border-slate-200">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-xs font-semibold text-slate-600">Trạng thái khóa bảo vệ:</span>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" className="sr-only peer" checked={enableLock} onChange={e => setEnableLock(e.target.checked)} />
                                            <div className="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                                        </label>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="block text-[10px] font-bold text-slate-500 uppercase">Mã PIN bảo mật</label>
                                        <input type="password" maxLength={12} className="w-full px-3 py-1.5 border rounded-lg text-sm text-slate-800 focus:ring-1 focus:ring-blue-500 outline-none" placeholder="Nhập mã bảo vệ cá nhân..." value={appPassword} onChange={e => setAppPassword(e.target.value)} />
                                    </div>
                                    {lockError && <p className="text-red-500 text-xs">{lockError}</p>}
                                    {lockSuccess && <p className="text-green-600 text-xs font-medium">{lockSuccess}</p>}
                                    <button type="submit" className="w-full bg-slate-800 text-white text-xs font-bold py-2 rounded-lg hover:bg-slate-700 transition">Cập nhật mật khẩu bảo vệ</button>
                                </form>
                            </div>

                            <div className="border-t pt-4 mt-4">
                                <button type="button" onClick={() => setShowChangePassword(!showChangePassword)} className="w-full flex items-center justify-center gap-2 border border-slate-300 text-slate-700 py-2 rounded-lg text-sm font-bold hover:bg-slate-50 transition" >
                                    <Key size={16} /> {showChangePassword ? "Ẩn đổi mật khẩu" : "Đổi mật khẩu tài khoản"}
                                </button>
                                {showChangePassword && (
                                    <form onSubmit={handleChangePassword} className="mt-4 space-y-3 p-3 bg-slate-50 rounded-lg border border-slate-200 animate-in fade-in">
                                        <label className="block text-xs font-bold text-slate-600">Mật khẩu mới</label>
                                        <input type="password" className="w-full px-3 py-2 border rounded-lg text-sm text-slate-800 focus:ring-1 focus:ring-blue-500 outline-none" placeholder="Nhập mật khẩu mới..." value={newPassword} onChange={e => setNewPassword(e.target.value)} />
                                        {passwordError && <p className="text-red-500 text-xs">{passwordError}</p>}
                                        {passwordMessage && <p className="text-green-600 text-xs font-medium">{passwordMessage}</p>}
                                        <button type="submit" className="w-full bg-slate-800 text-white text-xs font-bold py-2 rounded-lg hover:bg-slate-700 transition">Xác nhận đổi mật khẩu</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AuthScreen = ({ auth, appId }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [message, setMessage] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault();
                setError('');
                setMessage('');
                if (!email || !password) {
                    setError('Vui lòng điền đầy đủ thông tin!');
                    return;
                }
                try {
                    if (isLogin) {
                        await signInWithEmailAndPassword(auth, email, password);
                    } else {
                        await createUserWithEmailAndPassword(auth, email, password);
                        setMessage('Đăng ký thành công! Đang tự động đăng nhập...');
                    }
                } catch (err) {
                    setError(err.message);
                }
            };

            const handleResetPassword = async () => {
                if (!email) {
                    setError('Vui lòng nhập Email để nhận liên kết đặt lại mật khẩu.');
                    return;
                }
                try {
                    await sendPasswordResetEmail(auth, email);
                    setMessage('Đã gửi email khôi phục mật khẩu. Hãy kiểm tra hộp thư!');
                } catch (err) {
                    setError(err.message);
                }
            };

            return (
                <div className="h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-900 p-4">
                    <div className="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-sm text-slate-800">
                        <div className="text-center mb-6">
                            <div className="bg-blue-100 text-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-2 shadow-inner">
                                <CalendarDays size={32} />
                            </div>
                            <h2 className="text-xl font-black text-slate-900 uppercase tracking-tight">Lịch Vạn Niên v3</h2>
                            <p className="text-xs text-gray-500">Đồng bộ dữ liệu thời gian thực</p>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <div>
                                <label className="text-xs font-bold text-gray-600 uppercase block mb-1">Tài khoản Email</label>
                                <input type="email" className="w-full px-3 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 text-slate-800" placeholder="user@example.com" value={email} onChange={e => setEmail(e.target.value)} />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-gray-600 uppercase block mb-1">Mật khẩu</label>
                                <input type="password" className="w-full px-3 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 text-slate-800" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} />
                            </div>
                            {error && <div className="text-red-500 text-xs bg-red-50 p-2 rounded-lg flex items-center gap-1.5"><AlertCircle size={14}/> {error}</div>}
                            {message && <div className="text-green-600 text-xs bg-green-50 p-2 rounded-lg">{message}</div>}
                            <button type="submit" className="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition duration-200">
                                {isLogin ? 'Đăng Nhập' : 'Đăng Ký Tài Khoản'}
                            </button>
                        </form>
                        <div className="flex justify-between items-center mt-4 text-xs text-blue-600 font-semibold">
                            <button onClick={handleResetPassword} className="hover:underline">Quên mật khẩu?</button>
                            <button onClick={() => setIsLogin(!isLogin)} className="hover:underline bg-slate-100 px-2.5 py-1 rounded-lg">
                                {isLogin ? 'Tạo tài khoản mới' : 'Đã có tài khoản?'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const EventListModal = ({ date, events, onAdd, onDelete, onClose }) => {
            const [newEvent, setNewEvent] = useState('');
            const [repeatType, setRepeatType] = useState('none');
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const dayStr = `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
            const currentLunar = getLunarDate(date);

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-end justify-center sm:items-center p-0 sm:p-4">
                    <div className="bg-white w-full max-w-sm rounded-t-2xl sm:rounded-2xl shadow-2xl overflow-hidden max-h-[85vh] flex flex-col">
                        <div className="bg-blue-600 text-white p-4 flex justify-between items-center shrink-0">
                            <div>
                                <h3 className="font-bold text-sm">Sự kiện ngày {dayStr}</h3>
                                <p className="text-[10px] opacity-90">Âm lịch: Ngày {currentLunar.day} tháng {currentLunar.month}</p>
                            </div>
                            <button onClick={onClose} className="bg-blue-700 p-1.5 rounded-full hover:bg-blue-800"><X size={18}/></button>
                        </div>
                        <div className="p-4 flex-1 overflow-y-auto no-scrollbar bg-gray-50">
                            {events.length === 0 ? (
                                <p className="text-center text-gray-400 text-xs py-8">Chưa có sự kiện nào được ghi nhận.</p>
                            ) : (
                                <ul className="space-y-2">
                                    {events.map(e => (
                                        <li key={e.id} className="bg-white p-3 rounded-xl border border-gray-200 shadow-sm flex justify-between items-center group">
                                            <div className="flex flex-col flex-1 pr-2">
                                                <span className="text-sm font-semibold text-gray-800">{e.title}</span>
                                                <span className="text-[9px] text-blue-600 font-bold uppercase mt-0.5 bg-blue-50 px-1.5 py-0.5 rounded w-max">
                                                    {e.repeat === 'lunar' ? 'Lặp Âm Lịch' : e.repeat === 'solar' ? 'Lặp Dương Lịch' : e.repeat === 'weekly' ? 'Lặp Hàng Tuần' : e.repeat === 'monthly' ? 'Lặp Hàng Tháng' : 'Diễn ra một lần'}
                                                </span>
                                            </div>
                                            <button onClick={() => {
                                                if (deleteConfirm === e.id) onDelete(e.id);
                                                else {
                                                    setDeleteConfirm(e.id);
                                                    setTimeout(() => setDeleteConfirm(prev => prev === e.id ? null : prev), 3000);
                                                }
                                            }} className={`text-xs p-1.5 rounded transition ${deleteConfirm === e.id ? 'bg-red-500 text-white px-2 py-1 rounded' : 'text-red-400 hover:text-red-600'}`}>
                                                {deleteConfirm === e.id ? <span>Xóa?</span> : <Trash2 size={16}/>}
                                            </button>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                        <div className="p-4 border-t bg-gray-50 flex flex-col gap-2">
                            <div className="flex gap-2 text-[10px] mb-1 text-gray-700 flex-wrap">
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'none'} onChange={() => setRepeatType('none')} /> Không lặp</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'lunar'} onChange={() => setRepeatType('lunar')} /> Lặp Âm</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'solar'} onChange={() => setRepeatType('solar')} /> Lặp Dương</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'weekly'} onChange={() => setRepeatType('weekly')} /> Tuần</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'monthly'} onChange={() => setRepeatType('monthly')} /> Tháng</label>
                            </div>
                            <div className="flex gap-2">
                                <input className="flex-1 border rounded px-3 py-2 text-sm outline-none focus:border-blue-500 text-slate-800" placeholder="Tên sự kiện..." value={newEvent} onChange={e => setNewEvent(e.target.value)} />
                                <button onClick={() => { if(newEvent.trim()) { onAdd(newEvent, repeatType); setNewEvent(''); } }} className="bg-blue-600 text-white p-2 rounded hover:bg-blue-700"><Plus size={20}/></button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const TodoEditor = ({ initialText, initialReminder, initialDeadline, isNew, onSave, onCancel }) => {
            const [text, setText] = useState(initialText || '');
            const [reminder, setReminder] = useState(initialReminder || '');
            const [deadline, setDeadline] = useState(initialDeadline || '');

            return (
                <div className="fixed inset-0 bg-white z-40 flex flex-col animate-in slide-in-from-bottom-5">
                    <div className="flex justify-between items-center p-4 border-b bg-gray-50">
                        <button onClick={onCancel} className="p-2 hover:bg-gray-200 rounded-full"><X size={20}/></button>
                        <h3 className="font-bold text-gray-700">{isNew ? 'Thêm Việc' : 'Sửa Việc'}</h3>
                        <button onClick={()=>onSave(text, reminder, deadline)} className="text-blue-600 font-bold p-2"><Check size={18}/> Lưu</button>
                    </div>
                    <div className="p-4 flex-1 flex flex-col gap-4">
                        <div><label className="text-xs font-bold text-slate-500 block mb-1">Nội dung</label><input className="w-full text-lg border-b p-2 outline-none focus:border-blue-500 bg-transparent text-slate-800 font-bold" placeholder="Ví dụ: Đi chợ..." value={text} onChange={e=>setText(e.target.value)} autoFocus /></div>
                        <div><label className="text-xs font-bold text-slate-500 block mb-1 flex items-center gap-1"><AlertCircle size={12}/> Hạn chót (Deadline)</label><input type="datetime-local" className="w-full border rounded p-2 text-sm bg-gray-50 text-slate-800 outline-none" value={deadline} onChange={e=>setDeadline(e.target.value)} /></div>
                        <div><label className="text-xs font-bold text-slate-500 block mb-1 flex items-center gap-1"><Clock size={12}/> Nhắc tôi trước (Reminder)</label><input type="datetime-local" className="w-full border rounded p-2 text-sm bg-gray-50 text-slate-800 outline-none" value={reminder} onChange={e=>setReminder(e.target.value)} /></div>
                    </div>
                </div>
            );
        };

        const TodoView = ({ user, db, appId, theme }) => {
            const [todos, setTodos] = useState([]);
            const [editing, setEditing] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const todoRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'todos'), [db, appId, user.uid]);

            useEffect(() => {
                const unsub = onSnapshot(query(todoRef), snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    data.sort((a, b) => {
                        const aActiveDeadline = !a.completed && a.deadlineTime;
                        const bActiveDeadline = !b.completed && b.deadlineTime;
                        if (aActiveDeadline && !bActiveDeadline) return -1;
                        if (!aActiveDeadline && bActiveDeadline) return 1;
                        if (aActiveDeadline && bActiveDeadline) {
                            const aSecs = a.deadlineTime.seconds || 0;
                            const bSecs = b.deadlineTime.seconds || 0;
                            if (aSecs !== bSecs) {
                                return aSecs - bSecs;
                            }
                        }
                        if (a.order !== undefined && b.order !== undefined) {
                            return a.order - b.order;
                        }
                        return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
                    });
                    setTodos(data);
                });
                return unsub;
            }, [todoRef]);

            const save = async (text, reminderStr, deadlineStr) => {
                const reminderData = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                const deadlineData = deadlineStr ? Timestamp.fromDate(new Date(deadlineStr)) : null;
                const payload = { text, reminderTime: reminderData, deadlineTime: deadlineData };

                if (editing.id) await updateDoc(doc(todoRef, editing.id), payload);
                else await addDoc(todoRef, { ...payload, completed: false, createdAt: serverTimestamp(), order: Date.now() });
                setEditing(null);
            };

            const handleDelete = (e, id) => {
                e.stopPropagation();
                if (deleteConfirm === id) {
                    deleteDoc(doc(todoRef, id));
                    setDeleteConfirm(null);
                } else {
                    setDeleteConfirm(id);
                    setTimeout(() => setDeleteConfirm(prev => prev === id ? null : prev), 3000);
                }
            };

            const toggle = async (id, currentVal) => {
                await updateDoc(doc(todoRef, id), { completed: !currentVal });
            };

            const formatTime = (ts) => {
                if(!ts) return '';
                const d = new Date(ts.seconds * 1000);
                return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')} ${d.getDate()}/${d.getMonth()+1}`;
            };

            return (
                <div className="flex flex-col flex-1 overflow-hidden relative">
                    <div className="p-4 flex justify-between items-center bg-white/80 border-b">
                        <h2 className="font-bold text-slate-800 flex items-center gap-1.5"><CheckSquare size={18}/> Việc Cần Làm</h2>
                        <button onClick={() => setEditing({ text: '', reminder: '', deadline: '' })} className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1"><Plus size={14}/> Thêm việc</button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar">
                        {todos.length === 0 ? (
                            <p className="text-center text-xs text-gray-400 py-12">Danh sách việc trống.</p>
                        ) : (
                            todos.map(t => (
                                <div key={t.id} id={`search-todo-${t.id}`} onClick={() => setEditing({ id: t.id, text: t.text, reminder: t.reminderTime ? new Date(t.reminderTime.seconds * 1000).toISOString().slice(0,16) : '', deadline: t.deadlineTime ? new Date(t.deadlineTime.seconds * 1000).toISOString().slice(0,16) : '' })} className={`p-3 rounded-xl border border-slate-150 transition cursor-pointer flex items-center justify-between ${t.completed ? 'bg-gray-50 opacity-60' : 'bg-white hover:border-blue-300 shadow-sm'}`}>
                                    <div className="flex items-center gap-3 flex-1 min-w-0">
                                        <input type="checkbox" checked={t.completed} onChange={(e) => { e.stopPropagation(); toggle(t.id, t.completed); }} className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 bg-gray-100 border-gray-300 shrink-0" />
                                        <div className="flex flex-col min-w-0">
                                            <span className={`text-sm font-semibold truncate text-slate-800 ${t.completed ? 'line-through text-gray-400' : ''}`}>{t.text}</span>
                                            <div className="flex items-center gap-2 mt-1 flex-wrap">
                                                {t.deadlineTime && <span className="text-[10px] text-red-500 bg-red-50 px-1.5 py-0.5 rounded font-medium">Hạn: {formatTime(t.deadlineTime)}</span>}
                                                {t.reminderTime && <span className="text-[10px] text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded font-medium">Nhắc: {formatTime(t.reminderTime)}</span>}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={(e) => handleDelete(e, t.id)} className={`p-1.5 rounded text-xs transition shrink-0 ${deleteConfirm === t.id ? 'bg-red-500 text-white px-2 py-0.5' : 'text-gray-400 hover:text-red-500'}`}>
                                        {deleteConfirm === t.id ? 'Xóa?' : <Trash2 size={15}/>}
                                    </button>
                                </div>
                            ))
                        )}
                    </div>
                    {editing && <TodoEditor initialText={editing.text} initialReminder={editing.reminder} initialDeadline={editing.deadline} isNew={!editing.id} onSave={save} onCancel={() => setEditing(null)} />}
                </div>
            );
        };

        const NoteView = ({ user, db, appId, theme }) => {
            const [notes, setNotes] = useState([]);
            const [activeNote, setActiveNote] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const noteRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'notes'), [db, appId, user.uid]);

            useEffect(() => {
                const unsub = onSnapshot(query(noteRef, orderBy('createdAt', 'desc')), snap => {
                    setNotes(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                return unsub;
            }, [noteRef]);

            const handleSave = async (title, text, color) => {
                const payload = { title, text, color: color || '#FEFCE8', updatedAt: serverTimestamp() };
                if (activeNote.id) {
                    await updateDoc(doc(noteRef, activeNote.id), payload);
                } else {
                    await addDoc(noteRef, { ...payload, createdAt: serverTimestamp() });
                }
                setActiveNote(null);
            };

            const handleDelete = (id) => {
                if (deleteConfirm === id) {
                    deleteDoc(doc(noteRef, id));
                    setDeleteConfirm(null);
                    if (activeNote?.id === id) setActiveNote(null);
                } else {
                    setDeleteConfirm(id);
                    setTimeout(() => setDeleteConfirm(prev => prev === id ? null : prev), 3000);
                }
            };

            return (
                <div className="flex flex-col flex-1 overflow-hidden relative">
                    <div className="p-4 flex justify-between items-center bg-white/80 border-b">
                        <h2 className="font-bold text-slate-800 flex items-center gap-1.5"><StickyNote size={18}/> Sổ Tay Ghi Chú</h2>
                        <button onClick={() => setActiveNote({ title: '', text: '', color: '#FEFCE8' })} className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1"><Plus size={14}/> Thêm mới</button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-3 no-scrollbar align-baseline">
                        {notes.length === 0 ? (
                            <p className="col-span-2 text-center text-xs text-gray-400 py-12">Chưa lưu ghi chú nào.</p>
                        ) : (
                            notes.map(n => (
                                <div key={n.id} id={`search-note-${n.id}`} onClick={() => setActiveNote(n)} className="p-3.5 rounded-xl border border-black/5 shadow-sm flex flex-col justify-between relative group cursor-pointer hover:shadow-md transition h-32 overflow-hidden" style={{ backgroundColor: n.color || '#FEFCE8' }}>
                                    <div className="overflow-hidden flex-1">
                                        <h4 className="font-bold text-slate-900 text-sm line-clamp-1 border-b border-black/5 pb-1 mb-1">{n.title || 'Không tiêu đề'}</h4>
                                        <p className="text-xs text-slate-700 font-medium line-clamp-3 leading-relaxed whitespace-pre-wrap">{n.text}</p>
                                    </div>
                                    <div className="flex justify-between items-center mt-2 pt-1">
                                        <span className="text-[8px] text-slate-400 font-bold">{n.createdAt ? new Date(n.createdAt.seconds * 1000).toLocaleDateString('vi-VN') : 'Đang đồng bộ...'}</span>
                                        <button onClick={(e) => { e.stopPropagation(); handleDelete(n.id); }} className={`p-1 rounded text-[10px] font-bold transition shrink-0 ${deleteConfirm === n.id ? 'bg-red-500 text-white px-1.5 py-0.5 rounded' : 'text-slate-400 hover:text-red-500'}`}>
                                            {deleteConfirm === n.id ? 'Xóa?' : <Trash2 size={13}/>}
                                        </button>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>

                    {activeNote && (
                        <div className="fixed inset-0 bg-white z-40 flex flex-col animate-in slide-in-from-bottom-5">
                            <NoteEditor note={activeNote} onSave={handleSave} onCancel={() => setActiveNote(null)} />
                        </div>
                    )}
                </div>
            );
        };

        const NoteEditor = ({ note, onSave, onCancel }) => {
            const [title, setTitle] = useState(note.title || '');
            const [text, setText] = useState(note.text || '');
            const [color, setColor] = useState(note.color || '#FEFCE8');

            return (
                <div className="flex flex-col h-full text-slate-800" style={{ backgroundColor: color }}>
                    <div className="flex justify-between items-center p-4 border-b border-black/5 bg-white/40">
                        <button onClick={onCancel} className="p-2 hover:bg-black/5 rounded-full text-slate-700"><X size={20}/></button>
                        <h3 className="font-black text-slate-800 uppercase tracking-wide text-xs">Biên Tập Ghi Chú</h3>
                        <button onClick={() => onSave(title, text, color)} className="text-blue-600 font-bold p-2 text-sm flex items-center gap-1"><Save size={16}/> Lưu lại</button>
                    </div>
                    <div className="p-4 flex-1 flex flex-col gap-3 overflow-hidden">
                        <input className="w-full text-base font-bold bg-transparent outline-none border-b border-black/5 pb-2 placeholder-slate-400 text-slate-900" placeholder="Tiêu đề ghi chú..." value={title} onChange={e => setTitle(e.target.value)} />
                        <textarea className="w-full flex-1 text-sm bg-transparent outline-none resize-none leading-relaxed placeholder-slate-400 text-slate-800 font-medium" placeholder="Viết nội dung vào đây..." value={text} onChange={e => setText(e.target.value)} />
                    </div>
                    <div className="p-4 border-t border-black/5 bg-white/20 overflow-x-auto no-scrollbar shrink-0">
                        <div className="flex gap-2.5">
                            {NOTE_COLORS.map(c => (
                                <button key={c} onClick={() => setColor(c)} className={`w-7 h-7 rounded-full border border-black/10 transition transform shrink-0 ${color === c ? 'scale-110 ring-2 ring-blue-500 shadow-md' : 'hover:scale-105'}`} style={{ backgroundColor: c }} />
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const TimetableView = ({ user, db, appId, theme }) => {
            const [timetable, setTimetable] = useState({});
            const [editingCell, setEditingCell] = useState(null);
            const [cellText, setCellText] = useState('');

            const timetableDocRef = useMemo(() => doc(db, 'artifacts', appId, 'users', user.uid, 'timetable', 'current'), [db, appId, user.uid]);

            useEffect(() => {
                const unsub = onSnapshot(timetableDocRef, docSnap => {
                    if (docSnap.exists()) {
                        setTimetable(docSnap.data().grid || {});
                    } else {
                        setTimetable({});
                    }
                });
                return unsub;
            }, [timetableDocRef]);

            const DAYS = ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            const LESSONS = [1, 2, 3, 4, 5];

            const handleCellClick = (day, lesson) => {
                const cellKey = `${day}-${lesson}`;
                setEditingCell({ day, lesson, key: cellKey });
                setCellText(timetable[cellKey] || '');
            };

            const handleSaveCell = async () => {
                const updatedGrid = { ...timetable, [editingCell.key]: cellText.trim() };
                await setDoc(timetableDocRef, { grid: updatedGrid }, { merge: true });
                setEditingCell(null);
            };

            return (
                <div className="flex flex-col flex-1 overflow-hidden relative text-slate-800">
                    <div className="p-4 bg-white border-b flex justify-between items-center shadow-sm shrink-0">
                        <h2 className="font-bold flex items-center gap-1.5 text-slate-800"><Table size={18}/> Thời Khóa Biểu Tuần</h2>
                        <span className="text-[10px] text-slate-400 font-bold uppercase bg-slate-100 px-2 py-0.5 rounded">Bản chuẩn 5 Tiết</span>
                    </div>
                    <div className="flex-1 overflow-auto p-2 bg-gray-50">
                        <div className="min-w-[420px] bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
                            <div className="grid grid-cols-7 bg-slate-800 text-white text-center font-bold text-xs py-2 shadow-sm">
                                <div className="border-r border-slate-700 flex items-center justify-center">Tiết</div>
                                {DAYS.map((d, i) => <div key={d} className={`flex items-center justify-center ${i < DAYS.length - 1 ? 'border-r border-slate-700' : ''}`}>{d}</div>)}
                            </div>
                            <div className="divide-y divide-slate-150">
                                {LESSONS.map(lesson => (
                                    <div key={lesson} className="grid grid-cols-7 text-center text-xs min-h-[56px]">
                                        <div className="bg-slate-50 font-bold border-r border-slate-200 flex items-center justify-center text-slate-500 shadow-inner">{lesson}</div>
                                        {DAYS.map((day, idx) => {
                                            const key = `${day}-${lesson}`;
                                            const val = timetable[key] || '';
                                            return (
                                                <div key={day} id={`search-timetable-${key}`} onClick={() => handleCellClick(day, lesson)} className={`p-1 border-slate-150 cursor-pointer hover:bg-blue-50 transition flex flex-col justify-center items-center font-semibold overflow-hidden text-ellipsis ${idx < DAYS.length - 1 ? 'border-r' : ''} ${val ? 'text-blue-700 bg-blue-50/30' : 'text-gray-300 font-normal italic'}`} title={val || 'Trống'}>
                                                    <span className="line-clamp-3 leading-tight break-words px-0.5">{val || '-'}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {editingCell && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xs rounded-xl shadow-2xl p-4 border border-slate-100 animate-in fade-in">
                                <h3 className="font-bold text-sm mb-2 text-slate-800">Cập nhật: {editingCell.day} - Tiết {editingCell.lesson}</h3>
                                <input type="text" maxLength={45} className="w-full border rounded-lg px-3 py-2 text-sm text-slate-800 outline-none focus:ring-1 focus:ring-blue-500 font-semibold mb-4 bg-gray-50" placeholder="Tên môn học, phòng học..." value={cellText} onChange={e => setCellText(e.target.value)} autoFocus onKeyDown={e => { if(e.key==='Enter') handleSaveCell(); }} />
                                <div className="flex gap-2">
                                    <button onClick={() => setEditingCell(null)} className="flex-1 border text-slate-500 py-1.5 rounded-lg text-xs font-bold hover:bg-gray-50">Hủy</button>
                                    <button onClick={handleSaveCell} className="flex-1 bg-blue-600 text-white py-1.5 rounded-lg text-xs font-bold hover:bg-blue-700 shadow-md">Cập nhật</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- COMPONENT CHÍNH ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('calendar');
            const [unlockedTabs, setUnlockedTabs] = useState({ todo: false, notes: false });
            const [showSettings, setShowSettings] = useState(false);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [dailyDate, setDailyDate] = useState(new Date());
            const [theme, setTheme] = useState({ bgColor: '#f3f4f6', noteColor: '#FEFCE8', textColor: '#1F2937' });
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [showOfflineBadge, setShowOfflineBadge] = useState(false);

            // Các State phục vụ Tính năng Tìm kiếm Toàn cục (Global Search)
            const [searchKeyword, setSearchKeyword] = useState('');
            const [showSearchModal, setShowSearchModal] = useState(false);
            const [globalEvents, setGlobalEvents] = useState([]);
            const [globalTodos, setGlobalTodos] = useState([]);
            const [globalNotes, setGlobalNotes] = useState([]);
            const [globalTimetable, setGlobalTimetable] = useState({});

            // State lưu trữ cấu hình bảo mật PIN
            const [lockConfig, setLockConfig] = useState({ appPassword: '', enableLock: false });
            const [pinInput, setPinInput] = useState('');
            const [pinError, setPinError] = useState('');
            const [pendingTab, setPendingTab] = useState(null);

            // State Danh mục Thông báo Nhắc việc (Alert Modal)
            const [activeAlerts, setActiveAlerts] = useState([]);
            const [editingAlertId, setEditingAlertId] = useState(null);
            const [editAlertTitle, setEditAlertTitle] = useState('');
            const [editAlertTimeStr, setEditAlertTimeStr] = useState('');

            const app = useMemo(() => initializeApp(MANUAL_CONFIG), []);
            const db = useMemo(() => {
                const firestoreInstance = getFirestore(app);
                try {
                    enableIndexedDbPersistence(firestoreInstance).catch(err => {
                        if (err.code === 'failed-precondition') {
                            console.warn("Độ bền dữ liệu ngoại tuyến thất bại: Nhiều tab đang mở.");
                        } else if (err.code === 'unimplemented') {
                            console.warn("Trình duyệt không hỗ trợ lưu đệm cấu trúc IndexedDB.");
                        }
                    });
                } catch(e){}
                return firestoreInstance;
            }, [app]);

            // Trích xuất vị trí ngẫu nhiên cho danh ngôn / Kinh Pháp Cú hàng ngày
            const verseIndex = useMemo(() => {
                const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
                return dayOfYear % DEFAULT_VERSES.length;
            }, []);

            // Theo dõi tình trạng kết nối mạng Internet
            useEffect(() => {
                const handleOnline = () => { setIsOffline(false); setShowOfflineBadge(true); setTimeout(() => setShowOfflineBadge(false), 4000); };
                const handleOffline = () => { setIsOffline(true); setShowOfflineBadge(false); };
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);

            // Lắng nghe trạng thái tài khoản Authentication
            useEffect(() => {
                const authInstance = getAuth(app);
                const unsub = onAuthStateChanged(authInstance, async (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) {
                        try {
                            const themeRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', currentUser.uid, 'settings', 'theme');
                            const themeSnap = await getDoc(themeRef);
                            if (themeSnap.exists()) setTheme(themeSnap.data());
                            else {
                                const savedTheme = localStorage.getItem('app_theme');
                                if (savedTheme) setTheme(JSON.parse(savedTheme));
                            }
                        } catch (e) {
                            console.error("Lỗi lấy cấu hình theme:", e);
                        }
                    }
                    setLoading(false);
                });
                return unsub;
            }, [app, db]);

            // Tải cấu hình mật khẩu bảo vệ PIN
            useEffect(() => {
                if (!user) return;
                const lockRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'lock');
                const unsub = onSnapshot(lockRef, docSnap => {
                    if (docSnap.exists()) {
                        setLockConfig(docSnap.data());
                    } else {
                        const savedPassword = localStorage.getItem('vt_app_password') || '';
                        const savedEnable = localStorage.getItem('vt_enable_lock') === 'true';
                        setLockConfig({ appPassword: savedPassword, enableLock: savedEnable });
                    }
                }, () => {
                    const savedPassword = localStorage.getItem('vt_app_password') || '';
                    const savedEnable = localStorage.getItem('vt_enable_lock') === 'true';
                    setLockConfig({ appPassword: savedPassword, enableLock: savedEnable });
                });
                return unsub;
            }, [user, db]);

            // Đồng bộ toàn bộ dữ liệu từ Firestore về Client phục vụ Tìm kiếm nhanh Toàn cục
            useEffect(() => {
                if (!user) return;

                const eventsRef = collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'events');
                const unsubEvents = onSnapshot(eventsRef, snap => {
                    setGlobalEvents(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const todosRef = collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'todos');
                const unsubTodos = onSnapshot(todosRef, snap => {
                    setGlobalTodos(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const notesRef = collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'notes');
                const unsubNotes = onSnapshot(notesRef, snap => {
                    setGlobalNotes(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const timetableDocRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'timetable', 'current');
                const unsubTimetable = onSnapshot(timetableDocRef, docSnap => {
                    if (docSnap.exists()) {
                        setGlobalTimetable(docSnap.data().grid || {});
                    } else {
                        setGlobalTimetable({});
                    }
                });

                return () => {
                    unsubEvents();
                    unsubTodos();
                    unsubNotes();
                    unsubTimetable();
                };
            }, [user, db]);

            // Thiết lập đồng hồ quét nhắc việc định kỳ (Alert Quét liên tục)
            useEffect(() => {
                if (!user) return;
                const checkRemindersAndDeadlines = () => {
                    const now = new Date();
                    const alertsFound = [];

                    globalEvents.forEach(evt => {
                        if (!evt.date) return;
                        const evtDate = new Date(evt.date.seconds * 1000);
                        if (evtDate.getDate() === now.getDate() && evtDate.getMonth() === now.getMonth() && evtDate.getFullYear() === now.getFullYear()) {
                            const timeStr = evtDate.getHours() !== 0 || evtDate.getMinutes() !== 0 
                                ? evtDate.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) 
                                : 'Cả ngày';
                            alertsFound.push({ id: evt.id, type: 'Sự kiện', title: evt.title, time: timeStr, rawTime: evt.date });
                        }
                    });

                    globalTodos.forEach(td => {
                        if (td.completed) return;
                        if (td.deadlineTime) {
                            const dlDate = new Date(td.deadlineTime.seconds * 1000);
                            const diffMs = dlDate - now;
                            if (diffMs > 0 && diffMs <= 3600000 * 24) {
                                alertsFound.push({ id: td.id, type: 'Việc cần làm (Hạn chót)', title: td.text, time: dlDate.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) + ' ' + dlDate.toLocaleDateString('vi-VN'), rawTime: td.deadlineTime });
                            }
                        }
                        if (td.reminderTime) {
                            const rmDate = new Date(td.reminderTime.seconds * 1000);
                            const diffMs = rmDate - now;
                            if (Math.abs(diffMs) <= 60000) {
                                sendNotification("Nhắc việc: " + td.text, "Đến giờ hẹn cấu hình trên hệ thống!");
                                alertsFound.push({ id: td.id, type: 'Việc cần làm (Nhắc nhở)', title: td.text, time: rmDate.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }), rawTime: td.reminderTime });
                            }
                        }
                    });

                    setActiveAlerts(alertsFound);
                };

                checkRemindersAndDeadlines();
                const intervalId = setInterval(checkRemindersAndDeadlines, 60000);
                return () => clearInterval(intervalId);
            }, [user, globalEvents, globalTodos]);

            // Xử lý bộ lọc dữ liệu tìm kiếm toàn cục (Global Search Core Logic)
            const searchResults = useMemo(() => {
                if (!searchKeyword.trim()) return [];
                const kw = searchKeyword.toLowerCase().trim();
                const results = [];

                globalEvents.forEach(e => {
                    if (e.title && e.title.toLowerCase().includes(kw)) {
                        results.push({ ...e, searchType: 'Sự kiện', mainText: e.title, subText: 'Lịch vạn niên', targetTab: 'calendar' });
                    }
                });

                globalTodos.forEach(t => {
                    if (t.text && t.text.toLowerCase().includes(kw)) {
                        results.push({ ...t, searchType: 'Việc cần làm', mainText: t.text, subText: t.completed ? 'Đã hoàn thành' : 'Đang thực hiện', targetTab: 'todo' });
                    }
                });

                globalNotes.forEach(n => {
                    const titleMatch = n.title && n.title.toLowerCase().includes(kw);
                    const textMatch = n.text && n.text.toLowerCase().includes(kw);
                    if (titleMatch || textMatch) {
                        results.push({ ...n, searchType: 'Ghi chú', mainText: n.title || 'Không tiêu đề', subText: n.text, targetTab: 'notes' });
                    }
                });

                Object.keys(globalTimetable).forEach(cellKey => {
                    const text = globalTimetable[cellKey];
                    if (text && text.toLowerCase().includes(kw)) {
                        const [day, lesson] = cellKey.split('-');
                        results.push({ id: cellKey, searchType: 'Thời khóa biểu', mainText: text, subText: `${day} - Tiết ${lesson}`, targetTab: 'timetable' });
                    }
                });

                return results.sort((a, b) => {
                    const indexA = a.mainText.toLowerCase().indexOf(kw);
                    const indexB = b.mainText.toLowerCase().indexOf(kw);
                    return indexA - indexB;
                });
            }, [searchKeyword, globalEvents, globalTodos, globalNotes, globalTimetable]);

            const handleSearchResultClick = (item) => {
                setShowSearchModal(false);
                setSearchKeyword('');
                
                if (item.targetTab === 'todo' || item.targetTab === 'notes') {
                    if (lockConfig.enableLock && !unlockedTabs[item.targetTab]) {
                        setPendingTab({ tab: item.targetTab, elementId: `search-${item.targetTab}-${item.id}` });
                        setPinInput('');
                        setPinError('');
                        return;
                    }
                }
                
                setActiveTab(item.targetTab);
                setTimeout(() => {
                    const elId = `search-${item.targetTab}-${item.id}`;
                    const targetEl = document.getElementById(elId);
                    if (targetEl) {
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        targetEl.classList.add('ring-2', 'ring-blue-500', 'animate-pulse');
                        setTimeout(() => targetEl.classList.remove('ring-2', 'ring-blue-500', 'animate-pulse'), 4000);
                    }
                }, 300);
            };

            const handleAlertSave = async (alert) => {
                if (!editAlertTitle.trim()) return;
                const targetCollection = alert.type.startsWith('Sự kiện') ? 'events' : 'todos';
                const docRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, targetCollection, alert.id);
                const newTimestamp = editAlertTimeStr ? Timestamp.fromDate(new Date(editAlertTimeStr)) : null;

                try {
                    if (alert.type.startsWith('Sự kiện')) {
                        const updateData = { title: editAlertTitle };
                        if (newTimestamp) updateData.date = newTimestamp;
                        await updateDoc(docRef, updateData);
                    } else {
                        const updateData = { text: editAlertTitle };
                        if (newTimestamp) updateData.deadlineTime = newTimestamp;
                        await updateDoc(docRef, updateData);
                    }
                    setEditingAlertId(null);
                    toast.info("Đã cập nhật dữ liệu thành công.", { position: "top-center" });
                } catch (e) {
                    console.error("Lỗi cập nhật dữ liệu cảnh báo:", e);
                }
            };

            const handleSaveTheme = async (newTheme) => {
                setTheme(newTheme);
                setShowSettings(false);
                try {
                    localStorage.setItem('app_theme', JSON.stringify(newTheme));
                } catch (e) {
                    console.error("Lỗi lưu local theme:", e);
                }
                if (user) await setDoc(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'theme'), newTheme);
            };

            const handleTabChange = (tab) => {
                if (tab === 'todo' || tab === 'notes') {
                    if (lockConfig.enableLock && !unlockedTabs[tab]) {
                        setPendingTab({ tab, elementId: null });
                        setPinInput('');
                        setPinError('');
                        return;
                    }
                }

                if (tab === 'day') setDailyDate(new Date());
                else if (tab === 'calendar') {
                    setCurrentDate(new Date());
                    setSelectedDate(new Date());
                }
                setActiveTab(tab);
            };

            const verifyPinProtection = (e) => {
                e.preventDefault();
                if (pinInput === lockConfig.appPassword) {
                    setUnlockedTabs(prev => ({ ...prev, [pendingTab.tab]: true }));
                    const targetTab = pendingTab.tab;
                    const elId = pendingTab.elementId;
                    setPendingTab(null);
                    setActiveTab(targetTab);

                    if (elId) {
                        setTimeout(() => {
                            const targetEl = document.getElementById(elId);
                            if (targetEl) {
                                targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                targetEl.classList.add('ring-2', 'ring-blue-500', 'animate-pulse');
                                setTimeout(() => targetEl.classList.remove('ring-2', 'ring-blue-500', 'animate-pulse'), 4000);
                            }
                        }, 300);
                    }
                } else {
                    setPinError("Mã PIN bảo mật không chính xác. Hãy thử lại!");
                }
            };

            const handleLogout = () => {
                signOut(getAuth(app));
                setUnlockedTabs({ todo: false, notes: false });
            };

            // --- CẤU TRÚC GIAO DIỆN LỊCH THÁNG ---
            const renderCalendarView = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1);
                const startDayOfWeek = (firstDay.getDay() + 6) % 7; 
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                const daysArray = [];
                for (let i = 0; i < startDayOfWeek; i++) daysArray.push(null);
                for (let i = 1; i <= daysInMonth; i++) daysArray.push(new Date(year, month, i));

                const getDayColor = (idx) => idx === 5 ? 'text-blue-600' : idx === 6 ? 'text-red-500' : 'text-slate-500';

                return (
                    <div className="p-4 flex flex-col flex-1 overflow-y-auto no-scrollbar">
                        <div className="flex justify-between items-center mb-4 bg-white p-3 rounded-xl shadow-sm border border-slate-150">
                            <button onClick={() => setCurrentDate(new Date(year, month - 1, 1))} className="p-1.5 hover:bg-gray-100 rounded-full"><ChevronLeft className="text-gray-600" /></button>
                            <h2 className="text-sm font-black uppercase text-slate-800 tracking-wider">Tháng {month + 1} / {year}</h2>
                            <button onClick={() => setCurrentDate(new Date(year, month + 1, 1))} className="p-1.5 hover:bg-gray-100 rounded-full"><ChevronRight className="text-gray-600" /></button>
                        </div>
                        <div className="grid grid-cols-7 gap-1 text-center mb-1 font-bold text-xs text-slate-400">
                            {['T2','T3','T4','T5','T6','T7','CN'].map((d, i) => <div key={d} className={getDayColor(i)}>{d}</div>)}
                        </div>
                        <div className="grid grid-cols-7 gap-1 flex-1 min-h-[240px]">
                            {daysArray.map((date, idx) => {
                                if(!date) return <div key={`empty-${idx}`} className="bg-gray-50/40 rounded-xl" />;
                                const isToday = new Date().toDateString() === date.toDateString();
                                const isSelected = selectedDate.toDateString() === date.toDateString();
                                const lunar = getLunarDate(date);

                                const hasEvent = globalEvents.some(evt => {
                                    if(!evt.date) return false;
                                    const eD = new Date(evt.date.seconds * 1000);
                                    if(evt.repeat === 'solar') return eD.getDate() === date.getDate() && eD.getMonth() === date.getMonth();
                                    if(evt.repeat === 'lunar') return eD.getDate() === lunar.day && eD.getMonth() === lunar.month; 
                                    if(evt.repeat === 'weekly') return eD.getDay() === date.getDay();
                                    if(evt.repeat === 'monthly') return eD.getDate() === date.getDate();
                                    return eD.toDateString() === date.toDateString();
                                });

                                return (
                                    <div key={date.toISOString()} onClick={() => { setSelectedDate(date); setDailyDate(date); }} className={`p-1.5 rounded-xl flex flex-col justify-between items-center cursor-pointer transition relative group select-none min-h-[48px] ${isSelected ? 'bg-blue-600 text-white shadow-md transform scale-105 z-10' : isToday ? 'bg-amber-100 text-amber-900 border border-amber-300 font-bold' : 'bg-white text-slate-800 border border-slate-100 hover:border-blue-300'}`}>
                                        <span className="text-xs font-black">{date.getDate()}</span>
                                        <span className={`text-[8px] font-bold ${isSelected ? 'text-blue-200' : 'text-slate-400'}`}>{lunar.day === 1 ? `${lunar.day}/${lunar.month}` : lunar.day}</span>
                                        {hasEvent && <div className={`w-1 h-1 rounded-full absolute bottom-1 ${isSelected ? 'bg-white' : 'bg-red-500 animate-pulse'}`} />}
                                    </div>
                                );
                            })}
                        </div>
                        <div className="mt-4 p-3 bg-blue-50/50 rounded-xl border border-blue-100 shadow-inner">
                            <div className="flex justify-between items-center mb-1">
                                <span className="text-xs font-black text-blue-800 uppercase">Sự kiện trong ngày</span>
                                <button onClick={() => setShowSettings('events')} className="text-blue-600 text-[10px] font-bold bg-white px-2 py-0.5 rounded-md border border-blue-200 shadow-sm">+ Thêm sự kiện</button>
                            </div>
                            <div className="space-y-1 max-h-24 overflow-y-auto no-scrollbar">
                                {globalEvents.filter(evt => {
                                    if(!evt.date) return false;
                                    const eD = new Date(evt.date.seconds * 1000);
                                    const lunar = getLunarDate(selectedDate);
                                    if(evt.repeat === 'solar') return eD.getDate() === selectedDate.getDate() && eD.getMonth() === selectedDate.getMonth();
                                    if(evt.repeat === 'lunar') return eD.getDate() === lunar.day && eD.getMonth() === lunar.month;
                                    if(evt.repeat === 'weekly') return eD.getDay() === selectedDate.getDay();
                                    if(evt.repeat === 'monthly') return eD.getDate() === selectedDate.getDate();
                                    return eD.toDateString() === selectedDate.toDateString();
                                }).map(e => (
                                    <div key={e.id} className="text-xs font-semibold text-slate-700 bg-white px-2 py-1 rounded-lg border flex items-center gap-1.5 truncate shadow-2xs"><div className="w-1.5 h-1.5 bg-red-500 rounded-full shrink-0"/>{e.title}</div>
                                ))}
                                {globalEvents.filter(evt => {
                                    if(!evt.date) return false;
                                    const eD = new Date(evt.date.seconds * 1000);
                                    const lunar = getLunarDate(selectedDate);
                                    if(evt.repeat === 'solar') return eD.getDate() === selectedDate.getDate() && eD.getMonth() === selectedDate.getMonth();
                                    if(evt.repeat === 'lunar') return eD.getDate() === lunar.day && eD.getMonth() === lunar.month;
                                    if(evt.repeat === 'weekly') return eD.getDay() === selectedDate.getDay();
                                    if(evt.repeat === 'monthly') return eD.getDate() === selectedDate.getDate();
                                    return eD.toDateString() === selectedDate.toDateString();
                                }).length === 0 && <p className="text-[10px] text-gray-400 italic py-1 text-center">Không có sự kiện đặc biệt hôm nay.</p>}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- CHI TIẾT GIAO DIỆN LỊCH NGÀY ---
            const renderDailyView = () => {
                const lDate = getLunarDate(dailyDate);
                const isToday = new Date().toDateString() === dailyDate.toDateString();
                return (
                    <div className="p-4 flex flex-col flex-1 overflow-y-auto no-scrollbar text-center space-y-4">
                        <div className="flex justify-between items-center bg-white p-3 rounded-xl border shadow-xs shrink-0">
                            <button onClick={() => setDailyDate(new Date(dailyDate.getFullYear(), dailyDate.getMonth(), dailyDate.getDate() - 1))} className="p-1.5 hover:bg-gray-100 rounded-full"><ChevronLeft size={18}/></button>
                            <span className="text-xs font-bold text-slate-700 uppercase">{getDayOfWeek(dailyDate)} - {dailyDate.getDate()}/{dailyDate.getMonth()+1}/{dailyDate.getFullYear()}</span>
                            <button onClick={() => setDailyDate(new Date(dailyDate.getFullYear(), dailyDate.getMonth(), dailyDate.getDate() + 1))} className="p-1.5 hover:bg-gray-100 rounded-full"><ChevronRight size={18}/></button>
                        </div>
                        <div className="bg-white rounded-2xl p-6 border shadow-sm relative overflow-hidden flex-1 flex flex-col justify-center max-h-[260px]">
                            <div className="absolute top-2 left-2 bg-blue-50 text-blue-600 px-2.5 py-0.5 rounded-full text-[9px] font-black uppercase">Dương lịch</div>
                            <span className="text-7xl font-black text-blue-600 my-2 tracking-tighter block">{dailyDate.getDate()}</span>
                            <span className="text-xs font-bold text-slate-500 uppercase">Tháng {dailyDate.getMonth() + 1} năm {dailyDate.getFullYear()}</span>
                        </div>
