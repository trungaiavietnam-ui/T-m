        /* 3D Animations */
        .perspective-container { perspective: 1000px; }
        
        @keyframes rotateInRight {
            from { transform: translateX(100%) rotateY(-90deg); opacity: 0; }
            to { transform: translateX(0) rotateY(0); opacity: 1; }
        }
        @keyframes rotateInLeft {
            from { transform: translateX(-100%) rotateY(90deg); opacity: 0; }

        .anim-next { animation: rotateInRight 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

        // Hàm tạo salt ngẫu nhiên 16 byte (base64)
        function generateSalt() {
            const salt = crypto.getRandomValues(new Uint8Array(16));
            return btoa(String.fromCharCode(...salt));
        }

        // Hàm băm mật khẩu với PBKDF2 + salt (100k iterations)
        async function pbkdf2Hash(password, salt) {
            const encoder = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw',
                encoder.encode(password),
                'PBKDF2',
                false,
                ['deriveBits']
            );
            const hashBuffer = await crypto.subtle.deriveBits(
                {
                    name: 'PBKDF2',
                    salt: encoder.encode(salt),
                    iterations: 100000,
                    hash: 'SHA-256'
                },
                keyMaterial,
                256 // 256 bits = 32 bytes
            );
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return btoa(String.fromCharCode(...hashArray));
        }

        // Lưu hash với salt: dạng "salt:hash"
        async function createPasswordHash(password) {
            const salt = generateSalt();
            const hash = await pbkdf2Hash(password, salt);
            return `${salt}:${hash}`;
        }

        // Kiểm tra mật khẩu với chuỗi lưu trữ
        async function verifyPasswordWithSalt(input, stored) {
            if (!stored) return false;
            const parts = stored.split(':');
            if (parts.length !== 2) return false;
            const [salt, hash] = parts;
            const newHash = await pbkdf2Hash(input, salt);
            return newHash === hash;
        }

        // ---- Các hàm mã hóa AES-GCM (giữ nguyên) ----
        // Hàm dẫn xuất khóa từ mật khẩu bằng PBKDF2 (dùng để mã hóa nội dung Vault)
        async function deriveKey(password, salt, iterations = 100000, length = 256) {
            const encoder = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw',
                encoder.encode(password),
                'PBKDF2',
                false,
                ['deriveKey']
            );
            return crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: encoder.encode(salt),
                    iterations: iterations,
                    hash: 'SHA-256'
                },
                keyMaterial,
                {
                    name: 'AES-GCM',
                    length: length
                },
                false,
                ['encrypt', 'decrypt']
            );
        }

        // Mã hóa văn bản với AES-GCM, tạo salt ngẫu nhiên 16 byte, trả về base64 của (salt + iv + ciphertext)
        async function encryptText(plaintext, password) {
            if (!plaintext) return '';
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const key = await deriveKey(password, salt);
            const encoder = new TextEncoder();
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv: iv },
                key,
                encoder.encode(plaintext)
            );
            const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
            combined.set(salt, 0);
            combined.set(iv, salt.length);
            combined.set(new Uint8Array(encrypted), salt.length + iv.length);
            return btoa(String.fromCharCode(...combined));
        }

        // Giải mã văn bản từ base64 (salt + iv + ciphertext)
        async function decryptText(encryptedBase64, password) {
            if (!encryptedBase64) return '';
            const combined = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
            if (combined.length < 16 + 12) return '';
            const salt = combined.slice(0, 16);
            const iv = combined.slice(16, 16 + 12);
            const ciphertext = combined.slice(16 + 12);
            const key = await deriveKey(password, salt);
            try {
                const decrypted = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: iv },
                    key,
                    ciphertext
                );
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                console.warn('Giải mã thất bại: sai mật khẩu hoặc dữ liệu hỏng');
                return '';
            }
        }

            "Sống trang sức bằng nguồn an tịnh\nĐiều phục tâm, giới hạnh, kiên trì\nThương người, mến vật, từ bi\nSa-môn, phạm chí sánh vì trời cao.",
            "Trong trời đất hiếm người chính niệm,\nBiết giữ mình, hổ thẹn, lương tâm\nTránh lời chỉ trích, chửi thầm\nCũng như ngựa giỏi chẳng cần phạt roi.",
            "Như ngựa quý chẳng cần roi chạm\nSống nhiệt tâm, dũng cảm, chuyên cần\nVững tin, giới đức, thiền hành\nChọn tìm giáo pháp, thấm nhuần lý chân.",
            "Gìn chính niệm, cùng Minh Hạnh túc\nNêu quyết tâm tam độc loại trừ,\nKhổ đau kết thúc, thản thư\nNgười này xứng bậc chân tu trên đời.",
            "Như thủy lợi làm kênh dẫn nước\nKẻ làm tên nắn vuốt cung tên\nThợ cây bào ván hai bên\nNgười khôn làm chủ bản thân đêm ngày.",
            "Cười sao được, sướng vui sao nổi\nKhi lửa tham cháy rụi thế gian\nTối tăm giăng phủ trời đêm\nSao không nỗ lực tìm đèn sáng soi?",
            "Thân bề ngoài, đẹp đầy nhựa sống\nỞ bên trong, một đống vết thương\nGây sầu, sao lại vấn vương?\nThân là giả tạm, vô thường, mong manh.",
            "Thân mấy chốc đã già, tàn tạ\nNơi chứa đầy bệnh khổ, hôi tanh\nVô thường tổ hợp mong manh\nChết là kết thúc, tái sanh hồng trần.",
            "Thân thể này màu bồ câu trắng\nNhư trái bầu, thu đến vứt đi.\nChết rồi thi thể gớm ghê\nCó gì vui thích, mải mê thân này?",
            "Ôi, thân thể như thành trì cổ\nDựng bằng xương, máu đỏ, thịt, gân\nChứa già, chết, bệnh từng phần\nCống cao, lừa dối; dáng duyên nỗi gì!",
            "Xe vua đẹp có ngày cũng cũ\nThân thể rồi u rũ, tàn phai\nPháp lành trẻ mãi, còn hoài\nHãy nên khắc cốt những lời thánh nhân.",
            "Trẻ ít học, già không hiểu biết\nChẳng khác gì bò đực lớn đầu\nThân to, cơ bắp, khỏe, mau\nNhưng không trí tuệ, khác nào bóng đêm?",
            "Lang thang suốt luân hồi bao kiếp\nQuyết đi tìm “ông xếp” xây nhà\nTìm hoài, tìm mãi, không ra\nTái sanh, khổ lụy, đọa sa ba đường.",
            "Nay ta cấm ngươi không xây nữa\nPhá cột kèo, ván cửa, rui mè…\nNay ta đã chứng niết-bàn\nÁi tham, chấp thủ tiêu tan hết rồi.",
            "Lúc còn trẻ chẳng màng đạo đức\nKhông học nghề, tự lập lo thân\nĐến già gặp phải khó khăn\nNhư cò ủ rũ, không còn cá tôm.",
            "Có người trẻ chẳng rèn đức hạnh\nKhông luyện nghề, không lãnh tiền lương\nKhi già, buồn tủi, sầu vương\nNhớ về dĩ vãng, thở than vắn dài.",
            "Người đánh giá bản thân là quý\nPhải chính tâm bảo vệ lấy mình\nNgày đêm người trí giữ gìn\nLuôn trong tỉnh thức, tịnh minh cõi lòng.",
            "Người trí tuệ bản thân vững chải\nTự chủ mình, hoàn thiện, chánh chân\nXong rồi, giáo hóa tha nhân\nSống trong gương mẫu, thế gian nể vì.",
            "Người gương mẫu thực hành hoàn tất\nMới đem ra giáo dục thế nhân\nTự mình làm chủ thân tâm\nSoi gương nhân cách, hạnh lành truyền trao.",
            "Người sáng suốt tự nương mình vững\nKhông tìm cầu, dựa dẫm vào ai\nLành thay, điều phục tâm này\nBiết tự điều phục, không hai trên đời.",
            "Các điều ác do mình tự tạo\nÁc do tâm, ai khác ngoài ta\nÁc nhân nghiền nát người tà\nNhư kim cương cứng nghiền qua đá thường.",
            "Như tầm gửi bám cây Phật pháp\nNgười buông lung giới đức chẳng gìn\nHạnh tà chuốc họa vào thân,\nKẻ thù sung sướng thấy mình tiêu tan.",
            "Làm điều ác không cần trình độ\nHãm hại ta đạo khổ dễ hơn\nKhó thay, làm thiện chánh chơn\nMình người lợi lạc, bình an cõi đời.",
            "Kẻ ác kiến ngu si, phỉ báng\nGiáo pháp hàng La-hán nhiệm mầu\nHại mình như ngọn trúc lau\nNgay khi trổ quả nhuốm màu diệt vong.",
            "Các điều ác do mình tự tạo\nRồi vướng vào khổ não, họa tai.\nĐiều lành ta tạo hôm nay\nQuả an vui đến sớm mai là thường.",
            "Nên hiểu rõ sạch trong, nhơ uế\nHành động do gốc rễ từ tâm\nCậy nhờ tha lực khó thành\nĐỗ lỗi “tại, bởi” sao đành, không nên.",
            "Dù phụng sự, vị tha thiết thực\nXin chớ quên thực tập lợi mình\nChuyên tâm học pháp cao minh\nHướng về giải thoát, đạt thành mới thôi.",
            "Người sáng suốt chớ ôm tà kiến\nSống buông lung, ti tiện qua ngày.\nNệp tà vạy, chớ kéo dài\nĐược vầy, sinh tử luân hồi sớm ra.",
            "Luôn tinh tấn không mê lạc thú\nHạnh thanh cao, tu sĩ thường ghi\nTrang nghiêm giới đức, hành trì\nHai đời hưởng phúc chỉ vì tu tâm.",
            "Hãy quán tưởng trong đời trần tục\nMọi thứ như bọt nước, huyễn vong.\nĐến khi ngộ lẽ vô thường\nTử thần không thể lần đường chân nhân.",
            "Cõi hồng trần đẹp tuồng ảo mộng\nNhư xe vua hoành tráng gấm thêu\nKẻ ngu tham đắm, chắt chiêu\nNgười khôn tỉnh thức, chẳng yêu nhiễm đời.",
            "Dù quá khứ buông lung, dục lạc\nNhưng về sau tỉnh thức, chuyển tâm\nLàm lành, tỏa sáng trần gian\nNhư trăng rằm chiếu, không còn mây che.",
            "Dù ngày trước gây bao tội lỗi\nNhưng hôm nay sám hối, hồi tâm\nLàm lành, tỏa sáng trần gian\nNhư trăng rằm chiếu, không còn mây che.",
            "Kẻ mù tối, thế gian đầy dẫy\nNgười sáng trong có mấy trên đời!\nNhư chim khôn chẳng vướng mồi\nNgười tu đạo đức an vui cõi trời.",
            "Như trời thẳm, thiên nga uốn lượn\nCó thần thông ẩn hiện không gian\nTrí nhân thoát chốn hồng trần\nVượt qua ma chướng, vững vàng đường tu.",
            "With những kẻ chẳng tôn trọng Pháp\nDùng vọng ngôn lừa lọc, rêu rao\nGhét thiện, bác bỏ đời sau...\nLún sâu đường ác, ngày nào vượt ra!",
            "Kẻ keo kiệt không sanh thiên giới\nNgười dại ngu chẳng đoái tình thương\nNgười hiền thích sống thiện lương\nĐời sau hưởng phúc khác thường thế nhân.",
            "Chứng sơ quả thánh nhân rạng rỡ\nHơn cõi trời Thiên chủ uy quyền\nHơn Trời trong chốn càn khôn\nKhó tìm trong cõi bụi hồng người hơn.",
            "Phật chiến thắng hoàn toàn cõi trược\nTham ái trừ, tuệ giác sâu ngần\nKhông lưu dấu vết trần gian\nĐố ai vẽ được bước chân vượt đời.",
            "Bậc giải thoát lưới tham, á dục\nHết tái sanh, tuệ giác sâu ngần\nKhông lưu dấu vết trần gian\nĐố ai vẽ được bước chân vượt đời.",
            "Người có trí thiền hành, tinh tấn\nTìm niềm vui trong hạnh viễn ly\nĐêm ngày tỉnh thức luôn khi\nTrời người kính trọng, sánh vì trăng sao.",
            "Thật hạnh phúc, làm người nhân đức\nQuả khó thay, sống thật tịnh thanh\nKhó thay, nghe pháp, thực hành\nKhó thay, gặp Phật chứng thành quả cao.",
            "Mọi hoàn cảnh không làm bất thiện\nDù khó khăn, phát triển nhân lành\nLuyện tâm, rèn ý tịnh thanh\nLà lời Phật dạy đành rành xưa nay.",
            "Tu nhẫn nhục: Khổ hành đáng quý\nĐạt niết-bàn: Quả vị tối cao\nChúng sinh: Chẳng hại tơ hào\nHạnh sa-môn ấy cao sâu khó bàn.",
            "Không phỉ báng, không làm thương tổn\nLàm chủ mình, giới bổn vẹn toàn\nĐoạn điệu ăn uống, định thiền\nSống đời an tịnh, không phiền một ai.",
            "Dù mưa rãi bạc vàng chưa thỏa\nLòng dục tham không đáy xưa nay\nTrí nhân hiệu rõ điều này\nKhổ nhiều, vui ít, không sai bao giờ.",
            "Ngộ lẽ ấy, người tu học Phật\nChẳng đam mê dục lạc người, trời\nQuyết lòng chuyển hóa, thảnh thơi\nKhông còn tham ái, rạng ngời nhân gian.",
            "Trong nguy khổ, người tìm nương tựa\nHoặc thần linh, rừng rú, non cao,\nMiếu, đình, cây, vật, hang sâu,\nVái van, hiến tế, mong sao an lành.",
            "Nương tựa ấy hoàn toàn vô bổ\nTìm loanh quanh, nhiều chỗ bất an\nKhổ đau còn đó, chưa tan\nChỉ do mê tín, chẳng thành tựu chi.",
            "Người có phước, tìm về Tam bảo\nPhật, Pháp, Tăng quý báu khó hơn\nKhó khăn, bất hạnh tựa nương\nDùng Bốn chân lý làm phương thoát nàn.",
            "Thấy đau khổ, nguyên nhân gây khổ\nThấy Niết-bàn, thánh lộ tám ngành\nĐưa người đến chốn bình an\nKhông còn bất hạnh, trần gian muộn phiền.",
            "Nương tựa ấy tạo nên quả phước\nNguồn tâm linh, thể đạt an vui\nNgười khôn nương tựa đời đời\nVẫy chào đau khổ, thảnh thơi cuộc đời.",
            "Bậc trí tuệ vun bồi giới đức\nTìm khắp nơi hiếm được một người\nChỗ nào có bậc trí tài\nXóm làng hạnh phúc, cuộc đời bình An.",
            "Ôi hạnh phúc, Như Lai thị hiện\nPháp cao siêu lăn chuyển khắp nơi\nTăng đoàn hòa hợp đạo đời\nBốn hàng đệ tử cùng vui tu hành.",
            "Biết lễ kính những người đáng kính\nPhật, thánh hiền đức hạnh thanh cao\nNhững người chướng ngại sạch làu\nNhỏ phiền dứt sạch, khổ đau giã từ.",
            "Nhờ cung kính chân tu quảng đại\nBậc tịnh an, tự tại thấy nghe,\nKhông còn sợ hãi, sầu, mê,\nPhước lành mỹ mãn đề huề bên ta.",
            "Phúc thay sống giữa người thù hận\nLòng thảnh thơi, chẳng giận hờn ai\nLành thay, sống giữa chua cay\nKhông hề oán hận, nguôi ngoai cõi lòng.",
            "Phúc thay sống giữa người đau bệnh\nChẳng hề chi, khỏe mạnh tấm thân,\nLành thay, sống giữa nguy nan\nBình an, vô sự, an toàn trước sau.",
            "Phúc thay sống giữa người khát dục\nLòng dửng dưng, gạn đục khơi trong.\nLành thay, sống giữa vô thường\nLòng không ham muốn, không vương khổ sầu.",
            "Phúc thay sống giữa người chấp hữu\nGìn vô tham, vô ngã, không sầu.\nCõi lòng an lạc vô cầu\nVui như thiên giới đứng đầu Quan Âm.",
            "Người chiến thắng thường gây thù oán\nKẻ bại thua uất hận khổ đau.\nVui thay, hòa hợp trước sau,\nBỏ qua thắng bại, dâng trào niềm vui.",
            "Trong các lửa, dục tham số một\nCòn tâm sân vượt trội quân ma,\nKhổ nào sánh kịp chấp “ta”\nNiết-bàn tối thượng thật là lạc an.",
            "Cơn đói khát chính là bệnh dữ\nChấp cái ta, bệnh khổ nhiều hơn.\nVượt qua bỉ thử, ngã nhơn\nNiết-bàn chứng đắc, cát tường an vui.",
            "Có sức khỏe còn hơn tặng phẩm\nBiết đủ là tài sản tối cao\nChân tình là bạn tâm giao\nNiết-bàn số một, phúc nào sánh hơn!",
            "Người nếm vị thanh cao ẩn dật\nVui niết-bàn, an lạc khó hơn.\nNhiễm ô, sợ hãi đâu còn\nThấm nhuần pháp hỷ, tâm không vướng gì.",
            "Thật may mắn, thánh nhân gặp mặt\nĐược gần bên hạnh phúc nào hơn!\nPhúc thay, chẳng gặp ngu nhân\nCàng xa khỏi họ, càng an lành nhiều.",
            "Cùng chung sống với người ngu tối\nKhổ khác gì sống với kẻ thù.\nSống chung người trí vô ưu\nNhư cùng thân quyến chẳng lo sợ gì.",
            "With những bậc tinh thông, sáng suốt\nNgười giữ gìn, giới đức, thánh nhân\nQuyết lòng gần gũi, kết thân\nNhư trăng soi sáng con đường đang đi.",
            "Cố đeo đuổi điều nên xa lánh\nViệc đáng theo lại tránh không làm.\nBỏ mục tiêu, vướng ái tham\nNỡ nào ganh ghét người ham tu hành?!",
            "Chớ gần gũi người thương quá đỗi\nĐừng gần người bực bội, ghét mình\nThương không gặp, khổ muôn phần\nTiếp duyên kẻ ghét ngút ngàn khổ đau.",
            "Hiểu được thế, chớ yêu chớ nhớ\nYêu xa nhau, đau khổ biệt ly\nVẫy chào yêu ghét, sầu bi\nCắt dây trói buộc, còn gì sướng hơn!",
            "Gốc tham ái sanh ra đau khổ\nTạo sầu bi, lo sợ ngã nhân\nAI trừ tham ái khỏi tâm\nXa lìa sợ hãi, không còn sầu bi.",
            "Gốc luyến ái sanh ra đau khổ\nTạo sầu bi, lo sợ ngã nhân\nAI trừ luyến ái khỏi tâm\nXa lìa sợ hãi, không còn sầu bi.",
            "Gốc hỷ ái sanh ra đau khổ\nTạo sầu bi, lo sợ ngã nhân\nAI trừ hỷ ái khỏi tâm\nXa lìa sợ hãi, không còn sầu bi.",
            "Gốc dục ái sanh ra đau khổ\nTạo sầu bi, lo sợ ngã nhân\nAI trừ dục ái khỏi tâm\nXa lìa sợ hãi, không còn sầu bi.",
            "Gốc khát ái sanh ra đau khổ\nTạo sầu bi, lo sợ ngã nhân\nAI trừ khát ái khỏi tâm\nXa lìa sợ hãi, không còn sầu bi.",
            "Người giới đức, tuệ tri đầy đủ\nNương pháp lành, chứng ngộ lý chân\nLàm xong những việc phải làm\nMọi người kính nể mười phân vẹn mười.",
            "Niết-bàn chứng ly ngôn tông chỉ\nQuả tam hiền, tuệ trí viên thông\nLìa dục lạc, tịnh cõi lòng\nBậc chân nhân đó ngược dòng thế gian.",
            "Như lữ khách biệt tăm, xa vắng\nNay trở về lành lặn, bình an\nBạn bè, thân quyến hân hoan\nChúc mừng sum họp, xóm làng chia vui.",
            "Cũng như thế, với người làm thiện\nBao đời qua cho đến đời nay,\nQuả lành chào đón hai tay\nChúc mừng hạnh phúc, khó ai được bằng!",
            "Tu chuyển hóa không còn giận tức\nĐã lìa xa danh sắc, mạn, tham\nKhông còn kiết sử buộc ràng\nNgười “vô sản” ấy xua tan khổ sầu.",
            "Dừng phẫn nộ khi tâm tức giận\nNhư đạp phanh, xe thắng lại ngay.\nXứng danh người lái xe tài.\nCòn những người khác là nài cầm cương.",
            "Dùng “không hận” vượt qua cơn giận\nBố thí nhiều chiến thắng san tham\nNhân từ chinh phục ác gian\nDùng tâm chân thật thắng ngàn ngụy trang.",

        // --- HÀM HỖ TRỢ ---
        const formatDateTimeForInput = (date) => {
            if (!date) return '';
            const d = new Date(date);
            const pad = (n) => n.toString().padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        };

        const formatDisplayDate = (seconds) => {
            if (!seconds) return '';
            return new Date(seconds * 1000).toLocaleString('vi-VN', { hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
        };

        const getRemainingTime = (timestamp) => {
            if (!timestamp) return null;
            const now = new Date();
            const deadline = new Date(timestamp.seconds * 1000);
            const diff = deadline - now;
            if (diff < 0) {
                const overdueDays = Math.floor(Math.abs(diff) / (1000 * 60 * 60 * 24));
                const overdueHours = Math.floor((Math.abs(diff) % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let text = "Quá hạn ";
                if (overdueDays > 0) text += `${overdueDays} ngày`;
                else text += `${overdueHours} giờ`;
                return { text: text, isOverdue: true };
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            if (days > 0) return { text: `Còn ${days} ngày, ${hours} giờ`, isOverdue: false };
            if (hours > 0) return { text: `Còn ${hours} giờ, ${minutes} phút`, isOverdue: false };
            return { text: 'Sắp đến hạn', isOverdue: false };
        };

        // ==================================================================================
        // THUẬT TOÁN CHUYỂN ĐỔI DƯƠNG LỊCH SANG ÂM LỊCH VIỆT NAM (dựa trên múi giờ UTC+7)
        // Nguyên lý: xác định các điểm Sóc (New Moon - thời điểm trăng non) và kinh độ Mặt Trời
        // theo tọa độ thiên văn, quy đổi mọi mốc thời gian về múi giờ Việt Nam (UTC+7) để
        // tính đúng ngày bắt đầu tháng Âm lịch và năm nhuận theo quy ước lịch Việt Nam.
        // ==================================================================================
        const VN_TIMEZONE = 7; // Việt Nam sử dụng múi giờ UTC+7 làm chuẩn tính lịch Âm

        // Quy đổi ngày Dương lịch (dd/mm/yyyy) sang số ngày Julius (Julian Day Number)
        const jdFromDate = (dd, mm, yy) => {
            const a = Math.floor((14 - mm) / 12);
            const y = yy + 4800 - a;
            const m = mm + 12 * a - 3;
            let jd = dd + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4)
                - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
            if (jd < 2299161) {
                jd = dd + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4) - 32083;
            }
            return jd;
        };

        // Tính kinh độ Mặt Trời (đơn vị: cung 30 độ, 0-11) tại thời điểm jdn, quy theo múi giờ
        const getSunLongitude = (jdn, timeZone) => {
            const T = (jdn - 2451545.5 - timeZone / 24) / 36525;
            const T2 = T * T;
            const dr = Math.PI / 180;
            const M = 357.52910 + 35999.05030 * T - 0.0001559 * T2 - 0.00000048 * T * T2;
            const L0 = 280.46645 + 36000.76983 * T + 0.0003032 * T2;
            let DL = (1.914600 - 0.004817 * T - 0.000014 * T2) * Math.sin(dr * M);
            DL += (0.019993 - 0.000101 * T) * Math.sin(dr * 2 * M) + 0.000290 * Math.sin(dr * 3 * M);
            let L = (L0 + DL) * dr;
            L -= Math.PI * 2 * Math.floor(L / (Math.PI * 2));
            return Math.floor((L / Math.PI) * 6);
        };

        // Tính thời điểm Sóc (New Moon) lần thứ k kể từ mốc gốc, trả về số ngày Julius quy theo múi giờ
        const getNewMoonDay = (k, timeZone) => {
            const T = k / 1236.85;
            const T2 = T * T;
            const T3 = T2 * T;
            const dr = Math.PI / 180;
            let jd1 = 2415020.75933 + 29.53058868 * k + 0.0001178 * T2 - 0.000000155 * T3;
            jd1 += 0.00033 * Math.sin((166.56 + 132.87 * T - 0.009173 * T2) * dr);
            const M = 359.2242 + 29.10535608 * k - 0.0000333 * T2 - 0.00000347 * T3;
            const Mpr = 306.0253 + 385.81691806 * k + 0.0107306 * T2 + 0.00001236 * T3;
            const F = 21.2964 + 390.67050646 * k - 0.0016528 * T2 - 0.00000239 * T3;
            let C1 = (0.1734 - 0.000393 * T) * Math.sin(M * dr) + 0.0021 * Math.sin(2 * dr * M);
            C1 -= 0.4068 * Math.sin(Mpr * dr) + 0.0161 * Math.sin(dr * 2 * Mpr);
            C1 -= 0.0004 * Math.sin(dr * 3 * Mpr);
            C1 += 0.0104 * Math.sin(dr * 2 * F) - 0.0051 * Math.sin(dr * (M + Mpr));
            C1 -= 0.0074 * Math.sin(dr * (M - Mpr)) + 0.0004 * Math.sin(dr * (2 * F + M));
            C1 -= 0.0004 * Math.sin(dr * (2 * F - M)) - 0.0006 * Math.sin(dr * (2 * F + Mpr));
            C1 += 0.0010 * Math.sin(dr * (2 * F - Mpr)) + 0.0005 * Math.sin(dr * (2 * Mpr + M));
            let deltaT;
            if (T < -11) {
                deltaT = 0.001 + 0.000839 * T + 0.0002261 * T2 - 0.00000845 * T3 - 0.000000081 * T * T3;
            } else {
                deltaT = -0.000278 + 0.000265 * T + 0.000262 * T2;
            }
            const jdNew = jd1 + C1 - deltaT;
            return Math.floor(jdNew + 0.5 + timeZone / 24);
        };

        // Tìm ngày (Julius) mà tháng 11 Âm lịch của năm yy bắt đầu (dùng làm mốc quy chiếu năm Âm lịch)
        const getLunarMonth11 = (yy, timeZone) => {
            const off = jdFromDate(31, 12, yy) - 2415021;
            const k = Math.floor(off / 29.530588853);
            let nm = getNewMoonDay(k, timeZone);
            if (getSunLongitude(nm, timeZone) >= 9) {
                nm = getNewMoonDay(k - 1, timeZone);
            }
            return nm;
        };

        // Xác định tháng nhuận (nếu năm Âm lịch có 13 tháng) rơi vào vị trí thứ mấy
        const getLeapMonthOffset = (a11, timeZone) => {
            const k = Math.floor((a11 - 2415021.076998695) / 29.530588853 + 0.5);
            let last = getSunLongitude(getNewMoonDay(k + 1, timeZone), timeZone);
            let i = 1;
            let arc = last;
            do {
                i++;
                last = arc;
                arc = getSunLongitude(getNewMoonDay(k + i, timeZone), timeZone);
            } while (arc !== last && i < 14);
            return i - 1;
        };

        // HÀM CHÍNH: chuyển một ngày Dương lịch (dd/mm/yyyy) sang ngày Âm lịch Việt Nam
        // Trả về { day, month, year, leap } — leap = true nếu rơi vào tháng nhuận
        const convertSolar2Lunar = (dd, mm, yy, timeZone = VN_TIMEZONE) => {
            const dayNumber = jdFromDate(dd, mm, yy);
            const k = Math.floor((dayNumber - 2415021.076998695) / 29.530588853);
            let monthStart = getNewMoonDay(k + 1, timeZone);
            if (monthStart > dayNumber) monthStart = getNewMoonDay(k, timeZone);

            let a11 = getLunarMonth11(yy, timeZone);
            let b11 = a11;
            let lunarYear;
            if (a11 >= monthStart) {
                lunarYear = yy;
                a11 = getLunarMonth11(yy - 1, timeZone);
            } else {
                lunarYear = yy + 1;
                b11 = getLunarMonth11(yy + 1, timeZone);
            }

            const lunarDay = dayNumber - monthStart + 1;
            const diff = Math.floor((monthStart - a11) / 29);
            let lunarLeap = false;
            let lunarMonth = diff + 11;

            if (b11 - a11 > 365) {
                const leapMonthOff = getLeapMonthOffset(a11, timeZone);
                if (diff >= leapMonthOff) {
                    lunarMonth = diff + 10;
                    if (diff === leapMonthOff) lunarLeap = true;
                }
            }
            if (lunarMonth > 12) lunarMonth -= 12;
            if (lunarMonth >= 11 && diff < 4) lunarYear -= 1;

            return { day: lunarDay, month: lunarMonth, year: lunarYear, leap: lunarLeap };
        };

        // Quy đổi một đối tượng Date bất kỳ (theo giờ máy người dùng) về đúng ngày/tháng/năm
        // theo múi giờ UTC+7 của Việt Nam, để đảm bảo tính Âm lịch luôn chính xác dù người dùng ở múi giờ khác
        // Nguyên lý: date.getTime() luôn là mốc thời gian UTC tuyệt đối (bất kể múi giờ máy đang đặt là gì),
        // nên chỉ cần cộng thêm đúng 7 giờ rồi đọc lại bằng các hàm getUTC... để có ngày/giờ theo giờ Việt Nam.
        const toVNDateParts = (date) => {
            const vnMs = date.getTime() + VN_TIMEZONE * 3600000;
            const vnDate = new Date(vnMs);
            return { dd: vnDate.getUTCDate(), mm: vnDate.getUTCMonth() + 1, yy: vnDate.getUTCFullYear() };
        };
        // ==================== KẾT THÚC THUẬT TOÁN CHUYỂN ĐỔI ÂM LỊCH VIỆT NAM ====================

        const getLunarDate = (date) => {
            try {
                const { dd, mm, yy } = toVNDateParts(date);
                const lunar = convertSolar2Lunar(dd, mm, yy, VN_TIMEZONE);
                return `${lunar.day}/${lunar.month}${lunar.leap ? ' (nhuận)' : ''}`;
            } catch (e) { return ''; }
        };

        const getLunarDetails = (date) => {
            try {
                const { dd, mm, yy } = toVNDateParts(date);
                return convertSolar2Lunar(dd, mm, yy, VN_TIMEZONE);
            } catch (e) { return { day: 0, month: 0, year: 0, leap: false }; }
        };

        const getDayOfWeek = (date) => {
            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            return days[date.getDay()];
        };

            '10-3':  { name: 'Giỗ Tổ Hùng Vương', greeting: 'Tưởng nhớ công ơn các Vua Hùng đã có công dựng nước!' },
            '5-5':   { name: 'Tết Đoan Ngọ',       greeting: 'Chúc bạn Tết Đoan Ngọ nhiều sức khỏe và bình an!' },
            '15-7':  { name: 'Lễ Vu Lan',          greeting: 'Mùa Vu Lan báo hiếu, chúc bạn luôn nhớ ơn sinh thành!' },
            '15-8':  { name: 'Tết Trung Thu',      greeting: 'Chúc bạn Trung Thu đoàn viên, ấm áp và hạnh phúc!' },
            '23-12': { name: 'Tết Táo Quân',       greeting: 'Chúc bạn ngày Tết Táo Quân ấm cúng và sum vầy!' },
        };

        // Trả về thông tin ngày lễ (nếu có) cho một ngày cụ thể, ưu tiên kiểm tra cả Dương lịch, Âm lịch và Giao thừa
        const getHolidayInfo = (date) => {
            const dd = date.getDate();
            const mm = date.getMonth() + 1;
            const solarKey = `${dd}-${mm}`;
            if (SOLAR_HOLIDAYS[solarKey]) return SOLAR_HOLIDAYS[solarKey];

            const lunar = getLunarDetails(date);
            const lunarKey = `${lunar.day}-${lunar.month}`;
            if (LUNAR_HOLIDAYS[lunarKey]) return LUNAR_HOLIDAYS[lunarKey];

            // Kiểm tra Giao thừa: nếu ngày mai (âm lịch) là mùng 1 tháng 1 thì hôm nay là 29/30 Tết
            try {
                const tomorrow = new Date(date);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const lunarTomorrow = getLunarDetails(tomorrow);
                if (lunarTomorrow.day === 1 && lunarTomorrow.month === 1 && lunar.month === 12) {
                    return { name: 'Giao Thừa', greeting: 'Chúc bạn phút giao thừa an lành, đón năm mới nhiều may mắn!' };
                }
            } catch (e) { /* bỏ qua nếu có lỗi tính toán */ }

            return null;
        };
        // END: Danh sách ngày lễ, ngày Tết (Dương lịch & Âm lịch) kèm lời chúc

        const sendNotification = (title, body) => {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body, icon: '/favicon.ico' });
            }
        };

        // ── HỆ THỐNG NHẮC NHỞ CỤC BỘ ─────────────────────────────────────────
        // Trước đây ứng dụng dùng "Notification Triggers API" (showTrigger/TimestampTrigger)
        // để hẹn giờ báo. API này CHƯA từng được trình duyệt nào (kể cả Chrome trên Android)
        // hỗ trợ chính thức, nên mọi nhắc nhở đặt ra trước đây đều âm thầm không bao giờ hiện
        // ra (chỉ ghi console.warn). Thay vào đó, ta lưu danh sách nhắc nhở vào localStorage,
        // rồi có 1 bộ đếm chạy định kỳ (khi app đang mở) để kiểm tra và bắn thông báo đúng lúc.
        const REMINDERS_STORAGE_KEY = 'vt_scheduled_reminders';

        const getStoredReminders = () => {
            try { return JSON.parse(localStorage.getItem(REMINDERS_STORAGE_KEY) || '[]'); }
            catch (e) { return []; }
        };

        const saveStoredReminders = (list) => {
            try { localStorage.setItem(REMINDERS_STORAGE_KEY, JSON.stringify(list)); } catch (e) {}
        };

        // Thêm 1 nhắc nhở vào hàng đợi cục bộ. repeatType: 'none' | 'daily' | 'custom'
        const queueReminder = ({ title, body, triggerTime, tag, repeatType = 'none', repeatDays = 1 }) => {
            if (!triggerTime || isNaN(triggerTime.getTime())) return;
            const list = getStoredReminders();
            list.push({
                id: tag || `rm_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                title, body,
                triggerTime: triggerTime.getTime(),
                repeatType, repeatDays
            });
            saveStoredReminders(list);
        };

        const playReminderSound = () => {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 800;
                gainNode.gain.value = 0.2;
                oscillator.start();
                setTimeout(() => oscillator.stop(), 200);
            } catch (e) { /* trình duyệt không hỗ trợ AudioContext */ }
        };

        // Kiểm tra và bắn các nhắc nhở đã tới giờ. Gọi định kỳ + mỗi khi mở lại app.
        const checkDueReminders = async () => {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            const list = getStoredReminders();
            if (list.length === 0) return;
            const now = Date.now();
            const remaining = [];
            let firedAny = false;
            for (const r of list) {
                if (r.triggerTime <= now) {
                    firedAny = true;
                    try {
                        if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                            const registration = await navigator.serviceWorker.ready;
                            await registration.showNotification(r.title, {
                                body: r.body || '',
                                tag: r.id,
                                requireInteraction: true,
                                icon: '/favicon.ico',
                                badge: '/favicon.ico'
                            });
                        } else {
                            new Notification(r.title, { body: r.body || '', icon: '/favicon.ico' });
                        }
                    } catch (e) { console.warn('Không thể hiển thị nhắc nhở:', e); }
                    if (r.repeatType === 'daily' || r.repeatType === 'custom') {
                        const days = r.repeatType === 'daily' ? 1 : (parseInt(r.repeatDays, 10) || 1);
                        let next = r.triggerTime;
                        while (next <= now) { next += days * 86400000; }
                        remaining.push({ ...r, triggerTime: next });
                    }
                } else {
                    remaining.push(r);
                }
            }
            if (firedAny) {
                saveStoredReminders(remaining);
                playReminderSound();
            } else if (remaining.length !== list.length) {
                saveStoredReminders(remaining);
            }
        };

        // Alias để tránh xung đột tên với biến state query nội bộ trong GlobalSearchModal
        const query_q = (ref) => query(ref);

        // --- HÀM PARSE NGÀY TỪ CHUỖI TÌM KIẾM ---
        // Hỗ trợ: d/m/yy, d/m/yyyy, dd/mm/yy, dd/mm/yyyy
        const parseSearchDate = (str) => {
            const s = str.trim();
            const match = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
            if (!match) return null;
            let [, d, m, y] = match;
            d = parseInt(d, 10);
            m = parseInt(m, 10);
            y = parseInt(y, 10);
            if (y < 100) y += 2000; // yy → yyyy
            if (m < 1 || m > 12 || d < 1 || d > 31) return null;
            const date = new Date(y, m - 1, d);
            // Kiểm tra ngày hợp lệ (vd: 31/2 sẽ bị reject)
            if (date.getFullYear() !== y || date.getMonth() !== m - 1 || date.getDate() !== d) return null;
            return date;
        };

        // --- CHUẨN HÓA TIẾNG VIỆT: bỏ dấu để tìm "khong dau" vẫn ra kết quả "không dấu" ---
        const normalizeVN = (str) => {
            if (!str) return '';
            return str.toString()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // bỏ dấu thanh/dấu mũ/móc
                .replace(/đ/g, 'd').replace(/Đ/g, 'D')             // đ/Đ không tách được bằng NFD nên xử lý riêng
                .toLowerCase().trim();
        };

        // --- TÌM KIẾM NGỮ NGHĨA (nhẹ): nhận diện khoảng thời gian tương đối trong câu tìm kiếm ---
        // Hỗ trợ: hôm nay, hôm qua, ngày mai, tuần này/trước/sau, tháng này/trước/sau, năm nay/trước/sau/ngoái
        const getRelativeDateRange = (rawText) => {
            const text = normalizeVN(rawText);
            const now = new Date();
            const startOfDay = (d) => { const x = new Date(d); x.setHours(0,0,0,0); return x; };
            const endOfDay = (d) => { const x = new Date(d); x.setHours(23,59,59,999); return x; };
            const mondayOf = (d) => { const x = new Date(d); const day = (x.getDay() + 6) % 7; x.setDate(x.getDate() - day); return startOfDay(x); };

            const rules = [
                { re: /\bhom nay\b/,              range: () => [startOfDay(now), endOfDay(now)] },
                { re: /\bhom qua\b/,               range: () => { const d = new Date(now); d.setDate(d.getDate()-1); return [startOfDay(d), endOfDay(d)]; } },
                { re: /\bngay mai\b/,              range: () => { const d = new Date(now); d.setDate(d.getDate()+1); return [startOfDay(d), endOfDay(d)]; } },
                { re: /\btuan nay\b/,              range: () => { const m = mondayOf(now); const e = new Date(m); e.setDate(e.getDate()+6); return [m, endOfDay(e)]; } },
                { re: /\btuan truoc\b/,            range: () => { const m = mondayOf(now); m.setDate(m.getDate()-7); const e = new Date(m); e.setDate(e.getDate()+6); return [m, endOfDay(e)]; } },
                { re: /\btuan sau\b/,              range: () => { const m = mondayOf(now); m.setDate(m.getDate()+7); const e = new Date(m); e.setDate(e.getDate()+6); return [m, endOfDay(e)]; } },
                { re: /\bthang nay\b/,             range: () => { const s = new Date(now.getFullYear(), now.getMonth(), 1); const e = new Date(now.getFullYear(), now.getMonth()+1, 0); return [startOfDay(s), endOfDay(e)]; } },
                { re: /\bthang truoc\b/,           range: () => { const s = new Date(now.getFullYear(), now.getMonth()-1, 1); const e = new Date(now.getFullYear(), now.getMonth(), 0); return [startOfDay(s), endOfDay(e)]; } },
                { re: /\bthang sau\b/,             range: () => { const s = new Date(now.getFullYear(), now.getMonth()+1, 1); const e = new Date(now.getFullYear(), now.getMonth()+2, 0); return [startOfDay(s), endOfDay(e)]; } },
                { re: /\bnam nay\b/,               range: () => [startOfDay(new Date(now.getFullYear(),0,1)), endOfDay(new Date(now.getFullYear(),11,31))] },
                { re: /\bnam truoc\b|\bnam ngoai\b/, range: () => [startOfDay(new Date(now.getFullYear()-1,0,1)), endOfDay(new Date(now.getFullYear()-1,11,31))] },
                { re: /\bnam sau\b/,               range: () => [startOfDay(new Date(now.getFullYear()+1,0,1)), endOfDay(new Date(now.getFullYear()+1,11,31))] },
            ];

            for (const rule of rules) {
                const m = text.match(rule.re);
                if (m) {
                    const [start, end] = rule.range();
                    return { start, end, matched: m[0] };
                }
            }
            return null;
        };

        // --- TÌM KIẾM NGỮ NGHĨA (nhẹ): nhận diện ý định muốn tìm trong danh mục nào ---
        const CATEGORY_HINTS = {
            events:    [/\bsu kien\b/, /\bcuoc hop\b/, /\blich hen\b/, /\bhop\b/],
            todos:     [/\bcong viec\b/, /\bviec can lam\b/, /\bnhiem vu\b/, /\btodo\b/],
            notes:     [/\bghi chu\b/, /\bnote\b/, /\bghi nho\b/],
            timetable: [/\bthoi khoa bieu\b/, /\btkb\b/, /\blich hoc\b/, /\btiet hoc\b/],
        };
        const detectCategoryIntent = (rawText) => {
            const text = normalizeVN(rawText);
            for (const [cat, patterns] of Object.entries(CATEGORY_HINTS)) {
                for (const re of patterns) {
                    const m = text.match(re);
                    if (m) return { category: cat, matched: m[0] };
                }
            }
            return null;
        };

        // --- GLOBAL SEARCH MODAL ---
        const GlobalSearchModal = ({ onClose, db, user, appId, onNavigate, headerRef }) => {
            const [query, setQuery] = React.useState('');
            const [results, setResults] = React.useState({ dateEvents: [], dateTarget: null, events: [], todos: [], notes: [], timetable: [] });
            const [loading, setLoading] = React.useState(false);
            const [headerH, setHeaderH] = React.useState(56);
            const inputRef = React.useRef(null);

            React.useEffect(() => {
                if (inputRef.current) inputRef.current.focus();
                // Đo chiều cao header thực tế
                if (headerRef && headerRef.current) {
                    setHeaderH(headerRef.current.getBoundingClientRect().height);
                }
            }, []);

            React.useEffect(() => {
                if (!query.trim()) {
                    setResults({ dateEvents: [], dateTarget: null, events: [], todos: [], notes: [], timetable: [] });
                    return;
                }
                setLoading(true);
                const rawQuery = query.trim();

                // 1) Ngày chính xác kiểu dd/mm/yyyy (tính năng cũ, giữ nguyên)
                const parsedDate = parseSearchDate(rawQuery);
                // 2) Ngôn ngữ tự nhiên: "tháng trước", "tuần này", "hôm qua"... (tìm kiếm ngữ nghĩa)
                const relativeRange = !parsedDate ? getRelativeDateRange(rawQuery) : null;
                // 3) Ý định danh mục: "ghi chú", "cuộc họp", "việc cần làm", "thời khóa biểu"...
                const intent = detectCategoryIntent(rawQuery);

                // Từ khóa "sạch" dùng để so khớp mờ — loại bỏ cụm thời gian / danh mục đã nhận diện được
                let cleaned = normalizeVN(rawQuery);
                if (relativeRange) cleaned = cleaned.replace(relativeRange.matched, ' ').trim();
                let effectiveIntent = null;
                if (intent) {
                    const withoutIntent = cleaned.replace(intent.matched, ' ').replace(/\s+/g, ' ').trim();
                    // Chỉ thật sự lọc theo danh mục nếu còn ngữ cảnh khác đi kèm (từ khóa hoặc mốc thời gian).
                    // Nếu người dùng chỉ gõ đúng 1 từ danh mục ("họp") thì vẫn tìm xuyên suốt như bình thường.
                    if (withoutIntent.length > 0 || relativeRange) {
                        effectiveIntent = intent;
                        cleaned = withoutIntent;
                    }
                }
                cleaned = cleaned.replace(/^(ve|la)\s+/, '').replace(/\s+/g, ' ').trim(); // bỏ từ nối "về"/"là" ở đầu cụm còn lại
                const q = cleaned; // từ khóa không dấu, đã loại phần ngữ nghĩa, dùng cho Fuse.js
                const hasKeyword = q.length > 0;
                const allowCat = (cat) => !effectiveIntent || effectiveIntent.category === cat;
                const inRange = (ts) => {
                    if (!ts) return false;
                    const d = new Date(ts.seconds * 1000);
                    if (parsedDate) return d.toDateString() === parsedDate.toDateString();
                    if (relativeRange) return d >= relativeRange.start && d <= relativeRange.end;
                    return true;
                };

                const eventsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'events');
                const todosRef  = collection(db, 'artifacts', appId, 'users', user.uid, 'todos');
                const notesRef  = collection(db, 'artifacts', appId, 'users', user.uid, 'notes');

                // Tìm kiếm mờ (fuzzy) không phân biệt dấu: so khớp trên bản đã chuẩn hóa (bỏ dấu)
                const fuzzyFilter = (list, getText) => {
                    const withNorm = list.map(item => ({ ...item, __norm: normalizeVN(getText(item)) }));
                    if (!hasKeyword) return withNorm;
                    const fuse = new Fuse(withNorm, { keys: ['__norm'], threshold: 0.4, ignoreLocation: true, minMatchCharLength: 2 });
                    return fuse.search(q).map(r => r.item);
                };

                const fetchAll = async () => {
                    try {
                        const [evSnap, tdSnap, ntSnap] = await Promise.all([
                            getDocs(query_q(eventsRef)),
                            getDocs(query_q(todosRef)),
                            getDocs(query_q(notesRef))
                        ]);
                        const allEvents = evSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                        // Kết quả theo NGÀY cụ thể (dd/mm/yyyy) — giữ nguyên hành vi cũ
                        let dateEvents = [];
                        if (parsedDate) {
                            const ds = parsedDate.toDateString();
                            dateEvents = allEvents.filter(e => e.date && new Date(e.date.seconds * 1000).toDateString() === ds);
                        }

                        // SỰ KIỆN: lọc theo danh mục (nếu có ý định) + khoảng thời gian tương đối (nếu có) + từ khóa mờ
                        let evs = allowCat('events') ? allEvents.filter(e => e.title) : [];
                        if (relativeRange) evs = evs.filter(e => inRange(e.date));
                        evs = fuzzyFilter(evs, e => e.title || '');

                        // CÔNG VIỆC
                        let tds = allowCat('todos') ? tdSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(t => t.text) : [];
                        if (relativeRange) tds = tds.filter(t => inRange(t.deadlineTime || t.reminderTime || t.date));
                        tds = fuzzyFilter(tds, t => t.text || '');

                        // GHI CHÚ
                        let nts = allowCat('notes') ? ntSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(n => n.title || n.content) : [];
                        nts = fuzzyFilter(nts, n => (n.title || '') + ' ' + (n.content || ''));

                        // THỜI KHÓA BIỂU
                        let tkbResults = [];
                        if (allowCat('timetable')) {
                            try {
                                const tkbSnap = await getDocs(collection(db, 'artifacts', appId, 'users', user.uid, 'timetable'));
                                const dayLabels = { t2:'Thứ 2', t3:'Thứ 3', t4:'Thứ 4', t5:'Thứ 5', t6:'Thứ 6', t7:'Thứ 7' };
                                const rawTkb = [];
                                tkbSnap.docs.forEach(d => {
                                    const sched = d.data().schedule || {};
                                    Object.entries(sched).forEach(([key, val]) => {
                                        if (!val) return;
                                        const [dayId, period, col] = key.split('_');
                                        rawTkb.push({ id: d.id + '_' + key, text: val, day: dayLabels[dayId] || dayId, period: 'Tiết ' + period, col: col === 'col1' ? 'Môn' : 'Ghi chú', weekDocId: d.id });
                                    });
                                });
                                tkbResults = fuzzyFilter(rawTkb, t => t.text || '');
                            } catch(e) { console.warn('Tìm TKB lỗi:', e); }
                        }

                        setResults({ dateEvents, dateTarget: parsedDate, events: evs, todos: tds, notes: nts, timetable: tkbResults });
                    } catch(e) { console.error('Lỗi tìm kiếm:', e); }
                    finally { setLoading(false); }
                };
                // Debounce 300ms: đợi người dùng ngừng gõ mới thật sự truy vấn, tránh gọi liên tục khi đang gõ
                const timer = setTimeout(fetchAll, 300);
                return () => clearTimeout(timer);
            }, [query]);

            const highlightText = (text, q) => {
                if (!text || !q) return text;
                // So khớp theo bản chuẩn hóa (không dấu) để việc gõ có dấu/không dấu đều bôi vàng đúng vị trí
                const normText = normalizeVN(text);
                const normQ = normalizeVN(q);
                const idx = normText.indexOf(normQ);
                if (idx === -1) return text;
                return <span>{text.slice(0, idx)}<mark className="bg-yellow-200 text-yellow-900 rounded px-0.5 font-bold">{text.slice(idx, idx + normQ.length)}</mark>{text.slice(idx + normQ.length)}</span>;
            };

            const totalCount = results.events.length + results.todos.length + results.notes.length + results.timetable.length + results.dateEvents.length;
            const hasQuery = query.trim().length > 0;

            const handleResultClick = (type, item) => {
                onNavigate(type, item, query.trim());
                onClose();
            };
            const handleGoToDate = (date) => {
                onNavigate('calendar', { date: { seconds: Math.floor(date.getTime() / 1000) } });
                onClose();
            };

            return (
                <>
                    {/* Overlay mờ — chỉ bên dưới header, bấm vào đóng */}
                    <div className="fixed inset-0 z-[58] bg-black/30" style={{top: 0}} onClick={onClose} />

                    {/* Thanh search — thay thế toàn bộ header, z cao hơn overlay */}
                    <div className="fixed top-0 left-1/2 z-[59] bg-blue-600 flex items-center gap-2 px-3 shadow-lg"
                        style={{ width: '100%', maxWidth: '448px', transform: 'translateX(-50%)', height: headerH + 'px' }}
                        onClick={e => e.stopPropagation()}>
                        <Search size={18} className="text-blue-200 shrink-0" />
                        <input
                            ref={inputRef}
                            type="text"
                            value={query}
                            onChange={e => setQuery(e.target.value)}
                            placeholder="Nhập từ khóa hoặc ngày (dd/mm/yyyy)..."
                            className="flex-1 bg-transparent text-white placeholder-blue-300 outline-none text-sm font-medium"
                        />
                        {query && (
                            <button onClick={() => setQuery('')} className="text-blue-200 hover:text-white transition shrink-0 p-1">
                                <X size={16} />
                            </button>
                        )}
                        <button onClick={onClose} className="text-blue-200 hover:text-white transition shrink-0 p-1 ml-1 font-medium text-xs border border-blue-400 rounded-lg px-2">
                            Đóng
                        </button>
                    </div>

                    {/* Dropdown kết quả — sát dưới header, full width, không bo góc */}
                    {hasQuery && (
                        <div className="fixed z-[59] bg-white overflow-y-auto shadow-[0_8px_30px_rgba(0,0,0,0.18)]"
                            style={{ top: headerH + 'px', left: '50%', transform: 'translateX(-50%)', width: '100%', maxWidth: '448px', maxHeight: 'calc(100vh - ' + headerH + 'px - 56px)' }}
                            onClick={e => e.stopPropagation()}>

                            {/* Đang tải */}
                            {loading && <div className="text-center text-gray-400 py-8 text-sm animate-pulse">Đang tìm kiếm...</div>}

                            {/* Không có kết quả */}
                            {!loading && hasQuery && totalCount === 0 && !results.dateTarget && (
                                <div className="text-center text-gray-400 py-10 px-4">
                                    <Search size={36} className="mx-auto mb-3 opacity-20" />
                                    <p className="text-sm">Không tìm thấy kết quả cho <b className="text-gray-600">"{query}"</b></p>
                                </div>
                            )}

                            {/* Tìm theo ngày — không có sự kiện */}
                            {!loading && results.dateTarget && totalCount === 0 && (
                                <div className="p-4">
                                    <div className="bg-teal-50 border border-teal-200 rounded-2xl p-4 text-center">
                                        <CalendarDays size={28} className="mx-auto mb-2 text-teal-400" />
                                        <p className="text-sm font-bold text-teal-700">{results.dateTarget.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</p>
                                        <p className="text-xs text-teal-500 mt-1">Không có sự kiện nào vào ngày này</p>
                                        <button onClick={() => handleGoToDate(results.dateTarget)} className="mt-3 text-xs bg-teal-600 text-white px-4 py-1.5 rounded-full hover:bg-teal-700 transition font-bold">→ Mở ngày này trên lịch</button>
                                    </div>
                                </div>
                            )}

                            {/* Kết quả */}
                            {!loading && (results.dateTarget || totalCount > 0) && (
                                <div className="p-4 space-y-5">

                                    {/* Ngày cụ thể */}
                                    {results.dateTarget && (
                                        <div>
                                            <div className="flex items-center gap-2 mb-2">
                                                <CalendarDays size={14} className="text-teal-500" />
                                                <span className="text-xs font-black uppercase tracking-wider text-teal-500">Ngày {results.dateTarget.toLocaleDateString('vi-VN')}</span>
                                                <button onClick={() => handleGoToDate(results.dateTarget)} className="ml-auto text-[9px] text-teal-500 hover:text-teal-700 border border-teal-300 rounded-full px-2 py-0.5 transition">Mở lịch →</button>
                                            </div>
                                            {results.dateEvents.length > 0
                                                ? <div className="space-y-1.5">{results.dateEvents.map(ev => (
                                                    <button key={ev.id} onClick={() => handleResultClick('calendar', ev)} className="w-full text-left p-3 bg-teal-50 hover:bg-teal-100 rounded-xl border border-teal-200 transition">
                                                        <div className="font-semibold text-sm text-slate-800">{ev.title}</div>
                                                    </button>
                                                ))}</div>
                                                : <p className="text-xs text-gray-400 italic pl-1">Không có sự kiện nào</p>
                                            }
                                        </div>
                                    )}

                                    {/* Sự kiện */}
                                    {results.events.length > 0 && (
                                        <div>
                                            <div className="flex items-center gap-2 mb-2"><Calendar size={14} className="text-blue-500" /><span className="text-xs font-black uppercase tracking-wider text-blue-500">Sự kiện ({results.events.length})</span></div>
                                            <div className="space-y-1.5">{results.events.map(ev => (
                                                <button key={ev.id} onClick={() => handleResultClick('calendar', ev)} className="w-full text-left p-3 bg-blue-50 hover:bg-blue-100 rounded-xl border border-blue-100 transition">
                                                    <div className="font-semibold text-sm text-slate-800">{highlightText(ev.title, query)}</div>
                                                    {ev.date && <div className="text-[10px] text-blue-400 mt-0.5 flex items-center gap-1"><CalendarDays size={10}/>{new Date(ev.date.seconds * 1000).toLocaleDateString('vi-VN')}</div>}
                                                </button>
                                            ))}</div>
                                        </div>
                                    )}

                                    {/* Việc cần làm */}
                                    {results.todos.length > 0 && (
                                        <div>
                                            <div className="flex items-center gap-2 mb-2"><CheckSquare size={14} className="text-green-500" /><span className="text-xs font-black uppercase tracking-wider text-green-500">Việc cần làm ({results.todos.length})</span></div>
                                            <div className="space-y-1.5">{results.todos.map(td => (
                                                <button key={td.id} onClick={() => handleResultClick('todo', td)} className="w-full text-left p-3 bg-green-50 hover:bg-green-100 rounded-xl border border-green-100 transition">
                                                    <div className={`font-semibold text-sm ${td.completed ? 'line-through text-gray-400' : 'text-slate-800'}`}>{highlightText(td.text, query)}</div>
                                                    {td.deadlineTime && <div className="text-[10px] text-green-400 mt-0.5 flex items-center gap-1"><Clock size={10}/>{new Date(td.deadlineTime.seconds * 1000).toLocaleDateString('vi-VN')}</div>}
                                                </button>
                                            ))}</div>
                                        </div>
                                    )}

                                    {/* Ghi chú */}
                                    {results.notes.length > 0 && (
                                        <div>
                                            <div className="flex items-center gap-2 mb-2"><StickyNote size={14} className="text-orange-500" /><span className="text-xs font-black uppercase tracking-wider text-orange-500">Ghi chú ({results.notes.length})</span></div>
                                            <div className="space-y-1.5">{results.notes.map(nt => (
                                                <button key={nt.id} onClick={() => handleResultClick('notes', nt)} className="w-full text-left p-3 rounded-xl border border-orange-100 hover:opacity-90 transition" style={{ backgroundColor: nt.color || '#FEFCE8' }}>
                                                    <div className="font-semibold text-sm text-slate-800 truncate">{highlightText(nt.title || 'Không có tiêu đề', query)}</div>
                                                    {nt.content && <div className="text-[11px] text-slate-500 mt-0.5 truncate">{highlightText(nt.content, query)}</div>}
                                                </button>
                                            ))}</div>
                                        </div>
                                    )}

                                    {/* Thời khóa biểu */}
                                    {results.timetable.length > 0 && (
                                        <div>
                                            <div className="flex items-center gap-2 mb-2"><Table size={14} className="text-purple-500" /><span className="text-xs font-black uppercase tracking-wider text-purple-500">Lịch biểu ({results.timetable.length})</span></div>
                                            <div className="space-y-1.5">{results.timetable.map(tk => (
                                                <button key={tk.id} onClick={() => handleResultClick('timetable', tk)} className="w-full text-left p-3 bg-purple-50 hover:bg-purple-100 rounded-xl border border-purple-100 transition">
                                                    <div className="font-semibold text-sm text-slate-800">{highlightText(tk.text, query)}</div>
                                                    <div className="text-[10px] text-purple-400 mt-0.5">{tk.day} · {tk.period} · {tk.col}</div>
                                                </button>
                                            ))}</div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Footer đếm kết quả */}
                            {!loading && totalCount > 0 && (
                                <div className="sticky bottom-0 border-t px-4 py-2 text-center bg-white/90 backdrop-blur-sm">
                                    <span className="text-xs text-gray-400">Tìm thấy <b className="text-gray-600">{totalCount}</b> kết quả</span>
                                </div>
                            )}
                        </div>
                    )}
                </>
            );
        };

        // ==============================================================
        // TIỆN ÍCH: XUẤT / NHẬP DỮ LIỆU (Excel, PDF, JSON) — dùng chung cho ExportDataModal & ImportDataModal
        // ==============================================================

        // Danh sách loại dữ liệu có thể chọn để xuất/nhập, khớp với tên collection trên Firestore
        const DATA_TYPES = [
            { key: 'events',    label: 'Sự kiện (Lịch)',           icon: CalendarDays, color: 'text-blue-500' },
            { key: 'todos',     label: 'Việc cần làm',              icon: CheckSquare,  color: 'text-emerald-500' },
            { key: 'notes',     label: 'Ghi chú',                   icon: StickyNote,   color: 'text-amber-500' },
            { key: 'timetable', label: 'Thời khóa biểu',            icon: Table,        color: 'text-purple-500' },
            { key: 'vault',     label: 'Kho bảo mật (đã mã hóa)',   icon: Shield,       color: 'text-slate-700' },
            { key: 'all',       label: 'Tất cả dữ liệu',            icon: Download,     color: 'text-rose-500' },
        ];
        const ALL_COLLECTIONS = ['events', 'todos', 'notes', 'timetable', 'vault'];

        // Chuyển 1 giá trị field bất kỳ (kể cả Firestore Timestamp) thành dạng hiển thị được cho Excel/PDF
        const formatCellValue = (v) => {
            if (v === null || v === undefined) return '';
            if (typeof v === 'object') {
                if (typeof v.seconds === 'number') {
                    try {
                        const d = new Date(v.seconds * 1000 + Math.floor((v.nanoseconds || 0) / 1e6));
                        return d.toLocaleString('vi-VN');
                    } catch (e) { /* rơi xuống JSON.stringify bên dưới nếu lỗi */ }
                }
                try { return JSON.stringify(v); } catch (e) { return String(v); }
            }
            return v;
        };

        // Lấy dữ liệu 1 hoặc nhiều loại từ Firestore. keys có thể chứa 'all' để lấy hết.
        const fetchDataForKeys = async (db, appId, uid, keys) => {
            const cols = keys.includes('all') ? ALL_COLLECTIONS : keys.filter(k => ALL_COLLECTIONS.includes(k));
            const out = {};
            for (const col of cols) {
                const ref = collection(db, 'artifacts', appId, 'users', uid, col);
                const snap = await getDocs(ref);
                out[col] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            }
            return out;
        };

        const triggerDownloadBlob = (blob, filename) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);
        };

        // ---- XUẤT JSON: giữ nguyên cấu trúc gốc 100%, dùng để nhập lại chính xác nhất ----
        const exportAsJSON = (dataByCol, filenameBase) => {
            const blob = new Blob([JSON.stringify(dataByCol, null, 2)], { type: 'application/json' });
            triggerDownloadBlob(blob, `${filenameBase}.json`);
        };

        // ---- XUẤT EXCEL: mỗi loại dữ liệu là 1 sheet riêng, kèm cột ẩn "_raw_json" để nhập lại chính xác 100% ----
        const exportAsExcel = (dataByCol, filenameBase) => {
            const wb = XLSX.utils.book_new();
            Object.entries(dataByCol).forEach(([col, items]) => {
                const rows = items.length ? items.map(item => {
                    const row = {};
                    Object.keys(item).forEach(k => {
                        if (k === 'id') { row['ID'] = item.id; return; }
                        row[k] = formatCellValue(item[k]);
                    });
                    row['_raw_json'] = JSON.stringify(item);
                    return row;
                }) : [{ 'Thông báo': 'Không có dữ liệu' }];
                const ws = XLSX.utils.json_to_sheet(rows);
                XLSX.utils.book_append_sheet(wb, ws, col.slice(0, 31));
            });
            XLSX.writeFile(wb, `${filenameBase}.xlsx`);
        };

        // ---- XUẤT PDF: dựng bảng HTML tạm ngoài màn hình rồi chụp lại bằng html2canvas ----
        // (đảm bảo tiếng Việt có dấu hiển thị đúng, vì font chuẩn của PDF không hỗ trợ đầy đủ dấu tiếng Việt)
        const exportAsPDF = async (dataByCol, filenameBase, titleMap) => {
            const container = document.createElement('div');
            container.style.position = 'fixed';
            container.style.top = '0';
            container.style.left = '-99999px';
            container.style.width = '1000px';
            container.style.background = '#ffffff';
            container.style.padding = '24px';
            container.style.fontFamily = "Arial, 'Segoe UI', sans-serif";

            Object.entries(dataByCol).forEach(([col, items]) => {
                const section = document.createElement('div');
                section.style.marginBottom = '28px';
                const title = document.createElement('h2');
                title.textContent = `${titleMap[col] || col} (${items.length} mục)`;
                title.style.fontSize = '18px';
                title.style.margin = '0 0 10px 0';
                title.style.color = '#1e293b';
                section.appendChild(title);

                if (!items.length) {
                    const p = document.createElement('p');
                    p.textContent = 'Không có dữ liệu.';
                    p.style.color = '#94a3b8'; p.style.fontSize = '13px';
                    section.appendChild(p);
                } else {
                    const keySet = new Set();
                    items.forEach(it => Object.keys(it).forEach(k => { if (k !== 'id') keySet.add(k); }));
                    const keys = Array.from(keySet);
                    const table = document.createElement('table');
                    table.style.borderCollapse = 'collapse';
                    table.style.width = '100%';
                    table.style.fontSize = '11px';
                    const thead = document.createElement('thead');
                    const headRow = document.createElement('tr');
                    ['ID', ...keys].forEach(h => {
                        const th = document.createElement('th');
                        th.textContent = h;
                        th.style.border = '1px solid #cbd5e1';
                        th.style.background = '#1e293b';
                        th.style.color = '#fff';
                        th.style.padding = '5px 7px';
                        th.style.textAlign = 'left';
                        headRow.appendChild(th);
                    });
                    thead.appendChild(headRow);
                    table.appendChild(thead);
                    const tbody = document.createElement('tbody');
                    items.forEach((it, i) => {
                        const tr = document.createElement('tr');
                        tr.style.background = i % 2 === 0 ? '#ffffff' : '#f8fafc';
                        const idTd = document.createElement('td');
                        idTd.textContent = it.id || '';
                        idTd.style.border = '1px solid #e2e8f0'; idTd.style.padding = '5px 7px';
                        tr.appendChild(idTd);
                        keys.forEach(k => {
                            const td = document.createElement('td');
                            td.textContent = String(formatCellValue(it[k]));
                            td.style.border = '1px solid #e2e8f0'; td.style.padding = '5px 7px';
                            tr.appendChild(td);
                        });
                        tbody.appendChild(tr);
                    });
                    table.appendChild(tbody);
                    section.appendChild(table);
                }
                container.appendChild(section);
            });

            document.body.appendChild(container);
            try {
                const canvas = await html2canvas(container, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
                const pdf = new jsPDF({ orientation: 'p', unit: 'pt', format: 'a4' });
                const pageW = pdf.internal.pageSize.getWidth();
                const pageH = pdf.internal.pageSize.getHeight();
                const imgW = pageW;
                const pxPerPt = canvas.width / imgW;
                const pageHInCanvasPx = pageH * pxPerPt;
                let renderedH = 0;
                let first = true;
                while (renderedH < canvas.height) {
                    const sliceH = Math.min(pageHInCanvasPx, canvas.height - renderedH);
                    const sliceCanvas = document.createElement('canvas');
                    sliceCanvas.width = canvas.width;
                    sliceCanvas.height = sliceH;
                    const ctx = sliceCanvas.getContext('2d');
                    ctx.drawImage(canvas, 0, renderedH, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
                    const sliceImgData = sliceCanvas.toDataURL('image/jpeg', 0.92);
                    if (!first) pdf.addPage();
                    pdf.addImage(sliceImgData, 'JPEG', 0, 0, imgW, (sliceH * imgW) / canvas.width);
                    renderedH += sliceH;
                    first = false;
                }
                pdf.save(`${filenameBase}.pdf`);
            } finally {
                document.body.removeChild(container);
            }
        };

        // ---- NHẬP DỮ LIỆU: ghi đè các collection có trong dữ liệu nhập (giữ đúng logic gốc của ứng dụng) ----
        const applyImportData = async (db, appId, uid, dataByCol) => {
            for (const key of Object.keys(dataByCol)) {
                if (!ALL_COLLECTIONS.includes(key)) {
                    throw new Error(`File chứa loại dữ liệu không hợp lệ: "${key}".`);
                }
            }
            const batch = writeBatch(db);
            for (const [col, items] of Object.entries(dataByCol)) {
                const ref = collection(db, 'artifacts', appId, 'users', uid, col);
                const snap = await getDocs(ref);
                snap.docs.forEach(d => batch.delete(d.ref));
                (items || []).forEach(item => {
                    const { id, ...rest } = item;
                    const docRef = doc(ref, id || undefined);
                    batch.set(docRef, rest);
                });
            }
            await batch.commit();
        };

        // Đọc 1 file JSON và trả về { collection: [items] }
        const parseJSONImportFile = async (file, selectedKey) => {
            const text = await file.text();
            const data = JSON.parse(text);
            if (Array.isArray(data)) {
                if (selectedKey === 'all') throw new Error('File JSON này chỉ chứa 1 loại dữ liệu dạng danh sách — vui lòng chọn đúng loại dữ liệu tương ứng thay vì "Tất cả dữ liệu".');
                return { [selectedKey]: data };
            }
            if (data && typeof data === 'object') {
                if (selectedKey !== 'all') {
                    if (!(selectedKey in data)) throw new Error(`File JSON không chứa dữ liệu loại "${selectedKey}".`);
                    return { [selectedKey]: data[selectedKey] };
                }
                return data;
            }
            throw new Error('File JSON không đúng định dạng.');
        };

        // Đọc 1 file Excel (.xlsx) và trả về { collection: [items] }.
        // Ưu tiên đọc cột ẩn "_raw_json" (do chính ứng dụng tạo ra khi xuất) để khôi phục dữ liệu chính xác 100%.
        const parseExcelImportFile = async (file, selectedKey) => {
            const buf = await file.arrayBuffer();
            const wb = XLSX.read(buf, { type: 'array' });
            const sheetNames = selectedKey === 'all'
                ? wb.SheetNames.filter(n => ALL_COLLECTIONS.includes(n))
                : wb.SheetNames.filter(n => n === selectedKey);
            if (!sheetNames.length) {
                throw new Error('Không tìm thấy sheet dữ liệu phù hợp trong file Excel. Vui lòng dùng file Excel do chính ứng dụng này xuất ra.');
            }
            const out = {};
            sheetNames.forEach(name => {
                const ws = wb.Sheets[name];
                const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
                const items = rows.map(row => {
                    if (row['_raw_json']) {
                        try { return JSON.parse(row['_raw_json']); } catch (e) { /* rơi xuống dự phòng bên dưới */ }
                    }
                    // Dự phòng khi thiếu cột "_raw_json" (ví dụ file bị chỉnh sửa thủ công): dựng lại object best-effort
                    const item = {};
                    Object.entries(row).forEach(([k, v]) => {
                        if (k === '_raw_json') return;
                        if (k === 'ID') { item.id = v; return; }
                        item[k] = v;
                    });
                    return item;
                });
                out[name] = items;
            });
            return out;
        };

        const EXPORT_IMPORT_TITLE_MAP = {
            events: 'Sự kiện (Lịch)', todos: 'Việc cần làm', notes: 'Ghi chú',
            timetable: 'Thời khóa biểu', vault: 'Kho bảo mật (đã mã hóa)'
        };

        // ==============================================================
        // COMPONENT: POPUP XUẤT DỮ LIỆU (Excel / PDF / JSON)
        // ==============================================================
        const ExportDataModal = ({ onClose, db, appId, auth }) => {
            const [selectedType, setSelectedType] = useState('all');
            const [format, setFormat] = useState('excel');
            const [busy, setBusy] = useState(false);
            const [error, setError] = useState('');

            const handleExport = async () => {
                setError(''); setBusy(true);
                try {
                    const uid = auth.currentUser.uid;
                    const dataByCol = await fetchDataForKeys(db, appId, uid, [selectedType]);
                    const base = `${selectedType}_${new Date().toISOString().slice(0, 10)}`;
                    if (format === 'json') exportAsJSON(dataByCol, base);
                    else if (format === 'excel') exportAsExcel(dataByCol, base);
                    else await exportAsPDF(dataByCol, base, EXPORT_IMPORT_TITLE_MAP);
                    toast.success('Xuất dữ liệu thành công!', { position: 'top-center' });
                    onClose();
                } catch (err) {
                    console.error('Lỗi xuất dữ liệu:', err);
                    setError('Lỗi xuất dữ liệu: ' + err.message);
                    toast.error('Lỗi xuất dữ liệu: ' + err.message, { position: 'top-center' });
                } finally {
                    setBusy(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-black/50 z-[65] flex items-center justify-center p-4" onClick={onClose}>
                    <div className="bg-white w-full max-w-sm rounded-xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
                        <div className="bg-gray-800 text-white p-4 flex justify-between items-center shrink-0">
                            <h3 className="font-bold flex items-center gap-2"><Download size={18}/> Xuất dữ liệu</h3>
                            <button onClick={onClose}><X size={20}/></button>
                        </div>
                        <div className="p-5 space-y-5 overflow-y-auto flex-1 no-scrollbar text-slate-800">
                            <div>
                                <p className="text-xs font-bold text-slate-500 uppercase mb-2">Chọn loại dữ liệu cần xuất:</p>
                                <div className="space-y-1.5">
                                    {DATA_TYPES.map(dt => (
                                        <label key={dt.key} className={`flex items-center gap-2.5 p-2.5 rounded-lg border cursor-pointer transition ${selectedType === dt.key ? 'border-blue-500 bg-blue-50' : 'border-slate-200 hover:bg-slate-50'}`}>
                                            <input type="radio" name="export-type" checked={selectedType === dt.key} onChange={() => setSelectedType(dt.key)} className="accent-blue-600" />
                                            <dt.icon size={16} className={dt.color} />
                                            <span className="text-sm font-medium">{dt.label}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <p className="text-xs font-bold text-slate-500 uppercase mb-2">Định dạng xuất:</p>
                                <div className="grid grid-cols-3 gap-2">
                                    <button type="button" onClick={() => setFormat('excel')} className={`flex flex-col items-center gap-1 py-2.5 rounded-lg border text-xs font-bold transition ${format === 'excel' ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                                        <FileSpreadsheet size={18}/> Excel
                                    </button>
                                    <button type="button" onClick={() => setFormat('pdf')} className={`flex flex-col items-center gap-1 py-2.5 rounded-lg border text-xs font-bold transition ${format === 'pdf' ? 'border-red-500 bg-red-50 text-red-700' : 'border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                                        <FileText size={18}/> PDF
                                    </button>
                                    <button type="button" onClick={() => setFormat('json')} className={`flex flex-col items-center gap-1 py-2.5 rounded-lg border text-xs font-bold transition ${format === 'json' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                                        <FileJson size={18}/> JSON
                                    </button>
                                </div>
                                {format === 'json' && <p className="text-[10px] text-slate-400 mt-2">💡 JSON giữ nguyên cấu trúc gốc — nên dùng nếu bạn định nhập (import) lại sau này.</p>}
                                {format === 'excel' && <p className="text-[10px] text-slate-400 mt-2">💡 File Excel có kèm dữ liệu gốc ẩn, có thể nhập lại chính xác 100% sau này.</p>}
                                {format === 'pdf' && <p className="text-[10px] text-slate-400 mt-2">💡 PDF chỉ để xem/in — không thể nhập (import) ngược lại.</p>}
                            </div>
                            {error && <p className="text-red-500 text-xs">{error}</p>}
                        </div>
                        <div className="p-4 border-t flex gap-2 shrink-0">
                            <button onClick={onClose} className="flex-1 border border-slate-300 text-slate-600 py-2.5 rounded-lg text-sm font-bold hover:bg-slate-50">Hủy</button>
