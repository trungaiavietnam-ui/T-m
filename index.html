        // --- ĐỒNG BỘ INTL.DATETIMEFORMAT - THUẬT TOÁN LỊCH ÂM CỐT LÕI ---
        function getLunarDetails(date) {
            try {
                const options = { calendar: 'chinese', day: 'numeric', month: 'numeric', year: 'numeric' };
                const formatter = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', options);
                const parts = formatter.formatToParts(date);
                
                let lDay = 1, lMonth = 1, lYear = 2026;
                parts.forEach(p => {
                    if (p.type === 'day') lDay = parseInt(p.value, 10);
                    if (p.type === 'month') lMonth = parseInt(p.value, 10);
                    if (p.type === 'year') lYear = parseInt(p.value, 10);
                });

                const heavenlyStems = ["Giáp", "Ất", "Bính", "Đinh", "Mậu", "Kỷ", "Canh", "Tân", "Nhâm", "Quý"];
                const earthlyBranches = ["Tý", "Sửu", "Dần", "Mão", "Thìn", "Tỵ", "Ngọ", "Mùi", "Thân", "Dậu", "Tuất", "Hợi"];
                
                const stemYear = heavenlyStems[(lYear - 4) % 10];
                const branchYear = earthlyBranches[(lYear - 4) % 12];
                
                return {
                    lunarDay: lDay,
                    lunarMonth: lMonth,
                    lunarYearName: `${stemYear} ${branchYear}`,
                    isLeap: false
                };
            } catch(e) {
                return { lunarDay: date.getDate(), lunarMonth: date.getMonth() + 1, lunarYearName: "Năm Mới", isLeap: false };
            }
        }

        // --- KHỞI TẠO VÀ QUẢN LÝ CƠ SỞ DỮ LIỆU INDEXEDDB OFFLINE SYNC ---
        function openIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('lich_van_trung_db', 2);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('sync_queue')) {
                        database.createObjectStore('sync_queue', { keyPath: 'id', autoIncrement: true });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function addToSyncQueue(action, collection, payload) {
            try {
                const database = await openIndexedDB();
                const transaction = database.transaction('sync_queue', 'readwrite');
                const store = transaction.objectStore('sync_queue');
                
                const record = {
                    action,
                    collection,
                    payload: JSON.parse(JSON.stringify(payload)),
                    timestamp: Date.now()
                };
                
                store.add(record);
                console.log(`[IndexedDB] Đã thêm tác vụ vào hàng đợi đồng bộ ngoại tuyến: ${action} -> ${collection}`);
                
                if ('serviceWorker' in navigator && 'SyncManager' in window) {
                    const registration = await navigator.serviceWorker.ready;
                    await registration.sync.register('sync-cloud-data');
                    console.log('[Background Sync] Đã kích hoạt lệnh đồng bộ ngầm qua Service Worker');
                }
            } catch (e) {
                console.error('[IndexedDB] Lỗi ghi hàng đợi ngoại tuyến:', e);
            }
        }

        // --- THÀNH PHẦN CHÍNH ỨNG DỤNG ---

            const [authLoading, setAuthLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('calendar'); 
            const [connectionError, setConnectionError] = useState(false);
            const [lastOfflineTime, setLastOfflineTime] = useState(null);

            const [notes, setNotes] = useState([]);
            const [todos, setTodos] = useState([]);
            const [timetable, setTimetable] = useState({
                Thai2: [], Thai3: [], Thai4: [], Thai5: [], Thai6: [], Thai7: [], ChuNhat: []
            });

            const [showEventModal, setShowEventModal] = useState(false);
            const [newEventTitle, setNewEventTitle] = useState('');
            const [newEventTime, setNewEventTime] = useState('08:00');
            const [newEventType, setNewEventType] = useState('work'); 

            const [showNoteModal, setShowNoteModal] = useState(false);
            const [editingNote, setEditingNote] = useState(null);
            const [noteTitle, setNoteTitle] = useState('');
            const [noteContent, setNoteContent] = useState('');

            const [newTodoTitle, setNewTodoTitle] = useState('');
            const [newTodoDeadline, setNewTodoDeadline] = useState('');

            const [showTimetableModal, setShowTimetableModal] = useState(false);
            const [selectedDay, setSelectedDay] = useState('Thai2');
            const [ttSubject, setTtSubject] = useState('');
            const [ttTime, setTtTime] = useState('07:30');

            // TRẠNG THÁI TÌM KIẾM TOÀN CỤC (GLOBAL SEARCH STATE)
            const [searchQuery, setSearchQuery] = useState('');

            useEffect(() => {
                const handleOnline = () => {
                    toast.success("Đã khôi phục kết nối mạng Internet trực tuyến!");
                    setConnectionError(false);
                };
                const handleOffline = () => {
                    toast.warn("Thiết bị mất mạng. Đang chạy ở chế độ ngoại tuyến.");
                    setLastOfflineTime(new Date().toLocaleTimeString('vi-VN'));
                };
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((usr) => {
                    setUser(usr);
                    setAuthLoading(false);
                    if (usr) {
                        toast.info(`Chào mừng ${usr.displayName || usr.email} quay trở lại!`);
                        loadUserCloudData(usr.uid);
                    } else {
                        clearUserDataToLocal();
                    }
                }, (err) => {
                    console.error("[Auth] Lỗi kết nối tài khoản Firebase:", err);
                    setConnectionError(true);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const loadUserCloudData = (uid) => {
                db.collection('users').doc(uid).collection('events')
                    .onSnapshot(snapshot => {
                        const evts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setEvents(evts);
                    }, err => console.warn("Lỗi tải sự kiện đám mây, dùng đệm offline:", err));

                db.collection('users').doc(uid).collection('notes')
                    .onSnapshot(snapshot => {
                        const nts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setNotes(nts);
                    }, err => console.warn("Lỗi tải ghi chú đám mây, dùng đệm offline:", err));

                db.collection('users').doc(uid).collection('todos')
                    .onSnapshot(snapshot => {
                        const tds = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setTodos(tds);
                    }, err => console.warn("Lỗi tải todos đám mây, dùng đệm offline:", err));

                db.collection('users').doc(uid).collection('timetable').doc('weekly')
                    .onSnapshot(doc => {
                        if (doc.exists) {
                            setTimetable(doc.data());
                        }
                    }, err => console.warn("Lỗi tải thời khóa biểu đám mây, dùng đệm offline:", err));
            };

            const clearUserDataToLocal = () => {
                setEvents([]);
                setNotes([]);
                setTodos([]);
                setTimetable({ Thai2: [], Thai3: [], Thai4: [], Thai5: [], Thai6: [], Thai7: [], ChuNhat: [] });
            };

            const handleGoogleSignIn = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    await auth.signInWithPopup(provider);
                } catch (error) {
                    console.error("[Auth] Lỗi đăng nhập bằng Google Popup:", error);
                    try {
                        const provider = new firebase.auth.GoogleAuthProvider();
                        await auth.signInWithRedirect(provider);
                    } catch (err) {
                        toast.error("Không thể kết nối dịch vụ Google Auth đám mây.");
                    }
                }
            };

            const handleSignOut = async () => {
                if (confirm("Bạn có chắc chắn muốn đăng xuất tài khoản đám mây?")) {
                    await auth.signOut();
                    toast.success("Đã đăng xuất an toàn.");
                }
            };

            const handleUseOfflineAsync = () => {
                setConnectionError(false);
                toast.info("Đã chuyển sang chế độ hoạt động ngoại tuyến độc lập.");
            };

            const handleAddEvent = async (eForm) => {
                eForm.preventDefault();
                if (!newEventTitle.trim()) return;

                const dateStr = currentDate.toISOString().split('T')[0];
                const eventData = {
                    title: newEventTitle,
                    time: newEventTime,
                    type: newEventType,
                    dateString: dateStr,
                    createdAt: Date.now()
                };

                if (user) {
                    try {
                        const ref = await db.collection('users').doc(user.uid).collection('events').add(eventData);
                        eventData.id = ref.id;
                    } catch (err) {
                        console.warn("[Offline Save] Đang lưu cục bộ sự kiện vào IndexedDB.");
                        const tempId = 'local_' + Date.now();
                        eventData.id = tempId;
                        eventData.uid = user.uid;
                        setEvents(prev => [...prev, eventData]);
                        await addToSyncQueue('add', 'events', eventData);
                    }
                } else {
                    const tempId = 'anon_' + Date.now();
                    eventData.id = tempId;
                    const updated = [...events, eventData];
                    setEvents(updated);
                    localStorage.setItem('anon_events', JSON.stringify(updated));
                }

                setNewEventTitle('');
                setShowEventModal(false);
                toast.success("Đã thêm sự kiện mới thành công!");
            };

            const handleDeleteEvent = async (id) => {
                if (!confirm("Bạn muốn xóa sự kiện này?")) return;

                if (user) {
                    try {
                        await db.collection('users').doc(user.uid).collection('events').doc(id).delete();
                    } catch (err) {
                        setEvents(prev => prev.filter(item => item.id !== id));
                        await addToSyncQueue('delete', 'events', { id, uid: user.uid });
                    }
                } else {
                    const updated = events.filter(item => item.id !== id);
                    setEvents(updated);
                    localStorage.setItem('anon_events', JSON.stringify(updated));
                }
                toast.success("Đã xóa sự kiện.");
            };

            const handleSaveNote = async (nForm) => {
                nForm.preventDefault();
                if (!noteTitle.trim()) return;

                const noteData = {
                    title: noteTitle,
                    content: noteContent,
                    updatedAt: Date.now()
                };

                if (editingNote) {
                    if (user) {
                        try {
                            await db.collection('users').doc(user.uid).collection('notes').doc(editingNote.id).update(noteData);
                        } catch (err) {
                            setNotes(prev => prev.map(item => item.id === editingNote.id ? { ...item, ...noteData } : item));
                            await addToSyncQueue('update', 'notes', { id: editingNote.id, uid: user.uid, ...noteData });
                        }
                    } else {
                        const updated = notes.map(item => item.id === editingNote.id ? { ...item, ...noteData } : item);

                        localStorage.setItem('anon_notes', JSON.stringify(updated));
                    }
                    toast.success("Đã cập nhật ghi chú thành công.");

                        } catch (err) {
                            const tempId = 'local_' + Date.now();
                            noteData.id = tempId;
                            noteData.uid = user.uid;
                            setNotes(prev => [...prev, noteData]);
                            await addToSyncQueue('add', 'notes', noteData);
                        }
                    } else {
                        const tempId = 'anon_' + Date.now();
                        noteData.id = tempId;
                        const updated = [...notes, noteData];
                        setNotes(updated);
                        localStorage.setItem('anon_notes', JSON.stringify(updated));
                    }
                    toast.success("Đã tạo thêm ghi chú mới.");
                }

                setNoteTitle('');
                setNoteContent('');
                setEditingNote(null);
                setShowNoteModal(false);
            };

                    try {

                } else {
                    const updated = notes.filter(item => item.id !== id);

                    localStorage.setItem('anon_notes', JSON.stringify(updated));

                    completed: false,
                    deadlineTime: newTodoDeadline ? firebase.firestore.Timestamp.fromDate(new Date(newTodoDeadline)) : null,

                if (user) {
                    try {
                        const ref = await db.collection('users').doc(user.uid).collection('todos').add(todoData);
                        todoData.id = ref.id;
                    } catch (err) {
                        const tempId = 'local_' + Date.now();
                        todoData.id = tempId;
                        todoData.uid = user.uid;
                        if (todoData.deadlineTime) {
                            todoData.deadlineTime = { seconds: Math.floor(new Date(newTodoDeadline).getTime() / 1000) };
                        }
                        setTodos(prev => [...prev, todoData]);
                        await addToSyncQueue('add', 'todos', todoData);
                    }
                } else {
                    const tempId = 'anon_' + Date.now();
                    todoData.id = tempId;
                    if (todoData.deadlineTime) {
                        todoData.deadlineTime = { seconds: Math.floor(new Date(newTodoDeadline).getTime() / 1000) };
                    }
                    const updated = [...todos, todoData];
                    setTodos(updated);
                    localStorage.setItem('anon_todos', JSON.stringify(updated));
                }

                setNewTodoTitle('');
                setNewTodoDeadline('');
                toast.success("Đã bổ sung việc cần làm mới.");
            };

            const handleToggleTodo = async (item) => {
                const nextState = !item.completed;
                if (user) {
                    try {
                        await db.collection('users').doc(user.uid).collection('todos').doc(item.id).update({ completed: nextState });
                    } catch (err) {
                        setTodos(prev => prev.map(t => t.id === item.id ? { ...t, completed: nextState } : t));
                        await addToSyncQueue('update', 'todos', { id: item.id, uid: user.uid, completed: nextState });
                    }
                } else {
                    const updated = todos.map(t => t.id === item.id ? { ...t, completed: nextState } : t);

                    localStorage.setItem('anon_todos', JSON.stringify(updated));
                }

                                                e('button', {

                            e('div', { className: "border-b pb-2" },
                                e('h2', { className: "text-sm font-black uppercase text-slate-700 flex items-center gap-1.5 font-sans" }, e(CheckSquare, { size: 16, className: "text-blue-600" }), "Danh Sách Việc Cần Làm")

                            e('form', { onSubmit: handleAddTodo, className: "flex flex-col md:flex-row gap-2" },
                                e('input', {
                                    type: 'text',

                                    onChange: (el) => setNewTodoTitle(el.target.value),

                                }),
                                e('input', {
                                    type: 'date',
                                    value: newTodoDeadline,
                                    onChange: (el) => setNewTodoDeadline(el.target.value),

                                e('button', { type: 'submit', className: "bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-4 py-2 rounded-xl transition font-sans flex items-center justify-center gap-1" }, e(Plus, { size: 14 }), "Bổ sung")

                            todos.length === 0 ? e('p', { className: "text-xs text-slate-400 italic text-center py-6 font-sans" }, "Thảnh thơi vô sự! Không có việc gì cần phải hoàn thành.") : (
                                e('div', { className: "flex flex-col gap-2" },
                                    todos.map(td => e('div', { key: td.id, className: "bg-slate-50 p-3 rounded-xl border border-slate-100 flex items-center justify-between hover:border-slate-200 transition" },
                                        e('div', { className: "flex items-center gap-2.5 flex-1 cursor-pointer", onClick: () => handleToggleTodo(td) },

                        )
                    )
                ),

                e('nav', { className: "bg-white border-t border-slate-200 fixed bottom-0 left-0 w-full z-40 shadow-xl" },
                    e('div', { className: "max-w-4xl mx-auto flex justify-around py-1 text-[10px] font-bold text-slate-400 font-sans" },
                        [
                            { id: 'calendar', label: 'Lịch vạn niên', icon: CalendarIcon },
                            { id: 'timetable', label: 'Thời khóa biểu', icon: ClipboardList },
                            { id: 'notes', label: 'Sổ tay', icon: MessageSquare },
                            { id: 'todos', label: 'Việc cần làm', icon: CheckSquare }
                        ].map((tab) => {
                            const isAct = activeTab === tab.id;
                            return e('button', {
                                key: tab.id,
                                onClick: () => {
                                    setActiveTab(tab.id);
                                    setSearchQuery(''); 
                                },
                                className: `flex flex-col items-center gap-0.5 py-1 px-3 transition rounded-xl ${isAct ? 'text-blue-600 font-black scale-105' : 'hover:text-slate-600'}`

                        e('div', { className: "grid grid-cols-2 gap-2" },
                            e('div', { className: "flex flex-col gap-1" },
                                e('label', { className: "text-[10px] text-slate-400 font-bold font-sans" }, "Giờ diễn ra"),

                                    e('option', { value: 'work' }, "Công việc"),
                                    e('option', { value: 'personal' }, "Cá nhân"),
                                    e('option', { value: 'spiritual' }, "Tâm linh")

                            e('button', { type: 'button', onClick: () => setShowEventModal(false), className: "flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-2 rounded-xl text-xs font-bold transition font-sans" }, "Hủy"),
                            e('button', { type: 'submit', className: "flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-xs font-bold transition font-sans" }, "Lưu lại")

                    )
                ),

                showNoteModal && e('div', { className: "fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-4 animate-fadeIn" },
                    e('form', { onSubmit: handleSaveNote, className: "bg-white rounded-2xl w-full max-w-md p-4 shadow-xl flex flex-col gap-3" },
                        e('h3', { className: "text-xs font-black uppercase text-slate-500 tracking-wider font-sans border-b pb-1" }, editingNote ? "Cập nhật ghi chú" : "Tạo ghi chú mới"),

                        ),
                        e('div', { className: "flex gap-2 pt-2" },
                            e('button', { type: 'button', onClick: () => setShowNoteModal(false), className: "flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-2 rounded-xl text-xs font-bold transition font-sans" }, "Đóng"),
                            e('button', { type: 'submit', className: "flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-xs font-bold transition font-sans" }, "Lưu trữ")

                            e('div', { className: "flex flex-col gap-1" },
                                e('label', { className: "text-[10px] text-slate-400 font-bold font-sans" }, "Chọn ngày"),

                                    e('option', { value: 'Thai2' }, "Thứ Hai"), e('option', { value: 'Thai3' }, "Thứ Ba"),
                                    e('option', { value: 'Thai4' }, "Thứ Tư"), e('option', { value: 'Thai5' }, "Thứ Năm"),
                                    e('option', { value: 'Thai6' }, "Thứ Sáu"), e('option', { value: 'Thai7' }, "Thứ Bảy"),
                                    e('option', { value: 'ChuNhat' }, "Chủ Nhật")

                            ),
                            e('div', { className: "flex flex-col gap-1" },
                                e('label', { className: "text-[10px] text-slate-400 font-bold font-sans" }, "Thời gian bắt đầu"),
                                e('input', { type: 'time', value: ttTime, onChange: el => setTtTime(el.target.value), className: "bg-slate-50 border p-2 rounded-xl text-xs font-sans focus:outline-none focus:border-blue-500" })

                        e('div', { className: "flex flex-col gap-1" },
                            e('label', { className: "text-[10px] text-slate-400 font-bold font-sans" }, "Tên môn học/Công việc"),
                            e('input', { type: 'text', required: true, value: ttSubject, onChange: el => setTtSubject(el.target.value), className: "bg-slate-50 border p-2 rounded-xl text-xs font-sans focus:outline-none focus:border-blue-500", placeholder: "Ví dụ: Học máy, Họp tiến độ công ty..." })

                            e('input', { type: 'text', value: ttRoom, onChange: el => setTtRoom(el.target.value), className: "bg-slate-50 border p-2 rounded-xl text-xs font-sans focus:outline-none focus:border-blue-500", placeholder: "Ví dụ: Phòng A302, Google Meet..." })
                        ),
                        e('div', { className: "flex gap-2 pt-2" },
                            e('button', { type: 'button', onClick: () => setShowTimetableModal(false), className: "flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-2 rounded-xl text-xs font-bold transition font-sans" }, "Bỏ qua"),
                            e('button', { type: 'submit', className: "flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-xs font-bold transition font-sans" }, "Lưu lịch")
                        )
                    )
                ),

                connectionError && e('div', { className: "fixed inset-0 bg-slate-900/70 backdrop-blur-xs z-50 flex items-center justify-center p-4 animate-fadeIn" },
                    e('div', { className: "bg-white rounded-2xl w-full max-w-sm p-5 shadow-xl text-center flex flex-col gap-3" },
                        e('div', { className: "mx-auto bg-red-100 text-red-600 p-3 rounded-full w-fit" }, e(WifiOff, { size: 28 })),
                        e('h3', { className: "text-sm font-black text-slate-800 font-sans uppercase tracking-wide" }, "Lỗi kết nối đám mây"),
                        e('p', { className: "text-xs text-slate-500 leading-relaxed font-sans" }, "Chúng tôi tạm thời không kết nối được với dữ liệu đám mây. Bạn vẫn có thể tiếp tục sử dụng ứng dụng ở chế độ Offline."),
                        e('p', { className: "text-[10px] text-slate-400 italic font-sans" }, 
                            lastOfflineTime && `Phiên offline gần nhất: ${lastOfflineTime}`
                        ),
                        e('div', { className: "flex flex-col gap-2" },
                            e('button', { onClick: handleUseOfflineAsync, className: "w-full bg-amber-500 hover:bg-amber-600 text-white py-2 rounded-xl text-xs font-bold transition font-sans flex items-center justify-center gap-1.5" }, e(WifiOff, { size: 12 }), "Dùng offline không đồng bộ"),
                            e('div', { className: "flex gap-2" },
                                e('button', { onClick: () => setConnectionError(false), className: "flex-1 bg-gray-200 hover:bg-gray-300 text-slate-700 py-2 rounded-xl text-xs font-bold transition font-sans" }, "Bỏ qua"),
                                e('button', { onClick: () => window.location.reload(), className: "flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-xs font-bold transition font-sans" }, "Thử lại")
                            )
                        )
                    )
                ),
                
                e(ToastContainer, { 
                    position: "top-center", 
                    autoClose: 3000, 
                    hideProgressBar: false, 
                    newestOnTop: false, 
                    closeOnClick: true, 
                    rtl: false 
                })
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
