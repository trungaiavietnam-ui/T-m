                                                className="p-3 hover:bg-blue-50 cursor-pointer flex flex-col gap-0.5 text-left transition"
                                            >
                                                <div className="flex items-center gap-1.5">
                                                    <span className={`text-[9px] font-black uppercase px-1.5 py-0.5 rounded ${
                                                        item.type === 'Sự kiện' ? 'bg-purple-100 text-purple-700' :
                                                        item.type === 'Việc cần làm' ? 'bg-amber-100 text-amber-700' :
                                                        item.type === 'Ghi chú' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'
                                                    }`}>{item.type}</span>
                                                    <span className="text-sm font-bold text-slate-800 truncate">{item.displayTitle}</span>
                                                </div>
                                                <p className="text-xs text-gray-400 truncate pl-1 font-medium">{item.displayDesc}</p>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VÙNG NỘI DUNG CHÍNH CHUYỂN TAB ĐA NHIỆM */}
                    <main className="flex-1 overflow-hidden flex flex-col relative bg-white/30 backdrop-blur-sm">
                        
                        {/* TAB 1: GIAO DIỆN XEM NGÀY CHI TIẾT (LỊCH CÁ NHÂN) */}
                        {activeTab === 'day' && (
                            <div className="flex-1 flex flex-col p-4 justify-between overflow-y-auto no-scrollbar" style={{ backgroundImage: `linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.9)), url(${currentBackground})`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                                <div className="text-center space-y-4 pt-4">
                                    <p className="text-xs font-black text-blue-600 tracking-widest uppercase">{getDayOfWeek(currentDate)}</p>
                                    <div className="space-y-1">
                                        <h2 className="text-7xl font-black text-slate-900 tracking-tighter drop-shadow-sm">{currentDate.getDate()}</h2>
                                        <p className="text-sm font-bold text-gray-500">Tháng {currentDate.getMonth() + 1} năm {currentDate.getFullYear()}</p>
                                    </div>
                                    
                                    <div className="inline-flex gap-4 bg-blue-50/80 backdrop-blur px-4 py-2 rounded-2xl border border-blue-100 shadow-sm">
                                        <div className="text-center"><span className="block text-[10px] text-gray-400 font-bold uppercase">Âm Lịch</span><span className="text-sm font-black text-blue-700">{getLunarDate(currentDate).day} / {getLunarDate(currentDate).month}</span></div>
                                        <div className="w-[1px] bg-blue-200 self-stretch"></div>
                                        <div className="text-center"><span className="block text-[10px] text-gray-400 font-bold uppercase">Tiết Khí</span><span className="text-sm font-black text-slate-700">Thường nhật</span></div>
                                    </div>
                                </div>

                                {/* Khung hiển thị Kinh Pháp Cú thông thái */}
                                <div className="my-6 p-4 bg-white/90 backdrop-blur rounded-2xl border border-gray-100 shadow-inner max-w-sm mx-auto text-center">
                                    <span className="text-[9px] font-black text-amber-600 uppercase tracking-widest bg-amber-50 px-2 py-0.5 rounded-full mb-2 inline-block">Lời Vàng Pháp Cú</span>
                                    <p className="text-xs font-bold text-slate-700 leading-relaxed whitespace-pre-wrap font-serif italic">"{dailyVerse}"</p>
                                </div>

                                {/* Hiển thị danh sách cảnh báo tức thời trong ngày tại tab chính */}
                                {activeAlerts.length > 0 && (
                                    <div className="space-y-1.5 max-w-sm mx-auto w-full mb-2">
                                        <h4 className="text-[10px] font-black text-red-500 uppercase tracking-wider flex items-center gap-1 px-1"><Bell size={10}/> Nhắc nhở hôm nay:</h4>
                                        <div className="max-h-24 overflow-y-auto no-scrollbar space-y-1">
                                            {activeAlerts.map(alert => (
                                                <div key={alert.id} onClick={() => { setEditAlertTitle(alert.title); setEditAlertTimeStr(alert.rawTime ? new Date(alert.rawTime.seconds * 1000).toISOString().slice(0,16) : ''); setEditingAlertId(alert.id); }} className="p-2 bg-red-50 hover:bg-red-100 transition rounded-xl border border-red-100 flex justify-between items-center text-xs text-left cursor-pointer">
                                                    <span className="font-bold text-red-800 truncate max-w-[70%]">[{alert.type}] {alert.title}</span>
                                                    <span className="text-[10px] bg-red-200 text-red-700 font-black px-1.5 py-0.5 rounded">{alert.time}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* TAB 2: GIAO DIỆN XEM THÁNG TOÀN CỤC (LỊCH THÁNG MA TRẬN) */}
                        {activeTab === 'calendar' && (
                            <div className="flex-1 flex flex-col p-4 overflow-y-auto no-scrollbar">
                                <div className="flex justify-between items-center mb-4 bg-white p-2 rounded-xl shadow-sm border border-gray-150">
                                    <button onClick={() => changeMonth('prev')} className="p-1.5 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="text-gray-600" size={18} /></button>
                                    <h2 className="text-sm font-black uppercase text-gray-800 tracking-wider">Tháng {calendarCurrentDate.getMonth() + 1} / {calendarCurrentDate.getFullYear()}</h2>
                                    <button onClick={() => changeMonth('next')} className="p-1.5 hover:bg-gray-100 rounded-full transition"><ChevronRight className="text-gray-600" size={18} /></button>
                                </div>

                                <div className="grid grid-cols-7 gap-1 text-center mb-1 bg-gray-50 p-1.5 rounded-lg border">
                                    {['T2','T3','T4','T5','T6','T7','CN'].map((d, i) => <div key={d} className={`text-xs font-black ${getDayColor(i)}`}>{d}</div>)}
                                </div>

                                <div className={`grid grid-cols-7 gap-1 flex-1 ${animClass}`}>
                                    {calendarDaysMatrix.map((date, idx) => {
                                        if (!date) return <div key={`empty-${idx}`} className="bg-transparent" />;
                                        
                                        const isToday = date.toDateString() === new Date().toDateString();
                                        const isSelected = date.toDateString() === calendarSelectedDate.toDateString();
                                        const dayEvents = getEventsForDate(date);
                                        const lunar = getLunarDate(date);

                                        return (
                                            <div 
                                                key={date.toString()} 
                                                onClick={() => handleDayCellClick(date)} 
                                                className={`p-1 min-h-[55px] rounded-xl border flex flex-col justify-between items-center cursor-pointer transition-all bg-white relative ${
                                                    isSelected ? 'ring-2 ring-blue-500 border-transparent z-10' : 'border-gray-150 hover:bg-blue-50/50'
                                                }`}
                                            >
                                                <span className={`text-xs font-black ${isToday ? 'bg-blue-600 text-white w-5 h-5 rounded-full flex items-center justify-center shadow-sm' : 'text-slate-800'}`}>
                                                    {date.getDate()}
                                                </span>
                                                <span className="text-[9px] font-bold text-gray-400">
                                                    {lunar.day === 1 ? `${lunar.day}/${lunar.month}m` : lunar.day}
                                                </span>
                                                
                                                {/* Dấu chấm chỉ báo hiển thị sự kiện nằm dưới cùng ô số lịch */}
                                                {dayEvents.length > 0 && (
                                                    <div className="flex gap-0.5 justify-center w-full overflow-hidden px-0.5">
                                                        {dayEvents.slice(0, 3).map((ev, i) => (
                                                            <span key={i} className={`w-1 h-1 rounded-full ${ev.repeat !== 'none' ? 'bg-purple-500' : 'bg-blue-500'}`} />
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* TAB 3: KHU VỰC QUẢN LÝ VIỆC CẦN LÀM (TODOS COMPONENT) */}
                        {activeTab === 'todo' && <TodoView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} />}

                        {/* TAB 4: KHU VỰC GHI CHÚ ĐA SẮC MÀU (NOTES COMPONENT) */}
                        {activeTab === 'notes' && <NotesView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} />}

                        {/* TAB 5: KHU VỰC THỜI KHÓA BIỂU TINH GỌN (TIMETABLE COMPONENT) */}
                        {activeTab === 'timetable' && <TimetableView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} />}

                    </main>

                    {/* HỆ THỐNG RÀO CHẮN XÁC THỰC MÃ PIN BẢO MẬT (MODAL POPUP) */}
                    {pendingTab && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <form onSubmit={verifyPinAndUnlock} className="bg-white w-full max-w-xs rounded-xl shadow-2xl p-5 text-center text-slate-800 space-y-4 animate-in zoom-in-95">
                                <div className="inline-block p-2.5 bg-red-50 rounded-full text-red-500"><Lock size={24}/></div>
                                <div>
                                    <h3 className="font-bold text-sm">Yêu cầu mã PIN bảo mật</h3>
                                    <p className="text-xs text-gray-400 font-medium">Khu vực dữ liệu cá nhân đã được kích hoạt khóa</p>
                                </div>
                                <input type="password" maxLength={12} className="w-full text-center px-3 py-2 border rounded-xl text-lg font-black tracking-widest outline-none focus:ring-2 focus:ring-blue-500 text-slate-800" placeholder="••••••" value={pinInput} onChange={e => setPinInput(e.target.value)} autoFocus />
                                {pinError && <p className="text-red-500 text-xs font-semibold">{pinError}</p>}
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => setPendingTab(null)} className="flex-1 border text-gray-600 text-xs font-bold py-2 rounded-xl hover:bg-gray-50 transition">Hủy bỏ</button>
                                    <button type="submit" className="flex-1 bg-slate-900 text-white text-xs font-bold py-2 rounded-xl hover:bg-slate-800 transition">Mở khóa</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* POPUP SỬA ĐỔI THÔNG TIN TỪ KHUNG NHẮC NHỞ NHANH */}
                    {editingAlertId && (
                        (() => {
                            const currentAlert = activeAlerts.find(a => a.id === editingAlertId);
                            if (!currentAlert) return null;
                            return (
                                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                                    <div className="bg-white w-full max-w-xs rounded-xl shadow-2xl overflow-hidden text-slate-800 animate-in zoom-in-95">
                                        <div className="bg-gray-800 text-white p-3 font-bold text-xs uppercase flex justify-between items-center">
                                            <span>Sửa đổi nhanh: {currentAlert.type}</span>
                                            <button onClick={() => setEditingAlertId(null)}><X size={16}/></button>
                                        </div>
                                        <div className="p-4 space-y-3">
                                            <div>
                                                <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nội dung văn bản</label>
                                                <input type="text" className="w-full px-3 py-1.5 border rounded-lg text-sm text-slate-800 focus:ring-1 focus:ring-blue-500 outline-none font-bold" value={editAlertTitle} onChange={e => setEditAlertTitle(e.target.value)} />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cập nhật mốc thời gian</label>
                                                <input type="datetime-local" className="w-full px-3 py-1.5 border rounded-lg text-xs text-slate-800 focus:ring-1 focus:ring-blue-500 outline-none bg-gray-50" value={editAlertTimeStr} onChange={e => setEditAlertTimeStr(e.target.value)} />
                                            </div>
                                            <div className="flex gap-2 pt-1">
                                                <button onClick={() => setEditingAlertId(null)} className="flex-1 border text-gray-600 text-xs font-bold py-2 rounded-lg hover:bg-gray-50 transition">Hủy</button>
                                                <button onClick={() => handleSaveAlertMutation(currentAlert)} className="flex-1 bg-blue-600 text-white text-xs font-bold py-2 rounded-lg hover:bg-blue-700 transition">Cập nhật</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })()
                    )}

                    {/* --- ĐOẠN MÃ NÂNG CẤP: POPUP CHI TIẾT SỰ KIỆN TÌM KIẾM DỰ PHÒNG KHÔNG CÓ DATE --- */}
                    {searchSelectedDetail && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xs rounded-xl shadow-2xl p-4 text-slate-800 space-y-3 animate-in zoom-in-95">
                                <div className="flex justify-between items-start">
                                    <span className="text-[10px] font-black uppercase px-2 py-0.5 bg-purple-100 text-purple-700 rounded">{searchSelectedDetail.type}</span>
                                    <button onClick={() => setSearchSelectedDetail(null)} className="text-gray-400 hover:text-gray-600"><X size={18}/></button>
                                </div>
                                <h3 className="font-black text-base text-slate-900 leading-snug">{searchSelectedDetail.displayTitle}</h3>
                                <p className="text-xs text-gray-500 font-medium">{searchSelectedDetail.displayDesc}</p>
                                <button onClick={() => setSearchSelectedDetail(null)} className="w-full bg-slate-900 text-white text-xs font-bold py-2 rounded-lg hover:bg-slate-800 transition">Đóng thông tin</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL XEM CHI TIẾT SỰ KIỆN TRONG NGÀY (LỊCH THÁNG) */}
                    {selectedDateEvents && (
                        <EventModal date={selectedDateEvents.date} events={selectedDateEvents.list} onCancel={() => setSelectedDateEvents(null)} onAdd={handleAddEvent} onDelete={handleDeleteEvent} />
                    )}

                    {/* MODAL CẤU HÌNH MÀU SẮC GIAO DIỆN & BẢO MẬT HỆ THỐNG */}
                    {showSettings && (
                        <SettingsModal theme={theme} onSave={handleSaveTheme} onClose={() => setShowSettings(false)} auth={auth} db={db} appId={MANUAL_CONFIG.projectId} />
                    )}

                    {/* MENU THANH NAVIGATOR ĐIỀU HƯỚNG TAB CHÂN TRANG FOOTER */}
                    <footer className="bg-white border-t border-gray-200 p-1 flex justify-around items-center shrink-0 z-20 shadow-inner">
                        <button onClick={() => handleTabChangeWithLock('day')} className={`flex flex-col items-center gap-0.5 py-1.5 px-2 rounded-xl transition-all ${activeTab === 'day' ? 'text-blue-600 font-black scale-105' : 'text-gray-400 hover:text-gray-600'}`}>
                            <Sun size={20} className={activeTab === 'day' ? 'stroke-[2.5]' : 'stroke-[1.8]'} />
                            <span className="text-[9px] uppercase tracking-wider">Hôm nay</span>
                        </button>
                        <button onClick={() => handleTabChangeWithLock('calendar')} className={`flex flex-col items-center gap-0.5 py-1.5 px-2 rounded-xl transition-all ${activeTab === 'calendar' ? 'text-blue-600 font-black scale-105' : 'text-gray-400 hover:text-gray-600'}`}>
                            <Calendar size={20} className={activeTab === 'calendar' ? 'stroke-[2.5]' : 'stroke-[1.8]'} />
                            <span className="text-[9px] uppercase tracking-wider">Lịch tháng</span>
                        </button>
                        <button onClick={() => handleTabChangeWithLock('todo')} className={`flex flex-col items-center gap-0.5 py-1.5 px-2 rounded-xl transition-all ${activeTab === 'todo' ? 'text-blue-600 font-black scale-105' : 'text-gray-400 hover:text-gray-600'}`}>
                            <CheckSquare size={20} className={activeTab === 'todo' ? 'stroke-[2.5]' : 'stroke-[1.8]'} />
                            <span className="text-[9px] uppercase tracking-wider">Việc cần</span>
                        </button>
                        <button onClick={() => handleTabChangeWithLock('notes')} className={`flex flex-col items-center gap-0.5 py-1.5 px-2 rounded-xl transition-all ${activeTab === 'notes' ? 'text-blue-600 font-black scale-105' : 'text-gray-400 hover:text-gray-600'}`}>
                            <StickyNote size={20} className={activeTab === 'notes' ? 'stroke-[2.5]' : 'stroke-[1.8]'} />
                            <span className="text-[9px] uppercase tracking-wider">Ghi chú</span>
                        </button>
                        <button onClick={() => handleTabChangeWithLock('timetable')} className={`flex flex-col items-center gap-0.5 py-1.5 px-2 rounded-xl transition-all ${activeTab === 'timetable' ? 'text-blue-600 font-black scale-105' : 'text-gray-400 hover:text-gray-600'}`}>
                            <Table size={20} className={activeTab === 'timetable' ? 'stroke-[2.5]' : 'stroke-[1.8]'} />
                            <span className="text-[9px] uppercase tracking-wider">Thời khóa</span>
                        </button>
                    </footer>

                    {/* TOAST CONTAINER CONTAINER HIỂN THỊ ĐỘNG THÔNG BÁO TRÊN ĐẦU TRANG */}
                    <ToastContainer 
                        position="top-center"
                        autoClose={3000}
                        hideProgressBar={false}
                        newestOnTop={false}
                        closeOnClick
                        rtl={false}
                    />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
