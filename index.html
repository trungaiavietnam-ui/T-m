            "Việc làm của bản thân ta\nDo tâm, do ý tạo ra, dẫn đầu\nNói năng, hành động trước sau\nÝ mà thanh tịnh: dạt dào niềm vui\nVà bao hạnh phúc trên đời\nTheo ta như bóng khắp nơi theo hình.",

            "Ai bỏ được hận thù bị hại:\n“Nó đánh tôi và chửi mắng tôi”\n“Thắng tôi, cướp đoạt của tôi”\nHận thù tan biến, nguôi ngoai cõi lòng.",

            "Trong kiếp sống ai ngờ cái chết\nRình rập ta chẳng sót mảy may\nNgười nào giác ngộ điều này\nHơn thua, tranh chấp... dứt ngay tức thì.",

            "Người như thế bị ma đánh bại\nUống ăn thoải mái quay cuồng\nCấu giống như gió thổi ngã cây.\nKhổ đau, bất lực nào hay\nĐều do buông thả, đắm say sắc trần.",
            "Không nhiễm đắm, quán thân nhơ uế\nGiữ gìn tâm, làm chủ giác quan\nUống ăn tiết độ, siêng năng\nVững vàng như núi trước ngàn bão giông.",
            "Dù khoát áo cà-sa đĩnh đạc\nMà tâm còn uế trược tham, sân\nSống không chân thật, buông lung\nLàm sao xứng hạnh sa-môn sáng ngời?",
            "AI giải phóng tham, sân, trược uế\nSống thanh cao, giữ giới nghiêm minh\nChánh chân, làm chủ được mình\nNgười tu như thế thật tình đáng khen.",

            "“Cái chân thật thì cho chân thật\nKhông chân thì khẳng định không chân”\nChánh tư, chánh hạnh làm nhân\nNhờ vậy đạt được chánh chân trong đời.",
            "Nhà vụng lợp có nhiều lỗ dột\nMột trận mưa làm ướt tả tơi.\nNgười không tu tập, mải chơi\nDục tham xâm nhập, cả đời khổ đau.",
            "Nhà lợp khéo, chỗ nào cũng kín\nNhiều mưa to chẳng ảnh hưởng chi.\nVới người tinh tấn tu trì\nDục tham dứt sạch, có gì phải lo?",
            "Kiếp này khổ, kiếp sau càng khổ\nKẻ ác gian chịu khổ hai đời\nQuả sầu đeo bám khôn nguôi,\nNhớ ác, day dứt khó rời khỏi ta.",
            "Kiếp này sướng, kiếp sau càng sướng\nNgười đức cao được hưởng phước vui\nThiện nhân trổ quả còn hoài\nNhớ thiện, an lạc tràn đầy trong tâm.",
            "Kiếp này khổ, kiếp sau than khổ\nGieo ác nhân phải khổ hai đời\nLương tâm dằn vặt tơi bời\nRơi vào cõi dữ, than hoài chẳng xong.",
            "Kiếp sướng, kiếp sau càng sướng\nLàm phúc thì sung sướng hai đời\nPhúc do làm thiện tuyệt vời\nSanh về cõi thiện, thảnh thơi lâu dài.",
            "Làu thông cả kho kinh sâu sắc\nKhông thực hành, phóng dật ích chi?\nKhác gì như kẻ làm thuê\nChăn bò cho chủ, có gì của ta?",
            "Người nói ít nhưng hành miên mật\nBỏ tham, sân; tỉnh giác, thong dong\nHai đời dính mắc không còn\nNgười này xứng hạnh sa-môn sáng ngời.",
            "Không phóng dật là con đường sống\nKẻ buông lung làm hỏng cuộc đời.\nKhông còn phóng dật, sáng ngời\nBuông lung như kẻ chết rồi, ích chi.",

            "Sống tinh tấn giữa người phóng đãng\nTỉnh thức luôn bên cạnh kẻ say\nTrí nhân như ngựa khéo nài\nBỏ xa ngựa yếu cả bầy sau lưng.",
            "Như Đế Thích do tu tinh tấn\nKhi tái sanh làm chủ cõi thiên\nKhông còn phóng dật được khen.\nĐời hay chỉ trích kẻ ghiền buông lung.",
            "Tâm luôn thích niềm vui tinh tấn\nSợ buông lung phá hạnh thanh cao\nTu theo pháp Phật nhiệm mầu\nĐốt tiêu trói buộc, sầu đau bao đời.",
            "Tâm luôn thích niềm vui tinh tấn\nSợ buông lung phá hạnh thanh cao\nTu theo pháp Phật nhiệm mầu\nNiết-bàn sẽ chứng, khổ sầu lánh xa.",
            "Tâm dao động, sầu lo, sợ hãi\nKhó giữ gìn, vùng vẫy theo duyên.\nTrí nhân làm thẳng tâm này\nNhư người thợ khéo uốn tên thẳng hàng.",
            "Như tôm cá vất ngoài thủy giới\nLuôn vẫy vùng hướng tới nước nguồn\nTâm tu vẫy mạnh thoát trần\nQuyết lòng dẹp sạch Ma quân não phiền.",
            "Tâm phàm tục chuyền cành như khỉ\nTheo thú vui thành thị, xóm làng.\nLành thay, làm chủ được tâm\nGiữ tâm định tĩnh, bình an lâu dài.",
            "Tâm vi tế, khó nhìn, khó thấy\nTheo dục tham, thoải mái quay cuồng\nTrí nhân làm chủ được tâm\nNiềm vui nội tại phủ trùm khắp nơi.",
            "Đâu cần phải chạy xa, sống ẩn\nVào hang sâu, hóa hiện không thân.\nChi bằng điều phục được tâm\nVượt qua trói buộc của ngàn Ma quân.",
            "Đối với kẻ tâm không an trụ\nPháp nhiệm mầu khó tỏ nguồn khơi\nNiềm tin rúng động ,chơi vơi\nCòn nguồn trí tuệ rạng ngời khó thông.",
            "Khi tâm thoát dục tham, vướng mắc\nBuông hận thù, ganh ghét, hờn ghen\nAn toàn tuyệt đối trước sau,\nVượt trên thiện ác nhị nguyên\nXứng hàng tỉnh thức, không còn sầu lo.",
            "Thân năm uẩn như sành dễ bể\nGiữ gìn tâm như thể thành trì\nVung gươm trí tuệ diệt si\nThắng Ma quân xấu, chớ vì vinh quang.",
            "Thân vô thường, chẳng bao lâu nữa\nNằm vô tri trong cỗ quan tài\nKhi tâm thoát khỏi thân này\nThân như khúc gỗ chẳng xài vào đâu.",
            "Người ác độc diệt trừ đối thủ\nKẻ oan gia trả đũa oan gia\nKhông bằng tâm ác hại ta\nTrầm luân muôn kiếp, đường tà lún sâu.",
            "Cha mẹ muốn cho con hưởng phước\nThương cỡ nào, chẳng được dài lâu\nTâm lành, nhân tốt gieo sâu\nTự mình tạo dựng, quả mau lớn dần.",
            "Ai chinh phục địa cầu, thiên giới\nVượt lên trên cả cõi Diêm-ma\nSao bằng ngộ pháp Phật-đà\nNhư người khéo kết tràng hoa đẹp màu.",
            "Bậc hữu học vượt qua trời đất\nVượt lên trên cả cõi Diêm-ma\nLại thông chánh pháp Phật-đà\nNhư người khéo kết tràng hoa đẹp màu.",
            "Khi tỏ ngộ thân như bọt nước\nẢo ảnh như điện chớp trên không\nBẻ tan tên của Ma quân\nVượt tầm thần chết hàng ngàn dặm xa.",
            "Dùng vũ khí, gậy dao đánh đập\nHành hạ người, trù dập tơi bời\nQuả sầu mười loại sau đây:\nMột là đau nhức đêm ngày rên la;",
            "Hai, tai biến; ba là thương tật;\nBốn, độn căn, ngu ngốc, hay quên;\nNăm thường lận đận luật quan;\nSáu vương trọng tội bị oan, hiểu lầm.",
            "Bảy, thân quyến, họ hàng ly tán\nTám, chẳng may tài sản tiêu tan\nChín là hỏa hoạn, nghèo nàn\nMười sau khi chết đọa làm súc sinh.",
            "Dù lõa thể, ngồi lì, tuyệt thực;\nKhông gội đầu, bện tóc rối tung…\nĐừng hòng chuyển hóa tâm hồn\nNếu tâm nghi hoặc vẫn còn y nguyên.",
            "Sống trang sức bằng nguồn an tịnh\nĐiều phục tâm, giới hạnh, kiên trì\nThương người, mến vật, từ bi\nSa-môn, phạm chí sánh vì trời cao.",
            "Trong trời đất hiếm người chính niệm,\nBiết giữ mình, hổ thẹn, lương tâm\nTránh lời chỉ trích, chửi thầm\nCũng như ngựa giỏi chẳng cần phạt roi.",
            "Như ngựa quý chẳng cần roi chạm\nSống nhiệt tâm, dũng cảm, chuyên cần\nVững tin, giới đức, thiền hành\nChọn tìm giáo pháp, thấm nhuần lý chân.",
            "Gìn chính niệm, cùng Minh Hạnh túc\nNêu quyết tâm tam độc loại trừ,\nKhổ đau kết thúc, thản thư\nNgười này xứng bậc chân tu trên đời.",
            "Như thủy lợi làm kênh dẫn nước\nKẻ làm tên nắn vuốt cung tên\nThợ cây bào ván hai bên\nNgười khôn làm chủ bản thân đêm ngày.",
            "Cười sao được, sướng vui sao nổi\nKhi lửa tham cháy rụi thế gian\nTối tăm giăng phủ trời đêm\nSao không nỗ lực tìm đèn sáng soi?",
            "Thân bề ngoài, đẹp đầy nhựa sống\nỞ bên trong, một đống vết thương\nGây sầu, sao lại vấn vương?\nThân là giả tạm, vô thường, mong manh.",
            "Thân mấy chốc đã già, tàn tạ\nNơi chứa đầy bệnh khổ, hôi tanh\nVô thường tổ hợp mong manh\nChết là kết thúc, tái sanh hồng trần.",
            "Thân thể này màu bồ câu trắng\nNhư trái bầu, thu đến vứt đi.\nChết rồi thi thể gớm ghê\nCó gì vui thích, mải mê thân này?",
            "Ôi, thân thể như thành trì cổ\nDựng bằng xương, máu đỏ, thịt, gân\nChứa già, chết, bệnh từng phần\nCống cao, lừa dối; dáng duyên nỗi gì!",
            "Xe vua đẹp có ngày cũng cũ\nThân thể rồi u rũ, tàn phai\nPháp lành trẻ mãi, còn hoài\nHãy nên khắc cốt những lời thánh nhân.",
            "Trẻ ít học, già không hiểu biết\nChẳng khác gì bò đực lớn đầu\nThân to, cơ bắp, khỏe, mau\nNhưng không trí tuệ, khác nào bóng đêm?",
            "Lang thang suốt luân hồi bao kiếp\nQuyết đi tìm “ông xếp” xây nhà\nTìm hoài, tìm mãi, không ra\nTái sanh, khổ lụy, đọa sa ba đường.",
            "Nay ta cấm ngươi không xây nữa\nPhá cột kèo, ván cửa, rui mè…\nNay ta đã chứng niết-bàn\nÁi tham, chấp thủ tiêu tan hết rồi.",
            "Lúc còn trẻ chẳng màng đạo đức\nKhông học nghề, tự lập lo thân\nĐến già gặp phải khó khăn\nNhư cò ủ rũ, không còn cá tôm.",
            "Có người trẻ chẳng rèn đức hạnh\nKhông luyện nghề, không lãnh tiền lương\nKhi già, buồn tủi, sầu vương\nNhớ về dĩ vãng, thở than vắn dài.",
            "Người đánh giá bản thân là quý\nPhải chính tâm bảo vệ lấy mình\nNgày đêm người trí giữ gìn\nLuôn trong tỉnh thức, tịnh minh cõi lòng.",
            "Người trí tuệ bản thân vững chải\nTự chủ mình, hoàn thiện, chánh chân\nXong rồi, giáo hóa tha nhân\nSống trong gương mẫu, thế gian nể vì.",
            "Người gương mẫu thực hành hoàn tất\nMới đem ra giáo dục thế nhân\nTự mình làm chủ thân tâm\nSoi gương nhân cách, hạnh lành truyền trao.",
            "Người sáng suốt tự nương mình vững\nKhông tìm cầu, dựa dẫm vào ai\nLành thay, điều phục tâm này\nBiết tự điều phục, không hai trên đời.",
            "Các điều ác do mình tạo tác\nÁc do tâm, ai khác ngoài ta\nÁc nhân nghiền nát người tà\nNhư kim cương cứng nghiền qua đá thường.",
            "Như tầm gửi bám cây Phật pháp\nNgười buông lung giới đức chẳng gìn\nHạnh tà chuốc họa vào thân,\nKẻ thù sung sướng thấy mình tiêu tan.",
            "Làm điều ác không cần trình độ\nHãm hại ta đạo khổ dễ hơn\nKhó thay, làm thiện chánh chơn\nMình người lợi lạc, bình an cõi đời.",
            "Kẻ ác kiến ngu si, phỉ báng\nGiáo pháp hàng La-hán nhiệm mầu\nHại mình như ngọn trúc lau\nNgay khi trổ quả nhuốm màu diệt vong.",
            "Các điều ác do mình tự tạo\nRồi vướng vào khổ não, họa tai.\nĐiều lành ta tạo hôm nay\nQuả an vui đến sớm mai là thường.",
            "Nên hiểu rõ sạch trong, nhơ uế\nHành động do gốc rễ từ tâm\nCậy nhờ tha lực khó thành\nĐỗ lỗi “tại, bởi” sao đành, không nên.",
            "Dù phụng sự, vị tha thiết thực\nXin chớ quên thực tập lợi mình\nChuyên tâm học pháp cao minh\nHướng về giải thoát, đạt thành mới thôi.",
            "Người sáng suốt chớ ôm tà kiến\nSống buông lung, ti tiện qua ngày.\nNệp tà vạy, chớ kéo dài\nĐược vầy, sinh tử luân hồi sớm ra.",
            "Luôn tinh tấn không mê lạc thú\nHạnh thanh cao, tu sĩ thường ghi\nTrang nghiêm giới đức, hành trì\nHai đời hưởng phúc chỉ vì tu tâm.",
            "Hãy quán tưởng trong đời trần tục\nMọi thứ như bọt nước, huyễn vong.\nĐến khi ngộ lẽ vô thường\nTử thần không thể lần đường chân nhân.",
            "Cõi hồng trần đẹp tuồng ảo mộng\nNhư xe vua hoành tráng gấm thêu\nKẻ ngu tham đắm, chắt chiêu\nNgười khôn tỉnh thức, chẳng yêu nhiễm đời.",
            "Dù quá khứ buông lung, dục lạc\nNhưng về sau tỉnh thức, chuyển tâm\nLàm lành, tỏa sáng trần gian\nNhư trăng rằm chiếu, không còn mây che.",
            "Dù ngày trước gây bao tội lỗi\nNhưng hôm nay sám hối, hồi tâm\nLàm lành, tỏa sáng trần gian\nNhư trăng rằm chiếu, không còn mây che.",
            "Kẻ mù tối, thế gian đầy dẫy\nNgười sáng trong có mấy trên đời!\nNhư chim khôn chẳng vướng mồi\nNgười tu đạo đức an vui cõi trời.",
            "Như trời thẳm, thiên nga uốn lượn\nCó thần thông ẩn hiện không gian\nTrí nhân thoát chốn hồng trần\nVượt qua ma chướng, vững vàng đường tu.",
            "With những kẻ chẳng tôn trọng Pháp\nDùng vọng ngôn lừa lọc, rêu rao\nGhét thiện, bác bỏ đời sau...\nLún sâu đường ác, ngày nào vượt ra!",
            "Kẻ keo kiệt không sanh thiên giới\nNgười dại ngu chẳng đoái tình thương\nNgười hiền thích sống thiện lương\nĐời sau hưởng phúc khác thường thế nhân.",
            "Chứng sơ quả thánh nhân rạng rỡ\nHơn cõi trời Thiên chủ uy quyền\nHơn Trời trong chốn càn khôn\nKhó tìm trong cõi bụi hồng người hơn.",
            "Phật chiến thắng hoàn toàn cõi trược\nTham ái trừ, tuệ giác sâu ngần\nKhông lưu dấu vết trần gian\nĐố ai vẽ được bước chân vượt đời.",
            "Bậc giải thoát lưới tham, á dục\nHết tái sanh, tuệ giác sâu ngần\nKhông lưu dấu vết trần gian\nĐố ai vẽ được bước chân vượt đời.",
            "Người có trí thiền hành, tinh tấn\nTìm niềm vui trong hạnh viễn ly\nĐêm ngày tỉnh thức luôn khi\nTrời người kính trọng, sánh vì trăng sao.",
            "Thật hạnh phúc, làm người nhân đức\nQuả khó thay, sống thật tịnh thanh\nKhó thay, nghe pháp, thực hành\nKhó thay, gặp Phật chứng thành quả cao.",
            "Mọi hoàn cảnh không làm bất thiện\nDù khó khăn, phát triển nhân lành\nLuyện tâm, rèn ý tịnh thanh\nLà lời Phật dạy đành rành xưa nay.",
            "Tu nhẫn nhục: Khổ hành đáng quý\nĐạt niết-bàn: Quả vị tối cao\nChúng sinh: Chẳng hại tơ hào\nHạnh sa-môn ấy cao sâu khó bàn.",
            "Không phỉ báng, không làm thương tổn\nLàm chủ mình, giới bổn vẹn toàn\nĐoạn điệu ăn uống, định thiền\nSống đời an tịnh, không phiền một ai.",
            "Dù mưa rãi bạc vàng chưa thỏa\nLòng dục tham không đáy xưa nay\nTrí nhân hiệu rõ điều này\nKhổ nhiều, vui ít, không sai bao giờ.",
            "Ngộ lẽ ấy, người tu học Phật\nChẳng đam mê dục lạc người, trời\nQuyết lòng chuyển hóa, thảnh thơi\nKhông còn tham ái, rạng ngời nhân gian.",
            "Trong nguy khổ, người tìm nương tựa\nHoặc thần linh, rừng rú, non cao,\nMiếu, đình, cây, vật, hang sâu,\nVái van, hiến tế, mong sao an lành.",
            "Nương tựa ấy hoàn toàn vô bổ\nTìm loanh quanh, nhiều chỗ bất an\nKhổ đau còn đó, chưa tan\nChỉ do mê tín, chẳng thành tựu chi.",
            "Người có phước, tìm về Tam bảo\nPhật, Pháp, Tăng quý báu khó hơn\nKhó khăn, bất hạnh tựa nương\nDùng Bốn chân lý làm phương thoát nàn.",
            "Thấy đau khổ, nguyên nhân gây khổ\nThấy Niết-bàn, thánh lộ tám ngành\nĐưa người đến chốn bình an\nKhông còn bất hạnh, trần gian muộn phiền.",
            "Nương tựa ấy tạo nên quả phước\nNguồn tâm linh, thể đạt an vui\nNgười khôn nương tựa đời đời\nVẫy chào đau khổ, thảnh thơi cuộc đời.",
            "Bậc trí tuệ vun bồi giới đức\nTìm khắp nơi hiếm được một người\nChỗ nào có bậc trí tài\nXóm làng hạnh phúc, cuộc đời bình An.",
            "Ôi hạnh phúc, Như Lai thị hiện\nPháp cao siêu lăn chuyển khắp nơi\nTăng đoàn hòa hợp đạo đời\nBốn hàng đệ tử cùng vui tu hành.",
            "Biết lễ kính những người đáng kính\nPhật, thánh hiền đức hạnh thanh cao\nNhững người chướng ngại sạch làu\nNhỏ phiền dứt sạch, khổ đau giã từ.",
            "Nhờ cung kính chân tu quảng đại\nBậc tịnh an, tự tại thấy nghe,\nKhông còn sợ hãi, sầu, mê,\nPhước lành mỹ mãn đề huề bên ta.",
            "Phúc thay sống giữa người thù hận\nLòng thảnh thơi, chẳng giận hờn ai\nLành thay, sống giữa chua cay\nKhông hề oán hận, nguôi ngoai cõi lòng.",
            "Phúc thay sống giữa người đau bệnh\nChẳng hề chi, khỏe mạnh tấm thân,\nLành thay, sống giữa nguy nan\nBình an, vô sự, an toàn trước sau.",
            "Phúc thay sống giữa người khát dục\nLòng dửng dưng, gạn đục khơi trong.\nLành thay, sống giữa vô thường\nLòng không ham muốn, không vương khổ sầu.",
            "Phúc thay sống giữa người chấp hữu\nGìn vô tham, vô ngã, không sầu.\nCõi lòng an lạc vô cầu\nVui như thiên giới đứng đầu Quan Âm.",
            "Người chiến thắng thường gây thù oán\nKẻ bại thua uất hận khổ đau.\nVui thay, hòa hợp trước sau,\nBỏ qua thắng bại, dâng trào niềm vui.",
            "Trong các lửa, dục tham số một\nCòn tâm sân vượt trội quân ma,\nKhổ nào sánh kịp chấp “ta”\nNiết-bàn tối thượng thật là lạc an.",
            "Cơn đói khát chính là bệnh dữ\nChấp cái ta, bệnh khổ nhiều hơn.\nVượt qua bỉ thử, ngã nhơn\nNiết-bàn chứng đắc, cát tường an vui.",
            "Có sức khỏe còn hơn tặng phẩm\nBiết đủ là tài sản tối cao\nChân tình là bạn tâm giao\nNiết-bàn số một, phúc nào sánh hơn!",

        // --- HÀM HỖ TRỢ ---
        const formatDateTimeForInput = (date) => {
            if (!date) return '';
            const d = new Date(date);
            const pad = (n) => n.toString().padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        };

        const formatDisplayDate = (seconds) => {
            if (!seconds) return '';
            return new Date(seconds * 1000).toLocaleString('vi-VN', { hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
        };

        const getRemainingTime = (timestamp) => {
            if (!timestamp) return null;
            const now = new Date();
            const deadline = new Date(timestamp.seconds * 1000);
            const diff = deadline - now;
            if (diff < 0) {
                const overdueDays = Math.floor(Math.abs(diff) / (1000 * 60 * 60 * 24));
                const overdueHours = Math.floor((Math.abs(diff) % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let text = "Quá hạn ";
                if (overdueDays > 0) text += `${overdueDays} ngày`;
                else text += `${overdueHours} giờ`;
                return { text: text, isOverdue: true };
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            if (days > 0) return { text: `Còn ${days} ngày, ${hours} giờ`, isOverdue: false };
            if (hours > 0) return { text: `Còn ${hours} giờ, ${minutes} phút`, isOverdue: false };
            return { text: 'Sắp đến hạn', isOverdue: false };
        };

        // ==================================================================================
        // THUẬT TOÁN CHUYỂN ĐỔI DƯƠNG LỊCH SANG ÂM LỊCH VIỆT NAM (dựa trên múi giờ UTC+7)
        // Nguyên lý: xác định các điểm Sóc (New Moon - thời điểm trăng non) và kinh độ Mặt Trời
        // theo tọa độ thiên văn, quy đổi mọi mốc thời gian về múi giờ Việt Nam (UTC+7) để
        // tính đúng ngày bắt đầu tháng Âm lịch và năm nhuận theo quy ước lịch Việt Nam.
        // ==================================================================================
        const VN_TIMEZONE = 7; // Việt Nam sử dụng múi giờ UTC+7 làm chuẩn tính lịch Âm

        // Quy đổi ngày Dương lịch (dd/mm/yyyy) sang số ngày Julius (Julian Day Number)
        const jdFromDate = (dd, mm, yy) => {
            const a = Math.floor((14 - mm) / 12);
            const y = yy + 4800 - a;
            const m = mm + 12 * a - 3;
            let jd = dd + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4)
                - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
            if (jd < 2299161) {
                jd = dd + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4) - 32083;
            }
            return jd;
        };

        // Tính kinh độ Mặt Trời (đơn vị: cung 30 độ, 0-11) tại thời điểm jdn, quy theo múi giờ
        const getSunLongitude = (jdn, timeZone) => {
            const T = (jdn - 2451545.5 - timeZone / 24) / 36525;
            const T2 = T * T;
            const dr = Math.PI / 180;
            const M = 357.52910 + 35999.05030 * T - 0.0001559 * T2 - 0.00000048 * T * T2;
            const L0 = 280.46645 + 36000.76983 * T + 0.0003032 * T2;
            let DL = (1.914600 - 0.004817 * T - 0.000014 * T2) * Math.sin(dr * M);
            DL += (0.019993 - 0.000101 * T) * Math.sin(dr * 2 * M) + 0.000290 * Math.sin(dr * 3 * M);
            let L = (L0 + DL) * dr;
            L -= Math.PI * 2 * Math.floor(L / (Math.PI * 2));
            return Math.floor((L / Math.PI) * 6);
        };

        // Tính thời điểm Sóc (New Moon) lần thứ k kể từ mốc gốc, trả về số ngày Julius quy theo múi giờ
        const getNewMoonDay = (k, timeZone) => {
            const T = k / 1236.85;
            const T2 = T * T;
            const T3 = T2 * T;
            const dr = Math.PI / 180;
            let jd1 = 2415020.75933 + 29.53058868 * k + 0.0001178 * T2 - 0.000000155 * T3;
            jd1 += 0.00033 * Math.sin((166.56 + 132.87 * T - 0.009173 * T2) * dr);
            const M = 359.2242 + 29.10535608 * k - 0.0000333 * T2 - 0.00000347 * T3;
            const Mpr = 306.0253 + 385.81691806 * k + 0.0107306 * T2 + 0.00001236 * T3;
            const F = 21.2964 + 390.67050646 * k - 0.0016528 * T2 - 0.00000239 * T3;
            let C1 = (0.1734 - 0.000393 * T) * Math.sin(M * dr) + 0.0021 * Math.sin(2 * dr * M);
            C1 -= 0.4068 * Math.sin(Mpr * dr) + 0.0161 * Math.sin(dr * 2 * Mpr);
            C1 -= 0.0004 * Math.sin(dr * 3 * Mpr);
            C1 += 0.0104 * Math.sin(dr * 2 * F) - 0.0051 * Math.sin(dr * (M + Mpr));
            C1 -= 0.0074 * Math.sin(dr * (M - Mpr)) + 0.0004 * Math.sin(dr * (2 * F + M));
            C1 -= 0.0004 * Math.sin(dr * (2 * F - M)) - 0.0006 * Math.sin(dr * (2 * F + Mpr));
            C1 += 0.0010 * Math.sin(dr * (2 * F - Mpr)) + 0.0005 * Math.sin(dr * (2 * Mpr + M));
            let deltaT;
            if (T < -11) {
                deltaT = 0.001 + 0.000839 * T + 0.0002261 * T2 - 0.00000845 * T3 - 0.000000081 * T * T3;
            } else {
                deltaT = -0.000278 + 0.000265 * T + 0.000262 * T2;
            }
            const jdNew = jd1 + C1 - deltaT;
            return Math.floor(jdNew + 0.5 + timeZone / 24);
        };

        // Tìm ngày (Julius) mà tháng 11 Âm lịch của năm yy bắt đầu (dùng làm mốc quy chiếu năm Âm lịch)
        const getLunarMonth11 = (yy, timeZone) => {
            const off = jdFromDate(31, 12, yy) - 2415021;
            const k = Math.floor(off / 29.530588853);
            let nm = getNewMoonDay(k, timeZone);
            if (getSunLongitude(nm, timeZone) >= 9) {
                nm = getNewMoonDay(k - 1, timeZone);
            }
            return nm;
        };

        // Xác định tháng nhuận (nếu năm Âm lịch có 13 tháng) rơi vào vị trí thứ mấy
        const getLeapMonthOffset = (a11, timeZone) => {
            const k = Math.floor((a11 - 2415021.076998695) / 29.530588853 + 0.5);
            let last = getSunLongitude(getNewMoonDay(k + 1, timeZone), timeZone);
            let i = 1;
            let arc = last;
            do {
                i++;
                last = arc;
                arc = getSunLongitude(getNewMoonDay(k + i, timeZone), timeZone);
            } while (arc !== last && i < 14);
            return i - 1;
        };

        // HÀM CHÍNH: chuyển một ngày Dương lịch (dd/mm/yyyy) sang ngày Âm lịch Việt Nam
        // Trả về { day, month, year, leap } — leap = true nếu rơi vào tháng nhuận
        const convertSolar2Lunar = (dd, mm, yy, timeZone = VN_TIMEZONE) => {
            const dayNumber = jdFromDate(dd, mm, yy);
            const k = Math.floor((dayNumber - 2415021.076998695) / 29.530588853);
            let monthStart = getNewMoonDay(k + 1, timeZone);
            if (monthStart > dayNumber) monthStart = getNewMoonDay(k, timeZone);

            let a11 = getLunarMonth11(yy, timeZone);
            let b11 = a11;
            let lunarYear;
            if (a11 >= monthStart) {
                lunarYear = yy;
                a11 = getLunarMonth11(yy - 1, timeZone);
            } else {
                lunarYear = yy + 1;
                b11 = getLunarMonth11(yy + 1, timeZone);
            }

            const lunarDay = dayNumber - monthStart + 1;
            const diff = Math.floor((monthStart - a11) / 29);
            let lunarLeap = false;
            let lunarMonth = diff + 11;

            if (b11 - a11 > 365) {
                const leapMonthOff = getLeapMonthOffset(a11, timeZone);
                if (diff >= leapMonthOff) {
                    lunarMonth = diff + 10;
                    if (diff === leapMonthOff) lunarLeap = true;
                }
            }
            if (lunarMonth > 12) lunarMonth -= 12;
            if (lunarMonth >= 11 && diff < 4) lunarYear -= 1;

            return { day: lunarDay, month: lunarMonth, year: lunarYear, leap: lunarLeap };
        };

        // Quy đổi một đối tượng Date bất kỳ (theo giờ máy người dùng) về đúng ngày/tháng/năm
        // theo múi giờ UTC+7 của Việt Nam, để đảm bảo tính Âm lịch luôn chính xác dù người dùng ở múi giờ khác
        // Nguyên lý: date.getTime() luôn là mốc thời gian UTC tuyệt đối (bất kể múi giờ máy đang đặt là gì),
        // nên chỉ cần cộng thêm đúng 7 giờ rồi đọc lại bằng các hàm getUTC... để có ngày/giờ theo giờ Việt Nam.
        const toVNDateParts = (date) => {
            const vnMs = date.getTime() + VN_TIMEZONE * 3600000;
            const vnDate = new Date(vnMs);
            return { dd: vnDate.getUTCDate(), mm: vnDate.getUTCMonth() + 1, yy: vnDate.getUTCFullYear() };
        };
        // ==================== KẾT THÚC THUẬT TOÁN CHUYỂN ĐỔI ÂM LỊCH VIỆT NAM ====================

        const getLunarDate = (date) => {
            try {
                const { dd, mm, yy } = toVNDateParts(date);
                const lunar = convertSolar2Lunar(dd, mm, yy, VN_TIMEZONE);
                return `${lunar.day}/${lunar.month}${lunar.leap ? ' (nhuận)' : ''}`;
            } catch (e) { return ''; }
        };

        const getLunarDetails = (date) => {
            try {
                const { dd, mm, yy } = toVNDateParts(date);
                return convertSolar2Lunar(dd, mm, yy, VN_TIMEZONE);
            } catch (e) { return { day: 0, month: 0, year: 0, leap: false }; }
        };

        const getDayOfWeek = (date) => {
            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            return days[date.getDay()];
        };

        // START: Danh sách ngày lễ, ngày Tết (Dương lịch & Âm lịch) kèm lời chúc
        // Key dương lịch: "ngày-tháng" theo lịch Dương
        const SOLAR_HOLIDAYS = {
            '1-1':   { name: 'Tết Dương Lịch',            greeting: 'Chúc bạn năm mới an khang, thịnh vượng, vạn sự như ý!' },
            '14-2':  { name: 'Lễ Valentine',               greeting: 'Chúc bạn một ngày lễ tình yêu ngập tràn hạnh phúc!' },
            '8-3':   { name: 'Quốc tế Phụ nữ',             greeting: 'Chúc các chị em phụ nữ luôn xinh đẹp, hạnh phúc và thành công!' },
            '30-4':  { name: 'Giải Phóng Miền Nam',        greeting: 'Chào mừng ngày Giải phóng miền Nam, thống nhất đất nước!' },
            '1-5':   { name: 'Quốc tế Lao Động',           greeting: 'Chúc bạn ngày Quốc tế Lao động thật nhiều ý nghĩa!' },
            '19-5':  { name: 'Sinh nhật Bác Hồ',            greeting: 'Kỷ niệm ngày sinh Chủ tịch Hồ Chí Minh vĩ đại!' },
            '1-6':   { name: 'Quốc tế Thiếu Nhi',           greeting: 'Chúc các em thiếu nhi một ngày thật vui vẻ và hạnh phúc!' },
            '27-7':  { name: 'Thương Binh Liệt Sĩ',        greeting: 'Đời đời nhớ ơn các anh hùng thương binh, liệt sĩ!' },
            '2-9':   { name: 'Quốc Khánh Việt Nam',        greeting: 'Chúc mừng ngày Quốc Khánh nước Cộng hòa Xã hội Chủ nghĩa Việt Nam!' },
            '20-10': { name: 'Phụ Nữ Việt Nam',            greeting: 'Chúc mừng ngày Phụ nữ Việt Nam, chúc các chị em luôn rạng ngời!' },
            '20-11': { name: 'Nhà Giáo Việt Nam',           greeting: 'Chúc mừng ngày Nhà giáo Việt Nam, tôn sư trọng đạo!' },
            '22-12': { name: 'Quân Đội Nhân Dân VN',        greeting: 'Chúc mừng ngày thành lập Quân đội Nhân dân Việt Nam!' },
            '24-12': { name: 'Đêm Giáng Sinh',              greeting: 'Chúc bạn một đêm Noel an lành và ấm áp!' },
            '25-12': { name: 'Giáng Sinh',                  greeting: 'Merry Christmas! Chúc bạn mùa Giáng Sinh hạnh phúc, bình an!' },
        };

        // Key âm lịch: "ngày-tháng" theo lịch Âm
        const LUNAR_HOLIDAYS = {
            '1-1':   { name: 'Tết Nguyên Đán',   greeting: 'Chúc mừng năm mới! An khang thịnh vượng, vạn sự như ý!' },
            '2-1':   { name: 'Mùng 2 Tết',        greeting: 'Chúc bạn những ngày Tết thật nhiều may mắn và sum vầy!' },
            '3-1':   { name: 'Mùng 3 Tết',        greeting: 'Chúc bạn năm mới sức khỏe, bình an, vạn sự hanh thông!' },
            '15-1':  { name: 'Rằm Tháng Giêng',    greeting: 'Chúc bạn Rằm tháng Giêng bình an và nhiều may mắn!' },
            '3-3':   { name: 'Tết Hàn Thực',       greeting: 'Chúc bạn Tết Hàn Thực ấm cúng, an lành bên gia đình!' },
            '10-3':  { name: 'Giỗ Tổ Hùng Vương', greeting: 'Tưởng nhớ công ơn các Vua Hùng đã có công dựng nước!' },
            '5-5':   { name: 'Tết Đoan Ngọ',       greeting: 'Chúc bạn Tết Đoan Ngọ nhiều sức khỏe và bình an!' },
            '15-7':  { name: 'Lễ Vu Lan',          greeting: 'Mùa Vu Lan báo hiếu, chúc bạn luôn nhớ ơn sinh thành!' },
            '15-8':  { name: 'Tết Trung Thu',      greeting: 'Chúc bạn Trung Thu đoàn viên, ấm áp và hạnh phúc!' },
            '23-12': { name: 'Tết Táo Quân',       greeting: 'Chúc bạn ngày Tết Táo Quân ấm cúng và sum vầy!' },
        };

        // Trả về thông tin ngày lễ (nếu có) cho một ngày cụ thể, ưu tiên kiểm tra cả Dương lịch, Âm lịch và Giao thừa
        const getHolidayInfo = (date) => {
            const dd = date.getDate();
            const mm = date.getMonth() + 1;
            const solarKey = `${dd}-${mm}`;
            if (SOLAR_HOLIDAYS[solarKey]) return SOLAR_HOLIDAYS[solarKey];

            const lunar = getLunarDetails(date);
            const lunarKey = `${lunar.day}-${lunar.month}`;
            if (LUNAR_HOLIDAYS[lunarKey]) return LUNAR_HOLIDAYS[lunarKey];

            // Kiểm tra Giao thừa: nếu ngày mai (âm lịch) là mùng 1 tháng 1 thì hôm nay là 29/30 Tết
            try {
                const tomorrow = new Date(date);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const lunarTomorrow = getLunarDetails(tomorrow);
                if (lunarTomorrow.day === 1 && lunarTomorrow.month === 1 && lunar.month === 12) {
                    return { name: 'Giao Thừa', greeting: 'Chúc bạn phút giao thừa an lành, đón năm mới nhiều may mắn!' };
                }
            } catch (e) { /* bỏ qua nếu có lỗi tính toán */ }

            return null;
        };
        // END: Danh sách ngày lễ, ngày Tết (Dương lịch & Âm lịch) kèm lời chúc

        const sendNotification = (title, body) => {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body, icon: '/favicon.ico' });
            }
        };

        // Alias để tránh xung đột tên với biến state query nội bộ trong GlobalSearchModal
        const query_q = (ref) => query(ref);

        // --- HÀM PARSE NGÀY TỪ CHUỖI TÌM KIẾM ---
        // Hỗ trợ: d/m/yy, d/m/yyyy, dd/mm/yy, dd/mm/yyyy
        const parseSearchDate = (str) => {
            const s = str.trim();
            const match = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
            if (!match) return null;
            let [, d, m, y] = match;
            d = parseInt(d, 10);
            m = parseInt(m, 10);
            y = parseInt(y, 10);
            if (y < 100) y += 2000; // yy → yyyy
            if (m < 1 || m > 12 || d < 1 || d > 31) return null;
            const date = new Date(y, m - 1, d);
            // Kiểm tra ngày hợp lệ (vd: 31/2 sẽ bị reject)
            if (date.getFullYear() !== y || date.getMonth() !== m - 1 || date.getDate() !== d) return null;
            return date;
        };

        // --- GLOBAL SEARCH MODAL ---
        const GlobalSearchModal = ({ onClose, db, user, appId, onNavigate, headerRef }) => {
            const [query, setQuery] = React.useState('');
            const [results, setResults] = React.useState({ dateEvents: [], dateTarget: null, events: [], todos: [], notes: [], timetable: [] });
            const [loading, setLoading] = React.useState(false);
            const [headerH, setHeaderH] = React.useState(56);
            const inputRef = React.useRef(null);

            React.useEffect(() => {
                if (inputRef.current) inputRef.current.focus();
                // Đo chiều cao header thực tế
                if (headerRef && headerRef.current) {
                    setHeaderH(headerRef.current.getBoundingClientRect().height);
                }
            }, []);

            React.useEffect(() => {
                if (!query.trim()) {
                    setResults({ dateEvents: [], dateTarget: null, events: [], todos: [], notes: [], timetable: [] });
                    return;
                }
                const q = query.toLowerCase().trim();
                setLoading(true);
                const parsedDate = parseSearchDate(query.trim());
                const eventsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'events');
                const todosRef  = collection(db, 'artifacts', appId, 'users', user.uid, 'todos');
                const notesRef  = collection(db, 'artifacts', appId, 'users', user.uid, 'notes');
                const fetchAll = async () => {
                    try {
                        const [evSnap, tdSnap, ntSnap] = await Promise.all([
                            getDocs(query_q(eventsRef)),
                            getDocs(query_q(todosRef)),
                            getDocs(query_q(notesRef))
                        ]);
                        const allEvents = evSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                        let dateEvents = [];
                        if (parsedDate) {
                            const ds = parsedDate.toDateString();
                            dateEvents = allEvents.filter(e => e.date && new Date(e.date.seconds * 1000).toDateString() === ds);
                        }
                        const evs = allEvents.filter(e => e.title && e.title.toLowerCase().includes(q))
                            .sort((a, b) => a.title.toLowerCase().indexOf(q) - b.title.toLowerCase().indexOf(q));
                        const tds = tdSnap.docs.map(d => ({ id: d.id, ...d.data() }))
                            .filter(t => t.text && t.text.toLowerCase().includes(q))
                            .sort((a, b) => a.text.toLowerCase().indexOf(q) - b.text.toLowerCase().indexOf(q));
                        const nts = ntSnap.docs.map(d => ({ id: d.id, ...d.data() }))
                            .filter(n => (n.title && n.title.toLowerCase().includes(q)) || (n.content && n.content.toLowerCase().includes(q)))
                            .sort((a, b) => {
                                const ta = a.title && a.title.toLowerCase().includes(q);
                                const tb = b.title && b.title.toLowerCase().includes(q);
                                return (ta && !tb) ? -1 : (!ta && tb) ? 1 : 0;
                            });
                        let tkbResults = [];
                        try {
                            const tkbSnap = await getDocs(collection(db, 'artifacts', appId, 'users', user.uid, 'timetable'));
                            tkbSnap.docs.forEach(d => {
                                const sched = d.data().schedule || {};
                                Object.entries(sched).forEach(([key, val]) => {
                                    if (val && val.toLowerCase().includes(q)) {
                                        const [dayId, period, col] = key.split('_');
                                        const dayLabels = { t2:'Thứ 2', t3:'Thứ 3', t4:'Thứ 4', t5:'Thứ 5', t6:'Thứ 6', t7:'Thứ 7' };
                                        tkbResults.push({ id: d.id + '_' + key, text: val, day: dayLabels[dayId] || dayId, period: 'Tiết ' + period, col: col === 'col1' ? 'Môn' : 'Ghi chú', weekDocId: d.id });
                                    }
                                });
                            });
                        } catch(e) { console.warn('Tìm TKB lỗi:', e); }
                        setResults({ dateEvents, dateTarget: parsedDate, events: evs, todos: tds, notes: nts, timetable: tkbResults });
                    } catch(e) { console.error('Lỗi tìm kiếm:', e); }
                    finally { setLoading(false); }
                };
                const timer = setTimeout(fetchAll, 300);
                return () => clearTimeout(timer);
            }, [query]);

            const highlightText = (text, q) => {
                if (!text || !q) return text;
                const idx = text.toLowerCase().indexOf(q.toLowerCase());
                if (idx === -1) return text;
                return <span>{text.slice(0, idx)}<mark className="bg-yellow-200 text-yellow-900 rounded px-0.5 font-bold">{text.slice(idx, idx + q.length)}</mark>{text.slice(idx + q.length)}</span>;
            };

            const totalCount = results.events.length + results.todos.length + results.notes.length + results.timetable.length + results.dateEvents.length;
            const hasQuery = query.trim().length > 0;

            const handleResultClick = (type, item) => {
                onNavigate(type, item, query.trim());
                onClose();
            };
            const handleGoToDate = (date) => {
                onNavigate('calendar', { date: { seconds: Math.floor(date.getTime() / 1000) } });
                onClose();
            };

            return (
                <>
                    {/* Overlay mờ — chỉ bên dưới header, bấm vào đóng */}
                    <div className="fixed inset-0 z-[58] bg-black/30" style={{top: 0}} onClick={onClose} />

                    {/* Thanh search — thay thế toàn bộ header, z cao hơn overlay */}
                    <div className="fixed top-0 left-1/2 z-[59] bg-blue-600 flex items-center gap-2 px-3 shadow-lg"
                        style={{ width: '100%', maxWidth: '448px', transform: 'translateX(-50%)', height: headerH + 'px' }}
                        onClick={e => e.stopPropagation()}>
                        <Search size={18} className="text-blue-200 shrink-0" />
                        <input
                            ref={inputRef}
                            type="text"
                            value={query}
                            onChange={e => setQuery(e.target.value)}
                            placeholder="Nhập từ khóa hoặc ngày (dd/mm/yyyy)..."
                            className="flex-1 bg-transparent text-white placeholder-blue-300 outline-none text-sm font-medium"
                        />
                        {query && (
                            <button onClick={() => setQuery('')} className="text-blue-200 hover:text-white transition shrink-0 p-1">
                                <X size={16} />
                            </button>
                        )}
                        <button onClick={onClose} className="text-blue-200 hover:text-white transition shrink-0 p-1 ml-1 font-medium text-xs border border-blue-400 rounded-lg px-2">
                            Đóng
                        </button>
                    </div>

                    {/* Dropdown kết quả — sát dưới header, full width, không bo góc */}
                    {hasQuery && (
                        <div className="fixed z-[59] bg-white overflow-y-auto shadow-[0_8px_30px_rgba(0,0,0,0.18)]"
                            style={{ top: headerH + 'px', left: '50%', transform: 'translateX(-50%)', width: '100%', maxWidth: '448px', maxHeight: 'calc(100vh - ' + headerH + 'px - 56px)' }}
                            onClick={e => e.stopPropagation()}>

                            {/* Đang tải */}
                            {loading && <div className="text-center text-gray-400 py-8 text-sm animate-pulse">Đang tìm kiếm...</div>}

                            {/* Không có kết quả */}
                            {!loading && hasQuery && totalCount === 0 && !results.dateTarget && (
                                <div className="text-center text-gray-400 py-10 px-4">
                                    <Search size={36} className="mx-auto mb-3 opacity-20" />
                                    <p className="text-sm">Không tìm thấy kết quả cho <b className="text-gray-600">"{query}"</b></p>
                                </div>
                            )}

                            {/* Tìm theo ngày — không có sự kiện */}
                            {!loading && results.dateTarget && totalCount === 0 && (
                                <div className="p-4">
                                    <div className="bg-teal-50 border border-teal-200 rounded-2xl p-4 text-center">
                                        <CalendarDays size={28} className="mx-auto mb-2 text-teal-400" />
                                        <p className="text-sm font-bold text-teal-700">{results.dateTarget.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</p>
                                        <p className="text-xs text-teal-500 mt-1">Không có sự kiện nào vào ngày này</p>
                                        <button onClick={() => handleGoToDate(results.dateTarget)} className="mt-3 text-xs bg-teal-600 text-white px-4 py-1.5 rounded-full hover:bg-teal-700 transition font-bold">→ Mở ngày này trên lịch</button>
                                    </div>
                                </div>
                            )}

                            {/* Kết quả */}
                            {!loading && (results.dateTarget || totalCount > 0) && (
                                <div className="p-4 space-y-5">

                                    {/* Ngày cụ thể */}
                                    {results.dateTarget && (
                                        <div>
                                            <div className="flex items-center gap-2 mb-2">
                                                <CalendarDays size={14} className="text-teal-500" />
                                                <span className="text-xs font-black uppercase tracking-wider text-teal-500">Ngày {results.dateTarget.toLocaleDateString('vi-VN')}</span>
                                                <button onClick={() => handleGoToDate(results.dateTarget)} className="ml-auto text-[9px] text-teal-500 hover:text-teal-700 border border-teal-300 rounded-full px-2 py-0.5 transition">Mở lịch →</button>
                                            </div>
                                            {results.dateEvents.length > 0
                                                ? <div className="space-y-1.5">{results.dateEvents.map(ev => (
                                                    <button key={ev.id} onClick={() => handleResultClick('calendar', ev)} className="w-full text-left p-3 bg-teal-50 hover:bg-teal-100 rounded-xl border border-teal-200 transition">
                                                        <div className="font-semibold text-sm text-slate-800">{ev.title}</div>
                                                    </button>
                                                ))}</div>
                                                : <p className="text-xs text-gray-400 italic pl-1">Không có sự kiện nào</p>
                                            }
                                        </div>
                                    )}

                                    {/* Sự kiện */}
                                    {results.events.length > 0 && (
                                        <div>
                                            <div className="flex items-center gap-2 mb-2"><Calendar size={14} className="text-blue-500" /><span className="text-xs font-black uppercase tracking-wider text-blue-500">Sự kiện ({results.events.length})</span></div>
                                            <div className="space-y-1.5">{results.events.map(ev => (
                                                <button key={ev.id} onClick={() => handleResultClick('calendar', ev)} className="w-full text-left p-3 bg-blue-50 hover:bg-blue-100 rounded-xl border border-blue-100 transition">
                                                    <div className="font-semibold text-sm text-slate-800">{highlightText(ev.title, query)}</div>
                                                    {ev.date && <div className="text-[10px] text-blue-400 mt-0.5 flex items-center gap-1"><CalendarDays size={10}/>{new Date(ev.date.seconds * 1000).toLocaleDateString('vi-VN')}</div>}
                                                </button>
                                            ))}</div>
                                        </div>
                                    )}

                                    {/* Việc cần làm */}
                                    {results.todos.length > 0 && (
                                        <div>
                                            <div className="flex items-center gap-2 mb-2"><CheckSquare size={14} className="text-green-500" /><span className="text-xs font-black uppercase tracking-wider text-green-500">Việc cần làm ({results.todos.length})</span></div>
                                            <div className="space-y-1.5">{results.todos.map(td => (
                                                <button key={td.id} onClick={() => handleResultClick('todo', td)} className="w-full text-left p-3 bg-green-50 hover:bg-green-100 rounded-xl border border-green-100 transition">
                                                    <div className={`font-semibold text-sm ${td.completed ? 'line-through text-gray-400' : 'text-slate-800'}`}>{highlightText(td.text, query)}</div>
                                                    {td.deadlineTime && <div className="text-[10px] text-green-400 mt-0.5 flex items-center gap-1"><Clock size={10}/>{new Date(td.deadlineTime.seconds * 1000).toLocaleDateString('vi-VN')}</div>}
                                                </button>
                                            ))}</div>
                                        </div>
                                    )}

                                    {/* Ghi chú */}
                                    {results.notes.length > 0 && (
                                        <div>
                                            <div className="flex items-center gap-2 mb-2"><StickyNote size={14} className="text-orange-500" /><span className="text-xs font-black uppercase tracking-wider text-orange-500">Ghi chú ({results.notes.length})</span></div>
                                            <div className="space-y-1.5">{results.notes.map(nt => (
                                                <button key={nt.id} onClick={() => handleResultClick('notes', nt)} className="w-full text-left p-3 rounded-xl border border-orange-100 hover:opacity-90 transition" style={{ backgroundColor: nt.color || '#FEFCE8' }}>
                                                    <div className="font-semibold text-sm text-slate-800 truncate">{highlightText(nt.title || 'Không có tiêu đề', query)}</div>
                                                    {nt.content && <div className="text-[11px] text-slate-500 mt-0.5 truncate">{highlightText(nt.content, query)}</div>}
                                                </button>
                                            ))}</div>
                                        </div>
                                    )}

                                    {/* Thời khóa biểu */}
                                    {results.timetable.length > 0 && (
                                        <div>
                                            <div className="flex items-center gap-2 mb-2"><Table size={14} className="text-purple-500" /><span className="text-xs font-black uppercase tracking-wider text-purple-500">Lịch biểu ({results.timetable.length})</span></div>
                                            <div className="space-y-1.5">{results.timetable.map(tk => (
                                                <button key={tk.id} onClick={() => handleResultClick('timetable', tk)} className="w-full text-left p-3 bg-purple-50 hover:bg-purple-100 rounded-xl border border-purple-100 transition">
                                                    <div className="font-semibold text-sm text-slate-800">{highlightText(tk.text, query)}</div>
                                                    <div className="text-[10px] text-purple-400 mt-0.5">{tk.day} · {tk.period} · {tk.col}</div>
                                                </button>
                                            ))}</div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Footer đếm kết quả */}
                            {!loading && totalCount > 0 && (
                                <div className="sticky bottom-0 border-t px-4 py-2 text-center bg-white/90 backdrop-blur-sm">
                                    <span className="text-xs text-gray-400">Tìm thấy <b className="text-gray-600">{totalCount}</b> kết quả</span>
                                </div>
                            )}
                        </div>
                    )}
                </>
            );
        };

        // --- CÁC COMPONENT CON ---
        const SettingsModal = ({ theme, onSave, onClose, auth, db, appId, onSignOut }) => {
            const [localTheme, setLocalTheme] = useState(theme);
            const [newPassword, setNewPassword] = useState('');
            const [passwordMessage, setPasswordMessage] = useState('');
            const [passwordError, setPasswordError] = useState('');
            const [showChangePassword, setShowChangePassword] = useState(false);

            // Bổ sung thiết lập mật khẩu PIN ứng dụng
            const [appPassword, setAppPassword] = useState('');

            // Lưu cài đặt khóa
            const handleSaveLockSettings = async (e) => {

                if (enableLock && !appPassword.trim()) {

                try {
                    const settingsRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'lock');
                    const payload = {

                        enableLock: enableLock

                    await setDoc(settingsRef, payload, { merge: true });
                    localStorage.setItem('vt_app_password', appPassword.trim());
                    localStorage.setItem('vt_enable_lock', enableLock ? 'true' : 'false');

            // Tính năng Đổi mật khẩu

                                <input type="color" className="w-full h-12 rounded cursor-pointer border-2 border-gray-200 bg-white" value={localTheme.bgColor} onChange={e => setLocalTheme({...localTheme, bgColor: e.target.value})} />
                            </div>

                                <label className="block text-sm font-bold text-gray-700 mb-2">Màu Nền Ghi Chú</label>

                            {/* KHU VỰC: Đặt mã PIN bảo vệ việc làm & ghi chú */}
                            <div className="border-t pt-4 mt-4">

                                {showChangePassword && (
                                    <form onSubmit={handleChangePassword} className="mt-4 space-y-3 p-3 bg-slate-50 rounded-lg border border-slate-200 animate-in fade-in">
                                        <label className="block text-xs font-bold text-slate-600">Mật khẩu mới</label>

                                            className="w-full px-3 py-2 border rounded-lg text-sm text-slate-800 focus:ring-1 focus:ring-blue-500 outline-none"

                                            value={newPassword}

                                        {passwordError && <p className="text-red-500 text-xs">{passwordError}</p>}

                                        <button type="submit" className="w-full bg-slate-800 text-white text-xs font-bold py-2 rounded-lg hover:bg-slate-700 transition">Xác nhận đổi mật khẩu</button>

        };

        const AuthScreen = ({ auth, appId }) => {

                setError('');

            // Tính năng Quên mật khẩu

            return (

                        <h2 className="text-2xl font-bold text-center text-gray-800 mb-2">{isLogin ? 'Đăng Nhập' : 'Đăng Ký'}</h2>
                        <div className="text-center mb-6"><span className="text-[10px] px-2 py-1 rounded font-mono border bg-green-100 text-green-700 border-green-200">Server: <b>{appId}</b></span></div>
                        <form onSubmit={handleAuth} className="space-y-4">

                            {/* Ô nhập mật khẩu tích hợp ẩn/hiện mật khẩu */}
                            <div className="relative w-full">
                                <input 
                                    type={showPassword ? "text" : "password"}

                                <button 
                                    type="button"

                                    className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 p-1"
                                >

                            </div>

                            {error && <p className="text-red-500 text-sm text-center bg-red-50 p-2 rounded">{error}</p>}
                            {message && <p className="text-green-600 text-sm text-center bg-green-50 p-2 rounded font-medium">{message}</p>}
                            
                            <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-blue-700 transition">{isLogin ? 'Vào Ứng Dụng' : 'Tạo Tài Khoản'}</button>
                        </form>

                        <div className="mt-6 flex flex-col items-center gap-3 text-sm">
                            {/* Nút quên mật khẩu */}
                            {isLogin && (
                                <button 
                                    type="button" 
                                    onClick={handleForgotPassword} 
                                    className="text-slate-500 hover:text-blue-600 text-xs transition"

                                    Quên mật khẩu?
                                </button>

                            <button onClick={() => { setIsLogin(!isLogin); setError(''); setMessage(''); }} className="text-blue-600 hover:underline font-medium">{isLogin ? 'Chưa có tài khoản? Đăng ký ngay' : 'Đã có tài khoản? Đăng nhập'}</button>
                        </div>

            );
        };

        // --- MÀN HÌNH THỜI KHÓA BIỂU (TKB VIEW) ---
        const TimeTableView = ({ user, db, appId, theme, searchTarget, onSearchTargetClear }) => {
            // ── STATE ───────────────────────────────────────────────────────────
            const [schedule, setSchedule]         = useState({});
            const [headers, setHeaders]           = useState({ col1: 'Môn - Lớp', col2: 'Ghi chú' });
            const [highlightKey, setHighlightKey] = useState(null);
            const [showYearDrop, setShowYearDrop] = useState(false);
            const [showWeekDrop, setShowWeekDrop] = useState(false);
            const [yearInput, setYearInput]       = useState('');
            const [weekInput, setWeekInput]       = useState('');
            // yearList: [{ id, name, anchorWeekKey }]
            // weekList: [{ id, name, yearId, offset }]  offset=0,1,2... từ anchor
            const [yearList, setYearList] = useState([]);
            const [weekList, setWeekList] = useState([]);
            const [activeYearId, setActiveYearId] = useState(null);

            // ── TUẦN HIỆN HÀNH ──────────────────────────────────────────────────
            const getCurrentMonday = () => {
                const now = new Date();
                const day = now.getDay();
                const diff = now.getDate() - day + (day === 0 ? -6 : 1);
                const mon = new Date(now); mon.setDate(diff); mon.setHours(0,0,0,0);
                return mon;
            };
            const [startOfWeekDate, setStartOfWeekDate] = useState(getCurrentMonday);
            const periods = [1,2,3,4,5];

            // ── HELPERS ─────────────────────────────────────────────────────────
            const getWeekKey = (date) => {
                const t = new Date(date.valueOf());
                const dayNr = (date.getDay() + 6) % 7;
                t.setDate(t.getDate() - dayNr + 3);
                const ft = t.valueOf();
                t.setMonth(0, 1);
                if (t.getDay() !== 4) t.setMonth(0, 1 + ((4 - t.getDay()) + 7) % 7);
                const weekNum = 1 + Math.ceil((ft - t) / 604800000);
                const y = new Date(date.valueOf()); y.setDate(date.getDate() - dayNr + 3);
                return { yyyy: y.getFullYear(), weekNum, key: y.getFullYear() + '_w' + weekNum };
            };
            const getMondayFromWeek = (year, wn) => {
                const jan4 = new Date(year, 0, 4);
                const j4d = (jan4.getDay() + 6) % 7;
                const w1 = new Date(jan4); w1.setDate(jan4.getDate() - j4d);
                const m = new Date(w1); m.setDate(w1.getDate() + (wn - 1) * 7);
                m.setHours(0,0,0,0); return m;
            };
            const getMondayFromAnchorOffset = (anchorWeekKey, offset) => {
                const parts = anchorWeekKey.split('_w');
                const y = parseInt(parts[0], 10), wn = parseInt(parts[1], 10);
                const anchor = getMondayFromWeek(y, wn);
                const r = new Date(anchor); r.setDate(anchor.getDate() + offset * 7); return r;
            };

            const weekKey = useMemo(() => getWeekKey(startOfWeekDate).key, [startOfWeekDate]);
            const { weekNum: currentWeekNum } = useMemo(() => getWeekKey(startOfWeekDate), [startOfWeekDate]);

            // ── FIRESTORE ───────────────────────────────────────────────────────
            const tkbRef  = useMemo(() => doc(db, 'artifacts', appId, 'users', user.uid, 'timetable', 'main_' + weekKey), [db, appId, user.uid, weekKey]);
            const metaRef = useMemo(() => doc(db, 'artifacts', appId, 'users', user.uid, 'timetable', 'meta'), [db, appId, user.uid]);

            useEffect(() => {
                const unsub = onSnapshot(tkbRef, snap => {
                    if (snap.exists()) {
                        const d = snap.data();
                        setSchedule(d.schedule || {});
                        if (d.headers) setHeaders(d.headers);
                    } else { setSchedule({}); }
                }, e => console.warn('TKB offline:', e));
                return unsub;
            }, [tkbRef]);

            useEffect(() => {
                const unsub = onSnapshot(metaRef, snap => {
                    if (snap.exists()) {
                        const d = snap.data();
                        setYearList(d.yearList || []);
                        setWeekList(d.weekList || []);
                    }
                }, e => console.warn('TKB meta offline:', e));
                return unsub;
            }, [metaRef]);

            // ── NGÀY HÔM NAY ────────────────────────────────────────────────────
            const todayStr = useMemo(() => {
                const n = new Date();
                return String(n.getDate()).padStart(2,'0') + '/' + String(n.getMonth()+1).padStart(2,'0');
            }, []);

            const weekDaysInfo = useMemo(() => {
                return ['t2','t3','t4','t5','t6','t7'].map((id, i) => {
                    const t = new Date(startOfWeekDate); t.setDate(startOfWeekDate.getDate() + i);
                    return { id, label: 'Thứ ' + (i+2), dateStr: String(t.getDate()).padStart(2,'0') + '/' + String(t.getMonth()+1).padStart(2,'0') };
                });
            }, [startOfWeekDate]);

            // ── Tuần hiện tại khớp với tuần nào đã đặt tên ─────────────────────
            const currentWeekEntry = useMemo(() => {
                for (const yr of yearList) {
                    const found = weekList.find(w => w.yearId === yr.id && getMondayFromAnchorOffset(yr.anchorWeekKey, w.offset).toDateString() === startOfWeekDate.toDateString());
                    if (found) return { week: found, year: yr };
                }
                return null;
            }, [yearList, weekList, startOfWeekDate]);

            const activeYear = useMemo(() => yearList.find(y => y.id === activeYearId) || null, [yearList, activeYearId]);

            // Tuần của năm đang chọn — mới nhất (offset cao) lên TRÊN
            const weeksOfActiveYear = useMemo(() => {
                if (!activeYearId) return [];
                return [...weekList.filter(w => w.yearId === activeYearId)].sort((a,b) => b.offset - a.offset);
            }, [weekList, activeYearId]);

            // Sync activeYearId theo tuần đang hiển thị
            useEffect(() => {
                if (currentWeekEntry && currentWeekEntry.year.id !== activeYearId) {
                    setActiveYearId(currentWeekEntry.year.id);
                }
            }, [currentWeekEntry]);

            // ── ĐIỀU HƯỚNG ──────────────────────────────────────────────────────
            const navigateWeek = (dir) => {
                // Nếu đang trong năm học có tuần đặt tên → chỉ nhảy trong các tuần đó
                if (activeYearId && weeksOfActiveYear.length > 0) {
                    const yr = yearList.find(y => y.id === activeYearId);
                    if (!yr) return;
                    // weeksOfActiveYear đã sort offset giảm dần → đảo lại để tăng dần cho navigation
                    const sorted = [...weeksOfActiveYear].sort((a, b) => a.offset - b.offset);
                    const cur = startOfWeekDate.getTime();
                    const idx = sorted.findIndex(w => getMondayFromAnchorOffset(yr.anchorWeekKey, w.offset).getTime() === cur);
                    const ni = idx === -1 ? (dir > 0 ? 0 : sorted.length - 1) : idx + dir;
                    if (ni >= 0 && ni < sorted.length) {
                        setStartOfWeekDate(getMondayFromAnchorOffset(yr.anchorWeekKey, sorted[ni].offset));
                        return;
                    }
                }
                // Fallback: ±1 tuần thường
                const d = new Date(startOfWeekDate); d.setDate(d.getDate() + dir * 7); setStartOfWeekDate(d);
            };

            // ── LƯU DỮ LIỆU ─────────────────────────────────────────────────────
            const saveData = async (path, value) => {
                const ns = { ...schedule, [path]: value }; setSchedule(ns);
                if (Object.values(ns).some(v => v && v.trim())) await setDoc(tkbRef, { schedule: ns }, { merge: true });
                else try { await deleteDoc(tkbRef); } catch(e) {}
            };
            const saveHeader = async (key, value) => {
                const nh = { ...headers, [key]: value }; setHeaders(nh);
                await setDoc(tkbRef, { headers: nh }, { merge: true });
            };

            // ── THÊM NĂM HỌC ────────────────────────────────────────────────────
            const addYear = async () => {
                const name = yearInput.trim(); if (!name) return;
                const id = 'yr_' + Date.now();
                const entry = { id, name, anchorWeekKey: weekKey };
                const newList = [entry, ...yearList];
                setYearList(newList); setYearInput(''); setShowYearDrop(false);
                setActiveYearId(id);
                await setDoc(metaRef, { yearList: newList }, { merge: true });
            };
            const removeYear = async (id) => {
                const ny = yearList.filter(y => y.id !== id);
                const nw = weekList.filter(w => w.yearId !== id);
                setYearList(ny); setWeekList(nw);
                if (activeYearId === id) setActiveYearId(ny[0] ? ny[0].id : null);
                await setDoc(metaRef, { yearList: ny, weekList: nw }, { merge: true });
            };
            const [confirmDeleteYearId, setConfirmDeleteYearId] = useState(null);
            const [confirmDeleteWeekId, setConfirmDeleteWeekId] = useState(null);
            const confirmTimerRef = React.useRef(null);

            const askConfirmYear = (id, e) => {
                e.stopPropagation();
                if (confirmTimerRef.current) clearTimeout(confirmTimerRef.current);
                setConfirmDeleteWeekId(null);
                setConfirmDeleteYearId(id);
                confirmTimerRef.current = setTimeout(() => setConfirmDeleteYearId(null), 3000);
            };
            const askConfirmWeek = (id, e) => {
                e.stopPropagation();
                if (confirmTimerRef.current) clearTimeout(confirmTimerRef.current);
                setConfirmDeleteYearId(null);
                setConfirmDeleteWeekId(id);
                confirmTimerRef.current = setTimeout(() => setConfirmDeleteWeekId(null), 3000);
            };
            const cancelConfirm = () => {
                if (confirmTimerRef.current) clearTimeout(confirmTimerRef.current);
                setConfirmDeleteYearId(null);
                setConfirmDeleteWeekId(null);
            };

            // ── THÊM TUẦN ───────────────────────────────────────────────────────
            const addWeek = async () => {
                const name = weekInput.trim(); if (!name || !activeYearId) return;
                const yr = yearList.find(y => y.id === activeYearId); if (!yr) return;
                const anchor = getMondayFromAnchorOffset(yr.anchorWeekKey, 0);
                const offset = Math.round((startOfWeekDate - anchor) / (7 * 86400000));

            // tất cả mọi người) nên KHÔNG dùng nữa.
            const FALLBACK_GEMINI_MODELS = ['gemini-2.5-flash-lite', 'gemini-2.5-flash', 'gemini-2.0-flash'];
            const MODEL_CACHE_KEY = 'vt_gemini_models_cache_v1';
            const MODEL_CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 24h

            const sleep = (ms) => new Promise(r => setTimeout(r, ms));

            // GIẢI PHÁP CHO YÊU CẦU 2: khi TẤT CẢ model trong danh sách cứng ở trên đều báo lỗi
            // "model not found / deprecated" (Google đã khai tử), hàm này gọi thẳng API
            // ListModels của Google để lấy danh sách model gemini-* còn hỗ trợ generateContent +
            // ảnh (vision) ngay tại thời điểm chạy, rồi thử lại với model mới nhất tìm được.
            // Nhờ vậy ứng dụng tự thích nghi khi Google đổi tên/thế hệ model mà KHÔNG cần sửa code.
            const discoverAvailableGeminiModels = async (apiKey) => {
                try {
                    const cachedRaw = localStorage.getItem(MODEL_CACHE_KEY);
                    if (cachedRaw) {
                        const cached = JSON.parse(cachedRaw);
                        if (cached && Date.now() - cached.ts < MODEL_CACHE_TTL_MS && Array.isArray(cached.models) && cached.models.length) {
                            return cached.models;
                        }
                    }
                } catch (e) {}

                const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models?key=' + apiKey);
                if (!res.ok) throw new Error('Không lấy được danh sách model từ Google.');
                const data = await res.json();
                const list = (data.models || [])
                    .filter(m => m.name && m.supportedGenerationMethods?.includes('generateContent'))
                    .map(m => m.name.replace(/^models\//, ''))
                    .filter(name => /gemini/i.test(name) && !/embedding|aqa|imagen|tts|vision-only/i.test(name));

                // Ưu tiên bản "flash-lite" / "flash" (rẻ, nhanh, đủ cho việc đọc bảng) trước "pro"
                const rank = (name) => (/flash-lite/i.test(name) ? 0 : /flash/i.test(name) ? 1 : /pro/i.test(name) ? 2 : 3);
                list.sort((a, b) => rank(a) - rank(b));

                try { localStorage.setItem(MODEL_CACHE_KEY, JSON.stringify({ ts: Date.now(), models: list })); } catch (e) {}
                return list;
            };

            const callGeminiSingleModel = async (bodyObj, apiKey, model) => {
                const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(bodyObj)
                });
                if (!res.ok) {
                    let status = res.status, errMsg = 'Lỗi API ' + status;
                    try { const e = await res.json(); errMsg = e.error?.message || errMsg; } catch(e2) {}
                    const err = new Error(errMsg);
                    err.status = status;
                    throw err;
                }
                return res.json();
            };

            const tryModelList = async (models, bodyObj, apiKey) => {
                let lastErr = null;
                for (let i = 0; i < models.length; i++) {
                    const model = models[i];
                    // Với mỗi model, thử tối đa 2 lần nếu bị lỗi 429 (quá tải tạm thời / vượt quota phút)
                    for (let attempt = 0; attempt < 2; attempt++) {
                        try {
                            const data = await callGeminiSingleModel(bodyObj, apiKey, model);
                            const text = (data.candidates?.[0]?.content?.parts?.[0]?.text) || '';
                            const cleaned = text.replace(/```json/g,'').replace(/```/g,'').trim();
                            const m = cleaned.match(/\{[\s\S]*\}/);
                            if (!m) throw new Error('AI không trả về JSON hợp lệ. Thử lại hoặc chụp ảnh rõ hơn.');
                            try { return JSON.parse(m[0]); }
                            catch(e) { throw new Error('Không đọc được kết quả AI. Thử lại.'); }
                        } catch (e) {
                            lastErr = e;
                            // 429 = hết quota/quá nhiều request. Thử lại 1 lần sau khi chờ, rồi chuyển model khác.

                const primaryModels = modelOverride ? [modelOverride, ...FALLBACK_GEMINI_MODELS] : FALLBACK_GEMINI_MODELS;
                try {

                    try {

                    } catch (secondErr) {
                        throw new Error('Các model Gemini hiện tại (kể cả model mới tự dò) đều không dùng được. Google có thể vừa thay đổi model — hãy vào aistudio.google.com để xem tên model mới nhất rồi dán vào ô "Model AI tuỳ chọn" trong mục nhập ảnh.');

            const sanitizeAiSchedule = (rawSchedule) => {

                                }
                            }
                            // Sắp xếp theo thứ tự ngày
                            dayCols.sort((a, b) => a.dayNum - b.dayNum);

                            if (iPer >= 0 && dayCols.length > 0) {
                                const dataRows = rows.slice(headerIndex + 1);
                                dataRows.forEach(row => {
                                    const perCell = String(row[iPer] || '').trim();
                                    const per = parseInt(perCell, 10);
                                    if (isNaN(per) || per < 1 || per > 5) return;

                                    dayCols.forEach(col => {
                                        const dayKey = dayKeyMap[col.label];
                                        if (!dayKey) return;
                                        const value = String(row[col.index] || '').trim();
                                        if (value) {
                                            newSchedule[`${dayKey}_${per}_col1`] = value;
                                        }
                                    });
                                });
                            } else {
                                // Fallback: không tìm được cột Tiết hoặc Thứ
                                const dataRows = rows.slice(headerIndex + 1);
                                dataRows.forEach((row, ri) => {
                                    const dayIdx = Math.floor(ri / 5);
                                    const per = (ri % 5) + 1;
                                    if (dayIdx < 6) {
                                        const dk = dayKeys[dayIdx];
                                        const v1 = String(row[0] || '').trim();
                                        const v2 = String(row[1] || '').trim();
                                        if (v1) newSchedule[`${dk}_${per}_col1`] = v1;
                                        if (v2) newSchedule[`${dk}_${per}_col2`] = v2;
                                    }
                                });
                            }
                        } else {
                            // Không tìm thấy header: map theo thứ tự hàng
                            const dataRows = rows.slice(startRow);
                            dataRows.forEach((row, ri) => {
                                const dayIdx = Math.floor(ri / 5);
                                const per = (ri % 5) + 1;
                                if (dayIdx < 6) {
                                    const dk = dayKeys[dayIdx];
                                    const v1 = String(row[0] || '').trim();
                                    const v2 = String(row[1] || '').trim();
                                    if (v1) newSchedule[`${dk}_${per}_col1`] = v1;
                                    if (v2) newSchedule[`${dk}_${per}_col2`] = v2;
                                }
                            });
                        }

                        const merged = { ...schedule, ...newSchedule };
                        setSchedule(merged);
                        setHeaders(detectedHeaders);
                        await setDoc(tkbRef, { schedule: merged, headers: detectedHeaders }, { merge: true });
                        setShowImportAI(false); setImportFile(null); setImportPreview(null); setImportError('');
                        setImportSuccessMsg('✅ Đã nhập lịch biểu từ Excel thành công!');
                        setTimeout(() => setImportSuccessMsg(''), 3000);

                    } else {
                        // ── Ảnh: gọi Gemini AI ──
                        const key = geminiKey.trim();
                        if (!key) { setShowKeyInput(true); setImportError('Cần nhập Gemini API Key để đọc ảnh.'); setImportLoading(false); return; }
                        const b64 = await fileToBase64(f);
                        const mime = f.type || 'image/jpeg';
                        // SỬA LỖI ĐỌC ẢNH (Yêu cầu 1): maxOutputTokens=2048 trước đây quá thấp, với
                        // ảnh TKB đầy đủ 6 ngày x 5 tiết x 2 cột, câu trả lời JSON có thể bị CẮT CỤT
                        // giữa chừng → JSON hỏng/thiếu dữ liệu mà không có cảnh báo rõ ràng. Nâng lên
                        // 4096 và ép "responseMimeType: application/json" để Gemini bắt buộc trả về
                        // đúng cú pháp JSON (không kèm lời giải thích/markdown làm hỏng parse).
                        const bodyObj = {
                            contents: [{ parts: [{ text: GEMINI_PROMPT }, { inline_data: { mime_type: mime, data: b64 } }] }],
                            generationConfig: { temperature: 0.1, maxOutputTokens: 4096, responseMimeType: 'application/json' }
                        };
                        const result = await callGeminiAPI(bodyObj, key, geminiModelOverride.trim());
                        if (!result.schedule) throw new Error('Không tìm thấy dữ liệu lịch biểu trong ảnh.');

                        // SỬA LỖI ĐỌC ẢNH (Yêu cầu 1): validate + chuẩn hoá key trước khi dùng, để
                        // không âm thầm lưu các key sai định dạng (mất dữ liệu không rõ nguyên nhân).
                        const { schedule: sanitized, kept, ignored } = sanitizeAiSchedule(result.schedule);
                        if (kept === 0) {
                            throw new Error('AI không đọc được ô nào hợp lệ từ ảnh này. Hãy chụp lại ảnh rõ nét hơn, đủ sáng và thẳng góc với bảng.');
                        }

                        // KHÔNG lưu thẳng vào Firestore nữa — đưa ra bản xem trước để người dùng
                        // kiểm tra và bấm "Áp dụng" mới thực sự ghi đè lên lịch hiện tại.
                        const newH = result.headers?.col1 ? { ...headers, ...result.headers } : headers;
                        setImportResult({ schedule: sanitized, headers: newH, kept, ignored });
                        setImportError(ignored > 0 ? `⚠ AI đọc được ${kept} ô hợp lệ, đã bỏ qua ${ignored} ô không đúng định dạng.` : '');
                    }
                } catch(err) {
                    setImportError('Lỗi: ' + (err.message || String(err)));
                } finally { setImportLoading(false); }
            };

            const closeImportModal = () => {
                if (importLoading) return;
                setShowImportAI(false); setImportFile(null); setImportResult(null); setImportPreview(null); setImportError('');
            };

            const dayLabels2 = { t2:'Thứ 2', t3:'Thứ 3', t4:'Thứ 4', t5:'Thứ 5', t6:'Thứ 6', t7:'Thứ 7' };

            return (

                                {/* Header modal */}
                                <div className="flex items-center justify-between px-4 py-3 bg-blue-600 text-white shrink-0">
                                    <div>
                                        <h3 className="font-bold text-sm">Nhập liệu bằng AI ✨</h3>
                                        <p className="text-[10px] text-blue-200">Gemini AI đọc ảnh chụp hoặc file Excel</p>
                                    </div>
                                    <button onClick={closeImportModal} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-blue-500 transition"><X size={18}/></button>
                                </div>

                                {/* API Key bar */}
                                <div className="px-4 py-2 bg-amber-50 border-b border-amber-100 shrink-0">
                                    <div className="flex items-center gap-2">
                                        <Key size={13} className="text-amber-500 shrink-0"/>
                                        {showKeyInput ? (
                                            <input autoFocus type="password"
                                                className="flex-1 text-xs border border-amber-300 rounded-lg px-2.5 py-1.5 outline-none focus:border-amber-500 bg-white"
                                                placeholder="Dán Gemini API Key vào đây..."
                                                value={geminiKey}
                                                onChange={e => setGeminiKey(e.target.value)}
                                                onBlur={() => { try { localStorage.setItem('vt_gemini_key', geminiKey); } catch(e2){} setShowKeyInput(false); }}
                                                onKeyDown={e => { if(e.key==='Enter'){ try { localStorage.setItem('vt_gemini_key', geminiKey); } catch(e2){} setShowKeyInput(false); } }}/>
                                        ) : (
                                            <button onClick={() => setShowKeyInput(true)} className="flex-1 text-left text-xs hover:opacity-80 transition">
                                                {geminiKey
                                                    ? <span className="text-green-700 font-semibold">✅ API Key đã lưu (bấm để đổi)</span>
                                                    : <span className="text-orange-600 font-bold">⚠ Chưa có API Key — bấm để nhập</span>}

                                                    {Object.entries(importResult.schedule)
                                                        .sort(([a],[b]) => a.localeCompare(b))

                                            {importLoading ? (

                                                    <p className="text-4xl mb-2">{importTab==='image' ? '📷' : '📊'}</p>
                                                    <p className="text-sm text-slate-700 font-bold">Bấm để chọn {importTab==='image' ? 'ảnh' : 'file Excel'}</p>
                                                    <p className="text-[10px] text-slate-400 mt-1.5">{importTab==='image' ? 'Ảnh chụp, screenshot, scan bảng TKB' : '.xlsx · .xls · .csv'}</p>
                                                    <p className="text-[10px] text-blue-500 mt-1 font-semibold">✨ AI sẽ đọc và cho bạn xem trước trước khi lưu</p>

                                    </div>
                                )}
                            </div>
                        </div>

                    {/* BỘ ĐIỀU HƯỚNG */}
