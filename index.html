            "Nhà vụng lợp có nhiều lỗ dột\nMột trận mưa làm ướt tả tơi.\nNgười không tu tập, mải chơi\nDục tham xâm nhập, cả đời khổ đau.",

            "Ai chinh phục địa cầu, thiên giới\nVượt lên trên cả cõi Diêm-ma\nSao bằng ngộ pháp Phật-đà\nNhư người khéo kết tràng hoa đẹp màu.",
            "Bậc hữu học vượt qua trời đất\nVượt lên trên cả cõi Diêm-ma\nLại thông chánh pháp Phật-đà\nNhư người khéo kết tràng hoa đẹp màu.",

            "Hai, tai biến; ba là thương tật;\nBốn, độn căn, ngu ngốc, hay quên;\nNăm thường lận đận luật quan;\nSáu vương trọng tội bị oan, hiểu lầm.",

            "Cười sao được, sướng vui sao nổi\nKhi lửa tham cháy rụi thế gian\nTối tăm giăng phủ trời đêm\nSao không nỗ lực tìm đèn sáng soi?",

            "Thân mấy chốc đã già, tàn tạ\nNơi chứa đầy bệnh khổ, hôi tanh\nVô thường tổ hợp mong manh\nChết là kết thúc, tái sanh hồng trần.",
            "Thân thể này màu bồ câu trắng\nNhư trái bầu, thu đến vứt đi.\nChết rồi thi thể gớm ghê\nCó gì vui thích, mải mê thân này?",
            "Ôi, thân thể như thành trì cổ\nDựng bằng xương, máu đỏ, thịt, gân\nChứa già, chết, bệnh từng phần\nCống cao, lừa dối; dáng duyên nỗi gì!",
            "Xe vua đẹp có ngày cũng cũ\nThân thể rồi u rũ, tàn phai\nPháp lành trẻ mãi, còn hoài\nHãy nên khắc cốt những lời thánh nhân.",
            "Trẻ ít học, già không hiểu biết\nChẳng khác gì bò đực lớn đầu\nThân to, cơ bắp, khỏe, mau\nNhưng không trí tuệ, khác nào bóng đêm?",
            "Lang thang suốt luân hồi bao kiếp\nQuyết đi tìm “ông xếp” xây nhà\nTìm hoài, tìm mãi, không ra\nTái sanh, khổ lụy, đọa sa ba đường.",
            "Nay ta cấm ngươi không xây nữa\nPhá cột kèo, ván cửa, rui mè…\nNay ta đã chứng niết-bàn\nÁi tham, chấp thủ tiêu tan hết rồi.",
            "Lịch vạn niên - Văn Trung ứng dụng cốt lõi phát triển bởi Nguyễn Văn Trung.",
            "Hãy luôn chính niệm và tỉnh giác trong từng phút giây hiện tại."
        ];

        // --- CÁC HÀM TIỆN ÍCH LỊCH VÀ ĐỊNH DẠNG ---
        const formatDateTimeForInput = (ms) => {
            if (!ms) return '';
            const d = new Date(ms);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}T${hh}:${min}`;
        };

        const formatDisplayDate = (seconds) => {
            if (!seconds) return '';
            const d = new Date(seconds * 1000);
            return d.toLocaleString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit', year: 'numeric' });
        };

        const getLunarDate = (date) => {
            try {
                const formatter = new Intl.DateTimeFormat('vi-VN', { calendar: 'chinese', day: 'numeric', month: 'numeric' });
                const parts = formatter.formatToParts(date);
                return {
                    day: parseInt(parts.find(p => p.type === 'day').value),
                    month: parseInt(parts.find(p => p.type === 'month').value)
                };
            } catch (e) {
                return { day: 0, month: 0 };
            }
        };

        const getDayOfWeek = (date) => {
            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            return days[date.getDay()];
        };

        const sendNotification = (title, body) => {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body, icon: '/favicon.ico' });
            }
        };

        // --- CÁC COMPONENT CON ---
        const SettingsModal = ({ theme, onSave, onClose, auth, db, appId }) => {
            const [localTheme, setLocalTheme] = useState(theme);
            const [newPassword, setNewPassword] = useState('');
            const [passwordMessage, setPasswordMessage] = useState('');
            const [passwordError, setPasswordError] = useState('');
            const [showChangePassword, setShowChangePassword] = useState(false);
            const [appPassword, setAppPassword] = useState('');
            const [enableLock, setEnableLock] = useState(false);
            const [lockError, setLockError] = useState('');
            const [lockSuccess, setLockSuccess] = useState('');

            useEffect(() => {
                if (!auth.currentUser) return;
                const loadLockConfig = async () => {
                    try {
                        const settingsRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'lock');
                        const docSnap = await getDoc(settingsRef);
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setAppPassword(data.appPassword || '');
                            setEnableLock(data.enableLock || false);
                        } else {
                            const savedPassword = localStorage.getItem('vt_app_password') || '';
                            const savedEnable = localStorage.getItem('vt_enable_lock') === 'true';
                            setAppPassword(savedPassword);
                            setEnableLock(savedEnable);
                        }
                    } catch (e) {
                        console.error("Lỗi tải thông tin khóa:", e);
                    }
                };
                loadLockConfig();
            }, [auth.currentUser]);

            const handleSaveLockSettings = async (e) => {
                e.preventDefault();
                setLockError('');
                setLockSuccess('');
                if (enableLock && !appPassword.trim()) {
                    setLockError("Vui lòng nhập mã bảo vệ nếu muốn bật tính năng này.");
                    return;
                }
                try {
                    const settingsRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'lock');
                    const payload = { appPassword: appPassword.trim(), enableLock: enableLock };
                    await setDoc(settingsRef, payload, { merge: true });
                    localStorage.setItem('vt_app_password', appPassword.trim());
                    localStorage.setItem('vt_enable_lock', enableLock ? 'true' : 'false');
                    setLockSuccess("Đã cập nhật tính năng bảo vệ thành công!");
                } catch (err) {
                    setLockError("Lỗi lưu cấu hình bảo vệ: " + err.message);
                }
            };

            const handleChangePassword = async (e) => {
                e.preventDefault();
                setPasswordMessage('');
                setPasswordError('');
                if (!newPassword.trim()) {
                    setPasswordError("Vui lòng nhập mật khẩu mới.");
                    return;
                }
                try {
                    if (auth.currentUser) {
                        await updatePassword(auth.currentUser, newPassword);
                        setPasswordMessage("Đổi mật khẩu thành công!");
                        setNewPassword('');
                    } else {
                        setPasswordError("Không tìm thấy thông tin phiên đăng nhập.");
                    }
                } catch (err) {
                    if (err.code === 'auth/requires-recent-login') {
                        setPasswordError("⚠️ Hãy Đăng xuất và Đăng nhập lại để xác thực danh tính trước khi đổi mật khẩu.");
                    } else {
                        setPasswordError("Lỗi: " + err.message);
                    }
                }
            };

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-sm rounded-xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
                        <div className="bg-gray-800 text-white p-4 flex justify-between items-center shrink-0">
                            <h3 className="font-bold flex items-center gap-2"><Palette size={18}/> Giao Diện & Bảo Mật</h3>
                            <button onClick={onClose}><X size={20}/></button>
                        </div>
                        <div className="p-6 space-y-6 overflow-y-auto flex-1 no-scrollbar text-slate-800">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Màu Nền Ứng Dụng</label>
                                <input type="color" className="w-full h-12 rounded cursor-pointer border-2 border-gray-200 bg-white" value={localTheme.bgColor} onChange={e => setLocalTheme({...localTheme, bgColor: e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Màu Nền Ghi Chú</label>
                                <input type="color" className="w-full h-12 rounded cursor-pointer border-2 border-gray-200 bg-white" value={localTheme.noteColor} onChange={e => setLocalTheme({...localTheme, noteColor: e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Màu Chữ Chính</label>
                                <input type="color" className="w-full h-12 rounded cursor-pointer border-2 border-gray-200 bg-white" value={localTheme.textColor} onChange={e => setLocalTheme({...localTheme, textColor: e.target.value})} />
                            </div>
                            <button onClick={() => onSave(localTheme)} className="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md">Lưu & Đồng Bộ Màu</button>
                            <button onClick={() => onSave({ bgColor: '#f3f4f6', noteColor: '#FEFCE8', textColor: '#1F2937' })} className="w-full border border-gray-300 text-gray-600 py-2 rounded-lg text-sm">Khôi phục màu mặc định</button>
                            
                            <div className="border-t pt-4 mt-4">
                                <h4 className="font-bold text-sm text-slate-800 flex items-center gap-2 mb-3"><Lock size={16} /> Bảo vệ Ghi chú & Việc cần làm</h4>
                                <form onSubmit={handleSaveLockSettings} className="space-y-3 p-3 bg-slate-50 rounded-lg border border-slate-200">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-xs font-semibold text-slate-600">Trạng thái khóa bảo vệ:</span>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" className="sr-only peer" checked={enableLock} onChange={e => setEnableLock(e.target.checked)} />
                                            <div className="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                                        </label>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="block text-[10px] font-bold text-slate-500 uppercase">Mã PIN bảo mật</label>
                                        <input type="password" maxLength={12} className="w-full px-3 py-1.5 border rounded-lg text-sm text-slate-800 focus:ring-1 focus:ring-blue-500 outline-none" placeholder="Nhập mã bảo vệ cá nhân..." value={appPassword} onChange={e => setAppPassword(e.target.value)} />
                                    </div>
                                    {lockError && <p className="text-red-500 text-xs">{lockError}</p>}
                                    {lockSuccess && <p className="text-green-600 text-xs font-medium">{lockSuccess}</p>}
                                    <button type="submit" className="w-full bg-slate-800 text-white text-xs font-bold py-2 rounded-lg hover:bg-slate-700 transition">Cập nhật mật khẩu bảo vệ</button>
                                </form>
                            </div>

                            <div className="border-t pt-4 mt-4">
                                <button type="button" onClick={() => setShowChangePassword(!showChangePassword)} className="w-full flex items-center justify-center gap-2 border border-slate-300 text-slate-700 py-2 rounded-lg text-sm font-bold hover:bg-slate-50 transition" >
                                    <Key size={16} /> {showChangePassword ? "Ẩn đổi mật khẩu" : "Đổi mật khẩu tài khoản"}
                                </button>
                                {showChangePassword && (
                                    <form onSubmit={handleChangePassword} className="mt-4 space-y-3 p-3 bg-slate-50 rounded-lg border border-slate-200 animate-in fade-in">
                                        <label className="block text-xs font-bold text-slate-600">Mật khẩu mới</label>
                                        <input type="password" className="w-full px-3 py-2 border rounded-lg text-sm text-slate-800 focus:ring-1 focus:ring-blue-500 outline-none" placeholder="Nhập mật khẩu mới..." value={newPassword} onChange={e => setNewPassword(e.target.value)} />
                                        {passwordError && <p className="text-red-500 text-xs">{passwordError}</p>}
                                        {passwordMessage && <p className="text-green-600 text-xs font-medium">{passwordMessage}</p>}
                                        <button type="submit" className="w-full bg-slate-800 text-white text-xs font-bold py-2 rounded-lg hover:bg-slate-700 transition">Xác nhận đổi mật khẩu</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AuthScreen = ({ auth, appId }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [message, setMessage] = useState('');
            const [showPassword, setShowPassword] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setMessage('');
                if (!email || !password) {
                    setError('Vui lòng điền đầy đủ thông tin.');
                    return;
                }
                try {
                    if (isLogin) {
                        await signInWithEmailAndPassword(auth, email, password);
                    } else {
                        await createUserWithEmailAndPassword(auth, email, password);
                        setMessage('Đăng ký tài khoản mới thành công! Hệ thống tự động đăng nhập...');
                    }
                } catch (err) {
                    let msg = err.message;
                    if (err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') msg = 'Email hoặc mật khẩu không chính xác.';
                    if (err.code === 'auth/email-already-in-use') msg = 'Email này đã được sử dụng bởi tài khoản khác.';
                    if (err.code === 'auth/weak-password') msg = 'Mật khẩu quá yếu (yêu cầu tối thiểu 6 ký tự).';
                    setError(msg);
                }
            };

            const handleForgotPassword = async () => {
                setError('');
                setMessage('');
                if (!email) {
                    setError('Vui lòng nhập Email của bạn vào ô trống phía trên trước.');
                    return;
                }
                try {
                    await sendPasswordResetEmail(auth, email);
                    setMessage('Đã gửi liên kết khôi phục mật khẩu vào Email của bạn. Hãy kiểm tra hòm thư!');
                } catch (err) {
                    setError('Lỗi: ' + err.message);
                }
            };

            return (
                <div className="h-screen bg-slate-900 flex items-center justify-center p-4 font-sans select-none" style={{ backgroundImage: `linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('${BACKGROUNDS[0]}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="bg-white/95 backdrop-blur w-full max-w-sm rounded-2xl shadow-2xl p-6 border border-white/20">
                        <div className="text-center mb-6">
                            <div className="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-2 shadow-lg shadow-blue-500/30">
                                <CalendarDays size={32} />
                            </div>
                            <h2 className="text-xl font-black text-slate-800 uppercase tracking-wide">Lịch Vạn Niên</h2>
                            <p className="text-xs text-slate-500 font-bold mt-0.5">HỆ THỐNG ĐỒNG BỘ ĐÁM MÂY CÁ NHÂN</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-[11px] font-black text-slate-600 uppercase mb-1 tracking-wider">Tài khoản Email</label>
                                <input type="email" className="w-full px-3 py-2 border border-slate-200 bg-white text-slate-800 rounded-xl text-sm outline-none focus:border-blue-500 font-medium transition" placeholder="example@gmail.com" value={email} onChange={e => setEmail(e.target.value)} />
                            </div>

                            <div>
                                <div className="flex justify-between items-center mb-1">
                                    <label className="block text-[11px] font-black text-slate-600 uppercase tracking-wider">Mật khẩu truy cập</label>
                                    {isLogin && <button type="button" onClick={handleForgotPassword} className="text-[11px] text-blue-600 font-bold hover:underline">Quên mật khẩu?</button>}
                                </div>
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} className="w-full px-3 py-2 border border-slate-200 bg-white text-slate-800 rounded-xl text-sm outline-none focus:border-blue-500 font-medium pr-10 transition" placeholder="••••••" value={password} onChange={e => setPassword(e.target.value)} />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                        {showPassword ? <EyeOff size={16}/> : <Eye size={16}/>}
                                    </button>
                                </div>
                            </div>

                            {error && <div className="p-3 bg-red-50 border border-red-100 rounded-xl flex items-start gap-2 text-red-600 text-xs font-medium leading-relaxed"><AlertCircle size={14} className="shrink-0 mt-0.5"/>{error}</div>}
                            {message && <div className="p-3 bg-emerald-50 border border-emerald-100 rounded-xl flex items-start gap-2 text-emerald-700 text-xs font-medium leading-relaxed"><Check size={14} className="shrink-0 mt-0.5"/>{message}</div>}

                            <button type="submit" className="w-full bg-blue-600 text-white font-bold py-2.5 rounded-xl shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition duration-200 text-sm uppercase tracking-wider">{isLogin ? 'Đăng Nhập Hệ Thống' : 'Đăng Ký Tài Khoản'}</button>
                        </form>

                        <div className="mt-5 pt-4 border-t border-slate-100 text-center">
                            <button type="button" onClick={() => { setIsLogin(!isLogin); setError(''); setMessage(''); }} className="text-xs font-bold text-slate-600 hover:text-blue-600 transition">
                                {isLogin ? "Chưa có tài khoản đám mây? Đăng ký ngay" : "Đã có tài khoản cá nhân? Đăng nhập"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const EventsView = ({ user, db, appId, selectedDate, theme, searchHighlightId }) => {
            const [events, setEvents] = useState([]);
            const [newEvent, setNewEvent] = useState('');
            const [repeatType, setRepeatType] = useState('none');
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const dateStr = selectedDate.toISOString().split('T')[0];
            const eventRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'events'), [db, appId, user.uid]);

            useEffect(() => {
                return onSnapshot(query(eventRef), snap => {
                    setEvents(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
            }, [eventRef]);

            const currentLunar = getLunarDate(selectedDate);

            const filteredEvents = useMemo(() => {
                return events.filter(e => {
                    if (e.dateStr === dateStr) return true;
                    if (e.repeat === 'solar') {
                        const ed = new Date(e.dateStr);
                        return ed.getDate() === selectedDate.getDate() && ed.getMonth() === selectedDate.getMonth();
                    }
                    if (e.repeat === 'lunar' && e.lunarDay && e.lunarMonth) {
                        return e.lunarDay === currentLunar.day && e.lunarMonth === currentLunar.month;
                    }
                    if (e.repeat === 'weekly') {
                        return new Date(e.dateStr).getDay() === selectedDate.getDay();
                    }
                    if (e.repeat === 'monthly') {
                        return new Date(e.dateStr).getDate() === selectedDate.getDate();
                    }
                    return false;
                });
            }, [events, dateStr, selectedDate, currentLunar]);

            const onAdd = (title, rType) => {
                const payload = {
                    title,
                    dateStr,
                    repeat: rType,
                    createdAt: serverTimestamp(),
                    lunarDay: currentLunar.day,
                    lunarMonth: currentLunar.month
                };
                addDoc(eventRef, payload);
            };

            const onDelete = (id) => {
                if (deleteConfirm === id) {
                    deleteDoc(doc(eventRef, id));
                    setDeleteConfirm(null);
                } else {
                    setDeleteConfirm(id);
                    setTimeout(() => setDeleteConfirm(null), 3000);
                }
            };

            return (
                <div className="flex-1 flex flex-col font-sans overflow-hidden">
                    <div className="p-4 border-b bg-white/50 backdrop-blur shrink-0">
                        <h3 className="font-bold text-sm text-gray-700 flex items-center gap-1.5"><Calendar size={16}/> Sự kiện ({getDayOfWeek(selectedDate)} {selectedDate.toLocaleDateString('vi-VN')})</h3>
                        <p className="text-[11px] text-slate-500 font-bold mt-0.5 ml-5">Lịch âm: Ngày {currentLunar.day} tháng {currentLunar.month}</p>
                    </div>
                    <div className="flex-1 p-4 overflow-y-auto no-scrollbar">
                        {filteredEvents.length === 0 && <p className="text-center text-gray-400 text-xs mt-6">Không có sự kiện nào trong ngày này.</p>}
                        <ul className="space-y-2">
                            {filteredEvents.map(e => {
                                const isHighlighted = searchHighlightId === e.id;
                                return (
                                    <li key={e.id} className={`flex justify-between items-center bg-white p-2.5 rounded-xl border border-gray-100 shadow-sm transition ${isHighlighted ? 'search-highlight-item border-amber-400 ring-2 ring-amber-200' : ''}`}>
                                        <div className="flex items-center gap-2 overflow-hidden pr-2">
                                            <div className="w-1.5 h-7 bg-red-500 rounded-full shrink-0"></div>
                                            <span className="text-sm font-bold truncate text-gray-800">{e.title}</span>
                                            {e.repeat !== 'none' && <span className="text-[9px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded font-black uppercase tracking-wider shrink-0">{e.repeat === 'lunar' ? 'Âm' : e.repeat === 'solar' ? 'Dương' : e.repeat === 'weekly' ? 'Tuần' : 'Tháng'}</span>}
                                        </div>
                                        <button onClick={() => onDelete(e.id)} className={`text-xs p-1.5 font-bold transition rounded-lg shrink-0 ${deleteConfirm === e.id ? 'bg-red-500 text-white px-2 py-1' : 'text-red-400 hover:text-red-600'}`}>{deleteConfirm === e.id ? <span>Xóa?</span> : <Trash2 size={16}/>}</button>
                                    </li>
                                );
                            })}
                        </ul>
                    </div>
                    <div className="p-4 border-t bg-gray-50 flex flex-col gap-2 shrink-0">
                        <div className="flex gap-2 text-[10px] mb-1 text-gray-700 flex-wrap">
                            <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'none'} onChange={() => setRepeatType('none')} /> Không lặp</label>
                            <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'lunar'} onChange={() => setRepeatType('lunar')} /> Lặp Âm</label>
                            <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'solar'} onChange={() => setRepeatType('solar')} /> Lặp Dương</label>
                            <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'weekly'} onChange={() => setRepeatType('weekly')} /> Tuần</label>
                            <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'monthly'} onChange={() => setRepeatType('monthly')} /> Tháng</label>
                        </div>
                        <div className="flex gap-2">
                            <input className="flex-1 border rounded px-3 py-2 text-sm outline-none focus:border-blue-500 text-slate-800 bg-white" placeholder="Tên sự kiện..." value={newEvent} onChange={e => setNewEvent(e.target.value)} />
                            <button onClick={() => { if(newEvent.trim()) { onAdd(newEvent, repeatType); setNewEvent(''); } }} className="bg-blue-600 text-white p-2 rounded hover:bg-blue-700 shrink-0"><Plus size={20}/></button>
                        </div>
                    </div>
                </div>
            );
        };

        const TodoEditor = ({ initialText, initialReminder, initialDeadline, isNew, onSave, onCancel }) => {
            const [text, setText] = useState(initialText || '');
            const [reminder, setReminder] = useState(initialReminder || '');
            const [deadline, setDeadline] = useState(initialDeadline || '');

            return (
                <div className="p-4 font-sans flex flex-col gap-4 text-slate-800">
                    <div className="flex justify-between items-center border-b pb-2">
                        <h3 className="font-bold text-lg">{isNew ? 'Thêm việc cần làm' : 'Chỉnh sửa công việc'}</h3>
                        <button onClick={onCancel} className="p-1 hover:bg-gray-100 rounded-full"><X size={20}/></button>
                    </div>
                    <div className="space-y-3 flex-1 overflow-y-auto no-scrollbar">
                        <div>
                            <label className="block text-xs font-bold text-gray-600 mb-1">Nội dung công việc *</label>
                            <textarea className="w-full border rounded-xl p-3 text-sm focus:border-blue-500 outline-none h-24 bg-white text-slate-800" placeholder="Nhập nội dung cần xử lý..." value={text} onChange={e => setText(e.target.value)} />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-600 mb-1">Hạn chót hoàn thành (Deadline)</label>
                            <input type="datetime-local" className="w-full border rounded-xl p-2.5 text-sm focus:border-blue-500 outline-none bg-white text-slate-800" value={deadline} onChange={e => setDeadline(e.target.value)} />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-600 mb-1">Thời gian nhắc nhở trước</label>
                            <input type="datetime-local" className="w-full border rounded-xl p-2.5 text-sm focus:border-blue-500 outline-none bg-white text-slate-800" value={reminder} onChange={e => setReminder(e.target.value)} />
                        </div>
                    </div>
                    <div className="pt-2 flex gap-2">
                        <button onClick={onCancel} className="flex-1 py-2 border rounded-xl text-sm font-medium hover:bg-gray-50">Hủy bỏ</button>
                        <button onClick={() => { if(text.trim()) onSave(text, reminder, deadline); }} className="flex-1 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 shadow-md flex items-center justify-center gap-1"><Save size={16}/> Lưu lại</button>
                    </div>
                </div>
            );
        };

        const TodosView = ({ user, db, appId, theme, searchHighlightId }) => {
            const [todos, setTodos] = useState([]);
            const [editing, setEditing] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const todoRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'todos'), [db, appId, user.uid]);

            useEffect(() => {
                return onSnapshot(query(todoRef), snap => {
                    setTodos(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0)));
                });
            }, [todoRef]);

            const toggleComplete = (id, currentVal) => {
                updateDoc(doc(todoRef, id), { completed: !currentVal, updatedAt: serverTimestamp() });
            };

            const handleDelete = (e, id) => {
                e.stopPropagation();
                if (deleteConfirm === id) {
                    deleteDoc(doc(todoRef, id));
                    setDeleteConfirm(null);
                } else {
                    setDeleteConfirm(id);
                    setTimeout(() => setDeleteConfirm(null), 3000);
                }
            };

            const saveTodo = (text, reminderStr, deadlineStr) => {
                const rTime = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                const dTime = deadlineStr ? Timestamp.fromDate(new Date(deadlineStr)) : null;
                const payload = {
                    text,
                    reminderTime: rTime,
                    deadlineTime: dTime,
                    updatedAt: serverTimestamp()
                };
                if (editing.id) {
                    updateDoc(doc(todoRef, editing.id), payload);
                } else {
                    payload.completed = false;
                    payload.createdAt = serverTimestamp();
                    addDoc(todoRef, payload);
                }
                setEditing(null);
            };

            if (editing) {
                const initR = editing.reminderTime ? formatDateTimeForInput(editing.reminderTime.seconds * 1000) : '';
                const initD = editing.deadlineTime ? formatDateTimeForInput(editing.deadlineTime.seconds * 1000) : '';
                return <TodoEditor initialText={editing.text} initialReminder={initR} initialDeadline={initD} isNew={!editing.id} onSave={saveTodo} onCancel={() => setEditing(null)} />;
            }

            return (
                <div className="flex-1 flex flex-col font-sans overflow-hidden">
                    <div className="p-4 border-b bg-white flex justify-between items-center shrink-0">
                        <h2 className="text-lg font-bold text-gray-800">Việc cần làm</h2>
                        <button onClick={() => setEditing({})} className="bg-blue-100 text-blue-600 px-3 py-1.5 rounded-xl font-bold flex items-center gap-1 text-xs hover:bg-blue-200 transition"><Plus size={14}/> Thêm việc</button>
                    </div>
                    <div className="flex-1 p-4 overflow-y-auto no-scrollbar space-y-2">
                        {todos.length === 0 && <div className="text-center text-gray-400 mt-10"><CheckSquare size={40} className="mx-auto opacity-20 mb-1"/><p className="text-xs">Chưa có đầu việc nào cần xử lý.</p></div>}
                        {todos.map(t => {
                            const isHighlighted = searchHighlightId === t.id;
                            return (
                                <div key={t.id} onClick={() => setEditing(t)} className={`bg-white border rounded-xl p-3 shadow-sm flex items-start gap-3 cursor-pointer group hover:border-blue-200 transition relative ${isHighlighted ? 'search-highlight-item border-amber-400 ring-2 ring-amber-200' : 'border-gray-100'}`}>
                                    <input type="checkbox" checked={t.completed || false} onClick={e => e.stopPropagation()} onChange={() => toggleComplete(t.id, t.completed)} className="w-5 h-5 rounded-full border-gray-300 text-blue-600 mt-0.5 shrink-0 focus:ring-0 cursor-pointer" />
                                    <div className="flex-1 min-w-0">
                                        <p className={`text-sm font-bold text-gray-800 break-words leading-snug ${t.completed ? 'line-through text-gray-400 font-medium' : ''}`}>{t.text}</p>
                                        <div className="flex flex-wrap gap-2 mt-1.5">
                                            {t.deadlineTime && <span className="text-[10px] font-semibold flex items-center gap-0.5 text-red-500 bg-red-50 px-1.5 py-0.5 rounded-md"><Clock size={10}/>DL: {formatDisplayDate(t.deadlineTime.seconds)}</span>}
                                            {t.reminderTime && <span className="text-[10px] font-semibold flex items-center gap-0.5 text-orange-500 bg-orange-50 px-1.5 py-0.5 rounded-md"><Bell size={10}/>Nhắc: {formatDisplayDate(t.reminderTime.seconds)}</span>}
                                        </div>
                                    </div>
                                    <button onClick={e => handleDelete(e, t.id)} className={`text-xs p-1.5 font-bold transition rounded-lg shrink-0 ${deleteConfirm === t.id ? 'bg-red-500 text-white px-2 py-1' : 'text-red-400 opacity-60 hover:opacity-100'}`}>{deleteConfirm === t.id ? <span>Xóa?</span> : <Trash2 size={14}/>}</button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const NoteEditor = ({ initialTitle, initialContent, initialReminder, initialColor, isNew, onSave, onCancel }) => {
            const [title, setTitle] = useState(initialTitle || '');
            const [content, setContent] = useState(initialContent || '');
            const [reminder, setReminder] = useState(initialReminder || '');
            const [color, setColor] = useState(initialColor || '#FEFCE8');

            return (
                <div className="p-4 font-sans flex flex-col gap-4 text-slate-800 h-full" style={{backgroundColor: color}}>
                    <div className="flex justify-between items-center border-b border-black/10 pb-2 shrink-0">
                        <h3 className="font-bold text-lg">{isNew ? 'Tạo ghi chú mới' : 'Chỉnh sửa ghi chú'}</h3>
                        <button onClick={onCancel} className="p-1 hover:bg-black/5 rounded-full"><X size={20}/></button>
                    </div>
                    <div className="space-y-4 flex-1 overflow-y-auto no-scrollbar pb-4">
                        <input className="w-full bg-transparent text-base font-bold placeholder:text-black/30 border-b border-black/5 pb-2 outline-none" placeholder="Tiêu đề ghi chú..." value={title} onChange={e=>setTitle(e.target.value)} />
                        <textarea className="w-full bg-transparent text-sm placeholder:text-black/30 h-44 outline-none resize-none font-medium leading-relaxed" placeholder="Nhập nội dung văn bản..." value={content} onChange={e=>setContent(e.target.value)} />
                        <div>
                            <label className="block text-[11px] font-black uppercase text-black/60 mb-1 tracking-wider">Hẹn giờ báo thức</label>
                            <input type="datetime-local" className="w-full bg-white/60 backdrop-blur border border-black/10 rounded-xl p-2 text-sm outline-none focus:border-black/30" value={reminder} onChange={e => setReminder(e.target.value)} />
                        </div>
                        <div>
                            <label className="block text-[11px] font-black uppercase text-black/60 mb-1.5 tracking-wider">Màu sắc phông nền</label>
                            <div className="flex flex-wrap gap-2">
                                {NOTE_COLORS.map(c => <button key={c} type="button" onClick={()=>setColor(c)} className={`w-7 h-7 rounded-full border shadow-sm transition-transform ${color === c ? 'scale-110 border-black ring-2 ring-white/50' : 'border-black/10'}`} style={{backgroundColor: c}}></button>)}
                            </div>
                        </div>
                    </div>
                    <div className="pt-2 flex gap-2 shrink-0">
                        <button onClick={onCancel} className="flex-1 py-2 bg-black/5 border border-black/10 rounded-xl text-sm font-medium hover:bg-black/10">Hủy</button>
                        <button onClick={() => { if(title.trim() || content.trim()) onSave(title, content, reminder, color); }} className="flex-1 py-2 bg-slate-900 text-white rounded-xl text-sm font-bold hover:bg-slate-800 shadow-md flex items-center justify-center gap-1"><Check size={16}/> Hoàn tất</button>
                    </div>
                </div>
            );
        };

        const NotesView = ({ user, db, appId, theme, searchHighlightId }) => {
            const [notes, setNotes] = useState([]);
            const [editing, setEditing] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const noteRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'notes'), [db, appId, user.uid]);

            useEffect(() => {
                return onSnapshot(query(noteRef), snap => {
                    setNotes(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.updatedAt?.seconds||0) - (a.updatedAt?.seconds||0)));
                });
            }, [noteRef]);

            const save = (title, content, reminderStr, color) => {
                const reminderData = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                const data = {
                    title: title||'K.Tiêu đề',
                    content: content||'',
                    reminderTime: reminderData,
                    color: color,
                    updatedAt: serverTimestamp()
                };
                if(editing.id) updateDoc(doc(noteRef, editing.id), data);
                else addDoc(noteRef, data);
                setEditing(null);
            };

            const handleDelete = (e, id) => {
                e.stopPropagation();
                if (deleteConfirm === id) {
                    deleteDoc(doc(noteRef, id));
                    setDeleteConfirm(null);
                } else {
                    setDeleteConfirm(id);
                    setTimeout(() => setDeleteConfirm(null), 3000);
                }
            };

            if (editing) {
                const currentReminderStr = editing.reminderTime ? formatDateTimeForInput(editing.reminderTime.seconds * 1000) : '';
                return <NoteEditor initialTitle={editing.title} initialContent={editing.content} initialReminder={currentReminderStr} initialColor={editing.color} isNew={!editing.id} onSave={save} onCancel={() => setEditing(null)} />;
            }

            return (
                <div className="p-4 font-sans flex flex-col flex-1 overflow-hidden" style={{color: theme.textColor}}>
                    <div className="flex justify-between mb-4 shrink-0"><h2 className="text-xl font-bold">Sổ tay</h2><button onClick={()=>setEditing({})} className="bg-blue-100 text-blue-600 px-3 py-2 rounded-lg flex items-center gap-1 text-sm font-bold"><Plus size={16}/> Mới</button></div>
                    <div className="grid grid-cols-2 gap-3 flex-1 overflow-y-auto no-scrollbar pb-4">
                        {notes.length === 0 && <div className="col-span-2 text-center text-gray-400 mt-10"><StickyNote size={48} className="mx-auto mb-2 opacity-20" /><p>Trống trơn...</p></div>}
                        {notes.map(n => {
                            const isHighlighted = searchHighlightId === n.id;
                            return (
                                <div key={n.id} onClick={()=>setEditing(n)} className={`p-4 rounded-xl border shadow-sm h-48 flex flex-col relative group cursor-pointer hover:shadow-md transition ${isHighlighted ? 'search-highlight-item border-amber-400 ring-2 ring-amber-200' : 'border-gray-200'}`} style={{backgroundColor: n.color || theme.noteColor}}>
                                    <div className="flex justify-between items-start mb-2">
                                        <h4 className="font-bold truncate text-gray-800 flex-1">{n.title}</h4>
                                        {n.reminderTime && <Bell size={12} className="text-orange-500 mt-1 ml-1" />}
                                    </div>
                                    <p className="text-xs overflow-hidden flex-1 leading-relaxed whitespace-pre-wrap font-medium text-slate-700" style={{opacity: 0.9}}>{n.content}</p>
                                    {n.reminderTime && <div className="text-[9px] text-orange-600 font-medium mt-1 mb-1 flex items-center gap-1"><Clock size={10}/> {formatDisplayDate(n.reminderTime.seconds)}</div>}
                                    <div className="flex justify-between items-center mt-1 pt-2 border-t border-black/10">
                                        <span className="text-[10px] text-slate-500">{n.updatedAt ? new Date(n.updatedAt.seconds*1000).toLocaleDateString('vi-VN') : ''}</span>
                                        <button onClick={(e)=>handleDelete(e, n.id)} className={`text-xs px-2 py-0.5 rounded-md font-bold text-red-500 hover:bg-black/5 ${deleteConfirm === n.id ? 'bg-red-500 text-white hover:bg-red-600' : ''}`}>{deleteConfirm === n.id ? 'Xóa?' : <Trash2 size={12}/>}</button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const CalendarView = ({ user, db, appId, selectedDate, onSelectDate, theme, searchHighlightId }) => {
            const [currentDate, setCurrentDate] = useState(new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1));
            const [animClass, setAnimClass] = useState('');

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayIndex = (new Date(year, month, 1).getDay() + 6) % 7; 

            const days = [];
            for (let i = 0; i < firstDayIndex; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));

            const triggerAnim = (dir) => {
                setAnimClass(dir === 'next' ? 'anim-next' : 'anim-prev');
                setTimeout(() => setAnimClass(''), 500);
            };

            const getDayColor = (idx) => {
                if (idx === 5) return 'text-blue-500'; 
                if (idx === 6) return 'text-red-500'; 
                return 'text-gray-500';
            };

            return (
                <div className="p-4 font-sans flex flex-col flex-1 overflow-hidden">
                    <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-150 shrink-0">
                        <button onClick={() => { triggerAnim('prev'); setCurrentDate(new Date(year, month - 1, 1)); }} className="p-2 hover:bg-gray-100 rounded-full"><ChevronLeft className="text-gray-600" /></button>
                        <h2 className="text-lg font-bold uppercase text-gray-800">Tháng {month + 1} / {year}</h2>
                        <button onClick={() => { triggerAnim('next'); setCurrentDate(new Date(year, month + 1, 1)); }} className="p-2 hover:bg-gray-100 rounded-full"><ChevronRight className="text-gray-600" /></button>
                    </div>
                    <div className="grid grid-cols-7 gap-1 text-center mb-2 shrink-0">
                        {['T2','T3','T4','T5','T6','T7','CN'].map((d, i) => <div key={d} className={`text-sm font-bold ${getDayColor(i)}`}>{d}</div>)}
                    </div>
                    <div className={`grid grid-cols-7 gap-1 flex-1 overflow-y-auto no-scrollbar perspective-container ${animClass}`}>
                        {days.map((date, idx) => {
                            if(!date) return <div key={`empty-${idx}`} className="p-2"></div>;
                            const isToday = date.toDateString() === new Date().toDateString();
                            const isSelected = date.toDateString() === selectedDate.toDateString();
                            const lunar = getLunarDate(date);
                            const isSpecialLunar = lunar.day === 1 || lunar.day === 15;

                            return (
                                <div key={date.getTime()} onClick={() => onSelectDate(date)} className={`p-2 rounded-xl flex flex-col items-center justify-between cursor-pointer border min-h-[56px] transition relative ${isSelected ? 'bg-blue-600 text-white border-blue-600 shadow-md shadow-blue-500/20 scale-105 z-10' : isToday ? 'bg-blue-50 text-blue-600 border-blue-200 font-black' : 'bg-white border-gray-100 hover:border-gray-300'}`}>
                                    <span className="text-sm font-bold">{date.getDate()}</span>
                                    <span className={`text-[9px] font-medium leading-none ${isSelected ? 'text-blue-100' : isSpecialLunar ? 'text-red-500 font-bold' : 'text-gray-400'}`}>{lunar.day === 1 ? `${lunar.day}/${lunar.month}` : lunar.day}</span>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const TimetableView = ({ user, db, appId, theme, searchHighlightId }) => {
            const [timetable, setTimetable] = useState({});
            const [editingCell, setEditingCell] = useState(null);
            const [subject, setSubject] = useState('');
            const [teacher, setTeacher] = useState('');
            const [room, setRoom] = useState('');

            const timetableRef = useMemo(() => doc(db, 'artifacts', appId, 'users', user.uid, 'timetable', 'main'), [db, appId, user.uid]);

            useEffect(() => {
                return onSnapshot(timetableRef, docSnap => {
                    if (docSnap.exists()) setTimetable(docSnap.data());
                });
            }, [timetableRef]);

            const days = ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            const periods = ['Tiết 1', 'Tiết 2', 'Tiết 3', 'Tiết 4', 'Tiết 5'];

            const handleCellClick = (day, period) => {
                const cellData = timetable[`${day}_${period}`] || {};
                setEditingCell({ day, period });
                setSubject(cellData.subject || '');
                setTeacher(cellData.teacher || '');
                setRoom(cellData.room || '');
            };

            const handleSaveCell = () => {
                const key = `${editingCell.day}_${editingCell.period}`;
                const updatedData = {
                    ...timetable,
                    [key]: { subject, teacher, room }
                };
                setDoc(timetableRef, updatedData);
                setEditingCell(null);
            };

            if (editingCell) {
                return (
                    <div className="p-4 font-sans text-slate-800 flex flex-col gap-4">
                        <div className="flex justify-between items-center border-b pb-2">
                            <h3 className="font-bold text-lg">{editingCell.day} - {editingCell.period}</h3>
                            <button onClick={() => setEditingCell(null)} className="p-1 hover:bg-gray-100 rounded-full"><X size={20}/></button>
                        </div>
                        <div className="space-y-3">
                            <div>
                                <label className="block text-xs font-bold text-gray-600 mb-1">Môn học / Nội dung</label>
                                <input className="w-full border rounded-xl p-2.5 text-sm outline-none focus:border-blue-500 bg-white" placeholder="Ví dụ: Toán học, Sinh hoạt lớp..." value={subject} onChange={e=>setSubject(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-600 mb-1">Giáo viên</label>
                                <input className="w-full border rounded-xl p-2.5 text-sm outline-none focus:border-blue-500 bg-white" placeholder="Tên giáo viên phụ trách..." value={teacher} onChange={e=>setTeacher(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-600 mb-1">Phòng học</label>
                                <input className="w-full border rounded-xl p-2.5 text-sm outline-none focus:border-blue-500 bg-white" placeholder="Ví dụ: Phòng 102, Nhà đa năng..." value={room} onChange={e=>setRoom(e.target.value)} />
                            </div>
                        </div>
                        <div className="pt-2 flex gap-2">
                            <button onClick={() => setEditingCell(null)} className="flex-1 py-2 border rounded-xl text-sm font-medium hover:bg-gray-50">Hủy bỏ</button>
                            <button onClick={handleSaveCell} className="flex-1 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 shadow-md">Cập nhật</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex-1 flex flex-col font-sans overflow-hidden">
                    <div className="p-4 border-b bg-white shrink-0"><h2 className="text-lg font-bold text-gray-800">Thời khóa biểu tuần</h2></div>
                    <div className="flex-1 p-2 overflow-auto no-scrollbar">
                        <div className="min-w-[600px] border rounded-xl overflow-hidden bg-white shadow-sm border-gray-100">
                            <div className="grid grid-cols-7 bg-slate-100 text-center font-bold text-xs py-2 text-slate-700 border-b border-gray-200">
                                <div className="border-r border-gray-200 py-1">Tiết</div>
                                {days.map(d => <div key={d} className="py-1">{d}</div>)}
                            </div>
                            {periods.map(p => (
                                <div key={p} className="grid grid-cols-7 border-b last:border-0 text-center items-stretch border-gray-100">
                                    <div className="bg-slate-50/80 font-bold text-xs text-slate-500 flex items-center justify-center p-2 border-r border-gray-200">{p}</div>
                                    {days.map(d => {
                                        const cell = timetable[`${d}_${p}`] || {};
                                        const cellKey = `${d}_${p}`;
                                        const isHighlighted = searchHighlightId === cellKey;
                                        return (
                                            <div key={d} onClick={() => handleCellClick(d, p)} className={`p-1.5 text-[11px] flex flex-col justify-center gap-0.5 cursor-pointer border-r last:border-r-0 border-gray-100 hover:bg-blue-50/50 transition min-h-[64px] overflow-hidden ${isHighlighted ? 'search-highlight-item bg-amber-100 border-amber-300 font-bold' : ''}`}>
                                                {cell.subject ? (
                                                    <>
                                                        <span className="font-bold text-slate-800 line-clamp-2 leading-tight">{cell.subject}</span>
                                                        {cell.teacher && <span className="text-[9px] text-slate-400 font-medium truncate">{cell.teacher}</span>}
                                                        {cell.room && <span className="text-[9px] text-blue-500 font-semibold truncate mt-0.5">{cell.room}</span>}
                                                    </>
                                                ) : <span className="text-gray-300 italic text-[10px]">Trống</span>}
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- CẤU PHẦN CHÍNH (APP) ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('calendar');
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [dailyDate, setDailyDate] = useState(new Date());
            const [calendarCurrentDate, setCalendarCurrentDate] = useState(new Date());
            const [calendarSelectedDate, setCalendarSelectedDate] = useState(new Date());
            const [showSettings, setShowSettings] = useState(false);
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [showOfflineBadge, setShowOfflineBadge] = useState(false);
            const [connectionError, setConnectionError] = useState(false);
            const [theme, setTheme] = useState({ bgColor: '#f3f4f6', noteColor: '#FEFCE8', textColor: '#1F2937' });

            // Quản lý mật khẩu khóa bảo vệ cục bộ
            const [unlockedTabs, setUnlockedTabs] = useState({ todo: false, notes: false });
            const [pinPrompt, setPinPrompt] = useState(null); 
            const [pinInput, setPinInput] = useState('');
            const [pinError, setPinError] = useState('');

            // --- STATE PHỤC VỤ CHỨC NĂNG TÌM KIẾM TOÀN CỤC ---
            const [searchQuery, setSearchQuery] = useState('');
            const [isSearching, setIsSearching] = useState(false);
            const [searchHighlightId, setSearchHighlightId] = useState(null);

            // Các kho dữ liệu đồng bộ thời gian thực phục vụ Search toàn cục
            const [globalEvents, setGlobalEvents] = useState([]);
            const [globalTodos, setGlobalTodos] = useState([]);
            const [globalNotes, setGlobalNotes] = useState([]);
            const [globalTimetable, setGlobalTimetable] = useState({});

            const app = initializeApp(MANUAL_CONFIG);
            const db = getFirestore(app);

            // Bật bộ nhớ lưu đệm Offline khép kín IndexedDB
            useEffect(() => {
                enableIndexedDbPersistence(db).catch((err) => {
                    if (err.code === 'failed-precondition') {
                        console.warn("Chế độ Offline thất bại do nhiều tab mở cùng lúc.");
                    } else if (err.code === 'unimplemented') {
                        console.warn("Trình duyệt này không hỗ trợ lưu đệm dữ liệu.");
                    }
                });
            }, []);

            useEffect(() => {
                const savedTheme = localStorage.getItem('app_theme');
                if (savedTheme) {
                    try { setTheme(JSON.parse(savedTheme)); } catch(e) {}
                }
                
                const handleOnline = () => { setIsOffline(false); setShowOfflineBadge(true); setTimeout(() => setShowOfflineBadge(false), 5000); };
                const handleOffline = () => { setIsOffline(true); setConnectionError(true); };

                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);

                const unsubscribe = onAuthStateChanged(getAuth(app), async (currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                    if (currentUser) {
                        const themeSnap = await getDoc(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', currentUser.uid, 'settings', 'theme'));
                        if (themeSnap.exists()) {
                            setTheme(themeSnap.data());
                            localStorage.setItem('app_theme', JSON.stringify(themeSnap.data()));
                        }
                    }
                });

                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }

                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                    unsubscribe();
                };
            }, []);

            // LẮNG NGHE DỮ LIỆU TOÀN CỤC CHO TÍNH NĂNG TÌM KIẾM THỜI GIAN THỰC
            useEffect(() => {
                if (!user) return;

                const unsubEvents = onSnapshot(collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'events'), snap => {
                    setGlobalEvents(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                const unsubTodos = onSnapshot(collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'todos'), snap => {
                    setGlobalTodos(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                const unsubNotes = onSnapshot(collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'notes'), snap => {
                    setGlobalNotes(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                const unsubTimetable = onSnapshot(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'timetable', 'main'), docSnap => {
                    if (docSnap.exists()) setGlobalTimetable(docSnap.data());
                });

                return () => {
                    unsubEvents();
                    unsubTodos();
                    unsubNotes();
                    unsubTimetable();
                };
            }, [user]);

            // LOGIC LỌC KẾT QUẢ TÌM KIẾM TOÀN CỤC
            const searchResults = useMemo(() => {
                if (!searchQuery.trim()) return [];
                const q = searchQuery.toLowerCase();
                const results = [];

                // 1. Tìm trong Sự kiện (events)
                globalEvents.forEach(e => {
                    if (e.title && e.title.toLowerCase().includes(q)) {
                        results.push({ type: 'Sự kiện', id: e.id, title: e.title, desc: `Ngày: ${e.dateStr || ''} (${e.repeat || 'không lặp'})`, targetTab: 'calendar', payload: e });
                    }
                });

                // 2. Tìm trong Việc cần làm (todos)
                globalTodos.forEach(t => {
                    if (t.text && t.text.toLowerCase().includes(q)) {
                        results.push({ type: 'Việc cần làm', id: t.id, title: t.text, desc: t.completed ? 'Đã hoàn thành' : 'Chưa hoàn thành', targetTab: 'todo', payload: t });
                    }
                });

                // 3. Tìm trong Ghi chú (notes)
                globalNotes.forEach(n => {
                    const inTitle = n.title && n.title.toLowerCase().includes(q);
                    const inContent = n.content && n.content.toLowerCase().includes(q);
                    if (inTitle || inContent) {
                        results.push({ type: 'Ghi chú', id: n.id, title: n.title, desc: n.content || '', targetTab: 'notes', payload: n });
                    }
                });

                // 4. Tìm trong Thời khóa biểu (timetable)
                Object.keys(globalTimetable).forEach(key => {
                    const cell = globalTimetable[key];
                    if (cell && typeof cell === 'object') {
                        const inSubject = cell.subject && cell.subject.toLowerCase().includes(q);
                        const inTeacher = cell.teacher && cell.teacher.toLowerCase().includes(q);
                        const inRoom = cell.room && cell.room.toLowerCase().includes(q);
                        if (inSubject || inTeacher || inRoom) {
                            const [day, period] = key.split('_');
                            results.push({ type: 'Thời khóa biểu', id: key, title: cell.subject, desc: `${day} - ${period} ${cell.teacher ? `| GV: ${cell.teacher}` : ''} ${cell.room ? `| Phòng: ${cell.room}` : ''}`, targetTab: 'timetable', payload: cell });
                        }
                    }
                });

                // Sắp xếp kết quả gần từ khóa nhất (Ưu tiên từ khóa ở đầu chuỗi)
                return results.sort((a, b) => {
                    const idxA = a.title.toLowerCase().indexOf(q);
                    const idxB = b.title.toLowerCase().indexOf(q);
                    return idxA - idxB;
                });
            }, [searchQuery, globalEvents, globalTodos, globalNotes, globalTimetable]);

            // HÀM XỬ LÝ ĐIỀU HƯỚNG VÀ HIGHLIGHT KHI NGƯỜI DÙNG BẤM CHỌN KẾT QUẢ TÌM KIẾM
            const handleSelectSearchResult = async (result) => {
                setSearchQuery('');
                setIsSearching(false);

                // Khai báo bỏ qua kiểm tra mật khẩu tạm thời nếu tab đích bị khóa để người dùng xem được ngay
                setUnlockedTabs(prev => ({ ...prev, [result.targetTab]: true }));
                
                // Chuyển Tab phù hợp
                setActiveTab(result.targetTab);

                // Nếu là sự kiện, chuyển đổi ngày của lịch xem về đúng ngày diễn ra sự kiện
                if (result.type === 'Sự kiện' && result.payload.dateStr) {
                    setSelectedDate(new Date(result.payload.dateStr));
                }

                // Thiết lập ID nhấp nháy làm nổi bật phần tử tìm kiếm
                setSearchHighlightId(result.id);
                
                // Tự động tắt highlight sau 4 giây để hoàn tất chu trình trải nghiệm trực quan
                setTimeout(() => {
                    setSearchHighlightId(null);
                }, 4000);
            };

            const checkTabAccess = async (tabName) => {
                const savedEnable = localStorage.getItem('vt_enable_lock') === 'true';
                const savedPassword = localStorage.getItem('vt_app_password') || '';

                if (user && savedEnable && savedPassword) {
                    try {
                        const settingsRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'lock');
                        const docSnap = await getDoc(settingsRef);
                        let firebaseEnable = savedEnable;
                        let firebasePassword = savedPassword;
                        if (docSnap.exists()) {
                            firebaseEnable = docSnap.data().enableLock;
                            firebasePassword = docSnap.data().appPassword;
                        }
                        if (!firebaseEnable || !firebasePassword) {
                            setUnlockedTabs(prev => ({ ...prev, [tabName]: true }));
                            setActiveTab(tabName);
                            return;
                        }
                        if (unlockedTabs[tabName]) {
                            setActiveTab(tabName);
                        } else {
                            setPinPrompt(tabName);
                            setPinInput('');
                            setPinError('');
                        }
                    } catch (e) {
                        if (unlockedTabs[tabName]) {
                            setActiveTab(tabName);
                        } else {
                            setPinPrompt(tabName);
                            setPinInput('');
                            setPinError('');
                        }
                    }
                } else {
                    setActiveTab(tabName);
                }
            };

            const handleVerifyPin = async (e) => {
                e.preventDefault();
                setPinError('');
                const savedPassword = localStorage.getItem('vt_app_password') || '';
                let correctPassword = savedPassword;

                if (user) {
                    try {
                        const settingsRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'lock');
                        const docSnap = await getDoc(settingsRef);
                        if (docSnap.exists()) {
                            correctPassword = docSnap.data().appPassword || savedPassword;
                        }
                    } catch (err) {}
                }

                if (pinInput === correctPassword) {
                    setUnlockedTabs(prev => ({ ...prev, [pinPrompt]: true }));
                    setActiveTab(pinPrompt);
                    setPinPrompt(null);
                } else {
                    setPinError("Mã bảo vệ (PIN) không chính xác. Vui lòng thử lại!");
                }
            };

            const handleSaveTheme = async (newTheme) => {
                setTheme(newTheme);
                setShowSettings(false);
                try { localStorage.setItem('app_theme', JSON.stringify(newTheme)); } catch (e) {}
                if (user) await setDoc(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'theme'), newTheme);
            };

            const handleTabChange = (tab) => {
                if (tab === 'todo' || tab === 'notes') {
                    checkTabAccess(tab);
                } else {
                    if (tab === 'day') { setDailyDate(new Date()); }
                    else if (tab === 'calendar') { setCalendarCurrentDate(new Date()); setCalendarSelectedDate(new Date()); }
                    setActiveTab(tab);
                }
            };

            // START: Thêm đoạn code đăng ký Service Worker chạy ngầm (Yêu cầu 3)
            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        navigator.serviceWorker.register('./sw.js')
                            .then(reg => console.log('Đăng ký Service Worker thành công:', reg.scope))
                            .catch(err => console.log('Lỗi đăng ký Service Worker:', err));
                    });
                }
            }, []);
            // END: Thêm đoạn code đăng ký Service Worker chạy ngầm

            const currentQuote = useMemo(() => {
                const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
                return DEFAULT_VERSES[dayOfYear % DEFAULT_VERSES.length];
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center text-blue-500 font-sans font-bold">Đang tải ứng dụng...</div>;
            if (!user) return <AuthScreen auth={getAuth(app)} appId={MANUAL_CONFIG.projectId} />;

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto shadow-2xl overflow-hidden relative transition-colors duration-300 animate-fade-in" style={{ backgroundColor: theme.bgColor, color: theme.textColor }}>
                    
                    {/* KHU VỰC CHỈ BÁO OFFLINE MINI TẠI HEADER */}
                    {isOffline && (
                        <div className="bg-amber-500 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none animate-pulse z-30">
                            <WifiOff size={10} /> Đang chạy ngoại tuyến (Offline Mode)
                        </div>
                    )}
                    {showOfflineBadge && !isOffline && (
                        <div className="bg-emerald-600 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none z-30">
                            <Wifi size={10} /> Đã khôi phục kết nối trực tuyến (Online)
                        </div>
                    )}

                    {/* BANNER HEADER CHỨA THANH TÌM KIẾM TOÀN CỤC */}
                    <header className="bg-blue-600 text-white p-2 flex justify-between items-center shadow-md z-20 shrink-0 relative">
                        <div className="flex flex-col overflow-hidden w-2/5">
                            <h1 className="text-sm font-bold whitespace-nowrap truncate font-sans">Lịch Văn Trung</h1>
                            <p className="text-[9px] text-blue-100 font-bold truncate">Chào, {user.email?.split('@')[0]}</p>
                        </div>

                        {/* INPUT THANH TÌM KIẾM TOÀN CỤC - RESPONSIVE */}
                        <div className="w-1/3 relative flex items-center">
                            <input 
                                type="text"
                                placeholder="Tìm kiếm..."
                                value={searchQuery}
                                onFocus={() => setIsSearching(true)}
                                onChange={e => setSearchQuery(e.target.value)}
                                className="w-full bg-blue-700/60 text-white text-xs px-2.5 py-1 pl-7 rounded-xl outline-none border border-blue-500/30 focus:border-white/50 focus:bg-blue-700 transition placeholder:text-blue-200/70 font-sans"
                            />
                            <Search size={12} className="absolute left-2.5 text-blue-200/80 pointer-events-none" />
                            {searchQuery && (
                                <button onClick={() => setSearchQuery('')} className="absolute right-2 text-blue-200 hover:text-white">
                                    <X size={12} />
                                </button>
                            )}
                        </div>

                        <div className="flex items-center gap-1 shrink-0">
                            <button onClick={() => setShowSettings(true)} className="p-1.5 hover:bg-blue-700 rounded-xl transition" title="Cài đặt giao diện"><Settings size={16}/></button>
                            <button onClick={() => signOut(getAuth(app))} className="p-1.5 hover:bg-red-600 rounded-xl transition" title="Đăng xuất"><LogOut size={16}/></button>
                        </div>
                    </header>

                    {/* POPUP MODAL HIỂN THỊ KẾT QUẢ TÌM KIẾM TOÀN CỤC PHÂN LOẠI */}
                    {isSearching && (
                        <div className="absolute inset-0 bg-black/40 z-40 top-[44px] flex flex-col font-sans">
                            <div className="bg-white m-3 rounded-2xl shadow-xl border border-gray-100 max-h-[75vh] flex flex-col overflow-hidden text-slate-800 animate-in fade-in">
                                <div className="bg-gray-50 px-4 py-2 border-b flex justify-between items-center shrink-0">
                                    <span className="text-xs font-black uppercase text-slate-500 tracking-wider">Kết quả tìm kiếm toàn cục</span>
                                    <button onClick={() => { setIsSearching(false); setSearchQuery(''); }} className="text-gray-400 hover:text-gray-600 p-1"><X size={16}/></button>
                                </div>
                                
                                <div className="p-2 overflow-y-auto no-scrollbar flex-1 space-y-3 bg-slate-50">
                                    {!searchQuery.trim() ? (
                                        <div className="text-center py-8 text-gray-400 text-xs font-medium">Nhập từ khóa để quét nhanh Sự kiện, Việc cần làm, Ghi chú và Thời khóa biểu...</div>
                                    ) : searchResults.length === 0 ? (
                                        <div className="text-center py-8 text-gray-400 text-xs font-medium">Không tìm thấy kết quả phù hợp với từ khóa tìm kiếm.</div>
                                    ) : (
                                        <div>
                                            {/* Phân nhóm hiển thị theo Thể loại */}
                                            {['Sự kiện', 'Việc cần làm', 'Ghi chú', 'Thời khóa biểu'].map(category => {
                                                const group = searchResults.filter(r => r.type === category);
                                                if (group.length === 0) return null;
                                                return (
                                                    <div key={category} className="mb-3 last:mb-0">
                                                        <div className="text-[10px] font-black text-blue-600 uppercase tracking-widest px-2 mb-1">{category} ({group.length})</div>
                                                        <div className="bg-white rounded-xl border border-slate-100 divide-y divide-slate-50 overflow-hidden shadow-sm">
                                                            {group.map(item => (
                                                                <div 
                                                                    key={item.id} 
                                                                    onClick={() => handleSelectSearchResult(item)}
                                                                    className="p-2.5 hover:bg-slate-50 cursor-pointer transition flex flex-col gap-0.5"
                                                                >
                                                                    <div className="text-xs font-bold text-slate-800 truncate">{item.title}</div>
                                                                    <div className="text-[10px] text-slate-400 line-clamp-1 font-medium">{item.desc}</div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="flex-1" onClick={() => { setIsSearching(false); setSearchQuery(''); }}></div>
                        </div>
                    )}

                    {/* GIAO DIỆN MODAL NHẬP MÃ PIN KHÓA BẢO VỆ CÁ NHÂN */}
                    {pinPrompt && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-xs font-sans">
                            <div className="bg-white w-full max-w-xs rounded-2xl shadow-2xl overflow-hidden text-slate-800 animate-in fade-in">
                                <div className="bg-slate-800 text-white p-3 flex justify-between items-center">
                                    <h3 className="font-bold text-sm flex items-center gap-1.5"><Lock size={14}/> Xác thực mã bảo vệ</h3>
                                    <button onClick={() => setPinPrompt(null)}><X size={18}/></button>
                                </div>
                                <form onSubmit={handleVerifyPin} className="p-4 space-y-3">
                                    <p className="text-xs text-slate-500 leading-relaxed font-medium">Vui lòng nhập Mã PIN bảo mật để mở khóa truy cập dữ liệu của thẻ này.</p>
                                    <input 
                                        type="password"
                                        maxLength={12}
                                        placeholder="Nhập mã bảo vệ..."
                                        value={pinInput}
                                        onChange={e => setPinInput(e.target.value)}
                                        className="w-full px-3 py-2 border rounded-xl text-center text-sm tracking-widest font-black outline-none focus:border-blue-500 bg-slate-50 text-slate-800"
                                        autoFocus
