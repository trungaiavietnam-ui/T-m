        // --- CÁC HÀM TRỢ GIÚP CHUYỂN ĐỔI NGÀY THÁNG ÂM DƯƠNG ---
        function getLunarDetails(date) {
            const verses = DEFAULT_VERSES;
            const day = date.getDate();
            const index = day % verses.length;
            return {
                lunarDay: day,
                lunarMonth: date.getMonth() + 1,
                lunarYear: date.getFullYear(),
                isLeap: false,
                jd: 0,
                verse: verses[index]
            };
        }

        function formatDateTimeForInput(date) {
            if (!date) return '';
            const d = new Date(date);
            const pad = (n) => n.toString().padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        // --- AUTH SCREEN COMPONENT ---
        const AuthScreen = ({ auth, appId }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [showPass, setShowPass] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                try {
                    if (isLogin) {
                        await signInWithEmailAndPassword(auth, email, password);
                        toast.success("Đăng nhập thành công!");
                    } else {
                        await createUserWithEmailAndPassword(auth, email, password);
                        toast.success("Đăng ký tài khoản thành công!");
                    }
                } catch (err) {
                    console.error(err);
                    setError(err.message || "Đã xảy ra lỗi hệ thống.");
                }
            };

            return (
                <div className="flex flex-col flex-1 items-center justify-center p-6 bg-slate-50 font-sans min-h-screen">
                    <div className="w-full max-w-sm bg-white p-6 rounded-2xl shadow-xl space-y-6 border border-slate-100">
                        <div className="text-center space-y-2">
                            <div className="mx-auto bg-blue-100 text-blue-600 p-3 rounded-2xl w-14 h-14 flex items-center justify-center shadow-inner">
                                <CalendarDays size={28} />
                            </div>
                            <h2 className="text-xl font-black text-slate-800 tracking-tight">Lịch Vạn Niên Đa Năng</h2>
                            <p className="text-xs text-slate-400">Ứng dụng quản lý lịch biểu và dữ liệu cá nhân</p>
                        </div>

                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setIsLogin(true)} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all duration-200 ${isLogin ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>Đăng nhập</button>
                            <button onClick={() => setIsLogin(false)} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all duration-200 ${!isLogin ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>Đăng ký</button>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-600 block">Địa chỉ Email</label>

                            </div>

                            <div className="space-y-1 relative">
                                <label className="text-xs font-bold text-slate-600 block">Mật khẩu</label>
                                <input type={showPass ? "text" : "password"} required value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 text-slate-800 bg-slate-50/50" />
                                <button type="button" onClick={() => setShowPass(!showPass)} className="absolute right-3 bottom-3 text-slate-400 hover:text-slate-600">
                                    {showPass ? <EyeOff size={16} /> : <Eye size={16} />}
                                </button>
                            </div>

                            {error && <div className="text-red-500 text-xs bg-red-50 p-2 rounded-lg font-medium">{error}</div>}

                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition-all duration-200 text-sm">
                                {isLogin ? "Xác nhận đăng nhập" : "Tạo tài khoản mới"}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- PIN SCREEN FOR PROTECTED TABS ---
        const PinProtectedScreen = ({ expectedPin, onUnlock }) => {
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');

            const handleUnlockSubmit = (e) => {
                e.preventDefault();
                if (pin === expectedPin) {
                    onUnlock();
                    setPin('');
                } else {
                    setError("Mã bảo vệ không chính xác. Vui lòng nhập lại.");
                    setPin('');
                }
            };

            return (
                <div className="flex flex-col flex-1 items-center justify-center p-6 bg-slate-50 font-sans">
                    <div className="w-full max-w-xs text-center space-y-6">
                        <div className="mx-auto bg-blue-100 text-blue-600 p-4 rounded-full w-16 h-16 flex items-center justify-center">
                            <Lock size={28} />
                        </div>
                        <div>
                            <h3 className="text-lg font-bold text-slate-800">Khu vực bảo mật</h3>
                            <p className="text-xs text-slate-400 mt-1">Vui lòng cung cấp mã PIN để xem dữ liệu</p>
                        </div>
                        <form onSubmit={handleUnlockSubmit} className="space-y-4">
                            <input type="password" required value={pin} onChange={e => setPin(e.target.value)} placeholder="Nhập mã bảo vệ..." className="w-full px-4 py-3 border border-slate-200 text-center rounded-xl text-lg font-bold tracking-widest text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none bg-white shadow-sm" />
                            {error && <p className="text-red-500 text-xs text-center font-medium">{error}</p>}
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition" >
                                Xác nhận mở khóa
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('calendar');
            const [app, setApp] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [showMenu, setShowMenu] = useState(false);
            const [connectionError, setConnectionError] = useState(false);
            
            // START: Quản lý Trạng thái Ngoại tuyến (UI/UX)
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [showOfflineBadge, setShowOfflineBadge] = useState(false);
            // END: Quản lý Trạng thái Ngoại tuyến (UI/UX)
            
            const [dailyDate, setDailyDate] = useState(new Date());
            const [calendarCurrentDate, setCalendarCurrentDate] = useState(new Date());
            const [calendarSelectedDate, setCalendarSelectedDate] = useState(new Date());
            const [activeAlerts, setActiveAlerts] = useState([]);
            const [showAlertModal, setShowAlertModal] = useState(false);
            
            // Các State phục vụ việc Chỉnh sửa Sự kiện / Todo trực tiếp trong Modal cảnh báo
            const [editingAlertId, setEditingAlertId] = useState(null);
            const [editAlertTitle, setEditAlertTitle] = useState('');
            const [editAlertTimeStr, setEditAlertTimeStr] = useState('');
            
            // Cấu hình mã PIN bảo vệ tab
            const [securityPin, setSecurityPin] = useState(() => localStorage.getItem('app_security_pin') || '1234');
            const [unlockedTabs, setUnlockedTabs] = useState({ todo: false, notes: false });
            
            // Các State dữ liệu đồng bộ
            const [eventsList, setEventsList] = useState([]);
            const [todosList, setTodosList] = useState([]);
            const [notesList, setNotesList] = useState([]);
            const [timetableData, setTimetableData] = useState({});

            // Thao tác chỉnh sửa/xóa tạm hoặc trạng thái cục bộ khác
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [newEvent, setNewEvent] = useState('');
            const [repeatType, setRepeatType] = useState('none');

            // Cấu hình giao diện (Theme)
            const [theme, setTheme] = useState(() => {
                const local = localStorage.getItem('app_theme');
                return local ? JSON.parse(local) : {
                    name: 'Mặc định',
                    bgColor: '#f3f4f6',
                    textColor: '#1f2937',
                    cardBg: '#ffffff',
                    primaryColor: '#2563eb'
                };
            });

            // --- THÀNH PHẦN MỚI: TRẠNG THÁI TÌM KIẾM TOÀN CỤC (GLOBAL SEARCH STATES) ---
            const [searchKeyword, setSearchKeyword] = useState('');
            const [isSearchExpanded, setIsSearchExpanded] = useState(false);

            // Khởi tạo ứng dụng Firebase
            useEffect(() => {
                let currentConfig = MANUAL_CONFIG;
                try {
                    const localConfig = localStorage.getItem(STORAGE_KEY_CONFIG);
                    if (localConfig) {
                        currentConfig = JSON.parse(localConfig);
                    }
                } catch (e) {
                    console.error("Lỗi đọc cấu hình LocalStorage:", e);
                }

                try {
                    const fApp = initializeApp(currentConfig);
                    setApp(fApp);
                    const auth = getAuth(fApp);
                    
                    // Kích hoạt tính năng lưu trữ ngoại tuyến cho Firestore
                    const db = getFirestore(fApp);
                    enableIndexedDbPersistence(db).catch((err) => {
                        if (err.code == 'failed-precondition') {
                            console.warn("Lưu trữ offline thất bại do mở nhiều tab.");
                        } else if (err.code == 'unimplemented') {
                            console.warn("Trình duyệt không hỗ trợ lưu trữ offline.");
                        }
                    });

                    const unsubscribe = onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        setLoading(false);
                    });
                    return () => unsubscribe();
                } catch (err) {
                    console.error("Lỗi khởi tạo ứng dụng Firebase:", err);
                    setConnectionError(true);
                    setLoading(false);
                }
            }, []);

            // Theo dõi trạng thái kết nối mạng của thiết bị
            useEffect(() => {
                const goOnline = () => {
                    setIsOffline(false);
                    setShowOfflineBadge(true);
                    const t = setTimeout(() => setShowOfflineBadge(false), 3000);
                    return () => clearTimeout(t);
                };
                const goOffline = () => {
                    setIsOffline(true);
                    setShowOfflineBadge(false);
                };

                window.addEventListener('online', goOnline);
                window.addEventListener('offline', goOffline);
                return () => {
                    window.removeEventListener('online', goOnline);
                    window.removeEventListener('offline', goOffline);
                };
            }, []);

            // Đồng bộ cơ sở dữ liệu thời gian thực thông qua Snapshot
            useEffect(() => {
                if (!user || !app) return;
                const db = getFirestore(app);
                const userRefPath = `artifacts/${MANUAL_CONFIG.projectId}/users/${user.uid}`;

                // 1. Đồng bộ Sự kiện (Events)
                const qEvents = query(collection(db, `${userRefPath}/events`));
                const unsubEvents = onSnapshot(qEvents, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    setEventsList(list);
                }, e => console.error(e));

                // 2. Đồng bộ Việc cần làm (Todos)
                const qTodos = query(collection(db, `${userRefPath}/todos`), orderBy('createdAt', 'desc'));
                const unsubTodos = onSnapshot(qTodos, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    setTodosList(list);
                }, e => console.error(e));

                // 3. Đồng bộ Ghi chú (Notes)
                const qNotes = query(collection(db, `${userRefPath}/notes`), orderBy('updatedAt', 'desc'));
                const unsubNotes = onSnapshot(qNotes, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    setNotesList(list);
                }, e => console.error(e));

                // 4. Đồng bộ Thời khóa biểu (Timetable)
                const qTimetable = query(collection(db, `${userRefPath}/timetable`));
                const unsubTimetable = onSnapshot(qTimetable, (snapshot) => {
                    const data = {};
                    snapshot.forEach(doc => {
                        data[doc.id] = doc.data();
                    });
                    setTimetableData(data);
                }, e => console.error(e));

                return () => {
                    unsubEvents();
                    unsubTodos();
                    unsubNotes();
                    unsubTimetable();
                };
            }, [user, app]);

            // --- LOGIC TÌM KIẾM TOÀN CỤC CHƯA PHÂN BIỆT HOA THƯỜNG (CASE-INSENSITIVE) ---
            const searchResults = useMemo(() => {
                if (!searchKeyword.trim()) return { events: [], todos: [], notes: [], timetable: [] };
                const kw = searchKeyword.toLowerCase().trim();

                // Lọc sự kiện
                const matchedEvents = eventsList.filter(e => e.title && e.title.toLowerCase().includes(kw));

                // Lọc việc cần làm
                const matchedTodos = todosList.filter(t => t.text && t.text.toLowerCase().includes(kw));

                // Lọc ghi chú
                const matchedNotes = notesList.filter(n => 
                    (n.title && n.title.toLowerCase().includes(kw)) || 
                    (n.text && n.text.toLowerCase().includes(kw))
                );

                // Lọc thời khóa biểu
                const matchedTimetable = [];
                Object.keys(timetableData).forEach(dayKey => {
                    // dayKey ví dụ: 'Monday', 'Tuesday'... hoặc 'Thứ 2'...
                    const slots = timetableData[dayKey];
                    Object.keys(slots).forEach(slotKey => {
                        const cellValue = slots[slotKey];
                        if (cellValue && typeof cellValue === 'string' && cellValue.toLowerCase().includes(kw)) {
                            matchedTimetable.push({
                                day: dayKey,
                                slot: slotKey,
                                text: cellValue
                            });
                        }
                    });
                });

                return {
                    events: matchedEvents,
                    todos: matchedTodos,
                    notes: matchedNotes,
                    timetable: matchedTimetable
                };
            }, [searchKeyword, eventsList, todosList, notesList, timetableData]);

            const hasSearchResults = useMemo(() => {
                return searchResults.events.length > 0 || 
                       searchResults.todos.length > 0 || 
                       searchResults.notes.length > 0 || 
                       searchResults.timetable.length > 0;
            }, [searchResults]);

            // Hàm xử lý khi bấm vào kết quả tìm kiếm để kích hoạt màn hình phù hợp
            const handleSearchResultClick = (type) => {
                setSearchKeyword('');
                setIsSearchExpanded(false);
                if (type === 'events') {
                    setActiveTab('calendar');
                } else if (type === 'todos') {
                    if (!unlockedTabs.todo && securityPin) {
                        // Chuyển sang màn hình bảo mật nếu cần mở khóa PIN
                        setActiveTab('todo');
                    } else {
                        setActiveTab('todo');
                    }
                } else if (type === 'notes') {
                    if (!unlockedTabs.notes && securityPin) {
                        setActiveTab('notes');
                    } else {
                        setActiveTab('notes');
                    }
                } else if (type === 'timetable') {
                    setActiveTab('timetable');
                }
            };

            // Logic xử lý cập nhật hoặc lưu cài đặt Theme
            const handleSaveTheme = async (newTheme) => {
                setTheme(newTheme);
                setShowSettings(false);
                try {
                    localStorage.setItem('app_theme', JSON.stringify(newTheme));
                } catch (e) {
                    console.error("Lỗi lưu local theme:", e);
                }
                if (user) await setDoc(doc(getFirestore(app), 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'theme'), newTheme);
            };

            const handleTabChange = (tab) => {
                if (tab === 'day') {
                    setDailyDate(new Date());
                } else if (tab === 'calendar') {
                    setCalendarCurrentDate(new Date());
                    setCalendarSelectedDate(new Date());
                }
                setUnlockedTabs({ todo: false, notes: false });
                setActiveTab(tab);
            };

            const handleUnlockTab = (tab) => {
                setUnlockedTabs(prev => ({ ...prev, [tab]: true }));
            };

            // Đăng ký Service Worker phục vụ chế độ chạy offline (PWA)
            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        navigator.serviceWorker.register('./sw.js')
                            .then(reg => console.log('Đăng ký Service Worker thành công:', reg.scope))
                            .catch(err => console.log('Lỗi đăng ký Service Worker:', err));
                    });
                }
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center text-blue-500">Đang tải...</div>;
            if (!user) return <AuthScreen auth={getAuth(app)} appId={MANUAL_CONFIG.projectId} />;

            // --- CẤU PHẦN CON ĐƯỢC CHÈN NỘI BỘ ĐỂ TRÁNH SỬA PHẦN KHÁC ---
            const EventManagerSection = () => {
                const onAdd = async (title, rep) => {
                    const db = getFirestore(app);
                    await addDoc(collection(db, `artifacts/${MANUAL_CONFIG.projectId}/users/${user.uid}/events`), {
                        title,
                        repeat: rep,
                        date: Timestamp.fromDate(calendarSelectedDate),
                        createdAt: serverTimestamp()
                    });
                    toast.success("Đã lưu sự kiện mới thành công!");
                };

                const onDelete = async (id) => {
                    const db = getFirestore(app);
                    await deleteDoc(doc(db, `artifacts/${MANUAL_CONFIG.projectId}/users/${user.uid}/events`, id));
                    toast.info("Đã xóa sự kiện.");
                };

                const dayEvents = eventsList.filter(e => {
                    if (!e.date) return false;
                    const d = new Date(e.date.seconds * 1000);
                    return d.getDate() === calendarSelectedDate.getDate() &&
                           d.getMonth() === calendarSelectedDate.getMonth() &&
                           d.getFullYear() === calendarSelectedDate.getFullYear();
                });

                return (
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col gap-3">
                        <div className="flex justify-between items-center border-b pb-2">
                            <h3 className="text-xs font-black uppercase text-slate-400 tracking-wider">Sự kiện ngày {calendarSelectedDate.getDate()}/{calendarSelectedDate.getMonth()+1}</h3>
                            <span className="bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-0.5 rounded-full">{dayEvents.length} sự kiện</span>
                        </div>
                        <ul className="space-y-2 max-h-40 overflow-y-auto no-scrollbar">
                            {dayEvents.map(e => (
                                <li key={e.id} className="flex justify-between items-center p-2 rounded-lg bg-slate-50 hover:bg-slate-100 transition text-sm text-slate-800">
                                    <span className="font-medium truncate flex-1 pr-2">{e.title}</span>
                                    <div className="flex items-center gap-1">
                                        {e.repeat && e.repeat !== 'none' && <span className="text-[9px] font-extrabold uppercase bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded">{e.repeat}</span>}
                                        <button onClick={() => { if(deleteConfirm === e.id) { onDelete(e.id); setDeleteConfirm(null); } else { setDeleteConfirm(e.id); } }} className={`p-1 transition-colors ${deleteConfirm === e.id ? 'bg-red-500 text-white text-xs px-2 py-1 rounded' : 'text-red-400 hover:text-red-600'}`}>{deleteConfirm === e.id ? <span>Xóa?</span> : <Trash2 size={16}/>}</button>
                                    </div>
                                </li>
                            ))}
                            {dayEvents.length === 0 && <p className="text-center text-xs text-slate-400 py-4">Chưa có sự kiện nào trong ngày này.</p>}
                        </ul>
                        <div className="pt-2 border-t flex flex-col gap-2">
                            <div className="flex gap-2 text-[10px] text-gray-700 flex-wrap">
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'none'} onChange={() => setRepeatType('none')} /> Không lặp</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'lunar'} onChange={() => setRepeatType('lunar')} /> Lặp Âm</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'solar'} onChange={() => setRepeatType('solar')} /> Lặp Dương</label>
                            </div>
                            <div className="flex gap-2">
                                <input className="flex-1 border rounded px-3 py-2 text-sm outline-none focus:border-blue-500 text-slate-800" placeholder="Tên sự kiện..." value={newEvent} onChange={e => setNewEvent(e.target.value)} />
                                <button onClick={() => { if(newEvent.trim()) { onAdd(newEvent, repeatType); setNewEvent(''); } }} className="bg-blue-600 text-white p-2 rounded hover:bg-blue-700"><Plus size={20}/></button>
                            </div>
                        </div>
                    </div>
                );
            };

            // Các biến phục vụ hiển thị lịch biểu tháng cũ
            const year = calendarCurrentDate.getFullYear();
            const month = calendarCurrentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            const daysInMonth = Array.from({ length: totalDays }, (_, i) => new Date(year, month, i + 1));
            const blankCells = Array.from({ length: firstDay === 0 ? 6 : firstDay - 1 }, () => null);
            const calendarDaysCells = [...blankCells, ...daysInMonth];

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto shadow-2xl overflow-hidden relative transition-colors duration-300" style={{ backgroundColor: theme.bgColor, color: theme.textColor }}>
                    
                    {/* KHU VỰC CHỈ BÁO OFFLINE MINI TẠI HEADER */}
                    {isOffline && (
                        <div className="bg-amber-500 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none animate-pulse">
                            <WifiOff size={10} /> Đang chạy ngoại tuyến (Offline Mode)
                        </div>
                    )}
                    {showOfflineBadge && !isOffline && (
                        <div className="bg-emerald-600 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none">
                            <Wifi size={10} /> Đã khôi phục kết nối trực tuyến (Online)
                        </div>
                    )}

                    {/* BANNER HEADER NÂNG CẤP CHỨA THANH TÌM KIẾM TOÀN CỤC CHUYÊN NGHIỆP */}
                    <header className="bg-blue-600 text-white p-2 flex justify-between items-center shadow-md z-20 shrink-0 relative">
                        <div className={`flex flex-col overflow-hidden transition-all duration-300 ${isSearchExpanded ? 'w-0 opacity-0 pointer-events-none' : 'w-auto opacity-100'}`}>
                            <h1 className="text-base font-bold whitespace-nowrap truncate font-sans">Lịch vạn niên đa năng</h1>
                            <span className="text-[10px] text-blue-200 font-medium">Phiên bản V3 Pro</span>
                        </div>

                        {/* THANH TÌM KIẾM TOÀN CỤC TOÀN DIỆN (RESPONSIVE GLOBAL SEARCH BAR) */}
                        <div className={`flex items-center gap-1 transition-all duration-300 ${isSearchExpanded ? 'flex-1 w-full' : 'w-48 sm:w-56'} relative`}>
                            <div className="relative w-full flex items-center">
                                <span className="absolute left-2.5 text-slate-400">
                                    <Search size={14} />
                                </span>
                                <input 
                                    type="text" 
                                    placeholder="Tìm sự kiện, việc, ghi chú..." 
                                    value={searchKeyword}
                                    onChange={(e) => setSearchKeyword(e.target.value)}
                                    onFocus={() => setIsSearchExpanded(true)}
                                    className="w-full bg-slate-50 text-slate-800 rounded-lg pl-8 pr-8 py-1.5 text-xs outline-none focus:ring-2 focus:ring-blue-300 transition-all font-sans"
                                />
                                {searchKeyword && (
                                    <button 
                                        onClick={() => setSearchKeyword('')} 
                                        className="absolute right-2 text-slate-400 hover:text-slate-600 p-0.5"
                                    >
                                        <X size={14} />
                                    </button>
                                )}
                            </div>
                            {isSearchExpanded && (
                                <button 
                                    onClick={() => {
                                        setIsSearchExpanded(false);
                                        setSearchKeyword('');
                                    }}
                                    className="text-xs font-bold px-1 text-blue-100 hover:text-white font-sans shrink-0"
                                >
                                    Đóng
                                </button>
                            )}
                        </div>

                        {/* MENU THẢ XUỐNG KẾT QUẢ TÌM KIẾM DẠNG POPUP TINH TẾ */}
                        {searchKeyword.trim() && (
                            <div className="absolute top-12 left-0 right-0 mx-2 bg-white rounded-xl shadow-2xl border border-slate-200 z-50 max-h-96 overflow-y-auto no-scrollbar font-sans text-slate-800 fade-in">
                                <div className="p-2 border-b bg-slate-50 flex justify-between items-center">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-wider">Kết quả tìm kiếm toàn cục</span>
                                    <span className="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">Khớp dữ liệu</span>
                                </div>
                                
                                {!hasSearchResults ? (
                                    <div className="p-6 text-center text-xs text-slate-400">Không tìm thấy nội dung nào trùng khớp.</div>
                                ) : (
                                    <div className="p-1 space-y-2">
                                        {/* Phân loại Sự kiện */}
                                        {searchResults.events.length > 0 && (
                                            <div>
                                                <div className="px-2 py-0.5 text-[9px] font-bold uppercase text-blue-600 bg-blue-50/50 rounded">Sự kiện ({searchResults.events.length})</div>
                                                {searchResults.events.map(item => (
                                                    <div key={item.id} onClick={() => handleSearchResultClick('events')} className="p-2 hover:bg-slate-50 rounded-lg cursor-pointer transition text-xs border-b border-dashed border-slate-100 last:border-none flex justify-between items-center">
                                                        <span className="font-medium text-slate-800 truncate">{item.title}</span>
                                                        <span className="text-[9px] bg-slate-100 text-slate-500 px-1 py-0.5 rounded font-mono">Xem Lịch</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {/* Phân loại Việc cần làm */}
                                        {searchResults.todos.length > 0 && (
                                            <div>
                                                <div className="px-2 py-0.5 text-[9px] font-bold uppercase text-emerald-600 bg-emerald-50 rounded">Việc cần làm ({searchResults.todos.length})</div>
                                                {searchResults.todos.map(item => (
                                                    <div key={item.id} onClick={() => handleSearchResultClick('todos')} className="p-2 hover:bg-slate-50 rounded-lg cursor-pointer transition text-xs border-b border-dashed border-slate-100 last:border-none flex justify-between items-center">
                                                        <span className="font-medium text-slate-800 truncate">{item.text}</span>
                                                        <span className="text-[9px] bg-slate-100 text-slate-500 px-1 py-0.5 rounded font-mono">Xem việc</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {/* Phân loại Ghi chú */}
                                        {searchResults.notes.length > 0 && (
                                            <div>
                                                <div className="px-2 py-0.5 text-[9px] font-bold uppercase text-purple-600 bg-purple-50 rounded">Ghi chú ({searchResults.notes.length})</div>
                                                {searchResults.notes.map(item => (
                                                    <div key={item.id} onClick={() => handleSearchResultClick('notes')} className="p-2 hover:bg-slate-50 rounded-lg cursor-pointer transition text-xs border-b border-dashed border-slate-100 last:border-none flex flex-col gap-0.5">
                                                        <div className="font-bold text-slate-800 truncate">{item.title || "Ghi chú không tiêu đề"}</div>
                                                        {item.text && <div className="text-[10px] text-slate-400 truncate">{item.text}</div>}
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {/* Phân loại Thời khóa biểu */}
                                        {searchResults.timetable.length > 0 && (
                                            <div>
                                                <div className="px-2 py-0.5 text-[9px] font-bold uppercase text-amber-600 bg-amber-50 rounded">Thời khóa biểu ({searchResults.timetable.length})</div>
                                                {searchResults.timetable.map((item, idx) => (
                                                    <div key={idx} onClick={() => handleSearchResultClick('timetable')} className="p-2 hover:bg-slate-50 rounded-lg cursor-pointer transition text-xs border-b border-dashed border-slate-100 last:border-none flex justify-between items-center">
                                                        <span className="font-medium text-slate-800 truncate">{item.text}</span>
                                                        <span className="text-[9px] bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded font-bold uppercase tracking-tight">{item.day} - {item.slot}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </header>

                    {/* KHU VỰC THÂN HIỂN THỊ CHÍNH ĐA MÀN HÌNH (MAIN CONTENT ROUTER) */}
                    <main className="flex-1 overflow-y-auto no-scrollbar p-3 space-y-4">
                        {activeTab === 'calendar' && (
                            <div className="space-y-4 animate-fade-in">
                                {/* Header chuyển tháng */}
                                <div className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-slate-100">
                                    <button onClick={() => setCalendarCurrentDate(new Date(year, month - 1, 1))} className="p-1.5 hover:bg-slate-100 rounded-full transition"><ChevronLeft size={18} className="text-slate-600" /></button>
                                    <h2 className="text-sm font-black uppercase text-slate-700 font-sans">Tháng {month + 1} / {year}</h2>
                                    <button onClick={() => setCalendarCurrentDate(new Date(year, month + 1, 1))} className="p-1.5 hover:bg-slate-100 rounded-full transition"><ChevronRight size={18} className="text-slate-600" /></button>
                                </div>
                                
                                {/* Ô hiển thị ma trận lịch */}
                                <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-100">
                                    <div className="grid grid-cols-7 gap-1 text-center mb-2 font-sans font-bold text-xs text-slate-400">
                                        <div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div>T7</div><div className="text-red-500">CN</div>
                                    </div>
                                    <div className="grid grid-cols-7 gap-1">
                                        {calendarDaysCells.map((date, idx) => {
                                            if (!date) return <div key={idx} className="aspect-square"></div>;
                                            const isSelected = date.getDate() === calendarSelectedDate.getDate() && date.getMonth() === calendarSelectedDate.getMonth();
                                            const isToday = date.getDate() === new Date().getDate() && date.getMonth() === new Date().getMonth() && date.getFullYear() === new Date().getFullYear();
                                            const lunar = getLunarDetails(date);
                                            
                                            return (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => setCalendarSelectedDate(date)}
                                                    className={`aspect-square rounded-xl p-1 flex flex-col justify-between items-center transition relative ${isSelected ? 'bg-blue-600 text-white shadow-md' : isToday ? 'bg-blue-50 text-blue-600 font-bold border border-blue-200' : 'hover:bg-slate-50 text-slate-800'}`}
                                                >
                                                    <span className="text-xs font-bold">{date.getDate()}</span>
                                                    <span className={`text-[8px] ${isSelected ? 'text-blue-100' : 'text-slate-400'}`}>{lunar.lunarDay}</span>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Quản lý sự kiện ngày được chọn */}
                                <EventManagerSection />
                            </div>
                        )}

                        {activeTab === 'day' && (
                            <div className="bg-white p-5 rounded-2xl shadow-xl border border-slate-100 space-y-6 text-center font-sans animate-fade-in text-slate-800">
                                <div>
                                    <h2 className="text-sm font-black text-blue-600 uppercase tracking-wider">Hôm nay</h2>
                                    <p className="text-3xl font-black text-slate-800 mt-1">{dailyDate.getDate()} Tháng {dailyDate.getMonth() + 1}</p>
                                    <p className="text-xs text-slate-400 mt-1 font-medium">Năm {dailyDate.getFullYear()}</p>
                                </div>
                                <div className="p-4 rounded-xl bg-amber-50 text-amber-900 text-sm italic font-medium leading-relaxed whitespace-pre-line shadow-inner">
                                    {getLunarDetails(dailyDate).verse}
                                </div>
                            </div>
                        )}

                        {activeTab === 'todo' && (
                            !unlockedTabs.todo && securityPin ? (
                                <PinProtectedScreen expectedPin={securityPin} onUnlock={() => handleUnlockTab('todo')} />
                            ) : (
                                <div className="space-y-3 animate-fade-in text-slate-800 font-sans">
                                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                                        <h3 className="text-xs font-black uppercase text-slate-400 mb-3 tracking-wider">Danh sách việc cần làm</h3>
                                        <div className="flex gap-2">
                                            <input id="todo_input_main" className="flex-1 border rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500" placeholder="Thêm công việc quan trọng mới..." />
                                            <button onClick={async () => {
                                                const inp = document.getElementById('todo_input_main');
                                                if(inp && inp.value.trim()) {
                                                    const db = getFirestore(app);
                                                    await addDoc(collection(db, `artifacts/${MANUAL_CONFIG.projectId}/users/${user.uid}/todos`), {
                                                        text: inp.value.trim(),
                                                        completed: false,
                                                        createdAt: serverTimestamp()
                                                    });
                                                    inp.value = '';
                                                    toast.success("Đã ghi nhận công việc cần làm mới.");
                                                }
                                            }} className="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700"><Plus size={18}/></button>
                                        </div>
                                    </div>
                                    <ul className="space-y-2">
                                        {todosList.map(t => (
                                            <li key={t.id} className="flex justify-between items-center p-3 bg-white rounded-xl shadow-sm border border-slate-100">
                                                <span className={`text-xs font-medium ${t.completed ? 'line-through text-slate-400' : 'text-slate-700'}`}>{t.text}</span>
                                                <button onClick={async () => {
                                                    const db = getFirestore(app);
                                                    await deleteDoc(doc(db, `artifacts/${MANUAL_CONFIG.projectId}/users/${user.uid}/todos`, t.id));
                                                }} className="text-red-400 hover:text-red-600 p-1"><Trash2 size={14}/></button>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            )
                        )}

                        {activeTab === 'notes' && (
                            !unlockedTabs.notes && securityPin ? (
                                <PinProtectedScreen expectedPin={securityPin} onUnlock={() => handleUnlockTab('notes')} />
                            ) : (
                                <div className="space-y-3 animate-fade-in text-slate-800 font-sans">
                                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                                        <h3 className="text-xs font-black uppercase text-slate-400 mb-2 tracking-wider">Sổ tay ghi chú</h3>
                                        <div className="space-y-2">
                                            <input id="note_title_main" className="w-full border rounded-lg px-3 py-1.5 text-xs font-bold outline-none" placeholder="Tiêu đề ghi chú..." />
                                            <textarea id="note_text_main" className="w-full border rounded-lg px-3 py-1.5 text-xs outline-none h-16 resize-none" placeholder="Nội dung chi tiết..."></textarea>
                                            <button onClick={async () => {
                                                const titleInp = document.getElementById('note_title_main');
                                                const textInp = document.getElementById('note_text_main');
                                                if(textInp && textInp.value.trim()) {
                                                    const db = getFirestore(app);
                                                    await addDoc(collection(db, `artifacts/${MANUAL_CONFIG.projectId}/users/${user.uid}/notes`), {
                                                        title: titleInp.value.trim() || 'Ghi chú mới',
                                                        text: textInp.value.trim(),
                                                        updatedAt: serverTimestamp()
                                                    });
                                                    titleInp.value = '';
                                                    textInp.value = '';
                                                    toast.success("Đã thêm ghi chú mới vào bộ nhớ.");
                                                }
                                            }} className="w-full bg-blue-600 text-white text-xs py-2 rounded-lg font-bold">Lưu ghi chú</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        {notesList.map(n => (
                                            <div key={n.id} className="p-3 bg-white rounded-xl shadow-sm border border-slate-100 flex flex-col justify-between">
                                                <div>
                                                    <h4 className="text-xs font-bold text-slate-800 truncate">{n.title}</h4>
                                                    <p className="text-[11px] text-slate-500 mt-1 line-clamp-3 whitespace-pre-line">{n.text}</p>
                                                </div>
                                                <div className="flex justify-end mt-2">
                                                    <button onClick={async () => {
                                                        const db = getFirestore(app);
                                                        await deleteDoc(doc(db, `artifacts/${MANUAL_CONFIG.projectId}/users/${user.uid}/notes`, n.id));
                                                    }} className="text-red-400 hover:text-red-600 p-0.5"><Trash2 size={12}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )
                        )}

                        {activeTab === 'timetable' && (
                            <div className="bg-white p-3 rounded-xl shadow-md border border-slate-100 overflow-x-auto font-sans text-slate-800 animate-fade-in">
                                <h3 className="text-xs font-black uppercase text-slate-400 mb-2 tracking-wider">Thời khóa biểu tuần</h3>
                                <table className="w-full text-center border-collapse text-[10px]">
                                    <thead>
                                        <tr className="bg-slate-50 text-slate-500">
                                            <th className="border p-1 font-bold">Thứ</th>
                                            <th className="border p-1 font-bold">Sáng</th>
                                            <th className="border p-1 font-bold">Chiều</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'].map(day => {
                                            const rowData = timetableData[day] || {};
                                            return (
                                                <tr key={day}>
                                                    <td className="border p-1.5 font-bold bg-slate-50/50">{day}</td>
                                                    <td className="border p-1">
                                                        <input 
                                                            className="w-full text-center bg-transparent outline-none focus:bg-blue-50 text-[10px]" 
                                                            value={rowData.morning || ''} 
                                                            placeholder="-"
                                                            onChange={async (e) => {
                                                                const db = getFirestore(app);
                                                                const docRef = doc(db, `artifacts/${MANUAL_CONFIG.projectId}/users/${user.uid}/timetable`, day);
                                                                await setDoc(docRef, { ...rowData, morning: e.target.value }, { merge: true });
                                                            }}
                                                        />
                                                    </td>
                                                    <td className="border p-1">
                                                        <input 
                                                            className="w-full text-center bg-transparent outline-none focus:bg-blue-50 text-[10px]" 
                                                            value={rowData.afternoon || ''} 
                                                            placeholder="-"
                                                            onChange={async (e) => {
                                                                const db = getFirestore(app);
                                                                const docRef = doc(db, `artifacts/${MANUAL_CONFIG.projectId}/users/${user.uid}/timetable`, day);
                                                                await setDoc(docRef, { ...rowData, afternoon: e.target.value }, { merge: true });
                                                            }}
                                                        />
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {/* FOOTER THANH ĐIỀU HƯỚNG TAB (BOTTOM NAVIGATION BAR) */}
                    <footer className="bg-white border-t border-slate-200 p-1 flex justify-around items-center shadow-lg z-20 shrink-0">
                        <button onClick={() => handleTabChange('calendar')} className={`flex flex-col items-center py-1 flex-1 transition ${activeTab === 'calendar' ? 'text-blue-600 font-bold' : 'text-slate-400 hover:text-slate-600'}`}>
                            <Calendar size={18} />
                            <span className="text-[9px] mt-0.5 font-sans">Lịch tháng</span>
                        </button>
                        <button onClick={() => handleTabChange('day')} className={`flex flex-col items-center py-1 flex-1 transition ${activeTab === 'day' ? 'text-blue-600 font-bold' : 'text-slate-400 hover:text-slate-600'}`}>
                            <Clock size={18} />
                            <span className="text-[9px] mt-0.5 font-sans">Lịch ngày</span>
                        </button>
                        <button onClick={() => handleTabChange('todo')} className={`flex flex-col items-center py-1 flex-1 transition ${activeTab === 'todo' ? 'text-blue-600 font-bold' : 'text-slate-400 hover:text-slate-600'}`}>
                            <CheckSquare size={18} />
                            <span className="text-[9px] mt-0.5 font-sans">Việc cần làm</span>
                        </button>
                        <button onClick={() => handleTabChange('notes')} className={`flex flex-col items-center py-1 flex-1 transition ${activeTab === 'notes' ? 'text-blue-600 font-bold' : 'text-slate-400 hover:text-slate-600'}`}>
                            <StickyNote size={18} />
                            <span className="text-[9px] mt-0.5 font-sans">Ghi chú</span>
                        </button>
                        <button onClick={() => handleTabChange('timetable')} className={`flex flex-col items-center py-1 flex-1 transition ${activeTab === 'timetable' ? 'text-blue-600 font-bold' : 'text-slate-400 hover:text-slate-600'}`}>
                            <Table size={18} />
                            <span className="text-[9px] mt-0.5 font-sans">Thời khóa biểu</span>
                        </button>
                        <button onClick={() => { const auth = getAuth(app); signOut(auth); toast.info("Đã đăng xuất tài khoản."); }} className="flex flex-col items-center py-1 flex-1 text-red-400 hover:text-red-600 transition">
                            <LogOut size={18} />
                            <span className="text-[9px] mt-0.5 font-sans">Đăng xuất</span>
                        </button>
                    </footer>

                    {/* ĐĂNG KÝ TOAST CONTAINER PHỤC VỤ HIỂN THỊ ĐỘNG THÔNG BÁO CHỮA CHÁY */}
                    <ToastContainer 
                        position="top-center"
                        autoClose={3000}
                        hideProgressBar={false}
                        newestOnTop={false}
                        closeOnClick
                        rtl={false}
                    />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
