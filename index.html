            "Nên hiểu rõ sạch trong, nhơ uế\nHành động do gốc rễ từ tâm\nCậy nhờ tha lực khó thành\nĐỗ lỗi “tại, bởi” sao đành, không nên.",
            "Dù phụng sự, vị tha thiết thực\nXin chớ quên thực tập lợi mình\nChuyên tâm học pháp cao minh\nHướng về giải thoát, đạt thành mới thôi.",
            "Người sáng suốt chớ ôm tà kiến\nSống buông lung, ti tiện qua ngày.\nNệp tà vạy, chớ kéo dài\nĐược vầy, sinh tử luân hồi sớm ra.",
            "Luôn tinh tấn không mê lạc thú\nHạnh thanh cao, tu sĩ thường ghi\nTrang nghiêm giới đức, hành trì\nHai đời hưởng phúc chỉ vì tu tâm.",
            "Hãy quán tưởng trong đời trần tục\nMọi thứ như bọt nước, huyễn vong.\nĐến khi ngộ lẽ vô thường\nTử thần không thể lần đường chân nhân.",

            "Dù quá khứ buông lung, dục lạc\nNhưng về sau tỉnh thức, chuyển tâm\nLàm lành, tỏa sáng trần gian\nNhư trăng rằm chiếu, không còn mây che.",
            "Dù ngày trước gây bao tội lỗi\nNhưng hôm nay sám hối, hồi tâm\nLàm lành, tỏa sáng trần gian\nNhư trăng rằm chiếu, không còn mây che.",
            "Kẻ mù tối, thế gian đầy dẫy\nNgười sáng trong có mấy trên đời!\nNhư chim khôn chẳng vướng mồi\nNgười tu đạo đức an vui cõi trời.",
            "Như trời thẳm, thiên nga uốn lượn\nCó thần thông ẩn hiện không gian\nTrí nhân thoát chốn hồng trần\nVượt qua ma chướng, vững vàng đường tu.",

            "Thật hạnh phúc, làm người nhân đức\nQuả khó thay, sống thật tịnh thanh\nKhó thay, nghe pháp, thực hành\nKhó thay, gặp Phật chứng thành quả cao.",
            "Mọi hoàn cảnh không làm bất thiện\nDù khó khăn, thanh thản thảnh thơi\nTâm không lay động trước đời\nXa lìa khổ não, sáng ngời chân như."
        ];

        const STORAGE_KEY_VERSES = 'user_custom_verses';

        const formatDisplayDate = (seconds) => {
            if (!seconds) return '';
            const d = new Date(seconds * 1000);
            return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        };

        const formatDateTimeForInput = (ms) => {
            if (!ms) return '';
            const d = new Date(ms);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}T${hh}:${min}`;
        };

        // --- MÀN HÌNH ĐĂNG NHẬP / ĐĂNG KÝ ---
        const AuthView = ({ onAuthSuccess, appId, setAppId }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isLogin, setIsLogin] = useState(true);
            const [error, setError] = useState('');
            const [message, setMessage] = useState('');
            const [showPassword, setShowPassword] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError('');
                setMessage('');
                try {
                    const auth = getAuth();
                    if (isLogin) {
                        const userCredential = await signInWithEmailAndPassword(auth, email, password);
                        toast.success("Đăng nhập thành công!");
                        onAuthSuccess(userCredential.user);
                    } else {
                        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                        toast.success("Đăng ký tài khoản mới thành công!");
                        onAuthSuccess(userCredential.user);
                    }
                } catch (err) {
                    console.error(err);
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                        setError("Tài khoản hoặc Mật khẩu không chính xác.");
                    } else if (err.code === 'auth/email-already-in-use') {
                        setError("Email này đã được đăng ký bởi tài khoản khác.");
                    } else if (err.code === 'auth/weak-password') {
                        setError("Mật khẩu quá yếu (Yêu cầu từ 6 ký tự trở lên).");
                    } else {
                        setError(err.message);
                    }
                }
            };

            const handleForgotPassword = async () => {
                setError('');
                setMessage('');
                if (!email) {
                    setError("Vui lòng nhập Email đã đăng ký vào ô trống phía trên trước khi bấm Quên mật khẩu.");
                    return;
                }
                try {
                    const auth = getAuth();
                    await sendPasswordResetEmail(auth, email);
                    setMessage("Hệ thống đã gửi liên kết đặt lại mật khẩu vào Email của bạn. Hãy kiểm tra Hòm thư (hoặc Thư rác).");
                    toast.info("Đã gửi email khôi phục mật khẩu.");
                } catch (err) {
                    setError("Lỗi gửi yêu cầu: " + err.message);
                }
            };

            return (
                <div className="flex flex-col flex-1 justify-center items-center p-4 bg-slate-50 font-sans min-h-screen">
                    <div className="w-full max-w-sm bg-white p-6 rounded-2xl shadow-xl border border-slate-100">
                        <div className="flex flex-col items-center mb-6">
                            <div className="bg-blue-600 text-white p-3 rounded-2xl shadow-lg shadow-blue-500/30 mb-3">
                                <CalendarDays size={32} />
                            </div>
                            <h2 className="text-xl font-bold text-slate-800">Lịch Vạn Niên v3</h2>
                            <p className="text-xs text-slate-400 mt-1">Hệ thống quản lý thời gian cá nhân thông minh</p>
                        </div>

                        <div className="mb-4 text-center"><span className="text-[10px] px-2 py-1 rounded font-mono border bg-green-100 text-green-700 border-green-200">Server: <b>{appId}</b></span></div>

                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" required className="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
                            
                            {/* Ô nhập mật khẩu tích hợp ẩn/hiện mật khẩu */}
                            <div className="relative w-full">
                                <input type={showPassword ? "text" : "password"} required className="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 pr-12" placeholder="Mật khẩu" value={password} onChange={e => setPassword(e.target.value)} />
                                <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 p-1" >
                                    {showPassword ? <EyeOff size={18} /> : <Eye size={18} />}
                                </button>
                            </div>

                            {error && <p className="text-red-500 text-sm text-center bg-red-50 p-2 rounded">{error}</p>}
                            {message && <p className="text-green-600 text-sm text-center bg-green-50 p-2 rounded font-medium">{message}</p>}

                            <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-blue-700 transition">{isLogin ? 'Vào Ứng Dụng' : 'Tạo Tài Khoản'}</button>
                        </form>

                        <div className="mt-6 flex flex-col items-center gap-3 text-sm">
                            {isLogin && (
                                <button type="button" onClick={handleForgotPassword} className="text-slate-500 hover:text-blue-600 text-xs transition" >
                                    Quên mật khẩu?
                                </button>
                            )}
                            <button onClick={() => { setIsLogin(!isLogin); setError(''); setMessage(''); }} className="text-blue-600 hover:underline font-medium">{isLogin ? 'Chưa có tài khoản? Đăng ký ngay' : 'Đã có tài khoản? Đăng nhập'}</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MÀN HÌNH THỜI KHÓA BIỂU (TKB VIEW) ---
        const TimeTableView = ({ user, db, appId, theme }) => {
            const [schedule, setSchedule] = useState({});
            const [headers, setHeaders] = useState({ col1: 'Môn - Lớp', col2: 'Ghi chú' });
            const [startOfWeekDate, setStartOfWeekDate] = useState(() => {
                const now = new Date();
                const day = now.getDay();
                const diff = now.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(now.setDate(diff));
                monday.setHours(0, 0, 0, 0);
                return monday;
            });
            const periods = [1, 2, 3, 4, 5];

            const weekKey = useMemo(() => {
                const yyyy = startOfWeekDate.getFullYear();
                const target = new Date(startOfWeekDate.valueOf());
                const dayNr = (startOfWeekDate.getDay() + 6) % 7;
                target.setDate(target.getDate() - dayNr + 3);
                const firstThursday = target.valueOf();
                target.setMonth(0, 1);
                if (target.getDay() !== 4) {
                    target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
                }
                const weekNum = 1 + Math.ceil((firstThursday - target) / 604800000);
                return `${yyyy}_w${weekNum}`;
            }, [startOfWeekDate]);

            const tkbRef = useMemo(() => doc(db, 'artifacts', appId, 'users', user.uid, 'timetable', `main_${weekKey}`), [db, appId, user.uid, weekKey]);

            useEffect(() => {
                const unsub = onSnapshot(tkbRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setSchedule(data.schedule || {});
                        if(data.headers) setHeaders(data.headers);
                    } else {
                        setSchedule({});
                        setHeaders({ col1: 'Môn - Lớp', col2: 'Ghi chú' });
                    }
                }, err => {
                    console.warn("Tải thời khóa biểu offline warning (Sử dụng dữ liệu cached):", err);
                });
                return unsub;
            }, [tkbRef]);

            const weekDaysInfo = useMemo(() => {
                const list = [];
                const daysName = ['t2', 't3', 't4', 't5', 't6', 't7'];
                for (let i = 0; i < 6; i++) {
                    const temp = new Date(startOfWeekDate);
                    temp.setDate(startOfWeekDate.getDate() + i);
                    const formattedDate = `${String(temp.getDate()).padStart(2, '0')}/${String(temp.getMonth() + 1).padStart(2, '0')}`;
                    list.push({ id: daysName[i], label: `Thứ ${i + 2}`, dateStr: formattedDate });
                }
                return list;
            }, [startOfWeekDate]);

            const weekRangeLabel = useMemo(() => {
                const monday = new Date(startOfWeekDate);
                const sunday = new Date(startOfWeekDate);
                sunday.setDate(startOfWeekDate.getDate() + 6);
                const fMonday = `${String(monday.getDate()).padStart(2, '0')}/${String(monday.getMonth() + 1).padStart(2, '0')}/${monday.getFullYear()}`;
                const fSunday = `${String(sunday.getDate()).padStart(2, '0')}/${String(sunday.getMonth() + 1).padStart(2, '0')}/${sunday.getFullYear()}`;
                return `Tuần: ${fMonday} - ${fSunday}`;
            }, [startOfWeekDate]);

            const changeWeek = (offsetWeeks) => {
                const newMonday = new Date(startOfWeekDate);
                newMonday.setDate(startOfWeekDate.getDate() + (offsetWeeks * 7));
                setStartOfWeekDate(newMonday);
            };

            const saveData = async (path, value) => {
                await setDoc(tkbRef, { schedule: { [path]: value } }, { merge: true });
                setSchedule(prev => ({ ...prev, [path]: value }));
            };

            const saveHeader = async (key, value) => {
                const newHeaders = { ...headers, [key]: value };
                setHeaders(newHeaders);
                await setDoc(tkbRef, { headers: newHeaders }, { merge: true });
            };

            return (
                <div className="h-full flex flex-col px-4 pb-4 pt-2" style={{ color: theme.textColor }}>
                    <h2 className="text-xl font-bold mb-1 text-center shrink-0">Thời Khoá Biểu</h2>
                    
                    {/* BỘ ĐIỀU HƯỚNG TUẦN */}
                    <div className="flex items-center justify-between mb-3 bg-white p-3 rounded-xl shadow-sm border border-slate-100 shrink-0 text-slate-800">
                        <button onClick={() => changeWeek(-1)} className="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition flex items-center gap-1 text-xs font-bold" >
                            <ChevronLeft size={16} /> Tuần trước
                        </button>
                        <span className="text-xs font-bold text-slate-700 text-center tracking-tight">{weekRangeLabel}</span>
                        <button onClick={() => changeWeek(1)} className="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition flex items-center gap-1 text-xs font-bold" >
                            Tuần sau <ChevronRight size={16} />
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto rounded-xl shadow-sm border border-slate-200 mb-4 bg-white">
                        <table className="w-full text-sm border-collapse table-fixed">
                            <thead className="sticky top-0 bg-gray-100 z-10 shadow-sm">
                                <tr className="text-gray-700">
                                    <th className="border p-2 w-14 bg-gray-100 text-center align-middle text-xs font-bold">Thứ</th>
                                    <th className="border p-2 w-10 bg-gray-100 text-center text-xs font-bold">Tiết</th>
                                    <th className="border p-0 min-w-[100px] bg-gray-100">
                                        <input className="w-full bg-transparent text-center font-bold p-2 outline-none placeholder-gray-400 text-slate-800 text-xs" value={headers.col1} onChange={e=>saveHeader('col1', e.target.value)} placeholder="Môn - Lớp" />
                                    </th>
                                    <th className="border p-0 min-w-[100px] bg-gray-100">
                                        <input className="w-full bg-transparent text-center font-bold p-2 outline-none placeholder-gray-400 text-slate-800 text-xs" value={headers.col2} onChange={e=>saveHeader('col2', e.target.value)} placeholder="Ghi chú" />
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                {weekDaysInfo.map(day => (
                                    <React.Fragment key={day.id}>
                                        {periods.map((period, index) => (
                                            <tr key={`${day.id}_${period}`} className="border-b hover:bg-gray-50">
                                                {index === 0 && (
                                                    <td className="border p-1 align-middle bg-gray-50 text-gray-600 text-center" rowSpan={5}>
                                                        <div className="flex flex-col h-full justify-center items-center gap-0.5">
                                                            <div className="font-extrabold text-xs text-slate-800">{day.label}</div>
                                                            <div className="text-[10px] text-slate-400 font-bold bg-slate-200/50 px-1.5 py-0.5 rounded-full">{day.dateStr}</div>
                                                        </div>
                                                    </td>
                                                )}
                                                <td className="border p-2 text-center text-gray-400 font-bold text-xs align-middle">{period}</td>
                                                <td className="border p-0 align-middle">
                                                    <textarea className="w-full h-full p-2 outline-none bg-transparent resize-none overflow-hidden text-slate-800 text-xs leading-tight" rows={1} value={schedule[`${day.id}_${period}_col1`] || ''} onChange={(e) => setSchedule({...schedule, [`${day.id}_${period}_col1`]: e.target.value})} onBlur={(e) => saveData(`${day.id}_${period}_col1`, e.target.value)} />
                                                </td>
                                                <td className="border p-0 align-middle">
                                                    <textarea className="w-full h-full p-2 outline-none bg-transparent resize-none overflow-hidden text-slate-800 text-xs leading-tight" rows={1} value={schedule[`${day.id}_${period}_col2`] || ''} onChange={(e) => setSchedule({...schedule, [`${day.id}_${period}_col2`]: e.target.value})} onBlur={(e) => saveData(`${day.id}_${period}_col2`, e.target.value)} />
                                                </td>
                                            </tr>
                                        ))}
                                    </React.Fragment>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // --- MÀN HÌNH VIỆC CẦN LÀM (TODO VIEW) ---
        const TodoView = ({ user, db, appId, theme }) => {
            const [todos, setTodos] = useState([]);
            const [text, setText] = useState('');
            const todoRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'todos'), [db, appId, user.uid]);

            useEffect(() => onSnapshot(query(todoRef, orderBy('createdAt', 'desc')), snap => setTodos(snap.docs.map(d => ({id: d.id, ...d.data()})))), [todoRef]);

            const addTodo = (e) => {
                e.preventDefault();
                if (!text.trim()) return;
                addDoc(todoRef, { text, completed: false, createdAt: serverTimestamp() });
                setText('');
            };

            const toggleTodo = (id, completed) => updateDoc(doc(todoRef, id), { completed: !completed });
            const deleteTodo = (id) => deleteDoc(doc(todoRef, id));

            return (
                <div className="p-4 font-sans" style={{color: theme.textColor}}>
                    <h2 className="text-xl font-bold mb-4">Việc cần làm</h2>
                    <form onSubmit={addTodo} className="flex gap-2 mb-4">
                        <input className="flex-1 px-4 py-2.5 border rounded-xl text-sm outline-none text-slate-800 focus:ring-2 focus:ring-blue-500 bg-white" placeholder="Thêm việc cần làm mới..." value={text} onChange={e=>setText(e.target.value)} />
                        <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white px-4 rounded-xl font-bold text-sm transition flex items-center gap-1"><Plus size={18}/> Thêm</button>
                    </form>
                    <div className="space-y-2 overflow-y-auto max-h-[calc(100vh-240px)] pr-1 no-scrollbar">
                        {todos.length === 0 && <div className="text-center text-gray-400 mt-10"><CheckSquare size={48} className="mx-auto mb-2 opacity-20" /><p>Không có việc gì cần làm!</p></div>}
                        {todos.map(t => (
                            <div key={t.id} className="flex items-center justify-between p-3.5 bg-white rounded-xl border shadow-sm transition hover:shadow-md" style={{borderColor: '#e5e7eb'}}>
                                <div className="flex items-center gap-3 flex-1 min-w-0" onClick={() => toggleTodo(t.id, t.completed)}>
                                    <input type="checkbox" checked={t.completed} readOnly className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 cursor-pointer" />
                                    <span className={`text-sm font-medium truncate cursor-pointer ${t.completed ? 'line-through text-gray-400' : 'text-gray-700'}`}>{t.text}</span>
                                </div>
                                <button onClick={() => deleteTodo(t.id)} className="text-gray-300 hover:text-red-500 p-1 transition"><Trash2 size={16} /></button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- MÀN HÌNH SỔ TAY GHI CHÚ (NOTES VIEW) ---
        const NoteEditor = ({ initialTitle, initialContent, initialReminder, initialColor, isNew, onSave, onCancel }) => {
            const [title, setTitle] = useState(initialTitle || '');
            const [content, setContent] = useState(initialContent || '');
            const [reminder, setReminder] = useState(initialReminder || '');
            const [color, setColor] = useState(initialColor || '#FEFCE8');
            const [showColorPicker, setShowColorPicker] = useState(false);

            return (
                <div className="h-full flex flex-col font-sans bg-white rounded-2xl shadow-inner relative overflow-hidden">
                    <div className="flex justify-between items-center px-4 py-3 border-b shrink-0 bg-slate-50">
                        <button onClick={onCancel} className="text-slate-500 hover:text-slate-700 font-bold text-sm flex items-center"><X size={18}/> Hủy</button>
                        <h3 className="font-bold text-slate-800">{isNew ? 'Thêm ghi chú mới' : 'Chi tiết ghi chú'}</h3>
                        <button onClick={() => onSave(title, content, reminder, color)} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg font-bold text-xs shadow-sm transition flex items-center gap-1"><Save size={14}/> Lưu</button>
                    </div>
                    <div className="flex-1 p-4 overflow-y-auto space-y-4" style={{ backgroundColor: color + '20' }}>
                        <div className="flex gap-2 items-center">
                            <button type="button" onClick={() => setShowColorPicker(!showColorPicker)} className="p-2 border rounded-xl bg-white shadow-sm text-slate-600 hover:bg-slate-50 transition" title="Chọn màu nền ghi chú">
                                <Palette size={18} style={{ color: color }} />
                            </button>
                            <div className="flex-1 relative flex items-center border rounded-xl bg-white px-3 py-2 shadow-sm">
                                <Clock size={16} className="text-slate-400 mr-2 shrink-0" />
                                <input type="datetime-local" className="w-full bg-transparent text-xs outline-none text-slate-700 font-semibold" value={reminder} onChange={e=>setReminder(e.target.value)} />
                            </div>
                        </div>

                        {showColorPicker && (
                            <div className="p-2 bg-white border rounded-xl grid grid-cols-6 gap-2 shadow-md fade-in">
                                {NOTE_COLORS.map(c => (
                                    <div key={c} onClick={() => { setColor(c); setShowColorPicker(false); }} className={`h-8 rounded-lg cursor-pointer border shadow-sm transition transform hover:scale-110 ${color === c ? 'border-blue-600 scale-105' : 'border-gray-200'}`} style={{ backgroundColor: c }} />
                                ))}
                            </div>
                        )}

                        <input className="w-full bg-transparent font-bold text-lg outline-none text-slate-800 placeholder-slate-400 border-b pb-2" placeholder="Tiêu đề bài viết..." value={title} onChange={e=>setTitle(e.target.value)} />
                        <textarea className="w-full bg-transparent text-sm outline-none text-slate-700 placeholder-slate-400 resize-none h-64 leading-relaxed font-medium" placeholder="Nội dung chi tiết ghi chú..." value={content} onChange={e=>setContent(e.target.value)} />
                    </div>
                </div>
            );
        };

        const NotesView = ({ user, db, appId, theme }) => {
            const [notes, setNotes] = useState([]);
            const [editing, setEditing] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const noteRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'notes'), [db, appId, user.uid]);

            useEffect(() => onSnapshot(query(noteRef), snap => setNotes(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.updatedAt?.seconds||0) - (a.updatedAt?.seconds||0)))), [noteRef]);

            const save = (title, content, reminderStr, color) => {
                const reminderData = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                const data = { title: title||'K.Tiêu đề', content: content||'', reminderTime: reminderData, color: color, updatedAt: serverTimestamp() };
                if(editing.id) updateDoc(doc(noteRef, editing.id), data);
                else addDoc(noteRef, data);
                setEditing(null);
            };

            const handleDelete = (e, id) => {
                e.stopPropagation();
                if (deleteConfirm === id) {
                    deleteDoc(doc(noteRef, id));
                    setDeleteConfirm(null);
                } else {
                    setDeleteConfirm(id);
                    setTimeout(() => setDeleteConfirm(null), 3000);
                }
            };

            if (editing) {
                const currentReminderStr = editing.reminderTime ? formatDateTimeForInput(editing.reminderTime.seconds * 1000) : '';
                return <NoteEditor initialTitle={editing.title} initialContent={editing.content} initialReminder={currentReminderStr} initialColor={editing.color} isNew={!editing.id} onSave={save} onCancel={() => setEditing(null)} />;
            }

            return (
                <div className="p-4 font-sans" style={{color: theme.textColor}}>
                    <div className="flex justify-between mb-4"><h2 className="text-xl font-bold">Sổ tay</h2><button onClick={()=>setEditing({})} className="bg-blue-100 text-blue-600 px-3 py-2 rounded-lg flex items-center gap-1 text-sm font-bold"><Plus size={16}/> Mới</button></div>
                    <div className="grid grid-cols-2 gap-3">
                        {notes.length === 0 && <div className="col-span-2 text-center text-gray-400 mt-10"><StickyNote size={48} className="mx-auto mb-2 opacity-20" /><p>Trống trơn...</p></div>}
                        {notes.map(n => (
                            <div key={n.id} onClick={()=>setEditing(n)} className="p-4 rounded-xl border shadow-sm h-48 flex flex-col relative group cursor-pointer hover:shadow-md transition" style={{backgroundColor: n.color || theme.noteColor, borderColor: '#e5e7eb'}}>
                                <div className="flex justify-between items-start mb-2">
                                    <h4 className="font-bold truncate text-gray-800 flex-1">{n.title}</h4>
                                    {n.reminderTime && <Bell size={12} className="text-orange-500 mt-1 ml-1" />}
                                </div>
                                <p className="text-xs overflow-hidden flex-1 leading-relaxed whitespace-pre-wrap font-medium" style={{color: theme.textColor, opacity: 0.8}}>{n.content}</p>
                                {n.reminderTime && <div className="text-[9px] text-orange-600 font-medium mt-1 mb-1 flex items-center gap-1"><Clock size={10}/> {formatDisplayDate(n.reminderTime.seconds)}</div>}
                                <div className="flex justify-between items-center mt-1 pt-2 border-t border-black/10">
                                    <span className="text-[10px] text-slate-500">{n.updatedAt ? new Date(n.updatedAt.seconds*1000).toLocaleDateString('vi-VN') : ''}</span>
                                    <button onClick={(e)=>handleDelete(e, n.id)} className={`text-slate-400 hover:text-red-500 transition-all ${deleteConfirm === n.id ? 'bg-white text-red-600 px-2 py-1 rounded shadow-sm text-xs font-bold' : ''}`}>{deleteConfirm === n.id ? <span>Xóa?</span> : <Trash2 size={16}/>}</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- COMPONENT MÀN HÌNH KHÓA BẢO VỆ ---
        const LockScreen = ({ onUnlock, correctPassword }) => {
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');

            const handleUnlockSubmit = (e) => {
                e.preventDefault();
                setError('');
                if (pin === correctPassword) {
                    onUnlock();
                    setPin('');
                } else {
                    setError("Mã bảo vệ không chính xác. Vui lòng nhập lại.");
                    setPin('');
                }
            };

            return (
                <div className="flex flex-col flex-1 items-center justify-center p-6 bg-slate-50 font-sans">
                    <div className="w-full max-w-xs text-center space-y-6">
                        <div className="mx-auto bg-blue-100 text-blue-600 p-4 rounded-full w-16 h-16 flex items-center justify-center">
                            <Lock size={28} />
                        </div>
                        <div>
                            <h3 className="text-lg font-bold text-slate-800">Khu vực bảo mật</h3>
                            <p className="text-xs text-slate-400 mt-1">Vui lòng cung cấp mã PIN để xem dữ liệu</p>
                        </div>
                        <form onSubmit={handleUnlockSubmit} className="space-y-4">
                            <input type="password" required value={pin} onChange={e => setPin(e.target.value)} placeholder="Nhập mã bảo vệ..." className="w-full px-4 py-3 border border-slate-200 text-center rounded-xl text-lg font-bold tracking-widest text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none bg-white shadow-sm" />
                            {error && <p className="text-red-500 text-xs text-center font-medium">{error}</p>}
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition" >
                                Xác nhận mở khóa
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('calendar');
            const [app, setApp] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [showMenu, setShowMenu] = useState(false);
            const [connectionError, setConnectionError] = useState(false);
            
            // START: Quản lý Trạng thái Ngoại tuyến (UI/UX)
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [showOfflineBadge, setShowOfflineBadge] = useState(false);
            // END: Quản lý Trạng thái Ngoại tuyến (UI/UX)

            const [dailyDate, setDailyDate] = useState(new Date());
            const [calendarCurrentDate, setCalendarCurrentDate] = useState(new Date());
            const [calendarSelectedDate, setCalendarSelectedDate] = useState(new Date());
            const [activeAlerts, setActiveAlerts] = useState([]);
            const [showAlertModal, setShowAlertModal] = useState(false);

            // Các State phục vụ việc Chỉnh sửa Sự kiện / Todo trực tiếp trong Modal cảnh báo
            const [editingAlertId, setEditingAlertId] = useState(null);
            const [editAlertTitle, setEditAlertTitle] = useState('');
            const [editAlertTimeStr, setEditAlertTimeStr] = useState('');

            const [lockPassword, setLockPassword] = useState('');
            const [lockEnabled, setLockEnabled] = useState(false);
            const [unlockedTabs, setUnlockedTabs] = useState({ todo: false, notes: false });

            // THÊM: Quản lý State tìm kiếm toàn cục để hỗ trợ đồng bộ nhanh chóng
            const [searchQueryState, setSearchQueryState] = useState('');
            const [showSearchDropdown, setShowSearchDropdown] = useState(false);
            const searchRef = useRef(null);

            // Các kho lưu trữ snapshot để tìm kiếm cục bộ không trễ mạng
            const [allEventsSnapshot, setAllEventsSnapshot] = useState([]);
            const [allTodosSnapshot, setAllTodosSnapshot] = useState([]);
            const [allNotesSnapshot, setAllNotesSnapshot] = useState([]);
            const [allTimetablesSnapshot, setAllTimetablesSnapshot] = useState([]);

            const [completedAlerts, setCompletedAlerts] = useState(() => {
                try {
                    const saved = localStorage.getItem('vt_completed_alerts');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) {
                    return {};
                }
            });

            const [theme, setTheme] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('app_theme')) || { bgColor: '#f3f4f6', noteColor: '#FEFCE8', textColor: '#1F2937' };
                } catch(e) {
                    return { bgColor: '#f3f4f6', noteColor: '#FEFCE8', textColor: '#1F2937' };
                }
            });

            // Đồng bộ completedAlerts vào LocalStorage
            useEffect(() => {
                localStorage.setItem('vt_completed_alerts', JSON.stringify(completedAlerts));
            }, [completedAlerts]);

            // START: Đăng ký lắng nghe tình trạng Internet thay đổi và tự động đồng bộ
            useEffect(() => {
                const handleOnline = () => {
                    setIsOffline(false);
                    setShowOfflineBadge(true);
                    toast.success("Đã khôi phục kết nối mạng! Dữ liệu đang được đồng bộ tự động.", { position: "top-center" });
                    setTimeout(() => setShowOfflineBadge(false), 3000);
                };
                const handleOffline = () => {
                    setIsOffline(true);
                    setShowOfflineBadge(true);
                    toast.warning("Mất kết nối mạng! Ứng dụng chuyển sang chế độ ngoại tuyến.", { position: "top-center" });
                };

                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);

                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);
            // END: Đăng ký lắng nghe tình trạng Internet thay đổi và tự động đồng bộ

            // Đóng ô tìm kiếm khi click ra ngoài
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (searchRef.current && !searchRef.current.contains(event.target)) {
                        setShowSearchDropdown(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            // Lấy ID cấu hình từ Local Storage hoặc lấy mặc định nếu chưa cài đặt
            const [appId, setAppId] = useState(() => {
                return localStorage.getItem(STORAGE_KEY_CONFIG) || MANUAL_CONFIG.projectId;
            });

            // Lấy danh sách câu Pháp Cú từ Local Storage hoặc lấy danh sách mặc định
            const [verses, setVerses] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY_VERSES);
                    return saved ? JSON.parse(saved) : DEFAULT_VERSES;
                } catch (e) {
                    return DEFAULT_VERSES;
                }
            });

            // Xử lý khởi tạo Firebase
            const { auth, db } = useMemo(() => {
                try {
                    const currentConfig = { ...MANUAL_CONFIG, projectId: appId, authDomain: `${appId}.firebaseapp.com`, storageBucket: `${appId}.firebasestorage.app` };
                    const firebaseApp = initializeApp(currentConfig, 'LichVanTrungApp');
                    const firestoreInstance = getFirestore(firebaseApp);
                    
                    try {
                        enableIndexedDbPersistence(firestoreInstance).catch((err) => {
                            if (err.code === 'failed-precondition') {
                                console.warn("Persistence failed: Multiple tabs open");
                            } else if (err.code === 'unimplemented') {
                                console.warn("Persistence browser unsupported");
                            }
                        });
                    } catch(pe) {
                        console.warn("IndexedDB context block error:", pe);
                    }

                    return { auth: getAuth(firebaseApp), db: firestoreInstance };
                } catch (e) {
                    console.error("Lỗi khởi tạo Firebase: ", e);
                    setConnectionError(true);
                    return { auth: null, db: null };
                }
            }, [appId]);

            // Trạng thái đăng nhập
            useEffect(() => {
                if (!auth) return;
                const unsub = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return unsub;
            }, [auth]);

            // Lắng nghe cấu hình bảo mật mật khẩu của User từ FireStore
            useEffect(() => {
                if (!db || !user) return;
                const configRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'security');
                return onSnapshot(configRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setLockPassword(data.password || '');
                        setLockEnabled(data.enabled || false);
                    } else {
                        setLockPassword('');
                        setLockEnabled(false);
                    }
                }, err => {
                    console.warn("Security data listener offline mode (Using cache):", err);
                });
            }, [db, user, appId]);

            // THÊM: Snapshot đồng bộ toàn bộ cơ sở dữ liệu về Client để tìm kiếm tức thì không độ trễ mạng
            useEffect(() => {
                if (!db || !user) return;

                // 1. Snapshot Sự kiện
                const eventsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'events');
                const unsubEvents = onSnapshot(eventsRef, (snap) => {
                    setAllEventsSnapshot(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // 2. Snapshot Việc cần làm
                const todosRef = collection(db, 'artifacts', appId, 'users', user.uid, 'todos');
                const unsubTodos = onSnapshot(todosRef, (snap) => {
                    setAllTodosSnapshot(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // 3. Snapshot Ghi chú
                const notesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'notes');
                const unsubNotes = onSnapshot(notesRef, (snap) => {
                    setAllNotesSnapshot(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // 4. Snapshot Thời khóa biểu công văn tổng hợp
                const timetableRef = collection(db, 'artifacts', appId, 'users', user.uid, 'timetable');
                const unsubTimetable = onSnapshot(timetableRef, (snap) => {
                    setAllTimetablesSnapshot(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => {
                    unsubEvents();
                    unsubTodos();
                    unsubNotes();
                    unsubTimetable();
                };
            }, [db, user, appId]);

            // THÊM: Logic tìm kiếm toàn cục phân tách dữ liệu đa nhiệm nâng cao (Events, Todos, Notes, Timetable)
            const globalSearchResults = useMemo(() => {
                if (!searchQueryState.trim()) return [];
                const queryLower = searchQueryState.toLowerCase().trim();
                const results = [];

                // Tìm trong sự kiện
                allEventsSnapshot.forEach(ev => {
                    if (ev.title && ev.title.toLowerCase().includes(queryLower)) {
                        results.push({
                            type: 'event',
                            tab: 'calendar',
                            title: ev.title,
                            desc: ev.dateStr ? `Ngày ${ev.dateStr}` : 'Sự kiện lịch',
                            originalData: ev
                        });
                    }
                });

                // Tìm trong việc cần làm
                allTodosSnapshot.forEach(td => {
                    if (td.text && td.text.toLowerCase().includes(queryLower)) {
                        results.push({
                            type: 'todo',
                            tab: 'todo',
                            title: td.text,
                            desc: td.completed ? 'Đã hoàn thành' : 'Chưa hoàn thành',
                            originalData: td
                        });
                    }
                });

                // Tìm trong ghi chú
                allNotesSnapshot.forEach(nt => {
                    const matchTitle = nt.title && nt.title.toLowerCase().includes(queryLower);
                    const matchContent = nt.content && nt.content.toLowerCase().includes(queryLower);
                    if (matchTitle || matchContent) {
                        results.push({
                            type: 'note',
                            tab: 'notes',
                            title: nt.title || 'Không có tiêu đề',
                            desc: nt.content ? nt.content.substring(0, 60) + '...' : 'Nội dung ghi chú',
                            originalData: nt
                        });
                    }
                });

                // Tìm trong thời khóa biểu tuần học tập
                allTimetablesSnapshot.forEach(tt => {
                    if (tt.schedule) {
                        Object.entries(tt.schedule).forEach(([key, value]) => {
                            if (value && typeof value === 'string' && value.toLowerCase().includes(queryLower)) {
                                // Giải mã khóa t2_1_col1 -> Thứ 2, Tiết 1
                                const parts = key.split('_');
                                const dayMap = { t2: 'Thứ 2', t3: 'Thứ 3', t4: 'Thứ 4', t5: 'Thứ 5', t6: 'Thứ 6', t7: 'Thứ 7' };
                                const dayLabel = dayMap[parts[0]] || parts[0];
                                const tietLabel = parts[1] ? `Tiết ${parts[1]}` : '';
                                
                                results.push({
                                    type: 'timetable',
                                    tab: 'timetable',
                                    title: value,
                                    desc: `Thời khóa biểu - ${dayLabel} ${tietLabel}`,
                                    originalData: tt
                                });
                            }
                        });
                    }
                });

                // Sắp xếp kết quả: Tiêu đề chứa từ khóa ở vị trí đầu tiên sẽ đứng trước gần nhất
                return results.sort((a, b) => {
                    const idxA = a.title.toLowerCase().indexOf(queryLower);
                    const idxB = b.title.toLowerCase().indexOf(queryLower);
                    return idxA - idxB;
                });
            }, [searchQueryState, allEventsSnapshot, allTodosSnapshot, allNotesSnapshot, allTimetablesSnapshot]);

            // Hàm kích hoạt di chuyển Tab an toàn khi click kết quả tìm kiếm
            const handleSelectSearchResult = (result) => {
                setActiveTab(result.tab);
                setSearchQueryState('');
                setShowSearchDropdown(false);
                toast.info(`Đã chuyển hướng đến mục: ${result.desc}`);
            };

            // Hàm xử lý hiển thị tab bảo mật an toàn
            const handleTabClick = (tabId) => {
                if (lockEnabled && lockPassword) {
                    if ((tabId === 'todo' && !unlockedTabs.todo) || (tabId === 'notes' && !unlockedTabs.notes)) {
                        setActiveTab(tabId);
                        return;
                    }
                }
                setActiveTab(tabId);
            };

            const handleTabUnlockSuccess = (tabId) => {
                setUnlockedTabs(prev => ({ ...prev, [tabId]: true }));
            };

            // Trích xuất hiển thị câu đối / danh ngôn ngẫu nhiên theo ngày cụ thể ổn định
            const dailyVerse = useMemo(() => {
                if (!verses || verses.length === 0) return "";
                const dayIndex = dailyDate.getDate() % verses.length;
                return verses[dayIndex] || verses[0];
            }, [dailyDate, verses]);

            // Render view chính theo Tab đã chọn
            const renderTabContent = () => {
                if (lockEnabled && lockPassword) {
                    if (activeTab === 'todo' && !unlockedTabs.todo) {
                        return <LockScreen correctPassword={lockPassword} onUnlock={() => handleTabUnlockSuccess('todo')} />;
                    }
                    if (activeTab === 'notes' && !unlockedTabs.notes) {
                        return <LockScreen correctPassword={lockPassword} onUnlock={() => handleTabUnlockSuccess('notes')} />;
                    }
                }

                switch(activeTab) {
                    case 'calendar':
                        return (
                            <div className="p-4 text-center space-y-4">
                                <div className="bg-white p-5 rounded-2xl border shadow-sm border-slate-100">
                                    <div className="text-sm font-bold text-blue-600 mb-2 flex items-center justify-center gap-1">
                                        <BookOpen size={16}/> Lời Vàng Pháp Cú Hôm Nay
                                    </div>
                                    <p className="text-xs text-slate-700 italic whitespace-pre-wrap leading-relaxed font-medium bg-slate-50 p-4 rounded-xl border border-dashed border-slate-200">
                                        "{dailyVerse}"
                                    </p>
                                </div>
                                <div className="bg-white p-4 rounded-2xl border shadow-sm border-slate-100 flex flex-col items-center justify-center min-h-[160px]">
                                    <CalendarDays size={40} className="text-slate-300 mb-2 animate-pulse" />
                                    <p className="text-xs font-bold text-slate-800">Màn hình xem lịch vạn niên tổng quát</p>
                                    <p className="text-[11px] text-slate-400 mt-1 max-w-xs leading-normal font-medium">Hệ thống đang lưu trữ và đồng bộ hóa ngoại tuyến dữ liệu của bạn an toàn.</p>
                                </div>
                            </div>
                        );
                    case 'todo':
                        return <TodoView user={user} db={db} appId={appId} theme={theme} />;
                    case 'notes':
                        return <NotesView user={user} db={db} appId={appId} theme={theme} />;
                    case 'timetable':
                        return <TimeTableView user={user} db={db} appId={appId} theme={theme} />;
                    default:
                        return <div className="p-4 text-center text-xs font-medium text-gray-500">Chức năng đang phát triển</div>;
                }
            };

            if (loading) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-slate-50 font-sans">
                        <div className="relative flex items-center justify-center">
                            <div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
                            <CalendarDays size={20} className="absolute text-blue-600" />
                        </div>
                        <span className="text-xs font-bold text-slate-600 mt-4 tracking-wider">ĐANG TẢI HỆ THỐNG...</span>
                    </div>
                );
            }

            if (!user) {
                return <AuthView onAuthSuccess={(u) => setUser(u)} appId={appId} setAppId={setAppId} />;
            }

            return (
                <div className="max-w-md mx-auto bg-gray-50 min-h-screen shadow-2xl flex flex-col relative border-x border-slate-200/60 font-sans">
                    
                    {/* KHU VỰC HEADER TÍCH HỢP THANH TÌM KIẾM TOÀN CỤC CHUYÊN NGHIỆP */}
                    <header className="bg-blue-600 text-white px-4 py-3 sticky top-0 z-50 shadow-md shrink-0 flex items-center justify-between gap-2">
                        <div className="flex items-center gap-1.5 shrink-0" onClick={() => setActiveTab('calendar')} className="cursor-pointer flex items-center gap-1">
                            <div className="bg-white/10 p-1.5 rounded-lg">
                                <Calendar size={18} className="text-white" />
                            </div>
                            <span className="font-extrabold text-sm tracking-tight hidden sm:inline">Lịch Trung</span>
                        </div>

                        {/* THANH TÌM KIẾM TOÀN CỤC BIẾN THIÊN RESPONSIVE */}
                        <div className="flex-1 max-w-[200px] sm:max-w-[240px] relative" ref={searchRef}>
                            <div className="relative flex items-center bg-white/15 hover:bg-white/20 focus-within:bg-white focus-within:text-slate-800 rounded-xl px-2.5 py-1.5 transition duration-200">
                                <Search size={14} className="text-white/70 focus-within:text-slate-400 mr-1.5 shrink-0" />
                                <input 
                                    type="text" 
                                    placeholder="Tìm sự kiện, ghi chú..." 
                                    className="w-full bg-transparent text-xs outline-none placeholder-white/60 focus:placeholder-slate-400 font-medium text-white focus:text-slate-800"
                                    value={searchQueryState}
                                    onChange={(e) => {
                                        setSearchQueryState(e.target.value);
                                        setShowSearchDropdown(true);
                                    }}
                                    onFocus={() => setShowSearchDropdown(true)}
                                />
                                {searchQueryState && (
                                    <button onClick={() => setSearchQueryState('')} className="p-0.5 rounded-full hover:bg-black/10 text-current transition">
                                        <X size={12} />
                                    </button>
                                )}
                            </div>

                            {/* DROPDOWN MENU KẾT QUẢ TÌM KIẾM THẢ XUỐNG */}
                            {showSearchDropdown && searchQueryState.trim() && (
                                <div className="absolute top-full left-0 right-0 mt-1.5 bg-white rounded-xl shadow-xl border border-slate-200 max-h-64 overflow-y-auto z-50 font-sans text-slate-800 fade-in no-scrollbar">
                                    <div className="px-3 py-1.5 bg-slate-50 border-b text-[10px] font-bold text-slate-400 tracking-wider sticky top-0">
                                        KẾT QUẢ TÌM KIẾM ({globalSearchResults.length})
                                    </div>
                                    {globalSearchResults.length === 0 ? (
                                        <div className="px-4 py-6 text-center text-xs text-slate-400 font-medium">
                                            Không tìm thấy nội dung phù hợp
                                        </div>
                                    ) : (
                                        globalSearchResults.map((res, i) => (
                                            <div 
                                                key={i} 
                                                onClick={() => handleSelectSearchResult(res)}
                                                className="px-3 py-2 border-b last:border-b-0 hover:bg-slate-50 cursor-pointer transition flex flex-col gap-0.5"
                                            >
                                                <div className="text-xs font-bold text-slate-800 truncate flex items-center gap-1.5">
                                                    <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${
                                                        res.type === 'event' ? 'bg-blue-500' :
                                                        res.type === 'todo' ? 'bg-green-500' :
                                                        res.type === 'note' ? 'bg-yellow-500' : 'bg-purple-500'
                                                    }`} />
                                                    {res.title}
                                                </div>
                                                <div className="text-[10px] text-slate-400 font-semibold truncate pl-3">
                                                    {res.desc}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            )}
                        </div>

                        {/* NÚT THAO TÁC CÀI ĐẶT / MENU TIỆN ÍCH */}
                        <div className="flex items-center gap-1 shrink-0">
                            <button onClick={() => { setShowSettings(!showSettings); setShowMenu(false); }} className="p-2 hover:bg-white/10 rounded-xl transition text-white" title="Cài đặt hệ thống">
                                <Settings size={16} />
                            </button>
                            <button onClick={() => { signOut(auth); toast.info("Đã đăng xuất tài khoản."); }} className="p-2 hover:bg-white/10 rounded-xl text-white transition" title="Đăng xuất">
                                <LogOut size={16} />
                            </button>
                        </div>
                    </header>

                    {/* HIỂN THỊ THÔNG BÁO BADGE NGOẠI TUYẾN MỀM MẠI UI/UX */}
                    {showOfflineBadge && (
                        <div className={`px-4 py-1.5 text-center text-[10px] font-bold tracking-wider text-white shrink-0 shadow-inner flex items-center justify-center gap-1.5 transition ${isOffline ? 'bg-amber-500' : 'bg-emerald-500'}`}>
                            {isOffline ? <WifiOff size={12}/> : <Wifi size={12}/>}
                            {isOffline ? 'CHẾ ĐỘ NGOẠI TUYẾN (ĐANG SỬ DỤNG DỮ LIỆU CACHED)' : 'ĐÃ KẾT NỐI INTERNET MẠNG ỔN ĐỊNH'}
                        </div>
                    )}

                    {/* PHẦN NỘI DUNG CHÍNH (MAIN VIEW BOX) */}
                    <main className="flex-1 overflow-y-auto no-scrollbar">
                        {showSettings ? (
                            <div className="p-4 font-sans text-slate-800 space-y-4">
                                <div className="flex justify-between items-center mb-2">
                                    <h2 className="text-lg font-bold">Cài đặt hệ thống</h2>
                                    <button onClick={() => setShowSettings(false)} className="text-xs bg-slate-200 px-2.5 py-1 rounded-lg font-bold">Đóng</button>
                                </div>
                                <div className="bg-white p-4 rounded-xl border shadow-sm text-xs font-semibold text-slate-500 space-y-2">
                                    <p>Tài khoản: <span className="text-slate-800 font-bold">{user.email}</span></p>
                                    <p>UID: <span className="text-slate-700 font-mono text-[10px]">{user.uid}</span></p>
                                    <p>Database Core ID: <span className="text-blue-600 font-mono font-bold">{appId}</span></p>
                                </div>
                                <div className="p-4 bg-blue-50 text-blue-700 text-xs leading-relaxed font-medium rounded-xl border border-blue-100">
                                    Hệ thống tự động lưu trữ cục bộ dữ liệu thông qua cơ chế IndexedDB, bạn vẫn có thể sử dụng tất cả tính năng ghi chú, thời khóa biểu ngay cả khi không có mạng.
                                </div>
                            </div>
                        ) : renderTabContent()}
                    </main>

                    {/* THANH ĐIỀU HƯỚNG TÁC VỤ DƯỚI ĐÁY (BOTTOM NAVIGATION TAB) */}
                    <nav className="bg-white border-t border-gray-200 px-2 py-1.5 sticky bottom-0 z-40 shrink-0 shadow-xl grid grid-cols-4 gap-1">
                        <button onClick={() => handleTabClick('calendar')} className={`flex flex-col items-center justify-center py-1 rounded-xl transition ${activeTab === 'calendar' ? 'bg-blue-50 text-blue-600 font-bold' : 'text-gray-400 hover:text-gray-600 font-medium'}`}>
                            <Calendar size={18} />
                            <span className="text-[10px] mt-0.5">Lịch Ngày</span>
                        </button>
                        <button onClick={() => handleTabClick('timetable')} className={`flex flex-col items-center justify-center py-1 rounded-xl transition ${activeTab === 'timetable' ? 'bg-blue-50 text-blue-600 font-bold' : 'text-gray-400 hover:text-gray-600 font-medium'}`}>
                            <Table size={18} />
                            <span className="text-[10px] mt-0.5">Thời Khóa Biểu</span>
                        </button>
                        <button onClick={() => handleTabClick('todo')} className={`flex flex-col items-center justify-center py-1 rounded-xl transition ${activeTab === 'todo' ? 'bg-blue-50 text-blue-600 font-bold' : 'text-gray-400 hover:text-gray-600 font-medium'}`}>
                            <CheckSquare size={18} />
                            <span className="text-[10px] mt-0.5">Việc Cần Làm</span>
                        </button>
                        <button onClick={() => handleTabClick('notes')} className={`flex flex-col items-center justify-center py-1 rounded-xl transition ${activeTab === 'notes' ? 'bg-blue-50 text-blue-600 font-bold' : 'text-gray-400 hover:text-gray-600 font-medium'}`}>
                            <StickyNote size={18} />
                            <span className="text-[10px] mt-0.5">Sổ Tay</span>
                        </button>
                    </nav>

                    {/* DIỄN TIẾN TRẠNG THÁI OFFLINE ERROR BACKUP MODAL KHÔNG KẾT NỐI */}
                    {connectionError && (
                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 font-sans">
                            <div className="bg-white w-full max-w-xs rounded-2xl p-5 shadow-2xl space-y-4 text-center">
                                <div className="mx-auto bg-amber-100 text-amber-600 p-3 rounded-full w-12 h-12 flex items-center justify-center"><AlertCircle size={24}/></div>
                                <h3 className="font-bold text-slate-800 text-base">Lỗi cấu hình đám mây</h3>
                                <p className="text-xs text-slate-500 leading-normal font-sans">Chúng tôi tạm thời không kết nối được với dữ liệu đám mây. Bạn vẫn có thể tiếp tục sử dụng ứng dụng ở chế độ Offline.</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setConnectionError(false)} className="flex-1 bg-gray-200 hover:bg-gray-300 text-slate-700 py-2 rounded-xl text-xs font-bold transition font-sans">Bỏ qua (Chạy Offline)</button>
                                    <button onClick={() => window.location.reload()} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-xs font-bold transition font-sans">Thử lại</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* TOAST CONTAINER ĐỂ HIỂN THỊ THÔNG BÁO TRỰC QUAN */}
                    <ToastContainer 
                        position="top-center"
                        autoClose={3000}
                        hideProgressBar={false}
                        newestOnTop={false}
                        closeOnClick
                        rtl={false}
                    />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
