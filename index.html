                    <div className="px-4 py-2 bg-gray-50 flex gap-3 overflow-x-auto no-scrollbar items-center">
                        <span className="text-xs text-slate-700 font-bold mr-1">Màu:</span>
                        {NOTE_COLORS.map(c => (
                            <button key={c} onClick={() => setColor(c)} className={`w-8 h-8 rounded-full border border-gray-300 shadow-sm transition-transform hover:scale-110 ${color === c ? 'ring-2 ring-blue-500 ring-offset-2' : ''}`} style={{ backgroundColor: c }} />
                        ))}
                    </div>
                    <div className="px-4 py-2 bg-gray-50 border-b flex items-center gap-2">
                        <Bell size={16} className="text-gray-500"/>
                        <span className="text-xs text-gray-600 font-semibold">Nhắc tôi vào:</span>
                        <input type="datetime-local" className="bg-white border rounded px-2 py-1 text-xs text-gray-700 outline-none" value={reminder} onChange={e=>setReminder(e.target.value)} />
                    </div>
                    <div className="p-4 flex-1 flex flex-col gap-4" style={{ backgroundColor: color }}>
                        <input className="text-2xl font-bold outline-none placeholder-gray-400 bg-transparent text-slate-800" placeholder="Tiêu đề" value={title} onChange={e=>setTitle(e.target.value)} />
                        <textarea className="flex-1 resize-none outline-none text-slate-700 leading-relaxed placeholder-gray-400 bg-transparent" placeholder="Nội dung..." value={content} onChange={e=>setContent(e.target.value)} />
                    </div>
                </div>
            );
        };

        const NotesView = ({ user, db, appId, theme, searchTarget, onSearchTargetClear }) => {
            const [notes, setNotes] = useState([]);
            const [editing, setEditing] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [highlightId, setHighlightId] = useState(null);
            const noteRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'notes'), [db, appId, user.uid]);
            useEffect(() => onSnapshot(query(noteRef), snap => setNotes(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.updatedAt?.seconds||0) - (a.updatedAt?.seconds||0)))), [noteRef]);

            // Scroll và highlight khi có searchTarget
            useEffect(() => {
                if (!searchTarget || searchTarget.tab !== 'notes' || !searchTarget.itemId) return;
                setHighlightId(searchTarget.itemId);
                setTimeout(() => {
                    const el = document.getElementById(`note-item-${searchTarget.itemId}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 200);
                const timer = setTimeout(() => {
                    setHighlightId(null);
                    if (onSearchTargetClear) onSearchTargetClear();
                }, 3000);
                return () => clearTimeout(timer);
            }, [searchTarget]);
            const save = (title, content, reminderStr, color) => {
                const reminderData = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                const data = { title: title||'K.Tiêu đề', content: content||'', reminderTime: reminderData, color: color, updatedAt: serverTimestamp() };
                if(editing.id) updateDoc(doc(noteRef, editing.id), data);
                else addDoc(noteRef, data);
                setEditing(null);
            };
            const handleDelete = (e, id) => {
                e.stopPropagation();
                if (deleteConfirm === id) { deleteDoc(doc(noteRef, id)); setDeleteConfirm(null); } 
                else { setDeleteConfirm(id); setTimeout(() => setDeleteConfirm(null), 3000); }
            };
            if (editing) {
                const currentReminderStr = editing.reminderTime ? formatDateTimeForInput(editing.reminderTime.seconds * 1000) : '';
                return <NoteEditor initialTitle={editing.title} initialContent={editing.content} initialReminder={currentReminderStr} initialColor={editing.color} isNew={!editing.id} onSave={save} onCancel={() => setEditing(null)} />;
            }
            return (
                <div className="p-4 font-sans" style={{color: theme.textColor}}>
                    <div className="flex justify-between mb-4"><h2 className="text-xl font-bold">Sổ tay</h2><button onClick={()=>setEditing({})} className="bg-blue-100 text-blue-600 px-3 py-2 rounded-lg flex items-center gap-1 text-sm font-bold"><Plus size={16}/> Mới</button></div>
                    <div className="grid grid-cols-2 gap-3">
                        {notes.length === 0 && <div className="col-span-2 text-center text-gray-400 mt-10"><StickyNote size={48} className="mx-auto mb-2 opacity-20" /><p>Trống trơn...</p></div>}
                        {notes.map(n => {
                            const isHighlighted = highlightId === n.id;
                            const kw = searchTarget?.keyword?.toLowerCase();
                            const hlTitle = isHighlighted && kw && n.title?.toLowerCase().includes(kw);
                            const hlContent = isHighlighted && kw && n.content?.toLowerCase().includes(kw);
                            const mkHL = (text) => {
                                if (!text || !kw) return text;
                                const i = text.toLowerCase().indexOf(kw);
                                if (i === -1) return text;
                                return <span>{text.slice(0,i)}<mark className="bg-yellow-300 text-yellow-900 rounded px-0.5">{text.slice(i, i+kw.length)}</mark>{text.slice(i+kw.length)}</span>;
                            };
                            return (
                                <div key={n.id} id={`note-item-${n.id}`} onClick={()=>setEditing(n)} className={`p-4 rounded-xl border shadow-sm h-48 flex flex-col relative group cursor-pointer transition-all duration-500 ${isHighlighted ? 'ring-2 ring-yellow-400 shadow-yellow-200 shadow-md scale-[1.02]' : 'hover:shadow-md'}`} style={{backgroundColor: n.color || theme.noteColor, borderColor: isHighlighted ? '#fbbf24' : '#e5e7eb'}}>
                                    <div className="flex justify-between items-start mb-2">
                                        <h4 className="font-bold truncate text-gray-800 flex-1">{hlTitle ? mkHL(n.title) : n.title}</h4>
                                        {n.reminderTime && <Bell size={12} className="text-orange-500 mt-1 ml-1" />}
                                    </div>
                                    <p className="text-xs overflow-hidden flex-1 leading-relaxed whitespace-pre-wrap font-medium" style={{color: theme.textColor, opacity: 0.8}}>{hlContent ? mkHL(n.content) : n.content}</p>
                                    {n.reminderTime && <div className="text-[9px] text-orange-600 font-medium mt-1 mb-1 flex items-center gap-1"><Clock size={10}/> {formatDisplayDate(n.reminderTime.seconds)}</div>}
                                    <div className="flex justify-between items-center mt-1 pt-2 border-t border-black/10">
                                        <span className="text-[10px] text-slate-500">{n.updatedAt ? new Date(n.updatedAt.seconds*1000).toLocaleDateString('vi-VN') : ''}</span>
                                        <button onClick={(e)=>handleDelete(e, n.id)} className={`text-slate-400 hover:text-red-500 transition-all ${deleteConfirm === n.id ? 'bg-white text-red-600 px-2 py-1 rounded shadow-sm text-xs font-bold' : ''}`}>{deleteConfirm === n.id ? <span>Xóa?</span> : <Trash2 size={16}/>}</button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // --- COMPONENT MÀN HÌNH KHÓA BẢO VỆ ---
        const LockScreen = ({ onUnlock, correctPassword }) => {
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');

            const handleUnlockSubmit = (e) => {
                e.preventDefault();
                setError('');
                if (pin === correctPassword) {
                    onUnlock();
                    setPin('');
                } else {
                    setError("Mã bảo vệ không chính xác. Vui lòng nhập lại.");
                    setPin('');
                }
            };

            return (
                <div className="flex flex-col flex-1 items-center justify-center p-6 bg-slate-50 font-sans">
                    <div className="w-full max-w-xs text-center space-y-6">
                        <div className="mx-auto bg-blue-100 text-blue-600 p-4 rounded-full w-16 h-16 flex items-center justify-center">
                            <Lock size={28} />
                        </div>
                        <div>
                            <h3 className="text-lg font-bold text-slate-800">Khu vực bảo mật</h3>
                            <p className="text-xs text-slate-400 mt-1">Vui lòng cung cấp mã PIN để xem dữ liệu</p>
                        </div>
                        <form onSubmit={handleUnlockSubmit} className="space-y-4">
                            <input 
                                type="password" 
                                required
                                value={pin}
                                onChange={e => setPin(e.target.value)}
                                placeholder="Nhập mã bảo vệ..." 
                                className="w-full px-4 py-3 border border-slate-200 text-center rounded-xl text-lg font-bold tracking-widest text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none bg-white shadow-sm"
                            />
                            {error && <p className="text-red-500 text-xs text-center font-medium">{error}</p>}
                            <button 
                                type="submit" 
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition"
                            >
                                Xác nhận mở khóa
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('calendar');
            const [app, setApp] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [showMenu, setShowMenu] = useState(false);
            const [connectionError, setConnectionError] = useState(false);
            
            // START: Quản lý Trạng thái Ngoại tuyến (UI/UX)
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [showOfflineBadge, setShowOfflineBadge] = useState(false);
            // END: Quản lý Trạng thái Ngoại tuyến (UI/UX)

            const [dailyDate, setDailyDate] = useState(new Date());
            const [calendarCurrentDate, setCalendarCurrentDate] = useState(new Date());
            const [calendarSelectedDate, setCalendarSelectedDate] = useState(new Date());

            const [activeAlerts, setActiveAlerts] = useState([]);
            const [showAlertModal, setShowAlertModal] = useState(false);

            // Các State phục vụ việc Chỉnh sửa Sự kiện / Todo trực tiếp trong Modal cảnh báo
            const [editingAlertId, setEditingAlertId] = useState(null);
            const [editAlertTitle, setEditAlertTitle] = useState('');
            const [editAlertTimeStr, setEditAlertTimeStr] = useState('');

            const [showSearch, setShowSearch] = useState(false);
            const headerRef = React.useRef(null);

            const [avatarUrl, setAvatarUrl] = useState(() => {
                try { return localStorage.getItem('vt_avatar_url') || null; } catch(e) { return null; }
            });

            const avatarInputRef = React.useRef(null);

            const handleAvatarChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const dataUrl = ev.target.result;
                    setAvatarUrl(dataUrl);
                    try { localStorage.setItem('vt_avatar_url', dataUrl); } catch(err) { console.warn("Lưu avatar thất bại:", err); }
                };
                reader.readAsDataURL(file);
            };

            const [lockPassword, setLockPassword] = useState('');
            const [lockEnabled, setLockEnabled] = useState(false);
            const [unlockedTabs, setUnlockedTabs] = useState({ todo: false, notes: false });

            const [completedAlerts, setCompletedAlerts] = useState(() => {
                try {
                    const saved = localStorage.getItem('vt_completed_alerts');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) {
                    return {};
                }
            });

            const [theme, setTheme] = useState(() => {
                try { return JSON.parse(localStorage.getItem('app_theme')) || { bgColor: '#f3f4f6', noteColor: '#FEFCE8', textColor: '#1F2937' }; } 
                catch(e) { return { bgColor: '#f3f4f6', noteColor: '#FEFCE8', textColor: '#1F2937' }; }
            });

            // Đồng bộ completedAlerts vào LocalStorage
            useEffect(() => {
                localStorage.setItem('vt_completed_alerts', JSON.stringify(completedAlerts));
            }, [completedAlerts]);

            // START: Đăng ký lắng nghe tình trạng Internet thay đổi và tự động đồng bộ
            useEffect(() => {
                const handleOnline = () => {
                    setIsOffline(false);
                    setShowOfflineBadge(true);
                    toast.success("Đã khôi phục kết nối mạng! Dữ liệu đang được đồng bộ tự động.", {
                        position: "top-center"
                    });
                    setTimeout(() => setShowOfflineBadge(false), 3000);
                };
                const handleOffline = () => {
                    setIsOffline(true);
                    setShowOfflineBadge(true);
                    toast.warning("Mất kết nối mạng! Ứng dụng chuyển sang chế độ ngoại tuyến.", {
                        position: "top-center"
                    });
                };

                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);

                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);
            // END: Đăng ký lắng nghe tình trạng Internet thay đổi

            // 1. Logic Khởi Tạo & Xác Thực Hệ Thống (Có tích hợp Offline Persistence)
            useEffect(() => {
                const init = async () => {
                    try {
                        const newApp = initializeApp(MANUAL_CONFIG);
                        setApp(newApp);
                        const auth = getAuth(newApp);
                        const db = getFirestore(newApp);
                        
                        // Kích hoạt tính năng Offline Persistence của Firebase (Yêu cầu 1)
                        try {
                            await enableIndexedDbPersistence(db);
                        } catch (err) {
                            if (err.code === 'failed-precondition') {
                                // Mở trên nhiều tab trình duyệt cùng lúc -> chỉ tab đầu tiên được bật persistence
                                console.warn("Firebase Offline Persistence failed-precondition: Chỉ cho phép lưu offline trên một tab.");
                            } else if (err.code === 'unimplemented') {
                                // Trình duyệt không hỗ trợ IndexedDB
                                console.warn("Firebase Offline Persistence unimplemented: Trình duyệt không hỗ trợ lưu offline.");
                            } else {
                                console.error("Firebase Offline Persistence Error:", err);
                            }
                        }

                        if ('Notification' in window && Notification.permission !== 'granted') {
                            Notification.requestPermission();
                        }

                        onAuthStateChanged(auth, async (u) => {
                            setUser(u);
                            if (u) {
                                // Tải chủ đề
                                const docSnap = await getDoc(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', u.uid, 'settings', 'theme'));
                                if (docSnap.exists()) {
                                    const loadedTheme = docSnap.data();
                                    setTheme(loadedTheme);
                                    localStorage.setItem('app_theme', JSON.stringify(loadedTheme));
                                }
                                
                                // Tải cấu hình bảo vệ
                                const lockSnap = await getDoc(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', u.uid, 'settings', 'lock'));
                                if (lockSnap.exists()) {
                                    const lockData = lockSnap.data();
                                    setLockPassword(lockData.appPassword || '');
                                    setLockEnabled(lockData.enableLock || false);
                                } else {
                                    const savedPassword = localStorage.getItem('vt_app_password') || '';
                                    const savedEnable = localStorage.getItem('vt_enable_lock') === 'true';
                                    setLockPassword(savedPassword);
                                    setLockEnabled(savedEnable);
                                }

                                checkDailyEvents(db, u.uid);
                            }
                            setLoading(false);
                        });
                        setConnectionError(false);
                    } catch (e) {
                        // Sửa logic xử lý lỗi kết nối mạng
                        // Nếu do mất mạng không khởi tạo được Firebase khi mở ứng dụng, ta vẫn cho phép chạy tiếp bằng LocalCache
                        console.warn("Lỗi kết nối khởi tạo hệ thống Google Firebase:", e);
                        setIsOffline(true);
                        setLoading(false);
                    }
                };
                init();
            }, []);

            // Cơ chế quét sự kiện và nhắc nhở công việc quá hạn
            const checkDailyEvents = async (db, uid) => {
                const alreadyNotifiedInSession = sessionStorage.getItem('vt_notified_session');
                if (alreadyNotifiedInSession === 'true') {
                    return; 
                }

                const today = new Date();
                const todayStr = today.toDateString();

                const eventsRef = collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', uid, 'events');
                const todosRef = collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', uid, 'todos');

                try {
                    const unsubEvents = onSnapshot(query(eventsRef), snapEvents => {
                        const allEvents = snapEvents.docs.map(d => ({ id: d.id, type: 'Sự kiện', ...d.data() }));
                        const unsubTodos = onSnapshot(query(todosRef), snapTodos => {
                            const allTodos = snapTodos.docs.map(d => ({ id: d.id, type: 'Công việc', ...d.data() }));

                            const combined = [...allEvents, ...allTodos];
                            const lunar = getLunarDetails(today);
                            const validAlerts = [];

                            combined.forEach(item => {
                                // Nếu công việc đã được đánh dấu hoàn thành, bỏ qua ngay lập tức
                                if (item.completed === true) return;

                                // Kiểm tra xem người dùng đã đóng cảnh báo này ở phiên làm việc trước chưa
                                const storageCompleted = localStorage.getItem('vt_completed_alerts');
                                if (storageCompleted) {
                                    const parsedObj = JSON.parse(storageCompleted);
                                    if (parsedObj[item.id] === true) {
                                        return; 
                                    }
                                }

                                let isToday = false;
                                let isOverdue = false;
                                let targetTime = null; 

                                const timeSource = item.date || item.deadlineTime || item.reminderTime;
                                if (timeSource) {
                                    targetTime = new Date(timeSource.seconds * 1000);
                                }

                                if (item.type === 'Sự kiện') {
                                    if (!item.repeat || item.repeat === 'none') {
                                        isToday = targetTime && targetTime.toDateString() === todayStr;
                                    } else if (item.repeat === 'lunar') {
                                        isToday = item.lunarDay === lunar.day && item.lunarMonth === lunar.month;
                                    } else if (item.repeat === 'solar' && targetTime) {
                                        isToday = targetTime.getDate() === today.getDate() && targetTime.getMonth() === today.getMonth();
                                    } else if (item.repeat === 'weekly' && targetTime) {
                                        isToday = targetTime.getDay() === today.getDay();
                                    } else if (item.repeat === 'monthly' && targetTime) {
                                        isToday = targetTime.getDate() === today.getDate();
                                    } else if (item.repeat === 'yearly' && targetTime) {
                                        isToday = targetTime.getDate() === today.getDate() && targetTime.getMonth() === today.getMonth();
                                    }
                                } else {
                                    // Đối với Công việc chưa hoàn thành: Hiển thị nếu là ngày hôm nay HOẶC đã quá hạn trong quá khứ
                                    isToday = targetTime && targetTime.toDateString() === todayStr;
                                    isOverdue = targetTime && targetTime < today && targetTime.toDateString() !== todayStr;
                                }

                                if (isToday || isOverdue) {
                                    // Chỉ áp dụng bộ lọc giờ đã qua đối với Sự kiện không lặp lại (để tránh báo sự kiện đã diễn ra sáng nay)
                                    // TUYỆT ĐỐI không áp dụng cho Công việc chưa hoàn thành
                                    if (item.type === 'Sự kiện' && (!item.repeat || item.repeat === 'none') && targetTime) {
                                        const itemHours = targetTime.getHours();
                                        const itemMinutes = targetTime.getMinutes();
                                        
                                        if (itemHours !== 0 || itemMinutes !== 0) {
                                            const currentHours = today.getHours();
                                            const currentMinutes = today.getMinutes();

                                            if (itemHours < currentHours || (itemHours === currentHours && itemMinutes < currentMinutes)) {
                                                return; 
                                            }
                                        }
                                    }

                                    // Định dạng nhãn thời gian hiển thị thông minh để người dùng biết mức độ trễ hạn
                                    let timeLabel = 'Cả ngày';
                                    if (targetTime) {
                                        if (isOverdue) {
                                            const daysDiff = Math.floor((today - targetTime) / (1000 * 60 * 60 * 24));
                                            timeLabel = daysDiff > 0 
                                                ? `Trễ ${daysDiff} ngày (${targetTime.toLocaleDateString('vi-VN', {day: '2-digit', month: '2-digit'})})`
                                                : `Quá hạn (${targetTime.toLocaleDateString('vi-VN', {day: '2-digit', month: '2-digit'})})`;
                                        } else if (targetTime.getHours() !== 0 || targetTime.getMinutes() !== 0) {
                                            timeLabel = targetTime.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                                        }
                                    }

                                    validAlerts.push({
                                        id: item.id,
                                        title: item.title || item.text || "Lịch hẹn chưa đặt tên",
                                        type: item.type,
                                        rawTime: timeSource, 
                                        time: timeLabel
                                    });
                                }
                            });

                            if (validAlerts.length > 0) {
                                setActiveAlerts(validAlerts);
                                setShowAlertModal(true);

                                validAlerts.forEach(alertItem => {
                                    sendNotification(`🔔 ${alertItem.type}: ${alertItem.title}`, `Thời gian: ${alertItem.time}`);
                                });
                            }

                            sessionStorage.setItem('vt_notified_session', 'true');
                            unsubEvents();
                            unsubTodos();
                        });
                    }, err => {
                        console.warn("onSnapshot events offline warning (sử dụng dữ liệu cached):", err);
                    });
                } catch (err) {
                    console.error("Lỗi quét dữ liệu thông báo:", err);
                }
            };

            const handleCheckAlertCompleted = (id) => {
                setCompletedAlerts(prev => {
                    const updated = { ...prev, [id]: true };
                    setActiveAlerts(curr => curr.filter(alert => alert.id !== id));
                    return updated;
                });
            };

            // Hàm kích hoạt chế độ chỉnh sửa Inline ngay trong dòng của Modal Cảnh báo
            const handleStartEditAlert = (alert) => {
                setEditingAlertId(alert.id);
                setEditAlertTitle(alert.title);
                
                const rawDate = alert.rawTime ? new Date(alert.rawTime.seconds * 1000) : new Date();
                
                if (alert.type === 'Sự kiện') {
                    const yyyy = rawDate.getFullYear();
                    const mm = String(rawDate.getMonth() + 1).padStart(2, '0');
                    const dd = String(rawDate.getDate()).padStart(2, '0');
                    setEditAlertTimeStr(`${yyyy}-${mm}-${dd}`);
                } else {
                    setEditAlertTimeStr(formatDateTimeForInput(rawDate));
                }
            };

            // Hàm lưu thông tin cập nhật lên Firebase và cập nhật ngay lập tức State
            const handleSaveAlertEdit = async (alert) => {
                if (!editAlertTitle.trim()) return;
                
                const db = getFirestore(app);
                const targetCollection = alert.type === 'Sự kiện' ? 'events' : 'todos';
                const docRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, targetCollection, alert.id);

                const newTimestamp = editAlertTimeStr ? Timestamp.fromDate(new Date(editAlertTimeStr)) : null;

                try {
                    if (alert.type === 'Sự kiện') {
                        const updateData = { title: editAlertTitle };
                        if (newTimestamp) updateData.date = newTimestamp;
                        await updateDoc(docRef, updateData);
                    } else {
                        const updateData = { text: editAlertTitle };
                        if (newTimestamp) {
                            updateData.deadlineTime = newTimestamp;
                        }
                        await updateDoc(docRef, updateData);
                    }

                    setActiveAlerts(curr => curr.map(item => {
                        if (item.id === alert.id) {
                            const updatedDate = newTimestamp ? new Date(newTimestamp.seconds * 1000) : new Date();
                            const displayTime = updatedDate && (updatedDate.getHours() !== 0 || updatedDate.getMinutes() !== 0)
                                ? updatedDate.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })
                                : 'Cả ngày';
                            
                            return {
                                ...item,
                                title: editAlertTitle,
                                rawTime: newTimestamp,
                                time: displayTime
                            };
                        }
                        return item;
                    }));

                    setEditingAlertId(null);
                    toast.info("Đã lưu dữ liệu tạm thời dưới máy khách.", { position: "top-center" });
                } catch (e) {
                    console.error("Lỗi cập nhật dữ liệu từ Modal cảnh báo:", e);
                }
            };

            const handleSaveTheme = async (newTheme) => {
                setTheme(newTheme);
                setShowSettings(false);
                try {
                    localStorage.setItem('app_theme', JSON.stringify(newTheme));
                } catch (e) {
                    console.error("Lỗi lưu local theme:", e);
                }
                if (user) await setDoc(doc(getFirestore(app), 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'theme'), newTheme);
            };

            const [tkbResetKey, setTkbResetKey] = useState(0);

            const handleTabChange = (tab) => {
                if (tab === 'day') {
                    setDailyDate(new Date()); 
                } else if (tab === 'calendar') {
                    setCalendarCurrentDate(new Date()); 
                    setCalendarSelectedDate(new Date()); 
                } else if (tab === 'timetable') {
                    // Luôn reset về tuần hôm nay khi bấm tab
                    setTkbResetKey(k => k + 1);
                }
                
                setUnlockedTabs({ todo: false, notes: false });
                setActiveTab(tab);
            };

            const handleUnlockTab = (tab) => {
                setUnlockedTabs(prev => ({ ...prev, [tab]: true }));
            };

            // State lưu mục tiêu điều hướng từ tìm kiếm: { tab, itemId, keyword }
            const [searchTarget, setSearchTarget] = useState(null);

            // Điều hướng đến kết quả tìm kiếm
            const handleSearchNavigate = (type, item, keyword) => {
                if (type === 'calendar' && item.date) {
                    const d = new Date(item.date.seconds * 1000);
                    setCalendarCurrentDate(new Date(d.getFullYear(), d.getMonth(), 1));
                    setCalendarSelectedDate(d);
                    setActiveTab('calendar');
                    setSearchTarget(null);
                } else if (type === 'todo') {
                    // Kiểm tra lock trước khi navigate
                    if (lockEnabled && lockPassword && !unlockedTabs.todo) {
                        setSearchTarget({ tab: 'todo', itemId: item.id, keyword, pendingLock: true });
                    } else {
                        setSearchTarget({ tab: 'todo', itemId: item.id, keyword });
                    }
                    setActiveTab('todo');
                } else if (type === 'notes') {
                    if (lockEnabled && lockPassword && !unlockedTabs.notes) {
                        setSearchTarget({ tab: 'notes', itemId: item.id, keyword, pendingLock: true });
                    } else {
                        setSearchTarget({ tab: 'notes', itemId: item.id, keyword });
                    }
                    setActiveTab('notes');
                } else if (type === 'timetable') {
                    setSearchTarget({ tab: 'timetable', itemId: item.id, weekDocId: item.weekDocId, keyword });
                    setActiveTab('timetable');
                } else {
                    setActiveTab(type);
                    setSearchTarget(null);
                }
            };

            // START: Thêm đoạn code đăng ký Service Worker chạy ngầm (Yêu cầu 3)
            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        navigator.serviceWorker.register('./sw.js')
                            .then(reg => console.log('Đăng ký Service Worker thành công:', reg.scope))
                            .catch(err => console.log('Lỗi đăng ký Service Worker:', err));
                    });
                }
            }, []);
            // END: Thêm đoạn code đăng ký Service Worker chạy ngầm

            if (loading) return <div className="h-screen flex items-center justify-center text-blue-500">Đang tải...</div>;
            if (!user) return <AuthScreen auth={getAuth(app)} appId={MANUAL_CONFIG.projectId} />;

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto shadow-2xl overflow-hidden relative transition-colors duration-300 animate-fade-in" style={{ backgroundColor: theme.bgColor, color: theme.textColor }}>
                    <div ref={headerRef}>
                    {/* KHU VỰC CHỈ BÁO OFFLINE MINI TẠI HEADER */}
                    {isOffline && (
                        <div className="bg-amber-500 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none animate-pulse">
                            <WifiOff size={10} /> Đang chạy ngoại tuyến (Offline Mode)
                        </div>
                    )}
                    {showOfflineBadge && !isOffline && (
                        <div className="bg-emerald-600 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none">
                            <Wifi size={10} /> Đã khôi phục kết nối trực tuyến (Online)
                        </div>
                    )}

                    <header className="bg-blue-600 text-white p-2 flex justify-between items-center shadow-md z-20 shrink-0">
                        <div className="flex items-center gap-2 shrink-0">
                            {/* Avatar người dùng */}
                            <button
                                onClick={() => avatarInputRef.current && avatarInputRef.current.click()}
                                className="relative shrink-0 w-9 h-9 rounded-full overflow-hidden border-2 border-blue-300 hover:border-white transition group"
                                title="Bấm để đổi ảnh đại diện"
                            >
                                {avatarUrl ? (
                                    <img src={avatarUrl} alt="Avatar" className="w-full h-full object-cover" />
                                ) : (
                                    <div className="w-full h-full bg-blue-500 flex items-center justify-center">
                                        <User size={18} className="text-blue-200 group-hover:text-white transition" />
                                    </div>
                                )}
                                <div className="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                                    <span className="text-[8px] text-white font-bold leading-tight text-center">Đổi<br/>ảnh</span>
                                </div>
                            </button>
                            <input
                                ref={avatarInputRef}
                                type="file"
                                accept="image/*"
                                className="hidden"
                                onChange={handleAvatarChange}
                            />
                            <div className="flex flex-col overflow-hidden">
                                <h1 className="text-base font-bold whitespace-nowrap truncate font-sans leading-tight">Lịch đa năng</h1>
                                <span className="text-[10px] text-blue-100 opacity-80 font-sans">Thiết kế bởi Văn Trung</span>
                            </div>
                        </div>
                        {/* Thanh tìm kiếm toàn cục mini */}
                        <button
                            onClick={() => setShowSearch(true)}
                            className="flex-1 mx-3 flex items-center gap-2 bg-blue-500/50 hover:bg-blue-500/80 border border-blue-400/50 rounded-full px-3 py-1.5 transition min-w-0 max-w-[160px]"
                            title="Tìm kiếm toàn cục"
                        >
                            <Search size={14} className="text-blue-200 shrink-0" />
                            <span className="text-[11px] text-blue-200 truncate font-sans">Tìm kiếm...</span>
                        </button>
                        <div className="flex gap-2 items-center shrink-0">
                            <button onClick={() => setShowSettings(true)} className="p-1.5 hover:bg-blue-700 rounded-full transition"><Settings size={18} /></button>
                        </div>
                    </header>
                    </div>

                    <main className="flex-1 overflow-y-auto relative flex flex-col" style={{ backgroundColor: theme.bgColor }}>
                        {/* Tab Lịch ngày */}
                        <div style={{ display: activeTab === 'day' ? 'flex' : 'none', flex: 1, flexDirection: 'column' }}>
                            <DailyView 
                                user={user} 
                                db={getFirestore(app)} 
                                appId={MANUAL_CONFIG.projectId} 
                                today={dailyDate} 
                                setToday={setDailyDate} 
                            />
                        </div>

                        {/* Tab Lịch tháng */}
                        <div style={{ display: activeTab === 'calendar' ? 'block' : 'none' }}>
                            <CalendarView 
                                user={user} 
                                db={getFirestore(app)} 
                                appId={MANUAL_CONFIG.projectId} 
                                currentDate={calendarCurrentDate} 
                                setCurrentDate={setCalendarCurrentDate} 
                                selectedDate={calendarSelectedDate} 
                                setSelectedDate={setCalendarSelectedDate}
                                onTabChange={handleTabChange}
                                theme={theme}
                            />
                        </div>

                        {/* Tab Việc cần làm */}
                        <div style={{ display: activeTab === 'todo' ? 'block' : 'none', height: '100%' }}>
                            {lockEnabled && lockPassword && !unlockedTabs.todo ? (
                                <LockScreen correctPassword={lockPassword} onUnlock={() => {
                                    handleUnlockTab('todo');
                                    // Sau khi mở khóa, nếu có searchTarget đang chờ thì kích hoạt
                                    if (searchTarget?.pendingLock && searchTarget?.tab === 'todo') {
                                        setSearchTarget(prev => ({ ...prev, pendingLock: false }));
                                    }
                                }} />
                            ) : (
                                <TodoView user={user} db={getFirestore(app)} appId={MANUAL_CONFIG.projectId} theme={theme} searchTarget={searchTarget} onSearchTargetClear={() => setSearchTarget(null)} />
                            )}
                        </div>

                        {/* Tab Ghi chú */}
                        <div style={{ display: activeTab === 'notes' ? 'block' : 'none', height: '100%' }}>
                            {lockEnabled && lockPassword && !unlockedTabs.notes ? (
                                <LockScreen correctPassword={lockPassword} onUnlock={() => {
                                    handleUnlockTab('notes');
                                    if (searchTarget?.pendingLock && searchTarget?.tab === 'notes') {
                                        setSearchTarget(prev => ({ ...prev, pendingLock: false }));
                                    }
                                }} />
                            ) : (
                                <NotesView user={user} db={getFirestore(app)} appId={MANUAL_CONFIG.projectId} theme={theme} searchTarget={searchTarget} onSearchTargetClear={() => setSearchTarget(null)} />
                            )}
                        </div>

                        {/* Tab Thời khóa biểu */}
                        <div style={{ display: activeTab === 'timetable' ? 'flex' : 'none', flex: 1, flexDirection: 'column' }}>
                            <TimeTableView key={tkbResetKey} user={user} db={getFirestore(app)} appId={MANUAL_CONFIG.projectId} theme={theme} searchTarget={searchTarget} onSearchTargetClear={() => setSearchTarget(null)} />
                        </div>
                    </main>

                    <nav className="w-full bg-white border-t flex justify-around py-3 shadow-lg z-20 relative shrink-0">
                        <button onClick={()=>handleTabChange('day')} className={activeTab==='day'?'text-blue-600 font-semibold':'text-gray-400'}>
                            <div className="flex flex-col items-center"><CalendarDays size={22}/><span className="text-[9px] mt-1 text-slate-500 font-sans">Hôm Nay</span></div>
                        </button>
                        <button onClick={()=>handleTabChange('calendar')} className={activeTab==='calendar'?'text-blue-600 font-semibold':'text-gray-400'}>
                            <div className="flex flex-col items-center"><Calendar size={22}/><span className="text-[9px] mt-1 text-slate-500 font-sans">Lịch</span></div>
                        </button>
                        <button onClick={()=>handleTabChange('todo')} className={activeTab==='todo'?'text-blue-600 font-semibold':'text-gray-400'}>
                            <div className="flex flex-col items-center"><CheckSquare size={22}/><span className="text-[9px] mt-1 text-slate-500 font-sans">Việc làm</span></div>
                        </button>
                        <button onClick={()=>handleTabChange('notes')} className={activeTab==='notes'?'text-blue-600 font-semibold':'text-gray-400'}>
                            <div className="flex flex-col items-center"><StickyNote size={22}/><span className="text-[9px] mt-1 text-slate-500 font-sans">Ghi chú</span></div>
                        </button>
                        
                        <div className="relative">
                            <button onClick={()=>setShowMenu(!showMenu)} className={`text-gray-400 ${showMenu ? 'text-blue-600' : ''}`}><div className="flex flex-col items-center"><MoreVertical size={22}/><span className="text-[9px] mt-1 text-slate-500 font-sans">Thêm</span></div></button>
                            {showMenu && (
                                <div className="absolute bottom-12 right-0 bg-white shadow-xl rounded-lg border w-40 overflow-hidden fade-in z-50">
                                    <button onClick={()=>{handleTabChange('timetable'); setShowMenu(false);}} className="flex items-center gap-2 w-full px-4 py-3 hover:bg-gray-50 text-sm text-gray-700 text-left font-sans">
                                        <Table size={16}/> Lịch biểu
                                    </button>
                                </div>
                            )}
                        </div>
                    </nav>

                    {showSettings && <SettingsModal theme={theme} onSave={handleSaveTheme} onClose={()=>setShowSettings(false)} auth={getAuth(app)} db={getFirestore(app)} appId={MANUAL_CONFIG.projectId} onSignOut={() => { setShowSettings(false); signOut(getAuth(app)); }} />}
                    
                    {showSearch && app && user && (
                        <GlobalSearchModal
                            onClose={() => setShowSearch(false)}
                            db={getFirestore(app)}
                            user={user}
                            appId={MANUAL_CONFIG.projectId}
                            onNavigate={handleSearchNavigate}
                            headerRef={headerRef}
                        />
                    )}
                    
                    {/* HỘP THOẠI NỔI BÁO LỊCH KHI MỞ APP */}
                    {showAlertModal && activeAlerts.length > 0 && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                                <div className="bg-blue-600 p-4 text-white flex items-center gap-3 shrink-0 font-sans">
                                    <Bell className="animate-bounce" size={24} />
                                    <div className="min-w-0 flex-1">
                                        <h3 className="font-bold text-base leading-tight">Lịch trình hôm nay</h3>
                                        <p className="text-[10px] opacity-80 font-medium text-slate-100">Bấm bút chì để sửa nhanh nội dung</p>
                                    </div>
                                </div>
                                <div className="p-5 max-h-[50vh] overflow-y-auto space-y-3 no-scrollbar bg-slate-50 font-sans">
                                    {activeAlerts.map((alert, index) => {
                                        const isEditingThis = editingAlertId === alert.id;
                                        return (
                                            <div key={alert.id || index} className="flex flex-col gap-2 bg-white p-3.5 rounded-xl border border-slate-100 shadow-sm">
                                                {isEditingThis ? (
                                                    <div className="flex flex-col gap-2 animate-in fade-in duration-200">
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-[9px] font-black uppercase tracking-wider px-1.5 py-0.5 rounded bg-blue-50 text-blue-600 border border-blue-100 shrink-0">{alert.type}</span>
                                                            <span className="text-[10px] text-slate-400 font-bold">Chỉnh sửa</span>
                                                        </div>
                                                        <input 
                                                            type="text"
                                                            value={editAlertTitle}
                                                            onChange={(ev) => setEditAlertTitle(ev.target.value)}
                                                            className="w-full px-2.5 py-1.5 border border-slate-200 rounded-lg text-sm text-slate-800 focus:ring-1 focus:ring-blue-500 outline-none font-bold"
                                                            placeholder="Nhập tên mới..."
                                                        />
                                                        <div className="flex items-center gap-2">
                                                            {alert.type === 'Sự kiện' ? (
                                                                <input 
                                                                    type="date"
                                                                    value={editAlertTimeStr}
                                                                    onChange={(ev) => setEditAlertTimeStr(ev.target.value)}
                                                                    className="flex-1 px-2.5 py-1.5 border border-slate-200 rounded-lg text-xs text-slate-800 focus:ring-1 focus:ring-blue-500 outline-none"
                                                                />
                                                            ) : (
                                                                <input 
                                                                    type="datetime-local"
                                                                    value={editAlertTimeStr}
                                                                    onChange={(ev) => setEditAlertTimeStr(ev.target.value)}
                                                                    className="flex-1 px-2.5 py-1.5 border border-slate-200 rounded-lg text-xs text-slate-800 focus:ring-1 focus:ring-blue-500 outline-none font-sans"
                                                                />
                                                            )}
                                                            <div className="flex items-center gap-1 shrink-0">
                                                                <button 
                                                                    onClick={() => setEditingAlertId(null)}
                                                                    className="p-1.5 hover:bg-slate-100 text-slate-400 hover:text-slate-600 rounded-lg transition"
                                                                    title="Hủy"
                                                                >
                                                                    <X size={16} />
                                                                </button>
                                                                <button 
                                                                    onClick={() => handleSaveAlertEdit(alert)}
                                                                    className="p-1.5 bg-green-50 text-green-600 hover:bg-green-100 rounded-lg transition"
                                                                    title="Lưu thay đổi"
                                                                >
                                                                    <Check size={16} strokeWidth={2.5} />
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="flex items-start gap-3 transition-all">
                                                        <button 
                                                            onClick={() => handleCheckAlertCompleted(alert.id)}
                                                            className="w-5 h-5 rounded border border-slate-300 hover:border-green-500 bg-white flex items-center justify-center text-green-600 mt-1 shrink-0 transition"
                                                            title="Tích để hoàn thành"
                                                        >
                                                            <div className="w-2.5 h-2.5 rounded bg-transparent group-hover:bg-green-100 transition-colors"></div>
                                                        </button>
                                                        
                                                        <div className="flex-1 min-w-0">
                                                            <div className="flex items-center gap-2 mb-1">
                                                                <span className="text-[9px] font-black uppercase tracking-wider px-1.5 py-0.5 rounded bg-blue-50 text-blue-600 border border-blue-100 shrink-0">{alert.type}</span>
                                                                <p className="text-[10px] text-slate-400 font-medium flex items-center gap-1"><Clock size={11} /> {alert.time}</p>
                                                            </div>
                                                            <p className="font-bold text-slate-800 text-sm truncate">{alert.title}</p>
                                                        </div>

                                                        <button 
                                                            onClick={() => handleStartEditAlert(alert)}
                                                            className="p-1.5 hover:bg-slate-100 text-slate-400 hover:text-blue-600 rounded-lg transition shrink-0 self-center"
                                                            title="Sửa"
                                                        >
                                                            <Pencil size={14} />
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="p-4 border-t bg-slate-50 flex justify-end shrink-0">
                                    <button 
                                        onClick={() => setShowAlertModal(false)}
                                        className="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs py-2.5 px-6 rounded-xl shadow-md transition-all active:scale-95 font-sans"
                                    >
                                        Đã hiểu
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* SỬA LỖI UI KẾT NỐI (Yêu cầu 2): Chỉ hiển thị Modal cảnh báo lỗi kết nối khi thật sự không thể tải dữ liệu và cho phép đóng để tiếp tục dùng Offline */}
                    {connectionError && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white p-6 rounded-lg shadow-xl text-center max-w-xs w-full">
                                <WifiOff size={48} className="text-red-500 mx-auto mb-2" />
                                <h3 className="font-bold text-slate-800 text-base font-sans">Lỗi kết nối Firebase</h3>
                                <p className="text-xs text-gray-500 mb-4 font-sans">Chúng tôi tạm thời không kết nối được với dữ liệu đám mây. Bạn vẫn có thể tiếp tục sử dụng ứng dụng ở chế độ Offline.</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setConnectionError(false)} className="flex-1 bg-gray-200 hover:bg-gray-300 text-slate-700 py-2 rounded-xl text-xs font-bold transition font-sans">Bỏ qua (Chạy Offline)</button>
                                    <button onClick={() => window.location.reload()} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-xs font-bold transition font-sans">Thử lại</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* START: Thêm cổng hiển thị động Toast Container ở cuối cấu phần App */}
                    <ToastContainer 
                        position="top-center"
                        autoClose={3000}
                        hideProgressBar={false}
                        newestOnTop={false}
                        closeOnClick
                        rtl={false}
                    />
                    {/* END: Thêm cổng hiển thị động Toast Container ở cuối cấu phần App */}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
