        // ==============================================================
        // COMPONENT: LOCK SCREEN với giới hạn số lần thử sai (khóa tăng dần)
        // ==============================================================
        const LockScreen = ({ onUnlock, correctPassword, lockKey, db, appId, user }) => {
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');
            const [attempts, setAttempts] = useState(0);
            const [lockedUntil, setLockedUntil] = useState(null);
            const [remaining, setRemaining] = useState(0);
            const [loading, setLoading] = useState(true);
            const [actionDisabled, setActionDisabled] = useState(false);

            // Đọc trạng thái khóa từ Firestore
            useEffect(() => {
                if (!user) return;
                const attemptsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'attempts');
                const fetchAttempts = async () => {
                    try {
                        const snap = await getDoc(attemptsRef);
                        if (snap.exists()) {
                            const data = snap.data();
                            setAttempts(data.attempts || 0);
                            if (data.lockedUntil && data.lockedUntil.toMillis) {
                                const lockTime = data.lockedUntil.toMillis();
                                if (lockTime > Date.now()) {
                                    setLockedUntil(lockTime);
                                } else {
                                    // Quá hạn, reset
                                    await setDoc(attemptsRef, { attempts: 0, lockedUntil: null }, { merge: true });
                                    setAttempts(0);
                                    setLockedUntil(null);
                                }
                            }
                        } else {
                            // Chưa có document, tạo mới
                            await setDoc(attemptsRef, { attempts: 0, lockedUntil: null });
                        }
                        setLoading(false);
                    } catch (e) {
                        console.warn('Lỗi đọc attempts:', e);
                        setLoading(false);
                    }
                };
                fetchAttempts();
            }, [db, appId, user]);

            // Timer đếm ngược khi bị khóa
            useEffect(() => {
                if (!lockedUntil) return;
                const interval = setInterval(() => {
                    const now = Date.now();
                    if (now >= lockedUntil) {
                        setLockedUntil(null);
                        setAttempts(0);
                        // Reset trên Firestore
                        const attemptsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'attempts');
                        setDoc(attemptsRef, { attempts: 0, lockedUntil: null }, { merge: true }).catch(console.warn);
                        clearInterval(interval);
                        setRemaining(0);
                    } else {
                        setRemaining(Math.ceil((lockedUntil - now) / 1000));
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [lockedUntil, db, appId, user]);

            const handleUnlockSubmit = async (e) => {
                e.preventDefault();
                if (actionDisabled) return;
                setError('');

                if (lockedUntil) {
                    setError(`Tạm khóa ${remaining}s. Vui lòng chờ.`);
                    return;
                }

                const isMatch = await verifyPasswordWithSalt(pin, correctPassword);
                const attemptsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'attempts');

                if (isMatch) {
                    // Thành công: reset attempts
                    await setDoc(attemptsRef, { attempts: 0, lockedUntil: null }, { merge: true });
                    setAttempts(0);
                    setPin('');
                    onUnlock();
                    return;
                }

                // Sai: tăng attempts
                const newAttempts = attempts + 1;
                setAttempts(newAttempts);

                // Xác định thời gian khóa dựa trên số lần thử sai (tăng dần)
                let lockDuration = 0;
                const level = Math.floor((newAttempts - 1) / 5); // mỗi 5 lần lại tăng mức
                switch (level) {
                    case 0: lockDuration = 30; break;      // 30s
                    case 1: lockDuration = 120; break;     // 2 phút
                    case 2: lockDuration = 300; break;     // 5 phút
                    case 3: lockDuration = 1800; break;    // 30 phút
                    case 4: lockDuration = 7200; break;    // 2 giờ
                    default: lockDuration = 14400; break;  // 4 giờ (tối đa)
                }

                if (newAttempts >= 5) {
                    const lockUntil = Date.now() + lockDuration * 1000;
                    setLockedUntil(lockUntil);
                    await setDoc(attemptsRef, { attempts: newAttempts, lockedUntil: Timestamp.fromMillis(lockUntil) }, { merge: true });
                    setError(`Sai quá 5 lần. Tạm khóa ${lockDuration}s.`);
                    setPin('');
                    return;
                }

                await setDoc(attemptsRef, { attempts: newAttempts, lockedUntil: null }, { merge: true });
                setError(`Sai mã PIN. Còn ${5 - newAttempts} lần thử.`);
                setPin('');
            };

            if (loading) {
                return <div className="flex flex-col flex-1 items-center justify-center p-6 bg-slate-50"><p className="text-slate-400 text-sm">Đang tải...</p></div>;
            }

            return (
                <div className="flex flex-col flex-1 items-center justify-center p-6 bg-slate-50 font-sans">
                    <div className="w-full max-w-xs text-center space-y-6">
                        <div className="mx-auto bg-blue-100 text-blue-600 p-4 rounded-full w-16 h-16 flex items-center justify-center">
                            <Lock size={28} />
                        </div>
                        <div>
                            <h3 className="text-lg font-bold text-slate-800">Khu vực bảo mật</h3>
                            <p className="text-xs text-slate-400 mt-1">Vui lòng cung cấp mã PIN để xem dữ liệu</p>
                            {lockedUntil && <p className="text-xs text-red-500 mt-1 font-bold">Khóa tạm {remaining}s</p>}
                        </div>
                        <form onSubmit={handleUnlockSubmit} className="space-y-4">
                            <input 
                                type="password" 
                                required
                                value={pin}
                                onChange={e => setPin(e.target.value)}
                                placeholder="Nhập mã bảo vệ..." 
                                className="w-full px-4 py-3 border border-slate-200 text-center rounded-xl text-lg font-bold tracking-widest text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none bg-white shadow-sm"
                                disabled={!!lockedUntil}
                            />
                            {error && <p className="text-red-500 text-xs text-center font-medium">{error}</p>}
                            <button 
                                type="submit" 
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition"
                                disabled={!!lockedUntil}
                            >
                                Xác nhận mở khóa
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- CÁC COMPONENT CON ---
        const SettingsModal = ({ theme, onSave, onClose, auth, db, appId, onSignOut, user }) => {
            const [localTheme, setLocalTheme] = useState(theme);
            const [newPassword, setNewPassword] = useState('');
            const [oldPassword, setOldPassword] = useState('');
            const [passwordMessage, setPasswordMessage] = useState('');
            const [passwordError, setPasswordError] = useState('');
            const [showChangePassword, setShowChangePassword] = useState(false);

            // Bổ sung thiết lập mật khẩu PIN ứng dụng
            const [appPasswordHash, setAppPasswordHash] = useState('');
            const [enableLock, setEnableLock] = useState(false);
            const [lockError, setLockError] = useState('');
            const [lockSuccess, setLockSuccess] = useState('');
            const [showVault, setShowVault] = useState(false);

            // Đổi / Quên mật khẩu cho khóa Ghi chú & Việc cần làm
            const [lockUiMode, setLockUiMode] = useState('view'); // 'view' | 'change' | 'forgot-verify' | 'forgot-reset'
            const [curLockPin, setCurLockPin] = useState('');
            const [newLockPin, setNewLockPin] = useState('');
            const [newLockPin2, setNewLockPin2] = useState('');
            const [lockChangeError, setLockChangeError] = useState('');
            const [lockChangeSuccess, setLockChangeSuccess] = useState('');
            const [lockAccountPassword, setLockAccountPassword] = useState('');
            const [lockForgotError, setLockForgotError] = useState('');
            const [lockResetPin, setLockResetPin] = useState('');
            const [lockResetPin2, setLockResetPin2] = useState('');

            // State cho thiết lập mật khẩu lần đầu
            const [setupNewPassword, setSetupNewPassword] = useState('');
            const [setupConfirmPassword, setSetupConfirmPassword] = useState('');
            const [setupError, setSetupError] = useState('');

            // State cho popup Export/Import dữ liệu
            const [showExportModal, setShowExportModal] = useState(false);
            const [showImportModal, setShowImportModal] = useState(false);

            // Dark mode toggle
            const handleToggleDarkMode = () => {
                setLocalTheme(prev => ({
                    ...prev,
                    darkMode: !prev.darkMode
                }));
            };

            // Tải cấu hình mật khẩu bảo mật hiện tại từ Firestore (không lấy từ localStorage)
            useEffect(() => {
                if (!auth.currentUser) return;
                const loadLockConfig = async () => {
                    try {
                        const settingsRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'lock');
                        const docSnap = await getDoc(settingsRef);
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setAppPasswordHash(data.appPasswordHash || '');
                            setEnableLock(data.enableLock || false);
                        } else {
                            setAppPasswordHash('');
                            setEnableLock(false);
                        }
                        // Cập nhật sessionStorage với trạng thái bật khóa
                        sessionStorage.setItem('vt_enable_lock', String(enableLock));
                    } catch (e) {
                        console.error("Lỗi tải thông tin khóa:", e);
                    }
                };
                loadLockConfig();
            }, [auth.currentUser, enableLock]);

            // Lưu cài đặt khóa (không lưu hash vào localStorage)
            const saveLockSettings = async (nextEnable, plainPassword) => {
                setLockError('');
                setLockSuccess('');
                try {
                    const settingsRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'lock');
                    let nextHash = appPasswordHash; // giữ nguyên nếu không có password mới
                    if (plainPassword && plainPassword.trim()) {
                        nextHash = await createPasswordHash(plainPassword.trim());
                    }
                    const payload = {
                        appPasswordHash: nextHash,
                        enableLock: nextEnable
                    };
                    await setDoc(settingsRef, payload, { merge: true });
                    // Không lưu hash vào localStorage
                    sessionStorage.setItem('vt_enable_lock', nextEnable ? 'true' : 'false');
                    setAppPasswordHash(nextHash);
                    setLockSuccess("Đã cập nhật tính năng bảo vệ thành công!");
                } catch (err) {
                    setLockError("Lỗi lưu cấu hình bảo vệ: " + err.message);
                }
            };

            // Xử lý khi bật/tắt công tắc
            const handleToggleLock = async (val) => {
                setEnableLock(val);
                if (val && appPasswordHash) {
                    // Bật và đã có mật khẩu -> cập nhật enableLock
                    await saveLockSettings(true, null);
                } else if (!val) {
                    // Tắt
                    await saveLockSettings(false, null);
                }
                // Nếu bật mà chưa có mật khẩu thì chỉ set state, form setup sẽ hiện
            };

            // Thiết lập mật khẩu lần đầu
            const handleSetupLock = async () => {
                setSetupError('');
                if (!setupNewPassword.trim()) {
                    setSetupError('Vui lòng nhập mã PIN.');
                    return;
                }
                if (setupNewPassword !== setupConfirmPassword) {
                    setSetupError('Mã PIN xác nhận không khớp.');
                    return;
                }
                // Lưu mật khẩu và bật khóa
                await saveLockSettings(true, setupNewPassword);
                setSetupNewPassword('');
                setSetupConfirmPassword('');
                setLockSuccess('Đã thiết lập mã PIN bảo mật!');
                setLockUiMode('view'); // quay về chế độ xem
            };

            // Đổi mật khẩu (khi đã có hash)
            const handleLockChangePassword = async (e) => {
                e.preventDefault();
                setLockChangeError(''); setLockChangeSuccess('');
                const isMatch = await verifyPasswordWithSalt(curLockPin, appPasswordHash);
                if (!isMatch) { setLockChangeError("Mã PIN hiện tại không đúng."); return; }
                if (!newLockPin.trim()) { setLockChangeError("Vui lòng nhập mã PIN mới."); return; }
                if (newLockPin !== newLockPin2) { setLockChangeError("Mã PIN mới nhập lại không khớp."); return; }
                await saveLockSettings(true, newLockPin.trim());
                setLockChangeSuccess("Đã đổi mã PIN bảo mật!");
                setCurLockPin(''); setNewLockPin(''); setNewLockPin2('');
                setTimeout(() => setLockUiMode('view'), 1200);
            };

            // Quên mật khẩu: xác thực tài khoản
            const handleLockForgotVerify = async (e) => {
                e.preventDefault();
                setLockForgotError('');
                if (!auth.currentUser?.email) { setLockForgotError("Không tìm thấy email tài khoản."); return; }
                try {
                    await signInWithEmailAndPassword(auth, auth.currentUser.email, lockAccountPassword);
                    setLockAccountPassword('');
                    setLockUiMode('forgot-reset');
                } catch (err) {
                    setLockForgotError("Sai mật khẩu tài khoản. Vui lòng thử lại.");
                }
            };

            // Quên mật khẩu: đặt lại (có tự động backup)
            const handleLockForgotReset = async (e) => {
                e.preventDefault();
                setLockForgotError('');
                if (!lockResetPin.trim()) { setLockForgotError("Vui lòng nhập mã PIN mới."); return; }
                if (lockResetPin !== lockResetPin2) { setLockForgotError("Mã PIN nhập lại không khớp."); return; }
                
                // Tự động backup trước khi reset
                try {
                    // Lấy dữ liệu Vault (nếu có) và xuất ra file
                    const vaultRef = collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'vault');
                    const snap = await getDocs(vaultRef);
                    if (!snap.empty) {
                        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');

                        a.download = `vault_backup_before_reset_${new Date().toISOString().slice(0,10)}.json`;

                setLockResetPin(''); setLockResetPin2('');
                setLockUiMode('view');
            };

            // Tính năng Đổi mật khẩu tài khoản
            const handleChangePassword = async (e) => {
                e.preventDefault();
                setPasswordMessage('');
                setPasswordError('');
                if (!oldPassword.trim()) {
                    setPasswordError("Vui lòng nhập mật khẩu cũ.");
                    return;
                }
                if (!newPassword.trim()) {
                    setPasswordError("Vui lòng nhập mật khẩu mới.");
                    return;
                }
                try {
                    if (auth.currentUser) {
                        const credential = EmailAuthProvider.credential(auth.currentUser.email, oldPassword);
                        await reauthenticateWithCredential(auth.currentUser, credential);
                        await updatePassword(auth.currentUser, newPassword);
                        setPasswordMessage("Đổi mật khẩu thành công!");
                        setOldPassword('');
                        setNewPassword('');
                        // Nhắc người dùng: mật khẩu tài khoản dùng để xác thực khi "Quên mật khẩu Kho bảo mật",

                        setTimeout(() => {

                                toast.info("Vui lòng vào Kho bảo mật > Đổi mật khẩu để cập nhật thông tin khôi phục.", { position: "top-center" });
                            }
                        }, 300);
                    } else {
                        setPasswordError("Không tìm thấy thông tin phiên đăng nhập.");
                    }
                } catch (err) {
                    if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                        setPasswordError("Mật khẩu cũ không đúng.");
                    } else if (err.code === 'auth/requires-recent-login') {
                        setPasswordError("⚠️ Hãy Đăng xuất và Đăng nhập lại để xác thực danh tính trước khi đổi mật khẩu.");
                    } else {
                        setPasswordError("Lỗi: " + err.message);
                    }
                }
            };

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">

        const TimeTableView = ({ user, db, appId, theme, searchTarget, onSearchTargetClear, activeTab }) => {
            // ── STATE ───────────────────────────────────────────────────────────
            const [schedule, setSchedule]         = useState({});
            const [headers, setHeaders]           = useState({ col1: 'Môn - Lớp', col2: 'Ghi chú' });
            const [highlightKey, setHighlightKey] = useState(null);
            const [showYearDrop, setShowYearDrop] = useState(false);
            const [showWeekDrop, setShowWeekDrop] = useState(false);
            const [yearInput, setYearInput]       = useState('');
            const [weekInput, setWeekInput]       = useState('');
            // yearList: [{ id, name, anchorWeekKey }]
            // weekList: [{ id, name, yearId, offset }]  offset=0,1,2... từ anchor
            const [yearList, setYearList] = useState([]);
            const [weekList, setWeekList] = useState([]);
            const [activeYearId, setActiveYearId] = useState(null);

            // ── TUẦN HIỆN HÀNH ──────────────────────────────────────────────────
            const getCurrentMonday = () => {
                const now = new Date();
                const day = now.getDay();
                const diff = now.getDate() - day + (day === 0 ? -6 : 1);
                const mon = new Date(now); mon.setDate(diff); mon.setHours(0,0,0,0);
                return mon;
            };
            const [startOfWeekDate, setStartOfWeekDate] = useState(getCurrentMonday);
            const periods = [1,2,3,4,5];

            // ── HELPERS ─────────────────────────────────────────────────────────
            const getWeekKey = (date) => {
                const t = new Date(date.valueOf());
                const dayNr = (date.getDay() + 6) % 7;
                t.setDate(t.getDate() - dayNr + 3);
                const ft = t.valueOf();
                t.setMonth(0, 1);
                if (t.getDay() !== 4) t.setMonth(0, 1 + ((4 - t.getDay()) + 7) % 7);
                const weekNum = 1 + Math.ceil((ft - t) / 604800000);
                const y = new Date(date.valueOf()); y.setDate(date.getDate() - dayNr + 3);
                return { yyyy: y.getFullYear(), weekNum, key: y.getFullYear() + '_w' + weekNum };
            };
            const getMondayFromWeek = (year, wn) => {
                const jan4 = new Date(year, 0, 4);
                const j4d = (jan4.getDay() + 6) % 7;
                const w1 = new Date(jan4); w1.setDate(jan4.getDate() - j4d);
                const m = new Date(w1); m.setDate(w1.getDate() + (wn - 1) * 7);
                m.setHours(0,0,0,0); return m;
            };
            const getMondayFromAnchorOffset = (anchorWeekKey, offset) => {

Chỉ trả về JSON THUẦN TÚY (không markdown, không giải thích, không code block), đúng định dạng:

            // tất cả mọi người) nên KHÔNG dùng nữa.
            const FALLBACK_GEMINI_MODELS = ['gemini-2.5-flash-lite', 'gemini-2.5-flash', 'gemini-2.0-flash'];
            const MODEL_CACHE_KEY = 'vt_gemini_models_cache_v1';
            const MODEL_CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 24h

            const sleep = (ms) => new Promise(r => setTimeout(r, ms));

            // GIẢI PHÁP CHO YÊU CẦU 2: khi TẤT CẢ model trong danh sách cứng ở trên đều báo lỗi
            // "model not found / deprecated" (Google đã khai tử), hàm này gọi thẳng API
            // ListModels của Google để lấy danh sách model gemini-* còn hỗ trợ generateContent +
            // ảnh (vision) ngay tại thời điểm chạy, rồi thử lại với model mới nhất tìm được.
            // Nhờ vậy ứng dụng tự thích nghi khi Google đổi tên/thế hệ model mà KHÔNG cần sửa code.
            const discoverAvailableGeminiModels = async (apiKey) => {
                try {
                    const cachedRaw = localStorage.getItem(MODEL_CACHE_KEY);
                    if (cachedRaw) {
                        const cached = JSON.parse(cachedRaw);
                        if (cached && Date.now() - cached.ts < MODEL_CACHE_TTL_MS && Array.isArray(cached.models) && cached.models.length) {
                            return cached.models;
                        }
                    }
                } catch (e) {}

                const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models?key=' + apiKey);
                if (!res.ok) throw new Error('Không lấy được danh sách model từ Google.');
                const data = await res.json();
                const list = (data.models || [])
                    .filter(m => m.name && m.supportedGenerationMethods?.includes('generateContent'))
                    .map(m => m.name.replace(/^models\//, ''))
                    .filter(name => /gemini/i.test(name) && !/embedding|aqa|imagen|tts|vision-only/i.test(name));

                // Ưu tiên bản "flash-lite" / "flash" (rẻ, nhanh, đủ cho việc đọc bảng) trước "pro"
                const rank = (name) => (/flash-lite/i.test(name) ? 0 : /flash/i.test(name) ? 1 : /pro/i.test(name) ? 2 : 3);
                list.sort((a, b) => rank(a) - rank(b));

                try { localStorage.setItem(MODEL_CACHE_KEY, JSON.stringify({ ts: Date.now(), models: list })); } catch (e) {}
                return list;

            const callGeminiSingleModel = async (bodyObj, apiKey, model) => {

                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(bodyObj)
                });
                if (!res.ok) {
                    let status = res.status, errMsg = 'Lỗi API ' + status;
                    try { const e = await res.json(); errMsg = e.error?.message || errMsg; } catch(e2) {}
                    const err = new Error(errMsg);
                    err.status = status;
                    throw err;
                }
                return res.json();
            };

            const tryModelList = async (models, bodyObj, apiKey) => {
                let lastErr = null;
                for (let i = 0; i < models.length; i++) {
                    const model = models[i];
                    for (let attempt = 0; attempt < 2; attempt++) {
                        try {
                            const data = await callGeminiSingleModel(bodyObj, apiKey, model);
                            const text = (data.candidates?.[0]?.content?.parts?.[0]?.text) || '';
                            const cleaned = text.replace(/```json/g,'').replace(/```/g,'').trim();
                            const m = cleaned.match(/\{[\s\S]*\}/);
                            if (!m) throw new Error('AI không trả về JSON hợp lệ. Thử lại hoặc chụp ảnh rõ hơn.');
                            try { return JSON.parse(m[0]); }
                            catch(e) { throw new Error('Không đọc được kết quả AI. Thử lại.'); }
                        } catch (e) {
                            lastErr = e;
                            if (e.status === 429 && attempt === 0) { await sleep(4000); continue; }
                            break;
                        }

                throw lastErr || new Error('Không thể kết nối tới Gemini AI. Thử lại sau.');

                        [1, '', '', '', '', '', ''],
                        [2, '', '', '', '', '', ''],
                        [3, '', '', '', '', '', ''],
                        [4, '', '', '', '', '', ''],
                        [5, '', '', '', '', '', ''],
                    ];
                    const ws = XLSX.utils.aoa_to_sheet(data);
                    XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
                    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                    const blob = new Blob([wbout], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'mau_thoi_khoa_bieu.xlsx';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);

            const handleImportFileChange = async (e) => {
                const f = e.target.files[0]; if (!f) return;
                e.target.value = '';
                setImportFile(f); setImportResult(null); setImportError('');
                if (importTab === 'image') setImportPreview(URL.createObjectURL(f));
                else setImportPreview(null);

                setImportLoading(true); setImportError('');
                try {
                    if (importTab === 'excel') {
                        const arrBuf = await f.arrayBuffer();
                        const XLSX = (await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/xlsx.mjs'));
                        const wb = XLSX.read(new Uint8Array(arrBuf), { type: 'array' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

                        const dayKeyMap = {
                            'thứ 2': 't2', 'thứ hai': 't2', 't2': 't2',
                            'thứ 3': 't3', 'thứ ba': 't3', 't3': 't3',
                            'thứ 4': 't4', 'thứ tư': 't4', 't4': 't4',
                            'thứ 5': 't5', 'thứ năm': 't5', 't5': 't5',
                            'thứ 6': 't6', 'thứ sáu': 't6', 't6': 't6',
                            'thứ 7': 't7', 'thứ bảy': 't7', 't7': 't7'
                        };
                        const dayKeys = ['t2','t3','t4','t5','t6','t7'];
                        
                        let newSchedule = {};
                        let detectedHeaders = { col1: headers.col1 || 'Môn', col2: headers.col2 || 'Ghi chú' };

                        let startRow = 0;
                        while (startRow < rows.length && rows[startRow].every(cell => String(cell).trim() === '')) {
                            startRow++;
                        }

                        let headerRow = null;
                        let headerIndex = -1;
                        for (let i = startRow; i < rows.length; i++) {
                            const row = rows[i];
                            const rowStr = row.map(c => String(c).toLowerCase());
                            const hasTiet = rowStr.some(c => c.includes('tiết') || c.includes('tiet'));
                            const hasThu = rowStr.some(c => c.includes('thứ') || c.includes('thu'));
                            if (hasTiet && hasThu) {
                                headerRow = row;
                                headerIndex = i;
                                break;
                            }
                        }

                        if (headerRow && headerIndex >= 0) {
                            const hLow = headerRow.map(c => String(c).toLowerCase().trim());
                            const iPer = hLow.findIndex(c => c.includes('tiết') || c.includes('tiet'));
                            const dayCols = [];
                            for (let i = 0; i < headerRow.length; i++) {
                                const val = String(headerRow[i] || '').trim();
                                const lower = val.toLowerCase();
                                const match = lower.match(/thứ\s*(\d+)/);
                                if (match) {
                                    const num = parseInt(match[1], 10);
                                    if (num >= 2 && num <= 7) {
                                        dayCols.push({ index: i, dayNum: num, label: lower });
                                    }
                                }
                            }
                            dayCols.sort((a, b) => a.dayNum - b.dayNum);

                            if (iPer >= 0 && dayCols.length > 0) {
                                const dataRows = rows.slice(headerIndex + 1);
                                dataRows.forEach(row => {
                                    const perCell = String(row[iPer] || '').trim();
                                    const per = parseInt(perCell, 10);
                                    if (isNaN(per) || per < 1 || per > 5) return;

                                    dayCols.forEach(col => {
                                        const dayKey = dayKeyMap[col.label];
                                        if (!dayKey) return;
                                        const value = String(row[col.index] || '').trim();
                                        if (value) {
                                            newSchedule[`${dayKey}_${per}_col1`] = value;
                                        }
                                    });
                                });
                            } else {
                                const dataRows = rows.slice(headerIndex + 1);
                                dataRows.forEach((row, ri) => {
                                    const dayIdx = Math.floor(ri / 5);
                                    const per = (ri % 5) + 1;
                                    if (dayIdx < 6) {
                                        const dk = dayKeys[dayIdx];
                                        const v1 = String(row[0] || '').trim();
                                        const v2 = String(row[1] || '').trim();
                                        if (v1) newSchedule[`${dk}_${per}_col1`] = v1;
                                        if (v2) newSchedule[`${dk}_${per}_col2`] = v2;
                                    }
                                });
                            }
                        } else {
                            const dataRows = rows.slice(startRow);
                            dataRows.forEach((row, ri) => {
                                const dayIdx = Math.floor(ri / 5);
                                const per = (ri % 5) + 1;
                                if (dayIdx < 6) {
                                    const dk = dayKeys[dayIdx];
                                    const v1 = String(row[0] || '').trim();
                                    const v2 = String(row[1] || '').trim();
                                    if (v1) newSchedule[`${dk}_${per}_col1`] = v1;
                                    if (v2) newSchedule[`${dk}_${per}_col2`] = v2;
                                }
                            });
                        }

                        const merged = { ...schedule, ...newSchedule };
                        setSchedule(merged);
                        setHeaders(detectedHeaders);
                        await setDoc(tkbRef, { schedule: merged, headers: detectedHeaders }, { merge: true });
                        setShowImportAI(false); setImportFile(null); setImportPreview(null); setImportError('');
                        setImportSuccessMsg('✅ Đã nhập lịch biểu từ Excel thành công!');
                        setTimeout(() => setImportSuccessMsg(''), 3000);

                        const b64 = await fileToBase64(f);

                            contents: [{ parts: [{ text: GEMINI_PROMPT }, { inline_data: { mime_type: mime, data: b64 } }] }],
                            generationConfig: { temperature: 0.1, maxOutputTokens: 4096, responseMimeType: 'application/json' }
                        };
                        const result = await callGeminiAPI(bodyObj, key, geminiModelOverride.trim());
                        if (!result.schedule) throw new Error('Không tìm thấy dữ liệu lịch biểu trong ảnh.');

                                </button>
                                {showWeekDrop && (
                                    <div className="absolute top-full right-0 mt-1 bg-white border border-blue-200 rounded-xl shadow-2xl z-[100] overflow-hidden"
                                        style={{width: 'max(200px, 100%)', maxHeight: '60vh', display: 'flex', flexDirection: 'column'}}
                                        onClick={e => e.stopPropagation()}>
                                        <div className="p-2.5 border-b border-blue-100 bg-blue-50 shrink-0">
                                            {activeYearId ? (
                                                <div className="flex items-center gap-1.5">
                                                    <input autoFocus
                                                        className="flex-1 text-xs border border-blue-200 rounded-lg px-2.5 py-1.5 outline-none focus:border-blue-500 bg-white min-w-0"
                                                        placeholder="Đặt tên tuần này..."
                                                        value={weekInput}
                                                        onChange={e => setWeekInput(e.target.value)}
                                                        onKeyDown={e => { if (e.key === 'Enter') addWeek(); }}
                                                    />
                                                    <button onClick={addWeek}
                                                        className="shrink-0 bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition">
                                                        Thêm
                                                    </button>
                                                </div>
                                            ) : (
                                                <p className="text-xs text-orange-500 font-semibold text-center py-1">⚠ Chọn năm học trước</p>
                                            )}
                                        </div>
                                        <div className="overflow-y-auto flex-1">
                                            {weeksOfActiveYear.length === 0
                                                ? <p className="text-xs text-slate-400 italic text-center py-4">{activeYearId ? 'Chưa có tuần nào' : 'Chọn năm để xem tuần'}</p>
                                                : weeksOfActiveYear.map(w => {
                                                    const yr2 = yearList.find(y => y.id === w.yearId);
                                                    const mon = yr2 ? getMondayFromAnchorOffset(yr2.anchorWeekKey, w.offset) : null;
                                                    const isAct = mon && mon.toDateString() === startOfWeekDate.toDateString();
                                                    return (
                                                        <div key={w.id} onClick={() => jumpToWeekEntry(w)}
                                                            className={'flex items-center justify-between px-3 py-3 hover:bg-blue-50 cursor-pointer border-b border-slate-50 ' + (isAct ? 'bg-blue-50 text-blue-700 font-bold' : 'text-slate-700')}>
                                                            <div className="min-w-0 flex-1">
                                                                <div className="text-sm truncate">{w.name}</div>
                                                                {mon && <div className="text-[10px] text-slate-400 mt-0.5">{String(mon.getDate()).padStart(2,'0') + '/' + String(mon.getMonth()+1).padStart(2,'0') + '/' + mon.getFullYear()}</div>}
                                                            </div>
                                                            {confirmDeleteWeekId === w.id ? (
                                                                <div className="flex items-center gap-1 shrink-0 ml-2" onClick={e => e.stopPropagation()}>
                                                                    <button onClick={() => { removeWeek(w.id); cancelConfirm(); }}
                                                                        className="text-[10px] bg-red-500 text-white px-2.5 py-1.5 rounded-lg font-bold hover:bg-red-600 transition whitespace-nowrap">Xóa?</button>
                                                                </div>
                                                            ) : (
                                                                <button onClick={e => askConfirmWeek(w.id, e)}
                                                                    className="shrink-0 ml-3 w-7 h-7 flex items-center justify-center rounded-full hover:bg-red-100 text-slate-300 hover:text-red-500 transition">
                                                                    <X size={14}/>
                                                                </button>
                                                            )}
                                                        </div>
                                                    );
                                                })
                                            }
                                        </div>
                                        <div className="p-2.5 border-t border-blue-100 bg-blue-50 shrink-0">
                                            <button onClick={applyToNextWeek}
                                                className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-xs font-bold py-2.5 px-3 rounded-lg transition">
                                                <ChevronRight size={14}/> Áp dụng lịch này cho tuần sau
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <button onClick={e => { e.stopPropagation(); setShowImportAI(true); }}
                            className="p-1.5 hover:bg-blue-50 rounded-lg text-blue-500 transition shrink-0"
                            title="Nhập từ Ảnh / Excel bằng AI">
                            <Upload size={18}/>
                        </button>

                        <button onClick={() => navigateWeek(1)} className="p-1.5 hover:bg-blue-50 rounded-lg text-blue-500 transition shrink-0"><ChevronRight size={18}/></button>
                    </div>

                    {importSuccessMsg && (
                        <div className="fixed top-16 left-1/2 -translate-x-1/2 z-[200] bg-green-600 text-white text-xs font-bold px-5 py-2.5 rounded-full shadow-lg animate-bounce">
                            {importSuccessMsg}
                        </div>
                    )}

                    <div className="flex-1 overflow-y-auto rounded-xl shadow-sm border border-blue-200 mb-4 bg-white">
                        <table className="w-full text-sm border-collapse table-fixed">
                            <thead className="sticky top-0 z-10">
                                <tr>
                                    <th className="border border-blue-200 p-2 w-14 bg-blue-600 text-center align-middle text-xs font-bold text-white">Thứ</th>
                                    <th className="border border-blue-200 p-2 w-8 bg-blue-600 text-center text-xs font-bold text-white">Tiết</th>
                                    <th className="border border-blue-200 p-0 min-w-[100px] bg-blue-600">
                                        <input className="w-full bg-transparent text-center font-bold p-2 outline-none text-white text-xs placeholder-blue-200" value={headers.col1} onChange={e => saveHeader('col1', e.target.value)} placeholder="Môn - Lớp" />
                                    </th>
                                    <th className="border border-blue-200 p-0 min-w-[100px] bg-blue-600">
                                        <input className="w-full bg-transparent text-center font-bold p-2 outline-none text-white text-xs placeholder-blue-200" value={headers.col2} onChange={e => saveHeader('col2', e.target.value)} placeholder="Ghi chú" />
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                {weekDaysInfo.map((day, dayIndex) => {
                                    const isToday = day.dateStr === todayStr;
                                    const rowBg = isToday ? 'bg-blue-50' : dayBg[dayIndex];
                                    return (
                                        <React.Fragment key={day.id}>
                                            {periods.map((period, pIdx) => {
                                                const borderClass = period === 5 ? 'border-b-2 border-blue-500' : 'border-b border-blue-100';
                                                return (
                                                    <tr key={day.id + '_' + period} className={borderClass + ' ' + rowBg}>
                                                        {pIdx === 0 && (
                                                            <td className={'border border-blue-100 p-1 align-middle text-center ' + rowBg} rowSpan={5}>
                                                                <div className="flex flex-col items-center justify-center gap-0.5">
                                                                    <div className={'font-extrabold text-xs ' + (isToday ? 'text-blue-700' : 'text-blue-600')}>{day.label}</div>
                                                                    <div className={'text-[10px] font-bold px-1.5 py-0.5 rounded-full ' + (isToday ? 'bg-blue-500 text-white' : 'bg-blue-100 text-blue-500')}>{day.dateStr}</div>
                                                                </div>
                                                            </td>
                                                        )}
                                                        <td className={'border border-blue-100 p-2 text-center font-bold text-xs align-middle ' + (isToday ? 'text-blue-700' : 'text-blue-400')}>{period}</td>
                                                        <td id={'tkb-cell-' + day.id + '_' + period + '_col1'} className={'border border-blue-100 p-0 align-middle transition-all duration-500 ' + (highlightKey === day.id + '_' + period + '_col1' ? 'bg-yellow-100 ring-2 ring-yellow-400 ring-inset' : '')}>
                                                            <textarea className="w-full h-full p-2 outline-none bg-transparent resize-none overflow-hidden text-black text-xs leading-tight" rows={1}
                                                                value={schedule[day.id + '_' + period + '_col1'] || ''}
                                                                onChange={e => setSchedule({ ...schedule, [day.id + '_' + period + '_col1']: e.target.value })}
                                                                onBlur={e => saveData(day.id + '_' + period + '_col1', e.target.value)} />
                                                        </td>
                                                        <td id={'tkb-cell-' + day.id + '_' + period + '_col2'} className={'border border-blue-100 p-0 align-middle transition-all duration-500 ' + (highlightKey === day.id + '_' + period + '_col2' ? 'bg-yellow-100 ring-2 ring-yellow-400 ring-inset' : '')}>
                                                            <textarea className="w-full h-full p-2 outline-none bg-transparent resize-none overflow-hidden text-black text-xs leading-tight" rows={1}
                                                                value={schedule[day.id + '_' + period + '_col2'] || ''}
                                                                onChange={e => setSchedule({ ...schedule, [day.id + '_' + period + '_col2']: e.target.value })}
                                                                onBlur={e => saveData(day.id + '_' + period + '_col2', e.target.value)} />
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </React.Fragment>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    <button onClick={handleClearWeek}
                        className="mb-2 shrink-0 flex items-center justify-center gap-2 w-full py-2.5 rounded-xl border border-red-200 bg-red-50 text-red-500 text-sm font-bold hover:bg-red-100 transition">
                        <Trash2 size={16}/> Xóa cả tuần
                    </button>
                </div>
            );
        };
        // END: TimeTableView

        // ==============================================================
        // MÀN HÌNH LỊCH NGÀY (DAILY VIEW) – PHIÊN BẢN CŨ (ĐÃ HOÀN NGUYÊN)
        // ==============================================================
        const DailyView = ({ user, db, appId, today, setToday, activeTab }) => {
            const [weather, setWeather] = useState(null);
            const [verses, setVerses] = useState([]);
            const [currentVerse, setCurrentVerse] = useState(DEFAULT_VERSES[0]);
            const [animClass, setAnimClass] = useState('');
            const [locationName, setLocationName] = useState('Bắc Ninh');
            const [showWeatherSearch, setShowWeatherSearch] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [todayEvents, setTodayEvents] = useState([]);
            const [isNewYearWish, setIsNewYearWish] = useState(false);
            
            const [viewMode, setViewMode] = useState('verse');
            const [showMenu, setShowMenu] = useState(false);
            const [showAddVerse, setShowAddVerse] = useState(false);
            const [newVerse, setNewVerse] = useState('');

            const [touchStart, setTouchStart] = useState(null);
            const onTouchStart = (e) => {
                if (e.touches.length > 1) return;
                setTouchStart(e.targetTouches[0].clientX);
            };
            const onTouchEnd = (e) => {
                if (!touchStart || e.changedTouches.length > 1) return;
                const distance = touchStart - e.changedTouches[0].clientX;
                const newDate = new Date(today);
                if (distance > 50) { 
                    setAnimClass('anim-next');
                    setTimeout(() => { newDate.setDate(today.getDate() + 1); setToday(newDate); setAnimClass(''); }, 400);
                }
                if (distance < -50) { 
                    setAnimClass('anim-prev');
                    setTimeout(() => { newDate.setDate(today.getDate() - 1); setToday(newDate); setAnimClass(''); }, 400);
                }
                setTouchStart(null);
            };
            
            const goNextDay = () => { setAnimClass('anim-next'); setTimeout(() => { const d = new Date(today); d.setDate(today.getDate()+1); setToday(d); setAnimClass(''); }, 300); };
            const goPrevDay = () => { setAnimClass('anim-prev'); setTimeout(() => { const d = new Date(today); d.setDate(today.getDate()-1); setToday(d); setAnimClass(''); }, 300); };
            const stopSwipe = (e) => e.stopPropagation();

            useEffect(() => {
                const isNewYear = today.getDate() === 1 && today.getMonth() === 0;
                if (isNewYear) {
                     setCurrentVerse(`Nhân dịp năm mới ${today.getFullYear()}.\nXin kính chúc mọi người và gia đình một năm mới dồi dào sức khỏe, hạnh phúc và bình an!"\n\n_ Văn Trung`);
                     setIsNewYearWish(true);
                } else {
                     setIsNewYearWish(false);
                     const allVerses = [...DEFAULT_VERSES, ...verses.map(v => v.text)];
                     if(allVerses.length > 0) setCurrentVerse(allVerses[Math.floor(Math.random() * allVerses.length)]);
                }
            }, [today, verses]);

            const verseRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'verses'), [db, appId, user.uid]);
            useEffect(() => onSnapshot(query(verseRef), snap => { const data = snap.docs.map(d => ({id: d.id, ...d.data()})); setVerses(data); }), [verseRef]);

            const eventsRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'events'), [db, appId, user.uid]);
            useEffect(() => onSnapshot(query(eventsRef), snap => {
                const allEvents = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const dateStr = today.toDateString();
                const lunar = getLunarDetails(today);
                const todays = allEvents.filter(e => {
                    if (!e.repeat || e.repeat === 'none') return e.date && new Date(e.date.seconds * 1000).toDateString() === dateStr;
                    if (e.repeat === 'lunar') return e.lunarDay === lunar.day && e.lunarMonth === lunar.month;
                    if (e.repeat === 'solar' && e.date) { const d = new Date(e.date.seconds * 1000); return d.getDate() === today.getDate() && d.getMonth() === today.getMonth(); }
                    if (e.repeat === 'weekly') { const d = new Date(e.date.seconds * 1000); return d.getDay() === today.getDay(); }
                    if (e.repeat === 'monthly') { const d = new Date(e.date.seconds * 1000); return d.getDate() === today.getDate(); }
                    if (e.repeat === 'yearly' && e.date) { const d = new Date(e.date.seconds * 1000); return d.getDate() === today.getDate() && d.getMonth() === today.getMonth(); }
                    return false;
                });
                setTodayEvents(todays);
            }), [today, eventsRef]);

            // Tự động làm mới thời tiết mỗi 30 phút
            useEffect(() => {
                const fetchWeather = async () => {
                    try {
                        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${locationName}&count=1&language=vi&format=json`);
                        const geoData = await geoRes.json();
                        if (geoData.results && geoData.results.length > 0) {
                            const { latitude, longitude } = geoData.results[0];
                            const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`);
                            const weatherData = await weatherRes.json();
                            setWeather(weatherData.daily);
                            toast.info("Đã cập nhật thời tiết!", { position: "top-center" });
                        }
                    } catch (e) { console.error("Lỗi thời tiết", e); }
                };
                fetchWeather();
                const interval = setInterval(fetchWeather, 30 * 60 * 1000);
                return () => clearInterval(interval);
            }, [locationName]);

            const handleSearch = (e) => { e.preventDefault(); if(searchQuery.trim()) { setLocationName(searchQuery); } };
            const handleAddVerse = async () => { if (newVerse.trim()) { await addDoc(verseRef, { text: newVerse, createdAt: serverTimestamp() }); setNewVerse(''); setShowAddVerse(false); } };
            const handleDeleteVerse = async (text) => {
                const verseToDelete = verses.find(v => v.text === text);
                if (verseToDelete && window.confirm("Xóa câu danh ngôn này?")) { await deleteDoc(doc(verseRef, verseToDelete.id)); getRandomVerse(); } 
                else if (!verseToDelete) { alert("Đây là danh ngôn mặc định, không thể xóa."); }
            };

            const bgImage = isNewYearWish 
                ? "https://images.unsplash.com/photo-1516132006923-6cf348e5dee2?q=80&w=1000&auto=format&fit=crop" 
                : BACKGROUNDS[today.getDate() % BACKGROUNDS.length];
                
            const getRandomVerse = () => { const allVerses = [...DEFAULT_VERSES, ...verses.map(v => v.text)]; setCurrentVerse(allVerses[Math.floor(Math.random() * allVerses.length)]); };
            const getWeatherIcon = (code) => {
                if (code <= 3) return <Sun size={20} className="text-yellow-400"/>;
                if (code <= 60) return <Cloud size={20} className="text-gray-200"/>;
                return <CloudRain size={20} className="text-blue-300"/>;
            };
            const weekDays = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
            const getVerseFontSize = (text) => { const len = text.length; if (len < 50) return 'text-xl'; if (len < 100) return 'text-lg'; if (len < 200) return 'text-sm'; return 'text-xs'; };

            // ── KEYBOARD NAV ──────────────────────────────────────────────────────
            useEffect(() => {
                const handler = (e) => {
                    if (activeTab !== 'day') return;
                    const target = e.target;
                    const tag = target?.tagName || '';
                    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || target?.isContentEditable) return;
                    if (e.key === 'ArrowLeft') { goPrevDay(); e.preventDefault(); }
                    else if (e.key === 'ArrowRight') { goNextDay(); e.preventDefault(); }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [activeTab, goPrevDay, goNextDay]);

            const renderCenterContent = () => {
                if (viewMode === 'events') {
                     return (
                        <div className="w-full h-full overflow-y-auto no-scrollbar" onTouchStart={stopSwipe} onTouchEnd={stopSwipe}>
                            <h4 className="text-sm font-bold mb-2 border-b border-white/20 pb-1">Sự kiện hôm nay</h4>
                            {todayEvents.length === 0 ? <p className="text-center text-xs opacity-60 mt-4">Không có sự kiện nào.</p> : (
                                <ul className="space-y-2">{todayEvents.map(e => (<li key={e.id} className="text-sm bg-white/10 p-2 rounded flex items-center gap-2"><Bell size={12} className="text-yellow-300" /><span>{e.title}</span></li>))}</ul>
                            )}
                        </div>
                    );
                }

                return (
                    <div className="text-center w-full flex flex-col h-full relative">
                        {showAddVerse ? (
                             <div className="flex flex-col gap-2 h-full" onTouchStart={stopSwipe} onTouchEnd={stopSwipe}>
                                <textarea className="flex-1 bg-white/20 rounded p-2 text-sm text-white placeholder-white/50 outline-none resize-none" placeholder="Nhập câu danh ngôn..." value={newVerse} onChange={e=>setNewVerse(e.target.value)}></textarea>
                                <div className="flex gap-2 justify-end">
                                    <button onClick={()=>setShowAddVerse(false)} className="text-xs bg-gray-500/50 px-2 py-1 rounded">Hủy</button>
                                    <button onClick={handleAddVerse} className="text-xs bg-blue-500 px-2 py-1 rounded">Lưu</button>
                                </div>
                             </div>
                        ) : (
                            <>
                                <div className="flex justify-end gap-2 mb-1 absolute bottom-1 right-1">
                                     <button onClick={(e)=>{e.stopPropagation(); setShowAddVerse(true)}} className="p-1 opacity-40 hover:opacity-100"><Plus size={12}/></button>
                                     <button onClick={(e)=>{e.stopPropagation(); handleDeleteVerse(currentVerse)}} className="p-1 opacity-40 hover:opacity-100 text-red-300"><Trash2 size={12}/></button>
                                </div>
                                <div className={`flex-1 flex flex-col items-center justify-center font-sans font-medium leading-relaxed whitespace-pre-wrap ${getVerseFontSize(currentVerse)} overflow-y-auto no-scrollbar`} onClick={getRandomVerse}>
                                    <div>"{currentVerse}"</div>
                                    {isNewYearWish && <div className="text-right italic mt-2 text-sm font-normal w-full px-4">_ Văn Trung</div>}
                                </div>
                                <div className="text-[10px] mt-2 opacity-40 flex items-center justify-center gap-1 shrink-0"><BookOpen size={10}/> Chạm để đổi câu khác</div>
                            </>
                        )}
                    </div>
                );
            };

            return (
                <div className="h-full flex flex-col relative text-white overflow-hidden perspective-container" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
                    <div className="absolute inset-0 bg-gray-900 z-0">
                        <img src={bgImage} className="w-full h-full object-cover opacity-80 transition-opacity duration-500" alt="background" />
                    </div>

                    <div className="absolute top-0 inset-x-0 z-30 px-3 pt-2 pb-0"
                        onTouchStart={stopSwipe} onTouchEnd={stopSwipe}>
                        
                        <div className="flex justify-between overflow-x-auto no-scrollbar gap-1.5">
                            {weather ? weather.time.slice(0, 7).map((t, i) => (
                                <div key={t} className={'flex flex-col items-center min-w-[38px] p-1.5 rounded-lg ' + (i === 0 ? 'bg-white/20' : 'bg-black/10')}>
                                    <span className="text-[9px] opacity-80 mb-0.5">{i === 0 ? 'Hôm nay' : weekDays[new Date(t).getDay()]}</span>
                                    <div className="my-0.5 scale-75">{getWeatherIcon(weather.weathercode[i])}</div>
                                    <div className="text-[9px] flex flex-col items-center leading-tight">
                                        <span className="font-bold">{Math.round(weather.temperature_2m_max[i])}°</span>
                                        <span className="opacity-60">{Math.round(weather.temperature_2m_min[i])}°</span>
                                    </div>
                                </div>
                            )) : Array.from({length: 7}).map((_, i) => (
                                <div key={i} className="flex flex-col items-center min-w-[38px] p-1.5 rounded-lg bg-black/10 opacity-40">
                                    <span className="text-[9px] mb-0.5">--</span>
                                    <div className="my-0.5 w-5 h-5 rounded-full bg-white/20"></div>
                                    <span className="text-[9px]">--°</span>
                                </div>
                            ))}
                        </div>

                        <div className="flex items-center justify-between mt-0.5">
                            <div className="flex items-center gap-2">
                                {!weather && <span className="text-[9px] opacity-60 animate-pulse">Đang tải thời tiết...</span>}
                                <button onClick={() => fetchWeather()} className="text-[9px] bg-white/20 hover:bg-white/30 p-1 rounded-full transition" title="Làm mới thời tiết">
                                    <RefreshCw size={12} />
                                </button>
                            </div>
                            <button onClick={() => setShowWeatherSearch(v => !v)} className="flex items-center gap-1 text-[10px] font-bold uppercase text-yellow-300 hover:text-yellow-200 transition">
                                <MapPin size={10}/> {locationName} <ChevronDown size={10} className={showWeatherSearch ? 'rotate-180 transition-transform' : 'transition-transform'}/>
                            </button>
                        </div>

                        {showWeatherSearch && (
                            <form onSubmit={(e) => { handleSearch(e); setShowWeatherSearch(false); }} className="flex items-center gap-2 mt-1 bg-white/20 p-1.5 rounded-lg w-full">
                                <button type="submit" className="p-1 hover:bg-white/10 rounded"><Search size={14} className="text-white shrink-0"/></button>
                                <input autoFocus className="flex-1 bg-transparent outline-none text-white placeholder-white/70 text-xs font-bold" placeholder="Nhập tên thành phố..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} />
                            </form>
                        )}
                    </div>

                    <button onClick={goPrevDay} className="absolute left-4 top-1/2 -translate-y-1/2 z-40 p-2 bg-black/20 hover:bg-black/50 rounded-full text-white/50 hover:text-white transition"><ChevronLeft size={32}/></button>
                    <button onClick={goNextDay} className="absolute right-4 top-1/2 -translate-y-1/2 z-40 p-2 bg-black/20 hover:bg-black/50 rounded-full text-white/50 hover:text-white transition"><ChevronRight size={32}/></button>

                    <div className={`relative z-10 flex-1 flex flex-col items-center gap-1 overflow-hidden ${animClass}`}>
                        
                        <div className="text-center drop-shadow-lg mt-24 z-20 flex-shrink-0 cursor-pointer hover:scale-105 transition-transform" onClick={() => setToday(new Date())} title="Về hôm nay">
                            <p className="text-xl font-light uppercase tracking-widest mb-0.5 text-white/90">{getDayOfWeek(today)}</p>
                            <h2 className="text-[5.5rem] md:text-[6rem] font-bold leading-none text-white">{today.getDate()}</h2>
                            <p className="text-base mt-1 font-medium text-white/90">Tháng {today.getMonth() + 1} - {today.getFullYear()}</p>
                            <div className="mt-2 flex items-center justify-center gap-2 flex-wrap">
                                <div className="inline-block bg-white/20 backdrop-blur-sm px-4 py-1 rounded-full text-sm border border-white/30 font-serif">
                                    Âm lịch: {getLunarDate(today)}
                                </div>
                            </div>

                            {(() => {
                                const holidayInfo = getHolidayInfo(today);
                                if (!holidayInfo) return null;
                                return (
                                    <div className="mt-2 flex flex-col items-center gap-1 text-center px-4 max-w-xs">
                                        <div className="inline-block bg-gradient-to-r from-red-500/85 to-amber-500/85 backdrop-blur-sm px-4 py-1.5 rounded-full text-sm font-bold text-white border border-white/30 shadow-md">
                                            🎉 Ngày {holidayInfo.name}
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>

                        <div className="w-full max-w-md mt-auto relative group z-30 flex-1 flex flex-col justify-end pb-0">
                            <div className="bg-black/20 backdrop-blur-sm rounded-t-2xl px-4 py-3 border-t border-x border-white/10 flex-1 flex flex-col justify-center items-center relative transition-all duration-300 max-h-[calc(60%+1cm)] overflow-hidden">
                                <div className="absolute top-2 right-2">
                                    <button onClick={(e) => { e.stopPropagation(); setShowMenu(!showMenu); }} className="p-1 opacity-60 hover:opacity-100 transition bg-black/20 rounded-full"><MoreVertical size={15} /></button>
                                    {showMenu && (
                                        <div className="absolute right-0 top-7 bg-white text-gray-800 rounded-lg shadow-xl w-32 py-1 z-50 fade-in overflow-hidden text-sm font-medium">
                                            <button onClick={() => { setViewMode('verse'); setShowMenu(false); }} className={`block w-full text-left px-4 py-2 hover:bg-gray-100 ${viewMode==='verse'?'text-blue-600 bg-blue-50':''}`}>Danh ngôn</button>
                                            <button onClick={() => { setViewMode('events'); setShowMenu(false); }} className={`block w-full text-left px-4 py-2 hover:bg-gray-100 ${viewMode==='events'?'text-blue-600 bg-blue-50':''}`}>Sự kiện</button>
                                        </div>
                                    )}
                                </div>
                                {renderCenterContent()}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- LỊCH VIEW (THÁNG) ---
        const CalendarView = ({ user, db, appId, currentDate, setCurrentDate, selectedDate, setSelectedDate, onTabChange, theme, activeTab }) => {
            const [events, setEvents] = useState([]);
            const [showEventModal, setShowEventModal] = useState(false);
            const [animClass, setAnimClass] = useState('');
            const [touchStart, setTouchStart] = useState(null);

            const [showQuickJump, setShowQuickJump] = useState(false);
            const [pickerYear, setPickerYear] = useState(currentDate.getFullYear());
            const [pickerMonth, setPickerMonth] = useState(currentDate.getMonth());

            const openQuickJump = () => {
                setPickerYear(currentDate.getFullYear());
                setPickerMonth(currentDate.getMonth());
                setShowQuickJump(true);
            };

            const pickerDaysInMonth = new Date(pickerYear, pickerMonth + 1, 0).getDate();
            const pickerStartDayIndex = new Date(pickerYear, pickerMonth, 1).getDay() === 0 ? 6 : new Date(pickerYear, pickerMonth, 1).getDay() - 1;
            const pickerDays = Array(pickerStartDayIndex).fill(null).concat(Array.from({length: pickerDaysInMonth}, (_, i) => i + 1));

            const handlePickDay = (d) => {
                const newDate = new Date(pickerYear, pickerMonth, d);
                setCurrentDate(new Date(pickerYear, pickerMonth, 1));
                setSelectedDate(newDate);
                setShowQuickJump(false);
            };
            
            const onTouchStart = (e) => { 
                if (e.touches.length > 1) return; 
                setTouchStart(e.targetTouches[0].clientX); 
            };
            
            const onTouchEnd = (e) => {
                if (!touchStart || e.changedTouches.length > 1) return;
                const distance = touchStart - e.changedTouches[0].clientX;
                if (distance > 50) { 
                    setAnimClass('anim-next'); 
                    setTimeout(() => { 
                        setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1)); 
                        setAnimClass(''); 
                    }, 300); 
                }
                if (distance < -50) { 
                    setAnimClass('anim-prev'); 
                    setTimeout(() => { 
                        setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1)); 
                        setAnimClass(''); 
                    }, 300); 
                }
                setTouchStart(null);
            };

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startDayIndex = new Date(year, month, 1).getDay() === 0 ? 6 : new Date(year, month, 1).getDay() - 1;
            // Số ngày của tháng trước, dùng để lấp đầy các ô trống đầu bảng
            const prevMonthDaysCount = new Date(year, month, 0).getDate();
            const leadingDays = Array.from({ length: startDayIndex }, (_, i) => ({
                date: new Date(year, month - 1, prevMonthDaysCount - startDayIndex + i + 1),
                outside: true
            }));
            const currentDays = Array.from({ length: daysInMonth }, (_, i) => ({
                date: new Date(year, month, i + 1),
                outside: false
            }));
            // Lấp đầy các ô trống cuối bảng bằng ngày của tháng sau, đủ tròn hàng (bội số của 7)
            const filledSoFar = leadingDays.length + currentDays.length;
            const trailingCount = (7 - (filledSoFar % 7)) % 7;
            const trailingDays = Array.from({ length: trailingCount }, (_, i) => ({
                date: new Date(year, month + 1, i + 1),
                outside: true
            }));
            const days = [...leadingDays, ...currentDays, ...trailingDays];

            const eventsRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'events'), [db, appId, user.uid]);
            useEffect(() => onSnapshot(query(eventsRef), snap => setEvents(snap.docs.map(d => ({id: d.id, ...d.data()})))), [eventsRef]);
            
            const hasEvent = (date) => {
                if (!date) return false;
                const dateStr = date.toDateString();
                const lunar = getLunarDetails(date);
                return events.some(e => {
                    if (!e.repeat || e.repeat === 'none') {
                        return e.date && new Date(e.date.seconds * 1000).toDateString() === dateStr;
                    }
                    if (e.repeat === 'lunar') {
                        return e.lunarDay === lunar.day && e.lunarMonth === lunar.month;
                    }
                    if (e.repeat === 'solar' && e.date) {
                        const d = new Date(e.date.seconds * 1000);
                        return d.getDate() === date.getDate() && d.getMonth() === date.getMonth();
                    }
                    if (e.repeat === 'weekly' && e.date) {
                        const d = new Date(e.date.seconds * 1000);
                        const dayMatches = d.getDay() === date.getDay();
                        if (!dayMatches) return false;
                        if (e.weeklyMonths && e.weeklyMonths.length > 0) {
                            return e.weeklyMonths.includes(date.getMonth() + 1);
                        }
                        return true;
                    }
                    if (e.repeat === 'monthly' && e.date) {
                        const d = new Date(e.date.seconds * 1000);
                        return d.getDate() === date.getDate();
                    }
                    if (e.repeat === 'yearly' && e.date) {
                        const d = new Date(e.date.seconds * 1000);
                        return d.getDate() === date.getDate() && d.getMonth() === date.getMonth();
                    }
                    return false;
                });
            };

            const getEventsForDate = (date) => {
                if (!date) return [];
                const dateStr = date.toDateString();
                const lunar = getLunarDetails(date);
                return events.filter(e => {
                    if (!e.repeat || e.repeat === 'none') return e.date && new Date(e.date.seconds * 1000).toDateString() === dateStr;
                    if (e.repeat === 'lunar') return e.lunarDay === lunar.day && e.lunarMonth === lunar.month;
                    if (e.repeat === 'solar' && e.date) { const d = new Date(e.date.seconds * 1000); return d.getDate() === date.getDate() && d.getMonth() === date.getMonth(); }
                    if (e.repeat === 'weekly' && e.date) { 
                        const d = new Date(e.date.seconds * 1000); 
                        const dayMatches = d.getDay() === date.getDay();
                        if (!dayMatches) return false;
                        if (e.weeklyMonths && e.weeklyMonths.length > 0) {
                            return e.weeklyMonths.includes(date.getMonth() + 1);
                        }
                        return true;
                    }
                    if (e.repeat === 'monthly' && e.date) { const d = new Date(e.date.seconds * 1000); return d.getDate() === date.getDate(); }
                    if (e.repeat === 'yearly' && e.date) { const d = new Date(e.date.seconds * 1000); return d.getDate() === date.getDate() && d.getMonth() === date.getMonth(); }
                    return false;
                });
            };

            const handleAddEvent = async (title, repeatType, weeklyMonths, eventDateStr) => {
                let eventDate = selectedDate;
                if (eventDateStr) {
                    const [yyyy, mm, dd] = eventDateStr.split('-').map(Number);
                    if (yyyy && mm && dd) {
                        eventDate = new Date(selectedDate);
                        eventDate.setFullYear(yyyy, mm - 1, dd);
                    }
                }
                const data = { title, date: Timestamp.fromDate(eventDate), repeat: repeatType };
                if (repeatType === 'lunar') { const lunar = getLunarDetails(eventDate); data.lunarDay = lunar.day; data.lunarMonth = lunar.month; }
                if (repeatType === 'weekly' && weeklyMonths && weeklyMonths.length > 0) { data.weeklyMonths = weeklyMonths; }
                await addDoc(eventsRef, data);
            };
            const getDayColor = (index) => {
                if (index === 5) return 'text-[#84cc16]'; 
                if (index === 6) return 'text-[#ec4899]'; 
                return 'text-slate-500'; 
            };

            // ── KEYBOARD NAV ──────────────────────────────────────────────────────
            useEffect(() => {
                const handler = (e) => {
                    if (activeTab !== 'calendar') return;
                    const target = e.target;
                    const tag = target?.tagName || '';
                    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || target?.isContentEditable) return;
                    if (e.key === 'ArrowLeft') { setCurrentDate(new Date(year, month - 1, 1)); e.preventDefault(); }
                    else if (e.key === 'ArrowRight') { setCurrentDate(new Date(year, month + 1, 1)); e.preventDefault(); }
                    else if (e.key === 'ArrowUp') { setCurrentDate(new Date(year - 1, month, 1)); e.preventDefault(); }
                    else if (e.key === 'ArrowDown') { setCurrentDate(new Date(year + 1, month, 1)); e.preventDefault(); }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [activeTab, year, month, setCurrentDate]);

            return (
                <div className="p-4 select-none perspective-container" style={{ color: theme.textColor }} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
                    <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-150">
                        <button onClick={() => setCurrentDate(new Date(year, month - 1, 1))} className="p-2 hover:bg-gray-100 rounded-full"><ChevronLeft className="text-gray-600" /></button>
                        <button onClick={openQuickJump} className="text-lg font-bold uppercase text-gray-800 hover:text-blue-600 transition flex items-center gap-1.5">
                            Tháng {month + 1} / {year}
                            <ChevronDown size={16} className="text-gray-400"/>
                        </button>
                        <button onClick={() => setCurrentDate(new Date(year, month + 1, 1))} className="p-2 hover:bg-gray-100 rounded-full"><ChevronRight className="text-gray-600" /></button>
                    </div>

                    {showQuickJump && (
                        <div className="fixed inset-0 bg-black/50 z-[70] overflow-y-auto overscroll-contain" onClick={() => setShowQuickJump(false)}>
                            <div className="min-h-full flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl shadow-2xl overflow-hidden max-h-[100dvh] sm:max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center justify-between px-4 py-3 bg-blue-600 text-white shrink-0">
