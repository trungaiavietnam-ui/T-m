<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xuan Lai Hub - Hệ thống Quản lý Học đường</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Thư viện React 18 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Importmap cho Lucide React -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "lucide-react": "https://esm.sh/lucide-react@0.263.0"
        }
      }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Tối ưu hóa thanh cuộn cho kết quả tìm kiếm */
        .search-scrollbar::-webkit-scrollbar { width: 6px; }
        .search-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .search-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .search-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <!-- Nhúng dữ liệu Kinh Pháp Cú và logic chuyển đổi lịch âm dương tại đây nếu cần -->
    <script>
        // Giả lập hoặc nhúng danh sách 431 bài kinh Pháp Cú dữ liệu gốc của Thầy
        window.PHAP_CU_DATA = Array.from({length: 431}, (_, i) => ({
            id: i + 1,
            content: `Lời vàng Pháp Cú số ${i + 1}: Giữ tâm thanh tịnh, hành thiện tích đức, cuộc sống an nhiên.`
        }));
    </script>

    <!-- Ứng dụng React chính -->
    <script type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import ReactDOM from 'react-dom';
        import { 
            Search, Calendar, FileText, CheckSquare, Clock, 
            Bell, User, Menu, X, ChevronRight, BookOpen, Sun
        } from 'lucide-react';

        function App() {
            // --- TRẠNG THÁI DỮ LIỆU GỐC CỦA THẦY ---
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            // Giả lập dữ liệu có sẵn trong hệ thống của Thầy
            const [events, setEvents] = useState([
                { id: 1, title: "Họp Hội đồng Sư phạm đầu tuần", date: "2026-06-22", time: "07:30", location: "Phòng Hội trường" },
                { id: 2, title: "Nộp báo cáo công tác tháng 6", date: "2026-06-25", time: "17:00", location: "Văn phòng" },
                { id: 3, title: "Lễ tổng kết chiến dịch Thanh niên tình nguyện", date: "2026-06-28", time: "08:00", location: "Sân trường" }
            ]);

            const [notes, setNotes] = useState([
                { id: 1, title: "Ý tưởng đổi mới phát thanh măng non", content: "Tích hợp kịch bản AI tự động hóa nội dung truyền thông học đường.", date: "2026-06-15" },
                { id: 2, title: "Cấu hình phần mềm xếp thời khóa biểu FET", content: "Lưu ý ràng buộc số tiết tối đa của giáo viên và phân bổ phòng chức năng.", date: "2026-06-18" }
            ]);

            const [todos, setTodos] = useState([
                { id: 1, text: "Kiểm tra tiến độ triển khai PWA Xuan Lai Hub", completed: false },
                { id: 2, text: "Ký duyệt học bạ điện tử bằng MySign", completed: true },
                { id: 3, text: "Cập nhật mã nguồn hệ thống Đọc và Báo cáo tự động", completed: false }
            ]);

            const [timetable, setTimetable] = useState([
                { id: 1, day: "Thứ Hai", lesson: "Tiết 1", class: "Lớp 9A", subject: "Toán học" },
                { id: 2, day: "Thứ Hai", lesson: "Tiết 2", class: "Lớp 9B", subject: "Toán học" },
                { id: 3, day: "Thứ Ba", lesson: "Tiết 3", class: "Lớp 8A", subject: "Tin học văn phòng" },
                { id: 4, day: "Thứ Tư", lesson: "Tiết 1", class: "Lớp 7A", subject: "Sinh hoạt lớp" }
            ]);

            // --- NÂNG CẤP: LOGIC THANH TÌM KIẾM TOÀN CỤC ---
            const [searchQuery, setSearchQuery] = useState('');
            const [isSearchFocused, setIsSearchFocused] = useState(false);
            const searchRef = useRef(null);

            // Hàm loại bỏ dấu tiếng Việt để tìm kiếm không dấu chính xác
            const removeVietnameseTones = (str) => {
                if (!str) return '';
                str = str.toLowerCase();
                str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
                str = str.replace(/è|é|ẹ|e|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
                str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
                str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
                str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
                str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
                str = str.replace(/đ/g, "d");
                return str;
            };

            // Xử lý bộ lọc tìm kiếm toàn cục dữ liệu
            const searchResults = useMemo(() => {
                if (!searchQuery.trim()) return { events: [], notes: [], todos: [], timetable: [], total: 0 };
                
                const cleanQuery = removeVietnameseTones(searchQuery.trim());

                const filteredEvents = events.filter(e => 
                    removeVietnameseTones(e.title).includes(cleanQuery) || 
                    (e.location && removeVietnameseTones(e.location).includes(cleanQuery))
                );

                const filteredNotes = notes.filter(n => 
                    removeVietnameseTones(n.title).includes(cleanQuery) || 
                    removeVietnameseTones(n.content).includes(cleanQuery)
                );

                const filteredTodos = todos.filter(t => 
                    removeVietnameseTones(t.text).includes(cleanQuery)
                );

                const filteredTimetable = timetable.filter(tb => 
                    removeVietnameseTones(tb.subject).includes(cleanQuery) || 
                    removeVietnameseTones(tb.class).includes(cleanQuery) ||
                    removeVietnameseTones(tb.day).includes(cleanQuery)
                );

                const total = filteredEvents.length + filteredNotes.length + filteredTodos.length + filteredTimetable.length;

                return {
                    events: filteredEvents,
                    notes: filteredNotes,
                    todos: filteredTodos,
                    timetable: filteredTimetable,
                    total
                };
            }, [searchQuery, events, notes, todos, timetable]);

            // Sự kiện đóng dropdown khi click ra ngoài thanh tìm kiếm
            useEffect(() => {
                function handleClickOutside(event) {
                    if (searchRef.current && !searchRef.current.contains(event.target)) {
                        setIsSearchFocused(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            // Hàm xử lý điều hướng nhanh khi click vào kết quả tìm kiếm
            const handleResultClick = (tabId) => {
                setActiveTab(tabId);
                setIsSearchFocused(false);
                setSearchQuery('');
            };

            return (
                <div class="min-h-screen flex flex-col bg-slate-50">
                    
                    {/* TOP HEADER (THANH TIÊU ĐỀ ĐẦU TRANG) */}
                    <header class="bg-indigo-600 text-white shadow-md sticky top-0 z-50 px-4 py-3 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <button 
                                onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                                class="p-1.5 hover:bg-indigo-700 rounded-lg lg:hidden transition-colors"
                            >
                                {isMobileMenuOpen ? <X size={22} /> : <Menu size={22} />}
                            </button>
                            <div class="flex items-center gap-2">
                                <div class="bg-white/10 p-2 rounded-lg backdrop-blur-sm">
                                    <BookOpen size={22} class="text-indigo-200" />
                                </div>
                                <span class="font-bold text-lg tracking-wide hidden sm:inline">Xuan Lai Hub</span>
                            </div>
                        </div>

                        {/* --- NÂNG CẤP TRỰC TIẾP: THANH TÌM KIẾM TOÀN CỤC --- */}
                        <div ref={searchRef} class="flex-1 max-w-xl mx-4 sm:mx-8 relative">
                            <div class="relative">
                                <Search size={18} class="absolute left-3 top-1/2 -translate-y-1/2 text-indigo-200" />
                                <input 
                                    type="text"
                                    placeholder="Tìm sự kiện, ghi chú, việc cần làm, lịch dạy..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    onFocus={() => setIsSearchFocused(true)}
                                    class="w-full bg-indigo-700/50 hover:bg-indigo-700/70 focus:bg-white text-white focus:text-slate-900 placeholder-indigo-200 focus:placeholder-slate-400 pl-10 pr-4 py-2 rounded-xl text-sm border border-indigo-500/30 focus:border-white outline-none shadow-inner transition-all"
                                />
                                {searchQuery && (
                                    <button 
                                        onClick={() => setSearchQuery('')}
                                        class="absolute right-3 top-1/2 -translate-y-1/2 text-indigo-200 hover:text-white focus:text-slate-600 font-medium text-xs bg-indigo-800/40 hover:bg-indigo-800/80 focus:bg-slate-200 p-1 rounded-full"
                                    >
                                        <X size={14} />
                                    </button>
                                )}
                            </div>

                            {/* DROPDOWN KẾT QUẢ TÌM KIẾM */}
                            {isSearchFocused && searchQuery.trim() && (
                                <div class="absolute top-full left-0 right-0 mt-2 bg-white rounded-xl shadow-2xl border border-slate-200 max-h-[420px] overflow-y-auto search-scrollbar z-50 text-slate-800 animate-in fade-in slide-in-from-top-1 duration-150">
                                    <div class="p-3 bg-slate-50 border-b border-slate-100 flex justify-between items-center text-xs text-slate-500 font-medium sticky top-0 z-10 backdrop-blur-md bg-white/90">
                                        <span>Tìm thấy {searchResults.total} kết quả hợp lệ</span>
                                        <span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full font-semibold">Toàn hệ thống</span>
                                    </div>

                                    {searchResults.total === 0 ? (
                                        <div class="p-8 text-center text-slate-400 text-sm">
                                            <Search size={32} class="mx-auto mb-2 text-slate-300 stroke-[1.5]" />
                                            Không tìm thấy kết quả nào cho "<span class="font-medium text-slate-600">{searchQuery}</span>"
                                        </div>
                                    ) : (
                                        <div class="p-2 space-y-3">
                                            
                                            {/* Nhóm: Sự kiện lịch */}
                                            {searchResults.events.length > 0 && (
                                                <div>
                                                    <div class="px-2 py-1 text-[11px] font-bold tracking-wider text-amber-600 uppercase flex items-center gap-1.5">
                                                        <Calendar size={12} /> Sự kiện lịch
                                                    </div>
                                                    <div class="mt-1 space-y-0.5">
                                                        {searchResults.events.map(e => (
                                                            <button key={e.id} onClick={() => handleResultClick('events')} class="w-full text-left p-2 hover:bg-slate-50 rounded-lg transition-colors flex items-center justify-between group">
                                                                <div>
                                                                    <div class="text-sm font-medium text-slate-800 group-hover:text-indigo-600 transition-colors">{e.title}</div>
                                                                    <div class="text-xs text-slate-400 flex items-center gap-2 mt-0.5">
                                                                        <span>{e.date}</span>•<span>{e.time}</span>{e.location && <>•<span>{e.location}</span></>}
                                                                    </div>
                                                                </div>
                                                                <ChevronRight size={14} class="text-slate-300 group-hover:text-slate-500 transition-colors" />
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* Nhóm: Ghi chú */}
                                            {searchResults.notes.length > 0 && (
                                                <div class="border-t border-slate-100 pt-2">
                                                    <div class="px-2 py-1 text-[11px] font-bold tracking-wider text-emerald-600 uppercase flex items-center gap-1.5">
                                                        <FileText size={12} /> Ghi chú nghiệp vụ
                                                    </div>
                                                    <div class="mt-1 space-y-0.5">
                                                        {searchResults.notes.map(n => (
                                                            <button key={n.id} onClick={() => handleResultClick('notes')} class="w-full text-left p-2 hover:bg-slate-50 rounded-lg transition-colors flex items-center justify-between group">
                                                                <div class="pr-4 truncate flex-1">
                                                                    <div class="text-sm font-medium text-slate-800 group-hover:text-indigo-600 transition-colors truncate">{n.title}</div>
                                                                    <div class="text-xs text-slate-400 mt-0.5 truncate">{n.content}</div>
                                                                </div>
                                                                <ChevronRight size={14} class="text-slate-300 group-hover:text-slate-500 flex-shrink-0 transition-colors" />
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* Nhóm: Việc cần làm */}
                                            {searchResults.todos.length > 0 && (
                                                <div class="border-t border-slate-100 pt-2">
                                                    <div class="px-2 py-1 text-[11px] font-bold tracking-wider text-blue-600 uppercase flex items-center gap-1.5">
                                                        <CheckSquare size={12} /> Công việc (Todos)
                                                    </div>
                                                    <div class="mt-1 space-y-0.5">
                                                        {searchResults.todos.map(t => (
                                                            <button key={t.id} onClick={() => handleResultClick('todos')} class="w-full text-left p-2 hover:bg-slate-50 rounded-lg transition-colors flex items-center justify-between group">
                                                                <div class="flex items-center gap-2">
                                                                    <span class={`w-1.5 h-1.5 rounded-full ${t.completed ? 'bg-slate-300' : 'bg-blue-500'}`}></span>
                                                                    <span class={`text-sm ${t.completed ? 'line-through text-slate-400' : 'font-medium text-slate-800'} group-hover:text-indigo-600 transition-colors`}>{t.text}</span>
                                                                </div>
                                                                <ChevronRight size={14} class="text-slate-300 group-hover:text-slate-500 transition-colors" />
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* Nhóm: Thời khóa biểu */}
                                            {searchResults.timetable.length > 0 && (
                                                <div class="border-t border-slate-100 pt-2">
                                                    <div class="px-2 py-1 text-[11px] font-bold tracking-wider text-purple-600 uppercase flex items-center gap-1.5">
                                                        <Clock size={12} /> Thời khóa biểu (FET)
                                                    </div>
                                                    <div class="mt-1 space-y-0.5">
                                                        {searchResults.timetable.map(tb => (
                                                            <button key={tb.id} onClick={() => handleResultClick('timetable')} class="w-full text-left p-2 hover:bg-slate-50 rounded-lg transition-colors flex items-center justify-between group">
                                                                <div>
                                                                    <div class="text-sm font-medium text-slate-800 group-hover:text-indigo-600 transition-colors">Môn: {tb.subject} — {tb.class}</div>
                                                                    <div class="text-xs text-slate-400 flex items-center gap-2 mt-0.5">
                                                                        <span class="bg-purple-50 text-purple-700 px-1.5 py-0.5 rounded font-medium text-[10px]">{tb.day}</span>
                                                                        <span>{tb.lesson}</span>
                                                                    </div>
                                                                </div>
                                                                <ChevronRight size={14} class="text-slate-300 group-hover:text-slate-500 transition-colors" />
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* THÔNG TIN NGƯỜI DÙNG & THÔNG BÁO */}
                        <div class="flex items-center gap-2">
                            <button class="p-2 hover:bg-indigo-700 rounded-xl relative transition-colors">
                                <Bell size={18} />
                                <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full"></span>
                            </button>
                            <div class="h-6 w-px bg-indigo-500/40 mx-1 hidden sm:block"></div>
                            <div class="flex items-center gap-2 bg-indigo-700/40 pl-2 pr-3 py-1.5 rounded-xl border border-indigo-500/20 hidden sm:flex">
                                <div class="w-6 h-6 rounded-lg bg-indigo-500 flex items-center justify-center font-bold text-xs shadow-sm">T</div>
                                <span class="text-xs font-medium tracking-wide">Nguyễn Văn Trung</span>
                            </div>
                        </div>
                    </header>

                    {/* KHU VỰC THÂN TRANG & ĐIỀU HƯỚNG CHÍNH */}
                    <div class="flex-1 flex relative">
                        
                        {/* THANH SIDEBAR ĐIỀU HƯỚNG (GIAO DIỆN MÁY TÍNH & DI ĐỘNG) */}
                        <aside class={`bg-white border-r border-slate-200 w-64 p-4 space-y-1 flex-shrink-0 absolute lg:sticky top-[57px] bottom-0 left-0 h-[calc(100vh-57px)] z-40 transition-transform duration-300 lg:transform-none ${isMobileMenuOpen ? 'translate-x-0 shadow-2xl' : '-translate-x-full lg:translate-x-0'}`}>
                            <div class="text-[11px] font-bold text-slate-400 uppercase tracking-wider px-3 mb-2 block">Chức năng chính</div>
                            {[
                                { id: 'dashboard', label: 'Bàn làm việc', icon: Sun },
                                { id: 'events', label: 'Sự kiện lịch', icon: Calendar },
                                { id: 'notes', label: 'Ghi chú nghiệp vụ', icon: FileText },
                                { id: 'todos', label: 'Việc cần làm', icon: CheckSquare },
                                { id: 'timetable', label: 'Thời khóa biểu (FET)', icon: Clock },
                            ].map(tab => {
                                const IconComponent = tab.icon;
                                return (
                                    <button
                                        key={tab.id}
                                        onClick={() => {
                                            setActiveTab(tab.id);
                                            setIsMobileMenuOpen(false);
                                        }}
                                        class={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${activeTab === tab.id ? 'bg-indigo-50 text-indigo-600' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}`}
                                    >
                                        <IconComponent size={18} class={activeTab === tab.id ? 'text-indigo-600' : 'text-slate-400'} />
                                        {tab.label}
                                    </button>
                                );
                            })}
                        </aside>

                        {/* NỀN ĐEN KHI MỞ MENU MOBILE */}
                        {isMobileMenuOpen && (
                            <div onClick={() => setIsMobileMenuOpen(false)} class="fixed inset-0 top-[57px] bg-slate-900/40 backdrop-blur-xs z-30 lg:hidden" />
                        )}

                        {/* NỘI DUNG CHÍNH (MAIN CONTENT) THEO TAB */}
                        <main class="flex-1 p-4 md:p-6 lg:p-8 overflow-x-hidden">
                            
                            {/* TAB: BÀN LÀM VIỆC (DASHBOARD) */}
                            {activeTab === 'dashboard' && (
                                <div class="space-y-6">
                                    <div class="bg-gradient-to-r from-indigo-600 to-violet-600 rounded-2xl p-6 text-white shadow-lg">
                                        <h1 class="text-xl md:text-2xl font-bold">Chào Thầy Trung!</h1>
                                        <p class="text-indigo-100 text-xs md:text-sm mt-1">Chúc Thầy một ngày làm việc hiệu quả tại Xuan Lai Primary and Secondary School.</p>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-xs flex items-center gap-4">
                                            <div class="p-3 bg-amber-50 rounded-xl text-amber-600"><Calendar size={20} /></div>
                                            <div><div class="text-xs text-slate-400 font-medium">Sự kiện sắp tới</div><div class="text-lg font-bold text-slate-800">{events.length}</div></div>
                                        </div>
                                        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-xs flex items-center gap-4">
                                            <div class="p-3 bg-emerald-50 rounded-xl text-emerald-600"><FileText size={20} /></div>
                                            <div><div class="text-xs text-slate-400 font-medium">Ghi chú đã lưu</div><div class="text-lg font-bold text-slate-800">{notes.length}</div></div>
                                        </div>
                                        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-xs flex items-center gap-4">
                                            <div class="p-3 bg-blue-50 rounded-xl text-blue-600"><CheckSquare size={20} /></div>
                                            <div><div class="text-xs text-slate-400 font-medium">Việc chưa làm</div><div class="text-lg font-bold text-slate-800">{todos.filter(t=>!t.completed).length}</div></div>
                                        </div>
                                        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-xs flex items-center gap-4">
                                            <div class="p-3 bg-purple-50 rounded-xl text-purple-600"><Clock size={20} /></div>
                                            <div><div class="text-xs text-slate-400 font-medium">Tiết dạy tuần này</div><div class="text-lg font-bold text-slate-800">{timetable.length}</div></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB: SỰ KIỆN LỊCH */}
                            {activeTab === 'events' && (
                                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs">
                                    <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Calendar class="text-indigo-600" size={20}/> Quản lý Sự kiện lịch</h2>
                                    <div class="space-y-3">
                                        {events.map(e => (
                                            <div key={e.id} class="p-4 rounded-xl border border-slate-100 bg-slate-50 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                                                <div>
                                                    <h3 class="font-semibold text-sm text-slate-800">{e.title}</h3>
                                                    <p class="text-xs text-slate-400 mt-0.5">Địa điểm: {e.location || 'Chưa rõ'}</p>
                                                </div>
                                                <div class="text-xs font-medium text-slate-500 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-2xs self-start sm:self-center">
                                                    {e.date} lúc {e.time}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: GHI CHÚ */}
                            {activeTab === 'notes' && (
                                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs">
                                    <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><FileText class="text-indigo-600" size={20}/> Ghi chú nghiệp vụ</h2>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {notes.map(n => (
                                            <div key={n.id} class="p-4 rounded-xl border border-slate-100 bg-slate-50/50 flex flex-col justify-between">
                                                <div>
                                                    <h3 class="font-bold text-sm text-slate-800">{n.title}</h3>
                                                    <p class="text-xs text-slate-600 mt-2 leading-relaxed">{n.content}</p>
                                                </div>
                                                <div class="text-[10px] font-medium text-slate-400 mt-4 pt-2 border-t border-slate-100 flex justify-between">
                                                    <span>Ngày tạo</span><span>{n.date}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: VIỆC CẦN LÀM */}
                            {activeTab === 'todos' && (
                                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs max-w-2xl">
                                    <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><CheckSquare class="text-indigo-600" size={20}/> Danh sách Việc cần làm</h2>
                                    <div class="divide-y divide-slate-100">
                                        {todos.map(t => (
                                            <div key={t.id} class="py-3 flex items-center justify-between group">
                                                <div class="flex items-center gap-3">
                                                    <input 
                                                        type="checkbox" 
                                                        checked={t.completed} 
                                                        onChange={() => {
                                                            setTodos(todos.map(todo => todo.id === t.id ? {...todo, completed: !todo.completed} : todo));
                                                        }}
                                                        class="w-4 h-4 rounded text-indigo-600 border-slate-300 focus:ring-indigo-500 transition-all cursor-pointer"
                                                    />
                                                    <span class={`text-sm ${t.completed ? 'line-through text-slate-400' : 'text-slate-700 font-medium'}`}>{t.text}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: THỜI KHÓA BIỂU */}
                            {activeTab === 'timetable' && (
                                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs">
                                    <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Clock class="text-indigo-600" size={20}/> Thời khóa biểu phân lịch (FET)</h2>
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-left border-collapse min-w-[500px]">
                                            <thead>
                                                <tr class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-400 uppercase tracking-wider">
                                                    <th class="p-3">Thứ (Ngày)</th>
                                                    <th class="p-3">Tiết dạy</th>
                                                    <th class="p-3">Lớp học</th>
                                                    <th class="p-3">Môn học phụ trách</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-100 text-sm">
                                                {timetable.map(tb => (
                                                    <tr key={tb.id} class="hover:bg-slate-50/80 transition-colors">
                                                        <td class="p-3 font-semibold text-slate-700">{tb.day}</td>
                                                        <td class="p-3 text-slate-500">{tb.lesson}</td>
                                                        <td class="p-3"><span class="bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-md font-medium text-xs">{tb.class}</span></td>
                                                        <td class="p-3 font-medium text-slate-800">{tb.subject}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                        </main>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
