        // --- CẤU HÌNH ĐỐI TƯỢNG INDEXEDDB HELPER PHỤC VỤ OFFLINE BACKGROUND SYNC & LOCAL NOTIFICATIONS ---
        const openIndexedDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('lich_van_trung_db', 2); // Nâng lên version 2 để tạo store cho thông báo
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('sync_queue')) {
                        db.createObjectStore('sync_queue', { keyPath: 'id', autoIncrement: true });
                    }
                    if (!db.objectStoreNames.contains('notification_tasks')) {
                        db.createObjectStore('notification_tasks', { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        };

        const pushToSyncQueue = async (actionType, collectionName, payload, userId) => {
            try {
                const db = await openIndexedDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction('sync_queue', 'readwrite');
                    const store = transaction.objectStore('sync_queue');
                    const data = {
                        action: actionType,
                        collectionName: collectionName,
                        payload: payload,
                        userId: userId,
                        timestamp: Date.now()
                    };
                    const request = store.add(data);
                    request.onsuccess = () => {
                        resolve(true);
                        // Đăng ký Background Sync nếu trình duyệt hỗ trợ
                        if ('serviceWorker' in navigator && 'SyncManager' in window) {
                            navigator.serviceWorker.ready.then(reg => {
                                return reg.sync.register('sync-data');
                            }).then(() => {
                                console.log('[Sync] Đã đăng ký tag sync-data ngầm thành công!');
                            }).catch(err => {
                                console.warn('[Sync] Trình duyệt không thể đăng ký Sync ngầm, sẽ đồng bộ bằng mạng thường:', err);
                            });
                        }
                    };
                    request.onerror = (e) => reject(e.target.error);
                });
            } catch (err) {
                console.error('Lỗi khi ghi dữ liệu tạm vào IndexedDB:', err);
            }
        };

        // Hàm ghi nhận các thông báo đẩy vào IndexedDB để Service Worker tiếp cận khi đóng app
        const saveNotificationTasksToIDB = async (alerts) => {
            try {
                const db = await openIndexedDB();
                const transaction = db.transaction('notification_tasks', 'readwrite');
                const store = transaction.objectStore('notification_tasks');
                
                // Đọc toàn bộ danh sách cũ để giữ nguyên cờ "notified" (Tránh lặp thông báo hệ thống)
                const existingRequest = store.getAll();
                const existingMap = await new Promise((resolve) => {
                    existingRequest.onsuccess = () => {
                        const map = {};
                        existingRequest.result.forEach(r => { map[r.id] = r; });
                        resolve(map);
                    };
                    existingRequest.onerror = () => resolve({});
                });

                // Clear sạch các tác vụ cũ đã lỗi thời
                store.clear();

                // Lưu danh sách tác vụ mới cần nhắc nhở
                for (const alert of alerts) {
                    const existing = existingMap[alert.id];
                    const data = {
                        id: alert.id,
                        title: alert.title,
                        type: alert.type,
                        time: alert.time,
                        notified: existing ? existing.notified : false,
                        timestamp: Date.now()
                    };
                    store.add(data);
                }

                // Gửi thông báo đến Service Worker để cập nhật và bắn cảnh báo lập tức
                if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({ action: 'check-notifications' });
                }
            } catch (e) {
                console.error("Lỗi đồng bộ danh sách thông báo vào IndexedDB:", e);
            }
        };

        const formatDateTimeForInput = (date) => {
            if (!date) return '';
            const d = new Date(date);
            const pad = (n) => n.toString().padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        };

        const formatDisplayDate = (seconds) => {
            if (!seconds) return '';
            return new Date(seconds * 1000).toLocaleString('vi-VN', { hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
        };

        const getRemainingTime = (timestamp) => {
            if (!timestamp) return null;
            const now = new Date();
            const deadline = new Date(timestamp.seconds * 1000);
            const diff = deadline - now;
            if (diff < 0) {
                const overdueDays = Math.floor(Math.abs(diff) / (1000 * 60 * 60 * 24));
                const overdueHours = Math.floor((Math.abs(diff) % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let text = "Quá hạn ";
                if (overdueDays > 0) text += `${overdueDays} ngày`;
                else text += `${overdueHours} giờ`;
                return { text: text, isOverdue: true };
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            if (days > 0) return { text: `Còn ${days} ngày, ${hours} giờ`, isOverdue: false };
            if (hours > 0) return { text: `Còn ${hours} giờ, ${minutes} phút`, isOverdue: false };
            return { text: 'Sắp đến hạn', isOverdue: false };
        };

        const getLunarDate = (date) => {
            try {
                const formatter = new Intl.DateTimeFormat('vi-VN', { calendar: 'chinese', day: 'numeric', month: 'numeric' });
                const parts = formatter.formatToParts(date);
                return `${parts.find(p => p.type === 'day').value}/${parts.find(p => p.type === 'month').value}`;
            } catch (e) { return ''; }
        };

        const getLunarDetails = (date) => {

                const formatter = new Intl.DateTimeFormat('vi-VN', { calendar: 'chinese', day: 'numeric', month: 'numeric' });

                return { 
                    day: parseInt(parts.find(p => p.type === 'day').value),
                    month: parseInt(parts.find(p => p.type === 'month').value)
                };
            } catch (e) { return { day: 0, month: 0 }; }

        const TimeTableView = ({ user, db, appId, theme }) => {
            const [schedule, setSchedule] = useState({});
            const [headers, setHeaders] = useState({ col1: 'Môn - Lớp', col2: 'Ghi chú' });
            
            const [startOfWeekDate, setStartOfWeekDate] = useState(() => {
                const now = new Date();
                const day = now.getDay();
                const diff = now.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(now.setDate(diff));
                monday.setHours(0, 0, 0, 0);
                return monday;
            });

            const periods = [1, 2, 3, 4, 5];

            const weekKey = useMemo(() => {
                const yyyy = startOfWeekDate.getFullYear();
                const target = new Date(startOfWeekDate.valueOf());
                const dayNr = (startOfWeekDate.getDay() + 6) % 7;
                target.setDate(target.getDate() - dayNr + 3);
                const firstThursday = target.valueOf();
                target.setMonth(0, 1);
                if (target.getDay() !== 4) {
                    target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
                }
                const weekNum = 1 + Math.ceil((firstThursday - target) / 604800000);
                return `${yyyy}_w${weekNum}`;
            }, [startOfWeekDate]);

            const tkbRef = useMemo(() => doc(db, 'artifacts', appId, 'users', user.uid, 'timetable', `main_${weekKey}`), [db, appId, user.uid, weekKey]);

            useEffect(() => {
                const unsub = onSnapshot(tkbRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setSchedule(data.schedule || {});
                        if(data.headers) setHeaders(data.headers);
                    } else {
                        setSchedule({});
                        setHeaders({ col1: 'Môn - Lớp', col2: 'Ghi chú' });
                    }
                }, err => {
                    console.warn("Tải thời khóa biểu offline warning (Sử dụng dữ liệu cached):", err);
                });
                return unsub;
            }, [tkbRef]);

            const weekDaysInfo = useMemo(() => {
                const list = [];
                const daysName = ['t2', 't3', 't4', 't5', 't6', 't7'];
                for (let i = 0; i < 6; i++) {
                    const temp = new Date(startOfWeekDate);
                    temp.setDate(startOfWeekDate.getDate() + i);
                    const formattedDate = `${String(temp.getDate()).padStart(2, '0')}/${String(temp.getMonth() + 1).padStart(2, '0')}`;
                    list.push({
                        id: daysName[i],
                        label: `Thứ ${i + 2}`,
                        dateStr: formattedDate
                    });
                }
                return list;
            }, [startOfWeekDate]);

            const weekRangeLabel = useMemo(() => {
                const monday = new Date(startOfWeekDate);
                const sunday = new Date(startOfWeekDate);
                sunday.setDate(startOfWeekDate.getDate() + 6);
                const fMonday = `${String(monday.getDate()).padStart(2, '0')}/${String(monday.getMonth() + 1).padStart(2, '0')}/${monday.getFullYear()}`;
                const fSunday = `${String(sunday.getDate()).padStart(2, '0')}/${String(sunday.getMonth() + 1).padStart(2, '0')}/${sunday.getFullYear()}`;
                return `Tuần: ${fMonday} - ${fSunday}`;
            }, [startOfWeekDate]);

            const changeWeek = (offsetWeeks) => {
                const newMonday = new Date(startOfWeekDate);
                newMonday.setDate(startOfWeekDate.getDate() + (offsetWeeks * 7));
                setStartOfWeekDate(newMonday);
            };

            const saveData = async (path, value) => {
                // Tích hợp IndexedDB Offline-First cho TKB
                if (!navigator.onLine) {
                    await pushToSyncQueue('set', `timetable/main_${weekKey}`, { schedule: { [path]: value } }, user.uid);
                    setSchedule(prev => ({ ...prev, [path]: value }));
                    toast.info("Đã lưu tạm Thời khóa biểu vào bộ nhớ thiết bị!", { position: "top-center" });
                } else {
                    try {
                        await setDoc(tkbRef, { schedule: { [path]: value } }, { merge: true });
                        setSchedule(prev => ({ ...prev, [path]: value }));
                    } catch (e) {
                        await pushToSyncQueue('set', `timetable/main_${weekKey}`, { schedule: { [path]: value } }, user.uid);
                        setSchedule(prev => ({ ...prev, [path]: value }));
                        toast.info("Đã lưu tạm thời trong khi mất kết nối mạng!", { position: "top-center" });
                    }
                }
            };

            const saveHeader = async (key, value) => {
                const newHeaders = { ...headers, [key]: value };
                setHeaders(newHeaders);
                if (!navigator.onLine) {
                    await pushToSyncQueue('set', `timetable/main_${weekKey}`, { headers: newHeaders }, user.uid);
                } else {
                    try {
                        await setDoc(tkbRef, { headers: newHeaders }, { merge: true });
                    } catch (e) {
                        await pushToSyncQueue('set', `timetable/main_${weekKey}`, { headers: newHeaders }, user.uid);
                    }
                }
            };

            return (
                <div className="h-full flex flex-col px-4 pb-4 pt-2" style={{ color: theme.textColor }}>
                    <h2 className="text-xl font-bold mb-1 text-center shrink-0">Thời Khoá Biểu</h2>
                    
                    {/* BỘ ĐIỀU HƯỚNG TUẦN */}
                    <div className="flex items-center justify-between mb-3 bg-white p-3 rounded-xl shadow-sm border border-slate-100 shrink-0 text-slate-800">
                        <button 
                            onClick={() => changeWeek(-1)} 
                            className="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition flex items-center gap-1 text-xs font-bold"
                        >
                            <ChevronLeft size={16} /> Tuần trước
                        </button>
                        <span className="text-xs font-bold text-slate-700 text-center tracking-tight">{weekRangeLabel}</span>
                        <button 
                            onClick={() => changeWeek(1)} 
                            className="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition flex items-center gap-1 text-xs font-bold"
                        >
                            Tuần sau <ChevronRight size={16} />
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto rounded-xl shadow-sm border border-slate-200 mb-4 bg-white">
                        <table className="w-full text-sm border-collapse table-fixed">
                            <thead className="sticky top-0 bg-gray-100 z-10 shadow-sm">
                                <tr className="text-gray-700">
                                    <th className="border p-2 w-14 bg-gray-100 text-center align-middle text-xs font-bold">Thứ</th>
                                    <th className="border p-2 w-10 bg-gray-100 text-center text-xs font-bold">Tiết</th>
                                    <th className="border p-0 min-w-[100px] bg-gray-100">
                                        <input className="w-full bg-transparent text-center font-bold p-2 outline-none placeholder-gray-400 text-slate-800 text-xs" value={headers.col1} onChange={e=>saveHeader('col1', e.target.value)} placeholder="Môn - Lớp" />
                                    </th>
                                    <th className="border p-0 min-w-[100px] bg-gray-100">
                                        <input className="w-full bg-transparent text-center font-bold p-2 outline-none placeholder-gray-400 text-slate-800 text-xs" value={headers.col2} onChange={e=>saveHeader('col2', e.target.value)} placeholder="Ghi chú" />
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                {weekDaysInfo.map(day => (
                                    <React.Fragment key={day.id}>
                                        {periods.map((period, index) => (
                                            <tr key={`${day.id}_${period}`} className="border-b hover:bg-gray-50">
                                                {index === 0 && (
                                                    <td className="border p-1 align-middle bg-gray-50 text-gray-600 text-center" rowSpan={5}>
                                                        <div className="flex flex-col h-full justify-center items-center gap-0.5">
                                                            {/* HIỂN THỊ THỨ VÀ NGÀY THÁNG ĐƯỢC TỰ ĐỘNG TÍNH TOÁN */}
                                                            <div className="font-extrabold text-xs text-slate-800">{day.label}</div>
                                                            <div className="text-[10px] text-slate-400 font-bold bg-slate-200/50 px-1.5 py-0.5 rounded-full">{day.dateStr}</div>
                                                        </div>
                                                    </td>
                                                )}
                                                <td className="border p-2 text-center text-gray-400 font-bold text-xs align-middle">{period}</td>
                                                <td className="border p-0 align-middle">
                                                    <textarea 
                                                        className="w-full h-full p-2 outline-none bg-transparent resize-none overflow-hidden text-slate-800 text-xs leading-tight" 
                                                        rows={1}
                                                        value={schedule[`${day.id}_${period}_col1`] || ''}
                                                        onChange={(e) => setSchedule({...schedule, [`${day.id}_${period}_col1`]: e.target.value})}
                                                        onBlur={(e) => saveData(`${day.id}_${period}_col1`, e.target.value)}
                                                    />
                                                </td>
                                                <td className="border p-0 align-middle">
                                                    <textarea 
                                                        className="w-full h-full p-2 outline-none bg-transparent resize-none overflow-hidden text-slate-800 text-xs leading-tight" 
                                                        rows={1}
                                                        value={schedule[`${day.id}_${period}_col2`] || ''}
                                                        onChange={(e) => setSchedule({...schedule, [`${day.id}_${period}_col2`]: e.target.value})}
                                                        onBlur={(e) => saveData(`${day.id}_${period}_col2`, e.target.value)}
                                                    />
                                                </td>
                                            </tr>
                                        ))}
                                    </React.Fragment>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };
        // END: Thêm điều hướng tuần và ngày tự động vào TKB

        // --- MÀN HÌNH LỊCH NGÀY (DAILY VIEW) ---
        const DailyView = ({ user, db, appId, today, setToday }) => {
            const [weather, setWeather] = useState(null);
            const [verses, setVerses] = useState([]);
            const [currentVerse, setCurrentVerse] = useState(DEFAULT_VERSES[0]);
            const [animClass, setAnimClass] = useState('');
            const [locationName, setLocationName] = useState('Hanoi');
            const [searchQuery, setSearchQuery] = useState('');
            const [todayEvents, setTodayEvents] = useState([]);
            const [isNewYearWish, setIsNewYearWish] = useState(false);
            
            const [viewMode, setViewMode] = useState('verse');
            const [showMenu, setShowMenu] = useState(false);
            const [showAddVerse, setShowAddVerse] = useState(false);
            const [newVerse, setNewVerse] = useState('');
            const [deleteVerseText, setDeleteVerseText] = useState(null);

            const [touchStart, setTouchStart] = useState(null);
            const onTouchStart = (e) => {
                if (e.touches.length > 1) return;
                setTouchStart(e.targetTouches[0].clientX);
            }
            const onTouchEnd = (e) => {
                if (!touchStart || e.changedTouches.length > 1) return;
                const distance = touchStart - e.changedTouches[0].clientX;
                const newDate = new Date(today);
                if (distance > 50) { 
                    setAnimClass('anim-next');
                    setTimeout(() => { newDate.setDate(today.getDate() + 1); setToday(newDate); setAnimClass(''); }, 400);
                }
                if (distance < -50) { 
                    setAnimClass('anim-prev');
                    setTimeout(() => { newDate.setDate(today.getDate() - 1); setToday(newDate); setAnimClass(''); }, 400);
                }
                setTouchStart(null);
            }
            
            const goNextDay = () => { setAnimClass('anim-next'); setTimeout(() => { const d = new Date(today); d.setDate(today.getDate()+1); setToday(d); setAnimClass(''); }, 300); }
            const goPrevDay = () => { setAnimClass('anim-prev'); setTimeout(() => { const d = new Date(today); d.setDate(today.getDate()-1); setToday(d); setAnimClass(''); }, 300); }
            const stopSwipe = (e) => e.stopPropagation();

            useEffect(() => {
                const isNewYear = today.getDate() === 1 && today.getMonth() === 0;
                if (isNewYear) {
                     setCurrentVerse(`Nhân dịp năm mới ${today.getFullYear()}.\nXin kính chúc mọi người và gia đình một năm mới dồi dào sức khỏe, hạnh phúc và bình an!"\n\n_ Văn Trung`);
                     setIsNewYearWish(true);
                } else {
                     setIsNewYearWish(false);
                     const allVerses = [...DEFAULT_VERSES, ...verses.map(v => v.text)];
                     if(allVerses.length > 0) setCurrentVerse(allVerses[Math.floor(Math.random() * allVerses.length)]);
                }
            }, [today, verses]);

            const verseRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'verses'), [db, appId, user.uid]);
            useEffect(() => onSnapshot(query(verseRef), snap => { const data = snap.docs.map(d => ({id: d.id, ...d.data()})); setVerses(data); }), [verseRef]);

            const eventsRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'events'), [db, appId, user.uid]);
            useEffect(() => onSnapshot(query(eventsRef), snap => {
                const allEvents = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const dateStr = today.toDateString();
                const lunar = getLunarDetails(today);
                const todays = allEvents.filter(e => {
                    if (!e.repeat || e.repeat === 'none') return e.date && new Date(e.date.seconds * 1000).toDateString() === dateStr;
                    if (e.repeat === 'lunar') return e.lunarDay === lunar.day && e.lunarMonth === lunar.month;
                    if (e.repeat === 'solar' && e.date) { const d = new Date(e.date.seconds * 1000); return d.getDate() === today.getDate() && d.getMonth() === today.getMonth(); }
                    if (e.repeat === 'weekly') { const d = new Date(e.date.seconds * 1000); return d.getDay() === today.getDay(); }
                    if (e.repeat === 'monthly') { const d = new Date(e.date.seconds * 1000); return d.getDate() === today.getDate(); }
                    return false;
                });
                setTodayEvents(todays);
            }), [today, eventsRef]);

            useEffect(() => {
                const fetchWeather = async () => {
                    try {
                        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${locationName}&count=1&language=vi&format=json`);
                        const geoData = await geoRes.json();
                        if (geoData.results && geoData.results.length > 0) {
                            const { latitude, longitude } = geoData.results[0];
                            const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`);
                            const weatherData = await weatherRes.json();
                            setWeather(weatherData.daily);
                        }
                    } catch (e) { console.error("Lỗi thời tiết", e); }
                };
                if (viewMode === 'weather') fetchWeather();
            }, [locationName, viewMode]);

            const handleSearch = (e) => { e.preventDefault(); if(searchQuery.trim()) { setLocationName(searchQuery); } };
            
            const handleAddVerse = async () => {
                if (newVerse.trim()) {
                    const payload = { text: newVerse, createdAt: { seconds: Math.floor(Date.now() / 1000) } };
                    if (!navigator.onLine) {
                        await pushToSyncQueue('add', 'verses', payload, user.uid);
                        toast.info("Đã lưu tạm câu danh ngôn ngoại tuyến!", { position: "top-center" });
                        setShowAddVerse(false);
                        setNewVerse('');
                    } else {
                        try {
                            await addDoc(verseRef, { text: newVerse, createdAt: serverTimestamp() });
                            setNewVerse('');
                            setShowAddVerse(false);
                        } catch (err) {
                            await pushToSyncQueue('add', 'verses', payload, user.uid);
                            setNewVerse('');
                            setShowAddVerse(false);
                        }
                    }
                }
            };
            
            const handleDeleteVerse = async (text) => {
                const verseToDelete = verses.find(v => v.text === text);
                if (!verseToDelete) {
                    toast.warning("Đây là danh ngôn hệ thống, không thể xóa.", { position: "top-center" });
                    return;
                }
                if (deleteVerseText === text) {
                    if (!navigator.onLine) {
                        await pushToSyncQueue('delete', 'verses', { id: verseToDelete.id }, user.uid);
                        toast.info("Sẽ xóa danh ngôn khi thiết bị kết nối mạng!", { position: "top-center" });
                    } else {
                        try {
                            await deleteDoc(doc(verseRef, verseToDelete.id));
                            toast.success("Đã xóa danh ngôn thành công!", { position: "top-center" });
                        } catch (e) {
                            await pushToSyncQueue('delete', 'verses', { id: verseToDelete.id }, user.uid);
                        }
                    }
                    setDeleteVerseText(null);
                    getRandomVerse();
                } else {
                    setDeleteVerseText(text);
                    toast.info("Nhấn nút Xóa một lần nữa để xác nhận xóa danh ngôn này.", { position: "top-center" });
                    setTimeout(() => setDeleteVerseText(null), 3000);
                }
            };

            const bgImage = isNewYearWish 
                ? "https://images.unsplash.com/photo-1516132006923-6cf348e5dee2?q=80&w=1000&auto=format&fit=crop" 
                : BACKGROUNDS[today.getDate() % BACKGROUNDS.length];
                
            const getRandomVerse = () => { const allVerses = [...DEFAULT_VERSES, ...verses.map(v => v.text)]; setCurrentVerse(allVerses[Math.floor(Math.random() * allVerses.length)]); };
            const getWeatherIcon = (code) => {
                if (code <= 3) return <Sun size={20} className="text-yellow-400"/>;
                if (code <= 60) return <Cloud size={20} className="text-gray-200"/>;
                return <CloudRain size={20} className="text-blue-300"/>;
            };
            const weekDays = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
            const getVerseFontSize = (text) => { const len = text.length; if (len < 50) return 'text-xl'; if (len < 100) return 'text-lg'; if (len < 200) return 'text-sm'; return 'text-xs'; };

            const renderCenterContent = () => {
                if (viewMode === 'weather') {
                    return (
                        <div className="w-full" onTouchStart={stopSwipe} onTouchEnd={stopSwipe}>
                            <form onSubmit={handleSearch} className="flex items-center gap-2 mb-4 bg-white/20 p-2 rounded-lg w-full">
                                <button type="submit" className="p-1 hover:bg-white/10 rounded">
                                     <Search size={16} className="text-white shrink-0"/>
                                </button>
                                <input className="flex-1 bg-transparent outline-none text-white placeholder-white/70 text-sm font-bold text-right" placeholder="Nhập tên TP..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} />
                            </form>
                             <div className="text-xs font-bold uppercase text-yellow-300 text-center mb-2">{locationName}</div>

                            <div className="flex justify-between overflow-x-auto no-scrollbar gap-2 pb-2">
                                {weather ? weather.time.slice(0, 7).map((t, i) => (
                                    <div key={t} className="flex flex-col items-center min-w-[40px] bg-black/20 p-2 rounded-lg">
                                        <span className="text-[10px] opacity-80 mb-1">{weekDays[new Date(t).getDay()]}</span>
                                        <div className="my-1 scale-90">{getWeatherIcon(weather.weathercode[i])}</div>
                                        <div className="text-[10px] flex flex-col items-center">
                                            <span className="font-bold">{Math.round(weather.temperature_2m_max[i])}°</span>
                                            <span className="opacity-60">{Math.round(weather.temperature_2m_min[i])}°</span>
                                        </div>
                                    </div>
                                )) : <span className="text-xs animate-pulse">Đang tải dữ liệu...</span>}
                            </div>
                        </div>
                    );
                }

                if (viewMode === 'events') {
                     return (
                        <div className="w-full h-full overflow-y-auto no-scrollbar" onTouchStart={stopSwipe} onTouchEnd={stopSwipe}>
                            <h4 className="text-sm font-bold mb-2 border-b border-white/20 pb-1">Sự kiện hôm nay</h4>
                            {todayEvents.length === 0 ? <p className="text-center text-xs opacity-60 mt-4">Không có sự kiện nào.</p> : (
                                <ul className="space-y-2">{todayEvents.map(e => (<li key={e.id} className="text-sm bg-white/10 p-2 rounded flex items-center gap-2"><Bell size={12} className="text-yellow-300" /><span>{e.title}</span></li>))}</ul>
                            )}
                        </div>
                    );
                }

                return (
                    <div className="text-center w-full flex flex-col h-full relative">
                        {showAddVerse ? (
                             <div className="flex flex-col gap-2 h-full" onTouchStart={stopSwipe} onTouchEnd={stopSwipe}>
                                <textarea className="flex-1 bg-white/20 rounded p-2 text-sm text-white placeholder-white/50 outline-none resize-none" placeholder="Nhập câu danh ngôn..." value={newVerse} onChange={e=>setNewVerse(e.target.value)}></textarea>
                                <div className="flex gap-2 justify-end">
                                    <button onClick={()=>setShowAddVerse(false)} className="text-xs bg-gray-500/50 px-2 py-1 rounded">Hủy</button>
                                    <button onClick={handleAddVerse} className="text-xs bg-blue-500 px-2 py-1 rounded">Lưu</button>
                                </div>
                             </div>
                        ) : (
                            <>
                                <div className="flex justify-end gap-2 mb-1 absolute bottom-1 right-1">
                                     <button onClick={(e)=>{e.stopPropagation(); setShowAddVerse(true)}} className="p-1 opacity-40 hover:opacity-100"><Plus size={12}/></button>
                                     <button onClick={(e)=>{e.stopPropagation(); handleDeleteVerse(currentVerse)}} className={`p-1 opacity-40 hover:opacity-100 transition-colors ${deleteVerseText === currentVerse ? 'text-red-500 bg-white/20 rounded px-1 animate-pulse font-bold' : 'text-red-300'}`}>
                                         {deleteVerseText === currentVerse ? 'Nhấn lại' : <Trash2 size={12}/>}
                                     </button>
                                </div>
                                <div className={`flex-1 flex flex-col items-center justify-center font-sans font-medium leading-relaxed whitespace-pre-wrap ${getVerseFontSize(currentVerse)} overflow-y-auto no-scrollbar`} onClick={getRandomVerse}>
                                    <div>"{currentVerse}"</div>
                                    {isNewYearWish && <div className="text-right italic mt-2 text-sm font-normal w-full px-4">_ Văn Trung</div>}
                                </div>
                                <div className="text-[10px] mt-2 opacity-40 flex items-center justify-center gap-1 shrink-0"><BookOpen size={10}/> Chạm để đổi câu khác</div>
                            </>
                        )}
                    </div>
                );
            };

            return (
                <div className="h-full flex flex-col relative text-white overflow-hidden perspective-container" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
                    <div className="absolute inset-0 bg-gray-900 z-0">
                        <img src={bgImage} className="w-full h-full object-cover opacity-80 transition-opacity duration-500" alt="background" />
                    </div>
                    
                    <button onClick={goPrevDay} className="absolute left-4 top-1/2 -translate-y-1/2 z-40 p-2 bg-black/20 hover:bg-black/50 rounded-full text-white/50 hover:text-white transition"><ChevronLeft size={32}/></button>
                    <button onClick={goNextDay} className="absolute right-4 top-1/2 -translate-y-1/2 z-40 p-2 bg-black/20 hover:bg-black/50 rounded-full text-white/50 hover:text-white transition"><ChevronRight size={32}/></button>

                    <div className={`relative z-10 flex-1 flex flex-col items-center gap-2 overflow-hidden ${animClass}`}>
                        
                        <div className="text-center drop-shadow-lg mt-12 z-20 flex-shrink-0 cursor-pointer hover:scale-105 transition-transform" onClick={() => setToday(new Date())} title="Về hôm nay">
                            <p className="text-2xl font-light uppercase tracking-widest mb-1 text-white/90">{getDayOfWeek(today)}</p>
                            <h2 className="text-[7rem] md:text-[8rem] font-bold leading-none text-white">{today.getDate()}</h2>
                            <p className="text-xl mt-2 font-medium text-white/90">Tháng {today.getMonth() + 1} - {today.getFullYear()}</p>
                            <div className="mt-4 inline-block bg-white/20 backdrop-blur-sm px-6 py-2 rounded-full text-base border border-white/30 font-serif">
                                Âm lịch: {getLunarDate(today)}
                            </div>
                        </div>

                        <div className="w-full max-w-md mt-auto relative group z-30 flex-1 flex flex-col justify-end pb-0">
                            <div className="bg-black/20 backdrop-blur-sm rounded-t-2xl p-6 border-t border-x border-white/10 flex-1 flex flex-col justify-center items-center relative transition-all duration-300">
                                <div className="absolute top-3 right-3">
                                    <button onClick={(e) => { e.stopPropagation(); setShowMenu(!showMenu); }} className="p-1 opacity-60 hover:opacity-100 transition bg-black/20 rounded-full"><MoreVertical size={16} /></button>
                                    {showMenu && (
                                        <div className="absolute right-0 top-8 bg-white text-gray-800 rounded-lg shadow-xl w-32 py-1 z-50 fade-in overflow-hidden text-sm font-medium">
                                            <button onClick={() => { setViewMode('verse'); setShowMenu(false); }} className={`block w-full text-left px-4 py-2 hover:bg-gray-100 ${viewMode==='verse'?'text-blue-600 bg-blue-50':''}`}>Danh ngôn</button>
                                            <button onClick={() => { setViewMode('weather'); setShowMenu(false); }} className={`block w-full text-left px-4 py-2 hover:bg-gray-100 ${viewMode==='weather'?'text-blue-600 bg-blue-50':''}`}>Thời tiết</button>
                                            <button onClick={() => { setViewMode('events'); setShowMenu(false); }} className={`block w-full text-left px-4 py-2 hover:bg-gray-100 ${viewMode==='events'?'text-blue-600 bg-blue-50':''}`}>Sự kiện</button>
                                        </div>
                                    )}
                                </div>
                                {renderCenterContent()}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const CalendarView = ({ user, db, appId, currentDate, setCurrentDate, selectedDate, setSelectedDate, onTabChange, theme }) => {
            const [events, setEvents] = useState([]);
            const [showEventModal, setShowEventModal] = useState(false);
            const [animClass, setAnimClass] = useState('');
            const [touchStart, setTouchStart] = useState(null);
            
            const onTouchStart = (e) => { 
                if (e.touches.length > 1) return; 
                setTouchStart(e.targetTouches[0].clientX); 
            };
            
            const onTouchEnd = (e) => {
                if (!touchStart || e.changedTouches.length > 1) return;
                const distance = touchStart - e.changedTouches[0].clientX;
                if (distance > 50) { 
                    setAnimClass('anim-next'); 
                    setTimeout(() => { 
                        setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1)); 
                        setAnimClass(''); 
                    }, 300); 
                }
                if (distance < -50) { 
                    setAnimClass('anim-prev'); 
                    setTimeout(() => { 
                        setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1)); 
                        setAnimClass(''); 
                    }, 300); 
                }
                setTouchStart(null);
            };

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startDayIndex = new Date(year, month, 1).getDay() === 0 ? 6 : new Date(year, month, 1).getDay() - 1;
            const days = Array(startDayIndex).fill(null).concat(Array.from({length: daysInMonth}, (_, i) => new Date(year, month, i + 1)));

            const eventsRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'events'), [db, appId, user.uid]);
            useEffect(() => onSnapshot(query(eventsRef), snap => setEvents(snap.docs.map(d => ({id: d.id, ...d.data()})))), [eventsRef]);
            
            const hasEvent = (date) => {
                if (!date) return false;
                const dateStr = date.toDateString();
                const lunar = getLunarDetails(date);
                return events.some(e => {
                    if (!e.repeat || e.repeat === 'none') {
                        return e.date && new Date(e.date.seconds * 1000).toDateString() === dateStr;
                    }
                    if (e.repeat === 'lunar') {
                        return e.lunarDay === lunar.day && e.lunarMonth === lunar.month;
                    }
                    if (e.repeat === 'solar' && e.date) {
                        const d = new Date(e.date.seconds * 1000);
                        return d.getDate() === date.getDate() && d.getMonth() === date.getMonth();
                    }
                    if (e.repeat === 'weekly' && e.date) {
                        const d = new Date(e.date.seconds * 1000);
                        return d.getDay() === date.getDay();
                    }
                    if (e.repeat === 'monthly' && e.date) {
                        const d = new Date(e.date.seconds * 1000);
                        return d.getDate() === date.getDate();
                    }
                    return false;
                });
            };

            const getEventsForDate = (date) => {
                if (!date) return [];
                const dateStr = date.toDateString();
                const lunar = getLunarDetails(date);
                return events.filter(e => {
                    if (!e.repeat || e.repeat === 'none') return e.date && new Date(e.date.seconds * 1000).toDateString() === dateStr;
                    if (e.repeat === 'lunar') return e.lunarDay === lunar.day && e.lunarMonth === lunar.month;
                    if (e.repeat === 'solar' && e.date) { const d = new Date(e.date.seconds * 1000); return d.getDate() === date.getDate() && d.getMonth() === date.getMonth(); }
                    if (e.repeat === 'weekly' && e.date) { const d = new Date(e.date.seconds * 1000); return d.getDay() === date.getDay(); }
                    if (e.repeat === 'monthly' && e.date) { const d = new Date(e.date.seconds * 1000); return d.getDate() === date.getDate(); }
                    return false;
                });
            };

            const handleAddEvent = async (title, repeatType) => {
                const payload = { 
                    title, 
                    date: { seconds: Math.floor(selectedDate.getTime() / 1000) }, 
                    repeat: repeatType 
                };
                if (repeatType === 'lunar') { 
                    const lunar = getLunarDetails(selectedDate); 
                    payload.lunarDay = lunar.day; 
                    payload.lunarMonth = lunar.month; 
                }

                if (!navigator.onLine) {
                    await pushToSyncQueue('add', 'events', payload, user.uid);
                    toast.info("Đã lưu tạm Sự kiện ngoại tuyến!", { position: "top-center" });
                } else {
                    try {
                        const data = { title, date: Timestamp.fromDate(selectedDate), repeat: repeatType };
                        if (repeatType === 'lunar') { 
                            const lunar = getLunarDetails(selectedDate); 
                            data.lunarDay = lunar.day; 
                            data.lunarMonth = lunar.month; 
                        }
                        await addDoc(eventsRef, data);
                    } catch (e) {
                        await pushToSyncQueue('add', 'events', payload, user.uid);
                        toast.info("Đã tạm lưu sự kiện trong IndexedDB!", { position: "top-center" });
                    }
                }
            };

            const getDayColor = (index) => {
                if (index === 5) return 'text-[#84cc16]'; 
                if (index === 6) return 'text-[#ec4899]'; 
                return 'text-slate-500'; 
            };
            return (
                <div className="p-4 select-none perspective-container" style={{ color: theme.textColor }} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
                    <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-150">
                        <button onClick={() => setCurrentDate(new Date(year, month - 1, 1))} className="p-2 hover:bg-gray-100 rounded-full"><ChevronLeft className="text-gray-600" /></button>
                        <h2 className="text-lg font-bold uppercase text-gray-800">Tháng {month + 1} / {year}</h2>
                        <button onClick={() => setCurrentDate(new Date(year, month + 1, 1))} className="p-2 hover:bg-gray-100 rounded-full"><ChevronRight className="text-gray-600" /></button>
                    </div>
                    <div className="grid grid-cols-7 gap-1 text-center mb-2">
                        {['T2','T3','T4','T5','T6','T7','CN'].map((d, i) => <div key={d} className={`text-sm font-bold ${getDayColor(i)}`}>{d}</div>)}
                    </div>
                    <div className={`grid grid-cols-7 gap-1 ${animClass}`}>
                        {days.map((date, idx) => {
                            if(!date) return <div key={idx} className="aspect-square"/>;
                            const isSel = date.toDateString() === selectedDate.toDateString();
                            const isToday = date.toDateString() === new Date().toDateString();
                            const dayOfWeek = date.getDay();
                            let textColor = 'text-gray-800';
                            if (dayOfWeek === 6) textColor = 'text-[#84cc16]'; 
                            if (dayOfWeek === 0) textColor = 'text-[#ec4899]'; 
                            if (isSel) textColor = 'text-white';
                            return (
                                <button key={idx} onClick={() => { setSelectedDate(date); setShowEventModal(true); }} className={`aspect-square flex flex-col items-center justify-center rounded-xl transition-all relative ${isSel ? 'bg-blue-600 shadow-md transform scale-105' : 'bg-white hover:bg-blue-50 border border-gray-100'} ${isToday && !isSel ? 'border-2 border-blue-600' : ''}`}>
                                    <span className={`font-bold ${textColor}`}>{date.getDate()}</span>
                                    <span className={`text-[9px] ${isSel?'text-blue-100':'text-gray-400'}`}>{getLunarDate(date)}</span>
                                    {hasEvent(date) && <div className={`w-1.5 h-1.5 rounded-full mt-0.5 ${isSel ? 'bg-white' : 'bg-red-500'}`}></div>}
                                </button>
                            )
                        })}
                    </div>
                    <div className="mt-6 flex justify-center gap-2">
                         <button onClick={() => setShowEventModal(true)} className="bg-blue-600 text-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 text-sm font-bold active:scale-95 transition-transform"><Plus size={16}/> Thêm sự kiện</button>
                         <button onClick={() => onTabChange('day')} className="bg-slate-800 text-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 text-sm font-bold active:scale-95 transition-transform">Hôm nay</button>
                    </div>
                    {showEventModal && <EventModal 
                        date={selectedDate} 
                        events={getEventsForDate(selectedDate)} 
                        onClose={() => setShowEventModal(false)} 
                        onAdd={handleAddEvent} 
                        onDelete={async (id) => {
                            if (!navigator.onLine) {
                                await pushToSyncQueue('delete', 'events', { id }, user.uid);
                                toast.info("Đã ghi nhận yêu cầu xóa ngoại tuyến!", { position: "top-center" });
                            } else {
                                try {
                                    await deleteDoc(doc(eventsRef, id));
                                } catch (e) {
                                    await pushToSyncQueue('delete', 'events', { id }, user.uid);
                                }
                            }
                        }} 
                        onUpdate={async (id, newTitle, newDateStr, newRepeat) => {
                            const newDate = newDateStr ? Timestamp.fromDate(new Date(newDateStr)) : null;
                            const updatePayload = { title: newTitle, repeat: newRepeat };
                            if (newDate) {
                                updatePayload.date = { seconds: Math.floor(new Date(newDateStr).getTime() / 1000) };
                                if (newRepeat === 'lunar') {
                                    const d = new Date(newDateStr);
                                    const lunar = getLunarDetails(d);
                                    updatePayload.lunarDay = lunar.day;
                                    updatePayload.lunarMonth = lunar.month;
                                }
                            }

                            if (!navigator.onLine) {
                                await pushToSyncQueue('update', 'events', { id, ...updatePayload }, user.uid);
                                toast.info("Ghi nhận cập nhật ngoại tuyến!", { position: "top-center" });
                            } else {
                                try {
                                    const rawUpdate = { title: newTitle, repeat: newRepeat };
                                    if (newDate) {
                                        rawUpdate.date = newDate;
                                        if (newRepeat === 'lunar') {
                                            const d = new Date(newDateStr);
                                            const lunar = getLunarDetails(d);
                                            rawUpdate.lunarDay = lunar.day;
                                            rawUpdate.lunarMonth = lunar.month;
                                        }
                                    }
                                    await updateDoc(doc(eventsRef, id), rawUpdate);
                                } catch (e) {
                                    await pushToSyncQueue('update', 'events', { id, ...updatePayload }, user.uid);
                                }
                            }
                        }}
                    />}
                </div>
            );
        };

        const EventModal = ({ date, events, onClose, onAdd, onDelete, onUpdate }) => {
            const [newEvent, setNewEvent] = useState('');
            const [repeatType, setRepeatType] = useState('none'); 
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const [editingId, setEditingId] = useState(null);
            const [editTitle, setEditTitle] = useState('');
            const [editDate, setEditDate] = useState('');
            const [editRepeat, setEditRepeat] = useState('none');

            const handleStartEdit = (eItem) => {
                setEditingId(eItem.id);
                setEditTitle(eItem.title);
                const d = eItem.date ? new Date(eItem.date.seconds * 1000) : date;
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                setEditDate(`${yyyy}-${mm}-${dd}`);
                setEditRepeat(eItem.repeat || 'none');
            };

            const handleSaveEdit = async (id) => {
                if (!editTitle.trim()) return;
                await onUpdate(id, editTitle, editDate, editRepeat);
                setEditingId(null);
            };

            const lunar = getLunarDetails(date);
            const handleDelete = (id) => {
                if (deleteConfirm === id) { onDelete(id); setDeleteConfirm(null); } 
                else { setDeleteConfirm(id); setTimeout(() => setDeleteConfirm(null), 3000); }
            };
            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={(e)=>e.stopPropagation()}>
                    <div className="bg-white w-full max-w-sm rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[80%]" onClick={(e)=>e.stopPropagation()}>
                        <div className="bg-blue-600 p-4 text-white flex justify-between items-center">
                            <div><h3 className="font-bold">Sự kiện {date.getDate()}/{date.getMonth()+1}</h3><span className="text-xs opacity-80">Âm lịch: {lunar.day}/{lunar.month}</span></div>
                            <button onClick={onClose}><X size={20}/></button>
                        </div>
                        <div className="p-4 overflow-y-auto flex-1">
                            {events.length === 0 && <p className="text-center text-gray-400 py-4">Chưa có sự kiện nào.</p>}
                            <ul className="space-y-2">
                                {events.map(e => {
                                    if (editingId === e.id) {
                                        return (
                                            <li key={e.id} className="flex flex-col gap-2 bg-blue-50 p-3 rounded text-sm text-gray-800">
                                                <div className="flex flex-col gap-1 w-full">
                                                    <input 
                                                        type="text" 
                                                        value={editTitle} 
                                                        onChange={ev => setEditTitle(ev.target.value)} 
                                                        className="border rounded px-2 py-1 text-sm outline-none focus:border-blue-500 text-slate-800 w-full"
                                                    />
                                                    <div className="flex gap-2">
                                                        <input 
                                                            type="date" 
                                                            value={editDate} 
                                                            onChange={ev => setEditDate(ev.target.value)} 
                                                            className="border rounded px-2 py-1 text-xs outline-none focus:border-blue-500 text-slate-800 flex-1"
                                                        />
                                                        <select 
                                                            value={editRepeat} 
                                                            onChange={ev => setEditRepeat(ev.target.value)} 
                                                            className="border rounded px-2 py-1 text-xs outline-none focus:border-blue-500 text-slate-800"
                                                        >
                                                            <option value="none">Không lặp</option>
                                                            <option value="lunar">Lặp Âm</option>
                                                            <option value="solar">Lặp Dương</option>
                                                            <option value="weekly">Tuần</option>
                                                            <option value="monthly">Tháng</option>
                                                        </select>
                                                    </div>
                                                </div>
                                                <div className="flex justify-end gap-2 mt-1">
                                                    <button onClick={() => setEditingId(null)} className="p-1 rounded text-gray-400 hover:text-gray-600" title="Hủy"><X size={16} /></button>
                                                    <button onClick={() => handleSaveEdit(e.id)} className="p-1 rounded text-green-600 hover:text-green-850" title="Lưu"><Check size={16} /></button>
                                                </div>
                                            </li>
                                        );
                                    }
                                    return (
                                        <li key={e.id} className="flex justify-between items-center bg-blue-50 p-2 rounded text-sm text-gray-800">
                                            <div className="flex items-center gap-2 min-w-0 flex-1">
                                                {e.repeat === 'lunar' && <span className="text-[10px] bg-purple-100 text-purple-700 px-1 rounded shrink-0 font-sans font-medium">Âm</span>}
                                                {e.repeat === 'solar' && <span className="text-[10px] bg-orange-100 text-orange-700 px-1 rounded shrink-0 font-sans font-medium">Dương</span>}
                                                {e.repeat === 'weekly' && <span className="text-[10px] bg-indigo-100 text-indigo-700 px-1 rounded shrink-0 font-sans font-medium">Tuần</span>}
                                                {e.repeat === 'monthly' && <span className="text-[10px] bg-sky-100 text-sky-700 px-1 rounded shrink-0 font-sans font-medium">Tháng</span>}
                                                <span className="truncate">{e.title}</span>
                                            </div>
                                            <div className="flex items-center gap-2 shrink-0">
                                                <button onClick={() => handleStartEdit(e)} className="text-gray-400 hover:text-blue-600 p-1" title="Sửa sự kiện"><Pencil size={15}/></button>
                                                <button onClick={() => handleDelete(e.id)} className={`transition-all shrink-0 ${deleteConfirm === e.id ? 'text-red-600 font-bold text-xs bg-red-100 px-2 py-1 rounded' : 'text-red-400 hover:text-red-600'}`}>{deleteConfirm === e.id ? <span>Xóa?</span> : <Trash2 size={16}/>}</button>
                                            </div>
                                        </li>
                                    );
                                })}
                            </ul>
                        </div>
                        <div className="p-4 border-t bg-gray-50 flex flex-col gap-2">
                            <div className="flex gap-2 text-[10px] mb-1 text-gray-700 flex-wrap">
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'none'} onChange={() => setRepeatType('none')} /> Không lặp</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'lunar'} onChange={() => setRepeatType('lunar')} /> Lặp Âm</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'solar'} onChange={() => setRepeatType('solar')} /> Lặp Dương</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'weekly'} onChange={() => setRepeatType('weekly')} /> Tuần</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'monthly'} onChange={() => setRepeatType('monthly')} /> Tháng</label>
                            </div>
                            <div className="flex gap-2">
                                <input className="flex-1 border rounded px-3 py-2 text-sm outline-none focus:border-blue-500 text-slate-800" placeholder="Tên sự kiện..." value={newEvent} onChange={e => setNewEvent(e.target.value)} />
                                <button onClick={() => { if(newEvent.trim()) { onAdd(newEvent, repeatType); setNewEvent(''); } }} className="bg-blue-600 text-white p-2 rounded hover:bg-blue-700"><Plus size={20}/></button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const TodoEditor = ({ initialText, initialReminder, initialDeadline, isNew, onSave, onCancel }) => {
            const [text, setText] = useState(initialText || '');
            const [reminder, setReminder] = useState(initialReminder || '');
            const [deadline, setDeadline] = useState(initialDeadline || '');
            return (
                <div className="fixed inset-0 bg-white z-40 flex flex-col animate-in slide-in-from-bottom-5">
                    <div className="flex justify-between items-center p-4 border-b bg-gray-50">
                        <button onClick={onCancel} className="p-2 hover:bg-gray-200 rounded-full"><X size={20}/></button> 
                        <h3 className="font-bold text-gray-700">{isNew ? 'Thêm Việc' : 'Sửa Việc'}</h3>
                        <button onClick={()=>onSave(text, reminder, deadline)} className="text-blue-600 font-bold p-2"><Check size={18}/> Lưu</button>
                    </div>
                    <div className="p-4 flex-1 flex flex-col gap-4">
                        <div><label className="text-xs font-bold text-slate-500 block mb-1">Nội dung</label><input className="w-full text-lg border-b p-2 outline-none focus:border-blue-500 bg-transparent text-slate-800 font-bold" placeholder="Ví dụ: Đi chợ..." value={text} onChange={e=>setText(e.target.value)} autoFocus /></div>
                        <div><label className="text-xs font-bold text-slate-500 block mb-1 flex items-center gap-1"><AlertCircle size={12}/> Hạn chót (Deadline)</label><input type="datetime-local" className="w-full border rounded p-2 text-sm bg-gray-50 text-slate-800 outline-none" value={deadline} onChange={e=>setDeadline(e.target.value)} /></div>
                        <div><label className="text-xs font-bold text-slate-500 block mb-1 flex items-center gap-1"><Clock size={12}/> Nhắc tôi trước (Reminder)</label><input type="datetime-local" className="w-full border rounded p-2 text-sm bg-gray-50 text-slate-800 outline-none" value={reminder} onChange={e=>setReminder(e.target.value)} /></div>
                    </div>
                </div>
            );
        };

        const TodoView = ({ user, db, appId, theme }) => {
            const [todos, setTodos] = useState([]);
            const [editing, setEditing] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const todoRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'todos'), [db, appId, user.uid]);
            
            useEffect(() => {
                const unsub = onSnapshot(query(todoRef), snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    data.sort((a, b) => {
                        const aActiveDeadline = !a.completed && a.deadlineTime;
                        const bActiveDeadline = !b.completed && b.deadlineTime;

                        if (aActiveDeadline && !bActiveDeadline) return -1;
                        if (!aActiveDeadline && bActiveDeadline) return 1;

                        if (aActiveDeadline && bActiveDeadline) {
                            const aSecs = a.deadlineTime.seconds || 0;
                            const bSecs = b.deadlineTime.seconds || 0;
                            if (aSecs !== bSecs) {
                                return aSecs - bSecs;
                            }
                        }

                        if (a.order !== undefined && b.order !== undefined) {
                            return a.order - b.order;
                        }
                        return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
                    });
                    setTodos(data);
                });
                return unsub;
            }, [todoRef]);

            const save = async (text, reminderStr, deadlineStr) => {
                const reminderData = reminderStr ? { seconds: Math.floor(new Date(reminderStr).getTime() / 1000) } : null;
                const deadlineData = deadlineStr ? { seconds: Math.floor(new Date(deadlineStr).getTime() / 1000) } : null;
                
                const payload = { 
                    text, 
                    reminderTime: reminderData, 
                    deadlineTime: deadlineData,
                    completed: false,
                    order: Date.now()
                };

                if (editing.id) {
                    if (!navigator.onLine) {
                        await pushToSyncQueue('update', 'todos', { id: editing.id, ...payload }, user.uid);
                        toast.info("Đã ghi nhận sửa đổi ngoại tuyến!", { position: "top-center" });
                    } else {
                        try {
                            const rTime = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                            const dTime = deadlineStr ? Timestamp.fromDate(new Date(deadlineStr)) : null;
                            await updateDoc(doc(todoRef, editing.id), { text, reminderTime: rTime, deadlineTime: dTime });
                        } catch (e) {
                            await pushToSyncQueue('update', 'todos', { id: editing.id, ...payload }, user.uid);
                        }
                    }
                } else {
                    payload.createdAt = { seconds: Math.floor(Date.now() / 1000) };
                    if (!navigator.onLine) {
                        await pushToSyncQueue('add', 'todos', payload, user.uid);
                        toast.info("Đã ghi nhận công việc mới ngoại tuyến!", { position: "top-center" });
                    } else {
                        try {
                            const rTime = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                            const dTime = deadlineStr ? Timestamp.fromDate(new Date(deadlineStr)) : null;
                            await addDoc(todoRef, { text, completed: false, reminderTime: rTime, deadlineTime: dTime, createdAt: serverTimestamp(), order: Date.now() });
                        } catch (e) {
                            await pushToSyncQueue('add', 'todos', payload, user.uid);
                        }
                    }
                }
                setEditing(null);
            };
            
            const handleDelete = async (e, id) => {
                e.stopPropagation();
                if (deleteConfirm === id) {
                    if (!navigator.onLine) {
                        await pushToSyncQueue('delete', 'todos', { id }, user.uid);
                        toast.info("Ghi nhận xóa công việc ngoại tuyến!", { position: "top-center" });
                    } else {
                        try {
                            await deleteDoc(doc(todoRef, id));
                        } catch (e) {
                            await pushToSyncQueue('delete', 'todos', { id }, user.uid);
                        }
                    }
                    setDeleteConfirm(null);
                } else { 
                    setDeleteConfirm(id); 
                    setTimeout(() => setDeleteConfirm(prev => prev === id ? null : prev), 3000); 
                }
            };
            
            const moveItem = async (e, index, direction) => {
                e.stopPropagation();
                if ((direction === -1 && index === 0) || (direction === 1 && index === todos.length - 1)) return;
                const itemA = todos[index];
                const itemB = todos[index + direction];
                const orderA = itemB.order || Date.now();
                const orderB = itemA.order || Date.now();
                
                if (!navigator.onLine) {
                    await pushToSyncQueue('update', 'todos', { id: itemA.id, order: orderA }, user.uid);
                    await pushToSyncQueue('update', 'todos', { id: itemB.id, order: orderB }, user.uid);
                    toast.info("Ghi nhận sắp xếp ngoại tuyến!", { position: "top-center" });
                } else {
                    try {
                        await updateDoc(doc(todoRef, itemA.id), { order: orderA });
                        await updateDoc(doc(todoRef, itemB.id), { order: orderB });
                    } catch (err) {
                        await pushToSyncQueue('update', 'todos', { id: itemA.id, order: orderA }, user.uid);
                        await pushToSyncQueue('update', 'todos', { id: itemB.id, order: orderB }, user.uid);
                    }
                }
            };
            return (
                <div className="p-4 pb-24 min-h-full" style={{ color: theme.textColor }}>
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-xl font-bold">Danh sách việc</h2>
                        <button onClick={()=>setEditing({})} className="bg-blue-100 text-blue-600 px-3 py-2 rounded-lg flex items-center gap-1 text-sm font-bold"><Plus size={16}/> Mới</button>
                    </div>
                    <div className="space-y-2">
                        {todos.map((t, idx) => {
                            const timeStatus = t.deadlineTime ? getRemainingTime(t.deadlineTime) : null;
                            return (
                                <div key={t.id} onClick={() => setEditing(t)} className="group flex items-center p-3 bg-white rounded-lg shadow-sm border border-gray-100 cursor-pointer hover:bg-gray-50">
                                    <div className="flex flex-col mr-2 text-gray-300" onClick={e => e.stopPropagation()}>
                                        <button onClick={(e)=>moveItem(e, idx, -1)} className="hover:text-blue-500 p-0.5"><ArrowUp size={14}/></button>
                                        <button onClick={(e)=>moveItem(e, idx, 1)} className="hover:text-blue-500 p-0.5"><ArrowDown size={14}/></button>
                                    </div>
                                    <div className="mt-1 mr-3 cursor-pointer text-gray-400" onClick={(e) => { 
                                        e.stopPropagation(); 
                                        if (!navigator.onLine) {
                                            pushToSyncQueue('update', 'todos', { id: t.id, completed: !t.completed }, user.uid);
                                            toast.info("Đã đánh dấu ngoại tuyến!", { position: "top-center" });
                                        } else {
                                            updateDoc(doc(todoRef, t.id), {completed: !t.completed}); 
                                        }
                                    }}>
                                        {t.completed ? <CheckSquare className="text-green-500"/> : <div className="w-5 h-5 border-2 rounded"></div>}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className={`font-medium truncate ${t.completed ? 'line-through text-gray-400' : ''}`} style={{ color: t.completed ? '#9ca3af' : theme.textColor }}>{t.text}</div>
                                        <div className="flex gap-3 mt-1 flex-wrap">
                                            {t.deadlineTime && <div className={`text-[10px] flex items-center gap-1 ${timeStatus?.isOverdue && !t.completed ? 'text-red-600 font-bold' : 'text-gray-500'}`}><AlertCircle size={10}/> {t.completed ? `Thời hạn: ${formatDisplayDate(t.deadlineTime.seconds)}` : timeStatus?.text}</div>}
                                            {t.reminderTime && !t.completed && <div className="text-[10px] text-orange-500 flex items-center gap-1"><Bell size={10} /> Nhắc: {formatDisplayDate(t.reminderTime.seconds)}</div>}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-2 shrink-0" onClick={e => e.stopPropagation()}>
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); setEditing(t); }} 
                                            className="p-1 rounded text-gray-400 hover:text-blue-500 hover:bg-blue-50 transition-colors"
                                            title="Sửa"
                                        >
                                            <Pencil size={16}/>
                                        </button>
                                        <button onClick={(e) => handleDelete(e, t.id)} className={`p-1 rounded transition-all ${deleteConfirm === t.id ? 'bg-red-100 text-red-600 w-16 text-xs font-bold' : 'text-gray-300 hover:text-red-500'}`}>{deleteConfirm === t.id ? <span>Xóa?</span> : <Trash2 size={16}/>}</button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    {editing && <TodoEditor initialText={editing.text} initialReminder={editing.reminderTime ? formatDateTimeForInput(editing.reminderTime.seconds*1000) : ''} initialDeadline={editing.deadlineTime ? formatDateTimeForInput(editing.deadlineTime.seconds*1000) : ''} isNew={!editing.id} onSave={save} onCancel={() => setEditing(null)} />}
                </div>
            );
        };

        const NoteEditor = ({ initialTitle, initialContent, initialReminder, initialColor, isNew, onSave, onCancel }) => {
            const [title, setTitle] = useState(initialTitle || '');
            const [content, setContent] = useState(initialContent || '');
            const [reminder, setReminder] = useState(initialReminder || '');
            const [color, setColor] = useState(initialColor || '#FEFCE8'); 
            return (
                <div className="fixed inset-0 bg-white z-40 flex flex-col animate-in slide-in-from-bottom-5">
                    <div className="flex justify-between items-center p-4 border-b">
                        <button onClick={onCancel}><X/></button> <button onClick={()=>onSave(title, content, reminder, color)} className="text-blue-600 font-bold"><Save/> Lưu</button>
                    </div>
                    <div className="px-4 py-2 bg-gray-50 flex gap-3 overflow-x-auto no-scrollbar items-center">
                        <span className="text-xs text-slate-700 font-bold mr-1">Màu:</span>
                        {NOTE_COLORS.map(c => (
                            <button key={c} onClick={() => setColor(c)} className={`w-8 h-8 rounded-full border border-gray-300 shadow-sm transition-transform hover:scale-110 ${color === c ? 'ring-2 ring-blue-500 ring-offset-2' : ''}`} style={{ backgroundColor: c }} />
                        ))}
                    </div>
                    <div className="px-4 py-2 bg-gray-50 border-b flex items-center gap-2">
                        <Bell size={16} className="text-gray-500"/>
                        <span className="text-xs text-gray-600 font-medium">Nhắc tôi vào:</span>
                        <input type="datetime-local" className="bg-white border rounded px-2 py-1 text-xs text-gray-700 outline-none" value={reminder} onChange={e=>setReminder(e.target.value)} />
                    </div>
                    <div className="p-4 flex-1 flex flex-col gap-4" style={{ backgroundColor: color }}>
                        <input className="text-2xl font-bold outline-none placeholder-gray-400 bg-transparent text-slate-800" placeholder="Tiêu đề" value={title} onChange={e=>setTitle(e.target.value)} />
                        <textarea className="flex-1 resize-none outline-none text-slate-700 leading-relaxed placeholder-gray-400 bg-transparent" placeholder="Nội dung..." value={content} onChange={e=>setContent(e.target.value)} />
                    </div>
                </div>
            );
        };

        const NotesView = ({ user, db, appId, theme }) => {
            const [notes, setNotes] = useState([]);
            const [editing, setEditing] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const noteRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'notes'), [db, appId, user.uid]);
            useEffect(() => onSnapshot(query(noteRef), snap => setNotes(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.updatedAt?.seconds||0) - (a.updatedAt?.seconds||0)))), [noteRef]);
            
            const save = async (title, content, reminderStr, color) => {
                const reminderData = reminderStr ? { seconds: Math.floor(new Date(reminderStr).getTime() / 1000) } : null;
                const payload = { 
                    title: title || 'K.Tiêu đề', 
                    content: content || '', 
                    reminderTime: reminderData, 
                    color: color, 
                    updatedAt: { seconds: Math.floor(Date.now() / 1000) } 
                };

                if (editing.id) {
                    if (!navigator.onLine) {
                        await pushToSyncQueue('update', 'notes', { id: editing.id, ...payload }, user.uid);
                        toast.info("Đã ghi nhận sửa đổi ghi chú ngoại tuyến!", { position: "top-center" });
                    } else {
                        try {
                            const rTime = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                            await updateDoc(doc(noteRef, editing.id), { title: title||'K.Tiêu đề', content: content||'', reminderTime: rTime, color: color, updatedAt: serverTimestamp() });
                        } catch (e) {
                            await pushToSyncQueue('update', 'notes', { id: editing.id, ...payload }, user.uid);
                        }
                    }
                } else {
                    if (!navigator.onLine) {
                        await pushToSyncQueue('add', 'notes', payload, user.uid);
                        toast.info("Đã ghi nhận ghi chú mới ngoại tuyến!", { position: "top-center" });
                    } else {
                        try {
                            const rTime = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                            await addDoc(noteRef, { title: title||'K.Tiêu đề', content: content||'', reminderTime: rTime, color: color, updatedAt: serverTimestamp() });
                        } catch (e) {
                            await pushToSyncQueue('add', 'notes', payload, user.uid);
                        }
                    }
                }
                setEditing(null);
            };

            const handleDelete = async (e, id) => {
                e.stopPropagation();
                if (deleteConfirm === id) {
                    if (!navigator.onLine) {
                        await pushToSyncQueue('delete', 'notes', { id }, user.uid);
                        toast.info("Ghi nhận yêu cầu xóa ghi chú ngoại tuyến!", { position: "top-center" });
                    } else {
                        try {
