                        <div className="bg-amber-50/60 border border-amber-200 rounded-2xl p-6 shadow-xs relative flex-1 flex flex-col justify-center max-h-[180px]">
                            <div className="absolute top-2 left-2 bg-amber-600 text-white px-2.5 py-0.5 rounded-full text-[9px] font-black uppercase">Âm lịch</div>
                            <span className="text-4xl font-black text-amber-700 my-1 block">Ngày {lDate.day}</span>
                            <span className="text-xs font-bold text-amber-800 uppercase">Tháng {lDate.month}</span>
                        </div>
                        <div className="p-3 bg-slate-800 text-slate-200 rounded-xl text-left border shadow-md flex items-start gap-2.5 shrink-0">
                            <BookOpen size={16} className="text-amber-400 shrink-0 mt-0.5" />
                            <div className="flex flex-col">
                                <span className="text-[9px] font-bold text-amber-400 uppercase tracking-wider mb-0.5">Lời Vàng Pháp Cú (Bài {verseIndex + 1})</span>
                                <p className="text-xs font-medium leading-relaxed italic text-slate-100 whitespace-pre-wrap">{DEFAULT_VERSES[verseIndex]}</p>
                            </div>
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-blue-500 font-bold">Đang tải ứng dụng...</div>;
            if (!user) return <AuthScreen auth={getAuth(app)} appId={MANUAL_CONFIG.projectId} />;

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto shadow-2xl overflow-hidden relative transition-colors duration-300 animate-fade-in" style={{ backgroundColor: theme.bgColor, color: theme.textColor }}>
                    {/* KHU VỰC CHỈ BÁO OFFLINE MINI TẠI HEADER */}
                    {isOffline && (
                        <div className="bg-amber-500 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none animate-pulse z-50">
                            <WifiOff size={10} /> Đang chạy ngoại tuyến (Offline Mode)
                        </div>
                    )}
                    {showOfflineBadge && !isOffline && (
                        <div className="bg-emerald-600 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none z-50">
                            <Wifi size={10} /> Đã khôi phục kết nối trực tuyến (Online)
                        </div>
                    )}

                    <header className="bg-blue-600 text-white p-2.5 flex justify-between items-center shadow-md z-20 shrink-0 gap-2">
                        <div className="flex items-center gap-2 overflow-hidden flex-1">
                            <div className="bg-white/10 p-1.5 rounded-lg shrink-0 cursor-pointer hover:bg-white/20 transition" onClick={() => handleTabChange('calendar')}>
                                <CalendarDays size={18} />
                            </div>
                            <div className="flex flex-col overflow-hidden leading-tight">
                                <h1 className="text-sm font-black truncate uppercase tracking-tight">Lịch Văn Trung</h1>
                                <span className="text-[9px] font-bold opacity-80 truncate">{user.email}</span>
                            </div>
                        </div>

                        {/* THANH TÌM KIẾM TOÀN CỤC TRÊN HEADER */}
                        <div className="relative flex items-center">
                            <div className="flex items-center bg-white/10 rounded-lg overflow-hidden border border-white/10 focus-within:border-white/40 focus-within:bg-white/20 transition px-2 py-1 max-w-[140px] sm:max-w-[180px]">
                                <Search size={14} className="text-white/70 mr-1.5 shrink-0" />
                                <input type="text" placeholder="Tìm nhanh..." value={searchKeyword} onChange={(e) => { setSearchKeyword(e.target.value); if(e.target.value.trim()) setShowSearchModal(true); }} className="bg-transparent text-xs text-white placeholder-white/60 outline-none w-full font-medium" />
                                {searchKeyword && <X size={12} className="text-white/60 hover:text-white ml-1 cursor-pointer shrink-0" onClick={() => { setSearchKeyword(''); setShowSearchModal(false); }} />}
                            </div>

                            {/* POPUP HIỂN THỊ KẾT QUẢ TÌM KIẾM TOÀN CỤC */}
                            {showSearchModal && searchKeyword.trim() && (
                                <div className="absolute top-9 right-0 w-64 bg-white rounded-xl shadow-2xl border border-slate-200 max-h-64 overflow-y-auto no-scrollbar z-50 fade-in text-slate-800">
                                    <div className="p-2 border-b bg-gray-50 flex justify-between items-center">
                                        <span className="text-[10px] font-bold text-gray-500 uppercase">Kết quả ({searchResults.length})</span>
                                        <button onClick={() => setShowSearchModal(false)} className="text-gray-400 hover:text-gray-600"><X size={12}/></button>
                                    </div>
                                    <div className="divide-y divide-slate-100">
                                        {searchResults.map(item => (
                                            <div key={`${item.searchType}-${item.id}`} onClick={() => handleSearchResultClick(item)} className="p-2 hover:bg-blue-50 transition cursor-pointer flex flex-col">
                                                <div className="flex justify-between items-center mb-0.5">
                                                    <span className="text-[9px] font-black uppercase text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded">{item.searchType}</span>
                                                    <span className="text-[8px] text-gray-400 font-semibold">{item.subText && item.subText.slice(0, 18)}</span>
                                                </div>
                                                <span className="text-xs font-bold text-slate-800 truncate">{item.mainText}</span>
                                            </div>
                                        ))}
                                        {searchResults.length === 0 && (
                                            <p className="text-[11px] text-gray-400 text-center py-6 italic">Không có dữ liệu trùng khớp.</p>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="flex items-center gap-1 shrink-0">
                            <button onClick={() => setShowSettings(true)} className="p-1.5 hover:bg-white/10 rounded-lg transition"><Settings size={16}/></button>
                            <button onClick={handleLogout} className="p-1.5 hover:bg-red-600 rounded-lg transition text-red-100"><LogOut size={16}/></button>
                        </div>
                    </header>

                    {/* MODAL CHECK CODE PIN BẢO VỆ TỪNG TAB RIÊNG BIỆT */}
                    {pendingTab && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xs rounded-2xl shadow-2xl p-5 text-center text-slate-800 animate-in fade-in">
                                <div className="bg-blue-50 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 shadow-inner">
                                    <Lock size={22} />
                                </div>
                                <h3 className="font-bold text-sm text-slate-900 mb-1">Mã PIN Bảo Mật</h3>
                                <p className="text-xs text-gray-400 mb-4">Mục này đã được khóa. Hãy nhập mã PIN cấu hình để tiếp tục truy cập.</p>
                                <form onSubmit={verifyPinProtection} className="space-y-3">
                                    <input type="password" maxLength={12} className="w-full text-center border-2 rounded-xl py-2 font-black tracking-widest text-slate-800 outline-none focus:border-blue-500 bg-gray-50 text-base" placeholder="••••" value={pinInput} onChange={e => setPinInput(e.target.value)} autoFocus />
                                    {pinError && <p className="text-red-500 text-[10px] font-bold">{pinError}</p>}
                                    <div className="flex gap-2 pt-1">
                                        <button type="button" onClick={() => setPendingTab(null)} className="flex-1 border text-slate-500 text-xs font-bold py-2 rounded-xl hover:bg-gray-50">Hủy bỏ</button>
                                        <button type="submit" className="flex-1 bg-blue-600 text-white text-xs font-bold py-2 rounded-xl hover:bg-blue-700 shadow-md">Xác thực</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* KHU VỰC CHỨA NỘI DUNG CHÍNH (MAIN BODY VIEW) */}
                    <main className="flex-1 flex flex-col overflow-hidden relative">
                        {activeTab === 'calendar' && renderCalendarView()}
                        {activeTab === 'day' && renderDailyView()}
                        {activeTab === 'todo' && <TodoView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} />}
                        {activeTab === 'notes' && <NoteView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} />}
                        {activeTab === 'timetable' && <TimetableView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} />}
                    </main>

                    {/* MODAL CẢNH BÁO NHẮC VIỆC (SYSTEM ALERT POPUP CHẠY NGẦM) */}
                    {activeAlerts.length > 0 && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xs rounded-2xl shadow-2xl p-4 text-slate-800 border overflow-hidden max-h-[80vh] flex flex-col animate-in fade-in">
                                <div className="text-amber-500 flex items-center gap-1.5 mb-2 shrink-0">
                                    <Bell size={18} className="animate-bounce" />
                                    <h3 className="font-black text-xs uppercase tracking-wider">Cảnh báo công việc</h3>
                                </div>
                                <div className="space-y-2 overflow-y-auto no-scrollbar flex-1 pb-2">
                                    {activeAlerts.map(alert => (
                                        <div key={alert.id} className="p-2.5 bg-slate-50 border rounded-xl flex flex-col gap-1 shadow-2xs">
                                            {editingAlertId === alert.id ? (
                                                <div className="space-y-2 text-left">
                                                    <input type="text" className="w-full border rounded px-2 py-1 text-xs text-slate-800 font-bold bg-white" value={editAlertTitle} onChange={e => setEditAlertTitle(e.target.value)} />
                                                    <input type="datetime-local" className="w-full border rounded px-2 py-1 text-xs text-slate-800 bg-white" value={editAlertTimeStr} onChange={e => setEditAlertTimeStr(e.target.value)} />
                                                    <div className="flex gap-1">
                                                        <button onClick={() => setEditingAlertId(null)} className="flex-1 border text-gray-500 text-[10px] py-1 rounded font-bold">Hủy</button>
                                                        <button onClick={() => handleAlertSave(alert)} className="flex-1 bg-blue-600 text-white text-[10px] py-1 rounded font-bold">Lưu</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <>
                                                    <div className="flex justify-between items-start gap-1">
                                                        <span className="text-[9px] font-black uppercase bg-amber-50 text-amber-700 px-1.5 py-0.5 rounded shrink-0">{alert.type}</span>
                                                        <span className="text-[9px] text-gray-400 font-bold shrink-0">{alert.time}</span>
                                                    </div>
                                                    <p className="text-xs font-bold text-slate-800 leading-tight">{alert.title}</p>
                                                    <div className="flex justify-end gap-2 mt-1">
                                                        <button onClick={() => {
                                                            setEditingAlertId(alert.id);
                                                            setEditAlertTitle(alert.title);
                                                            setEditAlertTimeStr(alert.rawTime ? new Date(alert.rawTime.seconds * 1000).toISOString().slice(0,16) : '');
                                                        }} className="text-[10px] text-blue-600 font-bold bg-white border px-2 py-0.5 rounded shadow-2xs flex items-center gap-0.5"><Pencil size={10}/> Sửa nhanh</button>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setActiveAlerts([])} className="w-full bg-slate-800 text-white text-xs font-black py-2 rounded-xl hover:bg-slate-700 mt-2 tracking-wide uppercase shadow-md shrink-0">Bỏ qua tất cả</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL THÊM SỰ KIỆN LỊCH THÁNG */}
                    {showSettings === 'events' && (
                        <EventListModal date={selectedDate} events={globalEvents.filter(evt => {
                            if(!evt.date) return false;
                            const eD = new Date(evt.date.seconds * 1000);
                            const lunar = getLunarDate(selectedDate);
                            if(evt.repeat === 'solar') return eD.getDate() === selectedDate.getDate() && eD.getMonth() === selectedDate.getMonth();
                            if(evt.repeat === 'lunar') return eD.getDate() === lunar.day && eD.getMonth() === lunar.month;
                            if(evt.repeat === 'weekly') return eD.getDay() === selectedDate.getDay();
                            if(evt.repeat === 'monthly') return eD.getDate() === selectedDate.getDate();
                            return eD.toDateString() === selectedDate.toDateString();
                        })} onAdd={async (title, repeat) => {
                            await addDoc(collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'events'), { title, repeat, date: Timestamp.fromDate(selectedDate), createdAt: serverTimestamp() });
                        }} onDelete={async (id) => {
                            await deleteDoc(doc(collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'events'), id));
                        }} onClose={() => setShowSettings(false)} />
                    )}

                    {/* MODAL THIẾT LẬP GIAO DIỆN MÀU SẮC */}
                    {showSettings === true && (
                        <SettingsModal theme={theme} onSave={handleSaveTheme} onClose={() => setShowSettings(false)} auth={getAuth(app)} db={db} appId={MANUAL_CONFIG.projectId} />
                    )}

                    {/* THANH ĐIỀU HƯỚNG TAB CHÍNH DƯỚI ĐÁY ỨNG DỤNG (NAVIGATION BOTTOM BAR) */}
                    <footer className="bg-white border-t border-slate-200 p-1 flex justify-around items-center shadow-inner z-20 shrink-0">
                        <button onClick={() => handleTabChange('calendar')} className={`flex flex-col items-center p-1.5 transition text-slate-500 ${activeTab === 'calendar' ? 'text-blue-600 font-bold transform scale-105' : 'hover:text-blue-500'}`}>
                            <Calendar size={18} />
                            <span className="text-[9px] mt-0.5 tracking-tight">Lịch Tháng</span>
                        </button>
                        <button onClick={() => handleTabChange('day')} className={`flex flex-col items-center p-1.5 transition text-slate-500 ${activeTab === 'day' ? 'text-blue-600 font-bold transform scale-105' : 'hover:text-blue-500'}`}>
                            <Sun size={18} />
                            <span className="text-[9px] mt-0.5 tracking-tight">Lịch Ngày</span>
                        </button>
                        <button onClick={() => handleTabChange('todo')} className={`flex flex-col items-center p-1.5 transition text-slate-500 ${activeTab === 'todo' ? 'text-blue-600 font-bold transform scale-105' : 'hover:text-blue-500'}`}>
                            <CheckSquare size={18} />
                            <span className="text-[9px] mt-0.5 tracking-tight">Việc Cần Làm</span>
                        </button>
                        <button onClick={() => handleTabChange('notes')} className={`flex flex-col items-center p-1.5 transition text-slate-500 ${activeTab === 'notes' ? 'text-blue-600 font-bold transform scale-105' : 'hover:text-blue-500'}`}>
                            <StickyNote size={18} />
                            <span className="text-[9px] mt-0.5 tracking-tight">Ghi Chú</span>
                        </button>
                        <button onClick={() => handleTabChange('timetable')} className={`flex flex-col items-center p-1.5 transition text-slate-500 ${activeTab === 'timetable' ? 'text-blue-600 font-bold transform scale-105' : 'hover:text-blue-500'}`}>
                            <Table size={18} />
                            <span className="text-[9px] mt-0.5 tracking-tight">Thời Khóa Biểu</span>
                        </button>
                    </footer>
                    
                    {/* TOAST CONTAINER PHỤC VỤ HIỂN THỊ THÔNG BÁO POPUP */}
                    <ToastContainer 
                        position="top-center"
                        autoClose={3000}
                        hideProgressBar={false}
                        newestOnTop={false}
                        closeOnClick
                        rtl={false}
                    />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
