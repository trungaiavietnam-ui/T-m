<body class="bg-slate-50 text-slate-800 antialiased selection:bg-blue-500 selection:text-white">

    <script type="babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Calendar as CalendarIcon, ChevronLeft, ChevronRight, Plus, CheckCircle, 
            Clock, AlertCircle, Trash2, ListTodo, Sun, Moon, Sparkles, User, 
            LogOut, Lock, Mail, Search, X, CheckSquare, Square, RefreshCw, ChevronDown, MessageSquare
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDoc } from 'firebase/firestore';
        import { ToastContainer, toast } from 'react-toastify';

        // --- HỆ THỐNG DỮ LIỆU KINH PHÁP CÚ TRÍ TUỆ ---
        const PHAP_CU_LIST = [
            { id: 1, text: "Ý dẫn đầu các pháp, ý làm chủ, ý tạo. Nếu với ý ô nhiễm, nói năng hay hành động, khổ não bước theo sau, như xe chân vật kéo." },
            { id: 2, text: "Ý dẫn đầu các pháp, ý làm chủ, ý tạo. Nếu với ý thanh tịnh, nói năng hay hành động, an lạc bước theo sau, như bóng không rời hình." },
            { id: 3, text: "Nó mắng tôi, đánh tôi, nó thắng tôi, cướp tôi. Ai tâm ôm hiềm hận, hận thù không thể nguôi." },
            { id: 4, text: "Nó mắng tôi, đánh tôi, nó thắng tôi, cướp tôi. Ai tâm bỏ hiềm hận, hận thù tự nhiên nguôi." },
            { id: 5, text: "Với hận diệt hận thù, đời này không có được. Từ bi diệt hận thù, là định luật ngàn thu." }
        ];

        // --- THUẬT TOÁN ĐỔI LỊCH ÂM DƯƠNG 2026 ĐƠN GIẢN ---
        const AM_LICH_2026 = {
            1: { offset: -12, name: "Ất Sửu" }, 2: { offset: -12, name: "Bính Dần" },
            3: { offset: -11, name: "Đinh Mão" }, 4: { offset: -11, name: "Mậu Thìn" },
            5: { offset: -11, name: "Kỷ Tị" }, 6: { offset: -11, name: "Canh Ngọ" },
            7: { offset: -10, name: "Tân Mùi" }, 8: { offset: -10, name: "Nhâm Thân" },
            9: { offset: -10, name: "Quý Dậu" }, 10: { offset: -9, name: "Giáp Tuất" },
            11: { offset: -9, name: "Ất Hợi" }, 12: { offset: -9, name: "Bính Tý" }
        };

        function tinhLichAm(ngay, thang, nam) {
            if (nam !== 2026) return { ngayAm: ngay, thangAm: thang, chiMonth: "Bính Ngọ" };
            const MonthCfg = AM_LICH_2026[thang];
            let ngayAm = ngay + MonthCfg.offset;
            let thangAm = thang;
            
            if (ngayAm <= 0) {
                const prevMonthDays = new Date(nam, thang - 1, 0).getDate();
                const prevCfg = AM_LICH_2026[thang - 1] || { offset: -12 };
                ngayAm = day + prevMonthDays + prevCfg.offset;
                thangAm = thang - 1 || 12;
            }
            return { ngayAm, thangAm, chiMonth: MonthCfg.name };
        }

        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAs-FakeKeyForStructureOnly_TrungNguyen",
            authDomain: "xuanlai-hub.firebaseapp.com",
            projectId: "xuanlai-hub",
            storageBucket: "xuanlai-hub.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234:web:abcd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CẤU PHẦN ỨNG DỤNG CHÍNH ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [todos, setTodos] = useState([]);
            const [notes, setNotes] = useState([]);
            const [events, setEvents] = useState([]);
            
            // Tìm kiếm toàn cục nâng cấp
            const [globalSearchQuery, setGlobalSearchQuery] = useState('');
            const [isSearchFocused, setIsSearchFocused] = useState(false);
            const searchContainerRef = useRef(null);

            // Giao diện mẫu & Bộ gõ dữ liệu mới
            const [activeTab, setActiveTab] = useState('calendar');
            const [newTodoText, setNewTodoText] = useState('');
            const [newTodoTime, setNewTodoTime] = useState('08:00');

            // Nạp dữ liệu Offline-First ban đầu
            useEffect(() => {
                const storedTodos = localStorage.getItem('local_todos');
                if (storedTodos) setTodos(JSON.parse(storedTodos));
                
                // Giả lập dữ liệu sự kiện nghiệp vụ trường Xuan Lai
                setEvents([
                    { id: 'ev1', title: 'Họp Hội đồng Sư phạm đầu tuần', date: '2026-06-22', time: '07:30' },
                    { id: 'ev2', title: 'Nộp báo cáo rà soát văn bản GD', date: '2026-06-25', time: '11:00' }
                ]);
                setNotes([
                    { id: 'nt1', title: 'Ràng buộc xếp TKB bằng FET', content: 'Cần cấu hình tránh trùng tiết và giới hạn số tiết buổi sáng tối đa.' }
                ]);
                setLoading(false);
            }, []);

            // Lắng nghe click ra ngoài thanh tìm kiếm để đóng dropdown kết quả
            useEffect(() => {
                function handleClickOutside(e) {
                    if (searchContainerRef.current && !searchContainerRef.current.contains(e.target)) {
                        setIsSearchFocused(false);
                    }
                }
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            // --- ĐĂNG KÝ HỆ THỐNG SERVICE WORKER AN TOÀN CHỐNG 100% NGUY CƠ TRẮNG TRANG ---
            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        navigator.serviceWorker.register('/sw.js?v=4')
                            .then(reg => console.log('Đã đăng ký Service Worker bảo mật thành công:', reg.scope))
                            .catch(err => console.error('Lỗi nạp Service Worker kiểm soát hệ thống:', err));
                    });
                }
            }, []);

            // Trích lọc Kinh Pháp Cú theo ngày lành
            const phapCuHomNay = useMemo(() => {
                const index = selectedDate.getDate() % PHAP_CU_LIST.length;
                return PHAP_CU_LIST[index];
            }, [selectedDate]);

            // --- THUẬT TOÁN LỌC TÌM KIẾM TOÀN CỤC CHUẨN HÓA KHÔNG DẤU ---
            const clearTones = (str) => {
                if (!str) return '';
                return str.toLowerCase()
                    .replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a")
                    .replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e")
                    .replace(/ì|í|ị|ỉ|ĩ/g, "i")
                    .replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o")
                    .replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u")
                    .replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y")
                    .replace(/đ/g, "d");
            };

            const globalSearchResults = useMemo(() => {
                const query = clearTones(globalSearchQuery.trim());
                if (!query) return { total: 0, todos: [], events: [], notes: [] };

                const matchedTodos = todos.filter(t => clearTones(t.title).includes(query));
                const matchedEvents = events.filter(e => clearTones(e.title).includes(query));
                const matchedNotes = notes.filter(n => clearTones(n.title).includes(query) || clearTones(n.content).includes(query));
                
                return {
                    total: matchedTodos.length + matchedEvents.length + matchedNotes.length,
                    todos: matchedTodos,
                    events: matchedEvents,
                    notes: matchedNotes
                };
            }, [globalSearchQuery, todos, events, notes]);

            // Thêm mới một dòng công việc
            const addCurrentTodo = () => {
                if (!newTodoText.trim()) return;
                const newTodo = {
                    id: Date.now().toString(),
                    title: newTodoText.trim(),
                    time: newTodoTime,
                    date: selectedDate.toISOString().split('T')[0],
                    completed: false
                };
                const updated = [...todos, newTodo];
                setTodos(updated);
                localStorage.setItem('local_todos', JSON.stringify(updated));
                setNewTodoText('');
                toast.success("Đã thêm việc cần làm!");
            };

            // Trích xuất ma trận cấu trúc hiển thị ngày tháng của ô lịch
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const firstDayIndex = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            const adjustedStartIdx = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

            return (
                <div class="min-h-screen bg-slate-100 flex flex-col max-w-md mx-auto shadow-2xl relative border-x border-slate-200">
                    
                    {/* TOP HEADER THANH TIÊU ĐỀ CHỨA Ô TÌM KIẾM TOÀN CỤC */}
                    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md">
                        <div class="flex items-center justify-between gap-3">
                            <div class="flex items-center gap-1.5 flex-shrink-0">
                                <CalendarIcon class="w-5 h-5 text-amber-300" />
                                <h1 class="font-bold text-sm tracking-tight">LỊCH VẠN NIÊN KHỐI GD</h1>
                            </div>

                            {/* Ô TÌM KIẾM TOÀN CỤC NÂNG CẤP ĐỊNH VỊ */}
                            <div ref={searchContainerRef} class="flex-1 relative">
                                <div class="relative">
                                    <Search class="w-4 h-4 text-blue-200 absolute left-2.5 top-1/2 -translate-y-1/2" />
                                    <input 
                                        type="text" 
                                        placeholder="Tìm sự kiện, việc làm, ghi chú..." 
                                        value={globalSearchQuery}
                                        onChange={(e) => setGlobalSearchQuery(e.target.value)}
                                        onFocus={() => setIsSearchFocused(true)}
                                        class="w-full bg-blue-700/50 hover:bg-blue-700/70 focus:bg-white text-white focus:text-slate-800 placeholder-blue-200 focus:placeholder-slate-400 pl-8 pr-7 py-1.5 rounded-xl text-xs outline-none transition border border-transparent focus:border-blue-300"
                                    />
                                    {globalSearchQuery && (
                                        <X onClick={() => setGlobalSearchQuery('')} class="w-3.5 h-3.5 text-blue-200 hover:text-white absolute right-2 top-1/2 -translate-y-1/2 cursor-pointer" />
                                    )}
                                </div>

                                {/* THẢ KẾT QUẢ TÌM KIẾM DROPDOWN TRÊN THANH HEADER */}
                                {isSearchFocused && globalSearchQuery.trim() && (
                                    <div class="absolute top-full left-0 right-0 mt-1 bg-white text-slate-800 rounded-xl shadow-xl max-h-60 overflow-y-auto z-50 p-2 border border-slate-200 text-xs animate-fadeIn">
                                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider px-2 py-1 border-b border-slate-100">
                                            Tìm thấy {globalSearchResults.total} kết quả
                                        </div>
                                        
                                        {globalSearchResults.total === 0 && (
                                            <div class="p-4 text-center text-slate-400 italic">Không có dữ liệu khớp từ khóa</div>
                                        )}

                                        {/* Hiển thị việc cần làm khớp */}
                                        {globalSearchResults.todos.map(t => (
                                            <div key={t.id} class="p-2 hover:bg-slate-50 rounded-lg flex items-center justify-between border-b border-slate-50">
                                                <span class="font-medium truncate pr-2">{t.title}</span>
                                                <span class="text-[10px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded flex-shrink-0 font-mono">{t.date}</span>
                                            </div>
                                        ))}

                                        {/* Hiển thị sự kiện khớp */}
                                        {globalSearchResults.events.map(e => (
                                            <div key={e.id} class="p-2 hover:bg-amber-50 rounded-lg flex items-center justify-between border-b border-slate-50">
                                                <span class="font-semibold text-amber-700 truncate pr-2">Sự kiện: {e.title}</span>
                                                <span class="text-[10px] bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded flex-shrink-0 font-mono">{e.time}</span>
                                            </div>
                                        ))}

                                        {/* Hiển thị ghi chú khớp */}
                                        {globalSearchResults.notes.map(n => (
                                            <div key={n.id} class="p-2 hover:bg-emerald-50 rounded-lg border-b border-slate-50">
                                                <div class="font-medium text-emerald-700 truncate">{n.title}</div>
                                                <div class="text-[10px] text-slate-400 truncate">{n.content}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* THÂN HIỂN THỊ NỘI DUNG CHÍNH */}
                    <main class="flex-1 p-3 space-y-4 pb-24">
                        
                        {/* KHỐI KINH PHÁP CÚ TRÍ TUỆ KHỞI SƯỚNG HÀNG NGÀY */}
                        <div class="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-2xl p-3 shadow-xs">
                            <div class="flex items-center gap-1 text-amber-700 font-bold text-xs mb-1">
                                <Sparkles class="w-4 h-4 text-amber-500 animate-spin-slow" /> LỜI VÀNG PHÁP CÚ HÔM NAY (Bài số {phapCuHomNay.id})
                            </div>
                            <p class="text-xs text-slate-700 italic leading-relaxed">"{phapCuHomNay.text}"</p>
                        </div>

                        {/* ĐIỀU HƯỚNG Ô LỊCH THÁNG VÀ NĂM */}
                        <div class="flex items-center justify-between bg-white p-2 rounded-xl shadow-xs border border-slate-200/60">
                            <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} class="p-1 hover:bg-slate-100 rounded-lg">
                                <ChevronLeft class="w-5 h-5 text-slate-600" />
                            </button>
                            <span class="font-bold text-slate-800 text-sm">Tháng {currentDate.getMonth() + 1} / {currentDate.getFullYear()}</span>
                            <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} class="p-1 hover:bg-slate-100 rounded-lg">
                                <ChevronRight class="w-5 h-5 text-slate-600" />
                            </button>
                        </div>

                        {/* MA TRẬN Ô LỊCH VẠN NIÊN */}
                        <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
                            <div class="grid grid-cols-7 text-center font-bold text-[11px] text-slate-400 mb-2">
                                <span>T2</span><span>T3</span><span>T4</span><span>T5</span><span>T6</span><span>T7</span><span class="text-rose-500">CN</span>
                            </div>
                            <div class="grid grid-cols-7 gap-1.5">
                                {Array(adjustedStartIdx).fill(null).map((_, idx) => <div key={`empty-${idx}`}></div>)}
                                {Array(daysInMonth).fill(null).map((_, idx) => {
                                    const day = idx + 1;
                                    const dateObj = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
                                    const dateStr = dateObj.toISOString().split('T')[0];
                                    
                                    const isSelected = selectedDate.getDate() === day && selectedDate.getMonth() === currentDate.getMonth() && selectedDate.getFullYear() === currentDate.getFullYear();
                                    const isToday = new Date().getDate() === day && new Date().getMonth() === currentDate.getMonth() && new Date().getFullYear() === currentDate.getFullYear();
                                    
                                    const amLich = tinhLichAm(day, currentDate.getMonth() + 1, currentDate.getFullYear());
                                    const hasTodos = todos.some(t => t.date === dateStr);

                                    return (
                                        <button 
                                            key={day} 
                                            onClick={() => setSelectedDate(dateObj)}
                                            class={`aspect-square rounded-xl p-1 flex flex-col justify-between items-center relative transition-all text-xs border ${
                                                isSelected ? 'bg-blue-600 text-white border-blue-600 shadow-md shadow-blue-100' : 
                                                isToday ? 'bg-amber-100 text-amber-800 border-amber-300 font-bold' : 'bg-slate-50 hover:bg-slate-100 border-transparent'
                                            }`}
                                        >
                                            <span class="font-semibold">{day}</span>
                                            <span class={`text-[9px] ${isSelected ? 'text-blue-100' : 'text-emerald-600 font-medium'}`}>
                                                {amLich.ngayAm === 1 ? `${amLich.ngayAm}/${amLich.thangAm}` : amLich.ngayAm}
                                            </span>
                                            {hasTodos && <span class={`w-1.5 h-1.5 rounded-full absolute top-1 right-1 ${isSelected ? 'bg-white' : 'bg-rose-500'}`}></span>}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* PHÂN HỆ VIỆC CẦN LÀM TRONG NGÀY ĐÃ CHỌN */}
                        <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 space-y-3">
                            <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                                <h3 class="font-bold text-slate-800 text-xs uppercase tracking-wide flex items-center gap-1">
                                    <ListTodo class="w-4 h-4 text-blue-500" /> Việc ngày {selectedDate.getDate()}/{selectedDate.getMonth() + 1}
                                </h3>
                                <span class="text-[10px] font-semibold text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full font-mono">
                                    {tinhLichAm(selectedDate.getDate(), selectedDate.getMonth() + 1, selectedDate.getFullYear()).chiMonth}
                                </span>
                            </div>

                            {/* Khung gõ thêm việc nhanh */}
                            <div class="flex gap-2">
                                <input 
                                    type="text" placeholder="Thêm việc cần làm nhanh..." 
                                    value={newTodoText} onChange={(e) => setNewTodoText(e.target.value)}
                                    class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs outline-none focus:border-blue-500 focus:bg-white transition"
                                />
                                <button onClick={addCurrentTodo} class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-xl text-xs font-bold shadow-xs transition">
                                    Thêm
                                </button>
                            </div>

                            {/* Danh sách công việc thực tế */}
                            <div class="space-y-1.5">
                                {todos.filter(t => t.date === selectedDate.toISOString().split('T')[0]).length > 0 ? (
                                    todos.filter(t => t.date === selectedDate.toISOString().split('T')[0]).map(todo => (
                                        <div key={todo.id} class="flex items-center justify-between p-2 rounded-xl bg-slate-50 border border-slate-100 text-xs">
                                            <div class="flex items-center gap-2">
                                                <Clock class="w-3.5 h-3.5 text-slate-400" />
                                                <span class="font-mono text-[11px] text-slate-500">{todo.time}</span>
                                                <span class="font-medium text-slate-700">{todo.title}</span>
                                            </div>
                                            <button 
                                                onClick={() => {
                                                    const filtered = todos.filter(t => t.id !== todo.id);
                                                    setTodos(filtered);
                                                    localStorage.setItem('local_todos', JSON.stringify(filtered));
                                                    toast.warn("Đã xóa việc làm.");
                                                }} 
                                                class="text-slate-300 hover:text-rose-500 p-1"
                                            >
                                                <Trash2 class="w-3.5 h-3.5" />
                                            </button>
                                        </div>
                                    ))
                                ) : (
                                    <div class="text-center py-6 text-slate-400 italic text-[11px]">Chưa xếp lịch công tác cho ngày này.</div>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* MENU ĐIỀU HƯỚNG CHÂN TRANG */}
                    <nav class="bg-white border-t border-slate-200 fixed bottom-0 max-w-md w-full h-14 flex justify-around items-center z-40 shadow-lg">
                        <button class="flex flex-col items-center gap-0.5 text-blue-600">
                            <CalendarIcon class="w-4 h-4" />
                            <span class="text-[9px] font-bold">Lịch biểu</span>
                        </button>
                        <button onClick={() => { setSelectedDate(new Date()); setCurrentDate(new Date()); }} class="flex flex-col items-center gap-0.5 text-slate-400 hover:text-blue-600">
                            <RefreshCw class="w-4 h-4" />
                            <span class="text-[9px] font-medium">Hôm nay</span>
                        </button>
                        <div class="flex flex-col items-center gap-0.5 text-slate-400">
                            <User class="w-4 h-4" />
                            <span class="text-[9px] font-medium">Hồ sơ</span>
                        </div>
                    </nav>

                    <ToastContainer position="top-center" autoClose={2000} hideProgressBar={true} closeOnClick />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
