                                    />
                                    {pinError && <p className="text-red-500 text-[11px] font-medium text-center">{pinError}</p>}
                                    <div className="flex gap-2 pt-1">
                                        <button type="button" onClick={() => setPinPrompt(null)} className="flex-1 py-1.5 border rounded-xl text-xs font-medium hover:bg-gray-50">Hủy bỏ</button>
                                        <button type="submit" className="flex-1 py-1.5 bg-slate-800 text-white rounded-xl text-xs font-bold hover:bg-slate-700 transition">Xác nhận</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* KHU VỰC NỘI DUNG HIỂN THỊ ĐỘNG THEO TAB */}
                    <main className="flex-1 flex flex-col overflow-hidden bg-white/40 backdrop-blur-sm relative z-10">
                        {activeTab === 'calendar' && <CalendarView user={user} db={db} appId={MANUAL_CONFIG.projectId} selectedDate={selectedDate} onSelectDate={setSelectedDate} theme={theme} searchHighlightId={searchHighlightId} />}
                        {activeTab === 'events' && <EventsView user={user} db={db} appId={MANUAL_CONFIG.projectId} selectedDate={selectedDate} theme={theme} searchHighlightId={searchHighlightId} />}
                        {activeTab === 'todo' && <TodosView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} searchHighlightId={searchHighlightId} />}
                        {activeTab === 'notes' && <NotesView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} searchHighlightId={searchHighlightId} />}
                        {activeTab === 'timetable' && <TimetableView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} searchHighlightId={searchHighlightId} />}
                        
                        {activeTab === 'day' && (
                            <div className="p-5 font-sans overflow-y-auto no-scrollbar flex-1 flex flex-col justify-between text-center select-none">
                                <div className="space-y-4 my-auto">
                                    <div className="text-sm font-black text-blue-600 uppercase tracking-widest">{getDayOfWeek(dailyDate)}</div>
                                    <div className="text-6xl font-black text-slate-800 my-2 tracking-tighter">{dailyDate.getDate()}</div>
                                    <div className="text-sm font-bold text-slate-500">Tháng {dailyDate.getMonth() + 1} năm {dailyDate.getFullYear()}</div>
                                    <div className="inline-block bg-orange-50 text-orange-600 px-4 py-1.5 rounded-full text-xs font-black border border-orange-100 shadow-xs">
                                        LỊCH ÂM: NGÀY {getLunarDate(dailyDate).day} THÁNG {getLunarDate(dailyDate).month}
                                    </div>
                                </div>
                                <div className="mt-6 p-4 bg-slate-50 border border-slate-100 rounded-2xl shadow-inner relative">
                                    <div className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block">Lời vàng hôm nay (Kinh Pháp Cú)</div>
                                    <p className="text-xs italic text-slate-700 font-medium whitespace-pre-line leading-relaxed">"{currentQuote}"</p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* KHU VỰC ĐIỀU HƯỚNG THANH CHÂN TRANG (FOOTER TABS) */}
                    <footer className="bg-white border-t border-gray-200 flex justify-around p-2 shadow-inner z-20 shrink-0 select-none">
                        <button onClick={() => handleTabChange('day')} className={`flex flex-col items-center gap-0.5 p-1 transition ${activeTab === 'day' ? 'text-blue-600 scale-105 font-black' : 'text-gray-400'}`}>
                            <Sun size={18} />
                            <span className="text-[10px] font-bold">Ngày</span>
                        </button>
                        <button onClick={() => handleTabChange('calendar')} className={`flex flex-col items-center gap-0.5 p-1 transition ${activeTab === 'calendar' ? 'text-blue-600 scale-105 font-black' : 'text-gray-400'}`}>
                            <Calendar size={18} />
                            <span className="text-[10px] font-bold">Tháng</span>
                        </button>
                        <button onClick={() => handleTabChange('events')} className={`flex flex-col items-center gap-0.5 p-1 transition ${activeTab === 'events' ? 'text-blue-600 scale-105 font-black' : 'text-gray-400'}`}>
                            <CalendarDays size={18} />
                            <span className="text-[10px] font-bold">Sự kiện</span>
                        </button>
                        <button onClick={() => handleTabChange('todo')} className={`flex flex-col items-center gap-0.5 p-1 transition ${activeTab === 'todo' ? 'text-blue-600 scale-105 font-black' : 'text-gray-400'}`}>
                            <CheckSquare size={18} />
                            <span className="text-[10px] font-bold">Việc làm</span>
                        </button>
                        <button onClick={() => handleTabChange('notes')} className={`flex flex-col items-center gap-0.5 p-1 transition ${activeTab === 'notes' ? 'text-blue-600 scale-105 font-black' : 'text-gray-400'}`}>
                            <StickyNote size={18} />
                            <span className="text-[10px] font-bold">Sổ tay</span>
                        </button>
                        <button onClick={() => handleTabChange('timetable')} className={`flex flex-col items-center gap-0.5 p-1 transition ${activeTab === 'timetable' ? 'text-blue-600 scale-105 font-black' : 'text-gray-400'}`}>
                            <Table size={18} />
                            <span className="text-[10px] font-bold">TKB</span>
                        </button>
                    </footer>

                    {/* POPUP MODAL CÀI ĐẶT GIAO DIỆN & BẢO MẬT */}
                    {showSettings && <SettingsModal theme={theme} onSave={handleSaveTheme} onClose={() => setShowSettings(false)} auth={getAuth(app)} db={db} appId={MANUAL_CONFIG.projectId} />}

                    {/* HIỂN THỊ THÔNG BÁO POPUP TOAST SYSTEM */}
                    <ToastContainer 
                        position="top-center"
                        autoClose={3000}
                        hideProgressBar={false}
                        newestOnTop={false}
                        closeOnClick
                        rtl={false}
                    />
                    
                    {/* THÔNG BÁO LỖI KẾT NỐI CHẾ ĐỘ OFFLINE */}
                    {connectionError && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-xs font-sans">
                            <div className="bg-white w-full max-w-xs rounded-2xl p-4 shadow-2xl text-center text-slate-800">
                                <WifiOff size={40} className="mx-auto text-amber-500 mb-2 animate-bounce" />
                                <h4 className="font-bold text-sm mb-1">Mất kết nối mạng</h4>
                                <p className="text-xs text-slate-500 mb-4 leading-relaxed font-medium">Chúng tôi tạm thời không kết nối được với dữ liệu đám mây. Bạn vẫn có thể tiếp tục sử dụng ứng dụng ở chế độ Offline.</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setConnectionError(false)} className="flex-1 bg-gray-200 hover:bg-gray-300 text-slate-700 py-2 rounded-xl text-xs font-bold transition font-sans">Bỏ qua (Chạy Offline)</button>
                                    <button onClick={() => window.location.reload()} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-xs font-bold transition font-sans">Thử lại</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
