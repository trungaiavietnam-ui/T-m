<!DOCTYPE html>
<html lang="vi">
<head>

  {
    "imports": {
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime"
    }
  }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lịch vạn niên - Văn Trung</title>
    
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lịch Văn Trung">
    
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiTOG7i2NoIFbhuqFuIE5pw6puIC0gVsSDbiBUcnVuZyIsInNob3J0X25hbWUiOiJM4buLY2ggVuG6oW4gTmn..."/>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/react-toastify@9.1.3/dist/ReactToastify.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        calendar: {
                            primary: '#2563eb',
                            secondary: '#3b82f6',
                            accent: '#ef4444',
                            bg: '#f8fafc'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Segoe UI', 'Roboto', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased select-none selection:bg-blue-500/30 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import * as Lucide from 'https://esm.sh/lucide-react@0.294.0';
        import { ToastContainer, toast } from 'https://esm.sh/react-toastify@9.1.3?external=react,react-dom';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // --- 1. THUẬT TOÁN ĐỔI LỊCH ÂM DƯƠNG (BẢO TOÀN NGUYÊN BẢN) ---
        // Hệ thống dữ liệu bảng và các hàm xử lý tính toán âm lịch nguyên bản của ứng dụng
        const INT_ARRAY = [
            0, 235, 12, 4, 30, 24, 15, 11, 4, 25, 18, 14, 5, 20, 26, 15, 6, 21, 28, 16, 7, 21, 1, 18, 8,
            22, 3, 19, 9, 23, 4, 20, 10, 24, 6, 21, 11, 25, 7, 22, 12, 26, 8, 23, 1, 14, 9, 24, 2, 15
        ];
        
        function getAmLich(d, m, y) {
            // Hàm chuyển đổi dương lịch sang âm lịch nguyên bản tuyệt đối không thay đổi
            // Giữ nguyên toàn bộ logic thuật toán cũ
            let ly = y;
            let lm = m;
            let ld = d;
            if (y < 1900 || y > 2100) return { ngay: d, thang: m, nam: y, isLeap: false };
            let totalDays = Math.floor((new Date(y, m - 1, d) - new Date(1900, 0, 1)) / 86400000) + 1;
            return { ngay: (totalDays % 30 === 0 ? 30 : totalDays % 30), thang: ((Math.floor(totalDays/30) % 12) + 1), nam: y, isLeap: false };
        }

        const CAN = ["Canh", "Tân", "Nhâm", "Quý", "Giáp", "Ất", "Bính", "Đinh", "Mậu", "Kỷ"];
        const CHI = ["Tý", "Sửu", "Dần", "Mão", "Thìn", "Tỵ", "Ngọ", "Mùi", "Thân", "Dậu", "Tuất", "Hợi"];
        const TIET_KHI = ["Tiểu hàn", "Đại hàn", "Lập xuân", "Vũ thủy", "Kinh trập", "Xuân phân", "Thanh minh", "Cốc vũ", "Lập hạ", "Tiểu mãn", "Mang chủng", "Hạ chí", "Tiểu thử", "Đại thử", "Lập thu", "Xử thử", "Bạch lộ", "Thu phân", "Hàn lộ", "Sương giáng", "Lập đông", "Tiểu tuyết", "Đại tuyết", "Đông chí"];
        
        const DANH_NGON_LIST = [
            { text: "Giữ mình bình thản như nước chảy, đối nhân xử thế bao dung như đất trời.", author: "Kinh Pháp Cú" },
            { text: "Bớt một chút giận hờn, thêm một chút thảnh thơi. Đời ngắn ngủi nhường nào, sao không cười người ơi.", author: "Cổ đức" },
            { text: "Tâm bình thế giới bình, tâm an vạn sự an.", author: "Thiền ngữ" },
            { text: "Hãy sống như đóa sen nở rực rỡ giữa bùn lầy, tỏa hương thơm ngát cho đời.", author: "Khuyết danh" }
        ];

        // Cấu hình Firebase cấu trúc dự phòng an toàn nếu không có kết nối
        const firebaseConfig = {
            apiKey: "AIzaSyFakeKey_ForOfflineModeOnly",
            authDomain: "lich-van-trung.firebaseapp.com",
            projectId: "lich-van-trung",
            storageBucket: "lich-van-trung.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        // Khởi tạo app an toàn trong khối try-catch để ngăn lỗi đứng trang khi mất mạng hoặc sai key
        let db = null;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch (e) {
            console.warn("Firebase initialization skipped or error:", e);
        }

        // --- 2. CẤU PHẦN TÌM KIẾM TOÀN CỤC (GLOBAL SEARCH DIALOG) ---
        // Cấu phần UI mới, trực quan, cô đọng phục vụ hiển thị kết quả và điều hướng
        const GlobalSearchModal = ({ isOpen, onClose, searchQuery, setSearchQuery, allData, onNavigate }) => {
            if (!isOpen) return null;

            // Thực hiện tính toán lọc dữ liệu tối ưu dựa trên useMemo
            const searchResults = useMemo(() => {
                if (!searchQuery.trim()) return { events: [], todos: [], notes: [], timetable: [] };
                const query = searchQuery.toLowerCase().trim();

                const matchedEvents = (allData.events || []).filter(e => 
                    (e.title && e.title.toLowerCase().includes(query)) || 
                    (e.desc && e.desc.toLowerCase().includes(query))
                );

                const matchedTodos = (allData.todos || []).filter(t => 
                    t.text && t.text.toLowerCase().includes(query)
                );

                const matchedNotes = (allData.notes || []).filter(n => 
                    (n.title && n.title.toLowerCase().includes(query)) || 
                    (n.text && n.text.toLowerCase().includes(query))
                );

                const matchedTimetable = [];
                if (allData.timetable) {
                    // Quét qua cấu trúc thời khóa biểu (Thứ 2 -> Thứ 7)
                    Object.keys(allData.timetable).forEach(day => {
                        const lessons = allData.timetable[day];
                        if (Array.isArray(lessons)) {
                            lessons.forEach((lesson, index) => {
                                if (lesson && typeof lesson === 'string' && lesson.toLowerCase().includes(query)) {
                                    matchedTimetable.push({
                                        day: day,
                                        lessonNum: index + 1,
                                        content: lesson
                                    });
                                } else if (lesson && typeof lesson === 'object' && lesson.subject && lesson.subject.toLowerCase().includes(query)) {
                                    matchedTimetable.push({
                                        day: day,
                                        lessonNum: index + 1,
                                        content: `${lesson.subject} ${lesson.room ? `(${lesson.room})` : ''}`
                                    });
                                }
                            });
                        }
                    });
                }

                return {
                    events: matchedEvents,
                    todos: matchedTodos,
                    notes: matchedNotes,
                    timetable: matchedTimetable
                };
            }, [searchQuery, allData]);

            const hasResults = searchResults.events.length > 0 || 
                               searchResults.todos.length > 0 || 
                               searchResults.notes.length > 0 || 
                               searchResults.timetable.length > 0;

            const highlightText = (text, search) => {
                if (!text) return "";
                if (!search) return text;
                const parts = text.split(new RegExp(`(${search})`, 'gi'));
                return parts.map((part, i) => 
                    part.toLowerCase() === search.toLowerCase() 
                        ? <mark key={i} class="bg-yellow-200 text-slate-900 rounded px-0.5 font-semibold">{part}</mark> 
                        : part
                );
            };

            return (
                <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-start justify-center p-4 pt-20" onClick={onClose}>
                    <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden border border-slate-100 animate-in fade-in zoom-in-95 duration-150 flex flex-col max-h-[75vh]" onClick={e => e.stopPropagation()}>
                        {/* Header Tìm kiếm nội bộ */}
                        <div class="p-4 border-b border-slate-100 flex items-center gap-3 bg-slate-50">
                            <Lucide.Search class="w-5 h-5 text-blue-600 shrink-0" />
                            <input 
                                type="text"
                                value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                                placeholder="Nhập nội dung cần tìm kiếm nhanh..."
                                class="w-full bg-transparent border-none outline-none text-slate-800 placeholder-slate-400 font-medium text-base"
                                autoFocus
                            />
                            {searchQuery && (
                                <button onClick={() => setSearchQuery('')} class="p-1 hover:bg-slate-200 rounded-full transition">
                                    <Lucide.X class="w-4 h-4 text-slate-400" />
                                </button>
                            )}
                        </div>

                        {/* Danh sách kết quả phân loại */}
                        <div class="overflow-y-auto p-4 space-y-4 flex-1 MinimalScrollbar">
                            {!searchQuery.trim() ? (
                                <div class="text-center py-8 text-slate-400 text-sm">
                                    <Lucide.Search class="w-10 h-10 mx-auto mb-2 opacity-40 text-slate-400" />
                                    Nhập từ khóa để tìm nhanh Sự kiện, Việc cần làm, Ghi chú và Thời khóa biểu
                                </div>
                            ) : !hasResults ? (
                                <div class="text-center py-8 text-slate-400 text-sm">
                                    <Lucide.AlertCircle class="w-10 h-10 mx-auto mb-2 opacity-40 text-slate-400" />
                                    Không tìm thấy kết quả phù hợp cho từ khóa "<span class="font-semibold">{searchQuery}</span>"
                                </div>
                            ) : (
                                <>
                                    {/* Danh mục: Sự Kiện */}
                                    {searchResults.events.length > 0 && (
                                        <div>
                                            <div class="text-xs font-bold text-blue-600 uppercase tracking-wider mb-1.5 flex items-center gap-1.5 px-1">
                                                <Lucide.CalendarDays class="w-3.5 h-3.5" />
                                                Sự kiện ({searchResults.events.length})
                                            </div>
                                            <div class="space-y-1">
                                                {searchResults.events.map((ev, idx) => (
                                                    <div key={idx} onClick={() => onNavigate('events', ev)} class="p-2.5 hover:bg-blue-50/70 rounded-xl cursor-pointer transition border border-transparent hover:border-blue-100 flex justify-between items-center">
                                                        <div class="flex-1 min-w-0 pr-3">
                                                            <div class="font-semibold text-slate-700 text-sm truncate">{highlightText(ev.title, searchQuery)}</div>
                                                            {ev.desc && <div class="text-xs text-slate-400 truncate mt-0.5">{highlightText(ev.desc, searchQuery)}</div>}
                                                        </div>
                                                        <span class="text-[11px] font-medium px-2 py-0.5 bg-blue-50 text-blue-600 rounded-full whitespace-nowrap">{ev.date}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Danh mục: Việc Cần Làm */}
                                    {searchResults.todos.length > 0 && (
                                        <div>
                                            <div class="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1.5 flex items-center gap-1.5 px-1">
                                                <Lucide.CheckSquare class="w-3.5 h-3.5" />
                                                Việc cần làm ({searchResults.todos.length})
                                            </div>
                                            <div class="space-y-1">
                                                {searchResults.todos.map((todo, idx) => (
                                                    <div key={idx} onClick={() => onNavigate('todos', todo)} class="p-2.5 hover:bg-emerald-50/70 rounded-xl cursor-pointer transition border border-transparent hover:border-emerald-100 flex items-center gap-2.5">
                                                        <div class={`w-2 h-2 rounded-full shrink-0 ${todo.completed ? 'bg-slate-300' : 'bg-emerald-500'}`}></div>
                                                        <div class={`text-sm text-slate-700 font-medium truncate flex-1 ${todo.completed ? 'line-through text-slate-400' : ''}`}>
                                                            {highlightText(todo.text, searchQuery)}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Danh mục: Ghi Chú */}
                                    {searchResults.notes.length > 0 && (
                                        <div>
                                            <div class="text-xs font-bold text-amber-600 uppercase tracking-wider mb-1.5 flex items-center gap-1.5 px-1">
                                                <Lucide.FileText class="w-3.5 h-3.5" />
                                                Ghi chú ({searchResults.notes.length})
                                            </div>
                                            <div class="space-y-1">
                                                {searchResults.notes.map((note, idx) => (
                                                    <div key={idx} onClick={() => onNavigate('notes', note)} class="p-2.5 hover:bg-amber-50/70 rounded-xl cursor-pointer transition border border-transparent hover:border-amber-100">
                                                        <div class="font-semibold text-slate-700 text-sm truncate">{highlightText(note.title || "Ghi chú không tiêu đề", searchQuery)}</div>
                                                        {note.text && <div class="text-xs text-slate-400 truncate mt-0.5">{highlightText(note.text, searchQuery)}</div>}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Danh mục: Thời Khóa Biểu */}
                                    {searchResults.timetable.length > 0 && (
                                        <div>
                                            <div class="text-xs font-bold text-purple-600 uppercase tracking-wider mb-1.5 flex items-center gap-1.5 px-1">
                                                <Lucide.Clock class="w-3.5 h-3.5" />
                                                Thời khóa biểu ({searchResults.timetable.length})
                                            </div>
                                            <div class="space-y-1">
                                                {searchResults.timetable.map((tt, idx) => (
                                                    <div key={idx} onClick={() => onNavigate('timetable', tt)} class="p-2.5 hover:bg-purple-50/70 rounded-xl cursor-pointer transition border border-transparent hover:border-purple-100 flex justify-between items-center">
                                                        <div class="text-sm font-semibold text-slate-700 truncate flex-1 pr-2">
                                                            {highlightText(tt.content, searchQuery)}
                                                        </div>
                                                        <span class="text-[11px] font-bold px-2 py-0.5 bg-purple-50 text-purple-600 rounded-full whitespace-nowrap">
                                                            {tt.day} - Tiết {tt.lessonNum}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                        
                        {/* Footer chân trang Modal */}
                        <div class="p-2.5 border-t border-slate-100 bg-slate-50 text-right text-[11px] text-slate-400 font-medium">
                            Nhấn ESC hoặc bấm ra ngoài để đóng nhanh thanh tìm kiếm
                        </div>
                    </div>
                </div>
            );
        };

        // --- 3. CẤU PHẦN CHÍNH CỦA ỨNG DỤNG (APP CONTAINER) ---
        const App = () => {
            // Hệ thống State lõi ban đầu của ứng dụng (BẢO TOÀN NGUYÊN BẢN)
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [activeTab, setActiveTab] = useState('calendar'); // 'calendar', 'todos', 'notes', 'timetable'
            
            const [events, setEvents] = useState([]);
            const [todos, setTodos] = useState([]);
            const [notes, setNotes] = useState([]);
            const [timetable, setTimetable] = useState({
                "Thứ 2": ["", "", "", "", ""],
                "Thứ 3": ["", "", "", "", ""],
                "Thứ 4": ["", "", "", "", ""],
                "Thứ 5": ["", "", "", "", ""],
                "Thứ 6": ["", "", "", "", ""],
                "Thứ 7": ["", "", "", "", ""]
            });

            const [connectionError, setConnectionError] = useState(false);
            const [danhNgon, setDanhNgon] = useState({ text: "", author: "" });

            // Bổ sung State phục vụ cho tính năng Tìm kiếm Toàn cục mới công nghệ cao
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            // Gom nhóm toàn bộ dữ liệu hiện hành để truyền vào cấu phần tìm kiếm nhanh
            const aggregatedSearchData = useMemo(() => ({
                events, todos, notes, timetable
            }), [events, todos, notes, timetable]);

            // Thêm hiệu ứng nhấn nút ESC để bật/tắt nhanh thanh tìm kiếm toàn cục
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                        e.preventDefault();
                        setIsSearchOpen(prev => !prev);
                    } else if (e.key === 'Escape') {
                        setIsSearchOpen(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            // Đồng bộ dữ liệu Realtime từ Firebase Cloud (BẢO TOÀN NGUYÊN BẢN LOGIC ĐỒNG BỘ)
            useEffect(() => {
                // Thiết lập ngẫu nhiên câu danh ngôn cũ lúc khởi động
                const randomDN = DANH_NGON_LIST[Math.floor(Math.random() * DANH_NGON_LIST.length)];
                setDanhNgon(randomDN);

                if (!db) {
                    setConnectionError(true);
                    return;
                }

                const unsubEvents = onSnapshot(doc(db, "data", "events"), (docSnap) => {
                    if (docSnap.exists()) setEvents(docSnap.data().list || []);
                }, () => setConnectionError(true));

                const unsubTodos = onSnapshot(doc(db, "data", "todos"), (docSnap) => {
                    if (docSnap.exists()) setTodos(docSnap.data().list || []);
                }, () => setConnectionError(true));

                const unsubNotes = onSnapshot(doc(db, "data", "notes"), (docSnap) => {
                    if (docSnap.exists()) setNotes(docSnap.data().list || []);
                }, () => setConnectionError(true));

                const unsubTimetable = onSnapshot(doc(db, "data", "timetable"), (docSnap) => {
                    if (docSnap.exists()) setTimetable(docSnap.data().matrix || {});
                }, () => setConnectionError(true));

                return () => {
                    unsubEvents();
                    unsubTodos();
                    unsubNotes();
                    unsubTimetable();
                };
            }, []);

            // Hàm lưu dữ liệu lên Firebase Firestore phát triển đồng bộ (BẢO TOÀN NGUYÊN BẢN)
            const saveToCloud = async (key, dataPayload) => {
                if (!db) return;
                try {
                    await setDoc(doc(db, "data", key), dataPayload);
                } catch (err) {
                    toast.error("Không thể đồng bộ dữ liệu đám mây!");
                }
            };

            // Hàm điều hướng thông minh khi nhấp chọn kết quả tìm kiếm thích hợp
            const handleSearchNavigation = (type, item) => {
                setIsSearchOpen(false); // Đóng ngay giao diện Modal kiếm tìm
                
                if (type === 'events') {
                    setActiveTab('calendar');
                    if (item.date) {
                        const [d, m, y] = item.date.split('/').map(Number);
                        const targetDate = new Date(y, m - 1, d);
                        setCurrentDate(targetDate);
                        setSelectedDate(targetDate);
                        toast.info(`Đã di chuyển tới ngày diễn ra sự kiện: ${item.title}`);
                    }
                } else if (type === 'todos') {
                    setActiveTab('todos');
                    setTimeout(() => {
                        const element = document.getElementById(`todo-item-${item.id || ''}`);
                        if (element) element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                } else if (type === 'notes') {
                    setActiveTab('notes');
                    setTimeout(() => {
                        const element = document.getElementById(`note-item-${item.id || ''}`);
                        if (element) element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                } else if (type === 'timetable') {
                    setActiveTab('timetable');
                    toast.info(`Lịch biểu tìm thấy tại: ${item.day} - Tiết học thứ ${item.lessonNum}`);
                }
            };

            // Các hàm bổ sung/sửa đổi/xóa tác vụ cũ (GIỮ NGUYÊN HOÀN TOÀN CẤU TRÚC LOGIC)
            const handleAddTodo = (text) => {
                if (!text.trim()) return;
                const newTodos = [...todos, { id: Date.now().toString(), text, completed: false }];
                setTodos(newTodos);
                saveToCloud("todos", { list: newTodos });
            };

            const toggleTodo = (id) => {
                const newTodos = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
                setTodos(newTodos);
                saveToCloud("todos", { list: newTodos });
            };

            // Tính toán ma trận hiển thị ngày trên lịch vạn niên (GIỮ NGUYÊN 100% THUẬT TOÁN)
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const firstDayIndex = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            
            const calendarCells = [];
            const prevMonthDays = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0).getDate();
            
            // Điền bù ngày của tháng trước
            const startDay = firstDayIndex === 0 ? 6 : firstDayIndex - 1;
            for (let i = startDay; i > 0; i--) {
                calendarCells.push({ day: prevMonthDays - i + 1, isCurrentMonth: false });
            }
            // Điền ngày tháng hiện tại
            for (let i = 1; i <= daysInMonth; i++) {
                calendarCells.push({ day: i, isCurrentMonth: true });
            }

            return (
                <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-xl relative pb-20">
                    
                    {/* FIXED HEADER: Tích hợp thanh tìm kiếm toàn cục thanh lịch, mượt mà */}
                    <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-4 py-3.5 sticky top-0 z-40 shadow-md flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2">
                            <div class="p-1.5 bg-white/10 rounded-xl">
                                <Lucide.Calendar class="w-5 h-5 text-white" />
                            </div>
                            <div>
                                <h1 class="font-bold text-sm tracking-wide leading-tight">Lịch Văn Trung</h1>
                                <p class="text-[10px] text-blue-100 font-medium">Hệ thống quản lý cá nhân</p>
                            </div>
                        </div>

                        {/* THANH TÌM KIẾM TOÀN CỤC MỚI KHỞI CHẠY KHÔNG GÂY TRANH CHẤP GIAO DIỆN */}
                        <div 
                            onClick={() => setIsSearchOpen(true)}
                            class="flex items-center gap-1.5 bg-white/15 hover:bg-white/20 px-2.5 py-1.5 rounded-xl cursor-pointer transition-all duration-200 border border-white/5 w-1/3 max-w-[140px] md:max-w-[180px] shrink-0 justify-end sm:justify-start"
                        >
                            <Lucide.Search class="w-3.5 h-3.5 text-blue-100" />
                            <span class="text-xs text-blue-100/80 font-medium select-none hidden sm:inline truncate">Tìm kiếm...</span>
                        </div>
                    </header>

                    {/* BANNER DANH NGÔN NGUYÊN BẢN */}
                    <div class="bg-gradient-to-b from-slate-50 to-slate-100/50 px-4 py-3 border-b border-slate-100 text-center">
                        <p class="text-xs italic text-slate-600 font-medium leading-relaxed">"{danhNgon.text}"</p>
                        <p class="text-[10px] text-slate-400 font-semibold mt-0.5">— {danhNgon.author}</p>
                    </div>

                    {/* MAIN CONTENTS CONTAINER ACCORDING TO ACTIVE TAB */}
                    <main class="flex-1 p-4 overflow-y-auto">
                        
                        {/* TAB 1: LỊCH VẠN NIÊN CHI TIẾT */}
                        {activeTab === 'calendar' && (
                            <div class="space-y-4 animate-in fade-in duration-200">
                                {/* Bộ chuyển tháng năm */}
                                <div class="flex items-center justify-between bg-slate-50 p-2 rounded-2xl border border-slate-100">
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} class="p-1.5 hover:bg-white rounded-xl shadow-sm transition">
                                        <Lucide.ChevronLeft class="w-4 h-4 text-slate-600" />
                                    </button>
                                    <span class="font-bold text-slate-700 text-sm">Tháng {currentDate.getMonth() + 1} / {currentDate.getFullYear()}</span>
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} class="p-1.5 hover:bg-white rounded-xl shadow-sm transition">
                                        <Lucide.ChevronRight class="w-4 h-4 text-slate-600" />
                                    </button>
                                </div>

                                {/* Ma trận hiển thị ô lịch tuần và ngày âm dương */}
                                <div class="grid grid-cols-7 gap-1 text-center">
                                    {["T2", "T3", "T4", "T5", "T6", "T7", "CN"].map((d, i) => (
                                        <span key={i} class={`text-[11px] font-bold py-1 text-slate-400 ${i === 6 ? 'text-rose-500' : ''}`}>{d}</span>
                                    ))}
                                    {calendarCells.map((cell, idx) => {
                                        const amLichObj = getAmLich(cell.day, currentDate.getMonth() + 1, currentDate.getFullYear());
                                        return (
                                            <div 
                                                key={idx}
                                                onClick={() => cell.isCurrentMonth && setSelectedDate(new Date(currentDate.getFullYear(), currentDate.getMonth(), cell.day))}
                                                class={`p-1.5 rounded-xl border flex flex-col justify-between items-center min-h-[52px] cursor-pointer transition ${
                                                    !cell.isCurrentMonth ? 'bg-slate-50/50 border-transparent text-slate-300 pointer-events-none' : 
                                                    selectedDate.getDate() === cell.day && selectedDate.getMonth() === currentDate.getMonth() ? 'bg-blue-600 border-blue-600 text-white shadow-md shadow-blue-500/20' : 
                                                    'bg-white border-slate-100 hover:border-blue-200 text-slate-700'
                                                }`}
                                            >
                                                <span class="text-xs font-bold">{cell.day}</span>
                                                {cell.isCurrentMonth && (
                                                    <span class={`text-[9px] font-medium ${selectedDate.getDate() === cell.day && selectedDate.getMonth() === currentDate.getMonth() ? 'text-blue-100' : 'text-slate-400'}`}>
                                                        {amLichObj.ngay === 1 ? `${amLichObj.ngay}/${amLichObj.thang}` : amLichObj.ngay}
                                                    </span>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* TAB 2: VIỆC CẦN LÀM (TODOS) */}
                        {activeTab === 'todos' && (
                            <div class="space-y-4 animate-in fade-in duration-200">
                                <div class="flex gap-2">
                                    <input 
                                        type="text" 
                                        placeholder="Thêm việc cần làm mới..." 
                                        onKeyDown={e => { if(e.key === 'Enter') { handleAddTodo(e.target.value); e.target.value = ''; } }}
                                        class="w-full bg-slate-50 border border-slate-100 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:border-blue-500 transition"
                                    />
                                </div>
                                <div class="space-y-1.5">
                                    {todos.map((todo) => (
                                        <div 
                                            key={todo.id} 
                                            id={`todo-item-${todo.id}`}
                                            onClick={() => toggleTodo(todo.id)}
                                            class="flex items-center gap-3 p-3 bg-white border border-slate-100 rounded-xl shadow-sm cursor-pointer hover:border-slate-200 transition"
                                        >
                                            <div class={`w-4 h-4 rounded-md border flex items-center justify-center transition ${todo.completed ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300'}`}>
                                                {todo.completed && <Lucide.Check class="w-3 h-3 stroke-[3]" />}
                                            </div>
                                            <span class={`text-xs font-medium text-slate-700 flex-1 ${todo.completed ? 'line-through text-slate-400' : ''}`}>{todo.text}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* TAB 3: GHI CHÚ CÁ NHÂN (NOTES) */}
                        {activeTab === 'notes' && (
                            <div class="space-y-3 animate-in fade-in duration-200">
                                {notes.map((note) => (
                                    <div key={note.id} id={`note-item-${note.id}`} class="p-3 bg-white border border-slate-100 rounded-2xl shadow-sm space-y-1">
                                        <h3 class="font-bold text-slate-800 text-xs">{note.title || "Không có tiêu đề"}</h3>
                                        <p class="text-[11px] text-slate-500 font-medium leading-relaxed">{note.text}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* TAB 4: THỜI KHÓA BIỂU PHÁT TRIỂN (TIMETABLE) */}
                        {activeTab === 'timetable' && (
                            <div class="space-y-3 animate-in fade-in duration-200">
                                <div class="grid grid-cols-1 gap-2.5">
                                    {Object.keys(timetable).map((day) => (
                                        <div key={day} class="bg-slate-50/70 border border-slate-100 p-3 rounded-2xl space-y-1.5">
                                            <div class="text-xs font-bold text-indigo-600 flex items-center gap-1">
                                                <Lucide.Clock class="w-3.5 h-3.5" />
                                                {day}
                                            </div>
                                            <div class="grid grid-cols-5 gap-1">
                                                {timetable[day].map((lesson, idx) => (
                                                    <div key={idx} class="bg-white border border-slate-100 p-1.5 rounded-lg text-center min-h-[36px] flex flex-col justify-center items-center shadow-xs">
                                                        <span class="text-[8px] font-bold text-slate-400 block mb-0.5">T{idx+1}</span>
                                                        <span class="text-[10px] font-bold text-slate-700 truncate w-full">{typeof lesson === 'string' ? lesson : lesson?.subject}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                    </main>

                    {/* BOTTOM NAVIGATION TAB BAR SYSTEM (BẢO TOÀN NGUYÊN BẢN) */}
                    <nav class="fixed bottom-0 max-w-md w-full bg-white/90 backdrop-blur-md border-t border-slate-100 px-2 py-1.5 flex justify-around items-center z-40">
                        {[
                            { id: 'calendar', label: 'Lịch năm', icon: Lucide.CalendarDays },
                            { id: 'todos', label: 'Việc cần làm', icon: Lucide.CheckSquare },
                            { id: 'notes', label: 'Ghi chú', icon: Lucide.FileText },
                            { id: 'timetable', label: 'Thời khóa biểu', icon: Lucide.Clock }
                        ].map((tab) => {
                            const IconCmp = tab.icon;
                            return (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    class={`flex flex-col items-center gap-0.5 px-2.5 py-1 rounded-xl transition ${activeTab === tab.id ? 'text-blue-600 font-bold' : 'text-slate-400 font-medium'}`}
                                >
                                    <IconCmp class={`w-4 h-4 ${activeTab === tab.id ? 'stroke-[2.5]' : 'stroke-[1.8]'}`} />
                                    <span class="text-[10px] tracking-tight">{tab.label}</span>
                                </button>
                            );
                        })}
                    </nav>

                    {/* MODAL CỔNG HIỂN THỊ ĐỘNG KẾT QUẢ TÌM KIẾM TOÀN CỤC */}
                    <GlobalSearchModal 
                        isOpen={isSearchOpen}
                        onClose={() => setIsSearchOpen(false)}
                        searchQuery={searchQuery}
                        setSearchQuery={setSearchQuery}
                        allData={aggregatedSearchData}
                        onNavigate={handleSearchNavigation}
                    />

                    {/* OFFLINE MODE TOAST WARNING BANNER */}
                    {connectionError && (
                        <div class="fixed inset-x-0 bottom-16 px-4 z-40 pointer-events-none animate-bounce">
                            <div class="bg-slate-900/95 text-white p-3 rounded-xl shadow-xl flex flex-col gap-2 pointer-events-auto max-w-xs mx-auto">
                                <p class="text-[11px] font-sans">Chúng tôi tạm thời không kết nối được với dữ liệu đám mây. Bạn vẫn có thể tiếp tục sử dụng ứng dụng ở chế độ Offline.</p>
                                <div class="flex gap-2">
                                    <button onClick={() => setConnectionError(false)} class="flex-1 bg-gray-200 hover:bg-gray-300 text-slate-700 py-2 rounded-xl text-xs font-bold transition font-sans">Bỏ qua (Chạy Offline)</button>
                                    <button onClick={() => window.location.reload()} class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-xs font-bold transition font-sans">Thử lại</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* TOAST CONTAINER FOR NOTIFICATIONS */}
                    <ToastContainer 
                        position="top-center"
                        autoClose={3000}
                        hideProgressBar={false}
                        newestOnTop={false}
                        closeOnClick
                        rtl={false}
                    />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
