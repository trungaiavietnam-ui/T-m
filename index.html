    <script>
        const e = React.createElement;
        const { createRoot } = ReactDOM;
        const { 
            Calendar, ChevronLeft, ChevronRight, Plus, Trash2, Edit2, Check, 
            FileText, CheckSquare, Clock, User, LogOut, RefreshCw, Wifi, 
            WifiOff, AlertTriangle, BookOpen, Quote, Info, Search, X 
        } = Lucide;
        const { ToastContainer, toast } = ReactToastify;

        // CẤU HÌNH THÔNG SỐ FIREBASE CLIENT SDK SẠCH
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyBEgbs4brFEVbBhf7KaEhw8FekAJTUBFZ0",
            authDomain: "lich-van-trung.firebaseapp.com",
            projectId: "lich-van-trung",
            storageBucket: "lich-van-trung.firebasestorage.app",
            messagingSenderId: "527946894050",
            appId: "1:527946894050:web:4f0bf75fb626d70fb3dfa2"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(FIREBASE_CONFIG);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // KHO DỮ LIỆU KINH PHÁP CÚ VÀ DANH NGÔN BẢO TOÀN NGUYÊN BẢN
        const PHAP_CU_DATA = [
            { id: 1, text: "Ý dẫn đầu các pháp, ý làm chủ, ý tạo. Nếu với ý ô nhiễm, nói năng hay hành động, khổ não bước theo sau, như bánh xe vật kéo.", author: "Kinh Pháp Cú - Phẩm Song Yếu" },
            { id: 2, text: "Ý dẫn đầu các pháp, ý làm chủ, ý tạo. Nếu với ý thanh tịnh, nói năng hay hành động, an lạc bước theo sau, như bóng không rời hình.", author: "Kinh Pháp Cú - Phẩm Song Yếu" },
            { id: 3, text: "Hận thù diệt hận thù, đời này không có được. Từ bi diệt hận thù, là định luật ngàn thu.", author: "Kinh Pháp Cú - Phẩm Song Yếu" },
            { id: 4, text: "Người ngu nghĩ mình ngu, nhờ vậy thành có trí. Người ngu tưởng có trí, thật xứng gọi chí ngu.", author: "Kinh Pháp Cú - Phẩm Ngu Tình" },
            { id: 5, text: "Dù tụng một trăm câu, không nghĩa lý ích gì. Tốt hơn một câu nghĩa, nghe xong tâm tịch tịnh.", author: "Kinh Pháp Cú - Phẩm Thiết Yếu" }
        ];

        const DANH_NGON_DATA = [
            { text: "Hành trình vạn dặm bắt đầu từ một bước chân đi.", author: "Lão Tử" },
            { text: "Cuộc sống không phải là đi tìm bản thân mình, cuộc sống là tự tạo ra bản thân mình.", author: "George Bernard Shaw" },
            { text: "Đừng mong đợi mọi chuyện dễ dàng hơn, hãy mong đợi bản thân thông thái và giỏi giang hơn.", author: "Jim Rohn" },
            { text: "Cách duy nhất để làm một công việc tuyệt vời là yêu thích những gì bạn làm.", author: "Steve Jobs" }
        ];

        // 🧠 HỆ THỐNG QUẢN LÝ DỮ LIỆU NGOẠI TUYẾN INDEXEDDB CHUYÊN SÂU
        class OfflineStorage {
            static openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open('LichVanTrungOfflineDB', 1);
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('schedules')) db.createObjectStore('schedules', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains('notes')) db.createObjectStore('notes', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains('todos')) db.createObjectStore('todos', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains('sync_queue')) db.createObjectStore('sync_queue', { keyPath: 'id', autoIncrement: true });
                    };
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            static async getAll(storeName) {
                const db = await this.openDB();
                return new Promise((resolve) => {
                    const tx = db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const req = store.getAll();
                    req.onsuccess = () => resolve(req.result);
                });
            }

            static async save(storeName, item) {
                const db = await this.openDB();
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.put(item);
                return tx.complete;
            }

            static async delete(storeName, id) {
                const db = await this.openDB();
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.delete(id);
                return tx.complete;
            }

            static async addToSyncQueue(collection, action, payload) {
                const db = await this.openDB();
                const tx = db.transaction('sync_queue', 'readwrite');
                const store = tx.objectStore('sync_queue');
                store.add({ collection, action, payload, timestamp: Date.now() });
                return tx.complete;
            }
        }

        // CẤU PHẦN ĐIỀU HÀNH CHÍNH ỨNG DỤNG
        const App = () => {
            const [currentTab, setCurrentTab] = React.useState('calendar');
            const [currentDate, setCurrentDate] = React.useState(new Date());
            const [user, setUser] = React.useState(null);
            const [authLoading, setAuthLoading] = React.useState(true);
            const [connectionError, setConnectionError] = React.useState(false);
            const [lastOfflineTime, setLastOfflineTime] = React.useState(null);

            // Các kho trạng thái lưu trữ nghiệp vụ ứng dụng
            const [schedules, setSchedules] = React.useState([]);
            const [notes, setNotes] = React.useState([]);
            const [todos, setTodos] = React.useState([]);

            // TRẠNG THÁI TÌM KIẾM TOÀN CỤC MỚI BỔ SUNG
            const [searchQuery, setSearchQuery] = React.useState('');
            const [selectedSearchItem, setSelectedSearchItem] = React.useState(null);

            // Các biểu mẫu tương tác dữ liệu
            const [showEventModal, setShowEventModal] = React.useState(false);
            const [newEvent, setNewEvent] = React.useState({ title: '', note: '', type: 'work' });
            const [selectedDateStr, setSelectedDateStr] = React.useState('');

            const [noteForm, setNoteForm] = React.useState({ title: '', content: '' });
            const [editingNoteId, setEditingNoteId] = React.useState(null);

            const [todoText, setTodoText] = React.useState('');
            const [todoDeadline, setTodoDeadline] = React.useState('');

            // Trích xuất tự động danh ngôn ngẫu nhiên theo ngày
            const dailyPhapCu = React.useMemo(() => PHAP_CU_DATA[currentDate.getDate() % PHAP_CU_DATA.length], [currentDate]);
            const dailyDanhNgon = React.useMemo(() => DANH_NGON_DATA[currentDate.getDate() % DANH_NGON_DATA.length], [currentDate]);

            // KIỂM TRA ĐĂNG NHẬP VÀ ĐĂNG KÝ ĐỒNG BỘ NỀN
            React.useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((usr) => {
                    setUser(usr);
                    setAuthLoading(false);
                    if (usr) {
                        loadCloudOrOfflineData(usr.uid);
                    } else {
                        loadOfflineOnlyData();
                    }
                });

                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('./sw.js')
                        .then(reg => {
                            console.log('[PWA] Đăng ký thành công Service Worker!', reg.scope);
                            if ('sync' in reg) {
                                window.addEventListener('online', () => {
                                    reg.sync.register('sync-cloud-data')
                                        .then(() => console.log('[PWA Sync] Kích hoạt tiến trình đồng bộ ngầm thành công.'))
                                        .catch(err => console.error('[PWA Sync] Thất bại khi kích hoạt:', err));
                                });
                            }
                        })
                        .catch(err => console.error('[PWA] Đăng ký Service Worker thất bại:', err));
                }

                return () => unsubscribe();
            }, []);

            // THUẬT TOÁN TÌM KIẾM TOÀN CỤC REAL-TIME MỚI (Dùng React.useMemo tối ưu hóa năng suất)
            const searchResults = React.useMemo(() => {
                if (!searchQuery.trim()) return { schedules: [], notes: [], todos: [], total: 0 };
                const q = searchQuery.toLowerCase();

                const filteredSchedules = schedules.filter(s => 
                    (s.title && s.title.toLowerCase().includes(q)) || 
                    (s.note && s.note.toLowerCase().includes(q))
                );

                const filteredNotes = notes.filter(n => 
                    (n.title && n.title.toLowerCase().includes(q)) || 
                    (n.content && n.content.toLowerCase().includes(q))
                );

                const filteredTodos = todos.filter(t => 
                    (t.text && t.text.toLowerCase().includes(q))
                );

                return {
                    schedules: filteredSchedules,
                    notes: filteredNotes,
                    todos: filteredTodos,
                    total: filteredSchedules.length + filteredNotes.length + filteredTodos.length
                };
            }, [searchQuery, schedules, notes, todos]);

            // NẠP DỮ LIỆU TỪ CLOUD (FIRESTORE) HOẶC SỬ DỤNG INDEXEDDB NẾU MẤT MẠNG
            const loadCloudOrOfflineData = async (uid) => {
                try {
                    // 1. Tải trước dữ liệu cục bộ từ IndexedDB để hiển thị tức thì (Instant Loading)
                    await loadOfflineOnlyData();

                    // 2. Tiến hành đồng bộ đồng thời từ Cloud Firestore nếu trực tuyến
                    if (navigator.onLine) {
                        db.collection('schedules').where('userId', '==', uid).onSnapshot(snap => {
                            const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setSchedules(list);
                            list.forEach(item => OfflineStorage.save('schedules', item));
                        }, () => setConnectionError(true));

                        db.collection('notes').where('userId', '==', uid).onSnapshot(snap => {
                            const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setNotes(list);
                            list.forEach(item => OfflineStorage.save('notes', item));
                        }, () => setConnectionError(true));

                        db.collection('todos').where('userId', '==', uid).onSnapshot(snap => {
                            const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setTodos(list);
                            list.forEach(item => OfflineStorage.save('todos', item));
                        }, () => setConnectionError(true));
                    }
                } catch (e) {
                    console.error('Lỗi khi tải dữ liệu đám mây:', e);
                    setConnectionError(true);
                }
            };

            const loadOfflineOnlyData = async () => {
                const localSchedules = await OfflineStorage.getAll('schedules');
                const localNotes = await OfflineStorage.getAll('notes');
                const localTodos = await OfflineStorage.getAll('todos');
                if (localSchedules.length) setSchedules(localSchedules);
                if (localNotes.length) setNotes(localNotes);
                if (localTodos.length) setTodos(localTodos);
            };

            const handleUseOfflineAsync = () => {
                setConnectionError(false);
                setLastOfflineTime(new Date().toLocaleTimeString('vi-VN'));
                toast.info('Đã kích hoạt chế độ hoạt động Ngoại tuyến không đồng bộ!');
            };

            const handleGoogleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                    toast.success('Đăng nhập hệ thống đám mây thành công!');
                } catch (err) {
                    toast.error('Lỗi đăng nhập: ' + err.message);
                }
            };

            const handleLogout = async () => {
                try {
                    await auth.signOut();
                    setSchedules([]);
                    setNotes([]);
                    setTodos([]);
                    toast.success('Đã đăng xuất tài khoản.');
                } catch (err) {
                    toast.error('Lỗi đăng xuất.');
                }
            };

            // THUẬT TOÁN ÂM LỊCH QUỐC TẾ BẢO TOÀN NGUYÊN BẢN
            const getLunarDate = (date) => {
                const options = { calendar: 'chinese', day: 'numeric', month: 'numeric', year: 'numeric' };
                const formatter = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', options);
                const parts = formatter.formatToParts(date);
                let day = '', month = '';
                parts.forEach(p => {
                    if (p.type === 'day') day = p.value;
                    if (p.type === 'month') month = p.value;
                });
                return `Ngày ${day} tháng ${month} Âm Lịch`;
            };

            // THAO TÁC NGHIỆP VỤ SỰ KIỆN LỊCH TRÌNH
            const openAddEvent = (dateStr) => {
                setSelectedDateStr(dateStr);
                setNewEvent({ title: '', note: '', type: 'work' });
                setShowEventModal(true);
            };

            const saveEvent = async () => {
                if (!newEvent.title.trim()) return toast.warning('Vui lòng nhập tiêu đề sự kiện');
                const id = 'ev_' + Date.now();
                const item = {
                    id,
                    userId: user ? user.uid : 'guest',
                    date: selectedDateStr,
                    title: newEvent.title,
                    note: newEvent.note,
                    type: newEvent.type,
                    createdAt: Date.now()
                };

                setSchedules(prev => [...prev, item]);
                await OfflineStorage.save('schedules', item);

                if (user && navigator.onLine) {
                    db.collection('schedules').doc(id).set(item)
                        .then(() => toast.success('Đã lưu sự kiện lên đám mây'))
                        .catch(() => OfflineStorage.addToSyncQueue('schedules', 'add', item));
                } else {
                    await OfflineStorage.addToSyncQueue('schedules', 'add', item);
                    toast.info('Đã lưu nội bộ (Sẽ đồng bộ khi có mạng)');
                }
                setShowEventModal(false);
            };

            const deleteEvent = async (id) => {
                setSchedules(prev => prev.filter(s => s.id !== id));
                await OfflineStorage.delete('schedules', id);

                if (user && navigator.onLine) {
                    db.collection('schedules').doc(id).delete()
                        .then(() => toast.success('Đã xóa trên đám mây'))
                        .catch(() => OfflineStorage.addToSyncQueue('schedules', 'delete', { id }));
                } else {
                    await OfflineStorage.addToSyncQueue('schedules', 'delete', { id });
                    toast.info('Đã xóa nội bộ');

                // KHỐI TRANG TRÍ CHÂN TRANG ĐƯỢC GIỮ NGUYÊN (DANH NGÔN)
                currentTab === 'calendar' && e('div', { className: "mt-auto px-4 pt-4 text-left" },
                    e('div', { className: "bg-gradient-to-br from-blue-50 to-indigo-50/50 p-4 rounded-3xl border border-blue-100/70 shadow-inner flex flex-col gap-2" },
                        e('div', { className: "flex items-center gap-1.5 text-blue-800 font-bold text-xs" }, e(Quote, { size: 14 }), "Danh Ngôn Cuộc Sống"),
                        e('p', { className: "text-xs text-slate-700 font-medium leading-relaxed" }, `"${dailyDanhNgon.text}"`),
                        e('p', { className: "text-[10px] text-indigo-700 font-bold self-end" }, `- ${dailyDanhNgon.author}`)
                    )
                ),

                // MODAL 1: THÊM SỰ KIỆN MỚI CHO LỊCH TRÌNH
                showEventModal && e('div', { className: "fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in" },
                    e('div', { className: "bg-white w-full max-w-sm rounded-3xl p-4 shadow-2xl border border-gray-50 text-left" },
                        e('div', { className: "flex justify-between items-center mb-3" },
                            e('h3', { className: "text-xs font-black text-slate-800 font-sans uppercase" }, "Thêm Sự Kiện Cột Mốc"),
                            e('button', { onClick: () => setShowEventModal(false), className: "p-1 text-gray-400 hover:bg-gray-100 rounded-lg transition" }, e(X, { size: 16 }))
                        ),
                        e('p', { className: "text-[10px] font-bold text-blue-600 mb-3 bg-blue-50 px-2.5 py-1 rounded-lg inline-block" }, `Ngày đã chọn: ${selectedDateStr}`),
                        e('div', { className: "flex flex-col gap-3" },
                            e('input', {
                                type: 'text',
                                placeholder: 'Tên sự kiện quan trọng...',
                                value: newEvent.title,
                                onChange: (el) => setNewEvent(prev => ({ ...prev, title: el.target.value })),
                                className: "w-full p-2.5 bg-gray-50 border border-gray-100 rounded-xl text-xs font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20"
                            }),
                            e('input', {
                                type: 'text',
                                placeholder: 'Ghi chú thêm (Tùy chọn)...',
                                value: newEvent.note,
                                onChange: (el) => setNewEvent(prev => ({ ...prev, note: el.target.value })),
                                className: "w-full p-2.5 bg-gray-50 border border-gray-100 rounded-xl text-xs font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20"
                            }),
                            e('select', {
                                value: newEvent.type,
                                onChange: (el) => setNewEvent(prev => ({ ...prev, type: el.target.value })),
                                className: "w-full p-2.5 bg-gray-50 border border-gray-100 rounded-xl text-xs font-bold text-slate-700 focus:outline-none"
                            },
                                e('option', { value: 'work' }, '💼 Công việc học tập'),
                                e('option', { value: 'personal' }, '🏡 Việc cá nhân / Gia đình'),
                                e('option', { value: 'anniversary' }, '🎉 Kỷ niệm / Sự kiện lớn')
                            ),
                            e('button', { onClick: saveEvent, className: "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl text-xs shadow-md transition font-sans mt-1" }, "Xác nhận lưu")
                        )
                    )
                ),

                // MODAL 2: XEM NHANH CHI TIẾT KẾT QUẢ TÌM KIẾM TOÀN CỤC MỚI BỔ SUNG
                selectedSearchItem && e('div', { className: "fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in" },
                    e('div', { className: "bg-white w-full max-w-sm rounded-3xl p-4 shadow-2xl border border-gray-100 text-left flex flex-col gap-3" },
                        e('div', { className: "flex justify-between items-center pb-2 border-b border-gray-100" },
                            e('div', { className: "flex items-center gap-1.5" },
                                e('span', { className: "text-[10px] font-black uppercase bg-blue-50 text-blue-600 px-2 py-0.5 rounded-md" }, selectedSearchItem.searchType),
                                e('h3', { className: "text-xs font-black text-slate-800" }, "Chi tiết tìm kiếm")
                            ),
                            e('button', { onClick: () => setSelectedSearchItem(null), className: "p-1 text-gray-400 hover:bg-gray-100 rounded-lg transition" }, e(X, { size: 16 }))
                        ),
                        e('div', { className: "flex flex-col gap-2 py-1" },
                            // Hiển thị giao diện tùy thuộc vào loại dữ liệu được tìm thấy
                            selectedSearchItem.searchType === 'Sự kiện' && e('div', { className: "flex flex-col gap-1.5" },
                                e('p', { className: "text-xs font-bold text-slate-800" }, `Tiêu đề: ${selectedSearchItem.title}`),
                                e('p', { className: "text-xs text-slate-600 font-medium" }, `Mô tả: ${selectedSearchItem.note || 'Không có ghi chú thêm'}`),
                                e('p', { className: "text-[10px] text-gray-400 font-bold" }, `Thời gian diễn ra: ${selectedSearchItem.date}`),
                                e('p', { className: "text-[10px] text-gray-400 font-bold" }, `Phân loại: ${selectedSearchItem.type === 'work' ? 'Học tập/Công việc' : selectedSearchItem.type === 'personal' ? 'Cá nhân' : 'Kỷ niệm'}`)
                            ),
                            selectedSearchItem.searchType === 'Ghi chú' && e('div', { className: "flex flex-col gap-1.5" },
                                e('p', { className: "text-xs font-bold text-slate-800" }, `Tiêu đề: ${selectedSearchItem.title}`),
                                e('p', { className: "text-xs text-slate-600 font-medium whitespace-pre-line leading-relaxed bg-gray-50 p-2.5 rounded-xl border border-gray-100" }, selectedSearchItem.content),
                                e('p', { className: "text-[10px] text-gray-400 font-bold" }, `Ngày cập nhật sau cùng: ${selectedSearchItem.date}`)
                            ),
                            selectedSearchItem.searchType === 'Việc cần làm' && e('div', { className: "flex flex-col gap-1.5" },
                                e('p', { className: "text-xs font-bold text-slate-800" }, `Nội dung: ${selectedSearchItem.text}`),
                                e('p', { className: "text-xs font-medium" }, `Trạng thái: ${selectedSearchItem.completed ? '🟢 Đã hoàn thành xuất sắc' : '🔴 Đang trong tiến trình thực hiện'}`),
                                e('p', { className: "text-[10px] text-gray-400 font-bold" }, `Hạn định hoàn thành: ${selectedSearchItem.deadline}`)
                            )
                        ),
                        e('button', { onClick: () => setSelectedSearchItem(null), className: "w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-2 rounded-xl text-xs transition shadow-sm font-sans mt-1" }, "Đóng cửa sổ")
                    )
                ),

                // THANH ĐIỀU HƯỚNG TÁC VỤ CHÂN TRANG (FOOTER TABS NAVIGATION)
                e('div', { className: "fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/95 backdrop-blur-md border-t border-gray-100 px-6 py-2.5 flex justify-between items-center z-40 shadow-[0_-5px_20px_rgba(0,0,0,0.03)]" },
                    [
                        { id: 'calendar', label: 'Lịch vạn niên', icon: Calendar },
                        { id: 'notes', label: 'Ghi chú', icon: FileText },
                        { id: 'todos', label: 'Việc cần làm', icon: CheckSquare }
                    ].map(tab => {
                        const isActive = currentTab === tab.id;
                        return e('button', {
                            key: tab.id,
                            onClick: () => { setCurrentTab(tab.id); setSearchQuery(''); }, // Tự động xóa chuỗi tìm kiếm khi chuyển tab để giao diện gọn gàng
                            className: "flex flex-col items-center gap-1 flex-1 py-1 transition relative group"
                        },
                            e(tab.icon, { size: 18, className: isActive ? 'text-blue-600 scale-110 transition-transform' : 'text-gray-400 group-hover:text-slate-600 transition-colors' }),
                            e('span', { className: `text-[10px] font-bold tracking-tight font-sans ${isActive ? 'text-blue-600' : 'text-gray-400'}` }, tab.label)
                        );
                    })
                ),

                // TOAST CONTAINER PHỤC VỤ HIỂN THỊ THÔNG BÁO ĐỘNG
                e(ToastContainer, { 
                    position: "top-center", 
                    autoClose: 3000, 
                    hideProgressBar: false, 
                    newestOnTop: false, 
                    closeOnClick: true, 
                    rtl: false 
                })
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
