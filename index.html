<body class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-blue-500 selection:text-white">
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const { createRoot } = ReactDOM;
        const { 
            Calendar, 
            Clock, 
            CheckCircle, 
            Plus, 
            Trash2, 
            ChevronLeft, 
            ChevronRight, 
            BookOpen, 
            User, 
            LogOut, 
            CloudLightning, 
            RefreshCw, 
            Check, 
            CornerDownRight, 
            WifiOff, 
            FileText, 
            AlertTriangle,
            Search,
            X
        } = lucide;
        const { ToastContainer, toast } = ReactToastify;

        // ĐĂNG KÝ SERVICE WORKER ĐỂ CHẠY OFFLINE
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[PWA] Đăng ký SW thành công:', reg.scope))
                    .catch(err => console.error('[PWA] Thất bại khi đăng ký SW:', err));
            });
        }

        // KHO DỮ LIỆU KINH PHÁP CÚ CỐ ĐỊNH PHỤC VỤ OFFLINE
        const DHAMMAPADA_DATA = [
            { id: 1, text: "Trong các pháp, tâm dẫn đầu, tâm làm chủ, tâm tạo tác. Nếu với tâm ô nhiễm, nói năng hay hành động, khổ não bước theo sau, như bánh xe vật theo chân con vật kéo.", chapter: "Phẩm Song Yếu" },
            { id: 2, text: "Trong các pháp, tâm dẫn đầu, tâm làm chủ, tâm tạo tác. Nếu với tâm thanh tịnh, nói năng hay hành động, an vui bước theo sau, như bóng không rời hình.", chapter: "Phẩm Song Yếu" },
            { id: 3, text: "Hận thù diệt hận thù, đời này không có được. Từ bi diệt hận thù, là định luật nghìn thu.", chapter: "Phẩm Song Yếu" },
            { id: 4, text: "Người ngu nghĩ mình ngu, nhờ vậy thành có trí. Người ngu tưởng có trí, thật tối thượng ngu si.", chapter: "Phẩm Ngu Tộc" },
            { id: 5, text: "Dù tụng hằng ngàn câu, nhưng không nghĩa lý gì, tốt hơn một câu nghĩa, nghe xong tâm tịch tịnh.", chapter: "Phẩm Hàng Ngàn" }
        ];

        const DANH_NGON_DATA = [
            "Hành trình vạn dặm luôn bắt đầu từ một bước chân đầu tiên.",
            "Cuộc sống không phải là chờ đợi bão giông qua đi, mà là học cách vũ điệu dưới cơn mưa.",
            "Sự kiên trì chính là chìa khóa mở ra mọi cánh cửa của thành công.",
            "Hãy sống là chính mình, bình an và tự tại giữa dòng đời vạn biến."
        ];

        // KHỞI TẠO CẤU HÌNH FIREBASE CLIENT SDK
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyBEgbs4brFEVbBhf7KaEhw8FekAJTUBFZ0",
            authDomain: "lich-van-trung.firebaseapp.com",
            projectId: "lich-van-trung",
            storageBucket: "lich-van-trung.firebasestorage.app",
            messagingSenderId: "527946288674",
            appId: "1:527946288674:web:86bfb1bbf86e08f237efb9"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(FIREBASE_CONFIG);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Bật tính năng lưu dữ liệu cục bộ ngoại tuyến của Firestore để hỗ trợ chạy tối ưu
        db.enablePersistence().catch((err) => {
            console.warn("[Firestore] Không thể bật tính năng kiên định dữ liệu offline:", err.code);
        });

        // CẤU PHẦN CHÍNH CỦA ỨNG DỤNG
        const App = () => {
            const [currentDate, setCurrentDate] = React.useState(new Date());
            const [user, setUser] = React.useState(null);
            const [events, setEvents] = React.useState([]);
            const [notes, setNotes] = React.useState([]);
            const [todos, setTodos] = React.useState([]);
            
            // Các trạng thái Form nhập liệu
            const [newEventTitle, setNewEventTitle] = React.useState('');
            const [newNoteContent, setNewNoteContent] = React.useState('');
            const [newTodoText, setNewTodoText] = React.useState('');
            
            // Trạng thái hệ thống và đồng bộ dữ liệu ngầm
            const [connectionError, setConnectionError] = React.useState(false);
            const [lastOfflineTime, setLastOfflineTime] = React.useState(localStorage.getItem('last_offline_time') || 'Chưa ghi nhận');
            const [isSyncing, setIsSyncing] = React.useState(false);

            // BỔ SUNG TRẠNG THÁI CHO THANH TÌM KIẾM TOÀN CỤC
            const [searchQuery, setSearchQuery] = React.useState('');
            const [searchResults, setSearchResults] = React.useState([]);
            const [isSearchFocused, setIsSearchFocused] = React.useState(false);

            // Đăng ký theo dõi trạng thái đăng nhập của người dùng
            React.useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((usr) => {
                    if (usr) {
                        setUser(usr);
                        setConnectionError(false);
                        syncDataOnline(usr.uid);
                    } else {
                        setUser(null);
                        loadLocalFallbackData();
                    }
                });
                return () => unsubscribe();
            }, []);

            // XỬ LÝ LỌC TÌM KIẾM TOÀN CỤC KHI TRẠNG THÁI TỪ KHÓA THAY ĐỔI
            React.useEffect(() => {
                if (!searchQuery.trim()) {
                    setSearchResults([]);
                    return;
                }
                const query = searchQuery.toLowerCase().trim();
                const filteredResults = [];

                // 1. Tìm trong Sự kiện
                events.forEach(ev => {
                    if (ev.title && ev.title.toLowerCase().includes(query)) {
                        filteredResults.push({ id: ev.id, type: 'event', title: ev.title, subtitle: 'Sự kiện' });
                    }
                });

                // 2. Tìm trong Ghi chú
                notes.forEach(nt => {
                    if (nt.content && nt.content.toLowerCase().includes(query)) {
                        filteredResults.push({ id: nt.id, type: 'note', title: nt.content, subtitle: 'Ghi chú' });
                    }
                });

                // 3. Tìm trong Việc cần làm
                todos.forEach(td => {
                    if (td.text && td.text.toLowerCase().includes(query)) {
                        filteredResults.push({ id: td.id, type: 'todo', title: td.text, subtitle: `Việc cần làm [${td.completed ? 'Đã xong' : 'Chưa xong'}]` });
                    }
                });

                setSearchResults(filteredResults);
            }, [searchQuery, events, notes, todos]);

            // Hàm xử lý khi bấm vào một kết quả tìm kiếm bất kỳ
            const handleResultClick = (result) => {
                setSearchQuery('');
                setIsSearchFocused(false);
                toast.info(`Đang chuyển hướng tới: "${result.title.substring(0, 20)}..."`);
                
                // Cơ chế tự động tìm và cuộn màn hình đến phần tử chứa nội dung
                setTimeout(() => {
                    const element = document.getElementById(result.id);
                    if (element) {
                        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        element.classList.add('ring-2', 'ring-amber-500', 'transition-all');
                        setTimeout(() => element.classList.remove('ring-2', 'ring-amber-500'), 3000);
                    } else {
                        // Nếu không tìm thấy DOM trực tiếp, thông báo và gợi ý giao diện mục tương ứng
                        toast.success(`Dữ liệu mục đang hiển thị trên danh sách của bạn.`);
                    }
                }, 300);
            };

            // Hàm nạp dữ liệu dự phòng từ LocalStorage khi ngoại tuyến hoặc chưa đăng nhập
            const loadLocalFallbackData = () => {
                try {
                    setEvents(JSON.parse(localStorage.getItem('fallback_events')) || []);
                    setNotes(JSON.parse(localStorage.getItem('fallback_notes')) || []);
                    setTodos(JSON.parse(localStorage.getItem('fallback_todos')) || []);
                } catch (e) {
                    console.error("Lỗi đồng bộ nạp dữ liệu cục bộ:", e);
                }
            };

            // Lưu đệm dữ liệu xuống LocalStorage để phục vụ ngoại tuyến nhanh chóng
            const saveLocalCache = (key, data) => {
                localStorage.setItem(key, JSON.stringify(data));
            };

            // Đồng bộ đồng thời dữ liệu thời gian thực từ Cloud Firestore
            const syncDataOnline = (uid) => {
                setIsSyncing(true);
                
                // Lắng nghe dữ liệu Sự kiện
                db.collection('users').doc(uid).collection('events')
                    .onSnapshot(snapshot => {
                        const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setEvents(items);
                        saveLocalCache('fallback_events', items);
                    }, () => setConnectionError(true));

                // Lắng nghe dữ liệu Ghi chú
                db.collection('users').doc(uid).collection('notes')
                    .onSnapshot(snapshot => {
                        const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setNotes(items);
                        saveLocalCache('fallback_notes', items);
                    }, () => setConnectionError(true));

                // Lắng nghe dữ liệu Việc cần làm
                db.collection('users').doc(uid).collection('todos')
                    .onSnapshot(snapshot => {
                        const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setTodos(items);
                        saveLocalCache('fallback_todos', items);
                        setIsSyncing(false);
                    }, () => {
                        setConnectionError(true);
                        setIsSyncing(false);
                    });
            };

            // Xử lý ghi nhận thao tác vào IndexedDB Queue phục vụ đồng bộ ngầm sau này
            const pushToSyncQueue = async (action, collection, payload) => {
                if (!('indexedDB' in window)) return;
                return new Promise((resolve) => {
                    const request = indexedDB.open('lich_van_trung_sync', 1);
                    request.onupgradeneeded = (e) => {
                        const dbInstance = e.target.result;
                        if (!dbInstance.objectStoreNames.contains('sync_queue')) {
                            dbInstance.createObjectStore('sync_queue', { keyPath: 'id', autoIncrement: true });
                        }
                    };
                    request.onsuccess = (e) => {
                        const dbInstance = e.target.result;
                        const tx = dbInstance.transaction('sync_queue', 'readwrite');
                        const store = tx.objectStore('sync_queue');
                        store.add({ action, collection, payload, timestamp: Date.now() });
                        tx.oncomplete = () => {
                            console.log(`[Queue] Đã lưu tác vụ '${action}' vào IndexedDB thành công.`);
                            resolve();
                        };
                    };
                });
            };

            // HÀM XỬ LÝ ĐĂNG NHẬP HOÀN TOÀN TỰ ĐỘNG KHÔNG CẦN NHẬP LIỆU
            const handleAutoLoginAsync = async () => {
                try {
                    const testEmail = "uu-dam-hoa@vantrung.vn";
                    const testPass = "LichVanTrung@2025";
                    await auth.signInWithEmailAndPassword(testEmail, testPass);
                    toast.success("Đăng nhập tài khoản đồng bộ Văn Trung thành công!");
                } catch (err) {
                    try {
                        const testEmail = "uu-dam-hoa@vantrung.vn";
                        const testPass = "LichVanTrung@2025";
                        await auth.createUserWithEmailAndPassword(testEmail, testPass);
                        toast.success("Khởi tạo tài khoản đồng bộ mới thành công!");
                    } catch (createErr) {
                        toast.error("Không thể kết nối đám mây. Chuyển sang chạy Offline!");
                        setConnectionError(true);
                    }
                }
            };

            // Đăng xuất và đưa trạng thái về ngoại tuyến cục bộ
            const handleLogoutAsync = async () => {
                await auth.signOut();
                toast.info("Đã đăng xuất hệ thống dữ liệu đám mây.");
            };

            // Ép buộc kích hoạt dùng offline không hiển thị cảnh báo lỗi mạng
            const handleUseOfflineAsync = () => {
                setConnectionError(false);
                const currentTimeStr = new Date().toLocaleTimeString('vi-VN') + ' ' + new Date().toLocaleDateString('vi-VN');
                localStorage.setItem('last_offline_time', currentTimeStr);
                setLastOfflineTime(currentTimeStr);
                loadLocalFallbackData();
            };

            // THÊM MỚI SỰ KIỆN
            const handleAddEvent = async () => {
                if (!newEventTitle.trim()) return;
                const itemData = { title: newEventTitle, date: currentDate.toISOString() };
                if (user) {
                    await db.collection('users').doc(user.uid).collection('events').add(itemData);
                } else {
                    const localItems = [...events, { id: 'local_' + Date.now(), ...itemData }];
                    setEvents(localItems);
                    saveLocalCache('fallback_events', localItems);
                    await pushToSyncQueue('add', 'events', itemData);
                }
                setNewEventTitle('');
                toast.success('Đã ghi nhận sự kiện lịch mới!');
            };

            // XÓA SỰ KIỆN
            const handleDeleteEvent = async (id) => {
                if (user) {
                    await db.collection('users').doc(user.uid).collection('events').doc(id).delete();
                } else {
                    const localItems = events.filter(item => item.id !== id);
                    setEvents(localItems);
                    saveLocalCache('fallback_events', localItems);
                    await pushToSyncQueue('delete', 'events', { id });
                }
                toast.info('Đã xóa sự kiện thành công.');
            };

            // THÊM MỚI GHI CHÚ
            const handleAddNote = async () => {
                if (!newNoteContent.trim()) return;
                const itemData = { content: newNoteContent, createdAt: new Date().toISOString() };
                if (user) {
                    await db.collection('users').doc(user.uid).collection('notes').add(itemData);
                } else {
                    const localItems = [...notes, { id: 'local_' + Date.now(), ...itemData }];
                    setNotes(localItems);
                    saveLocalCache('fallback_notes', localItems);
                    await pushToSyncQueue('add', 'notes', itemData);
                }
                setNewNoteContent('');
                toast.success('Đã thêm ghi chú mới thành công!');
            };

            // XÓA GHI CHÚ
            const handleDeleteNote = async (id) => {
                if (user) {
                    await db.collection('users').doc(user.uid).collection('notes').doc(id).delete();
                } else {
                    const localItems = notes.filter(item => item.id !== id);
                    setNotes(localItems);
                    saveLocalCache('fallback_notes', localItems);
                    await pushToSyncQueue('delete', 'notes', { id });
                }
                toast.info('Đã xóa bỏ ghi chú.');
            };

            // THÊM MỚI VIỆC CẦN LÀM
            const handleAddTodo = async () => {
                if (!newTodoText.trim()) return;
                const itemData = { text: newTodoText, completed: false, createdAt: new Date().toISOString() };
                if (user) {
                    await db.collection('users').doc(user.uid).collection('todos').add(itemData);
                } else {
                    const localItems = [...todos, { id: 'local_' + Date.now(), ...itemData }];
                    setTodos(localItems);
                    saveLocalCache('fallback_todos', localItems);
                    await pushToSyncQueue('add', 'todos', itemData);
                }
                setNewTodoText('');
                toast.success('Đã bổ sung đầu việc mới cần làm!');
            };

            // ĐỔI TRẠNG THÁI HOÀN THÀNH VIỆC CẦN LÀM
            const handleToggleTodo = async (id, currentStatus) => {
                if (user) {
                    await db.collection('users').doc(user.uid).collection('todos').doc(id).update({ completed: !currentStatus });
                } else {
                    const localItems = todos.map(item => item.id === id ? { ...item, completed: !currentStatus } : item);
                    setTodos(localItems);
                    saveLocalCache('fallback_todos', localItems);
                    await pushToSyncQueue('update', 'todos', { id, completed: !currentStatus });
                }
            };

            // XÓA VIỆC CẦN LÀM
            const handleDeleteTodo = async (id) => {
                if (user) {
                    await db.collection('users').doc(user.uid).collection('todos').doc(id).delete();
                } else {
                    const localItems = todos.filter(item => item.id !== id);
                    setTodos(localItems);
                    saveLocalCache('fallback_todos', localItems);
                    await pushToSyncQueue('delete', 'todos', { id });
                }
                toast.info('Đã xóa đầu việc.');
            };

            // PHẦN THUẬT TOÁN TÍNH TOÁN LỊCH VẠN NIÊN KHÔNG ĐỔI
            const dayOfWeekStr = new Intl.DateTimeFormat('vi-VN', { weekday: 'long' }).format(currentDate);
            const dayOfMonthStr = currentDate.getDate();
            const monthYearStr = new Intl.DateTimeFormat('vi-VN', { month: 'long', year: 'numeric' }).format(currentDate);

            // Sinh dữ liệu Lịch âm dương mô phỏng an toàn
            const lunarDayMock = (dayOfMonthStr % 29) + 1;
            const lunarMonthMock = "Tháng Chạp";
            const canChiYearMock = "Ất Tỵ (2025)";

            // Chọn ngẫu nhiên Kinh Pháp Cú và Danh ngôn theo ngày để hiển thị tối ưu
            const dhammadapaToday = DHAMMAPADA_DATA[dayOfMonthStr % DHAMMAPADA_DATA.length];
            const danhNgonToday = DANH_NGON_DATA[dayOfMonthStr % DANH_NGON_DATA.length];

            return e('div', { className: "min-h-screen max-w-md mx-auto bg-slate-50 flex flex-col relative pb-12 shadow-2xl" },
                // THANH TIÊU ĐỀ ĐẦU TRANG (HEADER) TÍNH HỢP THANH TÌM KIẾM TOÀN CỤC
                e('header', { className: "bg-blue-600 text-white px-4 pt-4 pb-3 sticky top-0 z-40 shadow-md flex flex-col gap-2.5 transition-all" },
                    e('div', { className: "flex justify-between items-center" },
                        e('div', { className: "flex items-center gap-2" },
                            e(Calendar, { size: 22, className: "text-amber-300" }),
                            e('h1', { className: "font-bold text-lg tracking-wide font-sans" }, "Lịch Văn Trung")
                        ),
                        e('div', { className: "flex items-center gap-2" },
                            isSyncing && e(RefreshCw, { size: 14, className: "animate-spin text-blue-200" }),
                            user ? e('div', { className: "flex items-center gap-1.5" },
                                e(User, { size: 14, className: "text-blue-100" }),
                                e('span', { className: "text-xs font-semibold max-w-[80px] truncate" }, "Đã bộ hóa"),
                                e('button', { onClick: handleLogoutAsync, className: "p-1 hover:bg-blue-700 rounded-lg text-red-200 transition" }, e(LogOut, { size: 14 }))
                            ) : e('button', { onClick: handleAutoLoginAsync, className: "bg-amber-500 hover:bg-amber-600 px-2.5 py-1 rounded-lg text-xs font-bold transition flex items-center gap-1 shadow-sm" }, 
                                e(CloudLightning, { size: 12 }), "Đồng bộ đám mây"
                            )
                        )
                    ),
                    
                    // Ô NHẬP TÌM KIẾM TOÀN CỤC MỚI ĐƯỢC TÍCH HỢP
                    e('div', { className: "relative w-full" },
                        e('div', { className: "relative flex items-center bg-white text-slate-800 rounded-xl overflow-hidden shadow-inner px-2.5 py-1.5 border border-blue-400 focus-within:ring-2 focus-within:ring-amber-400 transition" },
                            e(Search, { size: 16, className: "text-slate-400 mr-1.5 flex-shrink-0" }),
                            e('input', {
                                type: 'text',
                                placeholder: 'Tìm kiếm Sự kiện, Ghi chú, Đầu việc...',
                                value: searchQuery,
                                onChange: (e) => setSearchQuery(e.target.value),
                                onFocus: () => setIsSearchFocused(true),
                                className: "w-full bg-transparent text-xs outline-none font-medium text-slate-700 placeholder:text-slate-400"
                            }),
                            searchQuery.length > 0 && e('button', { 
                                onClick: () => setSearchQuery(''),
                                className: "p-0.5 hover:bg-slate-100 rounded-full transition" 
                            }, e(X, { size: 14, className: "text-slate-500" }))
                        ),

                        // KHUNG HIỂN THỊ KẾT QUẢ TÌM KIẾM NỔI BẬT (OVERLAY DROPDOWN)
                        (isSearchFocused && searchQuery.trim().length > 0) && e('div', { className: "absolute top-full left-0 right-0 mt-1.5 bg-white rounded-xl shadow-2xl border border-slate-100 max-h-60 overflow-y-auto z-50 no-scrollbar divide-y divide-slate-100" },
                            searchResults.length === 0 ? e('div', { className: "p-3 text-center text-xs text-slate-400 font-medium" }, "Không tìm thấy kết quả nào trùng khớp.") :
                            searchResults.map((result) => {
                                let IconComponent = FileText;
                                if (result.type === 'event') IconComponent = Calendar;
                                if (result.type === 'todo') IconComponent = CheckCircle;
                                
                                return e('div', {
                                    key: result.id,
                                    onClick: () => handleResultClick(result),
                                    className: "p-2.5 hover:bg-amber-50 cursor-pointer flex items-start gap-2.5 transition group"
                                },
                                    e(IconComponent, { size: 14, className: "text-blue-500 mt-0.5 flex-shrink-0 group-hover:scale-110 transition" }),
                                    e('div', { className: "flex flex-col flex-1" },
                                        e('span', { className: "text-xs font-semibold text-slate-700 line-clamp-1 group-hover:text-blue-600 transition" }, result.title),
                                        e('span', { className: "text-[10px] font-bold text-slate-400 uppercase tracking-tight mt-0.5" }, result.subtitle)
                                    )
                                );
                            })
                        ),
                        // Đóng khung tìm kiếm khi nhấp ra ngoài nền tảng ẩn
                        isSearchFocused && e('div', { 
                            className: "fixed inset-0 z-40 pointer-events-none",
                            onClick: () => setIsSearchFocused(false) 
                        })
                    )
                ),

                // KHU VỰC HIỂN THỊ NỘI DUNG CHÍNH (MAIN BODY)
                e('main', { className: "p-4 flex flex-col gap-5 overflow-y-auto flex-1 no-scrollbar" },
                    
                    // KHỐI HIỂN THỊ LỊCH VẠN NIÊN CHI TIẾT ĐẦU TRANG
                    e('div', { className: "bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex flex-col items-center relative overflow-hidden" },
                        e('div', { className: "absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-blue-500 to-indigo-500" }),
                        e('div', { className: "w-full flex justify-between items-center mb-3" },
                            e('button', { 
                                onClick: () => setCurrentDate(new Date(currentDate.setDate(currentDate.getDate() - 1))),
                                className: "p-1.5 hover:bg-slate-100 rounded-xl text-slate-600 transition" 
                            }, e(ChevronLeft, { size: 18 })),
                            e('span', { className: "text-xs font-bold text-slate-500 uppercase tracking-wider font-sans" }, monthYearStr),
                            e('button', { 
                                onClick: () => setCurrentDate(new Date(currentDate.setDate(currentDate.getDate() + 1))),
                                className: "p-1.5 hover:bg-slate-100 rounded-xl text-slate-600 transition" 
                            }, e(ChevronRight, { size: 18 }))
                        ),
                        e('span', { className: "text-sm font-semibold text-blue-600 tracking-wide mb-1" }, dayOfWeekStr),
                        e('span', { className: "text-6xl font-extrabold text-slate-900 my-1 font-serif tracking-tighter" }, dayOfMonthStr),
                        
                        // Chi tiết thông số âm lịch
                        e('div', { className: "mt-4 pt-3 border-t border-slate-100 w-full flex justify-around text-center text-xs font-medium" },
                            e('div', null,
                                e('p', { className: "text-slate-400 mb-0.5 text-[10px] uppercase font-bold" }, "Lịch âm"),
                                e('p', { className: "text-slate-700 font-bold" }, `${lunarDayMock} ${lunarMonthMock}`)
                            ),
                            e('div', null,
                                e('p', { className: "text-slate-400 mb-0.5 text-[10px] uppercase font-bold" }, "Năm âm lịch"),
                                e('p', { className: "text-indigo-600 font-bold" }, canChiYearMock)
                            )
                        )
                    ),

                    // KHO DỮ LIỆU KINH PHÁP CÚ VÀ DANH NGÔN NGÀY MỚI
                    e('div', { className: "bg-gradient-to-br from-amber-50 to-orange-50 rounded-2xl p-4 border border-amber-100 shadow-sm flex flex-col gap-3" },
                        e('div', { className: "flex items-start gap-2" },
                            e(BookOpen, { size: 16, className: "text-amber-600 mt-0.5 flex-shrink-0" }),
                            e('div', null,
                                e('p', { className: "text-[10px] font-bold text-amber-800 uppercase tracking-wider mb-0.5" }, `Lời Phật dạy - ${dhammadapaToday.chapter}`),
                                e('p', { className: "text-xs text-slate-700 italic leading-relaxed font-serif" }, `"${dhammadapaToday.text}"`)
                            )
                        ),
                        e('div', { className: "h-px bg-amber-200/50 w-full" }),
                        e('p', { className: "text-[11px] text-slate-500 font-medium text-center italic" }, `“${danhNgonToday}”`)
                    ),

                    // PHÂN ĐOẠN 1: QUẢN LÝ SỰ KIỆN LỊCH TRONG NGÀY
                    e('div', { id: "events-section", className: "flex flex-col gap-2.5" },
                        e('div', { className: "flex items-center gap-1.5 text-slate-700 font-bold text-xs uppercase tracking-wider px-1" },
                            e(Calendar, { size: 14, className: "text-blue-500" }), "Sự kiện trong ngày"
                        ),
                        e('div', { className: "bg-white rounded-2xl p-3 shadow-sm border border-slate-100 flex flex-col gap-2" },
                            e('div', { className: "flex gap-2" },
                                e('input', {
                                    type: 'text',
                                    placeholder: 'Thêm sự kiện lịch quan trọng...',
                                    value: newEventTitle,
                                    onChange: (e) => setNewEventTitle(e.target.value),
                                    className: "flex-1 bg-slate-50 border border-slate-200 text-xs rounded-xl px-3 py-2 outline-none focus:border-blue-500 transition font-medium"
                                }),
                                e('button', { onClick: handleAddEvent, className: "bg-blue-600 hover:bg-blue-700 p-2 text-white rounded-xl transition flex-shrink-0 shadow-sm" }, e(Plus, { size: 16 }))
                            ),
                            e('div', { className: "flex flex-col gap-1.5 mt-1" },
                                events.filter(ev => ev.date && ev.date.substring(0, 10) === currentDate.toISOString().substring(0, 10)).length === 0 ? 
                                e('p', { className: "text-center text-xs text-slate-400 py-3 font-medium" }, "Hôm nay trống trải, chưa có sự kiện lịch nào.") :
                                events.filter(ev => ev.date && ev.date.substring(0, 10) === currentDate.toISOString().substring(0, 10)).map(ev => 
                                    e('div', { key: ev.id, id: ev.id, className: "flex justify-between items-center bg-slate-50 hover:bg-slate-100 px-3 py-2 rounded-xl transition border border-slate-100 group" },
                                        e('span', { className: "text-xs font-semibold text-slate-700" }, ev.title),
                                        e('button', { onClick: () => handleDeleteEvent(ev.id), className: "text-slate-400 hover:text-red-500 p-1 opacity-80 group-hover:opacity-100 transition" }, e(Trash2, { size: 12 }))
                                    )
                                )
                            )
                        )
                    ),

                    // PHÂN ĐOẠN 2: SỔ TAY GHI CHÚ CHỮ PHÁP
                    e('div', { id: "notes-section", className: "flex flex-col gap-2.5" },
                        e('div', { className: "flex items-center gap-1.5 text-slate-700 font-bold text-xs uppercase tracking-wider px-1" },
                            e(FileText, { size: 14, className: "text-indigo-500" }), "Sổ tay ghi chú"
                        ),
                        e('div', { className: "bg-white rounded-2xl p-3 shadow-sm border border-slate-100 flex flex-col gap-2" },
                            e('div', { className: "flex gap-2" },
                                e('textarea', {
                                    rows: 2,
                                    placeholder: 'Ghi chép nhanh suy nghĩ, ý tưởng của bạn...',
                                    value: newNoteContent,
                                    onChange: (e) => setNewNoteContent(e.target.value),
                                    className: "flex-1 bg-slate-50 border border-slate-200 text-xs rounded-xl px-3 py-2 outline-none focus:border-indigo-500 transition font-medium resize-none"
                                }),
                                e('button', { onClick: handleAddNote, className: "bg-indigo-600 hover:bg-indigo-700 px-3 text-white rounded-xl transition flex-shrink-0 flex items-center justify-center shadow-sm" }, e(Plus, { size: 16 }))
                            ),
                            e('div', { className: "flex flex-col gap-2 mt-1 max-h-48 overflow-y-auto no-scrollbar" },
                                notes.length === 0 ? e('p', { className: "text-center text-xs text-slate-400 py-4 font-medium" }, "Chưa có ghi chép tay nào.") :
                                notes.map(nt => 
                                    e('div', { key: nt.id, id: nt.id, className: "bg-slate-50 hover:bg-slate-100 p-2.5 rounded-xl border border-slate-100 relative group transition" },
                                        e('p', { className: "text-xs text-slate-700 font-medium whitespace-pre-wrap pr-6 leading-relaxed" }, nt.content),
                                        e('button', { onClick: () => handleDeleteNote(nt.id), className: "absolute top-2 right-2 text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition" }, e(Trash2, { size: 12 }))
                                    )
                                )
                            )
                        )
                    ),

                    // PHÂN ĐOẠN 3: VIỆC CẦN LÀM (TODOS CHỐNG QUÊN)
                    e('div', { id: "todos-section", className: "flex flex-col gap-2.5" },
                        e('div', { className: "flex items-center gap-1.5 text-slate-700 font-bold text-xs uppercase tracking-wider px-1" },
                            e(CheckCircle, { size: 14, className: "text-emerald-500" }), "Việc cần làm"
                        ),
                        e('div', { className: "bg-white rounded-2xl p-3 shadow-sm border border-slate-100 flex flex-col gap-2" },
                            e('div', { className: "flex gap-2" },
                                e('input', {
                                    type: 'text',
                                    placeholder: 'Thêm đầu việc mới cần xử lý...',
                                    value: newTodoText,
                                    onChange: (e) => setNewTodoText(e.target.value),
                                    className: "flex-1 bg-slate-50 border border-slate-200 text-xs rounded-xl px-3 py-2 outline-none focus:border-emerald-500 transition font-medium"
                                }),
                                e('button', { onClick: handleAddTodo, className: "bg-emerald-600 hover:bg-emerald-700 p-2 text-white rounded-xl transition flex-shrink-0 shadow-sm" }, e(Plus, { size: 16 }))
                            ),
                            e('div', { className: "flex flex-col gap-1.5 mt-1" },
                                todos.length === 0 ? e('p', { className: "text-center text-xs text-slate-400 py-3 font-medium" }, "Bạn hoàn thành tất cả việc cần làm!") :
                                todos.map(td => 
                                    e('div', { key: td.id, id: td.id, className: "flex justify-between items-center bg-slate-50 hover:bg-slate-100 px-3 py-2 rounded-xl border border-slate-100 group transition" },
                                        e('div', { onClick: () => handleToggleTodo(td.id, td.completed), className: "flex items-center gap-2.5 flex-1 cursor-pointer select-none" },
                                            e('div', { className: `w-4 h-4 rounded-full border flex items-center justify-center transition-all ${td.completed ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300 bg-white'}` },
                                                td.completed && e(Check, { size: 10, strokeWidth: 3 })
                                            ),
                                            e('span', { className: `text-xs font-semibold transition ${td.completed ? 'line-through text-slate-400' : 'text-slate-700'}` }, td.text)
                                        ),
                                        e('button', { onClick: () => handleDeleteTodo(td.id), className: "text-slate-400 hover:text-red-500 p-1 opacity-80 group-hover:opacity-100 transition flex-shrink-0" }, e(Trash2, { size: 12 }))
                                    )
                                )
                            )
                        )
                    )
                ),

                // CẢNH BÁO MẤT KẾT NỐI MẠNG ĐỂ QUẢN LÝ DÂN DỰ NGOẠI TUYẾN
                connectionError && e('div', { className: "fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-all" },
                    e('div', { className: "bg-white w-full max-w-xs rounded-2xl p-4 shadow-2xl flex flex-col gap-3 text-center" },
                        e('div', { className: "w-10 h-10 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center mx-auto" }, e(AlertTriangle, { size: 20 })),
                        e('h3', { className: "font-bold text-slate-800 text-sm font-sans" }, "Đồng bộ Đám mây Ngoại tuyến"),
                        e('p', { className: "text-slate-500 text-xs leading-relaxed font-sans" }, 
                            "Chúng tôi tạm thời không kết nối được với đám mây dữ liệu. Bạn vẫn có thể tiếp tục thao tác mượt mà ở chế độ Offline hoàn toàn."
                        ),
                        e('p', { className: "text-[10px] text-slate-400 font-mono" }, 
                            "Phiên offline gần nhất: ", e('b', null, lastOfflineTime)
                        ),
                        e('div', { className: "flex flex-col gap-2" },
                            e('button', { onClick: handleUseOfflineAsync, className: "w-full bg-amber-500 hover:bg-amber-600 text-white py-2 rounded-xl text-xs font-bold transition font-sans flex items-center justify-center gap-1.5" }, e(WifiOff, { size: 12 }), "Dùng offline không đồng bộ"),
                            e('div', { className: "flex gap-2" },
                                e('button', { onClick: () => setConnectionError(false), className: "flex-1 bg-gray-200 hover:bg-gray-300 text-slate-700 py-2 rounded-xl text-xs font-bold transition font-sans" }, "Bỏ qua"),
                                e('button', { onClick: () => window.location.reload(), className: "flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-xs font-bold transition font-sans" }, "Thử lại")
                            )
                        )
                    )
                ),
                
                e(ToastContainer, { 
                    position: "top-center", 
                    autoClose: 3000, 
                    hideProgressBar: false, 
                    newestOnTop: false, 
                    closeOnClick: true, 
                    rtl: false 
                })
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
