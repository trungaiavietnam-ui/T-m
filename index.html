            "Nhà vụng lợp có nhiều lỗ dột\nMột trận mưa làm ướt tả tơi.\nNgười không tu tập, mải chơi\nDục tham xâm nhập, cả đời khổ đau.",

            "Các điều ác do mình tạo tác\nÁc do tâm, ai khác ngoài ta\nÁc nhân nghiền nát người tà\nNhư kim cương cứng nghiền qua đá thường.",
            "Như tầm gửi bám cây Phật pháp\nNgười buông lung giới đức chẳng gìn\nHạnh tà chuốc họa vào thân,\nKẻ thù sung sướng thấy mình tiêu tan.",

            "Luôn tinh tấn không mê lạc thú\nHạnh thanh cao, tu sĩ thường ghi\nTrang nghiêm giới đức, hành trì\nHai đời hưởng phúc chỉ vì tu tâm.",
            "Hãy quán tưởng trong đời trần tục\nMọi thứ như bọt nước, huyễn vong.\nĐến khi ngộ lẽ vô thường\nTử thần không thể lần đường chân nhân.",
            "Cõi hồng trần đẹp tuồng ảo mộng\nNhư xe vua hoành tráng gấm thêu\nKẻ ngu tham đắm, chắt chiêu\nNgười khôn tỉnh thức, chẳng yêu nhiễm đời.",
            "Dù quá khứ buông lung, dục lạc\nNhưng về sau tỉnh thức, chuyển tâm\nLàm lành, tỏa sáng trần gian\nNhư trăng rằm chiếu, không còn mây che.",
            "Dù ngày trước gây bao tội lỗi\nNhưng hôm nay sám hối, hồi tâm\nLàm lành, tỏa sáng trần gian\nNhư trăng rằm chiếu, không còn mây che.",
            "Kẻ mù tối, thế gian đầy dẫy\nNgười sáng trong có mấy trên đời!\nNhư chim khôn chẳng vướng mồi\nNgười tu đạo đức an vui cõi trời.",
            "Như trời thẳm, thiên nga uốn lượn\nCó thần thông ẩn hiện không gian\nTrí nhân thoát chốn hồng trần\nVượt qua ma chướng, vững vàng đường tu.",
            "With những kẻ chẳng tôn trọng Pháp\ Dùng vọng ngôn lừa lọc, rêu rao\nGhét thiện, bác bỏ đời sau...\nLún sâu đường ác, ngày nào vượt ra!",
            "Kẻ keo kiệt không sanh thiên giới\nNgười dại ngu chẳng đoái tình thương\nNgười hiền thích sống thiện lương\nĐời sau hưởng phúc khác thường thế nhân.",
            "Chứng sơ quả thánh nhân rạng rỡ\nHơn cõi trời Thiên chủ uy quyền\nHơn Trời trong chốn càn khôn\nKhó tìm trong cõi bụi hồng người hơn.",
            "Phật chiến thắng hoàn toàn cõi trược\nTham ái trừ, tuệ giác sâu ngần\nKhông lưu dấu vết trần gian\nĐố ai vẽ được bước chân vượt đời.",

        ];

        // --- HÀM TRỢ GIÚP LỊCH ÂM DƯƠNG ---
        const getLunarDate = (date) => {
            try {
                const formatter = new Intl.DateTimeFormat('vi-VN', { calendar: 'chinese', day: 'numeric', month: 'numeric' });
                const parts = formatter.formatToParts(date);
                return { 
                    day: parseInt(parts.find(p => p.type === 'day').value), 
                    month: parseInt(parts.find(p => p.type === 'month').value) 
                };
            } catch (e) {
                return { day: 0, month: 0 };
            }
        };

        const getDayOfWeek = (date) => {
            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            return days[date.getDay()];
        };

        const sendNotification = (title, body) => {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body, icon: '/favicon.ico' });
            }
        };

        // --- CÁC COMPONENT CON ---
        const SettingsModal = ({ theme, onSave, onClose, auth, db, appId }) => {
            const [localTheme, setLocalTheme] = useState(theme);
            const [newPassword, setNewPassword] = useState('');
            const [passwordMessage, setPasswordMessage] = useState('');
            const [passwordError, setPasswordError] = useState('');
            const [showChangePassword, setShowChangePassword] = useState(false);
            
            // Bổ sung thiết lập mật khẩu PIN ứng dụng
            const [appPassword, setAppPassword] = useState('');
            const [enableLock, setEnableLock] = useState(false);
            const [lockError, setLockError] = useState('');
            const [lockSuccess, setLockSuccess] = useState('');

            // Tải cấu hình mật khẩu bảo mật hiện tại từ Firebase / localStorage
            useEffect(() => {
                if (!auth.currentUser) return;
                const loadLockConfig = async () => {
                    try {
                        const settingsRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'lock');
                        const docSnap = await getDoc(settingsRef);
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setAppPassword(data.appPassword || '');
                            setEnableLock(data.enableLock || false);
                        } else {
                            // Dự phòng localStorage
                            const savedPassword = localStorage.getItem('vt_app_password') || '';
                            const savedEnable = localStorage.getItem('vt_enable_lock') === 'true';
                            setAppPassword(savedPassword);
                            setEnableLock(savedEnable);
                        }
                    } catch (e) {
                        console.error("Lỗi tải thông tin khóa:", e);
                    }
                };
                loadLockConfig();
            }, [auth.currentUser]);

            // Lưu cài đặt khóa
            const handleSaveLockSettings = async (e) => {
                e.preventDefault();
                setLockError('');
                setLockSuccess('');
                if (enableLock && !appPassword.trim()) {
                    setLockError("Vui lòng nhập mã bảo vệ nếu muốn bật tính năng này.");
                    return;
                }
                try {
                    const settingsRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'lock');
                    const payload = { appPassword: appPassword.trim(), enableLock: enableLock };
                    await setDoc(settingsRef, payload, { merge: true });
                    
                    localStorage.setItem('vt_app_password', appPassword.trim());
                    localStorage.setItem('vt_enable_lock', enableLock ? 'true' : 'false');
                    setLockSuccess("Đã cập nhật tính năng bảo vệ thành công!");
                } catch (err) {
                    setLockError("Lỗi lưu cấu hình bảo vệ: " + err.message);
                }
            };

            // Tính năng Đổi mật khẩu
            const handleChangePassword = async (e) => {
                e.preventDefault();
                setPasswordMessage('');
                setPasswordError('');
                if (!newPassword.trim()) {
                    setPasswordError("Vui lòng nhập mật khẩu mới.");
                    return;
                }
                try {
                    if (auth.currentUser) {
                        await updatePassword(auth.currentUser, newPassword);
                        setPasswordMessage("Đổi mật khẩu thành công!");
                        setNewPassword('');
                    } else {
                        setPasswordError("Không tìm thấy thông tin phiên đăng nhập.");
                    }
                } catch (err) {
                    if (err.code === 'auth/requires-recent-login') {
                        setPasswordError("⚠️ Hãy Đăng xuất và Đăng nhập lại để xác thực danh tính trước khi đổi mật khẩu.");
                    } else {
                        setPasswordError("Lỗi: " + err.message);
                    }
                }
            };

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-sm rounded-xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
                        <div className="bg-gray-800 text-white p-4 flex justify-between items-center shrink-0">
                            <h3 className="font-bold flex items-center gap-2"><Palette size={18}/> Giao Diện & Bảo Mật</h3>
                            <button onClick={onClose}><X size={20}/></button>
                        </div>
                        
                        <div className="p-6 space-y-6 overflow-y-auto flex-1 no-scrollbar text-slate-800">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Màu Nền Ứng Dụng</label>
                                <input type="color" className="w-full h-12 rounded cursor-pointer border-2 border-gray-200 bg-white" value={localTheme.bgColor} onChange={e => setLocalTheme({...localTheme, bgColor: e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Màu Nền Ghi Chú</label>
                                <input type="color" className="w-full h-12 rounded cursor-pointer border-2 border-gray-200 bg-white" value={localTheme.noteColor} onChange={e => setLocalTheme({...localTheme, noteColor: e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Màu Chữ Chính</label>
                                <input type="color" className="w-full h-12 rounded cursor-pointer border-2 border-gray-200 bg-white" value={localTheme.textColor} onChange={e => setLocalTheme({...localTheme, textColor: e.target.value})} />
                            </div>
                            
                            <button onClick={() => onSave(localTheme)} className="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md">Lưu & Đồng Bộ Màu</button>
                            <button onClick={() => onSave({ bgColor: '#f3f4f6', noteColor: '#FEFCE8', textColor: '#1F2937' })} className="w-full border border-gray-300 text-gray-600 py-2 rounded-lg text-sm">Khôi phục màu mặc định</button>

                            {/* KHU VỰC: Đặt mã PIN bảo vệ việc làm & ghi chú */}
                            <div className="border-t pt-4 mt-4">
                                <h4 className="font-bold text-sm text-slate-800 flex items-center gap-2 mb-3"><Lock size={16} /> Bảo vệ Ghi chú & Việc cần làm</h4>
                                <form onSubmit={handleSaveLockSettings} className="space-y-3 p-3 bg-slate-50 rounded-lg border border-slate-200">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-xs font-semibold text-slate-600">Trạng thái khóa bảo vệ:</span>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" className="sr-only peer" checked={enableLock} onChange={e => setEnableLock(e.target.checked)} />
                                            <div className="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                                        </label>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="block text-[10px] font-bold text-slate-500 uppercase">Mã PIN bảo mật</label>
                                        <input type="password" maxLength={12} className="w-full px-3 py-1.5 border rounded-lg text-sm text-slate-800 focus:ring-1 focus:ring-blue-500 outline-none" placeholder="Nhập mã bảo vệ cá nhân..." value={appPassword} onChange={e => setAppPassword(e.target.value)} />
                                    </div>
                                    {lockError && <p className="text-red-500 text-xs">{lockError}</p>}
                                    {lockSuccess && <p className="text-green-600 text-xs font-medium">{lockSuccess}</p>}
                                    <button type="submit" className="w-full bg-slate-800 text-white text-xs font-bold py-2 rounded-lg hover:bg-slate-700 transition">Cập nhật mật khẩu bảo vệ</button>
                                </form>
                            </div>

                            {/* Khu vực tính năng đổi mật khẩu */}
                            <div className="border-t pt-4 mt-4">
                                <button type="button" onClick={() => setShowChangePassword(!showChangePassword)} className="w-full flex items-center justify-center gap-2 border border-slate-300 text-slate-700 py-2 rounded-lg text-sm font-bold hover:bg-slate-50 transition" >
                                    <Key size={16} /> {showChangePassword ? "Ẩn đổi mật khẩu" : "Đổi mật khẩu tài khoản"}
                                </button>
                                {showChangePassword && (
                                    <form onSubmit={handleChangePassword} className="mt-4 space-y-3 p-3 bg-slate-50 rounded-lg border border-slate-200 animate-in fade-in">
                                        <label className="block text-xs font-bold text-slate-600">Mật khẩu mới</label>
                                        <input type="password" className="w-full px-3 py-2 border rounded-lg text-sm text-slate-800 focus:ring-1 focus:ring-blue-500 outline-none" placeholder="Nhập mật khẩu mới..." value={newPassword} onChange={e => setNewPassword(e.target.value)} />
                                        {passwordError && <p className="text-red-500 text-xs">{passwordError}</p>}
                                        {passwordMessage && <p className="text-green-600 text-xs font-medium">{passwordMessage}</p>}
                                        <button type="submit" className="w-full bg-slate-800 text-white text-xs font-bold py-2 rounded-lg hover:bg-slate-700 transition">Xác nhận đổi mật khẩu</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AuthScreen = ({ auth, appId }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [message, setMessage] = useState('');
            const [showPassword, setShowPassword] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError('');
                setMessage('');
                if (!email || !password) {
                    setError('Vui lòng điền đầy đủ email và mật khẩu.');
                    return;
                }
                try {
                    if (isLogin) {
                        await signInWithEmailAndPassword(auth, email, password);
                    } else {
                        await createUserWithEmailAndPassword(auth, email, password);
                        setMessage('Đăng ký tài khoản thành công! Bạn đã tự động đăng nhập.');
                    }
                } catch (err) {
                    let textErr = err.message;
                    if (err.code === 'auth/invalid-credential') textErr = 'Email hoặc mật khẩu không chính xác.';
                    else if (err.code === 'auth/email-already-in-use') textErr = 'Tài khoản email này đã được đăng ký trước đó.';
                    else if (err.code === 'auth/weak-password') textErr = 'Mật khẩu quá yếu (Yêu cầu từ 6 ký tự trở lên).';
                    setError(textErr);
                }
            };

            const handleForgotPassword = async () => {
                setError('');
                setMessage('');
                if (!email) {
                    setError('Vui lòng nhập địa chỉ email vào ô trống bên trên để nhận liên kết khôi phục.');
                    return;
                }
                try {
                    await sendPasswordResetEmail(auth, email);
                    setMessage('Hệ thống đã gửi hướng dẫn đặt lại mật khẩu về Email của bạn. Hãy kiểm tra hộp thư!');
                } catch (err) {
                    setError('Lỗi: ' + err.message);
                }
            };

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden p-6 text-slate-800">
                        <div className="text-center mb-6">
                            <div className="inline-block p-3 bg-blue-100 rounded-full text-blue-600 mb-2">
                                <CalendarDays size={32} />
                            </div>
                            <h2 className="text-xl font-black text-slate-900 tracking-tight">LỊCH VẠN NIÊN CLOUD</h2>
                            <p className="text-xs text-gray-500 font-medium">Bảo mật dữ liệu đám mây Firebase cá nhân</p>
                        </div>

                        <form onSubmit={handleAuth} className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-gray-600 uppercase mb-1">Địa chỉ Email</label>
                                <input type="email" className="w-full px-3 py-2 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="name@example.com" value={email} onChange={e => setEmail(e.target.value)} />
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-gray-600 uppercase mb-1">Mật khẩu tài khoản</label>
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} className="w-full px-3 py-2 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none pr-10" placeholder="••••••" value={password} onChange={e => setPassword(e.target.value)} />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                        {showPassword ? <EyeOff size={16}/> : <Eye size={16}/>}
                                    </button>
                                </div>
                            </div>

                            {error && <div className="p-3 bg-red-50 text-red-600 rounded-xl text-xs font-semibold flex items-center gap-2"><AlertCircle size={14} className="shrink-0"/> {error}</div>}
                            {message && <div className="p-3 bg-green-50 text-green-700 rounded-xl text-xs font-semibold flex items-center gap-2"><Check size={14} className="shrink-0"/> {message}</div>}

                            <button type="submit" className="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition">
                                {isLogin ? 'Đăng Nhập' : 'Đăng Ký Tài Khoản'}
                            </button>
                        </form>

                        <div className="mt-4 flex justify-between items-center text-xs">
                            <button onClick={() => setIsLogin(!isLogin)} className="text-blue-600 font-bold hover:underline">
                                {isLogin ? 'Tạo tài khoản mới' : 'Đã có tài khoản? Đăng nhập'}
                            </button>
                            {isLogin && (
                                <button onClick={handleForgotPassword} className="text-gray-500 hover:text-slate-700 hover:underline">
                                    Quên mật khẩu?
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const EventModal = ({ date, events, onAdd, onDelete }) => {
            const [newEvent, setNewEvent] = useState('');
            const [repeatType, setRepeatType] = useState('none');
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-sm rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
                        <div className="bg-blue-600 text-white p-4 flex justify-between items-center shrink-0">
                            <div>
                                <h3 className="font-bold text-sm">Sự kiện ngày {date.getDate()}/{date.getMonth()+1}</h3>
                                <p className="text-[10px] text-blue-100 font-medium">Âm lịch: Ngày {getLunarDate(date).day} tháng {getLunarDate(date).month}</p>
                            </div>
                            <button onClick={onCancel} className="p-1 hover:bg-blue-700 rounded-full"><X size={18}/></button>
                        </div>
                        
                        <div className="p-4 flex-1 overflow-y-auto no-scrollbar">
                            {events.length === 0 ? (
                                <p className="text-center text-gray-400 text-xs py-8 font-medium">Không có sự kiện nào trong ngày này.</p>
                            ) : (
                                <ul className="space-y-2">
                                    {events.map(e => {
                                        let badgeText = "";
                                        if (e.repeat === 'lunar') badgeText = "Lặp Âm";
                                        else if (e.repeat === 'solar') badgeText = "Lặp Dương";
                                        else if (e.repeat === 'weekly') badgeText = "Hàng Tuần";
                                        else if (e.repeat === 'monthly') badgeText = "Hàng Tháng";

                                        return (
                                            <li key={e.id} className="flex justify-between items-center p-2.5 bg-gray-50 rounded-lg border border-gray-150 group text-slate-800 text-sm font-bold">
                                                <div className="flex flex-col gap-0.5 max-w-[75%]">
                                                    <span className="truncate">{e.title}</span>
                                                    {badgeText && <span className="text-[9px] font-black text-blue-600 uppercase tracking-wider">{badgeText}</span>}
                                                </div>
                                                <div className="flex items-center">
                                                    <button onClick={(evt) => handleDelete(evt, e.id)} className={`text-xs font-bold transition-all px-2 py-1 rounded ${deleteConfirm === e.id ? 'bg-red-500 text-white px-2 py-1 rounded' : 'text-red-400 hover:text-red-600'}`}>{deleteConfirm === e.id ? <span>Xóa?</span> : <Trash2 size={16}/>}</button>
                                                </div>
                                            </li>
                                        );
                                    })}
                                </ul>
                            )}
                        </div>

                        <div className="p-4 border-t bg-gray-50 flex flex-col gap-2">
                            <div className="flex gap-2 text-[10px] mb-1 text-gray-700 flex-wrap">
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'none'} onChange={() => setRepeatType('none')} /> Không lặp</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'lunar'} onChange={() => setRepeatType('lunar')} /> Lặp Âm</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'solar'} onChange={() => setRepeatType('solar')} /> Lặp Dương</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'weekly'} onChange={() => setRepeatType('weekly')} /> Tuần</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="repeat" checked={repeatType === 'monthly'} onChange={() => setRepeatType('monthly')} /> Tháng</label>
                            </div>
                            <div className="flex gap-2">
                                <input className="flex-1 border rounded px-3 py-2 text-sm outline-none focus:border-blue-500 text-slate-800" placeholder="Tên sự kiện..." value={newEvent} onChange={e => setNewEvent(e.target.value)} />
                                <button onClick={() => { if(newEvent.trim()) { onAdd(newEvent, repeatType); setNewEvent(''); } }} className="bg-blue-600 text-white p-2 rounded hover:bg-blue-700"><Plus size={20}/></button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const TodoEditor = ({ initialText, initialReminder, initialDeadline, isNew, onSave, onCancel }) => {
            const [text, setText] = useState(initialText || '');
            const [reminder, setReminder] = useState(initialReminder || '');
            const [deadline, setDeadline] = useState(initialDeadline || '');

            return (
                <div className="fixed inset-0 bg-white z-40 flex flex-col animate-in slide-in-from-bottom-5">
                    <div className="flex justify-between items-center p-4 border-b bg-gray-50">
                        <button onClick={onCancel} className="p-2 hover:bg-gray-200 rounded-full"><X size={20}/></button>
                        <h3 className="font-bold text-gray-700">{isNew ? 'Thêm Việc' : 'Sửa Việc'}</h3>
                        <button onClick={()=>onSave(text, reminder, deadline)} className="text-blue-600 font-bold p-2"><Check size={18}/> Lưu</button>
                    </div>
                    
                    <div className="p-4 flex-1 flex flex-col gap-4">
                        <div><label className="text-xs font-bold text-slate-500 block mb-1">Nội dung</label><input className="w-full text-lg border-b p-2 outline-none focus:border-blue-500 bg-transparent text-slate-800 font-bold" placeholder="Ví dụ: Đi chợ..." value={text} onChange={e=>setText(e.target.value)} autoFocus /></div>
                        <div><label className="text-xs font-bold text-slate-500 block mb-1 flex items-center gap-1"><AlertCircle size={12}/> Hạn chót (Deadline)</label><input type="datetime-local" className="w-full border rounded p-2 text-sm bg-gray-50 text-slate-800 outline-none" value={deadline} onChange={e=>setDeadline(e.target.value)} /></div>
                        <div><label className="text-xs font-bold text-slate-500 block mb-1 flex items-center gap-1"><Clock size={12}/> Nhắc tôi trước (Reminder)</label><input type="datetime-local" className="w-full border rounded p-2 text-sm bg-gray-50 text-slate-800 outline-none" value={reminder} onChange={e=>setReminder(e.target.value)} /></div>
                    </div>
                </div>
            );
        };

        const TodoView = ({ user, db, appId, theme }) => {
            const [todos, setTodos] = useState([]);
            const [editing, setEditing] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const todoRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'todos'), [db, appId, user.uid]);

            // Logic tự động sắp xếp danh sách công việc (todos)
            useEffect(() => {
                const unsub = onSnapshot(query(todoRef), snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    data.sort((a, b) => {
                        const aActiveDeadline = !a.completed && a.deadlineTime;
                        const bActiveDeadline = !b.completed && b.deadlineTime;
                        if (aActiveDeadline && !bActiveDeadline) return -1;
                        if (!aActiveDeadline && bActiveDeadline) return 1;
                        if (aActiveDeadline && bActiveDeadline) {
                            const aSecs = a.deadlineTime.seconds || 0;
                            const bSecs = b.deadlineTime.seconds || 0;
                            if (aSecs !== bSecs) {
                                return aSecs - bSecs;
                            }
                        }
                        if (a.order !== undefined && b.order !== undefined) {
                            return a.order - b.order;
                        }
                        return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
                    });
                    setTodos(data);
                });
                return unsub;
            }, [todoRef]);

            const save = async (text, reminderStr, deadlineStr) => {
                const reminderData = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                const deadlineData = deadlineStr ? Timestamp.fromDate(new Date(deadlineStr)) : null;
                const payload = { text, reminderTime: reminderData, deadlineTime: deadlineData };

                if (editing.id) await updateDoc(doc(todoRef, editing.id), payload);
                else await addDoc(todoRef, { ...payload, completed: false, createdAt: serverTimestamp(), order: Date.now() });
                setEditing(null);
            };

            const handleDelete = (e, id) => {
                e.stopPropagation();
                if (deleteConfirm === id) {
                    deleteDoc(doc(todoRef, id));
                    setDeleteConfirm(null);
                } else {
                    setDeleteConfirm(id);
                    setTimeout(() => setDeleteConfirm(prev => prev === id ? null : prev), 3000);
                }
            };

            const toggleComplete = async (item) => {
                await updateDoc(doc(todoRef, item.id), { completed: !item.completed });
            };

            const formatTime = (ts) => {
                if(!ts) return '';
                const d = new Date(ts.seconds * 1000);
                return d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});
            };

            return (
                <div className="flex-1 flex flex-col overflow-hidden">
                    <div className="p-4 flex justify-between items-center border-b shrink-0 bg-white/50">
                        <h2 className="text-base font-black uppercase text-gray-800 flex items-center gap-2"><CheckSquare size={18}/> Việc Cần Làm</h2>
                        <button onClick={()=>setEditing({})} className="bg-blue-600 text-white px-3 py-1.5 rounded-xl text-xs font-bold shadow-md flex items-center gap-1 hover:bg-blue-700 transition"><Plus size={14}/> Thêm việc</button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar">
                        {todos.length === 0 ? (
                            <p className="text-center text-gray-400 text-xs py-12 font-medium">Bạn chưa lưu việc cần làm nào.</p>
                        ) : (
                            todos.map(t => (
                                <div key={t.id} onClick={()=>setEditing(t)} className={`p-3 rounded-xl border transition-all cursor-pointer flex items-start gap-3 bg-white hover:shadow-sm ${t.completed ? 'opacity-60 border-gray-200' : 'border-gray-200'}`}>
                                    <input type="checkbox" checked={t.completed || false} onChange={(e)=>{e.stopPropagation(); toggleComplete(t);}} className="mt-1 h-4 w-4 rounded text-blue-600 focus:ring-blue-500 cursor-pointer" />
                                    <div className="flex-1 min-w-0 flex flex-col gap-1">
                                        <p className={`text-sm font-bold text-slate-800 truncate ${t.completed ? 'line-through text-gray-400 font-medium' : ''}`}>{t.text}</p>
                                        {(t.deadlineTime || t.reminderTime) && (
                                            <div className="flex flex-col gap-0.5 text-[10px] text-gray-500 font-semibold">
                                                {t.deadlineTime && <span className="flex items-center gap-1 text-red-500"><AlertCircle size={10}/> Hạn: {formatTime(t.deadlineTime)}</span>}
                                                {t.reminderTime && <span className="flex items-center gap-1 text-amber-600"><Clock size={10}/> Nhắc: {formatTime(t.reminderTime)}</span>}
                                            </div>
                                        )}
                                    </div>
                                    <button onClick={(e)=>handleDelete(e, t.id)} className={`text-xs font-bold transition-all px-1.5 py-1 rounded shrink-0 ${deleteConfirm === t.id ? 'bg-red-500 text-white px-2 py-1 rounded' : 'text-gray-400 hover:text-red-500'}`}>{deleteConfirm === t.id ? 'Xóa?' : <Trash2 size={15}/>}</button>
                                </div>
                            ))
                        )}
                    </div>

                    {editing && (
                        <TodoEditor initialText={editing.text} initialReminder={editing.reminderTime ? new Date(editing.reminderTime.seconds * 1000).toISOString().slice(0,16) : ''} initialDeadline={editing.deadlineTime ? new Date(editing.deadlineTime.seconds * 1000).toISOString().slice(0,16) : ''} isNew={!editing.id} onSave={save} onCancel={()=>setEditing(null)} />
                    )}
                </div>
            );
        };

        const NotesView = ({ user, db, appId, theme }) => {
            const [notes, setNotes] = useState([]);
            const [activeNote, setActiveNote] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const noteRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'notes'), [db, appId, user.uid]);

            useEffect(() => {
                const unsub = onSnapshot(query(noteRef, orderBy('updatedAt', 'desc')), snap => {
                    setNotes(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                return unsub;
            }, [noteRef]);

            const handleAdd = async () => {
                const defaultColor = NOTE_COLORS[Math.floor(Math.random() * NOTE_COLORS.length)];
                const docRef = await addDoc(noteRef, {
                    title: 'Ghi chú mới',
                    content: '',
                    color: defaultColor,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                });
                setActiveNote({ id: docRef.id, title: 'Ghi chú mới', content: '', color: defaultColor });
            };

            const handleSave = async (id, title, content, color) => {
                await updateDoc(doc(noteRef, id), { title, content, color, updatedAt: serverTimestamp() });
                setActiveNote(null);
            };

            const handleDelete = (e, id) => {
                e.stopPropagation();
                if (deleteConfirm === id) {
                    deleteDoc(doc(noteRef, id));
                    setDeleteConfirm(null);
                    if(activeNote?.id === id) setActiveNote(null);
                } else {
                    setDeleteConfirm(id);
                    setTimeout(() => setDeleteConfirm(prev => prev === id ? null : prev), 3000);
                }
            };

            return (
                <div className="flex-1 flex flex-col overflow-hidden">
                    <div className="p-4 flex justify-between items-center border-b shrink-0 bg-white/50">
                        <h2 className="text-base font-black uppercase text-gray-800 flex items-center gap-2"><StickyNote size={18}/> Sổ Ghi Chú</h2>
                        <button onClick={handleAdd} className="bg-blue-600 text-white px-3 py-1.5 rounded-xl text-xs font-bold shadow-md flex items-center gap-1 hover:bg-blue-700 transition"><Plus size={14}/> Viết chép</button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 no-scrollbar">
                        {notes.length === 0 ? (
                            <p className="text-center text-gray-400 text-xs py-12 font-medium">Bạn chưa tạo ghi chú nào.</p>
                        ) : (
                            <div className="grid grid-cols-2 gap-3">
                                {notes.map(n => (
                                    <div key={n.id} onClick={()=>setActiveNote(n)} style={{ backgroundColor: n.color || '#FEFCE8' }} className="p-3 rounded-xl shadow-sm border border-black/5 flex flex-col justify-between h-32 cursor-pointer hover:shadow-md transition relative group text-slate-800">
                                        <div className="overflow-hidden flex-1">
                                            <h4 className="font-bold text-sm truncate mb-1">{n.title || 'Không có tiêu đề'}</h4>
                                            <p className="text-xs text-gray-600 font-medium line-clamp-4 whitespace-pre-wrap leading-tight">{n.content}</p>
                                        </div>
                                        <div className="flex justify-between items-center mt-2 pt-1 border-t border-black/5 shrink-0">
                                            <span className="text-[9px] text-gray-400 font-bold uppercase">{n.updatedAt ? new Date(n.updatedAt.seconds * 1000).toLocaleDateString('vi-VN') : ''}</span>
                                            <button onClick={(e)=>handleDelete(e, n.id)} className={`text-[10px] font-black p-1 transition-all rounded ${deleteConfirm === n.id ? 'bg-red-500 text-white text-xs font-bold px-1.5 py-0.5 rounded' : 'text-gray-400 hover:text-red-500'}`}>{deleteConfirm === n.id ? 'Xóa?' : <Trash2 size={13}/>}</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {activeNote && (
                        <NoteEditor note={activeNote} onSave={handleSave} onCancel={()=>setActiveNote(null)} />
                    )}
                </div>
            );
        };

        const NoteEditor = ({ note, onSave, onCancel }) => {
            const [title, setTitle] = useState(note.title || '');
            const [content, setContent] = useState(note.content || '');
            const [color, setColor] = useState(note.color || '#FEFCE8');

            return (
                <div className="fixed inset-0 bg-white z-40 flex flex-col animate-in slide-in-from-bottom-5" style={{ backgroundColor: color }}>
                    <div className="flex justify-between items-center p-4 border-b border-black/5 bg-black/5 shrink-0">
                        <button onClick={onCancel} className="p-2 hover:bg-black/5 rounded-full text-slate-700"><X size={20}/></button>
                        <div className="flex gap-1.5 max-w-[50%] overflow-x-auto no-scrollbar py-1">
                            {NOTE_COLORS.map(c => (
                                <button key={c} onClick={()=>setColor(c)} style={{backgroundColor: c}} className={`h-5 w-5 rounded-full border shrink-0 shadow-inner ${color === c ? 'border-slate-800 scale-110 ring-1 ring-slate-400' : 'border-black/10'}`}/>
                            ))}
                        </div>
                        <button onClick={()=>onSave(note.id, title, content, color)} className="text-blue-600 font-black p-2 bg-white/80 backdrop-blur rounded-xl px-3 py-1 shadow-sm text-sm flex items-center gap-1"><Check size={16}/> Lưu</button>
                    </div>

                    <div className="p-4 flex-1 flex flex-col gap-3 overflow-hidden text-slate-800">
                        <input className="w-full text-lg font-black bg-transparent outline-none border-b border-black/5 pb-2 placeholder-slate-500" placeholder="Tiêu đề..." value={title} onChange={e=>setTitle(e.target.value)} />
                        <textarea className="w-full flex-1 bg-transparent outline-none resize-none text-sm font-medium leading-relaxed placeholder-slate-400 overflow-y-auto no-scrollbar" placeholder="Nội dung chi tiết..." value={content} onChange={e=>setContent(e.target.value)} />
                    </div>
                </div>
            );
        };

        const TimetableView = ({ user, db, appId, theme }) => {
            const [schedule, setSchedule] = useState({});
            const [editingCell, setEditingCell] = useState(null);
            const [subject, setSubject] = useState('');
            const [room, setRoom] = useState('');
            const scheduleDocRef = useMemo(() => doc(db, 'artifacts', appId, 'users', user.uid, 'timetable', 'current'), [db, appId, user.uid]);

            useEffect(() => {
                const unsub = onSnapshot(scheduleDocRef, docSnap => {
                    if (docSnap.exists()) {
                        setSchedule(docSnap.data().schedule || {});
                    } else {
                        setSchedule({});
                    }
                });
                return unsub;
            }, [scheduleDocRef]);

            const days = ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            const periods = ['Tiết 1', 'Tiết 2', 'Tiết 3', 'Tiết 4', 'Tiết 5'];

            const handleCellClick = (day, period) => {
                const key = `${day}-${period}`;
                const cellData = schedule[key] || { subject: '', room: '' };
                setSubject(cellData.subject || '');
                setRoom(cellData.room || '');
                setEditingCell({ day, period, key });
            };

            const handleSaveCell = async () => {
                const newSchedule = { ...schedule };
                if (!subject.trim() && !room.trim()) {
                    delete newSchedule[editingCell.key];
                } else {
                    newSchedule[editingCell.key] = { subject: subject.trim(), room: room.trim() };
                }
                await setDoc(scheduleDocRef, { schedule: newSchedule }, { merge: true });
                setEditingCell(null);
            };

            return (
                <div className="flex-1 flex flex-col overflow-hidden">
                    <div className="p-4 flex justify-between items-center border-b shrink-0 bg-white/50">
                        <h2 className="text-base font-black uppercase text-gray-800 flex items-center gap-2"><Table size={18}/> Thời Khóa Biểu</h2>
                        <span className="text-[10px] bg-slate-200 text-slate-700 px-2 py-1 rounded-md font-bold uppercase">Bấm ô để sửa</span>
                    </div>

                    <div className="flex-1 overflow-auto p-2">
                        <div className="min-w-[500px] border border-gray-200 rounded-xl overflow-hidden bg-white shadow-sm">
                            <div className="grid grid-cols-7 bg-gray-100 font-bold text-center text-xs text-gray-700 border-b">
                                <div className="p-2 bg-gray-200 border-r"></div>
                                {days.map(d => <div key={d} className="p-2 border-r last:border-0">{d}</div>)}
                            </div>

                            {periods.map(p => (
                                <div key={p} className="grid grid-cols-7 text-center text-xs border-b last:border-0 min-h-[55px]">
                                    <div className="p-2 bg-gray-50 font-bold text-gray-600 border-r flex items-center justify-center">{p}</div>
                                    {days.map(d => {
                                        const key = `${d}-${p}`;
                                        const cell = schedule[key];
                                        return (
                                            <div key={d} onClick={() => handleCellClick(d, p)} className="p-1 border-r last:border-0 hover:bg-blue-50/50 cursor-pointer transition flex flex-col justify-center items-center gap-0.5 group">
                                                {cell?.subject ? (
                                                    <>
                                                        <span className="font-bold text-blue-700 line-clamp-2 leading-tight">{cell.subject}</span>
                                                        {cell.room && <span className="text-[9px] text-gray-400 font-bold bg-gray-100 px-1 rounded flex items-center gap-0.5"><MapPin size={8}/> {cell.room}</span>}
                                                    </>
                                                ) : (
                                                    <span className="text-gray-300 opacity-0 group-hover:opacity-100 text-[10px] font-bold">+ Trống</span>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>

                    {editingCell && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xs rounded-xl shadow-2xl overflow-hidden animate-in scale-in-5 text-slate-800">
                                <div className="bg-gray-800 text-white p-3 font-bold text-xs uppercase flex justify-between items-center">
                                    <span>Cập nhật: {editingCell.day} ({editingCell.period})</span>
                                    <button onClick={() => setEditingCell(null)}><X size={16}/></button>
                                </div>
                                <div className="p-4 space-y-3">
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Môn học / Công việc</label>
                                        <input type="text" className="w-full px-3 py-1.5 border rounded-lg text-sm font-bold focus:ring-1 focus:ring-blue-500 outline-none text-slate-800" placeholder="Ví dụ: Toán học, Họp ban..." value={subject} onChange={e => setSubject(e.target.value)} autoFocus />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Phòng học / Địa điểm</label>
                                        <input type="text" className="w-full px-3 py-1.5 border rounded-lg text-sm focus:ring-1 focus:ring-blue-500 outline-none text-slate-800" placeholder="Ví dụ: P.201, Trực tuyến..." value={room} onChange={e => setRoom(e.target.value)} />
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button onClick={() => setEditingCell(null)} className="flex-1 border text-gray-600 text-xs font-bold py-2 rounded-lg hover:bg-gray-50 transition">Hủy bỏ</button>
                                        <button onClick={handleSaveCell} className="flex-1 bg-blue-600 text-white text-xs font-bold py-2 rounded-lg hover:bg-blue-700 transition">Cập nhật</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- COMPONENT CHÍNH ỨNG DỤNG ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('day'); // 'day', 'calendar', 'todo', 'notes', 'timetable'
            const [theme, setTheme] = useState({ bgColor: '#f3f4f6', noteColor: '#FEFCE8', textColor: '#1F2937' });
            const [showSettings, setShowSettings] = useState(false);

            // Các trạng thái hỗ trợ khóa PIN bảo vệ
            const [unlockedTabs, setUnlockedTabs] = useState({ todo: false, notes: false });
            const [pinInput, setPinInput] = useState('');
            const [pinError, setPinError] = useState('');
            const [pendingTab, setPendingTab] = useState(null);

            // Quản lý trạng thái thông báo ngoại tuyến
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [showOfflineBadge, setShowOfflineBadge] = useState(false);

            // Lịch vạn niên cốt lõi
            const [currentDate, setCurrentDate] = useState(new Date());
            const [calendarCurrentDate, setCalendarCurrentDate] = useState(new Date());
            const [calendarSelectedDate, setCalendarSelectedDate] = useState(new Date());
            const [animClass, setAnimClass] = useState('');

            // Quản lý Modal sự kiện & cảnh báo
            const [selectedDateEvents, setSelectedDateEvents] = useState(null);
            const [activeAlerts, setActiveAlerts] = useState([]);
            const [editingAlertId, setEditingAlertId] = useState(null);
            const [editAlertTitle, setEditAlertTitle] = useState('');
            const [editAlertTimeStr, setEditAlertTimeStr] = useState('');

            // --- ĐOẠN MÃ NÂNG CẤP: DANH SÁCH STATE PHỤC VỤ TÌM KIẾM TOÀN CỤC ---
            const [searchKeyword, setSearchKeyword] = useState('');
            const [isSearchActive, setIsSearchActive] = useState(false);
            const [allEvents, setAllEvents] = useState([]);
            const [allTodos, setAllTodos] = useState([]);
            const [allNotes, setAllNotes] = useState([]);
            const [allTimetable, setAllTimetable] = useState({});
            const [searchSelectedDetail, setSearchSelectedDetail] = useState(null);

            // Khởi tạo các dịch vụ chính
            const app = initializeApp(MANUAL_CONFIG);
            const auth = getAuth(app);
            const db = getFirestore(app);

            // Đồng bộ trạng thái kết nối mạng internet
            useEffect(() => {
                const goOnline = () => { setIsOffline(false); setShowOfflineBadge(true); setTimeout(() => setShowOfflineBadge(false), 4000); };
                const goOffline = () => { setIsOffline(true); setShowOfflineBadge(false); };
                window.addEventListener('online', goOnline);
                window.addEventListener('offline', goOffline);
                return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
            }, []);

            // Kiểm tra cấu hình và xác thực người dùng
            useEffect(() => {
                try {
                    enableIndexedDbPersistence(db).catch(err => console.warn("Firestore Persistence:", err.code));
                } catch(e){}

                const savedTheme = localStorage.getItem('app_theme');
                if (savedTheme) { try { setTheme(JSON.parse(savedTheme)); } catch(e){} }

                const unsub = onAuthStateChanged(auth, u => {
                    setUser(u);
                    setLoading(false);
                    if(u) {
                        // Tải cấu hình màu nền đồng bộ
                        getDoc(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', u.uid, 'settings', 'theme')).then(snap => {
                            if(snap.exists()) setTheme(snap.data());
                        });
                    }
                });
                return unsub;
            }, [auth, db]);

            // --- ĐOẠN MÃ NÂNG CẤP: LẮNG NGHE ĐỒNG BỘ 4 NGUỒN DỮ LIỆU ĐỂ PHỤC VỤ TÌM KIẾM ---
            useEffect(() => {
                if (!user) return;

                // 1. Đồng bộ Sự kiện (Events)
                const eventsRef = collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'events');
                const unsubEvents = onSnapshot(query(eventsRef), snap => {
                    setAllEvents(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // 2. Đồng bộ Việc cần làm (Todos)
                const todosRef = collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'todos');
                const unsubTodos = onSnapshot(query(todosRef), snap => {
                    setAllTodos(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // 3. Đồng bộ Ghi chú (Notes)
                const notesRef = collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'notes');
                const unsubNotes = onSnapshot(query(notesRef), snap => {
                    setAllNotes(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // 4. Đồng bộ Thời khóa biểu (Timetable)
                const timetableDocRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'timetable', 'current');
                const unsubTimetable = onSnapshot(timetableDocRef, docSnap => {
                    if (docSnap.exists()) {
                        setAllTimetable(docSnap.data().schedule || {});
                    } else {
                        setAllTimetable({});
                    }
                });

                return () => {
                    unsubEvents();
                    unsubTodos();
                    unsubNotes();
                    unsubTimetable();
                };
            }, [user, db]);

            // Lắng nghe dữ liệu Nhắc nhở / Cảnh báo thời gian thực
            useEffect(() => {
                if (!user) return;
                const eventsRef = collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'events');
                const todosRef = collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'todos');

                const checkAlerts = () => {
                    const now = new Date();
                    const currentHour = now.getHours();
                    const currentMinute = now.getMinutes();
                    const todayStr = now.toDateString();

                    const todaySolarEvents = allEvents.filter(e => {
                        if (e?.repeat === 'solar' && e?.date) {
                            return new Date(e.date.seconds * 1000).getDate() === now.getDate() && new Date(e.date.seconds * 1000).getMonth() === now.getMonth();
                        }
                        if (e?.repeat === 'none' && e?.date) {
                            return new Date(e.date.seconds * 1000).toDateString() === todayStr;
                        }
                        return false;
                    });

                    const activeTodos = allTodos.filter(t => !t?.completed && t?.reminderTime);

                    const compiledAlerts = [];
                    todaySolarEvents.forEach(e => {
                        const d = new Date(e?.date?.seconds * 1000);
                        const timeDisplay = d && (d.getHours() !== 0 || d.getMinutes() !== 0) ? d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) : 'Cả ngày';
                        compiledAlerts.push({ id: e.id, type: 'Sự kiện', title: e?.title || 'Không có tiêu đề', time: timeDisplay, rawTime: e.date });
                    });

                    activeTodos.forEach(t => {
                        const d = new Date(t?.reminderTime?.seconds * 1000);
                        if (d <= now && (now - d) < 24 * 60 * 60 * 1000) {
                            compiledAlerts.push({ id: t.id, type: 'Việc cần làm', title: t?.text || 'Không có nội dung', time: d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }), rawTime: t.reminderTime });
                        }
                    });

                    setActiveAlerts(compiledAlerts);
                };

                if (allEvents.length > 0 || allTodos.length > 0) {
                    checkAlerts();
                    const interval = setInterval(checkAlerts, 60000);
                    return () => clearInterval(interval);
                }
            }, [user, allEvents, allTodos]);

            // Kinh Pháp Cú thông minh thay đổi ngẫu nhiên theo ngày cụ thể
            const dailyVerse = useMemo(() => {
                const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 1)) / 86400000);
                return DEFAULT_VERSES[dayOfYear % DEFAULT_VERSES.length];
            }, []);

            // Ảnh nền phong cảnh đồng bộ ngẫu nhiên dựa trên chỉ số ngày
            const currentBackground = useMemo(() => {
                const dateIndex = new Date().getDate();
                return BACKGROUNDS[dateIndex % BACKGROUNDS.length];
            }, []);

            // Tính toán ma trận cấu trúc các ô trong tháng của Lịch Lớn
            const calendarDaysMatrix = useMemo(() => {
                const year = calendarCurrentDate.getFullYear();
                const month = calendarCurrentDate.getMonth();
                const firstDayInstance = new Date(year, month, 1);
                const totalDaysInMonth = new Date(year, month + 1, 0).getDate();
                
                let startDayOfWeek = firstDayInstance.getDay(); 
                if (startDayOfWeek === 0) startDayOfWeek = 6; 
                else startDayOfWeek = startDayOfWeek - 1;

                const dayCells = [];
                for (let i = 0; i < startDayOfWeek; i++) { dayCells.push(null); }
                for (let day = 1; day <= totalDaysInMonth; day++) { dayCells.push(new Date(year, month, day)); }
                return dayCells;
            }, [calendarCurrentDate]);

            // Thống kê danh sách sự kiện hiển thị chấm nhỏ trên ô Lịch tháng
            const getEventsForDate = (date) => {
                if (!date) return [];
                const dStr = date.toDateString();
                const lunar = getLunarDate(date);

                return allEvents.filter(e => {
                    if (e?.repeat === 'none' && e?.date) {
                        return new Date(e.date.seconds * 1000).toDateString() === dStr;
                    }
                    if (e?.repeat === 'solar' && e?.date) {
                        const ed = new Date(e.date.seconds * 1000);
                        return ed.getDate() === date.getDate() && ed.getMonth() === date.getMonth();
                    }
                    if (e?.repeat === 'lunar' && e?.lunarDay && e?.lunarMonth) {
                        return e.lunarDay === lunar.day && e.lunarMonth === lunar.month;
                    }
                    if (e?.repeat === 'weekly' && e?.date) {
                        return new Date(e.date.seconds * 1000).getDay() === date.getDay();
                    }
                    if (e?.repeat === 'monthly' && e?.date) {
                        return new Date(e.date.seconds * 1000).getDate() === date.getDate();
                    }
                    return false;
                });
            };

            const changeMonth = (direction) => {
                setAnimClass(direction === 'next' ? 'anim-next' : 'anim-prev');
                setCalendarCurrentDate(prev => new Date(prev.getFullYear(), prev.getMonth() + (direction === 'next' ? 1 : -1), 1));
                setTimeout(() => setAnimClass(''), 500);
            };

            const handleDayCellClick = (date) => {
                if (!date) return;
                setCalendarSelectedDate(date);
                const list = getEventsForDate(date);
                setSelectedDateEvents({ date, list });
            };

            const handleAddEvent = async (title, repeat) => {
                const d = calendarSelectedDate;
                const lunar = getLunarDate(d);
                const payload = {
                    title,
                    repeat,
                    date: Timestamp.fromDate(d),
                    lunarDay: lunar.day,
                    lunarMonth: lunar.month,
                    createdAt: serverTimestamp()
                };
                const ref = collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'events');
                await addDoc(ref, payload);
                
                // Cập nhật lại giao diện modal tạm thời
                setSelectedDateEvents(curr => ({
                    ...curr,
                    list: [...curr.list, { id: 'temp-' + Date.now(), ...payload }]
                }));
                toast.success("Đã thêm sự kiện thành công!");
            };

            const handleDeleteEvent = async (id) => {
                if(id.startsWith('temp-')) return;
                await deleteDoc(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'events', id));
                setSelectedDateEvents(curr => ({ ...curr, list: curr.list.filter(item => item.id !== id) }));
                toast.warn("Đã xóa sự kiện thành công.");
            };

            // --- ĐOẠN MÃ NÂNG CẤP: LOGIC CHUẨN HÓA TIẾNG VIỆT VÀ TÌM KIẾM TOÀN CỤC ---
            const removeVietnameseTones = (str) => {
                if (!str) return '';
                return str
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .replace(/đ/g, 'd')
                    .replace(/Đ/g, 'd')
                    .toLowerCase();
            };

            const searchResults = useMemo(() => {
                if (!searchKeyword.trim()) return [];
                const cleanKeyword = removeVietnameseTones(searchKeyword);

                const results = [];

                // 1. Tìm trong Sự kiện (Events) - Tìm theo title
                allEvents.forEach(e => {
                    const cleanTitle = removeVietnameseTones(e?.title || '');
                    if (cleanTitle.includes(cleanKeyword)) {
                        results.push({
                            id: e.id,
                            type: 'Sự kiện',
                            displayTitle: e?.title || 'Không có tiêu đề',
                            displayDesc: e?.repeat === 'none' ? 'Sự kiện một lần' : `Sự kiện định kỳ (${e?.repeat})`,
                            rawData: e
                        });
                    }
                });

                // 2. Tìm trong Việc cần làm (Todos) - Tìm theo text
                allTodos.forEach(t => {
                    const cleanText = removeVietnameseTones(t?.text || '');
                    if (cleanText.includes(cleanKeyword)) {
                        results.push({
                            id: t.id,
                            type: 'Việc cần làm',
                            displayTitle: t?.text || 'Không có nội dung',
                            displayDesc: t?.completed ? 'Trạng thái: Đã hoàn thành' : 'Trạng thái: Chưa hoàn thành',
                            rawData: t
                        });
                    }
                });

                // 3. Tìm trong Ghi chú (Notes) - Tìm theo cả title và content
                allNotes.forEach(n => {
                    const cleanTitle = removeVietnameseTones(n?.title || '');
                    const cleanContent = removeVietnameseTones(n?.content || '');
                    if (cleanTitle.includes(cleanKeyword) || cleanContent.includes(cleanKeyword)) {
                        results.push({
                            id: n.id,
                            type: 'Ghi chú',
                            displayTitle: n?.title || 'Ghi chú không tiêu đề',
                            displayDesc: n?.content || 'Chưa có nội dung nội văn...',
                            rawData: n
                        });
                    }
                });

                // 4. Tìm trong Thời khóa biểu (Timetable) - Tìm trong subject và room
                Object.keys(allTimetable).forEach(key => {
                    const cell = allTimetable[key];
                    const cleanSubject = removeVietnameseTones(cell?.subject || '');
                    const cleanRoom = removeVietnameseTones(cell?.room || '');
                    if (cleanSubject.includes(cleanKeyword) || cleanRoom.includes(cleanKeyword)) {
                        const parts = key.split('-'); // Định dạng: "Thứ 2-Tiết 1"
                        results.push({
                            id: `timetable-${key}`,
                            type: 'Thời khóa biểu',
                            displayTitle: cell?.subject || 'Lịch trống',
                            displayDesc: `${parts[0] || ''} - ${parts[1] || ''} ${cell?.room ? `[Phòng: ${cell.room}]` : ''}`,
                            rawData: { key, cell }
                        });
                    }
                });

                return results;
            }, [searchKeyword, allEvents, allTodos, allNotes, allTimetable]);

            const handleResultItemClick = (item) => {
                setSearchKeyword(''); // Reset thanh tìm kiếm
                setIsSearchActive(false);

                if (item.type === 'Sự kiện') {
                    if (item.rawData?.date) {
                        const targetDate = new Date(item.rawData.date.seconds * 1000);
                        setCalendarCurrentDate(targetDate);
                        setCalendarSelectedDate(targetDate);
                        setActiveTab('calendar');
                        const list = getEventsForDate(targetDate);
                        setSelectedDateEvents({ date: targetDate, list });
                    } else {
                        setSearchSelectedDetail(item);
                    }
                } else if (item.type === 'Việc cần làm') {
                    handleTabChangeWithLock('todo');
                } else if (item.type === 'Ghi chú') {
                    handleTabChangeWithLock('notes');
                } else if (item.type === 'Thời khóa biểu') {
                    setActiveTab('timetable');
                }
            };

            // Hàm chuyển tab an toàn kết hợp rào chắn mật khẩu PIN bảo mật
            const handleTabChangeWithLock = async (tab) => {
                if (tab === 'todo' || tab === 'notes') {
                    if (unlockedTabs[tab]) {
                        setActiveTab(tab);
                        return;
                    }
                    try {
                        const lockRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'lock');
                        const docSnap = await getDoc(lockRef);
                        
                        let isLockEnabled = false;
                        let savedPassword = '';

                        if (docSnap.exists()) {
                            isLockEnabled = docSnap.data().enableLock || false;
                            savedPassword = docSnap.data().appPassword || '';
                        } else {
                            isLockEnabled = localStorage.getItem('vt_enable_lock') === 'true';
                            savedPassword = localStorage.getItem('vt_app_password') || '';
                        }

                        if (isLockEnabled && savedPassword.trim()) {
                            setPendingTab(tab);
                            setPinInput('');
                            setPinError('');
                            return;
                        }
                    } catch(e) {
                        console.error(e);
                    }
                }
                
                if (tab === 'day') { setCalendarCurrentDate(new Date()); }
                else if (tab === 'calendar') { setCalendarCurrentDate(new Date()); setCalendarSelectedDate(new Date()); }
                setActiveTab(tab);
            };

            const verifyPinAndUnlock = async (e) => {
                e.preventDefault();
                setPinError('');
                try {
                    const lockRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'lock');
                    const docSnap = await getDoc(lockRef);
                    let savedPassword = '';
                    if (docSnap.exists()) { savedPassword = docSnap.data().appPassword || ''; }
                    else { savedPassword = localStorage.getItem('vt_app_password') || ''; }

                    if (pinInput.trim() === savedPassword.trim()) {
                        setUnlockedTabs(prev => ({ ...prev, [pendingTab]: true }));
                        setActiveTab(pendingTab);
                        setPendingTab(null);
                    } else {
                        setPinError('Mã PIN bảo mật không chính xác. Vui lòng thử lại!');
                    }
                } catch(err) {
                    setPinError('Lỗi xác thực: ' + err.message);
                }
            };

            // Thực thi lưu chỉnh sửa trực tiếp từ hệ thống Modal Nhắc nhở danh sách đen
            const handleSaveAlertMutation = async (alert) => {
                if (!editAlertTitle.trim()) return;
                const targetCollection = alert.type === 'Sự kiện' ? 'events' : 'todos';
                const docRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, targetCollection, alert.id);
                const newTimestamp = editAlertTimeStr ? Timestamp.fromDate(new Date(editAlertTimeStr)) : null;

                try {
                    if (alert.type === 'Sự kiện') {
                        const updateData = { title: editAlertTitle };
                        if (newTimestamp) updateData.date = newTimestamp;
                        await updateDoc(docRef, updateData);
                    } else {
                        const updateData = { text: editAlertTitle };
                        if (newTimestamp) updateData.deadlineTime = newTimestamp;
                        await updateDoc(docRef, updateData);
                    }

                    setActiveAlerts(curr => curr.map(item => {
                        if (item.id === alert.id) {
                            const updatedDate = newTimestamp ? new Date(newTimestamp.seconds * 1000) : new Date();
                            const displayTime = updatedDate && (updatedDate.getHours() !== 0 || updatedDate.getMinutes() !== 0) ? updatedDate.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) : 'Cả ngày';
                            return { ...item, title: editAlertTitle, rawTime: newTimestamp, time: timeDisplay };
                        }
                        return item;
                    }));
                    setEditingAlertId(null);
                    toast.info("Đã cập nhật dữ liệu lên hệ thống Đám mây.", { position: "top-center" });
                } catch (e) {
                    console.error(e);
                }
            };

            const handleSaveTheme = async (newTheme) => {
                setTheme(newTheme);
                setShowSettings(false);
                try { localStorage.setItem('app_theme', JSON.stringify(newTheme)); } catch (e) {}
                if (user) await setDoc(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'theme'), newTheme);
            };

            const getDayColor = (idx) => idx === 5 ? 'text-blue-500' : idx === 6 ? 'text-red-500' : 'text-gray-500';

            // Đăng ký Service Worker chạy ngầm phục vụ Offline PWA
            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        navigator.serviceWorker.register('./sw.js')
                            .then(reg => console.log('Đăng ký Service Worker thành công:', reg.scope))
                            .catch(err => console.error('Lỗi đăng ký Service Worker:', err));
                    });
                }
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center text-blue-500 font-bold">Đang tải cấu hình đám mây...</div>;
            if (!user) return <AuthScreen auth={auth} appId={MANUAL_CONFIG.projectId} />;

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto shadow-2xl overflow-hidden relative transition-colors duration-300 bg-gray-100" style={{ backgroundColor: theme.bgColor, color: theme.textColor }}>
                    
                    {/* KHU VỰC CHỈ BÁO OFFLINE MINI TẠI HEADER */}
                    {isOffline && (
                        <div className="bg-amber-500 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none animate-pulse z-30">
                            <WifiOff size={10} /> Đang chạy ngoại tuyến (Offline Mode)
                        </div>
                    )}
                    {showOfflineBadge && !isOffline && (
                        <div className="bg-emerald-600 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none z-30">
                            <Wifi size={10} /> Đã khôi phục kết nối trực tuyến (Online)
                        </div>
                    )}

                    {/* BAR TIÊU ĐỀ CHÍNH HEADER */}
                    <header className="bg-blue-600 text-white p-2 flex justify-between items-center shadow-md z-20 shrink-0 relative">
                        <div className="flex flex-col overflow-hidden max-w-[35%]">
                            <h1 className="text-sm font-black whitespace-nowrap truncate font-sans tracking-tight">LỊCH VẠN NIÊN</h1>
                            <p className="text-[9px] text-blue-100 font-medium truncate">Chào, {user.email?.split('@')[0]}</p>
                        </div>

                        {/* --- ĐOẠN MÃ NÂNG CẤP: THANH TÌM KIẾM TOÀN CỤC TRÊN HEADER (RESPONSIVE) --- */}
                        <div className="flex-1 mx-2 flex justify-end items-center relative">
                            {/* Nút kích hoạt cho Mobile / Giao diện thanh nhập liệu ô tìm kiếm */}
                            <div className={`flex items-center bg-white/10 hover:bg-white/20 rounded-lg transition-all ${isSearchActive ? 'w-full px-2 py-1 bg-white text-slate-800' : 'w-8 h-8 justify-center cursor-pointer md:w-40 md:justify-start md:px-2 md:py-1'}`} onClick={() => !isSearchActive && setIsSearchActive(true)}>
                                <Search size={16} className={`${isSearchActive ? 'text-slate-500 mr-1.5 shrink-0' : 'text-white md:mr-1.5'}`} />
                                <input 
                                    type="text" 
                                    className={`bg-transparent text-xs outline-none w-full font-medium placeholder-white/70 ${isSearchActive ? 'placeholder-slate-400 text-slate-800' : 'hidden md:block'}`} 
                                    placeholder="Tìm sự kiện, ghi chú..."
                                    value={searchKeyword}
                                    onChange={(e) => setSearchKeyword(e.target.value)}
                                    autoFocus={isSearchActive}
                                />
                                {isSearchActive && (
                                    <button onClick={(e) => { e.stopPropagation(); setSearchKeyword(''); setIsSearchActive(false); }} className="text-slate-400 hover:text-slate-600 ml-1">
                                        <X size={14} />
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* HỆ THỐNG NÚT THIẾT LẬP MENU PHẢI CHUẨN ĐỒNG BỘ */}
                        <div className="flex items-center gap-1 shrink-0">
                            <button onClick={() => setShowSettings(true)} className="p-1.5 hover:bg-white/10 rounded-xl transition" title="Giao diện & Bảo mật">
                                <Settings size={18} />
                            </button>
                            <button onClick={() => signOut(auth)} className="p-1.5 hover:bg-red-500/30 rounded-xl text-red-100 transition" title="Đăng xuất">
                                <LogOut size={18} />
                            </button>
                        </div>
                    </header>

                    {/* --- ĐOẠN MÃ NÂNG CẤP: MODAL DANH SÁCH KẾT QUẢ TÌM KIẾM TOÀN CỤC --- */}
                    {isSearchActive && searchKeyword.trim() && (
                        <div className="absolute top-[44px] inset-x-0 bottom-0 bg-black/60 z-40 flex flex-col p-3">
                            <div className="bg-white rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[80vh] text-slate-800 animate-in fade-in zoom-in-95">
                                <div className="bg-slate-100 px-3 py-2 border-b flex justify-between items-center text-xs font-bold text-slate-600 uppercase">
                                    <span>Kết quả tìm kiếm ({searchResults.length})</span>
                                    <button onClick={() => { setSearchKeyword(''); setIsSearchActive(false); }} className="text-slate-400 hover:text-slate-600"><X size={16}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto no-scrollbar p-1 divide-y divide-gray-100">
                                    {searchResults.length === 0 ? (
                                        <div className="text-center py-8 text-xs text-gray-400 font-medium">Không tìm thấy kết quả phù hợp cho từ khóa này.</div>
                                    ) : (
                                        searchResults.map(item => (
                                            <div 
                                                key={item.id} 
                                                onClick={() => handleResultItemClick(item)}
