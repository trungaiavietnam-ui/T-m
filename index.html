        // --- HÀM BĂM MẬT KHẨU SHA-256 SỬ DỤNG WEB CRYPTO API ---
        const hashPassword = async (password) => {
            if (!password) return '';
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        };

        // --- CẤU HÌNH ĐỐI TƯỢNG INDEXEDDB HELPER PHỤC VỤ OFFLINE BACKGROUND SYNC & LOCAL NOTIFICATIONS ---
        const openIndexedDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('lich_van_trung_db', 2);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('sync_queue')) {
                        db.createObjectStore('sync_queue', { keyPath: 'id', autoIncrement: true });
                    }
                    if (!db.objectStoreNames.contains('notification_tasks')) {
                        db.createObjectStore('notification_tasks', { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        };

        const pushToSyncQueue = async (actionType, collectionName, payload, userId) => {
            try {
                const db = await openIndexedDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction('sync_queue', 'readwrite');
                    const store = transaction.objectStore('sync_queue');
                    const data = {
                        action: actionType,
                        collectionName: collectionName,
                        payload: payload,
                        userId: userId,
                        timestamp: Date.now()
                    };
                    const request = store.add(data);
                    request.onsuccess = () => {
                        resolve(true);
                        if ('serviceWorker' in navigator && 'SyncManager' in window) {
                            navigator.serviceWorker.ready.then(reg => {
                                return reg.sync.register('sync-data');
                            }).then(() => {
                                console.log('[Sync] Đã đăng ký tag sync-data ngầm thành công!');
                            }).catch(err => {
                                console.warn('[Sync] Trình duyệt không thể đăng ký Sync ngầm, sẽ đồng bộ bằng mạng thường:', err);
                            });
                        }
                    };
                    request.onerror = (e) => reject(e.target.error);
                });
            } catch (err) {
                console.error('Lỗi khi ghi dữ liệu tạm vào IndexedDB:', err);
            }
        };

        const saveNotificationTasksToIDB = async (alerts) => {
            try {
                const db = await openIndexedDB();
                const transaction = db.transaction('notification_tasks', 'readwrite');
                const store = transaction.objectStore('notification_tasks');
                
                const existingRequest = store.getAll();
                const existingMap = await new Promise((resolve) => {
                    existingRequest.onsuccess = () => {
                        const map = {};
                        existingRequest.result.forEach(r => { map[r.id] = r; });
                        resolve(map);
                    };
                    existingRequest.onerror = () => resolve({});
                });

                store.clear();

                for (const alert of alerts) {
                    const existing = existingMap[alert.id];
                    const data = {
                        id: alert.id,
                        title: alert.title,
                        type: alert.type,
                        time: alert.time,
                        notified: existing ? existing.notified : false,
                        timestamp: Date.now()
                    };
                    store.add(data);
                }

                if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({ action: 'check-notifications' });
                }
            } catch (e) {
                console.error("Lỗi đồng bộ danh sách thông báo vào IndexedDB:", e);
            }
        };

        const formatDateTimeForInput = (date) => {
            if (!date) return '';
            const d = new Date(date);
            const pad = (n) => n.toString().padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        };

        const formatDisplayDate = (seconds) => {
            if (!seconds) return '';
            return new Date(seconds * 1000).toLocaleString('vi-VN', { hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
        };

        const getRemainingTime = (timestamp) => {
            if (!timestamp) return null;
            const now = new Date();
            const deadline = new Date(timestamp.seconds * 1000);
            const diff = deadline - now;
            if (diff < 0) {
                const overdueDays = Math.floor(Math.abs(diff) / (1000 * 60 * 60 * 24));
                const overdueHours = Math.floor((Math.abs(diff) % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let text = "Quá hạn ";
                if (overdueDays > 0) text += `${overdueDays} ngày`;
                else text += `${overdueHours} giờ`;
                return { text: text, isOverdue: true };
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            if (days > 0) return { text: `Còn ${days} ngày, ${hours} giờ`, isOverdue: false };
            if (hours > 0) return { text: `Còn ${hours} giờ, ${minutes} phút`, isOverdue: false };
            return { text: 'Sắp đến hạn', isOverdue: false };
        };

            const [startOfWeekDate, setStartOfWeekDate] = useState(() => {
                const now = new Date();
                const day = now.getDay();
                const diff = now.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(now.setDate(diff));
                monday.setHours(0, 0, 0, 0);
                return monday;
            });

            const periods = [1, 2, 3, 4, 5];

            const weekKey = useMemo(() => {
                const yyyy = startOfWeekDate.getFullYear();
                const target = new Date(startOfWeekDate.valueOf());
                const dayNr = (startOfWeekDate.getDay() + 6) % 7;
                target.setDate(target.getDate() - dayNr + 3);
                const firstThursday = target.valueOf();
                target.setMonth(0, 1);
                if (target.getDay() !== 4) {
                    target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
                }
                const weekNum = 1 + Math.ceil((firstThursday - target) / 604800000);
                return `${yyyy}_w${weekNum}`;
            }, [startOfWeekDate]);

            const tkbRef = useMemo(() => doc(db, 'artifacts', appId, 'users', user.uid, 'timetable', `main_${weekKey}`), [db, appId, user.uid, weekKey]);

                        setSchedule(data.schedule || {});
                        if(data.headers) setHeaders(data.headers);
                    } else {
                        setSchedule({});
                        setHeaders({ col1: 'Môn - Lớp', col2: 'Ghi chú' });
                    }
                }, err => {
                    console.warn("Tải thời khóa biểu offline warning (Sử dụng dữ liệu cached):", err);
                });
                return unsub;

                const list = [];

                for (let i = 0; i < 6; i++) {
                    const temp = new Date(startOfWeekDate);
                    temp.setDate(startOfWeekDate.getDate() + i);
                    const formattedDate = `${String(temp.getDate()).padStart(2, '0')}/${String(temp.getMonth() + 1).padStart(2, '0')}`;
                    list.push({
                        id: daysName[i],
                        label: `Thứ ${i + 2}`,
                        dateStr: formattedDate
                    });
                }
                return list;

                const fSunday = `${String(sunday.getDate()).padStart(2, '0')}/${String(sunday.getMonth() + 1).padStart(2, '0')}/${sunday.getFullYear()}`;

                setTouchStart(ev.targetTouches[0].clientX);

            useEffect(() => onSnapshot(query(noteRef), snap => setNotes(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.updatedAt?.seconds||0) - (a.updatedAt?.seconds||0)))), [noteRef]);

                const reminderData = reminderStr ? { seconds: Math.floor(new Date(reminderStr).getTime() / 1000) } : null;
                const payload = { 
                    title: title || 'K.Tiêu đề', 
                    content: content || '', 
                    reminderTime: reminderData, 
                    color: color, 
                    updatedAt: { seconds: Math.floor(Date.now() / 1000) } 
                };

                if (editing.id) {
                    if (!navigator.onLine) {
                        await pushToSyncQueue('update', 'notes', { id: editing.id, ...payload }, user.uid);
                        toast.info("Đã ghi nhận sửa đổi ghi chú ngoại tuyến!", { position: "top-center" });
                    } else {
                        try {
                            const rTime = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                            await updateDoc(doc(noteRef, editing.id), { title: title||'K.Tiêu đề', content: content||'', reminderTime: rTime, color: color, updatedAt: serverTimestamp() });
                        } catch (e) {
                            await pushToSyncQueue('update', 'notes', { id: editing.id, ...payload }, user.uid);
                        }
                    }
                } else {
                    if (!navigator.onLine) {
                        await pushToSyncQueue('add', 'notes', payload, user.uid);
                        toast.info("Đã ghi nhận ghi chú mới ngoại tuyến!", { position: "top-center" });
                    } else {
                        try {
                            const rTime = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                            await addDoc(noteRef, { title: title||'K.Tiêu đề', content: content||'', reminderTime: rTime, color: color, updatedAt: serverTimestamp() });
                        } catch (e) {
                            await pushToSyncQueue('add', 'notes', payload, user.uid);
                        }
                    }
                }
                setEditing(null);
            };

            const handleDelete = async (ev, id) => {
                ev.stopPropagation();
                if (deleteConfirm === id) {
                    if (!navigator.onLine) {
                        await pushToSyncQueue('delete', 'notes', { id }, user.uid);
                        toast.info("Ghi nhận yêu cầu xóa ghi chú ngoại tuyến!", { position: "top-center" });
                    } else {
                        try {
                            await deleteDoc(doc(noteRef, id));
                        } catch (e) {
                            await pushToSyncQueue('delete', 'notes', { id }, user.uid);
                        }
                    }
                    setDeleteConfirm(null);
                } else { 
                    setDeleteConfirm(id); 
                    setTimeout(() => setDeleteConfirm(null), 3000); 
                }
            };

            if (editing) {
                const currentReminderStr = editing.reminderTime ? formatDateTimeForInput(editing.reminderTime.seconds * 1000) : '';
                return e(NoteEditor, { 
                    initialTitle: editing.title, 
                    initialContent: editing.content, 
                    initialReminder: currentReminderStr, 
                    initialColor: editing.color, 
                    isNew: !editing.id, 
                    onSave: save, 
                    onCancel: () => setEditing(null) 
                });
            }
            return e('div', { className: "p-4 animate-in fade-in", style: { color: theme.textColor } },
                e('div', { className: "flex justify-between mb-4" },
                    e('h2', { className: "text-xl font-bold" }, "Sổ tay"),
                    e('button', { onClick: () => setEditing({}), className: "bg-blue-100 text-blue-600 px-3 py-2 rounded-lg flex items-center gap-1 text-sm font-bold" }, e(Plus, { size: 16 }), " Mới")
                ),
                e('div', { className: "grid grid-cols-2 gap-3" },
                    notes.length === 0 && e('div', { className: "col-span-2 text-center text-gray-400 mt-10" },
                        e(StickyNote, { size: 48, className: "mx-auto mb-2 opacity-20" }),
                        e('p', null, "Trống trơn...")
                    ),
                    notes.map(n => (
                        e('div', { 
                            key: n.id, 
                            onClick: () => setEditing(n), 
                            className: "p-4 rounded-xl border shadow-sm h-48 flex flex-col relative group cursor-pointer hover:shadow-md transition", 
                            style: { backgroundColor: n.color || theme.noteColor, borderColor: '#e5e7eb' } 
                        },
                            e('div', { className: "flex justify-between items-start mb-2" },
                                e('h4', { className: "font-bold truncate text-gray-800 flex-1" }, n.title),
                                n.reminderTime && e(Bell, { size: 12, className: "text-orange-500 mt-1 ml-1" })
                            ),
                            e('p', { className: "text-xs overflow-hidden flex-1 leading-relaxed whitespace-pre-wrap font-medium", style: { color: theme.textColor, opacity: 0.8 } }, n.content),
                            n.reminderTime && e('div', { className: "text-[9px] text-orange-600 font-medium mt-1 mb-1 flex items-center gap-1" }, e(Clock, { size: 10 }), formatDisplayDate(n.reminderTime.seconds)),
                            e('div', { className: "flex justify-between items-center mt-1 pt-2 border-t border-black/10" },
                                e('span', { className: "text-[10px] text-slate-500" }, n.updatedAt ? new Date(n.updatedAt.seconds*1000).toLocaleDateString('vi-VN') : ''),
                                e('button', { onClick: ev => handleDelete(ev, n.id), className: `text-slate-400 hover:text-red-500 transition-all ${deleteConfirm === n.id ? 'bg-white text-red-600 px-2 py-1 rounded shadow-sm text-xs font-bold' : ''}` }, 
                                    deleteConfirm === n.id ? e('span', null, "Xóa?") : e(Trash2, { size: 16 })
                                )
                            )
                        )
                    ))
                )
            );
        };

        const LockScreen = ({ onUnlock, correctPassword }) => {
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');

            const handleUnlockSubmit = async (ev) => {
                ev.preventDefault();
                setError('');
                const hashedInput = await hashPassword(pin);
                if (hashedInput === correctPassword) {
                    onUnlock();
                    setPin('');
                } else {
                    setError("Mã bảo vệ không chính xác. Vui lòng nhập lại.");
                    setPin('');
                }
            };

            return e('div', { className: "flex flex-col flex-1 items-center justify-center p-6 bg-slate-50 font-sans" },
                e('div', { className: "w-full max-w-xs text-center space-y-6" },
                    e('div', { className: "mx-auto bg-blue-100 text-blue-600 p-4 rounded-full w-16 h-16 flex items-center justify-center" }, e(Lock, { size: 28 })),
                    e('div', null,
                        e('h3', { className: "text-lg font-bold text-slate-800" }, "Khu vực bảo mật"),
                        e('p', { className: "text-xs text-slate-400 mt-1" }, "Vui lòng cung cấp mã PIN để xem dữ liệu")
                    ),
                    e('form', { onSubmit: handleUnlockSubmit, className: "space-y-4" },
                        e('input', { 
                            type: "password", 
                            required: true, 
                            value: pin, 
                            onChange: ev => setPin(ev.target.value), 
                            placeholder: "Nhập mã bảo vệ...", 
                            className: "w-full px-4 py-3 border border-slate-200 text-center rounded-xl text-lg font-bold tracking-widest text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none bg-white shadow-sm" 
                        }),
                        error && e('p', { className: "text-red-500 text-xs text-center font-medium" }, error),
                        e('button', { type: "submit", className: "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition" }, "Xác nhận mở khóa")
                    )
                )
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('calendar');
            const [app, setApp] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [showMenu, setShowMenu] = useState(false);
            const [connectionError, setConnectionError] = useState(false);
            
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [showOfflineBadge, setShowOfflineBadge] = useState(false);

            const [dailyDate, setDailyDate] = useState(new Date());
            const [calendarCurrentDate, setCalendarCurrentDate] = useState(new Date());
            const [calendarSelectedDate, setCalendarSelectedDate] = useState(new Date());

            const [activeAlerts, setActiveAlerts] = useState([]);
            const [showAlertModal, setShowAlertModal] = useState(false);

            const [editingAlertId, setEditingAlertId] = useState(null);
            const [editAlertTitle, setEditAlertTitle] = useState('');
            const [editAlertTimeStr, setEditAlertTimeStr] = useState('');

            const [lockPassword, setLockPassword] = useState('');
            const [lockEnabled, setLockEnabled] = useState(false);
            const [unlockedTabs, setUnlockedTabs] = useState({ todo: false, notes: false });

            const [lastOfflineTime, setLastOfflineTime] = useState(() => {
                try { return localStorage.getItem('vt_last_offline_ts') || null; } catch(e) { return null; }
            });
            const [offlineAsync, setOfflineAsync] = useState(false);

            const handleUseOfflineAsync = () => {
                const ts = new Date().toLocaleString('vi-VN');
                setLastOfflineTime(ts);
                try { localStorage.setItem('vt_last_offline_ts', ts); } catch(e) {}
                setOfflineAsync(true);
                setConnectionError(false);
            };

            const [completedAlerts, setCompletedAlerts] = useState(() => {
                try {
                    const saved = localStorage.getItem('vt_completed_alerts');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) {
                    return {};
                }
            });

            const [theme, setTheme] = useState(() => {
                try { return JSON.parse(localStorage.getItem('app_theme')) || { bgColor: '#f3f4f6', noteColor: '#FEFCE8', textColor: '#1F2937' }; } 
                catch(e) { return { bgColor: '#f3f4f6', noteColor: '#FEFCE8', textColor: '#1F2937' }; }
            });

            const db = useMemo(() => {
                if (!app) return null;
                return initializeFirestore(app, {
                    localCache: persistentLocalCache({
                        tabManager: persistentMultipleTabManager()
                    })
                });
            }, [app]);

            useEffect(() => {
                localStorage.setItem('vt_completed_alerts', JSON.stringify(completedAlerts));
            }, [completedAlerts]);

            useEffect(() => {
                if ('Notification' in window) {
                    if (Notification.permission === 'default') {
                        Notification.requestPermission().then(permission => {
                            if (permission === 'granted') {
                                console.log('[Notification] Quyền thông báo đã được cấp thành công!');
                                toast.success("Đã bật nhận thông báo nhắc nhở thành công!", { position: "top-center" });
                            }
                        });
                    }
                }
            }, []);

            useEffect(() => {
                const handleOnline = () => {
                    setIsOffline(false);
                    setShowOfflineBadge(true);
                    toast.success("Đã khôi phục kết nối mạng! Dữ liệu đang được đồng bộ tự động.", {
                        position: "top-center"
                    });
                    setTimeout(() => setShowOfflineBadge(false), 3000);
                };
                const handleOffline = () => {
                    setIsOffline(true);
                    setShowOfflineBadge(true);
                    toast.warning("Mất kết nối mạng! Ứng dụng chuyển sang chế độ ngoại tuyến.", {
                        position: "top-center"
                    });
                };

                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);

                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            useEffect(() => {
                const init = async () => {
                    try {
                        const newApp = initializeApp(MANUAL_CONFIG);
                        setApp(newApp);
                        const auth = getAuth(newApp);

                        onAuthStateChanged(auth, async (u) => {
                            setUser(u);
                            setLoading(false);
                        });
                        setConnectionError(false);
                    } catch (e) {
                        console.warn("Lỗi kết nối khởi tạo hệ thống Google Firebase:", e);
                        setIsOffline(true);
                        setLoading(false);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const loadSettings = async () => {
                    try {
                        const themeSnap = await getDoc(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'theme'));
                        if (themeSnap.exists()) {
                            const loadedTheme = themeSnap.data();
                            setTheme(loadedTheme);
                            localStorage.setItem('app_theme', JSON.stringify(loadedTheme));
                        }

                        const lockSnap = await getDoc(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'lock'));
                        if (lockSnap.exists()) {
                            const lockData = lockSnap.data();
                            setLockPassword(lockData.appPassword || '');
                            setLockEnabled(lockData.enableLock || false);
                        } else {
                            const savedPassword = localStorage.getItem('vt_app_password') || '';
                            const savedEnable = localStorage.getItem('vt_enable_lock') === 'true';
                            setLockPassword(savedPassword);
                            setLockEnabled(savedEnable);
                        }

                        checkDailyEvents(db, user.uid);
                    } catch (e) {
                        console.warn("Lỗi tải cấu hình người dùng ngoại tuyến:", e);
                    }
                };
                loadSettings();
            }, [user, db]);

            const checkDailyEvents = async (firestoreInstance, uid) => {
                const alreadyNotifiedInSession = sessionStorage.getItem('vt_notified_session');
                if (alreadyNotifiedInSession === 'true') {
                    return; 
                }

                const today = new Date();
                const todayStr = today.toDateString();

                const eventsRef = collection(firestoreInstance, 'artifacts', MANUAL_CONFIG.projectId, 'users', uid, 'events');
                const todosRef = collection(firestoreInstance, 'artifacts', MANUAL_CONFIG.projectId, 'users', uid, 'todos');

                try {
                    const unsubEvents = onSnapshot(query(eventsRef), snapEvents => {
                        const allEvents = snapEvents.docs.map(d => ({ id: d.id, type: 'Sự kiện', ...d.data() }));
                        const unsubTodos = onSnapshot(query(todosRef), snapTodos => {
                            const allTodos = snapTodos.docs.map(d => ({ id: d.id, type: 'Công việc', ...d.data() }));

                            const combined = [...allEvents, ...allTodos];
                            const lunar = getLunarDetails(today);
                            const validAlerts = [];

                            combined.forEach(item => {
                                if (item.completed === true) return;

                                const storageCompleted = localStorage.getItem('vt_completed_alerts');
                                if (storageCompleted) {
                                    const parsedObj = JSON.parse(storageCompleted);
                                    if (parsedObj[item.id] === true) {
                                        return; 
                                    }
                                }

                                let isToday = false;
                                let isOverdue = false;
                                let targetTime = null; 

                                const timeSource = item.date || item.deadlineTime || item.reminderTime;
                                if (timeSource) {
                                    targetTime = new Date(timeSource.seconds * 1000);
                                }

                                if (item.type === 'Sự kiện') {
                                    if (!item.repeat || item.repeat === 'none') {
                                        isToday = targetTime && targetTime.toDateString() === todayStr;
                                    } else if (item.repeat === 'lunar') {
                                        isToday = item.lunarDay === lunar.day && item.lunarMonth === lunar.month;
                                    } else if (item.repeat === 'solar' && targetTime) {
                                        isToday = targetTime.getDate() === today.getDate() && targetTime.getMonth() === today.getMonth();
                                    } else if (item.repeat === 'weekly' && targetTime) {
                                        isToday = targetTime.getDay() === today.getDay();
                                    } else if (item.repeat === 'monthly' && targetTime) {
                                        isToday = targetTime.getDate() === today.getDate();
                                    }
                                } else {
                                    isToday = targetTime && targetTime.toDateString() === todayStr;
                                    isOverdue = targetTime && targetTime < today && targetTime.toDateString() !== todayStr;
                                }

                                if (isToday || isOverdue) {
                                    if (item.type === 'Sự kiện' && (!item.repeat || item.repeat === 'none') && targetTime) {
                                        const itemHours = targetTime.getHours();
                                        const itemMinutes = targetTime.getMinutes();
                                        
                                        if (itemHours !== 0 || itemMinutes !== 0) {
                                            const currentHours = today.getHours();
                                            const currentMinutes = today.getMinutes();

                                            if (itemHours < currentHours || (itemHours === currentHours && itemMinutes < currentMinutes)) {
                                                return; 
                                            }
                                        }
                                    }

                                    let timeLabel = 'Cả ngày';
                                    if (targetTime) {
                                        if (isOverdue) {
                                            const daysDiff = Math.floor((today - targetTime) / (1000 * 60 * 60 * 24));
                                            timeLabel = daysDiff > 0 
                                                ? `Trễ ${daysDiff} ngày (${targetTime.toLocaleDateString('vi-VN', {day: '2-digit', month: '2-digit'})})`
                                                : `Quá hạn (${targetTime.toLocaleDateString('vi-VN', {day: '2-digit', month: '2-digit'})})`;
                                        } else if (targetTime.getHours() !== 0 || targetTime.getMinutes() !== 0) {
                                            timeLabel = targetTime.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                                        }
                                    }

                                    validAlerts.push({
                                        id: item.id,
                                        title: item.title || item.text || "Lịch hẹn chưa đặt tên",
                                        type: item.type,
                                        rawTime: timeSource, 
                                        time: timeLabel
                                    });
                                }
                            });

                            if (validAlerts.length > 0) {
                                setActiveAlerts(validAlerts);
                                setShowAlertModal(true);

                                saveNotificationTasksToIDB(validAlerts);

                                validAlerts.forEach(alertItem => {
                                    sendNotification(`🔔 ${alertItem.type}: ${alertItem.title}`, `Thời gian: ${alertItem.time}`);
                                });
                            }

                            sessionStorage.setItem('vt_notified_session', 'true');
                            unsubEvents();
                            unsubTodos();
                        });
                    }, err => {
                        console.warn("onSnapshot events offline warning (sử dụng dữ liệu cached):", err);
                    });
                } catch (err) {
                    console.error("Lỗi quét dữ liệu thông báo:", err);
                }
            };

            const handleCheckAlertCompleted = (id) => {
                setCompletedAlerts(prev => {
                    const updated = { ...prev, [id]: true };
                    setActiveAlerts(curr => {
                        const filtered = curr.filter(alert => alert.id !== id);
                        saveNotificationTasksToIDB(filtered);
                        return filtered;
                    });
                    return updated;
                });
            };

            const handleStartEditAlert = (alert) => {
                setEditingAlertId(alert.id);
                setEditAlertTitle(alert.title);
                
                const rawDate = alert.rawTime ? new Date(alert.rawTime.seconds * 1000) : new Date();
                
                if (alert.type === 'Sự kiện') {
                    const yyyy = rawDate.getFullYear();
                    const mm = String(rawDate.getMonth() + 1).padStart(2, '0');
                    const dd = String(rawDate.getDate()).padStart(2, '0');
                    setEditAlertTimeStr(`${yyyy}-${mm}-${dd}`);
                } else {
                    setEditAlertTimeStr(formatDateTimeForInput(rawDate));
                }
            };

            const handleSaveAlertEdit = async (alert) => {
                if (!editAlertTitle.trim() || !db) return;
                
                const targetCollection = alert.type === 'Sự kiện' ? 'events' : 'todos';
                const docRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, targetCollection, alert.id);

                const newTimestamp = editAlertTimeStr ? Timestamp.fromDate(new Date(editAlertTimeStr)) : null;

                try {
                    if (alert.type === 'Sự kiện') {
                        const updateData = { title: editAlertTitle };
                        if (newTimestamp) updateData.date = newTimestamp;
                        await updateDoc(docRef, updateData);
                    } else {
                        const updateData = { text: editAlertTitle };
                        if (newTimestamp) {
                            updateData.deadlineTime = newTimestamp;
                        }
                        await updateDoc(docRef, updateData);
                    }

                    setActiveAlerts(curr => {
                        const mapped = curr.map(item => {
                            if (item.id === alert.id) {
                                const updatedDate = newTimestamp ? new Date(newTimestamp.seconds * 1000) : new Date();
                                const displayTime = updatedDate && (updatedDate.getHours() !== 0 || updatedDate.getMinutes() !== 0)
                                    ? updatedDate.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })
                                    : 'Cả ngày';
                                
                                return {
                                    ...item,
                                    title: editAlertTitle,
                                    rawTime: newTimestamp,
                                    time: displayTime
                                };
                            }
                            return item;
                        });
                        saveNotificationTasksToIDB(mapped);
                        return mapped;
                    });

                    setEditingAlertId(null);
                    toast.info("Đã lưu dữ liệu tạm thời dưới máy khách.", { position: "top-center" });
                } catch (e) {
                    console.error("Lỗi cập nhật dữ liệu từ Modal cảnh báo:", e);
                }
            };

            const handleSaveTheme = async (newTheme) => {
                if (!db || !user) return;
                setTheme(newTheme);
                setShowSettings(false);
                try {
                    localStorage.setItem('app_theme', JSON.stringify(newTheme));
                } catch (e) {
                    console.error("Lỗi lưu local theme:", e);
                }
                await setDoc(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'theme'), newTheme);
            };

            const handleTabChange = (tab) => {
                if (tab === 'day') {
                    setDailyDate(new Date()); 
                } else if (tab === 'calendar') {
                    setCalendarCurrentDate(new Date()); 
                    setCalendarSelectedDate(new Date()); 
                }
                
                setUnlockedTabs({ todo: false, notes: false });
                setActiveTab(tab);
            };

            const handleUnlockTab = (tab) => {
                setUnlockedTabs(prev => ({ ...prev, [tab]: true }));
            };

            const handleLockUpdate = (newPassword, enabled) => {
                setLockPassword(newPassword);
                setLockEnabled(enabled);
                setUnlockedTabs({ todo: false, notes: false });
            };

            useEffect(() => {
                if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                    fetch('/__last_response_meta__')
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.timestamp) {
                                const d = new Date(data.timestamp);
                                const ts = d.toLocaleString('vi-VN');
                                setLastOfflineTime(ts);
                                try { localStorage.setItem('vt_last_offline_ts', ts); } catch(e) {}
                            }
                        })
                        .catch(() => {});
                }
            }, []);

            if (loading) return e('div', { className: "h-screen flex items-center justify-center text-blue-500" }, "Đang tải...");
            if (!user) return e(AuthScreen, { auth: getAuth(app), appId: MANUAL_CONFIG.projectId, onResetConfig: () => {} });

            const renderMainContent = () => {
                if (activeTab === 'day') {
                    return e(DailyView, { 
                        user: user, 
                        db: db, 
                        appId: MANUAL_CONFIG.projectId, 
                        today: dailyDate, 
                        setToday: setDailyDate 
                    });
                }
                if (activeTab === 'calendar') {
                    return e(CalendarView, { 
                        user: user, 
                        db: db, 
                        appId: MANUAL_CONFIG.projectId, 
                        currentDate: calendarCurrentDate, 
                        setCurrentDate: setCalendarCurrentDate, 
                        selectedDate: calendarSelectedDate, 
                        setSelectedDate: setCalendarSelectedDate,
                        onTabChange: handleTabChange,
                        theme: theme 
                    });
                }
                if (activeTab === 'todo') {
                    if (lockEnabled && lockPassword && !unlockedTabs.todo) {
                        return e(LockScreen, { correctPassword: lockPassword, onUnlock: () => handleUnlockTab('todo') });
                    }
                    return e(TodoView, { user: user, db: db, appId: MANUAL_CONFIG.projectId, theme: theme });
                }
                if (activeTab === 'notes') {
                    if (lockEnabled && lockPassword && !unlockedTabs.notes) {
                        return e(LockScreen, { correctPassword: lockPassword, onUnlock: () => handleUnlockTab('notes') });
                    }
                    return e(NotesView, { user: user, db: db, appId: MANUAL_CONFIG.projectId, theme: theme });
                }
                if (activeTab === 'timetable') {
                    return e(TimeTableView, { user: user, db: db, appId: MANUAL_CONFIG.projectId, theme: theme });
                }
                return null;
            };

            return e('div', { 
                className: "flex flex-col h-screen max-w-md mx-auto shadow-2xl overflow-hidden relative transition-colors duration-300 animate-fade-in", 
                style: { backgroundColor: theme.bgColor, color: theme.textColor } 
            },
                isOffline && e('div', { className: "bg-amber-500 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none animate-pulse" }, 
                    e(WifiOff, { size: 10 }),

                showOfflineBadge && !isOffline && e('div', { className: "bg-emerald-600 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none" },

                                                e('button', { onClick: () => handleSaveAlertEdit(alert), className: "p-1.5 bg-green-50 text-green-600 hover:bg-green-100 rounded-lg transition", title: "Lưu thay đổi" }, e(Check, { size: 16, strokeWidth: 2.5 }))

                        e('div', { className: "flex flex-col gap-2" },

        const root = createRoot(document.getElementById('root'));
        root.render(e(App));
