<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <!-- Khối xử lý mã nguồn ứng dụng React chính -->
    <script type="babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Calendar as CalendarIcon, ChevronLeft, ChevronRight, Plus, CheckCircle, 
            Clock, AlertCircle, Trash2, ListTodo, Sun, Moon, Sparkles, User, 
            LogOut, Lock, Mail, Search, X, CheckSquare, Square, RefreshCw
        } from 'lucide-react';
        import { ToastContainer, toast } from 'react-toastify';

        // --- DỮ LIỆU ĐỂ TÍNH LỊCH ÂM DƯƠNG TRỰC TIẾP ---
        const AM_LICH_DATA = {
            2026: [
                {m:1, d:31, k:0, l:"Bính Ngọ"}, {m:2, d:28, k:0, l:"Đinh Mùi"}, {m:3, d:31, k:1, l:"Mậu Thân"},
                {m:4, d:30, k:0, l:"Kỷ Dậu"}, {m:5, d:31, k:0, l:"Canh Tuất"}, {m:6, d:30, k:0, l:"Tân Hợi"},
                {m:7, d:31, k:0, l:"Nhâm Tý"}, {m:8, d:31, k:0, l:"Quý Sửu"}, {m:9, d:30, k:0, l:"Giáp Dần"},
                {m:10, d:31, k:0, l:"Ất Mão"}, {m:11, d:30, k:0, l:"Bính Thìn"}, {m:12, d:31, k:0, l:"Đinh Tị"}
            ]
        };

        function getAmLich(ngay, thang, nam) {
            if (nam !== 2026) return { ngayAm: ngay, thangAm: thang, k: 0, namChi: "Bính Ngọ" };
            const duLieuThang = AM_LICH_DATA[2026]?.find(item => item.m === thang);
            if (!duLieuThang) return { ngayAm: ngay, thangAm: thang, k: 0, namChi: "Bính Ngọ" };
            
            let ngayAm = ngay - 2; 
            let thangAm = thang;
            if (thang === 2) ngayAm = ngay - 2;
            if (ngayAm <= 0) {
                ngayAm = 29 + ngayAm;
                thangAm = thang - 1;
            }
            return { ngayAm, thangAm, isLeap: duLieuThang.k === 1, namChi: duLieuThang.l };
        }

        // --- CẤU HÌNH KẾT NỐI KHÔNG GIAN LƯU TRỮ HỆ THỐNG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAs-FakeKeyForStructureOnly_TrungNguyen",
            authDomain: "xuanlai-hub.firebaseapp.com",
            projectId: "xuanlai-hub",
            storageBucket: "xuanlai-hub.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234:web:abcd"
        };

        let auth = null, db = null;
        try {
            const app = window.FirebaseCore.initializeApp(firebaseConfig);
            auth = window.FirebaseCore.getAuth(app);
            db = window.FirebaseCore.getFirestore(app);
        } catch (e) {
            console.log("Firebase chạy chế độ Offline - Lưu trữ cục bộ");
        }

        function App() {
            // Các trạng thái quản lý giao diện
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [todos, setTodos] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [showSearch, setShowSearch] = useState(false);
            
            // Trạng thái biểu mẫu công việc
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [todoTitle, setTodoTitle] = useState('');
            const [todoTime, setTodoTime] = useState('');
            const [todoType, setTodoType] = useState('work');
            const [todoNote, setTodoNote] = useState('');

            // --- 🛠️ KHẮC PHỤC LỖI TRẮNG TRANG QUA ĐĂNG KÝ SERVICE WORKER CHUẨN ---
            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        // Thêm mã định danh phiên bản v=4 để phá bỏ lớp cache cũ lỗi trên máy
                        navigator.serviceWorker.register('/sw.js?v=4')
                            .then(reg => console.log('Kích hoạt Service Worker thành công:', reg.scope))
                            .catch(err => console.log('Lỗi đăng ký kiểm soát bộ đệm:', err));
                    });
                }
            }, []);

            // Nạp dữ liệu mặc định từ LocalStorage ban đầu
            useEffect(() => {
                const localData = localStorage.getItem('xuanlai_todos');
                if (localData) {
                    setTodos(JSON.parse(localData));
                } else {
                    const mauCongViec = [
                        { id: '1', title: 'Họp Hội đồng Sư phạm cơ sở', date: '2026-06-22', time: '08:00', type: 'work', note: 'Triển khai kế hoạch chuyên môn', completed: false },
                        { id: '2', title: 'Duyệt hồ sơ học bạ trực tuyến', date: '2026-06-25', time: '14:00', type: 'document', note: 'Kiểm tra kỹ thông tin học sinh', completed: false }
                    ];
                    setTodos(mauCongViec);
                    localStorage.setItem('xuanlai_todos', JSON.stringify(mauCongViec));
                }
            }, []);

            // Lưu dữ liệu tự động khi có biến động danh sách
            const saveTodos = (newTodos) => {
                setTodos(newTodos);
                localStorage.setItem('xuanlai_todos', JSON.stringify(newTodos));
            };

            // --- HÀM XỬ LÝ NGHIỆP VỤ CÔNG VIỆC ---
            const handleAddTodo = (e) => {
                e.preventDefault();
                if (!todoTitle.trim()) {
                    toast.error('Vui lòng điền tiêu đề công việc');
                    return;
                }
                const formattedDate = selectedDate.toISOString().split('T')[0];
                const newTodo = {
                    id: Date.now().toString(),
                    title: todoTitle,
                    date: formattedDate,
                    time: todoTime || '00:00',
                    type: todoType,
                    note: todoNote,
                    completed: false
                };
                saveTodos([...todos, newTodo]);
                toast.success('Đã thêm công việc vào lịch thành công!');
                setTodoTitle(''); setTodoTime(''); setTodoNote('');
                setIsModalOpen(false);
            };

            const toggleTodo = (id) => {
                const updated = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
                saveTodos(updated);
                toast.info('Đã cập nhật trạng thái thực hiện');
            };

            const deleteTodo = (id) => {
                if(confirm('Thầy chắc chắn muốn xóa công việc này chứ?')) {
                    const filtered = todos.filter(t => t.id !== id);
                    saveTodos(filtered);
                    toast.warn('Đã xóa bỏ công việc');
                }
            };

            // --- TÌM KIẾM TOÀN CỤC CHỐNG LỖI ĐƠ KHI GÕ ---
            const filteredTodos = useMemo(() => {
                if (!searchQuery.trim()) return todos;
                const lowQuery = searchQuery.toLowerCase().trim();
                return todos.filter(t => 
                    t.title.toLowerCase().includes(lowQuery) || 
                    (t.note && t.note.toLowerCase().includes(lowQuery)) ||
                    t.date.includes(lowQuery)
                );
            }, [searchQuery, todos]);

            // --- XỬ LÝ MA TRẬN HIỂN THỊ Ô LỊCH ---
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const firstDayIndex = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            const currentMonthName = `Tháng ${currentDate.getMonth() + 1} / ${currentDate.getFullYear()}`;

            const navigateMonth = (direction) => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + direction, 1));
            };

            const formatDisplayDate = (date) => {
                return `Ngày ${date.getDate()} Thg ${date.getMonth() + 1}, ${date.getFullYear()}`;
            };

            return (
                <div class="max-w-md mx-auto bg-white min-h-screen flex flex-col shadow-2xl relative pb-20">
                    {/* KHỐI THANH TIÊU ĐỀ CHÍNH HỆ THỐNG */}
                    <header class="bg-gradient-to-r from-rose-600 to-amber-500 text-white p-4 sticky top-0 z-40 shadow-md">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <CalendarIcon class="w-6 h-6 text-amber-200" />
                                <h1 class="font-bold text-lg tracking-wide">LỊCH VẠN NIÊN KHỐI GD</h1>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onClick={() => setShowSearch(!showSearch)} class="p-1.5 hover:bg-white/20 rounded-full transition">
                                    <Search class="w-5 h-5" />
                                </button>
                                <div class="bg-white/20 px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1">
                                    <Sparkles class="w-3 h-3 text-amber-200 animate-pulse" /> 2026
                                </div>
                            </div>
                        </div>

                        {/* THANH TÌM KIẾM CÔNG VIỆC THÔNG MINH */}
                        {showSearch && (
                            <div class="mt-3 relative flex items-center bg-white rounded-lg text-slate-800 shadow-inner animate-fadeIn">
                                <Search class="w-4 h-4 text-slate-400 absolute left-3" />
                                <input 
                                    type="text" 
                                    placeholder="Tìm tên việc, nội dung, ngày..." 
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    class="w-full pl-9 pr-8 py-2 text-sm bg-transparent outline-none text-slate-800"
                                    autoFocus
                                />
                                {searchQuery && (
                                    <button onClick={() => setSearchQuery('')} class="absolute right-2 p-1 text-slate-400 hover:text-slate-600">
                                        <X class="w-4 h-4" />
                                    </button>
                                )}
                            </div>
                        )}
                    </header>

                    {/* NỘI DUNG HIỂN THỊ KHI DÙNG THANH TÌM KIẾM */}
                    {searchQuery.trim() ? (
                        <main class="flex-1 p-4 bg-slate-50">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="font-bold text-slate-700 text-sm flex items-center gap-1">
                                    <ListTodo class="w-4 h-4 text-rose-500" /> Kết quả tìm kiếm ({filteredTodos.length})
                                </h3>
                                <button onClick={() => setSearchQuery('')} class="text-xs text-rose-500 font-medium hover:underline">
                                    Quay lại lịch
                                </button>
                            </div>
                            <div class="space-y-2">
                                {filteredTodos.length > 0 ? (
                                    filteredTodos.map(todo => (
                                        <div key={todo.id} class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-start gap-3">
                                            <button onClick={() => toggleTodo(todo.id)} class="mt-0.5 text-slate-400 hover:text-rose-600 transition">
                                                {todo.completed ? <CheckSquare class="w-5 h-5 text-emerald-500" /> : <Square class="w-5 h-5" />}
                                            </button>
                                            <div class="flex-1 min-w-0">
                                                <h4 class={`text-sm font-semibold ${todo.completed ? 'line-through text-slate-400' : 'text-slate-800'}`}>{todo.title}</h4>
                                                <div class="flex gap-2 text-xs text-slate-400 mt-1">
                                                    <span class="bg-slate-100 px-1.5 py-0.5 rounded font-mono">{todo.date}</span>
                                                    <span>•</span>
                                                    <span>{todo.time}</span>
                                                </div>
                                                {todo.note && <p class="text-xs text-slate-500 mt-1 bg-slate-50 p-1.5 rounded border border-dashed">{todo.note}</p>}
                                            </div>
                                            <button onClick={() => deleteTodo(todo.id)} class="p-1 text-slate-300 hover:text-rose-500 rounded">
                                                <Trash2 class="w-4 h-4" />
                                            </button>
                                        </div>
                                    ))
                                ) : (
                                    <div class="text-center py-10 bg-white rounded-2xl border border-slate-100 text-slate-400 text-sm">
                                        Không tìm thấy công việc phù hợp nào.
                                    </div>
                                )}
                            </div>
                        </main>
                    ) : (
                        // GIAO DIỆN LỊCH VẠN NIÊN NỀN TẢNG
                        <main class="flex-1 p-3 space-y-4">
                            {/* THANH ĐIỀU HƯỚNG THÁNG */}
                            <div class="flex justify-between items-center bg-white p-2 rounded-2xl border border-slate-100 shadow-sm">
                                <button onClick={() => navigateMonth(-1)} class="p-2 hover:bg-slate-100 rounded-xl transition">
                                    <ChevronLeft class="w-5 h-5 text-slate-600" />
                                </button>
                                <h2 class="font-bold text-slate-800 text-base">{currentMonthName}</h2>
                                <button onClick={() => navigateMonth(1)} class="p-2 hover:bg-slate-100 rounded-xl transition">
                                    <ChevronRight class="w-5 h-5 text-slate-600" />
                                </button>
                            </div>

                            {/* MA TRẬN Ô LỊCH CHI TIẾT */}
                            <div class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
                                <div class="grid grid-cols-7 text-center gap-1 mb-2">
                                    {['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'].map((d, i) => (
                                        <span key={d} class={`text-xs font-bold py-1 ${i === 0 ? 'text-rose-500' : 'text-slate-400'}`}>{d}</span>
                                    ))}
                                </div>
                                <div class="grid grid-cols-7 gap-1.5">
                                    {Array(firstDayIndex === 0 ? 6 : firstDayIndex - 1).fill(null).map((_, i) => (
                                        <div key={`empty-${i}`} class="aspect-square"></div>
                                    ))}
                                    {Array(daysInMonth).fill(null).map((_, i) => {
                                        const day = i + 1;
                                        const thisDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
                                        const formatted = thisDate.toISOString().split('T')[0];
                                        
                                        const isSelected = selectedDate.getDate() === day && selectedDate.getMonth() === currentDate.getMonth() && selectedDate.getFullYear() === currentDate.getFullYear();
                                        const isToday = new Date().getDate() === day && new Date().getMonth() === currentDate.getMonth() && new Date().getFullYear() === currentDate.getFullYear();
                                        
                                        const amData = getAmLich(day, currentDate.getMonth() + 1, currentDate.getFullYear());
                                        const coViec = todos.some(t => t.date === formatted);

                                        return (
                                            <button 
                                                key={day} 
                                                onClick={() => setSelectedDate(thisDate)}
                                                class={`aspect-square p-1 rounded-xl flex flex-col justify-between items-center relative transition-all border ${
                                                    isSelected ? 'bg-rose-600 text-white border-rose-600 shadow-md shadow-rose-100' : 
                                                    isToday ? 'bg-amber-50 text-amber-700 border-amber-300 font-semibold' : 'bg-slate-50/50 hover:bg-slate-100 border-transparent'
                                                }`}
                                            >
                                                <span class="text-xs font-semibold">{day}</span>
                                                <span class={`text-[9px] ${isSelected ? 'text-rose-100' : 'text-emerald-600 font-medium'}`}>
                                                    {amData.ngayAm === 1 ? `${amData.ngayAm}/${amData.thangAm}` : amData.ngayAm}
                                                </span>
                                                {coViec && <span class={`w-1.5 h-1.5 rounded-full absolute top-1 right-1 ${isSelected ? 'bg-white' : 'bg-rose-500'}`}></span>}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* DANH SÁCH CÔNG VIỆC TRONG NGÀY ĐÃ CHỌN */}
                            <div class="space-y-2">
                                <div class="flex justify-between items-center px-1">
                                    <h3 class="font-bold text-slate-700 text-xs tracking-wide uppercase">Công việc {formatDisplayDate(selectedDate)}</h3>
                                    <button 
                                        onClick={() => setIsModalOpen(true)}
                                        class="flex items-center gap-1 text-xs bg-rose-50 text-rose-600 px-2.5 py-1 rounded-lg font-semibold hover:bg-rose-100 transition"
                                    >
                                        <Plus class="w-3.5 h-3.5" /> Thêm việc
                                    </button>
                                </div>

                                <div class="space-y-2">
                                    {todos.filter(t => t.date === selectedDate.toISOString().split('T')[0]).length > 0 ? (
                                        todos.filter(t => t.date === selectedDate.toISOString().split('T')[0]).map(todo => (
                                            <div key={todo.id} class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-start gap-3">
                                                <button onClick={() => toggleTodo(todo.id)} class="mt-0.5 text-slate-400 hover:text-rose-600 transition">
                                                    {todo.completed ? <CheckSquare class="w-5 h-5 text-emerald-500" /> : <Square class="w-5 h-5" />}
                                                </button>
                                                <div class="flex-1 min-w-0">
                                                    <h4 class={`text-sm font-semibold ${todo.completed ? 'line-through text-slate-400' : 'text-slate-800'}`}>{todo.title}</h4>
                                                    <div class="flex items-center gap-1.5 text-xs text-slate-400 mt-1">
                                                        <Clock class="w-3 h-3" />
                                                        <span>{todo.time}</span>
                                                        <span class="px-1.5 py-0.5 rounded text-[10px] uppercase font-bold bg-slate-100 text-slate-500">{todo.type}</span>
                                                    </div>
                                                    {todo.note && <p class="text-xs text-slate-500 mt-1 bg-slate-50 p-1.5 rounded border border-dashed">{todo.note}</p>}
                                                </div>
                                                <button onClick={() => deleteTodo(todo.id)} class="p-1 text-slate-300 hover:text-rose-500 rounded">
                                                    <Trash2 class="w-4 h-4" />
                                                </button>
                                            </div>
                                        ))
                                    ) : (
                                        <div class="text-center py-8 bg-white rounded-2xl border border-dashed border-slate-200 text-slate-400 text-xs">
                                            Ngày này chưa xếp lịch biểu công tác nào.
                                        </div>
                                    )}
                                </div>
                            </div>
                        </main>
                    )}

                    {/* THANH MENU ĐIỀU HƯỚNG TAB CHÂN TRANG */}
                    <nav class="bg-white border-t border-slate-200 fixed bottom-0 max-w-md w-full h-16 flex justify-around items-center z-40 px-2 shadow-lg">
                        <button onClick={() => setSearchQuery('')} class="flex flex-col items-center gap-0.5 text-rose-600">
                            <CalendarIcon class="w-5 h-5" />
                            <span class="text-[10px] font-bold">Lịch biểu</span>
                        </button>
                        <button onClick={() => { setSelectedDate(new Date()); setCurrentDate(new Date()); setSearchQuery(''); }} class="flex flex-col items-center gap-0.5 text-slate-400 hover:text-rose-500">
                            <RefreshCw class="w-5 h-5" />
                            <span class="text-[10px] font-medium">Hôm nay</span>
                        </button>
                        <button onClick={() => setIsModalOpen(true)} class="bg-gradient-to-r from-rose-600 to-amber-500 text-white p-2.5 rounded-full shadow-lg shadow-rose-200 -translate-y-4 border-4 border-white transition-transform active:scale-95">
                            <Plus class="w-6 h-6" />
                        </button>
                        <button onClick={() => { setSearchQuery(' '); setShowSearch(true); }} class="flex flex-col items-center gap-0.5 text-slate-400 hover:text-rose-500">
                            <ListTodo class="w-5 h-5" />
                            <span class="text-[10px] font-medium">Tất cả việc</span>
                        </button>
                        <div class="flex flex-col items-center gap-0.5 text-slate-400">
                            <User class="w-5 h-5" />
                            <span class="text-[10px] font-medium">Hồ sơ</span>
                        </div>
                    </nav>

                    {/* HỘP THOẠI POPUP THÊM CÔNG VIỆC MỚI */}
                    {isModalOpen && (
                        <div class="fixed inset-0 bg-black/50 flex items-end justify-center z-50 p-4 animate-fadeIn">
                            <div class="bg-white w-full max-w-md rounded-t-3xl p-5 space-y-4 animate-slideUp shadow-2xl">
                                <div class="flex justify-between items-center border-b pb-2">
                                    <h3 class="font-bold text-slate-800 text-base flex items-center gap-1.5">
                                        <Plus class="w-5 h-5 text-rose-500" /> Thêm Lịch Công Tác
                                    </h3>
                                    <button onClick={() => setIsModalOpen(false)} class="p-1 hover:bg-slate-100 rounded-full">
                                        <X class="w-5 h-5 text-slate-400" />
                                    </button>
                                </div>
                                <form onSubmit={handleAddTodo} class="space-y-3.5">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 mb-1">NỘI DUNG/TIÊU ĐỀ *</label>
                                        <input 
                                            type="text" required placeholder="Ví dụ: Họp chi bộ, Lên lớp..." 
                                            value={todoTitle} onChange={(e) => setTodoTitle(e.target.value)}
                                            class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-rose-500 focus:bg-white transition"
                                        />
                                    </div>
                                    <div class="grid grid-cols-2 gap-3">
                                        <div>
                                            <label class="block text-xs font-bold text-slate-500 mb-1">THỜI GIAN NHẮC</label>
                                            <input 
                                                type="time" value={todoTime} onChange={(e) => setTodoTime(e.target.value)}
                                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-rose-500"
                                            />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-bold text-slate-500 mb-1">PHÂN LOẠI</label>
                                            <select 
                                                value={todoType} onChange={(e) => setTodoType(e.target.value)}
                                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-rose-500"
                                            >
                                                <option value="work">Việc trường</option>
                                                <option value="document">Hồ sơ sổ sách</option>
                                                <option value="personal">Việc riêng</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 mb-1">GHI CHÚ CHI TIẾT</label>
                                        <textarea 
                                            rows="2" placeholder="Nhập yêu cầu hoặc lưu ý đi kèm..." 
                                            value={todoNote} onChange={(e) => setTodoNote(e.target.value)}
                                            class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-rose-500 focus:bg-white transition"
                                        ></textarea>
                                    </div>
                                    <button type="submit" class="w-full bg-gradient-to-r from-rose-600 to-amber-500 text-white font-bold py-3 rounded-xl text-sm shadow-md shadow-rose-100 hover:opacity-90 transition active:scale-[0.99]">
                                        XÁC NHẬN LƯU LỊCH BIỂU
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Bộ điều khiển hiển thị thông báo Toast nổi */}
                    <ToastContainer position="top-center" autoClose={2000} hideProgressBar={true} newestOnTop={true} closeOnClick />
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
