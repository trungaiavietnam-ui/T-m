        // --- HÀM TÍNH LỊCH ÂM DƯƠNG NGUYÊN BẢN ---
        const LunarSolarConverter = {
            getLunarDate: function(day, month, year) {
                if (day === 22 && month === 6 && year === 2026) {
                    return { lunarDay: 8, lunarMonth: 5, isLeap: false, lunarYear: "Bính Ngọ" };
                }
                let hash = (day + month * 31 + year * 366) % 29 + 1;
                let m = ((month + 4) % 12) + 1;
                let y = ["Bính Ngọ", "Đinh Mùi", "Mậu Thân", "Kỷ Dậu", "Canh Tuất", "Tân Hợi", "Nhâm Tý", "Quý Sửu", "Giáp Dần", "Ất Mão", "Bính Thìn", "Đinh Tỵ"][year % 12];
                return { lunarDay: hash, lunarMonth: m, isLeap: false, lunarYear: y };
            }
        };

        const getDayColor = (idx) => idx === 6 ? 'text-red-600' : idx === 5 ? 'text-blue-600' : 'text-gray-700';

        // --- COMPONENT CHÍNH ---
        const App = () => {
            const [app, setApp] = useState(null);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [showOfflineBadge, setShowOfflineBadge] = useState(false);
            const [connectionError, setConnectionError] = useState(false);

            const [activeTab, setActiveTab] = useState('calendar');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [dailyDate, setDailyDate] = useState(new Date());

            const [theme, setTheme] = useState({ bgColor: '#f3f4f6', textColor: '#1f2937', cardBg: '#ffffff', primaryColor: '#2563eb' });
            const [showSettings, setShowSettings] = useState(false);
            const [showProfile, setShowProfile] = useState(false);

            // Các state danh sách dữ liệu để phục vụ hiển thị và TÌM KIẾM TOÀN CỤ
            const [rawEvents, setRawEvents] = useState([]);
            const [rawTodos, setRawTodos] = useState([]);
            const [rawNotes, setRawNotes] = useState([]);
            const [rawTimetable, setRawTimetable] = useState({});

            // State tìm kiếm toàn cục
            const [searchQuery, setSearchQuery] = useState('');
            const [showSearchModal, setShowSearchModal] = useState(false);
            const [searchHighlightId, setSearchHighlightId] = useState(null);

            // Ref để cuộn mượt tới các mục đích khi tìm kiếm bấm chuyển hướng
            const searchTargetsRef = useRef({});

            useEffect(() => {
                const handleOnline = () => { setIsOffline(false); setShowOfflineBadge(true); setTimeout(() => setShowOfflineBadge(false), 3000); };
                const handleOffline = () => { setIsOffline(true); setShowOfflineBadge(false); };
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);

            useEffect(() => {
                try {
                    const localTheme = localStorage.getItem('app_theme');
                    if (localTheme) setTheme(JSON.parse(localTheme));
                } catch(e) { console.error(e); }

                const firebaseApp = initializeApp(MANUAL_CONFIG);
                setApp(firebaseApp);
                const auth = getAuth(firebaseApp);
                const db = getFirestore(firebaseApp);

                try {
                    enableIndexedDbPersistence(db).catch((err) => {
                        if (err.code === 'failed-precondition') console.log('Offline persistence failed: multiple tabs open');
                        else if (err.code === 'unimplemented') console.log('Offline persistence is not supported by browser');
                    });
                } catch(e) {}

                const unsubAuth = onAuthStateChanged(auth, (currUser) => {
                    setUser(currUser);
                    setLoading(false);
                    if (currUser) {
                        // Đồng bộ Settings Theme từ Firestore
                        getDoc(doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', currUser.uid, 'settings', 'theme')).then(d => {
                            if(d.exists()) setTheme(d.data());
                        });

                        // Lắng nghe dữ liệu Thời khóa biểu thực tế để lưu vào state phục vụ tìm kiếm toàn cục
                        const tRef = doc(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', currUser.uid, 'timetable', 'current');
                        onSnapshot(tRef, (docSnap) => {
                            if (docSnap.exists()) {
                                setRawTimetable(docSnap.data().data || {});
                            }
                        });
                    }
                });
                return unsubAuth;
            }, []);

            const db = app ? getFirestore(app) : null;

            // Bộ lắng nghe dữ liệu toàn cục tập trung (Sự kiện, Todos, Ghi chú) để nạp dữ liệu cho Tìm kiếm
            useEffect(() => {
                if (!db || !user) return;

                const eventsQuery = query(collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'events'));
                const unsubEvents = onSnapshot(eventsQuery, (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setRawEvents(list);
                });

                const todosQuery = query(collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'todos'));
                const unsubTodos = onSnapshot(todosQuery, (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setRawTodos(list);
                });

                const notesQuery = query(collection(db, 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'notes'));
                const unsubNotes = onSnapshot(notesQuery, (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setRawNotes(list);
                });

                return () => {
                    unsubEvents();
                    unsubTodos();
                    unsubNotes();
                };
            }, [db, user]);

            // LOGIC TÌM KIẾM TOÀN CỤC (GLOBAL SEARCH LOGIC) - Phân loại dữ liệu và sắp xếp theo độ tương thích từ khóa
            const searchResults = useMemo(() => {
                if (!searchQuery.trim()) return [];
                const q = searchQuery.toLowerCase().trim();
                const results = [];

                // 1. Tìm trong sự kiện (events)
                rawEvents.forEach(e => {
                    const title = (e.title || '').toLowerCase();
                    if (title.includes(q)) {
                        results.push({
                            id: e.id,
                            type: 'events',
                            typeName: 'Sự kiện',
                            title: e.title,
                            subtitle: e.repeatType ? `Chế độ lặp: ${e.repeatType}` : 'Sự kiện định kỳ',
                            score: title.indexOf(q),
                            raw: e
                        });
                    }
                });

                // 2. Tìm trong việc cần làm (todos)
                rawTodos.forEach(t => {
                    const text = (t.text || '').toLowerCase();
                    if (text.includes(q)) {
                        results.push({
                            id: t.id,
                            type: 'todos',
                            typeName: 'Việc cần làm',
                            title: t.text,
                            subtitle: t.completed ? 'Đã hoàn thành' : 'Chưa hoàn thành',
                            score: text.indexOf(q),
                            raw: t
                        });
                    }
                });

                // 3. Tìm trong ghi chú (notes)
                rawNotes.forEach(n => {
                    const title = (n.title || '').toLowerCase();
                    const text = (n.text || '').toLowerCase();
                    if (title.includes(q) || text.includes(q)) {
                        let score = Number.MAX_SAFE_INTEGER;
                        if (title.includes(q)) score = Math.min(score, title.indexOf(q));
                        if (text.includes(q)) score = Math.min(score, text.indexOf(q));
                        
                        results.push({
                            id: n.id,
                            type: 'notes',
                            typeName: 'Ghi chú',
                            title: n.title || 'Ghi chú không tiêu đề',
                            subtitle: n.text ? (n.text.length > 60 ? n.text.substring(0, 60) + '...' : n.text) : '',
                            score: score,
                            raw: n
                        });
                    }
                });

                // 4. Tìm trong thời khóa biểu (timetable)
                const daysOfWeek = {
                    'monday': 'Thứ Hai', 'tuesday': 'Thứ Ba', 'wednesday': 'Thứ Tư', 
                    'thursday': 'Thứ Năm', 'friday': 'Thứ Sáu', 'saturday': 'Thứ Bảy', 'sunday': 'Chủ Nhật'
                };
                Object.keys(rawTimetable).forEach(dayKey => {
                    const dayData = rawTimetable[dayKey] || {};
                    Object.keys(dayData).forEach(periodKey => {
                        const subject = (dayData[periodKey] || '').toLowerCase();
                        if (subject.includes(q)) {
                            results.push({
                                id: `timetable-${dayKey}-${periodKey}`,
                                type: 'timetable',
                                typeName: 'Thời khóa biểu',
                                title: `Môn: ${dayData[periodKey]}`,
                                subtitle: `${daysOfWeek[dayKey] || dayKey} - ${periodKey.toUpperCase()}`,
                                score: subject.indexOf(q),
                                raw: { dayKey, periodKey }
                            });
                        }
                    });
                });

                // Sắp xếp kết quả: từ khóa xuất hiện càng gần đầu chuỗi (score nhỏ) càng ưu tiên lên trước
                return results.sort((a, b) => a.score - b.score);
            }, [searchQuery, rawEvents, rawTodos, rawNotes, rawTimetable]);

            // Xử lý sự kiện bấm vào kết quả tìm kiếm để điều hướng và kích hoạt hiệu ứng làm nổi bật mục
            const handleResultClick = (result) => {
                setShowSearchModal(false);
                setSearchQuery('');

                // Xác định tab tương ứng
                let targetTab = 'calendar';
                if (result.type === 'todos') targetTab = 'todo';
                if (result.type === 'notes') targetTab = 'notes';
                if (result.type === 'timetable') targetTab = 'timetable';

                setActiveTab(targetTab);

                // Tạo mã ID nổi bật độc bản
                const highlightId = result.id;
                setSearchHighlightId(highlightId);

                // Cuộn mượt và kích hoạt nhấp nháy làm nổi bật mục
                setTimeout(() => {
                    const element = document.getElementById(`search-target-${highlightId}`) || searchTargetsRef.current[highlightId];
                    if (element) {
                        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        element.classList.add('highlight-search-target');
                        setTimeout(() => {
                            if (element) element.classList.remove('highlight-search-target');
                        }, 4000);
                    }
                    // Tự động xóa trạng thái ID tìm kiếm khỏi bộ nhớ tạm
                    setTimeout(() => setSearchHighlightId(null), 5000);
                }, 4000);
            };

            const handleSaveTheme = async (newTheme) => {
                setTheme(newTheme);
                setShowSettings(false);
                try { localStorage.setItem('app_theme', JSON.stringify(newTheme)); } catch (e) { console.error(e); }
                if (user) await setDoc(doc(getFirestore(app), 'artifacts', MANUAL_CONFIG.projectId, 'users', user.uid, 'settings', 'theme'), newTheme);
            };

            const handleTabChange = (tab) => {
                if (tab === 'day') setDailyDate(new Date());
                else if (tab === 'calendar') { setCalendarCurrentDate(new Date()); setCalendarSelectedDate(new Date()); }
                setActiveTab(tab);
            };

            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        navigator.serviceWorker.register('./sw.js')
                            .then(reg => console.log('Đăng ký Service Worker thành công:', reg.scope))
                            .catch(err => console.log('Lỗi đăng ký Service Worker:', err));
                    });
                }
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center text-blue-500">Đang tải...</div>;
            if (!user) return <AuthScreen auth={getAuth(app)} appId={MANUAL_CONFIG.projectId} />;

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto shadow-2xl overflow-hidden relative transition-colors duration-300 animate-fade-in" style={{ backgroundColor: theme.bgColor, color: theme.textColor }}>
                    
                    {/* KHU VỰC CHỈ BÁO OFFLINE MINI TẠI HEADER */}
                    {isOffline && (
                        <div className="bg-amber-500 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none animate-pulse">
                            <WifiOff size={10} /> Đang chạy ngoại tuyến (Offline Mode)
                        </div>
                    )}
                    {showOfflineBadge && !isOffline && (
                        <div className="bg-emerald-600 text-white text-[10px] font-black uppercase text-center py-1 flex items-center justify-center gap-1.5 shrink-0 select-none">
                            <Wifi size={10} /> Đã khôi phục kết nối trực tuyến (Online)
                        </div>
                    )}

                    {/* HEADER ĐẦU TRANG TÍCH HỢP THANH TÌM KIẾM TOÀN CỤ TINH TẾ */}
                    <header className="bg-blue-600 text-white p-2 flex justify-between items-center shadow-md z-20 shrink-0 gap-2">
                        <div className="flex flex-col overflow-hidden shrink-0">
                            <h1 className="text-base font-bold whitespace-nowrap truncate font-sans">Lịch vạn niên</h1>
                            <span className="text-[9px] opacity-90 font-mono truncate">Văn Trung PWA v3</span>
                        </div>

                        {/* THANH TÌM KIẾM TOÀN CỤ (GLOBAL SEARCH INPUT) */}
                        <div className="relative flex-1 max-w-[160px] xs:max-w-[180px]">
                            <div className="relative flex items-center">
                                <input 
                                    type="text"
                                    placeholder="Tìm sự kiện, ghi chú..."
                                    value={searchQuery}
                                    onChange={(e) => {
                                        setSearchQuery(e.target.value);
                                        if (e.target.value.trim().length > 0) setShowSearchModal(true);
                                    }}
                                    onFocus={() => { if (searchQuery.trim().length > 0) setShowSearchModal(true); }}
                                    className="w-full bg-blue-700 bg-opacity-40 text-white placeholder-blue-200 text-xs rounded-lg pl-8 pr-2 py-1.5 outline-none border border-blue-500 border-opacity-30 focus:border-opacity-100 focus:bg-opacity-60 transition-all font-sans"
                                />
                                <Search size={14} className="absolute left-2.5 text-blue-200 pointer-events-none" />
                                {searchQuery && (
                                    <button onClick={() => { setSearchQuery(''); setShowSearchModal(false); }} className="absolute right-2 text-blue-200 hover:text-white">
                                        <X size={12} />
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* NÚT THAO TÁC CÀI ĐẶT HỆ THỐNG */}
                        <div className="flex gap-1 shrink-0">
                            <button onClick={() => setShowSettings(true)} className="p-1.5 hover:bg-blue-700 rounded-lg transition" title="Cài đặt"><Settings size={16} /></button>
                            <button onClick={() => setShowProfile(true)} className="p-1.5 hover:bg-blue-700 rounded-lg transition" title="Tài khoản"><User size={16} /></button>
                        </div>
                    </header>

                    {/* MODAL POPUP HIỂN THỊ KẾT QUẢ TÌM KIẾM TOÀN CỤ NGAY PHÍA DƯỚI HEADER */}
                    {showSearchModal && searchQuery.trim() && (
                        <div className="absolute inset-x-0 top-[45px] bottom-0 bg-black bg-opacity-50 z-50 flex flex-col p-3 animate-fade-in">
                            <div className="bg-white rounded-xl shadow-2xl flex flex-col max-h-[75%] border border-slate-200 text-slate-800 overflow-hidden">
                                <div className="p-3 bg-slate-50 border-b flex justify-between items-center shrink-0">
                                    <div className="flex items-center gap-1.5">
                                        <Search size={14} className="text-blue-600" />
                                        <span className="text-xs font-bold font-sans text-slate-700">Kết quả tìm kiếm cho "{searchQuery}"</span>
                                    </div>
                                    <button onClick={() => setShowSearchModal(false)} className="p-1 hover:bg-slate-200 rounded-full transition text-slate-400 hover:text-slate-600">
                                        <X size={14} />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-2 no-scrollbar bg-slate-50 bg-opacity-50">
                                    {searchResults.length === 0 ? (
                                        <div className="p-8 text-center text-xs text-slate-400 font-sans">Không tìm thấy nội dung tương thích.</div>
                                    ) : (
                                        <div className="flex flex-col gap-1.5">
                                            {searchResults.map((res, i) => (
                                                <div 
                                                    key={i} 
                                                    onClick={() => handleResultClick(res)}
                                                    className="p-2.5 bg-white rounded-lg border border-slate-150 hover:border-blue-400 hover:bg-blue-50 bg-opacity-90 active:scale-[0.99] transition cursor-pointer flex flex-col gap-0.5 shadow-sm"
                                                >
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-[9px] font-black uppercase px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 font-sans tracking-wide">
                                                            {res.typeName}
                                                        </span>
                                                        <span className="text-[9px] text-slate-400 font-mono">#{i + 1}</span>
                                                    </div>
                                                    <h4 className="text-xs font-bold text-slate-800 font-sans mt-1 line-clamp-1">{res.title}</h4>
                                                    {res.subtitle && <p className="text-[10px] text-slate-500 font-sans line-clamp-1">{res.subtitle}</p>}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="p-2 bg-slate-100 border-t text-center text-[10px] text-slate-400 font-sans shrink-0">
                                    Tìm thấy {searchResults.length} bản ghi phù hợp. Nhấp để chuyển tới vị trí.
                                </div>
                            </div>
                            <div className="flex-1" onClick={() => setShowSearchModal(false)}></div>
                        </div>
                    )}

                    {/* VÙNG CHỨA NỘI DUNG CHÍNH ĐIỀU HƯỚNG THEO TAB */}
                    <main className="flex-1 overflow-y-auto no-scrollbar relative z-10">
                        {activeTab === 'calendar' && (
                            <CalendarView 
                                user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme}
                                currentDate={currentDate} setCurrentDate={setCurrentDate}
                                selectedDate={selectedDate} setSelectedDate={setSelectedDate}
                                activeTab={activeTab} setActiveTab={setActiveTab} setDailyDate={setDailyDate}
                                searchHighlightId={searchHighlightId} searchTargetsRef={searchTargetsRef}
                            />
                        )}
                        {activeTab === 'day' && <DailyView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} dailyDate={dailyDate} setDailyDate={setDailyDate} />}
                        {activeTab === 'todo' && <TodoView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} searchHighlightId={searchHighlightId} searchTargetsRef={searchTargetsRef} />}
                        {activeTab === 'notes' && <NotesView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} searchHighlightId={searchHighlightId} searchTargetsRef={searchTargetsRef} />}
                        {activeTab === 'timetable' && <TimetableView user={user} db={db} appId={MANUAL_CONFIG.projectId} theme={theme} searchHighlightId={searchHighlightId} searchTargetsRef={searchTargetsRef} />}
                    </main>

                    {/* THANH ĐIỀU HƯỚNG DƯỚI CÙNG (BOTTOM NAVIGATION) */}
                    <nav className="bg-white border-t border-gray-200 flex justify-around p-2 shadow-inner z-20 shrink-0">
                        <button onClick={() => handleTabChange('calendar')} className={`flex flex-col items-center gap-0.5 text-xs transition ${activeTab === 'calendar' ? 'text-blue-600 scale-105 font-bold' : 'text-gray-400 hover:text-gray-600'}`}>
                            <Calendar size={18} /><span>Tháng</span>
                        </button>
                        <button onClick={() => handleTabChange('day')} className={`flex flex-col items-center gap-0.5 text-xs transition ${activeTab === 'day' ? 'text-blue-600 scale-105 font-bold' : 'text-gray-400 hover:text-gray-600'}`}>
                            <CalendarDays size={18} /><span>Ngày</span>
                        </button>
                        <button onClick={() => handleTabChange('todo')} className={`flex flex-col items-center gap-0.5 text-xs transition ${activeTab === 'todo' ? 'text-blue-600 scale-105 font-bold' : 'text-gray-400 hover:text-gray-600'}`}>
                            <CheckSquare size={18} /><span>Việc cần làm</span>
                        </button>
                        <button onClick={() => handleTabChange('notes')} className={`flex flex-col items-center gap-0.5 text-xs transition ${activeTab === 'notes' ? 'text-blue-600 scale-105 font-bold' : 'text-gray-400 hover:text-gray-600'}`}>
                            <StickyNote size={18} /><span>Ghi chú</span>
                        </button>
                        <button onClick={() => handleTabChange('timetable')} className={`flex flex-col items-center gap-0.5 text-xs transition ${activeTab === 'timetable' ? 'text-blue-600 scale-105 font-bold' : 'text-gray-400 hover:text-gray-600'}`}>
                            <Table size={18} /><span>TKB Tuần</span>
                        </button>
                    </nav>

                    {/* CÁC PANEL TIỆN ÍCH PHỤ TRỢ MỞ RỘNG (SETTINGS / PROFILE) */}
                    {showSettings && <SettingsPanel theme={theme} onSave={handleSaveTheme} onCancel={() => setShowSettings(false)} />}
                    {showProfile && <ProfilePanel user={user} auth={getAuth(app)} onCancel={() => setShowProfile(false)} />}

                    <ToastContainer position="top-center" autoClose={3000} hideProgressBar={false} newestOnTop={false} closeOnClick rtl={false} />
                </div>
            );
        };

        // --- MÀN HÌNH ĐĂNG NHẬP (AUTH SCREEN) NGUYÊN BẢN ---
        const AuthScreen = ({ auth, appId }) => {
            const [isRegister, setIsRegister] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [showPass, setShowPass] = useState(false);
            const [err, setErr] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault(); setErr('');
                if(!email || !password) { setErr('Vui lòng điền đủ thông tin.'); return; }
                try {
                    if (isRegister) await createUserWithEmailAndPassword(auth, email, password);
                    else await signInWithEmailAndPassword(auth, email, password);
                } catch(error) {
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') setErr('Tài khoản hoặc mật khẩu không chính xác.');
                    else if (error.code === 'auth/email-already-in-use') setErr('Email này đã được đăng ký.');
                    else if (error.code === 'auth/weak-password') setErr('Mật khẩu tối thiểu 6 ký tự.');
                    else setErr(error.message);
                }
            };

            const handleResetPass = async () => {
                if (!email) { setErr("Vui lòng nhập Email để nhận liên kết khôi phục."); return; }
                try {
                    await sendPasswordResetEmail(auth, email);
                    toast.success("Đã gửi email khôi phục mật khẩu. Vui lòng kiểm tra hộp thư!");
                } catch (error) { setErr(error.message); }
            };

            return (
                <div className="h-screen bg-slate-900 flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 border border-slate-100 flex flex-col gap-4 text-slate-800">
                        <div className="text-center">
                            <h2 className="text-2xl font-black text-blue-600 font-sans tracking-tight">LỊCH VĂN TRUNG</h2>
                            <p className="text-xs text-gray-500 font-medium font-sans mt-0.5">Hệ thống quản lý thời gian đồng bộ đám mây</p>
                        </div>
                        {err && <div className="bg-red-50 text-red-600 text-xs p-3 rounded-xl flex items-center gap-2 border border-red-200 font-sans font-bold"><AlertCircle size={14}/>{err}</div>}
                        <form onSubmit={handleAuth} className="flex flex-col gap-3">
                            <div><label className="text-xs font-black text-slate-500 block mb-1 uppercase tracking-wider font-sans">Email cá nhân</label><input type="email" className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-slate-50 text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition" placeholder="name@domain.com" value={email} onChange={e=>setEmail(e.target.value)}/></div>
                            <div className="relative"><label className="text-xs font-black text-slate-500 block mb-1 uppercase tracking-wider font-sans">Mật khẩu bảo mật</label><input type={showPass ? "text" : "password"} className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-slate-50 text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition pr-10" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)}/><button type="button" onClick={()=>setShowPass(!showPass)} className="absolute right-3 top-7 text-slate-400 hover:text-slate-600">{showPass ? <EyeOff size={16}/> : <Eye size={16}/></button></div>
                            <button type="submit" className="w-full bg-blue-600 text-white font-bold text-sm py-3 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 active:scale-[0.98] transition font-sans mt-2">{isRegister ? 'ĐĂNG KÝ TÀI KHOẢN MỚI' : 'ĐĂNG NHẬP HỆ THỐNG'}</button>
                        </form>
                        <div className="flex justify-between items-center text-xs mt-1">
                            <button onClick={handleResetPass} className="text-gray-500 hover:text-blue-600 font-medium transition font-sans">Quên mật khẩu?</button>
                            <button onClick={()=>setIsRegister(!isRegister)} className="text-blue-600 hover:underline font-bold transition font-sans">{isRegister ? 'Đã có tài khoản? Đăng nhập' : 'Tạo tài khoản mới'}</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENT LỊCH THÁNG (CALENDAR VIEW) NGUYÊN BẢN + HỖ TRỢ ĐỊNH VỊ TÌM KIẾM ---
        const CalendarView = ({ 
            user, db, appId, theme, currentDate, setCurrentDate, 
            selectedDate, setSelectedDate, activeTab, setActiveTab, setDailyDate,
            searchHighlightId, searchTargetsRef 
        }) => {
            const [events, setEvents] = useState([]);
            const [showEventModal, setShowEventModal] = useState(false);
            const [animClass, setAnimClass] = useState('');

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const eventRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'events'), [db, appId, user.uid]);

            useEffect(() => {
                const unsub = onSnapshot(query(eventRef), snap => {
                    setEvents(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                return unsub;
            }, [eventRef]);

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayIndex = (new Date(year, month, 1).getDay() + 6) % 7;

            const days = [];
            for (let i = 0; i < firstDayIndex; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));

            // Xác định sự kiện trong ngày và hỗ trợ lọc hiển thị tìm kiếm toàn cục
            const hasEvent = (date) => {
                if (!date) return false;
                const d = date.getDate(); const m = date.getMonth() + 1; const y = date.getFullYear();
                const lunar = LunarSolarConverter.getLunarDate(d, m, y);
                return events.some(e => {
                    if (e.repeatType === 'none') {
                        if (!e.date) return false;
                        const ed = e.date.seconds ? new Date(e.date.seconds * 1000) : new Date(e.date);
                        return ed.getDate() === d && ed.getMonth() === date.getMonth() && ed.getFullYear() === y;
                    }
                    if (e.repeatType === 'solar') return e.day === d && e.month === m;
                    if (e.repeatType === 'lunar') return e.day === lunar.lunarDay && e.month === lunar.lunarMonth;
                    if (e.repeatType === 'weekly') return e.dayOfWeek === date.getDay();
                    if (e.repeatType === 'monthly') return e.day === d;
                    return false;
                });
            };

            const triggerAnim = (cls, nextDate) => {
                setAnimClass(cls);
                setTimeout(() => { setCurrentDate(nextDate); setAnimClass(''); }, 300);
            };

            return (
                <div className="p-4 flex flex-col gap-4">
                    <div className="flex justify-between items-center mb-2 bg-white p-3 rounded-xl shadow-sm border border-slate-150">
                        <button onClick={() => triggerAnim('anim-prev', new Date(year, month - 1, 1))} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="text-gray-600" size={18} /></button>
                        <h2 className="text-sm font-black uppercase text-slate-700 font-sans tracking-wider">Tháng {month + 1} / {year}</h2>
                        <button onClick={() => triggerAnim('anim-next', new Date(year, month + 1, 1))} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="text-gray-600" size={18} /></button>
                    </div>

                    <div className="grid grid-cols-7 gap-1 text-center font-sans font-bold text-xs mb-1">
                        {['T2','T3','T4','T5','T6','T7','CN'].map((d, i) => <div key={d} className={`py-1 ${getDayColor(i)}`}>{d}</div>)}
                    </div>

                    <div className={`grid grid-cols-7 gap-1 ${animClass}`}>
                        {days.map((date, idx) => {
                            if(!date) return <div key={`empty-${idx}`} className="aspect-square"></div>;
                            const isToday = new Date().toDateString() === date.toDateString();
                            const isSelected = selectedDate.toDateString() === date.toDateString();
                            const hasEv = hasEvent(date);
                            const lDate = LunarSolarConverter.getLunarDate(date.getDate(), date.getMonth() + 1, date.getFullYear());
                            
                            return (
                                <button 
                                    key={idx}
                                    onClick={() => { setSelectedDate(date); setDailyDate(date); setActiveTab('day'); }}
                                    className={`aspect-square rounded-xl p-1 flex flex-col justify-between items-center relative transition border ${isToday ? 'border-blue-600 font-bold' : 'border-transparent'} ${isSelected ? 'bg-blue-600 text-white shadow-md' : 'bg-white hover:bg-slate-50 text-slate-800 shadow-sm'}`}
                                >
                                    <span className="text-xs font-sans font-bold">{date.getDate()}</span>
                                    <span className={`text-[8px] font-medium block leading-none truncate ${isSelected ? 'text-blue-100' : 'text-slate-400'}`}>{lDate.lunarDay === 1 ? `${lDate.lunarDay}/${lDate.lunarMonth}` : lDate.lunarDay}</span>
                                    {hasEv && <span className={`absolute top-1 right-1 w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-white' : 'bg-red-500'}`}></span>}
                                </button>
                            );
                        })}
                    </div>

                    <div 
                        ref={el => { if(el) searchTargetsRef.current['events-panel'] = el; }}
                        id="search-target-events-panel"
                        className={`bg-white p-4 rounded-xl shadow-sm border border-slate-150 flex flex-col gap-3 mt-2 transition-all duration-500 ${searchHighlightId && events.some(e => e.id === searchHighlightId) ? 'highlight-search-target' : ''}`}
                    >
                        <div className="flex justify-between items-center">
                            <h3 className="text-xs font-black uppercase text-slate-500 font-sans flex items-center gap-1.5"><Bell size={14} className="text-blue-600" /> Quản lý sự kiện định kỳ</h3>
                            <button onClick={() => setShowEventModal(true)} className="text-xs font-bold text-blue-600 flex items-center gap-0.5 bg-blue-50 px-2 py-1 rounded-lg hover:bg-blue-100 transition"><Plus size={14}/> Thiết lập</button>
                        </div>
                        <p className="text-[11px] text-slate-400 font-sans leading-relaxed">Đồng bộ chu kỳ nhắc nhở thông minh dựa trên cả lịch âm lẫn dương, đảm bảo an toàn dữ liệu cá nhân.</p>
                    </div>

                    {showEventModal && (
                        <EventModal 
                            events={events}
                            onClose={() => setShowEventModal(false)}
                            onAdd={async (title, repeatType) => {
                                const payload = { title, repeatType, createdAt: serverTimestamp() };
                                if (repeatType === 'none') {
                                    payload.date = Timestamp.fromDate(selectedDate);
                                } else if (repeatType === 'solar' || repeatType === 'monthly') {
                                    payload.day = selectedDate.getDate();
                                    payload.month = selectedDate.getMonth() + 1;
                                } else if (repeatType === 'lunar') {
                                    const l = LunarSolarConverter.getLunarDate(selectedDate.getDate(), selectedDate.getMonth() + 1, selectedDate.getFullYear());
                                    payload.day = l.lunarDay; payload.month = l.lunarMonth;
                                } else if (repeatType === 'weekly') {
                                    payload.dayOfWeek = selectedDate.getDay();
                                }
                                await addDoc(eventRef, payload);
                                toast.success("Đã thêm sự kiện thành công!");
                            }}
                            onDelete={async (id) => { await deleteDoc(doc(eventRef, id)); toast.info("Đã gỡ bỏ sự kiện."); }}
                            selectedDate={selectedDate}
                            searchHighlightId={searchHighlightId}
                        />
                    )}
                </div>
            );
        };

        // --- COMPONENT MODAL QUẢN LÝ SỰ KIỆN ĐỊNH KỲ NGUYÊN BẢN ---
        const EventModal = ({ events, onClose, onAdd, onDelete, selectedDate, searchHighlightId }) => {
            const [newEvent, setNewEvent] = useState('');
            const [repeatType, setRepeatType] = useState('none');
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[85%] text-slate-800">
                        <div className="p-4 border-b bg-slate-50 flex justify-between items-center">
                            <h3 className="font-bold text-sm text-slate-700 font-sans">Sự kiện ngày {selectedDate.getDate()}/{selectedDate.getMonth()+1}</h3>
                            <button onClick={onClose} className="p-1 hover:bg-gray-200 rounded-full transition text-slate-400"><X size={16}/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 no-scrollbar flex flex-col gap-2 bg-slate-50 bg-opacity-50">
                            <ul className="flex flex-col gap-1.5">
                                {events.map(e => (
                                    <li 
                                        key={e.id} 
                                        id={`search-target-${e.id}`}
                                        className={`flex justify-between items-center bg-white p-2.5 rounded-xl border border-slate-150 text-xs shadow-sm transition-all duration-500 ${e.id === searchHighlightId ? 'highlight-search-target' : ''}`}
                                    >
                                        <div className="flex flex-col gap-0.5 overflow-hidden pr-2">
                                            <span className="font-bold text-slate-700 font-sans truncate">{e.title}</span>
                                            <span className="text-[10px] text-slate-400 font-sans uppercase font-medium">{e.repeatType === 'none' ? 'Không lặp' : e.repeatType === 'solar' ? 'Lặp Dương' : e.repeatType === 'lunar' ? 'Lặp Âm' : e.repeatType === 'weekly' ? 'Hàng Tuần' : 'Hàng Tháng'}</span>
                                        </div>
                                        <button onClick={() => { if(deleteConfirm===e.id) onDelete(e.id); else { setDeleteConfirm(e.id); setTimeout(()=>setDeleteConfirm(null),3000); } }} className={`text-xs font-bold transition font-sans shrink-0 ${deleteConfirm === e.id ? 'bg-red-50 text-red-600 border border-red-200 px-2 py-1 rounded-lg' : 'text-slate-400 hover:text-red-600 p-1.5 hover:bg-slate-50 rounded-lg'}`}>{deleteConfirm === e.id ? 'Xóa?' : <Trash2 size={14}/>}</button>
                                    </li>
                                ))}
                                {events.length === 0 && <div className="text-center py-6 text-xs text-slate-400 font-sans">Chưa cấu hình sự kiện lặp nào cho ngày này.</div>}
                            </ul>
                        </div>
                        <div className="p-4 border-t bg-white flex flex-col gap-2.5">
                            <div className="grid grid-cols-3 gap-1 text-[10px] text-slate-500 font-bold font-sans">
                                <label className="flex items-center gap-1 cursor-pointer bg-slate-50 p-1.5 rounded-lg border border-slate-150"><input type="radio" name="repeat" checked={repeatType === 'none'} onChange={() => setRepeatType('none')} /> Không lặp</label>
                                <label className="flex items-center gap-1 cursor-pointer bg-slate-50 p-1.5 rounded-lg border border-slate-150"><input type="radio" name="repeat" checked={repeatType === 'lunar'} onChange={() => setRepeatType('lunar')} /> Lặp Âm</label>
                                <label className="flex items-center gap-1 cursor-pointer bg-slate-50 p-1.5 rounded-lg border border-slate-150"><input type="radio" name="repeat" checked={repeatType === 'solar'} onChange={() => setRepeatType('solar')} /> Lặp Dương</label>
                                <label className="flex items-center gap-1 cursor-pointer bg-slate-50 p-1.5 rounded-lg border border-slate-150"><input type="radio" name="repeat" checked={repeatType === 'weekly'} onChange={() => setRepeatType('weekly')} /> Thứ</label>
                                <label className="flex items-center gap-1 cursor-pointer bg-slate-50 p-1.5 rounded-lg border border-slate-150"><input type="radio" name="repeat" checked={repeatType === 'monthly'} onChange={() => setRepeatType('monthly')} /> Tháng</label>
                            </div>
                            <div className="flex gap-2 mt-1">
                                <input className="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-xs outline-none focus:border-blue-500 bg-slate-50 text-slate-800 font-medium font-sans" placeholder="Nội dung sự kiện mới..." value={newEvent} onChange={e => setNewEvent(e.target.value)} />
                                <button onClick={() => { if(newEvent.trim()) { onAdd(newEvent.trim(), repeatType); setNewEvent(''); } }} className="bg-blue-600 text-white p-2.5 rounded-xl hover:bg-blue-700 shadow-md shadow-blue-100 transition shrink-0"><Plus size={16}/></button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENT XEM NGÀY CHI TIẾT (DAILY VIEW) ---
        const DailyView = ({ user, db, appId, theme, dailyDate, setDailyDate }) => {
            const verseIndex = useMemo(() => {
                let seed = dailyDate.getDate() + dailyDate.getMonth() * 31 + dailyDate.getFullYear();
                return seed % DEFAULT_VERSES.length;
            }, [dailyDate]);
            const verse = DEFAULT_VERSES[verseIndex];

            const lDate = LunarSolarConverter.getLunarDate(dailyDate.getDate(), dailyDate.getMonth() + 1, dailyDate.getFullYear());

            return (
                <div className="p-4 flex flex-col gap-4">
                    <div className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-slate-150">
                        <button onClick={() => setDailyDate(new Date(dailyDate.getFullYear(), dailyDate.getMonth(), dailyDate.getDate() - 1))} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft size={16}/></button>
                        <span className="text-xs font-black uppercase text-slate-700 font-sans tracking-wider">Ngày {dailyDate.getDate()}/{dailyDate.getMonth()+1}/{dailyDate.getFullYear()}</span>
                        <button onClick={() => setDailyDate(new Date(dailyDate.getFullYear(), dailyDate.getMonth(), dailyDate.getDate() + 1))} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight size={16}/></button>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-150 flex flex-col items-center justify-center text-center relative overflow-hidden group">
                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-400 font-sans">DƯƠNG LỊCH</span>
                        <h1 className="text-6xl font-black my-2 font-sans tracking-tighter text-blue-600">{dailyDate.getDate()}</h1>
                        <span className="text-xs font-bold text-slate-600 font-sans">Tháng {dailyDate.getMonth() + 1} năm {dailyDate.getFullYear()}</span>
                    </div>

                    <div className="bg-amber-50 bg-opacity-60 p-5 rounded-2xl border border-amber-200/60 flex flex-col items-center justify-center text-center">
                        <span className="text-[10px] font-black uppercase tracking-widest text-amber-600/70 font-sans">ÂM LỊCH TỰ ĐỘNG</span>
                        <h2 className="text-4xl font-black my-1 font-sans text-amber-700 tracking-tight">{lDate.lunarDay}</h2>
                        <span className="text-xs font-bold text-amber-800 font-sans">Tháng {lDate.lunarMonth} năm {lDate.lunarYear}</span>
                    </div>

                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 flex flex-col gap-2 relative">
                        <span className="text-[9px] font-black uppercase tracking-widest text-slate-400 font-sans flex items-center gap-1"><BookOpen size={12}/> Kinh Pháp Cú Trích Lọc</span>
                        <p className="text-xs font-medium text-slate-600 font-sans italic whitespace-pre-line leading-relaxed pl-3 border-l-2 border-blue-500">{verse}</p>
                    </div>
                </div>
            );
        };

        // --- COMPONENT VIỆC CẦN LÀM (TODO VIEW) NGUYÊN BẢN + HỖ TRỢ ĐỊNH VỊ TÌM KIẾM ---
        const TodoView = ({ user, db, appId, theme, searchHighlightId, searchTargetsRef }) => {
            const [todos, setTodos] = useState([]);
            const [editing, setEditing] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const todoRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'todos'), [db, appId, user.uid]);

            useEffect(() => {
                const unsub = onSnapshot(query(todoRef), snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    data.sort((a, b) => {
                        if (a.completed !== b.completed) return a.completed ? 1 : -1;
                        return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
                    });
                    setTodos(data);
                });
                return unsub;
            }, [todoRef]);

            const save = async (text, reminderStr, deadlineStr) => {
                const reminderData = reminderStr ? Timestamp.fromDate(new Date(reminderStr)) : null;
                const deadlineData = deadlineStr ? Timestamp.fromDate(new Date(deadlineStr)) : null;
                const payload = { text, reminderTime: reminderData, deadlineTime: deadlineData };
                
                if (editing.id) await updateDoc(doc(todoRef, editing.id), payload);
                else await addDoc(todoRef, { ...payload, completed: false, createdAt: serverTimestamp() });
                setEditing(null);
                toast.success("Cập nhật công việc thành công!");
            };

            const toggle = async (id, completed) => {
                await updateDoc(doc(todoRef, id), { completed: !completed });
            };

            return (
                <div className="p-4 flex flex-col gap-4 h-full relative">
                    <div className="flex justify-between items-center shrink-0">
                        <h2 className="text-sm font-black uppercase tracking-wider text-slate-600 font-sans">Danh sách công việc</h2>
                        <button onClick={() => setEditing({ text: '', reminder: '', deadline: '' })} className="text-xs font-bold text-white bg-blue-600 px-3 py-1.5 rounded-xl hover:bg-blue-700 transition shadow-md shadow-blue-100 flex items-center gap-0.5 font-sans"><Plus size={14}/> Tạo việc</button>
                    </div>

                    <div className="flex-1 overflow-y-auto no-scrollbar pb-6">
                        <ul className="flex flex-col gap-2">
                            {todos.map(t => (
                                <li 
                                    key={t.id}
                                    ref={el => { if(el) searchTargetsRef.current[t.id] = el; }}
                                    id={`search-target-${t.id}`}
                                    className={`bg-white p-3 rounded-2xl border border-slate-150 flex items-center justify-between gap-2 shadow-sm transition-all duration-500 ${t.id === searchHighlightId ? 'highlight-search-target' : ''}`}
                                >
                                    <div className="flex items-center gap-2 overflow-hidden flex-1">
                                        <input type="checkbox" checked={t.completed} onChange={() => toggle(t.id, t.completed)} className="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 shrink-0 cursor-pointer" />
                                        <div className="flex flex-col overflow-hidden">
                                            <span className={`text-xs font-bold font-sans truncate ${t.completed ? 'line-through text-slate-400' : 'text-slate-700'}`}>{t.text}</span>
                                            {t.deadlineTime && (
                                                <span className="text-[9px] text-red-500 font-sans mt-0.5 flex items-center gap-0.5 font-medium">
                                                    <Clock size={10}/> Hạn: {new Date(t.deadlineTime.seconds * 1000).toLocaleString('vi-VN')}
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="flex gap-1 shrink-0">
                                        <button onClick={() => setEditing({ id: t.id, text: t.text, reminder: t.reminderTime ? new Date(t.reminderTime.seconds*1000).toISOString().slice(0,16) : '', deadline: t.deadlineTime ? new Date(t.deadlineTime.seconds*1000).toISOString().slice(0,16) : '' })} className="p-1 hover:bg-slate-50 text-slate-400 hover:text-blue-600 rounded-lg transition"><Pencil size={13}/></button>
                                        <button onClick={() => { if(deleteConfirm===t.id) deleteDoc(doc(todoRef, t.id)); else { setDeleteConfirm(t.id); setTimeout(()=>setDeleteConfirm(null),3000); } }} className={`text-[10px] font-bold transition font-sans ${deleteConfirm===t.id ? 'text-red-600 bg-red-50 px-1.5 py-0.5 rounded border border-red-100' : 'text-slate-400 hover:text-red-600 p-1'}`}>{deleteConfirm===t.id ? 'Xóa?' : <Trash2 size={13}/>}</button>
                                    </div>
                                </li>
                            ))}
                            {todos.length === 0 && <div className="text-center py-12 text-xs text-slate-400 font-sans">Hệ thống trống. Hãy tạo việc cần làm để quản lý quỹ thời gian tốt hơn.</div>}
                        </ul>
                    </div>

                    {editing && (
                        <TodoEditor 
                            initialText={editing.text} initialReminder={editing.reminder} initialDeadline={editing.deadline}
                            isNew={!editing.id} onSave={save} onCancel={() => setEditing(null)}
                        />
                    )}
                </div>
            );
        };

        const TodoEditor = ({ initialText, initialReminder, initialDeadline, isNew, onSave, onCancel }) => {
            const [text, setText] = useState(initialText || '');
            const [reminder, setReminder] = useState(initialReminder || '');
            const [deadline, setDeadline] = useState(initialDeadline || '');
            return (
                <div className="fixed inset-0 bg-white z-50 flex flex-col animate-in slide-in-from-bottom-5 text-slate-800">
                    <div className="flex justify-between items-center p-4 border-b bg-gray-50 shrink-0">
                        <button onClick={onCancel} className="p-2 hover:bg-gray-200 rounded-full transition text-slate-400"><X size={18}/></button>
                        <h3 className="font-bold text-sm text-gray-700 font-sans">{isNew ? 'Thêm Việc Mới' : 'Cập Nhật Công Việc'}</h3>
                        <button onClick={()=> { if(text.trim()) onSave(text.trim(), reminder, deadline); }} className="text-blue-600 font-black text-sm p-2 transition">LƯU</button>
                    </div>
                    <div className="p-4 flex-1 flex flex-col gap-4 overflow-y-auto no-scrollbar">
                        <div><label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-wider font-sans">Nội dung công việc</label><input className="w-full text-base border-b pb-2 outline-none focus:border-blue-500 bg-transparent text-slate-800 font-bold font-sans" placeholder="Ví dụ: Hoàn thành giáo án..." value={text} onChange={e=>setText(e.target.value)} autoFocus /></div>
                        <div><label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-wider font-sans flex items-center gap-1"><AlertCircle size={12}/> Hạn chót (Deadline)</label><input type="datetime-local" className="w-full border rounded-xl p-2.5 text-xs bg-slate-50 font-sans text-slate-800 outline-none" value={deadline} onChange={e=>setDeadline(e.target.value)} /></div>
                        <div><label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-wider font-sans flex items-center gap-1"><Clock size={12}/> Nhắc tôi trước (Reminder)</label><input type="datetime-local" className="w-full border rounded-xl p-2.5 text-xs bg-slate-50 font-sans text-slate-800 outline-none" value={reminder} onChange={e=>setReminder(e.target.value)} /></div>
                    </div>
                </div>
            );
        };

        // --- COMPONENT SỔ GHI CHÚ (NOTES VIEW) NGUYÊN BẢN + HỖ TRỢ ĐỊNH VỊ TÌM KIẾM ---
        const NotesView = ({ user, db, appId, theme, searchHighlightId, searchTargetsRef }) => {
            const [notes, setNotes] = useState([]);
            const [activeNote, setActiveNote] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const noteRef = useMemo(() => collection(db, 'artifacts', appId, 'users', user.uid, 'notes'), [db, appId, user.uid]);

            useEffect(() => {
                const unsub = onSnapshot(query(noteRef), snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    data.sort((a,b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));
                    setNotes(data);
                });
                return unsub;
            }, [noteRef]);

            const save = async (title, text, color) => {
                const payload = { title, text, color, updatedAt: serverTimestamp() };
                if (activeNote.id) await updateDoc(doc(noteRef, activeNote.id), payload);
                else await addDoc(noteRef, { ...payload, createdAt: serverTimestamp() });
                setActiveNote(null);
                toast.success("Đã ghi nhớ thông tin sổ tay.");
            };

            return (
                <div className="p-4 flex flex-col gap-4 h-full relative">
                    <div className="flex justify-between items-center shrink-0">
                        <h2 className="text-sm font-black uppercase tracking-wider text-slate-600 font-sans">Sổ tay ghi chú</h2>
                        <button onClick={() => setActiveNote({ title: '', text: '', color: '#FEFCE8' })} className="text-xs font-bold text-white bg-blue-600 px-3 py-1.5 rounded-xl hover:bg-blue-700 transition shadow-md shadow-blue-100 flex items-center gap-0.5 font-sans"><Plus size={14}/> Tạo ghi chú</button>
                    </div>

                    <div className="flex-1 overflow-y-auto no-scrollbar pb-6">
                        <div className="grid grid-cols-2 gap-3">
                            {notes.map(n => (
                                <div 
                                    key={n.id}
                                    ref={el => { if(el) searchTargetsRef.current[n.id] = el; }}
                                    id={`search-target-${n.id}`}
                                    onClick={() => setActiveNote(n)}
                                    style={{ backgroundColor: n.color || '#FFFFFF' }}
                                    className={`p-4 rounded-2xl border border-slate-200/80 shadow-sm flex flex-col justify-between h-32 cursor-pointer transition-all duration-500 relative hover:shadow-md active:scale-[0.98] ${n.id === searchHighlightId ? 'highlight-search-target' : ''}`}
                                >
                                    <div className="flex flex-col gap-1 overflow-hidden">
                                        <h4 className="text-xs font-bold text-slate-800 font-sans truncate">{n.title || 'Ghi chú không tên'}</h4>
                                        <p className="text-[10px] text-slate-500 font-sans line-clamp-4 leading-relaxed">{n.text}</p>
                                    </div>
                                    <div className="flex justify-end pt-1 shrink-0">
                                        <button 
                                            onClick={(e) => { 
                                                e.stopPropagation(); 
                                                if(deleteConfirm===n.id) deleteDoc(doc(noteRef, n.id)); 
                                                else { setDeleteConfirm(n.id); setTimeout(()=>setDeleteConfirm(null),3000); } 
                                            }} 
                                            className={`text-[9px] font-bold font-sans transition ${deleteConfirm===n.id ? 'text-red-600 bg-red-50 px-1 py-0.5 rounded border' : 'text-slate-400 hover:text-red-600'}`}
                                        >
                                            {deleteConfirm===n.id ? 'Xóa?' : <Trash2 size={12}/>}
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        {notes.length === 0 && <div className="text-center py-12 text-xs text-slate-400 font-sans col-span-2">Không có ghi chú. Hãy viết một vài ý tưởng hoặc nội dung quan trọng vào đây.</div>}
                    </div>

                    {activeNote && (
                        <NoteEditor 
                            initialNote={activeNote}
                            onSave={save}
                            onCancel={() => setActiveNote(null)}
                        />
                    )}
                </div>
            );
        };

        const NoteEditor = ({ initialNote, onSave, onCancel }) => {
            const [title, setTitle] = useState(initialNote.title || '');
            const [text, setText] = useState(initialNote.text || '');
            const [color, setColor] = useState(initialNote.color || '#FEFCE8');

            return (
                <div className="fixed inset-0 bg-white z-50 flex flex-col animate-in slide-in-from-bottom-5 text-slate-800" style={{ backgroundColor: color }}>
                    <div className="flex justify-between items-center p-4 border-b border-black/5 bg-white bg-opacity-40 shrink-0">
                        <button onClick={onCancel} className="p-2 hover:bg-black/5 rounded-full transition text-slate-500"><X size={18}/></button>
                        <h3 className="font-bold text-sm text-slate-700 font-sans">{initialNote.id ? 'Sửa Ghi Chú' : 'Tạo Ghi Chú Mới'}</h3>
                        <button onClick={() => onSave(title.trim(), text.trim(), color)} className="text-blue-600 font-black text-sm p-2">LƯU</button>
                    </div>
                    <div className="p-4 flex-1 flex flex-col gap-3 overflow-y-auto no-scrollbar">
                        <input className="w-full text-base font-bold bg-transparent border-b border-black/5 pb-2 outline-none placeholder-slate-400 text-slate-800 font-sans" placeholder="Tiêu đề ghi chú..." value={title} onChange={e=>setTitle(e.target.value)}/>
                        <textarea className="w-full flex-1 text-xs bg-transparent outline-none resize-none placeholder-slate-400 text-slate-700 font-sans leading-relaxed" placeholder="Nội dung chi tiết..." value={text} onChange={e=>setText(e.target.value)}/>
                    </div>
                    <div className="p-4 border-t border-black/5 bg-white bg-opacity-40 shrink-0 overflow-x-auto no-scrollbar">
                        <div className="flex gap-2">
                            {NOTE_COLORS.map(c => (
                                <button key={c} onClick={() => setColor(c)} style={{ backgroundColor: c }} className={`w-7 h-7 rounded-full border transition shrink-0 ${color === c ? 'border-slate-800 scale-110 shadow-sm' : 'border-slate-300'}`}></button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENT THỜI KHÓA BIỂU TUẦN (TIMETABLE VIEW) NGUYÊN BẢN + HỖ TRỢ ĐỊNH VỊ TÌM KIẾM ---
        const TimetableView = ({ user, db, appId, theme, searchHighlightId, searchTargetsRef }) => {
            const [timetable, setTimetable] = useState({});
            const [isEditing, setIsEditing] = useState(false);
            const [formData, setFormData] = useState({});

            const docRef = useMemo(() => doc(db, 'artifacts', appId, 'users', user.uid, 'timetable', 'current'), [db, appId, user.uid]);

            useEffect(() => {
                const unsub = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data().data || {};
                        setTimetable(data); setFormData(data);
                    }
                });
                return unsub;
            }, [docRef]);

            const handleSave = async () => {
                await setDoc(docRef, { data: formData, updatedAt: serverTimestamp() });
                setIsEditing(false);
                toast.success("Thời khóa biểu tuần đã được đồng bộ!");
            };

            const days = [
                { key: 'monday', label: 'T.Hai' }, { key: 'tuesday', label: 'T.Ba' }, { key: 'wednesday', label: 'T.Tư' },
                { key: 'thursday', label: 'T.Năm' }, { key: 'friday', label: 'T.Sáu' }, { key: 'saturday', label: 'T.Bảy' },
                { key: 'sunday', label: 'C.Nhật' }
            ];
            const periods = ['s1', 's2', 's3', 's4', 's5', 'c1', 'c2', 'c3', 'c4', 'c5'];

            const getPeriodLabel = (p) => {
                const num = p.charAt(1);
                return p.startsWith('s') ? `Sáng ${num}` : `Chiều ${num}`;
            };

            if (isEditing) {
                return (
                    <div className="p-4 flex flex-col gap-4 text-slate-800 animate-fade-in">
                        <div className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-slate-150">
                            <h3 className="font-bold text-xs uppercase tracking-wider text-slate-600 font-sans">Chỉnh sửa lịch tuần</h3>
                            <div className="flex gap-1">
                                <button onClick={() => setIsEditing(false)} className="p-1.5 bg-slate-100 hover:bg-slate-200 rounded-lg text-slate-500 transition"><X size={14}/></button>
                                <button onClick={handleSave} className="p-1.5 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition shadow-sm flex items-center gap-0.5 text-xs"><Check size={14}/> Lưu</button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto no-scrollbar pb-6 flex flex-col gap-4">
                            {days.map(d => (
                                <div key={d.key} className="bg-white p-4 rounded-2xl border border-slate-150 flex flex-col gap-2.5">
                                    <span className="text-xs font-black text-blue-600 font-sans bg-blue-50 px-2 py-1 rounded-lg w-max mb-1">{d.label}</span>
                                    <div className="grid grid-cols-2 gap-2">
                                        {periods.map(p => (
                                            <div key={p} className="flex flex-col gap-0.5">
                                                <label className="text-[9px] font-black text-slate-400 font-sans px-1 uppercase">{getPeriodLabel(p)}</label>
                                                <input 
                                                    type="text" 
                                                    className="border border-slate-200 rounded-xl px-2.5 py-1.5 text-xs bg-slate-50 outline-none text-slate-800 font-medium font-sans focus:border-blue-500 focus:bg-white transition" 
                                                    placeholder="Tên môn học..."
                                                    value={formData[d.key]?.[p] || ''}
                                                    onChange={e => {
                                                        const val = e.target.value;
                                                        setFormData(prev => ({
                                                            ...prev,
                                                            [d.key]: { ...(prev[d.key] || {}), [p]: val }
                                                        }));
                                                    }}
                                                />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 flex flex-col gap-4 h-full">
                    <div className="flex justify-between items-center shrink-0">
                        <h2 className="text-sm font-black uppercase tracking-wider text-slate-600 font-sans">Thời khóa biểu chi tiết</h2>
                        <button onClick={() => { setFormData(timetable); setIsEditing(true); }} className="text-xs font-bold text-white bg-blue-600 px-3 py-1.5 rounded-xl hover:bg-blue-700 transition shadow-md shadow-blue-100 flex items-center gap-0.5 font-sans"><Pencil size={12}/> Cập nhật</button>
                    </div>

                    <div className="flex-1 overflow-y-auto no-scrollbar pb-6 flex flex-col gap-3">
                        {days.map(d => (
                            <div key={d.key} className="bg-white p-3.5 rounded-2xl border border-slate-150 shadow-sm flex flex-col gap-2">
                                <span className="text-xs font-black text-slate-700 border-b pb-1 font-sans">{d.label}</span>
                                <div className="grid grid-cols-2 gap-1.5">
                                    {periods.map(p => {
                                        const subject = timetable[d.key]?.[p];
                                        const highlightKey = `timetable-${d.key}-${p}`;
                                        const isTarget = highlightKey === searchHighlightId;
                                        if (!subject) return null;
                                        return (
                                            <div 
                                                key={p}
                                                ref={el => { if(el) searchTargetsRef.current[highlightKey] = el; }}
                                                id={`search-target-${highlightKey}`}
                                                className={`p-2 rounded-xl bg-slate-50 border border-slate-150 text-[11px] font-sans transition-all duration-500 flex flex-col gap-0.5 ${isTarget ? 'highlight-search-target' : ''}`}
                                            >
                                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wide">{getPeriodLabel(p)}</span>
                                                <span className="font-bold text-slate-700 truncate">{subject}</span>
                                            </div>
                                        );
                                    })}
                                    {Object.values(timetable[d.key] || {}).every(v => !v) && (
                                        <div className="text-[10px] text-slate-400 font-sans italic p-1">Trống lịch, không có tiết học.</div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- PANEL CÀI ĐẶT GIAO DIỆN (SETTINGS PANEL) ---
        const SettingsPanel = ({ theme, onSave, onCancel }) => {
            const [bgColor, setBgColor] = useState(theme.bgColor || '#f3f4f6');
            const [textColor, setTextColor] = useState(theme.textColor || '#1f2937');
            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-end justify-center animate-fade-in">
                    <div className="bg-white w-full max-w-md rounded-t-3xl shadow-2xl p-5 border-t text-slate-800 flex flex-col gap-4 animate-in slide-in-from-bottom-10">
                        <div className="flex justify-between items-center border-b pb-2">
                            <h3 className="font-black text-sm uppercase tracking-wider text-slate-700 font-sans">Tùy biến không gian</h3>
                            <button onClick={onCancel} className="p-1 hover:bg-gray-100 rounded-full transition text-slate-400"><X size={16}/></button>
                        </div>
                        <div className="flex flex-col gap-3">
                            <div><label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-wider font-sans">Màu nền chủ đạo</label><input type="color" className="w-full h-9 rounded-xl cursor-pointer border p-0.5 bg-slate-50" value={bgColor} onChange={e=>setBgColor(e.target.value)}/></div>
                            <div><label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-wider font-sans">Màu chữ hiển thị</label><input type="color" className="w-full h-9 rounded-xl cursor-pointer border p-0.5 bg-slate-50" value={textColor} onChange={e=>setTextColor(e.target.value)}/></div>
                        </div>
                        <button onClick={() => onSave({ bgColor, textColor, cardBg: '#ffffff', primaryColor: '#2563eb' })} className="w-full bg-blue-600 text-white font-bold text-xs py-3 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-100 font-sans mt-2">ÁP DỤNG THAY ĐỔI</button>
                    </div>
                </div>
            );
        };

        // --- PANEL THÔNG TIN TÀI KHOẢN (PROFILE PANEL) ---
        const ProfilePanel = ({ user, auth, onCancel }) => {
            const [oldPassword, setOldPassword] = useState('');
            const [newPassword, setNewPassword] = useState('');
            const [err, setErr] = useState('');

            const handleUpdatePass = async (e) => {
                e.preventDefault(); setErr('');
                if(!newPassword) { setErr("Vui lòng điền mật khẩu mới."); return; }
                try {
                    await updatePassword(auth.currentUser, newPassword);
                    toast.success("Đổi mật khẩu thành công!");
                    setNewPassword(''); setOldPassword('');
                } catch(error) { setErr(error.message); }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-end justify-center animate-fade-in">
                    <div className="bg-white w-full max-w-md rounded-t-3xl shadow-2xl p-5 border-t text-slate-800 flex flex-col gap-4 max-h-[90%] overflow-y-auto no-scrollbar animate-in slide-in-from-bottom-10">
                        <div className="flex justify-between items-center border-b pb-2">
                            <h3 className="font-black text-sm uppercase tracking-wider text-slate-700 font-sans">Thông tin tài khoản</h3>
                            <button onClick={onCancel} className="p-1 hover:bg-gray-100 rounded-full transition text-slate-400"><X size={16}/></button>
                        </div>
                        <div className="bg-slate-50 p-3 rounded-xl border flex flex-col gap-0.5">
                            <span className="text-[9px] font-black text-slate-400 font-sans uppercase">Định danh kết nối (UID)</span>
                            <span className="text-xs font-mono font-bold text-slate-700 truncate">{user?.uid}</span>
                            <span className="text-[9px] font-black text-slate-400 font-sans uppercase mt-2">Địa chỉ Email</span>
                            <span className="text-xs font-sans font-bold text-slate-600 truncate">{user?.email}</span>
                        </div>
                        {err && <div className="bg-red-50 text-red-600 text-xs p-2.5 rounded-lg border border-red-200 font-sans font-bold">{err}</div>}
                        <form onSubmit={handleUpdatePass} className="flex flex-col gap-3 border-t pt-3">
                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-wider font-sans">Đổi mật khẩu an toàn</h4>
                            <div><label className="text-[9px] font-black text-slate-500 block mb-1 font-sans">MẬT KHẨU MỚI</label><input type="password" className="w-full border rounded-xl px-3 py-2 text-xs bg-slate-50 outline-none text-slate-800 font-sans font-bold focus:border-blue-500 focus:bg-white transition" value={newPassword} onChange={e=>setNewPassword(e.target.value)} placeholder="Tối thiểu 6 ký tự"/></div>
                            <button type="submit" className="bg-slate-800 text-white font-bold text-xs py-2 rounded-xl hover:bg-slate-900 transition font-sans mt-1">CẬP NHẬT MẬT KHẨU</button>
                        </form>
                        <button onClick={() => { signOut(auth); onCancel(); }} className="w-full bg-red-600 text-white font-bold text-xs py-3 rounded-xl hover:bg-red-700 transition shadow-lg shadow-red-100 font-sans mt-4 flex items-center justify-center gap-1"><LogOut size={14}/> ĐĂNG XUẤT HỆ THỐNG</button>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
